<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Centro de Captación · Incuba tu Negocio</title>
<style>
  :root{--bg:#f4f3f0;--card:#fff;--line:#e6e2da;--ink:#23262c;--mut:#6f7480;--brand:#e0871a;--brand-d:#b96a06;--soft:#faf3e8;--green:#1d6f2b;--red:#b32424}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .top{position:sticky;top:0;z-index:30;background:#23262c;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .top h1{font-size:17px;margin:0;font-weight:900}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tabs button{background:#3a3e46;border:0;color:#cfd3da;border-radius:999px;padding:8px 14px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer}
  .tabs button[aria-pressed="true"]{background:var(--brand);color:#fff}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 14px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card h2{font-size:16px;margin:0 0 10px}
  label{display:block;font-weight:700;font-size:12.5px;margin:0 0 4px}
  input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
  textarea{min-height:74px}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>div{flex:1;min-width:140px}
  .note{font-size:12px;color:var(--mut);margin:4px 0 0}
  .btn{border:0;border-radius:9px;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer;font-size:13.5px}
  .btn-p{background:var(--brand);color:#fff}.btn-p:hover{background:var(--brand-d)}
  .btn-g{background:#ecebe7;color:var(--ink)}
  .btn-wa{background:#25d366;color:#fff}
  .mini{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 9px;cursor:pointer;font-size:13px}
  table{border-collapse:collapse;width:100%;font-size:13px;margin-top:6px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{background:var(--soft);position:sticky;top:0;font-size:12px}
  .muted{color:var(--mut)}
  .pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:800}
  .pill.nuevo{background:#e8eefc;color:#23408f}.pill.contactado{background:#fdf2e3;color:#8a5a08}
  .pill.interesado{background:#fde8f0;color:#a3164f}.pill.cliente{background:#e2efd6;color:#3f5e22}.pill.no{background:#eee;color:#777}
  .alerta{display:inline-block;background:#fff1e0;border:1px solid #e0871a;color:#8a5a08;border-radius:8px;padding:2px 8px;font-size:11.5px;font-weight:800}
  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .kpi{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
  .kpi b{display:block;font-size:22px}.kpi span{font-size:12px;color:var(--mut)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#23262c;color:#fff;border-radius:10px;padding:11px 18px;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;max-width:92%}
  .toast.on{opacity:1}
  .err{background:#fdeaea;border:1px solid #f0bcbc;color:var(--red);border-radius:9px;padding:9px 12px;margin-top:8px;font-size:13.5px;display:none}
  .vacio{padding:34px;text-align:center;color:var(--mut)}
  @media(max-width:640px){th,td{font-size:12px;padding:5px 6px}}
</style>
</head>
<body>
<header class="top">
  <h1>🎯 Centro de Captación</h1>
  <nav class="tabs" id="tabs">
    <button data-t="buscar" type="button">🔎 Buscar</button>
    <button data-t="pipeline" type="button">📋 Pipeline</button>
    <button data-t="embudo" type="button">📥 Embudo</button>
    <button data-t="resumen" type="button">📊 Resumen</button>
    <button data-t="ajustes" type="button">⚙️ Ajustes</button>
  </nav>
</header>
<main class="wrap" id="app"></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

const $=s=>document.querySelector(s);
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
// URL segura: solo http(s). Bloquea javascript:, data:, etc. (anti-XSS en enlaces de datos scrapeados).
function safeUrl(u){ u=String(u==null?"":u).trim(); return /^https?:\/\//i.test(u)?u:""; }
function slug(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40); }
function load(k,d){ try{ const v=localStorage.getItem("cc_"+k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem("cc_"+k,JSON.stringify(v)); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
let TOAST_T=null;
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>t.classList.remove("on"),2600); }
function hoyISO(){ return new Date().toISOString(); }
function dias(iso){ if(!iso) return 9999; return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }

// Importar CSV (de Outscraper, Apify, o el del propio panel). Detecta las columnas solo.
function parseCSV(txt){
  txt=String(txt||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").replace(/^﻿/,"");
  const head1=(txt.split("\n")[0]||""); const delim=(head1.split(";").length>head1.split(",").length)?";":",";
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<txt.length;i++){ const c=txt[i];
    if(q){ if(c==='"'){ if(txt[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===delim){ row.push(cur);cur=""; } else if(c==='\n'){ row.push(cur);rows.push(row);row=[];cur=""; } else cur+=c; } }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  if(!rows.length) return [];
  const head=rows.shift().map(h=>h.trim().toLowerCase());
  return rows.filter(r=>r.some(x=>(x||"").trim())).map(r=>{ const o={}; head.forEach((h,i)=>o[h]=(r[i]||"").trim()); return o; });
}

// Número listo para WhatsApp: SOLO móviles válidos (6xx o 71x-79x). Los fijos/raros NO tienen WhatsApp.
function waDe(l){ const core=s=>{ let d=(s||"").replace(/\D/g,""); if(d.length>9) d=d.slice(-9); return d.length===9?d:""; };
  let d=core(l.whatsapp); if(!esMovil(d)) d=core(l.tel); return esMovil(d)?("34"+d):""; }
// Si el móvil ya está escrito en las NOTAS o en el teléfono (pero no como WhatsApp), lo recupera. Sin internet.
function movilEnNotas(l){ if(waDe(l)) return ""; return (sacaTel((l.notas||"")+" "+(l.tel||"")).filter(esMovil)[0])||""; }
function colaRafaga(){

  const seguimientos=L.filter(l=>toquePendiente(l)>0);
  const nuevos=L.filter(l=>l.estado==="nuevo").sort((a,b)=>(score(b).v)-(score(a).v));
  return seguimientos.concat(nuevos);

function zonaDe(l){ const m=String(l.notas||"").match(/isla:([A-Za-zÀ-ÿ' ]+?)(?: -|$)/i); if(m) return m[1].trim();

  if(/lanzarote|arrecife|tias|teguise|yaiza|tinajo|haria/.test(c)) return "Lanzarote";
  if(/fuerteventura|puerto del rosario|corralejo|morro jable|antigua|betancuria|la oliva|pajara|tuineje/.test(c)) return "Fuerteventura";
  if(/gomera/.test(c)) return "La Gomera";

function vResumen(){

document.getElementById("tabs").addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b) return; TAB=b.dataset.t; save("tab",TAB); render(); });

document.addEventListener("click",async e=>{
  const t=e.target.closest("button"); if(!t) return;
  if(t.id==="go"){ await buscar(); return; }
  if(t.id==="goosm"){ await buscarOSM(); return; }
  if(t.id==="autoTodo"){
    const setp=(s)=>{ const p=$("#autoProg"); if(p){ p.style.display="block"; p.innerHTML=s; } };
    if(!(AJ().jinaKey||"").trim()){ toast("⚠ Falta la clave Jina en ⚙️ Ajustes — sin ella no saca emails"); }
    setp("🌍 Buscando bares en la zona…");

// Búsqueda GRATIS con OpenStreetMap (sin clave, sin Google). Funciona en el navegador.
// Traduce lo que escribe el usuario en "Tipo" a categorías de OpenStreetMap. Si no reconoce el
// término, hace un barrido amplio de cualquier negocio (tiendas, talleres, oficinas, servicios…).
function osmFiltros(tipo){
  const t=(tipo||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const M=[
    [/bar|cafe|cafeteria|restaurant|pub|tapa|cervec|comida|tasca|asador|pizz|hamburgues|kebab|helad|churr|brunch|desayun|gastro|tabern/, ['["amenity"~"^(cafe|bar|restaurant|fast_food|pub|ice_cream)$"]']],
    [/peluqu|barber|estetic|belleza|uña|unas|spa|tatu|piercing/, ['["shop"~"hairdresser|beauty|tattoo"]','["leisure"="spa"]']],
    [/gimnas|fitness|deporte|crossfit|yoga|pilates|padel/, ['["leisure"~"fitness_centre|sports_centre"]','["sport"]']],
    [/farmac|parafarm/, ['["amenity"="pharmacy"]']],
    [/panad|paster|confiter|bolleria/, ['["shop"~"bakery|pastry|confectionery"]']],
    [/ropa|moda|boutique|zapat|calzad|complement|textil/, ['["shop"~"clothes|shoes|boutique|fashion|bag"]']],
    [/taller|mecanic|coche|automov|neumatic|chapa|motor/, ['["shop"~"car_repair|car|tyres|motorcycle"]','["craft"="car_repair"]']],
    [/ferreter|bricolaje/, ['["shop"~"hardware|doityourself"]']],
    [/florist|flore|jardin/, ['["shop"~"florist|garden_centre"]']],
    [/carnic/, ['["shop"="butcher"]']],
    [/fruteri|verduler/, ['["shop"="greengrocer"]']],
    [/super|aliment|ultramarin|tienda|colmado|kiosko|kiosco|estanco|bazar/, ['["shop"~"supermarket|convenience|grocery|kiosk|tobacco|variety_store"]']],
    [/clinic|dentist|medic|fisio|psicolog|podolog|sanitar/, ['["amenity"~"clinic|dentist|doctors"]','["healthcare"]']],
    [/veterinar|mascot/, ['["amenity"="veterinary"]','["shop"="pet"]']],
    [/hotel|aloja|hostal|pension|apartament|turism/, ['["tourism"~"hotel|guest_house|hostel|apartment"]']],
    [/inmobil/, ['["office"="estate_agent"]']],
    [/abogad|asesor|gestor|consultor|contab|notari/, ['["office"~"lawyer|accountant|estate_agent|company|consulting"]']],
    [/joyer|relojer/, ['["shop"~"jewelry|watches"]']],
    [/librer|papeler/, ['["shop"~"books|stationery"]']],
    [/optic/, ['["shop"="optician"]']],
    [/lavander|tintorer/, ['["shop"~"laundry|dry_cleaning"]']],
    [/inform|ordenador|movil|telefon|electron/, ['["shop"~"computer|mobile_phone|electronics"]']]
  ];
  for(const par of M){ if(par[0].test(t)) return par[1]; }
  // término no reconocido → barrido amplio de cualquier negocio
  return ['["shop"]','["craft"]','["office"]','["amenity"~"^(pharmacy|clinic|dentist|doctors|veterinary|fuel|bank)$"]','["tourism"~"^(hotel|guest_house)$"]'];
}
// Distancia en km entre dos puntos (para filtrar por cercanía).
function distKm(lat1,lon1,lat2,lon2){ const R=6371,toR=x=>x*Math.PI/180; const dLat=toR(lat2-lat1),dLon=toR(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2; return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10; }
// Cadenas/franquicias que NO son clientes (tienen su propio sistema). Se filtran de la búsqueda.
const CADENAS=/(mcdonald|burger\s*king|\bkfc\b|telepizza|domino|pizza\s*hut|starbucks|subway|foster|100\s*montaditos|taco\s*bell|popeyes|five\s*guys|goiko|dunkin|costa\s*coffee|papa\s*john|wendy|rodilla|lizarr|la\s*sureña|\bginos\b|tagliatella|\budon\b|muerde\s*la\s*pasta|\btgb\b|santagloria|granier|400\s*grados|carrefour|mercadona|\blidl\b|\bdia\b|\baldi\b|repsol|cepsa|\bshell\b|\bbp\b|\bgalp\b|vips|cañas\s*y\s*tapas|tierra\s*burrito|honest\s*greens)/i;
function esCadena(t){ return !!(t&&(t.brand||t["brand:wikidata"]||CADENAS.test(t.name||""))); }
async function buscarOSM(){
  const err=$("#berr"); err.style.display="none";
  const z=$("#bz").value.trim(); save("bz",z); save("bq",$("#bq").value.trim()); save("bradio",($("#bradio")&&$("#bradio").value)||6);
  if(!z){ err.textContent="Pon la zona o ciudad."; err.style.display="block"; return; }
  const btn=$("#goosm"); btn.textContent="Buscando… (puede tardar 10-30s)"; btn.disabled=true;
  try{
    // 1) localizar la ciudad (Nominatim, gratis)
    const g=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(z),{headers:{"Accept":"application/json"}});
    const gj=await g.json();
    if(!gj||!gj.length) throw new Error("No encuentro esa ciudad. Prueba a escribirla más completa.");
    const lat=gj[0].lat, lon=gj[0].lon;
    // 2) negocios alrededor (Overpass, gratis) — el TIPO que escribas decide qué se busca
    const radio=(parseInt($("#bradio")&&$("#bradio").value,10)||6)*1000; // km -> metros
    const filtros=osmFiltros(($("#bq")&&$("#bq").value)||"");
    const partes=filtros.map(f=>'node'+f+'(around:'+radio+','+lat+','+lon+');way'+f+'(around:'+radio+','+lat+','+lon+');').join('');
    const oq='[out:json][timeout:60];('+partes+');out center tags 400;';
    let j=null;
    for(const ep of ["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter"]){
      try{ const r=await fetch(ep,{method:"POST",body:"data="+encodeURIComponent(oq)}); if(r.ok){ j=await r.json(); break; } }catch(e){}
    }
    if(!j) throw new Error("Los servidores de OpenStreetMap están ocupados. Prueba otra vez en un minuto.");
    const seen={};
    RES=(j.elements||[]).filter(e=>e.tags&&e.tags.name && !esCadena(e.tags)).map(e=>{ const t=e.tags;
      const dir=[t["addr:street"],t["addr:housenumber"]].filter(Boolean).join(" ")||t["addr:suburb"]||t["addr:city"]||"";
      // ciudad REAL del negocio si OSM la trae en cualquiera de estos tags; si no, cae a la zona buscada (fallback).
      const ciuTag=t["addr:city"]||t["addr:town"]||t["addr:village"]||t["addr:municipality"]||t["addr:suburb"]||t["addr:district"]||"";
      const ciudadReal=!!ciuTag; const ciudad=ciuTag||z;
      const tel=t.phone||t["contact:phone"]||t["contact:mobile"]||"";
      const elat=e.lat||(e.center&&e.center.lat), elon=e.lon||(e.center&&e.center.lon);
      const km=(elat&&elon)?distKm(+lat,+lon,+elat,+elon):null;
      return { nombre:t.name, dir, ciudad, ciudadReal, km, tel, inter:tel, web:t.website||t["contact:website"]||"", rating:"", n:0 }; })
      .filter(d=>{ const k=d.nombre.toLowerCase(); if(seen[k])return false; seen[k]=1; return true; });
    RES.forEach(d=>{ const sc=score(d); d.score=sc.v; d.motivo=sc.m; });
    RES.sort((a,b)=>b.score-a.score);
    RESF={tipo:"",ciudad:"",maxkm:0}; // filtro limpio en cada búsqueda nueva
    render();
    if(!RES.length){ const e2=$("#berr"); if(e2){ e2.textContent="No salió ningún bar en esa zona. Prueba con una ciudad más grande cerca."; e2.style.display="block"; } }
  }catch(e){ render(); const e2=$("#berr"); if(e2){ e2.textContent="No se pudo buscar gratis: "+e.message; e2.style.display="block"; } }
}

// Rellena teléfono y web OFICIALES de UN bar desde Google Places (clave del usuario). null si Google no lo tiene.
// ¿El nombre que devuelve Google se parece al del bar? Si no, es OTRO negocio (homónimo) → no lo cogemos.
function gNombreCoincide(a,b){ const t=s=>new Set(String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\b(bar|cafeteria|cafe|restaurante|restaurant|el|la|los|las|de|del|y|grill|pub|tasca|meson)\b/g," ").split(/\s+/).filter(w=>w.length>=3));
  const A=t(a),B=t(b); if(!A.size||!B.size) return false; let c=0; A.forEach(w=>{ if(B.has(w))c++; }); return c/new Set([...A,...B]).size>=0.5; }
// Gemini (con tu clave Google AIza) CONECTADO A BÚSQUEDA real (google_search) → menos invención.
// Requiere activar "Generative Language API" en tu proyecto de Google (gratis).
async function geminiPregunta(prompt){ const key=(AJ().geminiKey||AJ().gkey||"").trim(); if(!key) throw new Error("Falta la clave de Gemini (sácala gratis en aistudio.google.com) en Ajustes");
  const modelos=["gemini-2.5-flash","gemini-flash-latest"]; let ultimo="Gemini no respondió";
  const saturado=m=>/overload|high demand|UNAVAILABLE|503|try again|temporar|network|fetch|tope de tiempo/i.test(m||"");
  const duro=m=>/limit: 0|free_tier|per day|dailyLimit|daily limit/i.test(m||"");                 // cupo del día / en 0 → esperar no sirve
  const porMinuto=m=>/RESOURCE_EXHAUSTED|rateLimit|per minute|retry in|429|quota|exceeded/i.test(m||"");
  const esperaDe=m=>{ const mm=String(m||"").match(/retry in (\d+)/i); return Math.min(48,(mm?(+mm[1]):35)+3); };
  const dormir=s=>new Promise(r=>setTimeout(r,s*1000));
  for(const modelo of modelos){
    for(let intento=0;intento<3;intento++){
      try{
        const r=await fetchT("https://generativelanguage.googleapis.com/v1beta/models/"+modelo+":generateContent?key="+encodeURIComponent(key),
          { method:"POST", headers:{"content-type":"application/json"},
            body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], tools:[{google_search:{}}] }) }, 25000);
        const j=await r.json();
        if(j.error){ ultimo=j.error.message||"Error de Gemini";
          if(duro(ultimo)) break;                                              // cupo del día/en 0 → siguiente modelo
          if(saturado(ultimo)){ await dormir(2*(intento+1)); continue; }       // saturado → reintenta rápido
          if(porMinuto(ultimo) && intento<2){ await dormir(esperaDe(ultimo)); continue; } // freno por minuto → espera y reintenta solo
          if(porMinuto(ultimo)) break;
          throw new Error(ultimo);                                             // error duro (clave, etc.)
        }
        const c=(j.candidates||[])[0]||{}; const parts=((c.content||{}).parts||[]); return parts.map(p=>p.text||"").join(" ").trim();
      }catch(e){ ultimo=e.message||String(e);
        if(duro(ultimo)) break;
        if(saturado(ultimo)){ await dormir(2*(intento+1)); continue; }
        if(porMinuto(ultimo) && intento<2){ await dormir(esperaDe(ultimo)); continue; }
        if(porMinuto(ultimo)) break;
        throw e;
      }
    }
  }
  throw new Error(ultimo);
}
// ¿El usuario de Instagram pega con el nombre del negocio? Si no comparten NADA, seguramente es de otro
// (un cliente, un crítico…) y NO lo cogemos. Mejor sin Instagram que con uno equivocado.
function igCoherente(handle, nombre){
  const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const h=norm(handle).replace(/[^a-z0-9]/g,"");
  const toks=norm(nombre).replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(w=>w.length>=4);
  if(!h) return false;
  if(!toks.length) return true;                 // nombre sin palabras de 4+ letras (ej. "Bar 22") → no puedo verificar, lo dejo pasar
  return toks.some(t=>h.includes(t) || t.includes(h));   // comparten alguna palabra de 4+ letras
}
// Saca email/móvil/Instagram de un TEXTO (resultados de Google o respuesta de Gemini) y arma el patch.
// d = JSON opcional con {email,movil,instagram} (lo que devuelve Gemini); si no hay, {}.
function extraeContacto(txt, l, d, etiqueta){
  d=d||{}; const patch={}; const mailRe=/^[^@\s]+@[^@\s]+\.[a-z]{2,}$/i; const found=[];
  // EMAIL: el del JSON; si viene vacío, lo busco en TODO el texto.
  if(!l.email){ let email=(d.email && mailRe.test(String(d.email).trim()))?String(d.email).toLowerCase().trim():(sacaEmails(txt)[0]||"");
    if(email && mailRe.test(email)){ patch.email=email; patch.emailAuto=true; found.push("email "+email); }
  }
  // MÓVIL (para WhatsApp): del JSON; si no, el primer móvil 6/7 que aparezca en el texto.
  if(!waDe(l)){ let mv=String(d.movil||"").replace(/\D/g,"").slice(-9);
    if(!(mv.length===9 && esMovil(mv))) mv=(sacaTel(txt).filter(esMovil)[0]||"");
    if(mv && mv.length===9 && esMovil(mv)){ patch.whatsapp="34"+mv; if(!l.tel)patch.tel="+34 "+mv.replace(/(\d{3})(\d{2})(\d{2})(\d{2})/,"$1 $2 $3 $4"); found.push("móvil "+mv); }
  }
  // TELÉFONO para LLAMAR: si el bar no tiene NINGÚN teléfono y no salió móvil, apunto el que aparezca (aunque sea fijo).
  if(!l.tel && !patch.tel && !patch.whatsapp){ const tel=sacaTel(txt)[0]||"";
    if(tel.length===9){ patch.tel="+34 "+tel.replace(/(\d{3})(\d{2})(\d{2})(\d{2})/,"$1 $2 $3 $4"); found.push("teléfono "+tel+(esMovil(tel)?"":" (fijo)")); }
  }
  // INSTAGRAM: SOLO el dato concreto que da el JSON como "del negocio" (NUNCA rebuscando en el texto:
  // ahí puede aparecer el Instagram de un cliente/crítico y acabaríamos escribiendo a quien no es).
  if(!l.instagram){ let handle=""; const cand=String(d.instagram||"").trim();
    const mu=cand.match(/instagram\.com\/([A-Za-z0-9._]+)/i);
    if(mu) handle=mu[1];
    else if(/^@?[A-Za-z0-9._]{2,30}$/.test(cand)) handle=cand.replace(/^@/,"");
    handle=handle.replace(/^@/,"");
    // Y solo lo acepto si el usuario PEGA con el nombre del bar; si no coincide en nada, lo descarto.
    if(handle && !/^(p|reel|reels|explore|stories|com|www|share|tv)$/i.test(handle) && igCoherente(handle, l.nombre)){
      patch.instagram="https://instagram.com/"+handle; found.push("instagram @"+handle); }
  }
  if(found.length) patch.notas="("+(etiqueta||"auto")+", REVISAR) "+(l.notas||"");
  return { patch, found };
}
// Busca email/móvil/Instagram de UN lead con Gemini (búsqueda en internet) y devuelve {patch, found, txt}.
async function gemBuscaLead(l){
  const prompt="Quiero los datos de contacto del negocio de hostelería \""+l.nombre+"\" en "+(l.ciudad||"Canarias")+", Gran Canaria (España). Busca en internet su perfil de Instagram, su teléfono móvil (WhatsApp) y su email (mira web oficial, Instagram, Facebook, TripAdvisor, TheFork y directorios locales). Explica brevemente qué encontraste y TERMINA con una única línea JSON: {\"email\":\"\",\"movil\":\"\",\"instagram\":\"\"} — instagram = el nombre de usuario sin @; movil = número español que empiece por 6 o 7. Pon SOLO datos publicados de verdad de ESE negocio; si algo no aparece, déjalo como cadena vacía. NUNCA inventes ni mezcles con otro negocio del mismo nombre.";
  const txt=await geminiPregunta(prompt);
  let d={}; const bloques=txt.match(/\{[^{}]*\}/g)||[];
  for(let k=bloques.length-1;k>=0;k--){ try{ const o=JSON.parse(bloques[k]); if(("email" in o)||("movil" in o)||("instagram" in o)){ d=o; break; } }catch(e){} }
  const {patch,found}=extraeContacto(txt, l, d, "Gemini");
  return { patch, found, txt };
}
// BÚSQUEDA REAL DE GOOGLE (Custom Search API): trae los MISMOS resultados que ves tú al buscar a mano.
// Gratis 100 consultas/día. Usa la clave AIza (Places) + el ID del buscador (CSE) de Ajustes.
async function googleCSE(q){ const key=(AJ().gkey||AJ().geminiKey||"").trim(); const cx=(AJ().cseId||"").trim();
  if(!cx) throw new Error("Falta el ID del Buscador de Google (CSE) en ⚙️ Ajustes");
  if(!key) throw new Error("Falta la Clave de Google (AIza...) en ⚙️ Ajustes");
  const r=await fetchT("https://www.googleapis.com/customsearch/v1?key="+encodeURIComponent(key)+"&cx="+encodeURIComponent(cx)+"&num=10&hl=es&gl=es&q="+encodeURIComponent(q),{},12000);
  const j=await r.json(); if(j.error) throw new Error(j.error.message||"Error del Buscador de Google");
  return (j.items||[]);
}
async function googleBuscaLead(l){
  const zona=l.ciudad||"Gran Canaria";
  const items=await googleCSE(l.nombre+" "+zona+" Gran Canaria contacto email teléfono instagram");
  // Me quedo SOLO con los resultados que claramente son de ESTE negocio (su título/enlace/resumen pega con
  // el nombre). Si cojo de cualquier resultado, acabaría poniendo el email/teléfono de OTRO negocio o de un
  // directorio que sale en la búsqueda. Si ninguno pega con el nombre, no extraigo email/teléfono.
  const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const toks=norm(l.nombre).replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(w=>w.length>=4);
  const rel=items.filter(i=>{ const t=norm((i.title||"")+" "+(i.link||"")+" "+(i.snippet||"")); return !toks.length || toks.some(w=>t.includes(w)); });
  const usar=rel.length?rel:[];
  const txt=usar.map(i=>(i.title||"")+" — "+(i.snippet||"")+" "+(i.link||"")+" "+JSON.stringify(i.pagemap||{})).join("\n");
  // Instagram: SOLO de un enlace instagram.com/usuario que aparezca en un resultado de ESTE negocio.
  let igLink=""; for(const i of usar){ const m=(i.link||"").match(/instagram\.com\/[A-Za-z0-9._]+/i); if(m){ igLink=m[0]; break; } }
  const {patch,found}=extraeContacto(txt, l, igLink?{instagram:igLink}:{}, "Google");
  return { patch, found, txt, n:items.length, rel:usar.length };
}
// Busca un lead por el mejor camino disponible: Google real primero (si está montado), luego Gemini.
async function autoBuscaLead(l){
  if((AJ().cseId||"").trim() && (AJ().gkey||"").trim()){
    try{ const g=await googleBuscaLead(l); if(g.found.length) return Object.assign(g,{via:"Google"}); }
    catch(e){ if(/quota|rateLimit|dailyLimit|exceeded|429/i.test(e.message)) throw e; }
  }
  if((AJ().geminiKey||AJ().gkey||"").trim()){
    const g=await gemBuscaLead(l); return Object.assign(g,{via:"Gemini"});
  }
  throw new Error("Monta el Buscador de Google o la clave Gemini en ⚙️ Ajustes");
}
async function googleFill(nombre, ciudad){ const key=(AJ().gkey||"").trim(); if(!key) throw new Error("Falta la clave de Google");
  const zona=(ciudad&&!/^arucas$/i.test(ciudad))?ciudad:""; const q=(nombre+" "+zona+" Gran Canaria").replace(/\s+/g," ").trim();
  const r=await fetchT("https://places.googleapis.com/v1/places:searchText",{ method:"POST",
    headers:{ "Content-Type":"application/json","X-Goog-Api-Key":key,
      "X-Goog-FieldMask":"places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.internationalPhoneNumber,places.websiteUri,places.rating,places.userRatingCount,places.businessStatus" },
    body:JSON.stringify({ textQuery:q, languageCode:"es", maxResultCount:1 }) },12000);
  const j=await r.json(); if(j.error) throw new Error(j.error.message||"Error de Google");
  const p=(j.places||[])[0]; if(!p) return null;
  const nm=(p.displayName&&p.displayName.text)||"";
  if(!gNombreCoincide(nombre,nm)) return { nomatch:true };           // Google devolvió otro negocio
  const addr=p.formattedAddress||""; const mc=addr.match(/\b\d{5}\s+([^,]+?)\s*(?:,|$)/); const ciu=mc?mc[1].trim():"";
  const tel=p.nationalPhoneNumber||""; const dig=(p.internationalPhoneNumber||tel||"").replace(/[^0-9]/g,""); const n9=dig.length>9?dig.slice(-9):dig;
  const wa=(n9.length===9 && /^(6|7[1-9])/.test(n9))?("34"+n9):"";
  const st=p.businessStatus||"";
  return { tel, web:p.websiteUri||"", whatsapp:wa, rating:p.rating||"", n:p.userRatingCount||0, ciudad:ciu,
    cerrado:(st==="CLOSED_PERMANENTLY"?"permanente":(st==="CLOSED_TEMPORARILY"?"temporal":"")) }; }
async function buscar(){
  const err=$("#berr"); err.style.display="none";
  const key=AJ().gkey; const q=$("#bq").value.trim(); const z=$("#bz").value.trim();
  save("bq",q); save("bz",z);
  if(!key){ err.textContent="Falta tu clave de Google (pestaña ⚙️ Ajustes)."; err.style.display="block"; return; }
  if(!z){ err.textContent="Pon la zona o ciudad."; err.style.display="block"; return; }
  $("#go").textContent="Buscando…"; $("#go").disabled=true;
  try{
    RES=[]; let pageToken=null, vueltas=0;
    do{
      const body={ textQuery:q+" en "+z, languageCode:"es", maxResultCount:20 };
      if(pageToken) body.pageToken=pageToken;
      const r=await fetch("https://places.googleapis.com/v1/places:searchText",{ method:"POST",
        headers:{ "Content-Type":"application/json","X-Goog-Api-Key":key,
          "X-Goog-FieldMask":"places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.internationalPhoneNumber,places.websiteUri,places.rating,places.userRatingCount,nextPageToken" },
        body:JSON.stringify(body) });
      const j=await r.json();
      if(j.error) throw new Error(j.error.message||"Error de Google");
      (j.places||[]).forEach(p=>{ const addr=p.formattedAddress||"";
        // Intentamos sacar la ciudad REAL de la dirección de Google ("..., 35400 Arucas, España").
        // Si no se puede separar limpiamente, NO inventamos: cae a la zona buscada como fallback (ciudadReal:false).
        const mc=addr.match(/\b\d{4,5}\s+([^,]+?)\s*(?:,\s*(?:España|Spain)\s*)?$/i)||addr.match(/\b\d{4,5}\s+([^,]+?)\s*,/);
        const ciuTag=mc?mc[1].trim():""; const ciudadReal=!!ciuTag; const ciudad=ciuTag||z;
        RES.push({ nombre:(p.displayName&&p.displayName.text)||"", dir:addr, ciudad, ciudadReal, tel:p.nationalPhoneNumber||"", inter:p.internationalPhoneNumber||"", web:p.websiteUri||"", rating:p.rating||"", n:p.userRatingCount||0 }); });
      pageToken=j.nextPageToken||null; vueltas++;
      if(pageToken) await new Promise(r2=>setTimeout(r2,1800));
    }while(pageToken&&vueltas<3);
    RES.forEach(d=>{ const sc=score(d); d.score=sc.v; d.motivo=sc.m; });
    RES.sort((a,b)=>b.score-a.score);
    RESF={tipo:"",ciudad:"",maxkm:0}; // filtro limpio en cada búsqueda nueva
    render();
  }catch(e){ render(); const e2=$("#berr"); if(e2){ e2.textContent="No se pudo buscar: "+e.message; e2.style.display="block"; } }
}
