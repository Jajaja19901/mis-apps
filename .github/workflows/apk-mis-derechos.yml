name: APK Mis Derechos

on:
  workflow_dispatch:
  push:
    branches:
      - claude/app-prompt-political-correctness-232l69
    paths:
      - 'apps/pwa/mis-derechos/**'
      - '.github/workflows/apk-mis-derechos.yml'

permissions:
  contents: write

concurrency:
  group: apk-mis-derechos
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK
        working-directory: apps/pwa/mis-derechos/android
        run: gradle assembleDebug --no-daemon

      - name: Renombrar APK
        run: cp apps/pwa/mis-derechos/android/app/build/outputs/apk/debug/app-debug.apk mis-derechos.apk

      - uses: actions/upload-artifact@v4
        with:
          name: mis-derechos-apk
          path: mis-derechos.apk

      - name: Publicar en Releases (enlace fijo de descarga)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-mis-derechos -y --cleanup-tag || true
          gh release create apk-mis-derechos mis-derechos.apk \
            --target "${GITHUB_SHA}" \
            -t "APK · Mis Derechos ante el Sistema" \
            -n "APK instalable de la app completa (web embebida, funciona offline).

          **Instalar:** descarga mis-derechos.apk en el móvil Android → tócalo → acepta \"instalar de origen desconocido\" (es normal fuera de Play Store).

          La IA, el BOE y las novedades funcionan igual que en la web: el usuario pone su key gratuita en ⚙️ IA."
