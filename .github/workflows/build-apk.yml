name: Compilar APK WiFi Pentester

on:
  push:
    branches:
      - claude/wifi-security-analyzer-iyprjm
    paths:
      - 'wifi-security-analyzer/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wifi-security-analyzer

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Configurar Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Compilar APK debug
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk wifi-pentester-pro.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: wifi-pentester-pro-apk
          path: wifi-security-analyzer/wifi-pentester-pro.apk

      - name: Publicar APK descargable
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: WiFi Pentester Pro - APK listo para instalar
          body: |
            APK compilado automaticamente. Descarga **wifi-pentester-pro.apk**
            en tu telefono e instalalo. Uso exclusivo para redes propias o con
            autorizacion escrita del titular.
          prerelease: true
          files: wifi-security-analyzer/wifi-pentester-pro.apk
