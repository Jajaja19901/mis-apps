<!-- 04-VÍDEO · SLOT:VIDEO — visor, canvas compuesto íntegro + capa de privacidad, REC y estado.
     Sin estilos: las clases .vid-visor / .vid-rec / .oculto las define el módulo UI (05). -->
<div class="vid-visor" id="vid-visor">
  <video id="vid-video" playsinline muted class="oculto"></video>
  <img id="vid-mjpeg" class="oculto" alt="">
  <canvas id="vid-canvas"></canvas>
  <canvas id="vid-canvasPriv" class="oculto"></canvas>
  <div id="vid-rec" class="vid-rec oculto">● REC</div>
  <button type="button" id="mat-flotante" class="mat-flotante oculto" aria-label="Leer matrícula del coche de delante">📋 Matrícula</button>
  <div id="vid-monitor" class="vid-monitor oculto" aria-live="polite">
    <div class="vid-mon-fila"><span>Fluidez</span><b id="vid-mon-fluidez">—</b></div>
    <div class="vid-mon-fila"><span>Análisis IA</span><b id="vid-mon-ia">—</b></div>
    <div class="vid-mon-fila"><span>Motor</span><b id="vid-mon-motor">—</b></div>
    <div class="vid-mon-fila"><span>Vídeo</span><b id="vid-mon-fps">—</b></div>
    <div class="vid-mon-barra"><i id="vid-mon-carga"></i></div>
  </div>
  <div id="vid-estado">Sin fuente de vídeo — elige cámara o vídeo demo en Ajustes</div>
</div>
