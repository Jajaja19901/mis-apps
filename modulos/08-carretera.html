<!-- SLOT:CARRETERA — panel del modo carretera/parking (car_) -->
<section class="sec" id="car-panel">
  <h2 class="sec-titulo">Carretera / Parking</h2>

  <div class="fila" style="flex-wrap:wrap;">
    <div class="tarjeta">
      <div class="etiqueta">Coches</div>
      <div class="dato-grande" id="car-coches">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Camiones</div>
      <div class="dato-grande" id="car-camiones">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Buses</div>
      <div class="dato-grande" id="car-buses">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Motos</div>
      <div class="dato-grande" id="car-motos">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Bicis</div>
      <div class="dato-grande" id="car-bicis">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Peatones</div>
      <div class="dato-grande" id="car-peatones">0</div>
    </div>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Conteo direccional</div>
    <div class="fila">
      <span>→ A→B: <b id="car-dirAB">0</b> · ← B→A: <b id="car-dirBA">0</b></span>
    </div>
    <div class="etiqueta">según tu línea de conteo</div>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Plazas</div>
    <div class="dato-grande" id="car-plazas">— / — plazas libres</div>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Velocidad</div>
    <div class="fila">
      <span id="car-calibEstado">Sin calibrar</span>
      <button type="button" class="btn btn-mini" id="car-calibBtn">📏 Calibrar velocidad</button>
    </div>
    <p id="car-avisoVelocidad" style="font-size:.85rem;color:var(--texto2,#7d8fa0);margin:6px 0 0;">La velocidad es orientativa (~aprox.), no válida como medición legal.</p>

    <label class="fila" style="align-items:flex-start;gap:8px;margin-top:12px;">
      <input type="checkbox" id="car-radarGuardar" data-cfg="carRadarGuardar">
      <span>📸 <b>Modo radar</b>: guardar foto + velocidad de cada coche que pasa <span class="etiqueta">Cámara fija y calibrada. La foto (coche + km/h, y matrícula si se lee) queda en la galería de matrículas.</span></span>
    </label>
    <div class="campo">
      <label for="car-radarVelMin">Guardar solo si supera (km/h) — 0 = todos</label>
      <input type="number" id="car-radarVelMin" data-cfg="carRadarVelMin" min="0" max="250" step="5" inputmode="numeric">
    </div>
    <div class="fila" style="margin-top:8px;align-items:center;gap:10px;">
      <button type="button" class="btn btn-mini btn-primario" id="car-radarVer">📸 Ver fotos del radar</button>
      <span class="etiqueta" id="car-radarEstado">Radar: 0 capturas</span>
    </div>
  </div>
</section>
