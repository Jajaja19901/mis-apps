<!-- 03-zonas.html — toolbar de dibujo de zonas y líneas (SLOT:ZONAS).
     Fragmento sin html/head/body: se inyecta bajo el vídeo. Prefijo zona-. -->
<style>
  #zona-toolbar { display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding:8px 10px; }
  #zona-ayuda.zona-ayuda { color: var(--ambar, #ffb224); animation: zona-parpadeo 1.2s ease-in-out infinite; }
  @keyframes zona-parpadeo { 0%,100% { opacity:1; } 50% { opacity:.45; } }
</style>
<div id="zona-toolbar" class="zona-toolbar fila" role="toolbar" aria-label="Dibujar zonas y líneas">
  <button type="button" id="zona-prohibida"  class="btn btn-mini zona-soloSuper">＋ Prohibida</button>
  <button type="button" id="zona-sensible"   class="btn btn-mini zona-soloSuper">＋ Sensible</button>
  <button type="button" id="zona-caja"       class="btn btn-mini zona-soloSuper">＋ Caja</button>
  <button type="button" id="zona-plaza"      class="btn btn-mini zona-soloCarretera oculto">＋ Plaza</button>
  <button type="button" id="zona-detencion"  class="btn btn-mini zona-soloCarretera oculto">＋ Detención</button>
  <button type="button" id="zona-linea"      class="btn btn-mini">＋ Línea</button>
  <button type="button" id="zona-cerrar"     class="btn btn-mini oculto">Cerrar zona</button>
  <button type="button" id="zona-cancelar"   class="btn btn-mini btn-fantasma oculto">Cancelar</button>
  <button type="button" id="zona-borrarTodo" class="btn btn-mini btn-peligro">🗑 Borrar todo</button>
  <span id="zona-ayuda" class="zona-ayuda etiqueta oculto">Toca el vídeo para añadir puntos</span>
</div>
