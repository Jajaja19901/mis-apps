<!-- ============================================================
     SLOT:STATS — sección de estadísticas del día (módulo 07-stats)
     ============================================================ -->
<section class="sec" id="stats-sec">
  <style>
    #stats-grafico { width: 100%; height: 160px; display: block; }
  </style>

  <h2 class="sec-titulo">Estadísticas del día</h2>

  <div class="tarjeta">
    <canvas id="stats-grafico" role="img" aria-label="Afluencia por hora, hoy comparado con ayer"></canvas>
  </div>

  <div class="fila">
    <div class="tarjeta">
      <div class="etiqueta">Visitantes</div>
      <div class="dato-grande" id="stats-visitantes">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Entradas</div>
      <div class="dato-grande" id="stats-entradas">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Salidas</div>
      <div class="dato-grande" id="stats-salidas">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Alertas hoy</div>
      <div class="dato-grande" id="stats-alertas">0</div>
    </div>
    <div class="tarjeta">
      <div class="etiqueta">Pico de aforo</div>
      <div class="dato-grande" id="stats-picoAforo">0</div>
    </div>
    <div class="tarjeta stats-soloCarretera" id="stats-vehiculosTarjeta">
      <div class="etiqueta">Vehículos por tipo</div>
      <div class="dato-grande" id="stats-vehiculos">🚗0 🚚0 🚌0 🏍0 🚲0</div>
    </div>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Mapa de calor</div>
    <div class="fila">
      <div class="campo">
        <label class="etiqueta" for="stats-calorToggle">Activar overlay</label>
        <input type="checkbox" id="stats-calorToggle">
      </div>
      <button type="button" class="btn btn-mini" id="stats-calorReset">Reiniciar</button>
      <button type="button" class="btn btn-mini" id="stats-calorPng">Exportar PNG</button>
    </div>
    <p class="etiqueta">Acumula dónde pisa la gente: descubre qué pasillos funcionan</p>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Time-lapse</div>
    <div class="fila">
      <span id="stats-tlInfo" class="etiqueta">0 capturas · cada 5 min</span>
      <button type="button" class="btn btn-mini" id="stats-tlExportar">Exportar vídeo</button>
      <button type="button" class="btn btn-mini btn-peligro" id="stats-tlBorrar">Borrar</button>
    </div>
  </div>

  <div class="tarjeta">
    <div class="etiqueta">Exportar</div>
    <div class="fila">
      <button type="button" class="btn" id="stats-exportarInforme">📄 Informe HTML</button>
      <button type="button" class="btn" id="stats-exportarCSV">📊 CSV</button>
    </div>
  </div>
</section>
