appId: com.incubatunegocio.fragua
productName: Fragua
copyright: "© Incuba tu Negocio · Jaime M. M."
directories:
  output: release
  buildResources: buildResources
# Se empaquetan dist/ y las dependencias de producción (solo node-pty:
# monaco y xterm ya van dentro del bundle de Vite como devDependencies).
files:
  - dist/**/*
  - package.json
asar: true
asarUnpack:
  - "**/*.node"
extraMetadata:
  main: dist/main/main/main.js
linux:
  target:
    - AppImage
    - deb
  category: Development
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
