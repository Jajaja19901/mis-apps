<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incuba tu Negocio · Creamos tu web o app a medida</title>
<meta name="description" content="Incuba tu Negocio: creamos webs y apps a medida para autónomos y pymes. Metemos tu idea en la incubadora y sale una web o app profesional, lista para vender. Desde 250€.">
<meta property="og:type" content="website">
<meta property="og:title" content="Incuba tu Negocio · Creamos tu web o app a medida">
<meta property="og:description" content="Webs y apps a medida para autónomos y pymes. Tu idea entra a la incubadora y sale una web profesional lista para vender. Desde 250€.">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🥚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070b12; --bg2:#0b1220; --panel:#0e1726; --panel2:#121d30;
    --ink:#eaf1fb; --ink-soft:#aebaccf2; --ink-mut:#7f8da3; --line:#1d2a40;
    --neo:#27e6a6; --neo-deep:#0c9c74; --vio:#8b6bff; --cyan:#35d6ff;
    --sg:'Space Grotesk',sans-serif; --sans:'Inter',-apple-system,sans-serif; --mono:'Space Mono',monospace;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3{font-family:var(--sg);font-weight:700;letter-spacing:-.02em;line-height:1.12}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px;position:relative;z-index:2}
  a{color:inherit}
  .mono{font-family:var(--mono)}
  /* fondo: rejilla + halos */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:44px 44px;-webkit-mask-image:radial-gradient(circle at 50% 22%,#000,transparent 75%);mask-image:radial-gradient(circle at 50% 22%,#000,transparent 75%)}
  .blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.3;z-index:0;pointer-events:none;will-change:transform;animation:drift 18s ease-in-out infinite}
  @media(max-width:768px){.blob{filter:blur(40px);opacity:.22}}
  .blob.a{width:420px;height:420px;background:var(--neo);top:-120px;right:-80px}
  .blob.b{width:380px;height:380px;background:var(--vio);bottom:10%;left:-120px;animation-delay:-6s}
  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,30px)}}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--sans);font-weight:600;font-size:15px;border:none;border-radius:999px;padding:15px 28px;cursor:pointer;transition:transform .15s,box-shadow .2s,background .2s;text-decoration:none;line-height:1}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:linear-gradient(120deg,var(--neo),var(--cyan));color:#04221a;box-shadow:0 0 0 1px #27e6a655,0 10px 30px #27e6a644}
  .btn-primary:hover{box-shadow:0 0 0 1px #27e6a6,0 14px 40px #27e6a677}
  .btn-ghost{background:#ffffff0a;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--neo);color:#fff}
  .btn-lg{padding:18px 34px;font-size:16px}
  :focus-visible{outline:3px solid var(--neo);outline-offset:3px;border-radius:8px}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip{position:absolute;left:12px;top:-60px;z-index:200;background:var(--neo);color:#04221a;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:600;transition:top .15s}
  .skip:focus{top:12px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--neo)}
  .tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--neo);border:1px solid #27e6a644;border-radius:999px;padding:5px 12px;background:#27e6a611}

  header.site{position:sticky;top:0;z-index:50;background:rgba(8,12,20,.97);border-bottom:1px solid var(--line)}
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:66px}
  .logo{font-family:var(--sg);font-weight:700;font-size:18px;display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}
  header .nav-cta{font-size:14px;padding:11px 20px}

  /* HERO + INCUBADORA */
  .hero{padding:54px 0 60px;text-align:center}
  .hero h1{font-size:clamp(34px,7.5vw,62px);margin:18px auto 16px;max-width:880px}
  .hero h1 em{font-style:normal;background:linear-gradient(120deg,var(--neo),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p.sub{font-size:clamp(17px,2.3vw,20px);color:var(--ink-soft);max-width:600px;margin:0 auto 30px}
  .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  .incubator{margin:8px auto 30px;width:300px;max-width:86vw;position:relative}
  .pod{position:relative;width:300px;height:300px;max-width:86vw;aspect-ratio:1;margin:0 auto}
  .pod .ring{position:absolute;border-radius:50%}
  .pod .r1{inset:0;border:1px solid #27e6a633;animation:spin 18s linear infinite}
  .pod .r2{inset:26px;border:1px dashed #8b6bff55;animation:spin 12s linear infinite reverse}
  .pod .r3{inset:52px;border:1px solid #35d6ff33;animation:spin 26s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pod .orbit{position:absolute;inset:0;animation:spin 7s linear infinite}
  .pod .orbit i{position:absolute;top:-6px;left:50%;width:12px;height:12px;margin-left:-6px;border-radius:50%;background:var(--neo);box-shadow:0 0 14px var(--neo)}
  .pod .orbit.o2{animation-duration:11s;animation-direction:reverse}
  .pod .orbit.o2 i{background:var(--vio);box-shadow:0 0 14px var(--vio)}
  .pod .egg{position:absolute;inset:78px;border-radius:50% 50% 48% 48%;
    background:radial-gradient(circle at 50% 38%,#5bffce,#0c9c74 58%,#063b2c);
    box-shadow:0 0 70px #27e6a688,inset 0 -10px 30px #03241b,inset 0 8px 24px #9affe0aa;
    display:flex;align-items:center;justify-content:center;animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .pod .egg .ic{font-size:46px;filter:drop-shadow(0 2px 6px #03241b)}
  .pod svg.prog{position:absolute;inset:0;transform:rotate(-90deg)}
  .pod svg.prog circle{fill:none;stroke-width:3;stroke-linecap:round}
  .pod svg.prog .bg{stroke:#ffffff12}
  .pod svg.prog .fg{stroke:var(--neo);filter:drop-shadow(0 0 6px var(--neo));transition:stroke-dashoffset .6s ease}
  .incu-status{margin-top:14px;font-family:var(--mono);font-size:14px;color:var(--ink-soft);min-height:22px}
  .incu-status b{color:var(--neo)}
  .incu-pct{font-family:var(--mono);font-size:13px;color:var(--ink-mut)}

  section{padding:62px 0;position:relative}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 42px}
  .sec-head h2{font-size:clamp(26px,5vw,40px);margin:12px 0}
  .sec-head p{color:var(--ink-soft)}
  .grid{display:grid;gap:16px}
  .g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);padding:24px}
  .card:hover{border-color:#27e6a655}

  /* PROCESO timeline */
  .fases{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .fase{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:22px 18px;position:relative;overflow:hidden}
  .fase .n{font-family:var(--mono);font-size:12px;color:var(--neo);letter-spacing:.1em}
  .fase .em{font-size:30px;margin:8px 0 10px;display:block}
  .fase h3{font-size:18px;margin-bottom:6px}
  .fase p{color:var(--ink-soft);font-size:14px}
  .fase::after{content:"";position:absolute;left:0;bottom:0;height:3px;width:100%;background:linear-gradient(90deg,var(--neo),var(--vio));opacity:.5}

  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:740px;margin:0 auto}
  .chip{font-family:var(--mono);font-size:13px;border:1px solid var(--line);background:#ffffff06;border-radius:999px;padding:9px 16px;color:var(--ink-soft)}
  .chip:hover{border-color:var(--neo);color:#fff}

  /* niveles */
  .planes{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start}
  .plan{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:22px 16px;display:flex;flex-direction:column;position:relative}
  .plan.top{border-color:var(--neo);box-shadow:0 0 0 1px #27e6a655,0 16px 50px #27e6a622}
  .plan .badge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,var(--neo),var(--cyan));color:#04221a;font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
  .plan h3{font-size:18px}
  .plan .price{font-family:var(--sg);font-weight:700;font-size:25px;color:#fff;margin:8px 0 2px}
  .plan .para{font-size:12.5px;color:var(--ink-mut);min-height:32px}
  .plan ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin:14px 0 18px;flex:1}
  .plan li{font-size:13px;color:var(--ink-soft);display:flex;gap:8px;align-items:flex-start}
  .plan li svg{width:15px;height:15px;color:var(--neo);flex-shrink:0;margin-top:3px}
  .plan .btn{width:100%}
  .pay-note{text-align:center;color:var(--ink-soft);max-width:640px;margin:22px auto 0;font-size:14px;background:#ffffff06;border:1px solid var(--line);border-radius:14px;padding:16px 20px}

  /* anclaje */
  .anchor{background:linear-gradient(135deg,var(--panel2),var(--bg2));border:1px solid var(--line);border-radius:24px;padding:42px 26px;text-align:center;max-width:780px;margin:0 auto}
  .anchor-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin:22px 0 8px}
  .anchor-col{flex:1;min-width:170px;background:#ffffff06;border:1px solid var(--line);border-radius:16px;padding:20px}
  .anchor-col.win{border-color:var(--neo);background:#27e6a610}
  .anchor-col small{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mut)}
  .anchor-col.win small{color:var(--neo)}
  .anchor-col b{font-family:var(--sg);font-size:clamp(22px,5vw,30px);display:block;margin-top:6px}
  .anchor .disc{color:var(--ink-mut);font-size:12px;margin-top:14px;font-family:var(--mono)}

  .demo-card{display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;transition:transform .18s}
  .demo-card:hover{transform:translateY(-3px)}
  .demo-ic{font-size:32px;margin-bottom:6px}
  .demo-card .play{margin-top:12px;color:var(--neo);font-weight:600;font-size:14px;font-family:var(--mono)}

  .socio{background:linear-gradient(135deg,#10241d,#0a1622);border:1px solid #27e6a644;border-radius:24px;padding:46px 30px;text-align:center;max-width:820px;margin:0 auto}
  .socio h2{font-size:clamp(24px,5vw,34px)}
  .socio p{color:var(--ink-soft);max-width:560px;margin:12px auto 0;font-size:17px}

  .faq{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
  details{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  summary{padding:18px 20px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:12px}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"+";color:var(--neo);font-size:22px;transition:transform .2s}
  details[open] summary::after{transform:rotate(45deg)}
  details .a{padding:0 20px 18px;color:var(--ink-soft);font-size:15px}

  .form-wrap{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:24px;padding:42px 26px;max-width:640px;margin:0 auto}
  .form-wrap h2{text-align:center;font-size:clamp(26px,5vw,36px)}
  .form-wrap p.s{color:var(--ink-soft);text-align:center;margin:8px auto 24px;max-width:440px}
  .ff{margin-bottom:14px}
  .ff label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;font-family:var(--mono)}
  .ff input,.ff select,.ff textarea{width:100%;background:#070d16;border:1px solid var(--line);color:#fff;border-radius:12px;padding:14px 15px;font-family:var(--sans);font-size:16px}
  .ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--neo)}
  .ff.bad input,.ff.bad select{border-color:#ff6b5e}
  .ff .err{color:#ff9a8f;font-size:13px;margin-top:5px;display:none}.ff.bad .err{display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-wrap .btn-primary{width:100%;margin-top:6px}
  .priv{text-align:center;color:var(--ink-mut);font-size:12px;margin-top:14px;font-family:var(--mono)}

  footer.site{border-top:1px solid var(--line);padding:40px 0 30px;color:var(--ink-mut);font-size:15px;background:var(--bg2)}
  footer .cols{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:24px}
  footer h3{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#fff;margin-bottom:12px;font-weight:600}
  footer a{display:block;margin-bottom:8px;text-decoration:none;color:var(--ink-soft)}
  footer a:hover{color:var(--neo)}
  footer .logo{color:#fff}
  .copyr{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);font-size:13px;color:var(--ink-mut);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:var(--mono)}
  .copyr a{color:var(--ink-soft);display:inline;text-decoration:underline}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--neo);color:#04221a;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:100;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .gracias{text-align:center;max-width:560px;margin:0 auto;padding:60px 0}
  .gracias .egg{font-size:64px;animation:breathe 2.6s ease-in-out infinite;display:inline-block}
  .gracias h1{font-size:32px;margin:14px 0 10px}
  .gracias p{color:var(--ink-soft);margin-bottom:22px}

  .admin{min-height:100vh;padding:24px 0}
  .gate{max-width:380px;margin:8vh auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:30px}
  .gate h2{font-size:22px;margin-bottom:6px}.gate p{color:var(--ink-soft);font-size:14px;margin-bottom:18px}
  .gate input{width:100%;background:#070d16;border:1px solid var(--line);color:#fff;border-radius:11px;padding:14px;font-size:16px;margin-bottom:12px}
  .gate input:focus{border-color:var(--neo)}
  .gate .btn-primary{width:100%}.gate .err{color:#ff6b5e;font-size:13px;margin-top:10px;display:none}.gate.bad .err{display:block}
  .admin-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 18px;min-width:110px}
  .stat .big{font-family:var(--sg);font-size:24px;color:var(--neo)}.stat small{color:var(--ink-mut);font-size:12px;text-transform:uppercase}
  .lead{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px}
  .lead-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .lead b.nm{font-size:16px}.lead .meta{color:var(--ink-mut);font-size:13px;margin:2px 0}
  .lead .msg{background:#070d16;border-radius:10px;padding:9px 12px;margin:8px 0;font-size:14px;color:var(--ink-soft)}
  .lead .r2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .lead select{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:13px}
  .pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:999px}
  .pill.nuevo{background:#27e6a622;color:var(--neo)}.pill.contactado{background:#8b6bff22;color:#b9a8ff}.pill.cerrado{background:#ffffff14;color:#9aabb8}
  .lead a.wa{color:var(--neo);font-weight:600;font-size:13px;text-decoration:none}
  .lead button.del{background:none;border:none;color:var(--ink-mut);cursor:pointer;font-size:13px}.lead button.del:hover{color:#ff6b5e}
  .empty{text-align:center;color:var(--ink-mut);padding:46px 20px}.empty .ic{font-size:40px;margin-bottom:10px}

  .reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
  .reveal.in{opacity:1;transform:none}
  .card,.fase,.plan,.demo-card{transition:transform .18s,border-color .2s,box-shadow .2s}
  .card:hover,.fase:hover{transform:translateY(-4px);box-shadow:0 18px 50px rgba(0,0,0,.4)}
  @media(max-width:900px){.planes{grid-template-columns:repeat(2,1fr)}.fases,.g4{grid-template-columns:1fr 1fr}}
  @media(max-width:760px){.g3{grid-template-columns:1fr}footer .cols{grid-template-columns:1fr;gap:18px}.row2{grid-template-columns:1fr}header .nav-cta{padding:9px 14px;font-size:13px}}
  @media(max-width:520px){.planes{grid-template-columns:1fr}.fases,.g4{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>

<script>
/* ==================================================================
   ⚙️  CONFIGURA TU NEGOCIO AQUÍ  (datos en placeholder de momento)
   ================================================================== */
const CONFIG = {
  BUSINESS_NAME : "Incuba tu Negocio",
  WHATSAPP      : "PEGA_AQUI_TU_NUMERO",        // tu WhatsApp con prefijo (ej: 34600111222)
  EMAIL         : "hola@incubatunegocio.com",   // (placeholder) tu email
  ADMIN_PASSWORD: "incuba-2026",                // ⚠️ CÁMBIALA. Cerrojo básico visible en el código.
  BRIEFING_URL  : "../briefing.html",           // el cuestionario que recoge el encargo
  SENAL         : 100,
  MERCADO_MIN   : 2000, MERCADO_MAX : 4000,
  DEMOS: [
    { icon:"🏗️", name:"Ejemplo: web de reformas", desc:"Presupuestador automático + captación de clientes.", url:"./reformas-presupuestador.html" },
    { icon:"💇", name:"Ejemplo: web de peluquería", desc:"Embudo de citas con panel del dueño.", url:"./peluqueria-aurora.html" },
  ],
  NIVELES: [
    { id:"Básica",       precio:"desde 250€", para:"Presencia profesional ya.",
      incluye:["Web de 1 página, mobile-first","Contacto y WhatsApp","Tu panel para ver solicitudes"] },
    { id:"Mediana",      precio:"desde 450€", para:"Para empezar a captar.",
      incluye:["Todo lo de Básica","Galería, testimonios y FAQ","Formulario de captación + export"] },
    { id:"Grande",       precio:"desde 650€", para:"Negocios con servicios o catálogo.", destacado:true,
      incluye:["Todo lo de Mediana","Una función fuerte: reservas, presupuestador o catálogo","Panel completo"] },
    { id:"Premium",      precio:"desde 850€", para:"Una app que 'hace cosas'.",
      incluye:["Todo lo de Grande","Varias funciones combinadas","Multi-idioma / blog"] },
    { id:"Premium Plus", precio:"Premium + bot", para:"Automatiza tu atención.",
      incluye:["Todo lo de Premium","Bot integrado de atención","Lo más completo"] },
  ],
};
const LEADS_KEY="incuba_leads_v1", ADMIN_KEY="incuba_admin_ok", GATE_KEY="incuba_gate";
let preNivel="";

function loadLeads(){ try{ const r=localStorage.getItem(LEADS_KEY); return r?JSON.parse(r):[]; }catch(e){ return []; } }
function saveLeads(l){ try{ localStorage.setItem(LEADS_KEY,JSON.stringify(l)); }catch(e){ showToast("No se pudo guardar"); } }
function esc(s){ if(s==null) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

/* router */
let view="";
function stopIncu(){ if(incuTimer){ clearInterval(incuTimer); incuTimer=null; } }
function route(){
  const h=location.hash;
  if(h==="#/admin"){ stopIncu(); view="admin"; renderAdmin(); window.scrollTo(0,0); return; }
  if(h==="#/gracias"){ stopIncu(); view="gracias"; renderGracias(); window.scrollTo(0,0); return; }
  if(view!=="landing"){ view="landing"; renderLanding(); startIncubator(); }
  if(h && h.length>1 && h[1]!=="/"){ const el=document.getElementById(h.slice(1)); const r=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches; if(el) setTimeout(()=>el.scrollIntoView({behavior:r?"auto":"smooth",block:"start"}),30); }
  else window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

/* incubadora animada: cicla fases + progreso */
let incuTimer=null;
function startIncubator(){
  const fg=document.getElementById("incuFg"), st=document.getElementById("incuStatus"), pc=document.getElementById("incuPct"), em=document.getElementById("incuIc");
  if(!fg) return;
  const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const C=879.6;
  const fases=[ {t:"Recibiendo tu idea",p:18,e:"🥚"},{t:"Diseñando tu marca",p:42,e:"🎨"},{t:"Construyendo tu web",p:70,e:"⚙️"},{t:"Revisando y puliendo",p:90,e:"🔍"},{t:"¡Lista para eclosionar!",p:100,e:"🚀"} ];
  if(reduce){ st.innerHTML="<b>Incubando tu negocio</b>"; pc.textContent="100%"; fg.setAttribute("stroke-dashoffset","0"); em.textContent="🚀"; return; }
  let i=0;
  if(incuTimer) clearInterval(incuTimer);
  const tick=()=>{ const f=fases[i]; st.innerHTML="<b>"+f.t+"</b>"; pc.textContent=f.p+"%"; em.textContent=f.e; fg.setAttribute("stroke-dashoffset", C-(C*f.p/100)); i=(i+1)%fases.length; };
  tick(); incuTimer=setInterval(tick,1900);
}

function onLead(e){
  e.preventDefault(); const g=id=>document.getElementById(id);
  const nombre=g("i-nombre").value.trim(), negocio=g("i-negocio").value.trim(), tel=g("i-tel").value.trim();
  let ok=true; const set=(f,bad)=>{ g(f).classList.toggle("bad",bad); const inp=g("i"+f.slice(1)); if(inp) inp.setAttribute("aria-invalid",bad?"true":"false"); if(bad) ok=false; };
  set("f-nombre",nombre.length<2); set("f-negocio",negocio.length<2); set("f-tel",!/^[0-9 +().-]{7,20}$/.test(tel));
  if(!ok) return;
  const nivel=g("i-nivel").value, msg=g("i-msg").value.trim();
  const lead={ id:"lead_"+Date.now()+"_"+Math.random().toString(36).slice(2,6), fecha:new Date().toISOString(), nombre, negocio, telefono:tel, nivel, mensaje:msg, estado:"nuevo" };
  const list=loadLeads(); list.unshift(lead); saveLeads(list); window._lastLead=lead;
  const txt=encodeURIComponent(`Hola ${CONFIG.BUSINESS_NAME}, soy ${nombre} de ${negocio}. Quiero incubar mi negocio (nivel ${nivel}). ${msg}`);
  if(CONFIG.WHATSAPP && CONFIG.WHATSAPP!=="PEGA_AQUI_TU_NUMERO") window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${txt}`,"_blank","noopener");
  location.hash="#/gracias";
}

function renderAdmin(){
  if(!isAdmin()){ renderGate(); return; }

    <div id="list">${leads.length? leads.map(renderLead).join("") : `<div class="empty"><div class="ic">🥚</div><b>Aún no hay huevos en la incubadora</b><p>Cuando alguien pida su web, aparecerá aquí.</p></div>`}</div>
  </div></div>`;
  document.getElementById("logout").addEventListener("click",()=>{ try{sessionStorage.removeItem(ADMIN_KEY);}catch(e){} renderGate(); });
  document.getElementById("csv").addEventListener("click",exportCSV);
  document.querySelectorAll("[data-st]").forEach(s=>s.addEventListener("change",e=>{ updateLead(e.target.dataset.id,{estado:e.target.value}); renderAdmin(); }));
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",e=>{ if(confirm("¿Borrar este lead?")){ saveLeads(loadLeads().filter(l=>l.id!==e.target.dataset.id)); renderAdmin(); } }));
}
function renderLead(l){
  const d=new Date(l.fecha), when=d.toLocaleDateString("es-ES",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  const tel=(l.telefono||"").replace(/[^0-9]/g,""), st=["nuevo","contactado","cerrado"].includes(l.estado)?l.estado:"nuevo";
  return `<div class="lead"><div class="lead-top"><div><b class="nm">${esc(l.nombre)}</b> <span class="pill ${st}">${esc(st)}</span><div class="meta">${esc(when)} · ${esc(l.negocio)} · Nivel: ${esc(l.nivel)}</div><div class="meta">📞 ${esc(l.telefono)}</div></div><a class="wa" href="https://wa.me/${esc(tel)}" target="_blank" rel="noopener noreferrer">WhatsApp →</a></div>${l.mensaje?`<div class="msg">${esc(l.mensaje)}</div>`:""}<div class="r2"><select data-st data-id="${esc(l.id)}" aria-label="Estado de ${esc(l.nombre)}"><option value="nuevo" ${st==="nuevo"?"selected":""}>Nuevo</option><option value="contactado" ${st==="contactado"?"selected":""}>Contactado</option><option value="cerrado" ${st==="cerrado"?"selected":""}>Cerrado</option></select><button class="del" data-del data-id="${esc(l.id)}" aria-label="Borrar ${esc(l.nombre)}">Borrar</button></div></div>`;
}
function updateLead(id,patch){ saveLeads(loadLeads().map(l=>l.id===id?{...l,...patch}:l)); }
function exportCSV(){ const leads=loadLeads(); if(!leads.length){ showToast("No hay datos"); return; }
  const head=["Fecha","Nombre","Negocio","Telefono","Nivel","Estado","Mensaje"];
  const cell=v=>{ let s=String(v==null?"":v); if(/^[=+\-@]/.test(s)) s="'"+s; return '"'+s.replace(/"/g,'""')+'"'; };
  const rows=leads.map(l=>[l.fecha,l.nombre,l.negocio,l.telefono,l.nivel,l.estado,l.mensaje].map(cell).join(";"));
  const blob=new Blob(["﻿"+[head.join(";"),...rows].join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="incuba-leads-"+new Date().toISOString().slice(0,10)+".csv"; a.click(); URL.revokeObjectURL(a.href);
}
function renderGate(bad){
  document.getElementById("app").innerHTML=`<div class="admin" id="main"><div class="gate ${bad?"bad":""}"><h1 class="sr-only">Acceso al panel</h1><h2>Panel privado</h2><p>Zona del equipo. Introduce tu contraseña.</p><form id="gf"><label for="gp" class="sr-only">Contraseña</label><input id="gp" type="password" placeholder="Contraseña" autocomplete="current-password"><button class="btn btn-primary" type="submit">Entrar</button><div class="err">Contraseña incorrecta.</div></form><p style="margin-top:14px;font-size:12px"><a href="#/" style="color:var(--ink-mut)">← Volver</a></p></div></div>`;
  document.getElementById("gf").addEventListener("submit",e=>{ e.preventDefault(); const now=Date.now(); let g={n:0,until:0}; try{g=JSON.parse(sessionStorage.getItem(GATE_KEY)||"{}");}catch(err){}
    if(g.until&&now<g.until){ showToast(`Demasiados intentos. Espera ${Math.ceil((g.until-now)/1000)}s.`); return; }
    if(document.getElementById("gp").value===CONFIG.ADMIN_PASSWORD){ try{sessionStorage.setItem(ADMIN_KEY,"1");sessionStorage.removeItem(GATE_KEY);}catch(err){} renderAdmin(); }
    else { g.n=(g.n||0)+1; if(g.n>=5){g.until=now+60000;g.n=0;showToast("Demasiados intentos. Espera 60 segundos.");} try{sessionStorage.setItem(GATE_KEY,JSON.stringify(g));}catch(err){} renderGate(true); } });
}

    bar.querySelector('#ovBack').addEventListener('click',close); document.addEventListener('keydown',function(e){ if(e.key==='Escape') close(); }); }

  document.addEventListener('click',function(e){ var a=e.target&&e.target.closest?e.target.closest('a[href]'):null; if(!a) return; var href=a.getAttribute('href')||''; for(var key in APPS){ if(href.indexOf(key)!==-1){ e.preventDefault(); open(b64ToUtf8(APPS[key])); return; } } }, true);
