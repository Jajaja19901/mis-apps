<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lauraspaint · Arte que se siente · Las Palmas</title>
<meta name="description" content="Obras, cursos de pintura, diseño de logos, decoración de fiestas y diseños en ropa. Arte polivalente hecho a mano en Las Palmas. Consigue el tuyo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============== MUESTRA — Rookie Artist (Laura) ==============
   App de ejemplo NO OFICIAL. Marca/contacto = placeholders del briefing.
   Cobro con tarjeta SIMULADO (cierre real por WhatsApp). Sin backend. */
:root{
  --brand:#7a3f8c;        /* morado artístico (color elegido por la clienta) */
  --brand-deep:#5d2c6e;
  --brand-soft:#f3e9f6;
  --emerald:#1E8C6B;      /* acento (paleta "Esmeralda Real") */
  --emerald-soft:#e3f3ee;
  --pop:#F2A341;          /* toque divertido/atrevido */
  --bg:#FAF6FB;
  --surface:#ffffff;
  --ink:#241726;
  --ink-soft:#6b5a6e;
  --ink-mut:#9b8ca0;
  --line:#ECE3EE;
  --ok:#1E8C6B; --warn:#d98324; --err:#c0392b;
  --r:16px; --r-lg:22px;
  --sh:0 6px 20px rgba(60,20,70,.08);
  --sh-lg:0 16px 40px rgba(60,20,70,.16);
  --max:1100px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Quicksand',system-ui,sans-serif;line-height:1.55;overflow-x:hidden}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.1;margin:0 0 .4em}
h1{font-size:clamp(30px,7vw,52px)}
h2{font-size:clamp(24px,5vw,38px)}
h3{font-size:clamp(18px,3.6vw,22px)}
p{margin:0 0 1em}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--max);margin:0 auto;padding:0 18px}
.eyebrow{font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--brand)}
.muted{color:var(--ink-soft)}
.center{text-align:center}

/* Botones */
.btn{display:inline-flex;align-items:center;gap:9px;border:none;border-radius:999px;padding:13px 24px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s;text-align:center;line-height:1}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 8px 18px rgba(122,63,140,.32)}
.btn-primary:hover{background:var(--brand-deep)}
.btn-emerald{background:var(--emerald);color:#fff}
.btn-ghost{background:transparent;color:var(--brand);border:2px solid var(--brand)}
.btn-ghost:hover{background:var(--brand-soft)}
.btn-sm{padding:9px 16px;font-size:13.5px}
.btn-block{display:flex;width:100%;justify-content:center}
.btn:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role=button]:focus-visible{outline:3px solid var(--pop);outline-offset:2px}

/* Header */
header.top{position:sticky;top:0;z-index:50;background:rgba(250,246,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:14px;height:62px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:700;font-size:21px;color:var(--ink)}
.logo .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--emerald));display:grid;place-items:center;color:#fff;font-size:18px}
.nav-links{margin-left:auto;display:flex;gap:6px;align-items:center}
.nav-links a{padding:8px 12px;border-radius:999px;font-weight:600;font-size:14.5px;color:var(--ink-soft)}
.nav-links a:hover{color:var(--brand);background:var(--brand-soft)}
.cart-btn{position:relative;background:var(--brand);color:#fff;border-radius:999px;width:42px;height:42px;display:grid;place-items:center;border:none;cursor:pointer}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--pop);color:#3a2400;font-size:11px;font-weight:700;min-width:19px;height:19px;border-radius:999px;display:grid;place-items:center;padding:0 4px}
.burger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--ink)}
@media(max-width:760px){
  .nav-links{position:fixed;inset:62px 0 auto 0;flex-direction:column;background:var(--surface);padding:10px 18px 18px;gap:2px;border-bottom:1px solid var(--line);box-shadow:var(--sh);transform:translateY(-120%);transition:transform .25s;align-items:stretch}
  .nav-links.open{transform:translateY(0)}
  .nav-links a{padding:13px 10px}
  .burger{display:block;margin-left:auto}
  .nav .cart-btn{order:3}
}

/* Hero */
.hero{padding:54px 0 40px;position:relative}
.hero-grid{display:grid;gap:30px;align-items:center}
@media(min-width:860px){.hero-grid{grid-template-columns:1.05fr .95fr}}
.hero h1 em{font-style:italic;color:var(--brand)}
.hero .lead{font-size:clamp(16px,2.4vw,19px);color:var(--ink-soft);max-width:30em}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.hero-art{aspect-ratio:1/1;border-radius:var(--r-lg);background:
   radial-gradient(circle at 30% 25%,rgba(242,163,65,.55),transparent 45%),
   radial-gradient(circle at 75% 70%,rgba(30,140,107,.6),transparent 45%),
   linear-gradient(135deg,var(--brand),var(--brand-deep));
   box-shadow:var(--sh-lg);position:relative;overflow:hidden;display:grid;place-items:center}
.hero-art span{font-size:clamp(80px,20vw,150px);filter:drop-shadow(0 8px 16px rgba(0,0,0,.2))}
.trust{display:flex;gap:18px;flex-wrap:wrap;margin-top:22px;font-size:13.5px;color:var(--ink-soft);font-weight:600}
.trust b{color:var(--brand)}

/* Secciones */
section{padding:34px 0}
.sec-head{max-width:36em;margin:0 auto 26px;text-align:center}

/* Categorías */
.cat-grid{display:grid;gap:14px;grid-template-columns:repeat(2,1fr)}
@media(min-width:720px){.cat-grid{grid-template-columns:repeat(3,1fr)}}
.cat{position:relative;border-radius:var(--r);overflow:hidden;min-height:140px;display:flex;align-items:flex-end;padding:16px;color:#fff;cursor:pointer;border:none;font-family:inherit;text-align:left;transition:transform .15s,box-shadow .15s}
.cat:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.cat span.emoji{position:absolute;top:12px;right:14px;font-size:34px;opacity:.9}
.cat b{font-family:'Fraunces',serif;font-size:19px;font-weight:600;position:relative;z-index:1}
.cat small{display:block;font-weight:600;opacity:.92;font-size:12.5px}
.c1{background:linear-gradient(135deg,#7a3f8c,#b06fc2)}
.c2{background:linear-gradient(135deg,#1E8C6B,#43c79b)}
.c3{background:linear-gradient(135deg,#F2A341,#e07b39)}
.c4{background:linear-gradient(135deg,#5d2c6e,#9a4fb0)}
.c5{background:linear-gradient(135deg,#2c7a8c,#43b3c7)}

/* Productos */
.grid{display:grid;gap:16px;grid-template-columns:repeat(2,1fr)}
@media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.thumb{aspect-ratio:4/3;background-size:cover;background-position:center;position:relative;display:grid;place-items:center}
.thumb .ph{font-size:54px}
.tag{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);color:var(--brand);font-weight:700;font-size:11px;padding:4px 10px;border-radius:999px}
.card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.card-body h3{margin:0;font-size:17px}
.price{font-weight:700;color:var(--emerald);font-size:18px;font-family:'Quicksand'}
.card .desc{font-size:13.5px;color:var(--ink-soft);margin:0;flex:1}
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.chip{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;padding:8px 15px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--brand)}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* Galería */
.gallery{columns:2;column-gap:14px}
@media(min-width:720px){.gallery{columns:3}}
.gallery .gitem{break-inside:avoid;margin-bottom:14px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);background:var(--surface)}
.gallery .gph{aspect-ratio:3/4;display:grid;place-items:center;font-size:50px}

/* Bloque curso */
.course{background:linear-gradient(135deg,var(--brand),var(--brand-deep));color:#fff;border-radius:var(--r-lg);padding:30px;display:grid;gap:18px}
@media(min-width:780px){.course{grid-template-columns:1.2fr .8fr;align-items:center}}
.course h2{color:#fff}
.course ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
.course li{display:flex;gap:9px;align-items:flex-start;font-weight:600}
.course li::before{content:"✓";color:var(--pop);font-weight:800}
.course-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);padding:20px;text-align:center;backdrop-filter:blur(4px)}
.course-card .big{font-size:38px;font-family:'Fraunces';font-weight:700}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--ink-soft)}
.empty .ico{font-size:54px;margin-bottom:10px}

/* Forms */
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;background:var(--surface);color:var(--ink)}
.field textarea{min-height:100px;resize:vertical}
.field .err{color:var(--err);font-size:12.5px;margin-top:4px;display:none}
.field.bad .err{display:block}
.field.bad input,.field.bad textarea{border-color:var(--err)}
.consent{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--ink-soft)}
.consent input{width:18px;height:18px;margin-top:2px;flex:0 0 auto}
.box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh);max-width:560px;margin:0 auto}

/* Cart */
.cart-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.cart-row .ct{width:60px;height:60px;border-radius:12px;background:var(--brand-soft);display:grid;place-items:center;font-size:28px;flex:0 0 auto;background-size:cover;background-position:center}
.cart-row .info{flex:1;min-width:0}
.cart-row .info b{display:block;font-size:15px}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:var(--surface);font-size:18px;cursor:pointer;line-height:1;color:var(--brand)}
.summary{display:flex;justify-content:space-between;font-weight:700;font-size:20px;margin:16px 0;font-family:'Fraunces'}

/* Admin */
.admin-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.admin-tabs button{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;padding:8px 16px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13.5px}
.admin-tabs button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-mut)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
.b-pend{background:#fdeede;color:#a8620e}
.b-env{background:#e3effb;color:#1c5fa8}
.b-entr{background:var(--emerald-soft);color:var(--emerald)}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Footer */
footer{background:var(--ink);color:#e8dcea;padding:40px 0 26px;margin-top:30px}
footer a{color:#d9b8e2}
.foot-grid{display:grid;gap:22px;grid-template-columns:1fr}
@media(min-width:680px){.foot-grid{grid-template-columns:1.5fr 1fr 1fr}}
footer h4{font-family:'Fraunces';margin:0 0 10px;font-size:17px;color:#fff}
footer .fl{display:block;padding:4px 0;font-size:14px;color:#cdb6d4;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit}
.copy{border-top:1px solid rgba(255,255,255,.12);margin-top:24px;padding-top:16px;font-size:12.5px;color:#b79cc0;text-align:center}

/* Toast */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(140%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:600;font-size:14px;box-shadow:var(--sh-lg);z-index:200;transition:transform .3s;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Modal */
.modal{position:fixed;inset:0;z-index:150;background:rgba(36,23,38,.55);display:none;align-items:flex-end;justify-content:center;padding:0}
.modal.show{display:flex}
@media(min-width:560px){.modal{align-items:center;padding:20px}}
.modal-card{background:var(--surface);width:100%;max-width:520px;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:22px;max-height:92vh;overflow:auto}
@media(min-width:560px){.modal-card{border-radius:var(--r-lg)}}
.notice{background:var(--emerald-soft);border:1px solid #bfe6d8;color:#13654c;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;margin:14px 0}
.banner{background:var(--pop);color:#3a2400;text-align:center;font-size:12.5px;font-weight:700;padding:7px 12px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="banner">🎨 MUESTRA de demostración · El cobro con tarjeta es simulado (la venta se cierra por WhatsApp)</div>
<div id="app" role="main"></div>
<div id="toast" role="status" aria-live="polite"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Ventana"><div class="modal-card" id="modalCard"></div></div>

<script>
"use strict";
/* ===== CONFIG (cámbialo en 1 minuto) ===== */
const CONFIG = {
  BUSINESS_NAME: "Lauraspaint",              // nombre de marca facilitado por la clienta
  TAGLINE: "Arte que se siente",
  CITY: "Las Palmas",
  WHATSAPP: "34800061837",                   // del briefing — REVISAR (parece tener un dígito de más)
  EMAIL: "[EMAIL_A_CONFIRMAR]",
  INSTAGRAM: "https://www.instagram.com/rookie.artist90",
  ADMIN_PASSWORD: "rookie2026",              // ⚠️ cámbiala
  CTA: "Consigue el tuyo"
};

/* ===== Logo: unicornio pintando (inventado, SVG inline) ===== */
const UNICORN_SVG = `<svg viewBox="0 0 64 64" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M30 12C18 14 13 26 17 38C19 31 24 29 27 31C24 22 28 16 34 16Z" fill="#F2A341"/>
  <path d="M26 15C15 19 12 31 17 44C19 35 25 34 28 36C24 26 27 18 33 19Z" fill="#e0568f"/>
  <path d="M22 20C13 26 12 39 18 51C20 41 27 40 30 42C25 31 27 23 32 22Z" fill="#7a3f8c"/>
  <path d="M34 14C44 14 51 22 51 33L51 41C51 47 47 51 41 51L34 51C30 51 27 48 27 44C23 43 21 38 23 33C25 23 27 14 34 14Z" fill="#fff"/>
  <ellipse cx="50" cy="43" rx="6.5" ry="5.2" fill="#fff"/>
  <path d="M36 15L38 6L44 15Z" fill="#fff"/>
  <path d="M41 13L45 0L49 13Z" fill="#F2A341"/>
  <path d="M42 10L48 10M42.5 6L47 6" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="41" cy="31" r="2.5" fill="#241726"/>
  <circle cx="52" cy="44" r="1.3" fill="#cdb3d6"/>
  <rect x="2" y="49" width="30" height="4.4" rx="2.2" transform="rotate(-20 2 49)" fill="#8a5a2b"/>
  <path d="M28 41L38 47L31 52Z" fill="#1E8C6B"/>
</svg>`;

/* ===== "Cuadros" inventados: arte abstracto generado en SVG (placeholder hasta que Laura suba los suyos) ===== */
const ART_PALETTES = [["#7a3f8c","#b06fc2","#F2A341"],["#1E8C6B","#43c79b","#fef3df"],["#F2A341","#e07b39","#7a3f8c"],["#2c7a8c","#43b3c7","#ffffff"],["#c0392b","#F2A341","#7a3f8c"],["#5d2c6e","#9a4fb0","#1E8C6B"],["#e0568f","#f2a341","#fff7ee"],["#1E8C6B","#7a3f8c","#F2A341"]];
function art(i){
  const c = ART_PALETTES[((i%ART_PALETTES.length)+ART_PALETTES.length)%ART_PALETTES.length];
  const s = '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">'+
    '<rect width="400" height="300" fill="'+c[0]+'"/>'+
    '<circle cx="'+(110+(i*47)%180)+'" cy="'+(90+(i*61)%130)+'" r="'+(70+(i*13)%40)+'" fill="'+c[1]+'" opacity="0.85"/>'+
    '<path d="M0 '+(190+(i*29)%70)+' Q200 '+(80+(i*43)%140)+' 400 '+(170+(i*23)%90)+' L400 300 L0 300 Z" fill="'+c[2]+'" opacity="0.92"/>'+
    '<circle cx="'+(300-(i*31)%140)+'" cy="'+(80+(i*19)%110)+'" r="34" fill="#ffffff" opacity="0.45"/>'+
    '<path d="M'+(40+(i*17)%80)+' 250 q40 -60 90 -20 t90 -10" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round"/>'+
    '</svg>';
  return 'data:image/svg+xml,'+encodeURIComponent(s);
}

/* ===== Storage seguro ===== */
const DB = {
  get(k, fb){ try{ const v=localStorage.getItem(k); return v==null?fb:JSON.parse(v); }catch(e){ return fb; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); return true; }catch(e){ toast("No se pudo guardar (almacenamiento lleno)"); return false; } }
};
const K = { prod:"ra_productos", gal:"ra_galeria", cart:"ra_cart", orders:"ra_pedidos", leads:"ra_leads", admin:"ra_admin", seeded:"ra_seed_v2" };

/* ===== Seed de muestra ===== */
const CATS = [
  {id:"obras",  label:"Obras",          emoji:"🖼️", cls:"c1", sub:"Cuadros originales"},
  {id:"cursos", label:"Cursos",         emoji:"🎨", cls:"c2", sub:"Aprende a pintar"},
  {id:"logos",  label:"Diseño de logos",emoji:"✏️", cls:"c3", sub:"Para tu marca"},
  {id:"ropa",   label:"Diseños en ropa",emoji:"👕", cls:"c4", sub:"Piezas únicas"},
  {id:"fiestas",label:"Decoración",     emoji:"🎉", cls:"c5", sub:"Fiestas y eventos"}
];
function seed(){
  if(DB.get(K.seeded)) return;
  const P=[
    {cat:"obras",  n:"Amanecer en La Isleta", precio:180, ph:"🌅", d:"Acrílico sobre lienzo 50×70. Pieza original firmada."},
    {cat:"obras",  n:"Mujer de fuego",         precio:220, ph:"🔥", d:"Óleo sobre lienzo 60×80. Color y emoción."},
    {cat:"obras",  n:"Abstracto Atlántico",    precio:140, ph:"🌊", d:"Técnica mixta 40×40. Azules del océano."},
    {cat:"cursos", n:"Curso de pintura — Iniciación", precio:90, ph:"🎨", d:"4 sesiones. Materiales incluidos. Grupos reducidos."},
    {cat:"cursos", n:"Taller de acuarela exprés",     precio:35, ph:"💧", d:"Una tarde para perderle el miedo al pincel."},
    {cat:"logos",  n:"Diseño de logo a mano",  precio:120, ph:"✏️", d:"Logo ilustrado y personalizado para tu marca."},
    {cat:"ropa",   n:"Camiseta pintada a mano", precio:30, ph:"👕", d:"Diseño único pintado a mano. Tallas S-XL."},
    {cat:"fiestas",n:"Pack decoración fiesta",  precio:150, ph:"🎉", d:"Ambientación artística para tu evento."}
  ];
  DB.set(K.prod, P.map((p,i)=>({id:"p"+(i+1), nombre:p.n, categoria:p.cat, precio:p.precio, ph:p.ph, img:art(i), desc:p.d})));
  DB.set(K.gal, [
    {id:"g1",titulo:"Retrato a color",ph:"🎨",img:art(11)},
    {id:"g2",titulo:"Mural infantil",ph:"🖌️",img:art(12)},
    {id:"g3",titulo:"Logo cafetería",ph:"☕",img:art(13)},
    {id:"g4",titulo:"Cuadro abstracto",ph:"🌈",img:art(14)},
    {id:"g5",titulo:"Acuarela marina",ph:"🌊",img:art(15)},
    {id:"g6",titulo:"Encargo personalizado",ph:"✨",img:art(16)}
  ]);
  DB.set(K.seeded, true);
}

/* ===== Utils ===== */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Math.round(n*100)/100).toLocaleString('es-ES',{minimumFractionDigits:0})+"€"; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }
const products=()=>DB.get(K.prod,[]);
const gallery=()=>DB.get(K.gal,[]);
const cart=()=>DB.get(K.cart,[]);
function cartCount(){ return cart().reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ const P=products(); return cart().reduce((s,i)=>{const p=P.find(x=>x.id===i.id);return s+(p?p.precio*i.qty:0);},0); }
function thumbStyle(item){ return item && item.img ? `style="background-image:url('${item.img}')"` : ''; }
function phOf(item){ return item && item.img ? '' : `<span class="ph">${esc(item&&item.ph||'🎨')}</span>`; }

/* ===== Cart ops ===== */
function addToCart(id){ const c=cart(); const f=c.find(i=>i.id===id); if(f)f.qty++; else c.push({id,qty:1}); DB.set(K.cart,c); updateCartCount(); toast("Añadido al carrito 🛒"); }
function setQty(id,d){ let c=cart(); const f=c.find(i=>i.id===id); if(!f)return; f.qty+=d; if(f.qty<=0)c=c.filter(i=>i.id!==id); DB.set(K.cart,c); render(); }
function clearCart(){ DB.set(K.cart,[]); }
function updateCartCount(){ const el=document.getElementById('cartCount'); const n=cartCount(); if(el){ el.textContent=n; el.style.display=n?'grid':'none'; } }

/* ===== Validación ===== */
function setBad(id,bad){ const el=document.getElementById(id); if(el)el.classList.toggle('bad',bad); }
function emailOk(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function telOk(v){ return (v.replace(/\D/g,'').length>=6); }

function submitCheckout(form){
  const f=new FormData(form);
  const nombre=(f.get('nombre')||'').trim(), tel=(f.get('tel')||'').trim(), email=(f.get('email')||'').trim(), dir=(f.get('dir')||'').trim();
  const cons=document.getElementById('co-cons').checked;
  let ok=true;
  setBad('f-nombre',!nombre); if(!nombre)ok=false;
  setBad('f-tel',!telOk(tel)); if(!telOk(tel))ok=false;
  setBad('f-email', email!=="" && !emailOk(email)); if(email!=="" && !emailOk(email))ok=false;
  setBad('f-dir',!dir); if(!dir)ok=false;
  setBad('f-cons',!cons); if(!cons)ok=false;
  if(!ok){ toast("Revisa los campos marcados"); return; }
  const P=products();
  const items=cart().map(i=>{const p=P.find(x=>x.id===i.id)||{};return {id:i.id,nombre:p.nombre,precio:p.precio,qty:i.qty};});
  const order={ id:uid(), fecha:new Date().toISOString(), cliente:{nombre,tel,email,dir}, items, total:cartTotal(), estado:"pendiente" };
  const all=DB.get(K.orders,[]); all.unshift(order); DB.set(K.orders,all);
  clearCart(); updateCartCount();
  location.hash="#/gracias"; LAST_ORDER=order; render();
}
function submitContact(form){
  const f=new FormData(form);
  const nombre=(f.get('nombre')||'').trim(), contacto=(f.get('contacto')||'').trim(), mensaje=(f.get('mensaje')||'').trim();
  const cons=document.getElementById('ct-cons').checked;
  let ok=true;
  setBad('cf-nombre',!nombre); if(!nombre)ok=false;
  setBad('cf-contacto',!contacto); if(!contacto)ok=false;
  setBad('cf-msg',!mensaje); if(!mensaje)ok=false;
  setBad('cf-cons',!cons); if(!cons)ok=false;
  if(!ok){ toast("Revisa los campos marcados"); return; }
  const lead={ id:uid(), fecha:new Date().toISOString(), nombre, contacto, mensaje, estado:"nuevo" };
  const all=DB.get(K.leads,[]); all.unshift(lead); DB.set(K.leads,all);
  openModal(`<div class="center"><div style="font-size:54px">💌</div><h2>¡Mensaje enviado!</h2><p class="muted">Gracias ${esc(nombre)}, te respondo enseguida.</p><button class="btn btn-primary" data-action="closeModal">Genial</button></div>`);
  form.reset();
}

      <td>${esc((CATS.find(c=>c.id===p.categoria)||{}).label||p.categoria)}</td>
      <td>${eur(p.precio)}</td>
      <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" data-action="prodEdit" data-id="${esc(p.id)}">Editar</button> <button class="btn btn-ghost btn-sm" data-action="prodDel" data-id="${esc(p.id)}">🗑️</button></td>
    </tr>`).join("")}
  </tbody></table></div>`:emptyState("🖼️","Sin productos","Añade el primero con el botón de arriba.")}`;
}
function adminGallery(){
  const g=gallery();
  return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px">
    <h3 style="margin:0">Tu galería (${g.length})</h3>
    <button class="btn btn-primary btn-sm" data-action="galNew">+ Subir imagen</button></div>
  <p class="muted" style="font-size:13px;margin-top:0">Sube fotos de tus trabajos para el portfolio público.</p>
  ${g.length?`<div class="grid">${g.map(it=>`<div class="card"><div class="thumb" ${thumbStyle(it)}>${it.img?'':`<span class="ph">${esc(it.ph||'🎨')}</span>`}</div><div class="card-body"><b>${esc(it.titulo)}</b><button class="btn btn-ghost btn-sm" data-action="galDel" data-id="${esc(it.id)}">Eliminar</button></div></div>`).join("")}</div>`:emptyState("📷","Galería vacía","Sube tu primera obra.")}`;
}
function adminOrders(){
  const o=DB.get(K.orders,[]);
  if(!o.length) return emptyState("📦","Aún no hay pedidos","Cuando alguien compre, lo verás aquí.");
  return `<div class="tablewrap"><table><thead><tr><th>#</th><th>Cliente</th><th>Artículos</th><th>Total</th><th>Estado</th></tr></thead><tbody>
    ${o.map(ord=>`<tr>
      <td><b>#${esc(ord.id)}</b><br><span class="muted" style="font-size:12px">${new Date(ord.fecha).toLocaleDateString('es-ES')}</span></td>
      <td>${esc(ord.cliente.nombre)}<br><button class="fl" style="color:var(--brand);padding:0" data-action="waOrder" data-id="${esc(ord.id)}">${esc(ord.cliente.tel)}</button><br><span class="muted" style="font-size:12px">${esc(ord.cliente.dir)}</span></td>
      <td style="font-size:13px">${ord.items.map(i=>`${i.qty}× ${esc(i.nombre)}`).join("<br>")}</td>
      <td><b>${eur(ord.total)}</b></td>
      <td>${badge(ord.estado)}<br><select data-action="orderStatus" data-id="${esc(ord.id)}" style="margin-top:6px;padding:5px;border-radius:8px;border:1px solid var(--line)">
        ${["pendiente","enviado","entregado"].map(s=>`<option value="${s}" ${ord.estado===s?"selected":""}>${s}</option>`).join("")}
      </select></td>
    </tr>`).join("")}
  </tbody></table></div>`;
}
function adminLeads(){
  const l=DB.get(K.leads,[]);
  if(!l.length) return emptyState("💌","Sin mensajes","Los mensajes del formulario aparecen aquí.");
  return `<div class="tablewrap"><table><thead><tr><th>Fecha</th><th>Nombre</th><th>Contacto</th><th>Mensaje</th><th></th></tr></thead><tbody>
    ${l.map(x=>`<tr>
      <td class="muted" style="font-size:12px;white-space:nowrap">${new Date(x.fecha).toLocaleDateString('es-ES')}</td>
      <td><b>${esc(x.nombre)}</b><br>${badge(x.estado)}</td>
      <td>${esc(x.contacto)}</td>
      <td style="font-size:13px;max-width:240px">${esc(x.mensaje)}</td>
      <td><button class="btn btn-ghost btn-sm" data-action="leadDone" data-id="${esc(x.id)}">✓ Hecho</button> <button class="btn btn-ghost btn-sm" data-action="leadDel" data-id="${esc(x.id)}">🗑️</button></td>
    </tr>`).join("")}
  </tbody></table></div>`;
}
function badge(s){ const m={pendiente:"b-pend",nuevo:"b-pend",enviado:"b-env",entregado:"b-entr",contactado:"b-entr"}; return `<span class="badge ${m[s]||'b-pend'}">${esc(s)}</span>`; }

/* ===== Modales admin ===== */
function prodModal(p){
  const isNew=!p;
  p=p||{id:"",nombre:"",categoria:"obras",precio:"",desc:"",ph:"🎨",img:null};
  openModal(`<h2>${isNew?"Nuevo producto":"Editar producto"}</h2>
    <form id="prodForm" novalidate>
      <input type="hidden" name="id" value="${esc(p.id)}">
      <div class="field"><label>Nombre *</label><input name="nombre" value="${esc(p.nombre)}"></div>
      <div class="field"><label>Categoría</label><select name="categoria">${CATS.map(c=>`<option value="${c.id}" ${p.categoria===c.id?"selected":""}>${esc(c.label)}</option>`).join("")}</select></div>
      <div class="field"><label>Precio (€) *</label><input name="precio" inputmode="decimal" value="${esc(p.precio)}"></div>
      <div class="field"><label>Descripción</label><textarea name="desc">${esc(p.desc)}</textarea></div>
      <div class="field"><label>Foto (opcional)</label><input type="file" accept="image/*" data-action="prodImg">
        <div id="imgPrev" style="margin-top:8px">${p.img?`<img src="${p.img}" style="max-height:90px;border-radius:10px">`:'<span class="muted" style="font-size:12px">Si no subes foto, se usa un icono.</span>'}</div></div>
      <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-primary btn-block" type="submit">Guardar</button><button class="btn btn-ghost" type="button" data-action="closeModal">Cancelar</button></div>
    </form>`);
  PENDING_IMG=p.img||null;
}
function saveProd(form){
  const f=new FormData(form);
  const nombre=(f.get('nombre')||'').trim();
  const precio=parseFloat((f.get('precio')||'').toString().replace(',','.'));
  if(!nombre){ toast("Pon un nombre"); return; }
  if(isNaN(precio)||precio<0){ toast("Precio no válido"); return; }
  const P=products(); const id=f.get('id');
  const data={ nombre, categoria:f.get('categoria'), precio, desc:(f.get('desc')||'').trim(), img:PENDING_IMG, ph:"🎨" };
  if(id){ const i=P.findIndex(x=>x.id===id); if(i>=0)P[i]={...P[i],...data}; }
  else { P.push({id:"p"+uid(),...data}); }
  DB.set(K.prod,P); closeModal(); render(); toast("Producto guardado ✓");
}
function galModal(){
  openModal(`<h2>Subir a la galería</h2>
    <form id="galForm" novalidate>
      <div class="field"><label>Título</label><input name="titulo" placeholder="Ej: Retrato a color"></div>
      <div class="field"><label>Imagen</label><input type="file" accept="image/*" data-action="galImg"><div id="imgPrev2" style="margin-top:8px"><span class="muted" style="font-size:12px">Sube una foto de tu obra.</span></div></div>
      <div style="display:flex;gap:10px"><button class="btn btn-primary btn-block" type="submit">Añadir</button><button class="btn btn-ghost" type="button" data-action="closeModal">Cancelar</button></div>
    </form>`);
  PENDING_IMG=null;
}
function saveGal(form){
  const f=new FormData(form); const titulo=(f.get('titulo')||'').trim()||"Obra";
  const g=gallery(); g.unshift({id:"g"+uid(),titulo,ph:"🎨",img:PENDING_IMG}); DB.set(K.gal,g);
  closeModal(); render(); toast("Imagen añadida ✓");
}
let PENDING_IMG=null;
function readImg(file,cb){
  if(!file){cb(null);return;}
  if(file.size>1.5*1024*1024){ toast("Imagen muy grande (máx ~1.5MB para la demo)"); }
  const r=new FileReader();
  r.onload=()=>cb(r.result);
  r.onerror=()=>{ toast("No se pudo leer la imagen"); cb(null); };
  r.readAsDataURL(file);
}

/* ===== Modal helpers ===== */
function openModal(html){ const m=document.getElementById('modal'); document.getElementById('modalCard').innerHTML=html; m.classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

/* ===== ROUTER ===== */
let LAST_ORDER=null;
function parseHash(){ const h=location.hash.replace(/^#\/?/,''); const [path,...rest]=h.split('/'); return {path:path||'', rest}; }
function render(){
  const {path,rest}=parseHash();
  const app=document.getElementById('app');
  let html;
  switch(path){
    case '': html=viewHome(); break;
    case 'tienda': html=viewShop(rest[0]); break;
    case 'galeria': html=viewGallery(); break;
    case 'curso': html=viewCourse(); break;
    case 'contacto': html=viewContact(); break;
    case 'carrito': html=viewCart(); break;
    case 'checkout': html=viewCheckout(); break;
    case 'gracias': html=LAST_ORDER?viewConfirm(LAST_ORDER):viewCart(); break;
    case 'legal': html=viewLegal(); break;
    case 'admin': html=viewAdmin(rest[0]); break;
    default: html=viewHome();
  }
  app.innerHTML=html;
  updateCartCount();
  window.scrollTo(0,0);
}

/* ===== Delegación de eventos (robusto ante re-render) ===== */
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const a=el.dataset.action;
  switch(a){
    case 'menu':{ const n=document.getElementById('navLinks'); const o=n.classList.toggle('open'); el.setAttribute('aria-expanded',o); break; }
    case 'goCart': location.hash='#/carrito'; break;
    case 'goCheckout': location.hash='#/checkout'; break;
    case 'add': addToCart(el.dataset.id); break;
    case 'qty': setQty(el.dataset.id, parseInt(el.dataset.d,10)); break;
    case 'cat': case 'filter': location.hash='#/tienda/'+el.dataset.cat; break;
    case 'wa': openWA(); break;
    case 'waOrder':{ const o=DB.get(K.orders,[]).find(x=>x.id===el.dataset.id); if(o)openWA(`Hola, soy ${o.cliente.nombre}. Mi pedido #${o.id} (${eur(o.total)}): ${o.items.map(i=>i.qty+'× '+i.nombre).join(', ')}. ¿Cómo cerramos el pago?`); break; }
    case 'closeModal': closeModal(); break;
    // admin
    case 'adminTab': location.hash='#/admin/'+el.dataset.tab; break;
    case 'adminLogout': DB.set(K.admin,false); toast("Sesión cerrada"); location.hash='#/'; break;
    case 'prodNew': prodModal(null); break;
    case 'prodEdit':{ const p=products().find(x=>x.id===el.dataset.id); prodModal(p); break; }
    case 'prodDel':{ if(confirm('¿Borrar este producto?')){ DB.set(K.prod,products().filter(x=>x.id!==el.dataset.id)); render(); toast("Producto borrado"); } break; }
    case 'galNew': galModal(); break;
    case 'galDel':{ if(confirm('¿Eliminar esta imagen?')){ DB.set(K.gal,gallery().filter(x=>x.id!==el.dataset.id)); render(); } break; }
    case 'leadDone':{ const L=DB.get(K.leads,[]); const x=L.find(i=>i.id===el.dataset.id); if(x)x.estado="contactado"; DB.set(K.leads,L); render(); break; }
    case 'leadDel':{ if(confirm('¿Borrar mensaje?')){ DB.set(K.leads,DB.get(K.leads,[]).filter(i=>i.id!==el.dataset.id)); render(); } break; }
  }
});
// cerrar menú al navegar
window.addEventListener('hashchange',()=>{ const n=document.getElementById('navLinks'); if(n)n.classList.remove('open'); render(); });
// clic fuera del modal lo cierra
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal')closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

// submits (delegado)
document.addEventListener('submit',function(e){
  const id=e.target.id;
  if(id==='checkoutForm'){ e.preventDefault(); submitCheckout(e.target); }
  else if(id==='contactForm'){ e.preventDefault(); submitContact(e.target); }
  else if(id==='adminLoginForm'){ e.preventDefault(); const v=document.getElementById('adm-pass').value; if(v===CONFIG.ADMIN_PASSWORD){ DB.set(K.admin,true); toast("¡Bienvenida! 👋"); render(); } else { setBad('f-pass',true); } }
  else if(id==='prodForm'){ e.preventDefault(); saveProd(e.target); }
  else if(id==='galForm'){ e.preventDefault(); saveGal(e.target); }
});
// inputs de imagen (change, delegado)
document.addEventListener('change',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  if(el.dataset.action==='prodImg'){ readImg(el.files[0],d=>{ PENDING_IMG=d; const pv=document.getElementById('imgPrev'); if(pv&&d)pv.innerHTML=`<img src="${d}" style="max-height:90px;border-radius:10px">`; }); }
  if(el.dataset.action==='galImg'){ readImg(el.files[0],d=>{ PENDING_IMG=d; const pv=document.getElementById('imgPrev2'); if(pv&&d)pv.innerHTML=`<img src="${d}" style="max-height:90px;border-radius:10px">`; }); }
});

/* ===== INIT ===== */
seed();
render();                    // arranca en la carga (no solo en hashchange) → funciona desde file://
</script>
