<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probador Pl@ntNet — Carmen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0fdf4; color: #14532d; padding: 20px; max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #16a34a; font-size: 14px; margin-bottom: 20px; }
  label { display: block; font-weight: 600; margin: 16px 0 6px; font-size: 14px; }
  input[type=password], input[type=file] { width: 100%; padding: 12px; border: 2px solid #bbf7d0; border-radius: 10px; font-size: 15px; background: white; }
  .btn { width: 100%; padding: 15px; background: #059669; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: 700; margin-top: 18px; cursor: pointer; }
  .btn:disabled { background: #9ca3af; }
  .step { background: #dcfce7; border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .step a { color: #059669; font-weight: 700; }
  #result { margin-top: 20px; }
  .card { background: white; border-radius: 12px; padding: 16px; margin: 10px 0; border-left: 5px solid #059669; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card.top { border-left-color: #fbbf24; background: #fefce8; }
  .name { font-size: 18px; font-weight: 700; }
  .sci { font-style: italic; color: #6b7280; font-size: 14px; margin: 2px 0; }
  .conf { font-size: 13px; color: #16a34a; font-weight: 600; }
  .err { background: #fef2f2; color: #b91c1c; border-radius: 10px; padding: 14px; font-size: 14px; line-height: 1.5; }
  .ok-banner { background: #059669; color: white; border-radius: 10px; padding: 14px; text-align: center; font-weight: 700; font-size: 16px; margin-bottom: 14px; }
  img#preview { width: 100%; border-radius: 12px; margin-top: 12px; display: none; }
  .spinner { text-align: center; padding: 20px; color: #16a34a; font-weight: 600; }
</style>
</head>
<body>
  <h1>🌿 Probador Pl@ntNet</h1>
  <p class="sub">Comprueba en 30 segundos si tu key funciona</p>

  <div class="step">
    <strong>¿No tienes key todavía?</strong><br>
    1. Entra en <a href="https://my.plantnet.org" target="_blank" rel="noopener noreferrer">my.plantnet.org</a> → crea cuenta gratis<br>
    2. Ve a "Settings" / API → copia tu clave<br>
    3. Pégala abajo. Es gratis: 500 identificaciones al día.
  </div>

  <label for="key">Tu API key de Pl@ntNet</label>
  <input type="password" id="key" placeholder="Pega aquí tu clave (empieza por 2b10...)">

  <label for="photo">Foto de una planta (hoja o flor de cerca)</label>
  <input type="file" id="photo" accept="image/*">
  <img id="preview" alt="">

  <button class="btn" id="go" disabled>Identificar planta</button>

  <div id="result"></div>

<script>
  const keyEl = document.getElementById('key');
  const photoEl = document.getElementById('photo');
  const goBtn = document.getElementById('go');
  const preview = document.getElementById('preview');
  const result = document.getElementById('result');
  let file = null;

  function refresh() { goBtn.disabled = !(keyEl.value.trim() && file); }
  keyEl.addEventListener('input', refresh);
  photoEl.addEventListener('change', (e) => {
    file = e.target.files[0] || null;
    if (file) { preview.src = URL.createObjectURL(file); preview.style.display = 'block'; }
    refresh();
  });

  goBtn.addEventListener('click', async () => {
    const key = keyEl.value.trim();
    result.innerHTML = '<div class="spinner">🔍 Preguntando a Pl@ntNet…</div>';
    goBtn.disabled = true;
    try {
      const fd = new FormData();
      fd.append('images', file, 'planta.jpg');
      fd.append('organs', 'auto');
      const url = 'https://my-api.plantnet.org/v2/identify/all?api-key=' + encodeURIComponent(key) + '&lang=es&nb-results=3';
      const resp = await fetch(url, { method: 'POST', body: fd });

      if (resp.status === 401 || resp.status === 403) throw new Error('❌ La key NO es válida. Cópiala de nuevo desde my.plantnet.org (sección API).');
      if (resp.status === 404) throw new Error('⚠️ La key funciona, pero Pl@ntNet no ve ninguna planta clara. Prueba una foto más cercana de hojas o flores.');
      if (resp.status === 429) throw new Error('⚠️ La key funciona, pero has agotado las 500 identificaciones de hoy. Mañana se renueva.');
      if (!resp.ok) throw new Error('Pl@ntNet respondió con error ' + resp.status);

      const data = await resp.json();
      const results = (data.results || []).slice(0, 3);
      if (!results.length) throw new Error('No hubo resultados. Prueba otra foto.');

      let html = '<div class="ok-banner">✅ ¡LA KEY FUNCIONA! Ya puedes ponerla en la app de Carmen.</div>';
      results.forEach((r, i) => {
        const common = (r.species.commonNames && r.species.commonNames[0]) || r.species.scientificNameWithoutAuthor;
        const sci = r.species.scientificNameWithoutAuthor || '';
        const conf = Math.round((r.score || 0) * 100);
        const card = document.createElement('div');
        card.className = 'card' + (i === 0 ? ' top' : '');
        const nameDiv = document.createElement('div'); nameDiv.className = 'name'; nameDiv.textContent = '#' + (i+1) + ' ' + common;
        const sciDiv = document.createElement('div'); sciDiv.className = 'sci'; sciDiv.textContent = sci;
        const confDiv = document.createElement('div'); confDiv.className = 'conf'; confDiv.textContent = conf + '% de confianza';
        card.appendChild(nameDiv); card.appendChild(sciDiv); card.appendChild(confDiv);
        html += card.outerHTML;
      });
      result.innerHTML = html;
    } catch (e) {
      result.innerHTML = '<div class="err">' + e.message + '</div>';
    } finally {
      goBtn.disabled = false;
    }
  });
</script>
</body>
</html>
