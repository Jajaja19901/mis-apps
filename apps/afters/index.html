<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0a0a0f; color: #f0f0f5; font-family: 'DM Sans', sans-serif; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
  button { border: none; background: none; color: inherit; font: inherit; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }
  textarea { resize: none; }

  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
  .mono { font-family: 'Space Mono', monospace; }

  /* ============ WELCOME ============ */
  .welcome {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    padding-left: max(24px, env(safe-area-inset-left));
    padding-right: max(24px, env(safe-area-inset-right));
    position: relative;
    overflow: hidden;
    background-image:
      linear-gradient(rgba(255, 0, 128, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 0, 128, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .welcome::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, #0a0a0f 75%);
    pointer-events: none;
  }
  .welcome-inner { position: relative; z-index: 2; max-width: 420px; width: 100%; }
  .welcome-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #ff0080;
    text-align: center;
    margin-bottom: 12px;
  }
  .welcome-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .welcome-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
    text-align: center;
    margin-bottom: 48px;
  }
  .field-label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
    margin-bottom: 12px;
  }
  .apodo-input {
    width: 100%;
    border-bottom: 2px solid #2a2a3a;
    padding: 12px 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.05em;
    color: #f0f0f5;
    text-transform: uppercase;
    transition: border-color 0.2s;
  }
  .apodo-input::placeholder { color: #2a2a3a; }
  .apodo-input:focus { border-color: #ff0080; }
  .apodo-help {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #6b6b7a;
    margin-top: 12px;
    line-height: 1.6;
  }
  .btn-primary {
    width: 100%;
    background: #ff0080;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.15em;
    padding: 16px;
    margin-top: 32px;
    transition: background 0.2s;
  }
  .btn-primary:hover:not(:disabled) { background: #ff1f8f; }
  .btn-primary:disabled { background: #2a2a3a; color: #6b6b7a; cursor: not-allowed; }
  .btn-secondary {
    width: 100%;
    background: transparent;
    color: #00f0ff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.15em;
    padding: 16px;
    border: 2px solid #00f0ff;
    border-radius: 0;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(0,240,255,0.1); }

  /* ============ HEADER ============ */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(10, 10, 15, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #1a1a24;
    padding: 14px 20px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-block { display: flex; align-items: baseline; gap: 8px; }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
  }
  .logo-version {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #ff0080;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .history-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #6b6b7a;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }
  .history-btn:hover { color: #f0f0f5; }
  .apodo-chip {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #f0f0f5;
    padding: 6px 12px;
    border: 1px solid #2a2a3a;
  }

  /* ============ LIVE BAR ============ */
  .live-bar {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #1a1a24;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .live-left { display: flex; align-items: center; gap: 12px; }
  .live-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff0080;
    animation: live-blink 1.6s infinite;
    flex-shrink: 0;
  }
  .live-text-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #ff0080;
  }
  .live-text-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .live-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    line-height: 1;
    letter-spacing: 0.04em;
  }
  .live-count-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
    margin-top: 4px;
    text-align: right;
  }

  /* ============ FEED ============ */
  .feed { padding-bottom: 210px; }
  .feed-empty {
    padding: 80px 20px;
    text-align: center;
  }
  .feed-empty-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
    margin-bottom: 12px;
  }
  .feed-empty-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #2a2a3a;
    letter-spacing: 0.04em;
  }

  /* ============ ANECDOTA ============ */
  .anecdota {
    padding: 20px;
    border-bottom: 1px solid #1a1a24;
  }
  .anecdota-new { animation: slide-in 0.4s ease-out; }
  .anec-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .anec-autor-anon {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #6b6b7a;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .anec-autor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.08em;
    color: #ff0080;
  }
  .anec-hour {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #6b6b7a;
  }
  .anec-text {
    font-size: 15px;
    line-height: 1.6;
    color: #f0f0f5;
    margin-bottom: 14px;
    word-wrap: break-word;
  }
  .anec-location {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #00f0ff;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }
  .anec-reactions {
    display: flex;
    gap: 6px;
  }
  .reaction {
    padding: 6px 10px;
    border: 1px solid #1a1a24;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s, transform 0.15s;
  }
  .reaction:active { transform: scale(1.1); border-color: #ff0080; }
  .reaction-emoji { font-size: 14px; }
  .reaction-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #6b6b7a;
  }

  /* ============ DROP BUTTON ============ */
  .drop-wrap {
    position: fixed;
    bottom: 64px;
    bottom: calc(64px + env(safe-area-inset-bottom, 0px));
    left: 0;
    right: 0;
    z-index: 20;
    padding: 48px 20px 16px;
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    background: linear-gradient(to top, #0a0a0f, rgba(10, 10, 15, 0.9) 60%, transparent);
    pointer-events: none;
    display: flex;
    gap: 12px;
  }
  .drop-btn {
    flex: 1;
    background: #ff0080;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.2em;
    padding: 20px;
    pointer-events: auto;
    animation: drop-pulse 2.2s infinite;
    transition: background 0.2s;
  }
  .drop-btn:hover { background: #ff1f8f; }
  
  .sos-btn {
    flex: 0 0 60px;
    background: #ff0000;
    color: white;
    font-size: 28px;
    padding: 20px;
    pointer-events: auto;
    border: 2px solid rgba(255, 0, 0, 0.5);
    cursor: pointer;
    transition: all 0.2s;
    animation: sos-pulse 1s infinite;
  }
  .sos-btn:hover {
    background: #ff3333;
    border-color: #ff0000;
  }
  .sos-btn.sos-active {
    background: #ff3333;
    animation: sos-active-pulse 0.5s infinite;
    border-color: #ff0000;
  }
  
  @keyframes sos-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  @keyframes sos-active-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  
  /* SOS Panel styles */
  .sos-alert-item {
    background: rgba(255, 0, 0, 0.05);
    border: 1.5px solid #ff0000;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
    animation: pulse-border 1s infinite;
  }
  
  .sos-alert-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  
  .sos-alert-name {
    font-size: 16px;
    font-weight: 600;
    color: #ff0000;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.1em;
  }
  
  .sos-alert-time {
    font-size: 12px;
    color: #ff6b6b;
    font-weight: 500;
  }
  
  .sos-alert-dist {
    font-size: 13px;
    color: #6b6b7a;
    margin-bottom: 10px;
  }
  
  .sos-nav-btn {
    width: 100%;
    background: linear-gradient(135deg, #ff0000, #ff3333);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  
  .sos-nav-btn:active {
    transform: scale(0.98);
    background: linear-gradient(135deg, #ff3333, #ff5555);
  }
  
  .sos-header-btn {
    position: relative;
    animation: pulse-icon 1s infinite;
  }
  
  .sos-badge-small {
    position: absolute;
    top: -2px;
    right: -2px;
    background: #ff0000;
    color: white;
    font-size: 10px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  
  @keyframes pulse-border {
    0%, 100% { border-color: #ff0000; box-shadow: 0 0 8px rgba(255, 0, 0, 0.3); }
    50% { border-color: #ff6b6b; box-shadow: 0 0 12px rgba(255, 0, 0, 0.5); }
  }
  
  @keyframes pulse-icon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ============ MODALS ============ */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    animation: fade-in 0.3s ease-out;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 9600;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fade-in 0.25s ease-out;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    border-bottom: 1px solid #1a1a24;
    flex-shrink: 0;
  }
  .modal-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .close-btn {
    color: #6b6b7a;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .close-btn:hover { color: #f0f0f5; }
  .close-btn svg { width: 22px; height: 22px; }

  .aviso-gps-caido {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: linear-gradient(135deg, #d68000, #b35900);
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    animation: aviso-pop 0.3s ease-out;
  }
  .btn-reactivar-gps {
    background: #fff;
    color: #b35900;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  /* ===== EMOTES EN EL MAPA ===== */
  .btn-emote-mapa {
    background: rgba(0, 214, 143, 0.15);
    border: 1px solid #00d68f;
    border-radius: 10px;
    font-size: 18px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .btn-emote-mapa:active { transform: scale(0.92); }
  .emotes-panel {
    background: #16161f;
    border: 1px solid #2a2a3a;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px;
    width: 100%;
    max-width: 460px;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    animation: emotes-subir 0.25s ease-out;
  }
  @keyframes emotes-subir { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
  .emotes-panel-titulo {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #9b9bab;
    text-align: center;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .emotes-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    max-height: 320px;
    overflow-y: auto;
  }
  .emote-opt {
    font-size: 28px;
    padding: 8px 0;
    background: #1f1f2e;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
  }
  .emote-opt:active { transform: scale(1.3); background: #2a2a3a; }
  .emotes-cerrar {
    display: block;
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: #2a2a3a;
    color: #f0f0f5;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }
  @keyframes emote-pop {
    0% { transform: translateX(-50%) scale(0) translateY(10px); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.3) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; }
  }

  .btn-actualizar-mapa {
    background: linear-gradient(135deg, #00f0ff, #00b8d4);
    color: #0a0a0f;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 8px;
    white-space: nowrap;
    box-shadow: 0 0 12px rgba(0,240,255,0.4);
    transition: transform 0.15s;
  }
  .btn-actualizar-mapa:active { transform: scale(0.94); }
  .btn-actualizar-mapa.girando { animation: girar 0.6s linear; }
  @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ============ WRITE MODAL ============ */
  .write-body {
    flex: 1;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .write-q {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }
  .write-textarea {
    width: 100%;
    border: 1px solid #2a2a3a;
    padding: 16px;
    font-size: 16px;
    color: #f0f0f5;
    min-height: 140px;
    transition: border-color 0.2s;
  }
  .write-textarea::placeholder { color: #2a2a3a; }
  .write-textarea:focus { border-color: #ff0080; }
  .char-count {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #6b6b7a;
    margin-top: 8px;
  }
  .char-count.low { color: #ff0080; }
  .firma-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #6b6b7a;
    margin: 32px 0 12px;
  }
  .firma-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .firma-opt {
    padding: 16px 8px;
    border: 1px solid #2a2a3a;
    color: #6b6b7a;
    text-align: center;
    transition: all 0.2s;
  }
  .firma-opt svg { width: 18px; height: 18px; display: block; margin: 0 auto 8px; }
  .firma-opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
  }
  .firma-opt.active {
    border-color: #ff0080;
    background: rgba(255, 0, 128, 0.1);
    color: #f0f0f5;
  }
  .location-toggle {
    margin-top: 16px;
    padding: 12px;
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 4px;
  }
  .location-toggle label {
    user-select: none;
  }
  .location-toggle input[type="checkbox"] {
    accent-color: #00f0ff;
  }

  /* ============ NEWS BANNER ============ */

  /* ============ PUNTO DE SALIDA ============ */
  .punto-salida-prompt {
    margin: 12px 16px 0;
  }
  .punto-salida-btn-crear {
    width: 100%;
    background: linear-gradient(135deg, #ff0080, #00e0ff);

    padding: 16px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;

  }
  .punto-salida-texto {

  }

  /* ============ NOTIF PROMPT ============ */
  .notif-prompt {
    margin: 12px 16px 0;
    padding: 14px 16px;
    background: rgba(255, 215, 0, 0.06);
    border: 1px solid rgba(255, 215, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .notif-prompt-text {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #ffd700;

    min-width: 200px;

  .notif-prompt-actions { display: flex; gap: 8px; }
  .notif-btn {
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;

  .notif-btn.no { background: transparent; color: #6b6b7a; border-color: #2a2a3a; }

  /* ============ NAVIGATING VIEW ============ */
  .navigating-view {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    overflow: hidden;
  }
  .nav-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .nav-target-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    color: #ff0080;
    text-align: center;
    flex: 1;
  }
  .nav-close-btn {
    position: absolute;
    right: 20px;
    top: max(20px, env(safe-area-inset-top));
    width: 40px;
    height: 40px;
    padding: 0;
    background: rgba(255, 0, 128, 0.2);
    color: #ff0080;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    border: 1px solid #ff0080;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-close-btn:active { background: #ff0080; color: white; }
  
  .nav-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
  }
  .compass-container {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .compass-bg {
    position: absolute;
    inset: 0;
    border: 3px solid #ff0080;
    border-radius: 50%;
    opacity: 0.3;
  }
  .compass-cardinal {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #ffd700;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .compass-cardinal.n { top: -15px; left: 50%; transform: translateX(-50%); }
  .compass-cardinal.s { bottom: -15px; left: 50%; transform: translateX(-50%); }
  .compass-cardinal.e { right: -15px; top: 50%; transform: translateY(-50%); }
  .compass-cardinal.o { left: -15px; top: 50%; transform: translateY(-50%); }
  
  .compass-arrow {
    position: absolute;
    width: 60px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    transform-origin: center bottom;
    transition: transform 0.15s ease-out;
  }
  .nav-info {
    text-align: center;
    margin-top: 20px;
  }
  .nav-instruction {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
    text-align: center;
    color: #00f0ff;
    margin: 12px 0;
    min-height: 30px;
  }
  .nav-distance {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: #6b6b7a;
    margin-bottom: 8px;
  }

  /* ===== FLECHA FLOTANTE DE GUÍA (sobre el mapa) ===== */
  .flecha-flotante {
    position: fixed;
    bottom: 90px;
    right: 16px;
    width: 96px;
    z-index: 95;
    background: linear-gradient(135deg, #00f0ff, #0090ff);
    border: 3px solid #fff;
    border-radius: 18px;
    padding: 10px 8px 12px;
    box-shadow: 0 6px 24px rgba(0, 180, 255, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: grab;
    touch-action: none;
    user-select: none;
    animation: flecha-aparece 0.3s ease-out;
  }
  .flecha-flotante.cerca {
    background: linear-gradient(135deg, #00d68f, #00a86b);
    box-shadow: 0 6px 24px rgba(0, 200, 120, 0.7);
  }
  .flecha-flotante-cerrar {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    color: #0090ff;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .flecha-flotante-nombre {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    margin-bottom: 4px;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .flecha-flotante-arrow {
    font-size: 40px;
    line-height: 1;
    transition: transform 0.3s ease-out;
  }
  .flecha-flotante-emoji {
    font-size: 40px;
    line-height: 1;
    animation: flecha-fiesta 0.6s infinite alternate;
  }
  .flecha-flotante-dist {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: #fff;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .flecha-flotante-eta {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.85);
    margin-top: 2px;
    text-align: center;
    line-height: 1.2;
  }
  .flecha-flotante-brujula {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    margin-top: 3px;
    text-align: center;
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 8px;
  }
  @keyframes flecha-aparece {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes flecha-fiesta {
    from { transform: scale(1) rotate(-8deg); }
    to { transform: scale(1.15) rotate(8deg); }
  }

<div id="app"></div>

<!-- Firebase SDK (compat mode) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<!-- Leaflet (mapa) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- CryptoJS (encriptación de ubicaciones) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
// ============ FIREBASE CONFIG ============
// REEMPLAZA estos valores con los de TU proyecto Firebase.
// Mientras no los reemplaces, la app funciona en MODO DEMO con datos locales.

const firebaseConfig = {
  apiKey: "AIzaSyDpbYPR-gwEhCt_6h-hJ-rUjtUO1oX_uXQ",
  authDomain: "afters-52efb.firebaseapp.com",
  databaseURL: "https://afters-52efb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "afters-52efb",
  storageBucket: "afters-52efb.firebasestorage.app",
  messagingSenderId: "113781443463",
  appId: "1:113781443463:web:a7e9a03c8e752b118aa122",
  measurementId: "G-ERWNHVGW9K"
};

const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "REEMPLAZAR_CON_TU_API_KEY";

// ============ FIREBASE INIT ============

let db = null;
let storage = null;
let auth = null;

if (FIREBASE_CONFIGURED && typeof firebase !== 'undefined') {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    storage = firebase.storage();
    auth = firebase.auth();
  } catch (e) {
    console.warn('Firebase init falló:', e);
  }
}

// Devuelve la base de datos de Firebase. Se usa en muchas funciones.
// (Faltaba definirla: los try/catch se tragaban el error y el SOS/chat fallaban en silencio.)
function fbDatabase() {
  return db;
}

// ============ CIFRADO EXTREMO A EXTREMO (E2E) PARA CHATS PRIVADOS ============
// Cada móvil tiene un par de llaves: pública (la ve todo el grupo) y privada
// (NUNCA sale de este móvil). Se cifra con la pública del otro, se abre con tu privada.
// Ni Firebase ni nadie más puede leer los mensajes.

const E2E_PRIV_KEY = 'afters_e2e_priv_v1';  // llave privada (solo en este móvil)

// Convertir entre formatos (ArrayBuffer <-> base64) para guardar y enviar
function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBuf(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

// ¿El navegador soporta cifrado de verdad? (necesita HTTPS, que ya tienes en Netlify)
function soportaE2E() {
  return (typeof window.crypto !== 'undefined'
    && window.crypto.subtle
    && typeof window.crypto.subtle.generateKey === 'function');
}

// Genera mi par de llaves (si no lo tengo ya) y publica mi llave pública en Firebase.
async function inicializarLlavesE2E() {
  if (!soportaE2E()) return;
  if (!state.uid || !state.grupo) return;

  try {
    let privB64 = null;
    try { privB64 = localStorage.getItem(E2E_PRIV_KEY); } catch (e) {}

    let claves;
    if (privB64) {
      // Ya tengo llave privada guardada: la importo
      const privBuf = b64ToBuf(privB64);
      state.e2ePrivKey = await window.crypto.subtle.importKey(
        'pkcs8', privBuf,
        { name: 'ECDH', namedCurve: 'P-256' },
        false, ['deriveKey']
      );
      // Mi pública la recalculo a partir de la guardada (la tengo en localStorage aparte)
      const pubB64 = localStorage.getItem(E2E_PRIV_KEY + '_pub');
      if (pubB64) {
        // Publicarla por si acaso no estaba
        publicarMiLlavePublica(pubB64);
      }
    } else {
      // Primera vez: generar par nuevo
      claves = await window.crypto.subtle.generateKey(
        { name: 'ECDH', namedCurve: 'P-256' },
        true, ['deriveKey']
      );
      state.e2ePrivKey = claves.privateKey;
      // Guardar la privada en este móvil
      const privExport = await window.crypto.subtle.exportKey('pkcs8', claves.privateKey);
      const pubExport = await window.crypto.subtle.exportKey('spki', claves.publicKey);
      const privStr = bufToB64(privExport);
      const pubStr = bufToB64(pubExport);
      try {
        localStorage.setItem(E2E_PRIV_KEY, privStr);
        localStorage.setItem(E2E_PRIV_KEY + '_pub', pubStr);
      } catch (e) {}
      // Publicar la pública para que otros me escriban
      publicarMiLlavePublica(pubStr);
    }
  } catch (e) {
    // Si algo falla, el chat privado caerá al cifrado de grupo (no se rompe la app)
  }
}

function publicarMiLlavePublica(pubB64) {
  if (!FIREBASE_CONFIGURED || !db || !state.uid || !state.grupo) return;
  try {
    fbDatabase().ref('grupos/' + state.grupo + '/llavesPublicas/' + state.uid).set(pubB64);
  } catch (e) {}
}

// Deriva la clave compartida con otra persona (con mi privada + su pública).
// Las dos personas llegan a la MISMA clave. Es la magia del E2E.
async function derivarClaveCon(uidOtro) {
  if (!soportaE2E() || !state.e2ePrivKey) return null;
  try {
    const snap = await fbDatabase().ref('grupos/' + state.grupo + '/llavesPublicas/' + uidOtro).once('value');
    const pubB64 = snap.val();
    if (!pubB64) return null;  // el otro aún no tiene llave publicada
    const pubBuf = b64ToBuf(pubB64);
    const pubKey = await window.crypto.subtle.importKey(
      'spki', pubBuf,
      { name: 'ECDH', namedCurve: 'P-256' },
      false, []
    );
    const claveAES = await window.crypto.subtle.deriveKey(
      { name: 'ECDH', public: pubKey },
      state.e2ePrivKey,
      { name: 'AES-GCM', length: 256 },
      false, ['encrypt', 'decrypt']
    );
    return claveAES;
  } catch (e) {
    return null;
  }
}

// Cifrar un texto con la clave compartida
async function cifrarE2E(clave, texto) {
  const iv = window.crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder().encode(texto);
  const cifrado = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, clave, enc);
  return bufToB64(iv) + '.' + bufToB64(cifrado);
}

// Descifrar
async function descifrarE2E(clave, paquete) {
  try {
    const partes = paquete.split('.');
    const iv = new Uint8Array(b64ToBuf(partes[0]));
    const datos = b64ToBuf(partes[1]);
    const claro = await window.crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, clave, datos);
    return new TextDecoder().decode(claro);
  } catch (e) {
    return null;
  }
}

// El ID de la sala privada: los dos UIDs ordenados igual, para que los dos
// lleguen a la MISMA sala (da igual quién la abra).
function salaPrivadaId(uidA, uidB) {
  return [uidA, uidB].sort().join('__');
}

// Abrir el chat privado con una persona
async function abrirChatPrivado(uidOtro, apodoOtro) {
  if (uidOtro === state.uid) return;  // no conmigo mismo
  if (!soportaE2E()) {
    showToast('Tu navegador no soporta el cifrado seguro');
    return;
  }
  state.chatPrivadoCon = { uid: uidOtro, apodo: apodoOtro };
  state.chatPrivadoMsgs = [];
  state.chatPrivadoInput = '';
  state.view = 'chatPrivado';
  // Asegurar que tengo mis llaves
  if (!state.e2ePrivKey) await inicializarLlavesE2E();
  render();
  // Suscribirse a esta sala y descifrar lo que llegue
  subscribeToChatPrivado(uidOtro);
}

function cerrarChatPrivado() {
  // Dejar de escuchar la sala
  if (state.chatPrivadoCon && FIREBASE_CONFIGURED && db) {
    try {
      const sala = salaPrivadaId(state.uid, state.chatPrivadoCon.uid);
      fbDatabase().ref('grupos/' + state.grupo + '/chatsPrivados/' + sala).off();
    } catch (e) {}
  }
  state.chatPrivadoCon = null;
  state.chatPrivadoMsgs = [];
  state.chatPrivadoSuscrito = null;  // permitir re-suscripción al reabrir
  state.view = 'map';
  render();
}

async function enviarChatPrivado(texto) {
  if (!texto.trim() || !state.chatPrivadoCon) return;
  const uidOtro = state.chatPrivadoCon.uid;

  // Derivar la clave compartida con esa persona
  const clave = await derivarClaveCon(uidOtro);
  if (!clave) {
    showToast('Esa persona aún no tiene su cifrado listo. Que abra la app.');
    return;
  }

  // Cifrar el mensaje
  let paquete;
  try {
    paquete = await cifrarE2E(clave, texto.trim());
  } catch (e) {
    showToast('No se pudo cifrar el mensaje');
    return;
  }

  const sala = salaPrivadaId(state.uid, uidOtro);
  const msg = {
    de: state.uid,
    apodo: state.apodo,
    texto: paquete,  // va CIFRADO a Firebase
    ts: Date.now(),
    read_at: 0
  };

  // Mostrar en mi pantalla al instante (en claro, solo para mí); firebaseKey se rellena tras el push
  state.chatPrivadoMsgs.push({ de: state.uid, apodo: state.apodo, claro: texto.trim(), ts: msg.ts, firebaseKey: null, read_at: 0 });
  state.chatPrivadoInput = '';
  const input = document.getElementById('chatPrivadoInput');
  if (input) input.value = '';
  renderChatPrivadoMsgs();

  // Guardar cifrado en Firebase
  if (FIREBASE_CONFIGURED && db) {
    try {
      const pushRef = await fbDatabase().ref('grupos/' + state.grupo + '/chatsPrivados/' + sala).push(msg);
      // Guardar la key para poder detectar el ✓✓ cuando el otro la lea
      const localMsg = state.chatPrivadoMsgs.find(function(m) { return m.ts === msg.ts && m.de === state.uid && !m.firebaseKey; });
      if (localMsg) { localMsg.firebaseKey = pushRef.key; renderChatPrivadoMsgs(); }
    } catch (e) {
      showToast('❌ No se envió: ' + (e && e.message ? e.message : e));
    }
  }
}

function subscribeToChatPrivado(uidOtro) {
  if (!FIREBASE_CONFIGURED || !db || !state.uid || !state.grupo) return;
  // Evitar listeners dobles si el usuario abre el mismo chat dos veces
  if (state.chatPrivadoSuscrito === uidOtro) return;
  state.chatPrivadoSuscrito = uidOtro;
  const sala = salaPrivadaId(state.uid, uidOtro);
  try {
    const ref = fbDatabase().ref('grupos/' + state.grupo + '/chatsPrivados/' + sala);

    ref.on('child_added', async function(snap) {
      const msg = snap.val();
      if (!msg || !msg.texto) return;

      // Mensaje MÍO: ya está en la UI desde el envío optimista.
      // Solo actualizamos la firebaseKey si aún no la teníamos.
      if (msg.de === state.uid) {
        const localMsg = state.chatPrivadoMsgs.find(function(m) { return m.ts === msg.ts && m.de === state.uid; });
        if (localMsg && !localMsg.firebaseKey) {
          localMsg.firebaseKey = snap.key;
          renderChatPrivadoMsgs();
        }
        return;
      }

      // Mensaje del otro: descifrar
      const clave = await derivarClaveCon(uidOtro);
      if (!clave) return;
      const claro = await descifrarE2E(clave, msg.texto);
      if (claro === null) return;

      // Evitar duplicados
      if (state.chatPrivadoMsgs.some(function(m) { return m.ts === msg.ts && m.de === msg.de; })) return;

      if (msg.tipo === 'efimero') {
        state.chatPrivadoMsgs.push({
          de: msg.de, apodo: msg.apodo, tipo: 'efimero',
          claro: claro,
          duracion: msg.duracion || 10,
          firebaseKey: snap.key,
          abierto: false, ts: msg.ts
        });
        if (msg.de !== state.uid) {
          showLocalNotif('📸 ' + (msg.apodo||'Alguien'), 'Te envió una foto efímera · expira en '+msg.duracion+'s');
          if (navigator.vibrate) navigator.vibrate([200,100,200]);
        }
      } else {
        state.chatPrivadoMsgs.push({ de: msg.de, apodo: msg.apodo, claro: claro, ts: msg.ts, firebaseKey: snap.key, read_at: msg.read_at || 0 });
      }

      state.chatPrivadoMsgs.sort(function(a, b) { return a.ts - b.ts; });
      if (state.view === 'chatPrivado') renderChatPrivadoMsgs();

      // Marcar como leído si el chat está abierto ahora mismo
      if (state.view === 'chatPrivado' && !msg.read_at) {
        try {
          ref.child(snap.key).update({ read_at: Date.now() });
        } catch(e) {}
      }
    });

    // Detectar cuando el otro lee mis mensajes (read_at pasa de 0 a un timestamp)
    ref.on('child_changed', function(snap) {
      const msg = snap.val();
      if (!msg || msg.de !== state.uid || !msg.read_at) return;
      const localMsg = state.chatPrivadoMsgs.find(function(m) { return m.firebaseKey === snap.key; });
      if (localMsg && !localMsg.read_at) {
        localMsg.read_at = msg.read_at;
        if (state.view === 'chatPrivado') renderChatPrivadoMsgs();
      }
    });

  } catch (e) {}
}

// Borrar toda la conversación privada con esa persona (para los dos)
function borrarChatPrivado() {
  if (!state.chatPrivadoCon) return;
  if (!confirm('¿Borrar TODA la conversación con ' + state.chatPrivadoCon.apodo + '? No se puede deshacer.')) return;
  const sala = salaPrivadaId(state.uid, state.chatPrivadoCon.uid);
  if (FIREBASE_CONFIGURED && db) {
    try {
      fbDatabase().ref('grupos/' + state.grupo + '/chatsPrivados/' + sala).remove();
    } catch (e) {}
  }
  state.chatPrivadoMsgs = [];

const STORAGE_KEY_COCHE = 'afters_coche_v1';

// Cargar mi coche guardado (de este móvil) al arrancar
function cargarMiCoche() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_COCHE);
    if (raw) state.miCoche = JSON.parse(raw);
  } catch (e) {}
}

// Abrir el modal para aparcar (pide nota, foto, y privado/compartido)
function abrirModalCoche() {
  if (!state.myLocation) {
    showToast('Activa tu ubicación primero para guardar el coche');
    return;
  }
  state.mostrandoModalCoche = true;
  state.cocheNotaTemp = '';
  state.cocheFotoTemp = null;
  render();
}

function cerrarModalCoche() {
  state.mostrandoModalCoche = false;
  render();
}

// Guardar el coche. compartir = true -> a Firebase para el grupo; false -> solo en mi móvil
function guardarCoche(compartir) {
  if (!state.myLocation) {
    showToast('No tengo tu ubicación');
    return;
  }
  const coche = {
    lat: state.myLocation.lat,
    lng: state.myLocation.lng,
    nota: state.cocheNotaTemp || '',
    foto: state.cocheFotoTemp || null,
    ts: Date.now()
  };

  // Siempre lo guardo en mi móvil (para mí)
  state.miCoche = coche;
  try { localStorage.setItem(STORAGE_KEY_COCHE, JSON.stringify(coche)); } catch (e) {}

  // Si es compartido, lo subo a Firebase para el grupo
  if (compartir && FIREBASE_CONFIGURED && db) {
    try {
      const cocheGrupo = {
        apodo: state.apodo || 'Alguien',
        lat: coche.lat,
        lng: coche.lng,
        nota: coche.nota,
        ts: coche.ts
      };
      // La foto no se sube al grupo si es muy pesada (Firebase free tiene límites)
      fbDatabase().ref('grupos/' + state.grupo + '/coches/' + state.uid).set(cocheGrupo);
      showToast('🚗 Coche guardado y compartido con el grupo');
    } catch (e) {
      showToast('🚗 Coche guardado (solo para ti, falló compartir)');
    }
  } else {
    showToast('🚗 Coche guardado (solo para ti)');
  }

  state.mostrandoModalCoche = false;
  render();
}

// Empezar a guiar hacia un coche (el mío o uno del grupo)
function irAlCoche(coche, apodoDueno) {
  if (!coche || coche.lat == null) {
    showToast('No hay coche guardado');
    return;
  }
  if (!state.myLocation || !state.shareLocationActive) {
    showToast('Activa tu ubicación para que te guíe');
    return;
  }
  state.guiandoAlCoche = {
    lat: coche.lat,
    lng: coche.lng,
    nota: coche.nota || '',
    apodo: apodoDueno || 'tu coche'
  };
  // Reusar la navegación con flecha que ya existe
  arrancarGuiaFlotante({
    apodo: '🚗 ' + (apodoDueno ? 'Coche de ' + apodoDueno : 'Tu coche'),
    lat: coche.lat,
    lng: coche.lng
  });
}

// Borrar mi coche (ya lo recogí)
function borrarMiCoche() {
  state.miCoche = null;
  try { localStorage.removeItem(STORAGE_KEY_COCHE); } catch (e) {}
  // Quitarlo también del grupo si estaba compartido
  if (FIREBASE_CONFIGURED && db && state.uid) {
    try { fbDatabase().ref('grupos/' + state.grupo + '/coches/' + state.uid).remove(); } catch (e) {}
  }
  showToast('🚗 Coche borrado');
  render();
}

// Escuchar los coches compartidos del grupo
function subscribeToCoches() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToCoches, 1000); return; }
  try {
    const ref = fbDatabase().ref('grupos/' + state.grupo + '/coches');
    ref.on('value', function(snap) {
      state.cochesGrupo = snap.val() || {};
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    });
  } catch (e) {}
}

function getTipo() {
  var base = TIPOS_GRUPO[state.tipoGrupo] || TIPOS_GRUPO.fiesta;
  var cfg = state.grupoConfig || {};

  // Pluralización española básica
  function pluralEs(word) {
    if (!word) return word;
    var w = word.trim();
    // terminación -ión → -iones (reunión, sesión, lección)
    if (/ión$/i.test(w)) return w.slice(0, -3) + 'iones';
    // terminación en vocal → +s (nota, jornada, ruta)
    if (/[aeiouáéíóú]$/i.test(w)) return w + 's';
    // terminación en consonante → +es (mes, reunión ya cubierto arriba)
    return w + 'es';
  }

  // Si el admin puso nombres personalizados, los usamos
  if (cfg.nombreCustomSesion && cfg.nombreCustomSesion.trim()) {
    base = Object.assign({}, base, {
      sesion: cfg.nombreCustomSesion.trim(),
      sesionP: pluralEs(cfg.nombreCustomSesion),
      cerrar: 'Cerrar ' + cfg.nombreCustomSesion.trim().toLowerCase(),
      cerrarS: 'CERRAR ' + cfg.nombreCustomSesion.trim().toUpperCase()
    });
  }
  if (cfg.nombreCustomMemoria && cfg.nombreCustomMemoria.trim()) {
    base = Object.assign({}, base, {
      memoria: cfg.nombreCustomMemoria.trim(),
      memoriaP: pluralEs(cfg.nombreCustomMemoria),
      drop: cfg.nombreCustomMemoria.trim().toUpperCase(),
      dropDesc: 'Añade ' + cfg.nombreCustomMemoria.trim().toLowerCase(),
      vacia: 'SÉ EL PRIMERO · ' + cfg.nombreCustomMemoria.trim().toUpperCase()
    });
  }
  return base;
}

async function biometricDisponible() {
  try {
    return !!(window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
  } catch(e) { return false; }
}

async function registrarHuella() {
  if (!(await biometricDisponible())) {
    showToast('Tu navegador/dispositivo no soporta huella. Usa el PIN.');
    return false;
  }
  try {
    const uid = state.uid || 'afters-user';
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'AFTERS', id: window.location.hostname },
      user: { id: new TextEncoder().encode(uid), name: state.apodo||'user', displayName: state.apodo||'AFTERS' },
      pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 30000
    }});
    // Guardar el ID de la credencial
    var credIdB64 = btoa(String.fromCharCode.apply(null, new Uint8Array(cred.rawId)));
    localStorage.setItem('afters_biometric_cred', credIdB64);
    state.biometricRegistrado = true;
    localStorage.setItem('afters_biometric_ok', '1');
    showToast('✓ Huella registrada · la app se bloqueará al pasar 1 min en segundo plano');
    return true;
  } catch(e) {
    if (e.name === 'NotAllowedError') showToast('Huella cancelada');
    else showToast('Error al registrar huella: ' + e.message);
    return false;
  }
}

async function autenticarHuella() {
  var credIdB64 = localStorage.getItem('afters_biometric_cred');
  if (!credIdB64) return false;
  try {
    var rawId = new Uint8Array(atob(credIdB64).split('').map(function(c){ return c.charCodeAt(0); }));
    await navigator.credentials.get({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ type: 'public-key', id: rawId, transports: ['internal'] }],
      userVerification: 'required',
      timeout: 30000
    }});
    return true;
  } catch(e) { return false; }
}

async function intentarDesbloquear() {
  if (state.fallosHuella >= 3) return; // ya en modo PIN
  var ok = await autenticarHuella();
  if (ok) {
    state.bloqueado = false;
    state.fallosHuella = 0;
    render();
  } else {
    state.fallosHuella++;
    if (state.fallosHuella >= 3) {
      showToast('3 intentos fallidos · usa el PIN de emergencia');
    } else {
      showToast('Huella no reconocida · ' + (3 - state.fallosHuella) + ' intentos restantes');
    }
    render();
  }
}

function accentRGB(hex) {
  try {
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return r+','+g+','+b;
  } catch(e) { return '255,0,128'; }
}

function renderTablon() {
  if (!state.mostrandoTablon) return '';
  var avisos = Object.entries(state.tablon || {});
  avisos.sort(function(a,b){
    if (a[1].resuelto !== b[1].resuelto) return a[1].resuelto ? 1 : -1;
    return (b[1].ts||0)-(a[1].ts||0);
  });
  var pendientes = avisos.filter(function(e){ return !e[1].resuelto; }).length;
  var emojiSel = state._tablonEmoji || '📌';
  var emojiBtns = TABLON_EMOJIS.map(function(e){
    return '<button class="tablon-emoji-btn'+(emojiSel===e?' sel':'')+'" data-action="selTablonEmoji" data-emoji="'+e+'">'+e+'</button>';
  }).join('');
  var listaHtml = avisos.length === 0
    ? '<div style="text-align:center;padding:32px 0;font-family:DM Sans,sans-serif;font-size:14px;color:#6b6b7a;">El tablón está vacío.<br>Añade el primer aviso.</div>'
    : avisos.map(function(entry){
        var id=entry[0], a=entry[1];
        var puedeEliminar = (a.autorUid===state.uid) || state.esAdmin;
        var ts = a.ts ? new Date(a.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
        return '<div class="tablon-card'+(a.resuelto?' resuelto':'')+'">'
          +'  <div style="display:flex;align-items:flex-start;gap:12px;">'
          +'    <span style="font-size:24px;flex-shrink:0;margin-top:2px;">'+(a.emoji||'📌')+'</span>'
          +'    <div style="flex:1;min-width:0;">'
          +'      <div class="tablon-texto'+(a.resuelto?' tachado':'')+'">' + escapeHtml(a.texto) + '</div>'
          +'      <div class="tablon-meta">' + escapeHtml(a.autor||'?') + ' · ' + ts + '</div>'
          +'    </div>'
          +'    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center;">'
          +'      <button data-action="toggleResuelto" data-id="'+id+'" data-resuelto="'+(a.resuelto?'1':'0')+'" class="tablon-check'+(a.resuelto?' ok':'')+'">'+(a.resuelto?'↩':'✓')+'</button>'
          +(puedeEliminar?'      <button data-action="borrarAviso" data-id="'+id+'" class="tablon-del">✕</button>':'')
          +'    </div>'
          +'  </div>'
          +'</div>';
      }).join('');
  return '<div class="modal">'
    +'  <div class="modal-header">'
    +'    <div><div class="modal-eyebrow">'+pendientes+' PENDIENTE'+(pendientes!==1?'S':'')+'</div><div class="modal-title">📌 TABLÓN</div></div>'
    +'    <button class="close-btn" data-action="cerrarTablon">'+ICONS.close+'</button>'
    +'  </div>'
    +'  <div class="stats-body">'
    +'    <div style="background:rgba(255,255,255,0.03);border:1px solid #2a2a3a;border-radius:14px;padding:14px;margin-bottom:18px;">'
    +'      <div class="av-label" style="margin-top:0;margin-bottom:8px;">AÑADIR AVISO</div>'
    +'      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">'+emojiBtns+'</div>'
    +'      <input id="tablonInput" type="text" maxlength="100" placeholder="¿Qué hace falta? ¿Qué hay que recordar?" class="pq-input" value="'+escapeHtml(state.tablonInput||'')+'">'
    +'      <button class="coche-btn-grupo" style="margin-top:10px;" data-action="publicarAviso">📌 AÑADIR AL TABLÓN</button>'
    +'    </div>'
    +     listaHtml
    +'  </div>'
    +'</div>';
}

async function fbEmojiReact(anecdotaId, emoji) {
  if (!FIREBASE_CONFIGURED || !db || !state.grupo || !state.uid) return;
  var ref = fbDatabase().ref('grupos/'+state.grupo+'/reacciones/'+anecdotaId+'/'+state.uid);

function subscribeToTimer() {

async function iniciarTimer(minutos) {
  if (!state.esAdmin) { showToast('Solo el admin puede iniciar el temporizador'); return; }
  var hasta = Date.now() + minutos * 60000;
  await fbDatabase().ref('grupos/'+state.grupo+'/timer').set({ hasta: hasta, by: state.apodo, ts: Date.now(), mins: minutos });
  showToast('⏱ Temporizador de '+minutos+' min iniciado para todo el grupo');
}

async function cancelarTimer() {
  if (!state.esAdmin) return;
  await fbDatabase().ref('grupos/'+state.grupo+'/timer').remove();
  state.timerGrupo = null;
  render();
}

function renderTimerPanel() {
  if (!state.timerGrupo) return '';
  var restante = Math.max(0, state.timerGrupo.hasta - Date.now());
  var mins = Math.floor(restante / 60000);
  var segs = Math.floor((restante % 60000) / 1000);
  var txt = mins + ':' + (segs < 10 ? '0' : '') + segs;
  var pct = state.timerGrupo.mins ? Math.round((1 - restante/(state.timerGrupo.mins*60000))*100) : 100;
  return '<div style="position:fixed;bottom:80px;left:12px;right:12px;z-index:9997;background:rgba(10,10,15,0.96);border:1.5px solid #ffd23f;border-radius:14px;padding:14px 16px;backdrop-filter:blur(10px);">'
    + '  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
    + '    <div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:#ffd23f;letter-spacing:0.05em;">⏱ ' + txt + '</div>'
    + '    <div style="font-family:DM Sans,sans-serif;font-size:11px;color:#9a9aa8;">por ' + escapeHtml(state.timerGrupo.by||'admin') + '</div>'
    + (state.esAdmin ? '    <button data-action="cancelarTimer" style="background:transparent;border:1px solid #ffd23f;color:#ffd23f;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;">✕</button>' : '')
    + '  </div>'
    + '  <div style="background:#1a1a2a;border-radius:6px;height:5px;overflow:hidden;">'
    + '    <div style="background:#ffd23f;height:100%;width:'+pct+'%;transition:width 1s linear;"></div>'
    + '  </div>'
    + '</div>';
}

  if (!FIREBASE_CONFIGURED || !db) { showToast('Sin conexión'); return; }

var _motionBuffer = [];

function initBaileSensor() {
  if (!window.DeviceMotionEvent) return;
  var lastBaileState = false;
  var lastEnvio = 0;

  window.addEventListener('devicemotion', function(e) {
    var acc = e.accelerationIncludingGravity;
    if (!acc) return;
    var mag = Math.sqrt((acc.x||0)*(acc.x||0) + (acc.y||0)*(acc.y||0) + (acc.z||0)*(acc.z||0));
    _motionBuffer.push({ v: mag, t: Date.now() });
    // Solo guardar últimos 2 segundos
    var ahora = Date.now();
    _motionBuffer = _motionBuffer.filter(function(m){ return ahora - m.t < 2000; });
    if (_motionBuffer.length < 5) return;
    // Calcular varianza → indica movimiento rítmico
    var vals = _motionBuffer.map(function(m){ return m.v; });
    var media = vals.reduce(function(a,b){return a+b;},0) / vals.length;
    var varianza = vals.reduce(function(s,v){return s+(v-media)*(v-media);},0) / vals.length;
    var bailando = varianza > 18;
    if (!state.baileSensorActivo) {
      // Si el usuario desactivó el radar, borrar su estado de Firebase
      if (lastBaileState) { lastBaileState = false; state.soyBailando = false;
        try { fbDatabase().ref('grupos/'+state.grupo+'/baile/'+state.uid).remove(); } catch(e){}
      }
      return;
    }
    if (bailando !== lastBaileState) {
      lastBaileState = bailando;
      state.soyBailando = bailando;
      // Enviar a Firebase cada 5s máximo
      if (ahora - lastEnvio > 5000 && FIREBASE_CONFIGURED && db && state.grupo && state.uid) {
        lastEnvio = ahora;
        try {
          fbDatabase().ref('grupos/'+state.grupo+'/baile/'+state.uid).set(
            bailando ? { bailando: true, apodo: state.apodo, ts: ahora } : null
          );
        } catch(eIgnored){}
      }
      render();
    }
  });
}

function compartirGrupo() {
  if (!state.grupo) return;
  var baseUrl = window.location.origin + window.location.pathname;
  // Asegurar que no tiene parámetros extra
  var url = baseUrl.split('?')[0] + '?g=' + encodeURIComponent(state.grupo);
  var nombre = state.nombreGrupo ? '"' + state.nombreGrupo + '"' : 'el grupo';
  var texto = '¡Únete a ' + nombre + ' en AFTERS! Tu código: ' + state.grupo;

  if (navigator.share) {
    navigator.share({ title: 'AFTERS · ' + (state.nombreGrupo || state.grupo), text: texto, url: url })
      .catch(function(){});
  } else {
    // Fallback: copiar al portapapeles
    var toCopy = texto + '\n' + url;
    try {
      navigator.clipboard.writeText(toCopy).then(function() {
        showToast('🔗 Link copiado · compártelo con quien quieras');
      }).catch(function() {
        // Fallback legacy
        var ta = document.createElement('textarea');
        ta.value = toCopy;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('🔗 Link copiado · compártelo con quien quieras');
      });
    } catch(e) {
      showToast('Código del grupo: ' + state.grupo);
    }
  }
}

var _testigoStream = null;

async function activarModoTestigo() {
  try {
    _testigoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    state.modoTestigo = true;
    state._testigoCount = 0;
    showToast('🕵️ Modo Testigo activo · foto cada 30s · solo tú las ves');
    tomarFotoTestigo();
    state._testigoTimer = setInterval(tomarFotoTestigo, 30000);
    render();
  } catch(e) {
    showToast('No se pudo acceder a la cámara: ' + e.message);
  }
}

function tomarFotoTestigo() {
  if (!_testigoStream) return;
  try {
    var video = document.createElement('video');
    video.srcObject = _testigoStream;
    video.play();
    video.addEventListener('playing', function() {
      var canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
      var foto = canvas.toDataURL('image/jpeg', 0.5);
      var ts = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      // Guardar en localStorage (máx 20 fotos)
      try {
        var fotos = JSON.parse(localStorage.getItem('afters_testigo') || '[]');
        fotos.unshift({ foto: foto, ts: ts });
        if (fotos.length > 20) fotos = fotos.slice(0, 20);
        localStorage.setItem('afters_testigo', JSON.stringify(fotos));
        state._testigoCount = fotos.length;
        render();
      } catch(e) {}
      video.pause();
    }, { once: true });
  } catch(e) {}
}

function desactivarModoTestigo() {
  state.modoTestigo = false;
  if (state._testigoTimer) { clearInterval(state._testigoTimer); state._testigoTimer = null; }
  if (_testigoStream) { _testigoStream.getTracks().forEach(function(t){ t.stop(); }); _testigoStream = null; }
  showToast('🕵️ Modo Testigo desactivado · ' + state._testigoCount + ' fotos guardadas en tu móvil');
  render();
}

function exportarFotosTestigo() {
  try {

    // Crear un HTML con todas las fotos para descargar

    fotos.forEach(function(f) {

          window._walkieAudioUrl = v.audio;

        });
        if (!state._walkieMensajes) state._walkieMensajes = [];
        state._walkieMensajes.unshift({ de: v.de, ts: v.ts });
        if (state._walkieMensajes.length > 3) state._walkieMensajes = state._walkieMensajes.slice(0,3);

        render();
      } catch(eIgnored){}
    });
  } catch(e){}
}

async function iniciarWalkieGrabacion() {
  if (state._walkieGrabando) return;
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    var chunks = [];
    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    var recorder = new MediaRecorder(stream, { mimeType: mimeType });
    recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = function() {
      stream.getTracks().forEach(function(t){ t.stop(); });
      if (chunks.length === 0) return;
      var blob = new Blob(chunks, { type: mimeType });
      var reader = new FileReader();
      reader.onload = function() {
        if (!FIREBASE_CONFIGURED || !db || !state.grupo) return;
        fbDatabase().ref('grupos/'+state.grupo+'/walkie').set({
          audio: reader.result, de: state.apodo||'Alguien', ts: Date.now()
        });
        showToast('🎙️ Enviado al grupo');
      };
      reader.readAsDataURL(blob);
    };
    state._walkieRecorder = recorder;
    state._walkieGrabando = true;
    recorder.start();
    render();
    setTimeout(function() { if (state._walkieGrabando) detenerWalkieGrabacion(); }, 5000);
  } catch(e) { showToast('No se pudo acceder al micrófono'); }
}

function detenerWalkieGrabacion() {
  if (!state._walkieGrabando || !state._walkieRecorder) return;
  state._walkieGrabando = false;
  try { state._walkieRecorder.stop(); } catch(e){}
  state._walkieRecorder = null;
  render();
}

// Captura de foto PEQUEÑA (miniatura, para que no pese): máximo 500px y calidad 0.5
function onDejadoFotoElegida(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxLado = 500;
      let w = img.width, h = img.height;
      if (w > h && w > maxLado) { h = h * maxLado / w; w = maxLado; }
      else if (h > maxLado) { w = w * maxLado / h; h = maxLado; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      state.dejadoFotoTemp = canvas.toDataURL('image/jpeg', 0.5);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Calcular el centro del grupo (media de las posiciones activas)
function centroDelGrupo() {
  const now = Date.now();
  let sumLat = 0, sumLng = 0, n = 0;
  Object.keys(state.ubicaciones).forEach(function(apodo) {
    const u = state.ubicaciones[apodo];
    if (!u || u.hasta <= now || u.lat == null) return;
    // Solo contar posiciones recientes (de los últimos 5 min)
    if (u.ts && (now - u.ts) > 300000) return;
    sumLat += u.lat; sumLng += u.lng; n++;
  });
  if (n === 0) return null;
  return { lat: sumLat / n, lng: sumLng / n, cuantos: n };
}

// Comprobar si ME he alejado del grupo (se llama al moverme)
function comprobarDistanciaGrupo() {
  if (!state.radarConfig || !state.radarConfig.activo) return;
  if (!state.myLocation) return;
  const centro = centroDelGrupo();
  if (!centro || centro.cuantos < 2) return;  // hace falta al menos 2 personas

  const dist = haversineDistance(state.myLocation.lat, state.myLocation.lng, centro.lat, centro.lng);
  const limite = state.radarConfig.distancia || 200;

  if (dist > limite) {
    if (!state._yaAvisadoLejos) {
      state._yaAvisadoLejos = true;
      const avisarA = state.radarConfig.avisarA || 'todos';

      // Aviso a quien se aleja (yo)
      if (avisarA === 'todos' || avisarA === 'elQueSeAleja') {
        if (navigator.vibrate) navigator.vibrate([300, 150, 300]);
        showAvisoGrande('Te estás separando del grupo (' + Math.round(dist) + 'm). Están hacia el ' + compassDirection(state.myLocation.lat, state.myLocation.lng, centro.lat, centro.lng), '🧭');
      }

      // Aviso al grupo (escribo en Firebase para que les llegue)
      if (avisarA === 'todos' || avisarA === 'admin') {
        if (FIREBASE_CONFIGURED && db) {
          try {
            fbDatabase().ref('grupos/' + state.grupo + '/alejados/' + state.uid).set({
              apodo: state.apodo || 'Alguien',
              distancia: Math.round(dist),
              soloAdmin: (avisarA === 'admin'),
              ts: Date.now()
            });
          } catch (e) {}
        }
      }
    }
  } else {
    // Si vuelve a acercarse, resetear para poder avisar otra vez si se vuelve a alejar
    if (dist < limite * 0.8) state._yaAvisadoLejos = false;
  }
}

// Escuchar cuando alguien del grupo se aleja

  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToAlejados, 1000); return; }

      showAvisoGrande(v.apodo + ' se está separando del grupo (' + v.distancia + 'm)', '🚨');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      // Borrar el aviso para que no se repita
      try { fbDatabase().ref('grupos/' + state.grupo + '/alejados/' + snap.key).remove(); } catch (e) {}
    });
  } catch (e) {}
}

  state.reagruparActivo = null;
  state._reagruparVisto = null;
  showToast('Reagrupamiento cancelado');
  render();
}

// ============ 3. DETECCIÓN DE QUE ALGUIEN NECESITA AYUDA ============
// Si alguien lleva mucho parado + pantalla apagada + de madrugada + lejos del grupo,
// la app le pregunta "¿estás bien?" y si no responde, avisa al grupo.

function comprobarSiNecesitoAyuda() {
  // Solo de madrugada (00:00 - 07:00)
  const hora = new Date().getHours();
  if (hora >= 7 && hora < 24) return;
  if (!state.myLocation) return;
  if (!state._quietoDesde) state._quietoDesde = Date.now();

  // ¿Me he movido? (comparar con última posición)
  if (state._ultPosAyuda) {
    const d = haversineDistance(state._ultPosAyuda.lat, state._ultPosAyuda.lng, state.myLocation.lat, state.myLocation.lng);
    if (d > 30) {
      // Me moví: reiniciar el contador
      state._quietoDesde = Date.now();
      state._preguntadoBien = false;
    }
  }
  state._ultPosAyuda = { lat: state.myLocation.lat, lng: state.myLocation.lng };

  const quietoMin = (Date.now() - state._quietoDesde) / 60000;

  // Si llevo más de 20 min quieto, de madrugada, con pantalla apagada → preguntar
  if (quietoMin > 20 && !state.pantallaActiva && !state._preguntadoBien) {
    state._preguntadoBien = true;
    state._momentoPregunta = Date.now();
    mostrarPreguntaEstasBien();
  }
}

function mostrarPreguntaEstasBien() {
  state.mostrandoPreguntaBien = true;
  if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
  render();
  // Si no responde en 3 min, avisar al grupo
  state._timeoutAyuda = setTimeout(function() {
    if (state.mostrandoPreguntaBien) {
      // No respondió: avisar al grupo
      avisarGrupoPosibleProblema();
    }
  }, 180000);
}

function respondíEstoyBien() {
  state.mostrandoPreguntaBien = false;
  state._preguntadoBien = false;
  state._quietoDesde = Date.now();
  if (state._timeoutAyuda) clearTimeout(state._timeoutAyuda);
  showToast('✓ Vale, tranquilo');
  render();
}

function avisarGrupoPosibleProblema() {
  state.mostrandoPreguntaBien = false;
  if (FIREBASE_CONFIGURED && db && state.myLocation) {
    try {
      fbDatabase().ref('grupos/' + state.grupo + '/posibleProblema/' + state.uid).set({
        apodo: state.apodo || 'Alguien',
        lat: state.myLocation.lat,
        lng: state.myLocation.lng,
        ts: Date.now()
      });
    } catch (e) {}
  }
  render();
}

function subscribeToPosibleProblema() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToPosibleProblema, 1000); return; }
  try {
    fbDatabase().ref('grupos/' + state.grupo + '/posibleProblema').on('child_added', function(snap) {
      const v = snap.val();
      if (!v || !v.apodo) return;
      if (snap.key === state.uid) return;
      if (Date.now() - v.ts > 120000) return;
      showAvisoGrande('⚠️ ' + v.apodo + ' lleva mucho rato sin moverse y no responde. Échale un ojo.', '🆘');
      if (navigator.vibrate) navigator.vibrate([600, 200, 600, 200, 600]);
    });
  } catch (e) {}
}

// ============ 4. MODO VOLVER A CASA SEGURO ============
// Activas "volviendo a casa", eliges un amigo, y ese amigo ve tu trayecto
// hasta que llegas. Le avisa cuando llegas bien.

function activarVolverACasa(uidVigilante, apodoVigilante) {
  if (!state.myLocation) {
    showToast('Activa tu ubicación primero');
    return;
  }
  if (!FIREBASE_CONFIGURED || !db) return;
  try {
    fbDatabase().ref('grupos/' + state.grupo + '/volviendoACasa/' + state.uid).set({
      apodo: state.apodo || 'Alguien',
      vigilante: uidVigilante,
      apodoVigilante: apodoVigilante,
      activo: true,
      ts: Date.now()
    });
    state.volviendoACasa = { vigilante: uidVigilante, apodoVigilante: apodoVigilante };
    showToast('🏠 ' + apodoVigilante + ' vigilará que llegues bien');
    render();
  } catch (e) {}
}

function llegueACasa() {
  if (!FIREBASE_CONFIGURED || !db) return;
  try {
    // Marcar que llegué (el vigilante recibe el aviso) y luego borrar
    fbDatabase().ref('grupos/' + state.grupo + '/volviendoACasa/' + state.uid + '/llego').set(true);
    setTimeout(function() {
      try { fbDatabase().ref('grupos/' + state.grupo + '/volviendoACasa/' + state.uid).remove(); } catch (e) {}
    }, 5000);
  } catch (e) {}
  state.volviendoACasa = null;
  showToast('🏠 Avisado: llegaste bien. ¡Buenas noches!');
  render();
}

function subscribeToConexion() {
  if (!FIREBASE_CONFIGURED || !db) return;
  try {
    fbDatabase().ref('.info/connected').on('value', function(snap) {
      var conectado = snap.val() === true;
      if (state.firebaseConnected !== conectado) {
        state.firebaseConnected = conectado;
        render();
        if (conectado) {
          showToast('✅ Conexión restaurada');
          // Reconectar GPS si estaba compartiendo antes de perder conexión
          if (state.shareLocationActive && !state.watchId) {
            reconectarUbicacionSiHaceFalta();
          }
          // Forzar refresco de ubicaciones de los demás (el listener on('value')
          // puede quedar mudo tras una caída de WebSocket en móvil)
          try {
            var rUbic = fbUbicacionesRef();
            if (rUbic) rUbic.once('value', function(s) { procesarSnapshotUbicaciones(s); });
          } catch(e) {}
        }
      }
    });
  } catch(e) {}
}

function subscribeToVolverACasa() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToVolverACasa, 1000); return; }
  try {
    fbDatabase().ref('grupos/' + state.grupo + '/volviendoACasa').on('value', function(snap) {
      const todos = snap.val() || {};
      const vigilando = {};
      Object.keys(todos).forEach(function(uid) {
        const v = todos[uid];
        if (!v) return;
        // ¿Me eligió a mí como vigilante?
        if (v.vigilante === state.uid && v.activo) {
          vigilando[uid] = v;
          // Si llegó, avisarme
          if (v.llego && !state['_llego_' + uid]) {
            state['_llego_' + uid] = true;
            showAvisoGrande(v.apodo + ' ha llegado bien a casa 🏠', '✅');
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          }
        }
      });
      state.vigilandoA = vigilando;
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    });
  } catch (e) {}
}

// ============ HELPERS ============

function pad(n) { return String(n).padStart(2, '0'); }

function formatHour(ts) {
  const d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function getDateLabel(ts) {
  const d = ts ? new Date(ts) : new Date();
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear();
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function getReactionSum(reacciones) {
  return (reacciones.laugh || 0) + (reacciones.heart || 0) + (reacciones.mind || 0);
}

function getCampeona(anecdotasOfDay) {
  if (!anecdotasOfDay || anecdotasOfDay.length === 0) return null;
  let best = null;
  let bestSum = 0;
  for (let i = 0; i < anecdotasOfDay.length; i++) {
    const sum = getReactionSum(anecdotasOfDay[i].reacciones);
    if (sum > bestSum) {
      bestSum = sum;
      best = anecdotasOfDay[i];
    }
  }
  // Solo es campeona si tiene al menos 1 reacción
  return bestSum > 0 ? best : null;
}

function formatShareText(a) {
  const autor = a.autor ? a.autor : 'Anónimo';
  return '"' + a.texto + '"\n\n— ' + autor + ' · ' + a.fecha + ' · vía AFTERS';
}

function calcStats() {
  const total = state.anecdotas.length;
  if (total === 0) {
    return { total: 0, noches: 0, nocheTop: null, apodoTop: null, reaccionTop: null, campeonaAbsoluta: null };
  }

  // Noches
  const porNoche = {};
  state.anecdotas.forEach(function(a) {
    porNoche[a.fecha] = (porNoche[a.fecha] || 0) + 1;
  });
  const noches = Object.keys(porNoche).length;
  let nocheTop = { fecha: null, count: 0 };
  Object.keys(porNoche).forEach(function(f) {
    if (porNoche[f] > nocheTop.count) nocheTop = { fecha: f, count: porNoche[f] };
  });

  // Apodos
  const porApodo = {};
  let anonimas = 0;
  state.anecdotas.forEach(function(a) {
    if (a.autor) porApodo[a.autor] = (porApodo[a.autor] || 0) + 1;
    else anonimas++;
  });
  let apodoTop = { apodo: null, count: 0 };
  Object.keys(porApodo).forEach(function(p) {
    if (porApodo[p] > apodoTop.count) apodoTop = { apodo: p, count: porApodo[p] };
  });

  // Reacciones
  const reaccionTotales = { laugh: 0, heart: 0, mind: 0 };
  state.anecdotas.forEach(function(a) {
    reaccionTotales.laugh += a.reacciones.laugh || 0;
    reaccionTotales.heart += a.reacciones.heart || 0;
    reaccionTotales.mind += a.reacciones.mind || 0;
  });
  const emojiMap = { laugh: '😂', heart: '❤️', mind: '🤯' };
  let reaccionTop = { kind: null, emoji: null, count: 0 };
  Object.keys(reaccionTotales).forEach(function(k) {
    if (reaccionTotales[k] > reaccionTop.count) {
      reaccionTop = { kind: k, emoji: emojiMap[k], count: reaccionTotales[k] };
    }
  });

  // Campeona absoluta (la anécdota con más reacciones de TODO el histórico)
  let campeonaAbsoluta = null;
  let campeonaSum = 0;
  state.anecdotas.forEach(function(a) {
    const sum = getReactionSum(a.reacciones);
    if (sum > campeonaSum) {
      campeonaSum = sum;
      campeonaAbsoluta = a;
    }
  });

  return { total, noches, nocheTop, apodoTop, anonimas, reaccionTop, campeonaAbsoluta, campeonaSum };
}

// ============ FIREBASE HELPERS ============

function fbGrupoRef() {
  if (!db || !state.grupo) return null;
  return db.ref('grupos/' + state.grupo);
}

function fbAnecdotasRef() {
  const g = fbGrupoRef();
  return g ? g.child('anecdotas') : null;
}

function fbUbicacionesRef() {
  const g = fbGrupoRef();
  return g ? g.child('ubicaciones') : null;
}

function subscribeToFirebase() {
  const ref = fbAnecdotasRef();
  if (!ref) return;
  // Evitar registrar listeners duplicados si ya se llamó antes
  if (state.fbSubscribed) { state.firebaseConnected = true; return; }
  state.fbSubscribed = true;

  state.firebaseConnected = true;

  // Asegurar el registro de push ahora que ya hay grupo y uid. El registro del
  // arranque (registerServiceWorker) puede ejecutarse antes de que el login
  // anónimo fije state.uid, en cuyo caso no llega a guardarse en pushSubs/.
  // Aquí ya estamos dentro del grupo con uid, así que se completa el registro.
  if (swRegistration && typeof Notification !== 'undefined'
      && Notification.permission === 'granted'
      && PUSH_VAPID_PUBLIC !== 'REEMPLAZAR_CON_TU_VAPID_PUBLIC') {
    suscribirPush(swRegistration);
  }

  // Inicial: cargar todas las anécdotas
  ref.once('value').then(function(snap) {
    state.anecdotas = [];
    snap.forEach(function(child) {
      const a = child.val();
      a.id = child.key;
      state.anecdotas.push(a);
    });
    // Ordenar por timestamp descendente
    state.anecdotas.sort(function(a, b) { return b.timestamp - a.timestamp; });
    render();
    // Carga inicial completa: a partir de ahora sí notificar nuevas
    setTimeout(function() { notifReady = true; }, 500);
  }).catch(function(e) {
    console.error('Firebase load error:', e);
    state.firebaseConnected = false;
  });

  // Listener: nuevas anécdotas
  ref.on('child_added', function(snap) {
    const a = snap.val();
    a.id = snap.key;
    // Evitar duplicados con la carga inicial
    if (state.anecdotas.find(function(x) { return x.id === a.id; })) return;
    state.anecdotas.unshift(a);
    state.newId = a.id;
    render();
    // Notificar al usuario (solo si ya pasó la carga inicial)
    notifyNewAnecdota(a);
  });

  // Listener: actualizaciones (reacciones, etc.)
  ref.on('child_changed', function(snap) {
    const a = snap.val();
    a.id = snap.key;
    const idx = state.anecdotas.findIndex(function(x) { return x.id === a.id; });
    if (idx !== -1) {
      state.anecdotas[idx] = a;
      // Actualizar contadores en DOM sin re-render completo
      ['laugh', 'heart', 'mind'].forEach(function(kind) {
        const btns = document.querySelectorAll('[data-action="react"][data-id="' + a.id + '"][data-kind="' + kind + '"]');
        btns.forEach(function(btn) {
          const counter = btn.querySelector('.reaction-count');
          if (counter) counter.textContent = a.reacciones[kind] || 0;
        });
      });
    }
  });

  // Suscribirse a ubicaciones
  const locRef = fbUbicacionesRef();
  if (locRef) {
    locRef.on('value', function(snap) { procesarSnapshotUbicaciones(snap); });
  }
}

// Procesar un snapshot de Firebase de /ubicaciones y volcar en state.
// Se llama tanto desde el listener en tiempo real como desde los refrescos manuales
// (reconexión de Firebase, vuelta al primer plano).
function procesarSnapshotUbicaciones(snap) {
  const raw = snap.val() || {};
  const decoded = {};
  let totalEnFirebase = 0;
  let desencriptadasOk = 0;
  let fallosDesencriptado = 0;
  Object.keys(raw).forEach(function(uid) {
    const entry = raw[uid];
    if (!entry) return;
    totalEnFirebase++;
    const nombre = entry.apodo || uid;
    if (entry.data) {
      const loc = decryptLocation(entry.data);
      if (loc) {
        desencriptadasOk++;
        decoded[nombre] = {
          lat: loc.lat,
          lng: loc.lng,
          hasta: loc.until,
          bateria: loc.bateria != null ? loc.bateria : null,
          cargando: loc.cargando === true,
          conexion: loc.conexion || null,
          pantalla: loc.pantalla !== false,
          velocidad: loc.velocidad != null ? loc.velocidad : null,
          precision: loc.precision != null ? loc.precision : null,
          direccion: loc.direccion != null ? loc.direccion : null,
          altura: loc.altura != null ? loc.altura : null,
          calidadNet: loc.calidadNet != null ? loc.calidadNet : null,
          estado: entry.estado || '',
          uid: uid,
          ts: entry.ts
        };
      } else {
        fallosDesencriptado++;
      }
    } else if (entry.lat != null) {
      desencriptadasOk++;
      decoded[nombre] = entry;
    }
  });
  state.diagUbic = { total: totalEnFirebase, ok: desencriptadasOk, fallos: fallosDesencriptado };
  const miApodo = state.apodo;
  Object.keys(state.ubicaciones).forEach(function(nombre) {
    if (nombre !== miApodo && !decoded[nombre]) {
      delete state.ubicaciones[nombre];
    }
  });
  Object.keys(decoded).forEach(function(nombre) {
    if (nombre === miApodo && state.ubicaciones[miApodo]) return;
    state.ubicaciones[nombre] = decoded[nombre];
  });
  if (state.view === 'map' && state.mapInstance) {
    refreshMapMarkers();
  }
}

function fbPostAnecdota(anecdota) {
  const ref = fbAnecdotasRef();
  if (!ref) return Promise.reject('No Firebase');
  return ref.push(anecdota);

function fbReact(id, kind) {
  const ref = fbAnecdotasRef();
  if (!ref) return Promise.reject('No Firebase');
  return ref.child(id).child('reacciones').child(kind).transaction(function(current) {
    return (current || 0) + 1;
  });
}

// ============ ENCRIPTACIÓN AES-256 ============

function getEncryptionKey() {
  // Clave única basada SOLO en el grupo, normalizada (mayúsculas, sin espacios)
  // para que todos los miembros generen EXACTAMENTE la misma llave
  if (!state.grupo) return null;
  const grupoNorm = String(state.grupo).trim().toUpperCase();
  return grupoNorm + '-afters-2026';
}

function encryptLocation(lat, lng, until, bateria) {
  const key = getEncryptionKey();
  if (!key) return null;
  
  // Si CryptoJS no cargó, no encriptar (mejor funcionar sin encriptar que romperse)
  if (typeof CryptoJS === 'undefined') {
    console.warn('CryptoJS no disponible, ubicación sin encriptar');
    return null;
  }
  
  const data = JSON.stringify({
    lat: lat,
    lng: lng,
    until: until,
    bateria: bateria != null ? bateria : null,
    cargando: state.cargandoActual === true,
    conexion: state.conexionActual || null,
    pantalla: state.pantallaActiva === true,
    velocidad: state.velocidadActual != null ? state.velocidadActual : null,
    precision: state.precisionActual != null ? state.precisionActual : null,
    direccion: state.direccionActual != null ? state.direccionActual : null,
    altura: state.alturaActual != null ? state.alturaActual : null,
    calidadNet: state.calidadNet != null ? state.calidadNet : null,
    tipoConexion: state.tipoConexion || null,
    ahorroDatos: state.ahorroDatos === true,
    modoOscuro: state.modoOscuro === true,
    ts: Date.now()
  });
  
  try {
    const encrypted = CryptoJS.AES.encrypt(data, key).toString();
    return encrypted;
  } catch (e) {
    console.error('Error encriptando ubicación:', e);
    return null;
  }
}

function decryptLocation(encrypted) {
  const key = getEncryptionKey();
  if (!key) return null;
  
  // Si CryptoJS no cargó, no se puede desencriptar
  if (typeof CryptoJS === 'undefined') {
    return null;
  }
  
  try {
    const decrypted = CryptoJS.AES.decrypt(encrypted, key).toString(CryptoJS.enc.Utf8);
    if (!decrypted) return null;
    return JSON.parse(decrypted);
  } catch (e) {
    console.error('Error desencriptando ubicación:', e);
    return null;
  }
}

function fbSetUbicacion(lat, lng, until) {
  const ref = fbUbicacionesRef();
  if (!ref || !state.uid) return Promise.reject('No Firebase');
  // Modo discreto: no enviar ubicación al grupo
  if (state.modoDiscreto) return Promise.resolve();
  
  const bateria = state.bateriaActual != null ? state.bateriaActual : null;
  const encrypted = encryptLocation(lat, lng, until, bateria);
  if (!encrypted) {
    return Promise.reject('Encryption failed');
  }
  
  // Guardar con el UID (las reglas de Firebase exigen que la clave sea tu UID).
  // El apodo va DENTRO del dato para poder mostrarlo en el mapa.
  return ref.child(state.uid).set({
    apodo: state.apodo || 'Anónimo',
    data: encrypted,  // Ubicación encriptada
    estado: state.miEstado || '',  // Estado corto que ven todos
    ts: Date.now()
  });
}
