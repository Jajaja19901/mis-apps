function guardarGrupoEnLista(codigo, apodo) {
  if (!codigo) return;
  try {
    const lista = JSON.parse(localStorage.getItem(STORAGE_KEY_MIS_GRUPOS) || '[]');
    // Actualizar si ya existe, añadir si no
    const idx = lista.findIndex(function(g) { return g.codigo === codigo; });
    const nombre = localStorage.getItem('afters_nombregrupo_' + codigo) || '';
    if (idx >= 0) {
      lista[idx] = { codigo: codigo, apodo: apodo || lista[idx].apodo || '', nombre: nombre };
    } else {
      lista.push({ codigo: codigo, apodo: apodo || '', nombre: nombre });
    }
    localStorage.setItem(STORAGE_KEY_MIS_GRUPOS, JSON.stringify(lista));
    state.misGrupos = lista;
  } catch (e) {}
}

function cambiarDeGrupo(codigo) {
  if (!codigo || codigo === state.grupo) return;
  // Guardar el grupo nuevo y recargar la app limpia
  try { localStorage.setItem(STORAGE_KEY_GRUPO, codigo); } catch (e) {}
  // Recuperar el apodo guardado para ese grupo (si lo hay)
  try {
    const lista = JSON.parse(localStorage.getItem(STORAGE_KEY_MIS_GRUPOS) || '[]');
    const g = lista.find(function(x) { return x.codigo === codigo; });
    if (g && g.apodo) localStorage.setItem(STORAGE_KEY_APODO, g.apodo);
  } catch (e) {}
  // Recargar limpio (desconecta Firebase, borra todo el estado)
  window.location.reload();
}

function quitarGrupoDeLista(codigo) {
  if (!confirm('¿Quitar "' + codigo + '" de tu lista? Seguirás siendo miembro, pero tendrás que buscar el código para volver.')) return;
  try {
    const lista = JSON.parse(localStorage.getItem(STORAGE_KEY_MIS_GRUPOS) || '[]');
    const nueva = lista.filter(function(g) { return g.codigo !== codigo; });
    localStorage.setItem(STORAGE_KEY_MIS_GRUPOS, JSON.stringify(nueva));
    state.misGrupos = nueva;
    render();
  } catch (e) {}
}

// Captura y comprime la foto del avatar (80x80, muy comprimida)
function onAvatarFotoElegida(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = 80; canvas.height = 80;
      var ctx = canvas.getContext('2d');
      // Crop cuadrado centrado
      var lado = Math.min(img.width, img.height);
      var ox = (img.width - lado) / 2;
      var oy = (img.height - lado) / 2;
      ctx.drawImage(img, ox, oy, lado, lado, 0, 0, 80, 80);
      state.fotoAvatarTemp = canvas.toDataURL('image/jpeg', 0.5);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function subscribeToToques() {

  if (!FIREBASE_CONFIGURED || !db || !state.uid || !state.grupo) {
    setTimeout(subscribeToToques, 1000);
    return;
  }
  try {
    // Escucho los toques dirigidos A MÍ (a mi uid)
    const ref = fbDatabase().ref('grupos/' + state.grupo + '/toques/' + state.uid);
    ref.on('value', function(snap) {
      const toque = snap.val();
      if (!toque || !toque.ts) return;
      // Solo si es reciente (menos de 30s) y no lo he visto ya
      if (Date.now() - toque.ts > 30000) return;
      if (state.ultimoToqueVisto === toque.ts) return;
      // Si el que toca está silenciado, ignorar silenciosamente
      if (toque.deUid && estaSilenciado(toque.deUid)) {
        try { fbDatabase().ref('grupos/' + state.grupo + '/toques/' + state.uid).remove(); } catch(e){}
        return;
      }
      state.ultimoToqueVisto = toque.ts;

      // Vibrar fuerte, sonar y avisar EN GRANDE
      if (navigator.vibrate) navigator.vibrate([400, 150, 400, 150, 400, 150, 600]);
      try { reproducirToqueSonido(); } catch (e) {}
      showAvisoGrande((toque.de || 'Alguien') + ' te ha dado un toque', '👋');

      // Borrar el toque para que no vuelva a sonar
      try {
        fbDatabase().ref('grupos/' + state.grupo + '/toques/' + state.uid).remove();
      } catch (e) {}
    });
  } catch (e) {}
}

// Sonido corto del toque (distinto de la alarma SOS)
function reproducirToqueSonido() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.6, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) {}
}

// ============ MIGAS DE PAN (rastro de la noche) ============
// Guarda por dónde ha pasado cada uno, para ver el recorrido al clicar su punto.
let ultimaMigaTs = 0;
function guardarMigaDePan(lat, lng) {
  if (!FIREBASE_CONFIGURED || !db || !state.uid || !state.grupo) return;
  const ahora = Date.now();
  // Guardar como mucho una miga cada 30 segundos (no llenar Firebase)
  if (ahora - ultimaMigaTs < 30000) return;
  ultimaMigaTs = ahora;
  try {
    const ref = fbDatabase().ref('grupos/' + state.grupo + '/rastros/' + state.uid);
    ref.push({ lat: lat, lng: lng, ts: ahora });
  } catch (e) {}
}

function subscribeToNochesArchivadas() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToNochesArchivadas, 1000); return; }
  try {
    const archRef = fbDatabase().ref('grupos/' + state.grupo + '/nochesArchivadas');
    archRef.on('value', function(snap) {
      const data = snap.val() || {};
      state.nochesArchivadas = Object.keys(data).map(function(k) { return data[k]; })
        .sort(function(a, b) { return b.timestamp - a.timestamp; });
      if (state.view === 'history') render();
    });
  } catch (e) {}
}

function subscribeToRastros() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToRastros, 1000); return; }
  try {
    const ref = fbDatabase().ref('grupos/' + state.grupo + '/rastros');
    ref.on('value', function(snap) {
      const raw = snap.val() || {};
      state._rastrosRaw = raw;  // crudo, para calcular estadísticas de la noche
      const rastros = {};  // { apodo: [ [lat,lng], ... ] }
      const ahora = Date.now();
      Object.keys(raw).forEach(function(uid) {
        const puntos = raw[uid];
        if (!puntos) return;
        // Buscar el apodo de ese uid (de las ubicaciones actuales)
        let apodo = uid;
        Object.keys(state.ubicaciones).forEach(function(ap) {
          if (state.ubicaciones[ap] && state.ubicaciones[ap].uid === uid) apodo = ap;
        });
        const lista = Object.keys(puntos)
          .map(function(k) { return puntos[k]; })
          .filter(function(p) { return p && (ahora - p.ts) < 21600000; })  // últimas 6h
          .sort(function(a, b) { return a.ts - b.ts; })
          .map(function(p) { return [p.lat, p.lng]; });
        if (lista.length > 1) {
          rastros[apodo] = lista;
          rastros[uid] = lista;  // también por uid, por si la persona ya no comparte ubicación
        }
      });
      state.rastros = rastros;
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    });
  } catch (e) {}
}

async function fbUploadPhoto(blob) {
  if (!storage || !state.grupo) throw new Error('No Firebase Storage');
  const fileName = 'fotos/' + state.grupo + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.jpg';
  const ref = storage.ref(fileName);
  const snapshot = await ref.put(blob);
  return await snapshot.ref.getDownloadURL();
}

function fbMetaRef() {

async function ensureAuth() {
  if (!auth || !FIREBASE_CONFIGURED) return null;
  if (state.uid) return state.uid;

  return new Promise(function(resolve, reject) {
    const unsubscribe = auth.onAuthStateChanged(function(user) {
      if (user) {
        state.uid = user.uid;
        state.authReady = true;
        unsubscribe();
        resolve(user.uid);
      } else {
        // No user, sign in anonymously
        auth.signInAnonymously().catch(function(e) {
          console.error('Auth fallo:', e);
          state.authReady = true;
          unsubscribe();
          reject(e);
        });
      }
    });
  });
}

async function checkMembershipAndProceed() {
  if (!FIREBASE_CONFIGURED) {
    // Modo demo: saltar todo. Eres admin para poder probar todas las funciones.
    state.authView = 'ok';
    state.estaAprobado = true;
    state.esAdmin = true;
    if (state.anecdotas.length === 0) state.anecdotas = seedAnecdotas();
    render();
    return;
  }

  try {
    await ensureAuth();
  } catch (e) {
    showToast('ERROR DE AUTENTICACIÓN');
    return;
  }

  const metaRef = fbMetaRef();
  const miembrosRef = fbMiembrosRef();
  const solicitudesRef = fbSolicitudesRef();
  if (!metaRef || !miembrosRef || !solicitudesRef) return;

  // 1. Comprobar si el grupo existe
  let metaSnap;
  try {
    metaSnap = await metaRef.once('value');
  } catch (e) {
    showToast('ERROR ACCEDIENDO AL GRUPO');
    return;
  }

  const meta = metaSnap.val();
  const adminUid = meta ? meta.admin_uid : null;

  // Si meta no existe, O si existe pero está "a medias" (sin admin_uid) y yo soy
  // el creador → lo trato como creación nueva y quedo como admin.
  // Esto evita el bug de pedirle aprobación al propio creador del grupo.
  if (!meta || (!adminUid && state.esCreador)) {
    // El grupo NO existe. Lo creamos siendo yo el admin.
    state.authView = 'creando';
    render();
    try {
      await metaRef.set({
        admin_uid: state.uid,
        nombre: state.nombreGrupo || '',
        tipoGrupo: state._tipoGrupoTemp || 'fiesta',
        config: state.grupoConfig,
        creado: Date.now()
      });
      // Y me añado a mí mismo como miembro
      await miembrosRef.child(state.uid).set({
        apodo: state.apodo || 'ADMIN',
        nombre: 'ADMIN',
        aprobadoPor: state.uid,
        timestamp: Date.now()
      });
      state.esAdmin = true;
      state.estaAprobado = true;
      subscribeToFirebase();
      subscribeToMiembrosYSolicitudes();
      // Si yo acabo de crear el grupo, mostrar pantalla con el código
      if (state.esCreador) {
        state.authView = 'codigoListo';
      } else {
        state.authView = 'ok';
      }
      render();
      return;
    } catch (e) {
      console.error('Error creando grupo:', e);
      showToast('NO SE PUDO CREAR EL GRUPO');
      return;
    }
  }

  // El grupo SÍ existe.
  state.esAdmin = esAdminDe(meta);
  state.soyPrincipal = soyAdminPrincipal(meta);
  state.soyEncargado = esEncargadoDe(meta);
  if (meta && meta.tipoGrupo && TIPOS_GRUPO[meta.tipoGrupo]) state.tipoGrupo = meta.tipoGrupo;
  if (meta && meta.config) cargarConfigGrupo(meta.config);
  // Leer el nombre del grupo que le puso el creador
  if (meta && meta.nombre) {
    state.nombreGrupo = meta.nombre;
    try { localStorage.setItem('afters_nombregrupo_' + state.grupo, meta.nombre); } catch (e) {}
  }

  // 2. Comprobar si soy miembro
  let miembroSnap;
  try {
    miembroSnap = await miembrosRef.child(state.uid).once('value');
  } catch (e) {
    miembroSnap = null;
  }

  if (miembroSnap && miembroSnap.exists()) {
    // Soy miembro aprobado
    state.estaAprobado = true;
    const m = miembroSnap.val();
    if (m && m.apodo && !state.apodo) {
      state.apodo = m.apodo;
      try { localStorage.setItem(STORAGE_KEY_APODO, m.apodo); } catch (e) {}
    }
    state.authView = 'ok';
    guardarGrupoEnLista(state.grupo, state.apodo);  // registrar en lista de mis grupos
    subscribeToFirebase();
    subscribeToMiembrosYSolicitudes();
    render();
    return;
  }

  // 3. No soy miembro. ¿Tengo solicitud pendiente?
  let solicitudSnap;
  try {
    solicitudSnap = await solicitudesRef.child(state.uid).once('value');
  } catch (e) {
    solicitudSnap = null;
  }

  if (solicitudSnap && solicitudSnap.exists()) {
    const s = solicitudSnap.val();
    if (s.estado === 'rejected') {
      state.authView = 'rechazado';
    } else {
      state.authView = 'esperando';
      // Listener: cuando me aprueban, mi miembro aparece
      escucharAprobacion();
    }
    render();
    return;
  }

  // 4. No tengo solicitud. Mostrar formulario.
  state.authView = 'solicitar';
  render();
}

function escucharAprobacion() {
  if (pendingApprovalListener) return; // ya hay listener
  const ref = fbMiembrosRef();
  if (!ref) return;

  pendingApprovalListener = ref.child(state.uid);
  pendingApprovalListener.on('value', function(snap) {
    if (snap.exists()) {
      // Me aprobaron
      state.estaAprobado = true;
      state.authView = 'ok';
      pendingApprovalListener.off();
      pendingApprovalListener = null;
      guardarGrupoEnLista(state.grupo, state.apodo);  // guardar en lista de mis grupos
      subscribeToFirebase();
      subscribeToMiembrosYSolicitudes();
      showToast('APROBADO. BIENVENIDO');
      render();
    }
  });

  // También escuchar rechazo de la solicitud
  const solRef = fbSolicitudesRef();
  if (solRef) {
    solRef.child(state.uid).on('value', function(snap) {
      const s = snap.val();
      if (s && s.estado === 'rejected') {
        state.authView = 'rechazado';
        if (pendingApprovalListener) {
          pendingApprovalListener.off();
          pendingApprovalListener = null;
        }
        render();
      }
    });
  }
}

  const miembrosRef = fbMiembrosRef();

    updateAdminBadge();

  subscribeToMetaChanges();

  if (state.esAdmin) {

function countPendientes() {
  let count = 0;
  Object.keys(state.solicitudes || {}).forEach(function(uid) {
    const s = state.solicitudes[uid];
    if (s && s.estado !== 'rejected' && !state.miembros[uid]) count++;
  });
  return count;
}

  return !!(meta && state.uid && meta.admin_uid === state.uid);

  if (!meta || !state.uid) return false;
  return !!(meta.encargados && meta.encargados[state.uid]);

// Puede colocar el punto de encuentro: admin, co-admin O encargado
function puedeColocarPunto() {

  return state.estaAprobado === true || state.esAdmin || state.soyEncargado;

function subscribeToMetaChanges() {
  const metaRef = fbMetaRef();

    const wasAdmin = state.esAdmin;

    if (meta.ultimoCierreNoche) state.ultimoCierreNoche = meta.ultimoCierreNoche;
    // Si cambió mi rol, refrescar la UI
    if (wasAdmin !== state.esAdmin) {
      if (state.esAdmin) {
        showToast('AHORA ERES ADMIN');
        // Empezar a escuchar solicitudes (acabo de tener permisos)
        const solicitudesRef = fbSolicitudesRef();
        if (solicitudesRef) {
          solicitudesRef.on('value', function(snap) {
            const prevUids = Object.keys(state.solicitudes || {});
            const newSolics = snap.val() || {};
            Object.keys(newSolics).forEach(function(uid) {
              const s = newSolics[uid];
              if (prevUids.indexOf(uid) === -1 && s.estado !== 'rejected' && !state.miembros[uid]) {
                notifyNewSolicitud(s);
              }
            });
            state.solicitudes = newSolics;
            updateAdminBadge();
          });
        }
      } else {
        showToast('YA NO ERES ADMIN');

        if (state.view === 'pendientes' || state.view === 'miembros' || state.view === 'admin') {
          state.view = 'main';

      }
      render();
    }
  });

// ============ GEOLOCATION HELPERS ============

function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000; // metros
  const toRad = function(x) { return x * Math.PI / 180; };
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
    + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2))
    * Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Calcula las estadísticas de la noche de cada persona, a partir de sus rastros (migas).
// Devuelve un objeto por apodo con: km, horaLlegada, horaSalida, minutosFiesta,
// minutosParado, minutosMovido, anecdotas, toques.
function calcularEstadisticasNoche() {
  const stats = {};

  // 1. Recorrer los rastros de cada persona
  const rastrosRaw = state._rastrosRaw || {};  // { uid: { pushid: {lat,lng,ts} } }
  Object.keys(rastrosRaw).forEach(function(uid) {
    const puntosObj = rastrosRaw[uid];
    if (!puntosObj) return;
    // Ordenar los puntos por tiempo
    const puntos = Object.keys(puntosObj).map(function(k) { return puntosObj[k]; })
      .filter(function(p) { return p && p.lat != null && p.ts; })
      .sort(function(a, b) { return a.ts - b.ts; });
    if (puntos.length === 0) return;

    // Buscar el apodo de ese uid
    let apodo = uid;
    Object.keys(state.ubicaciones).forEach(function(ap) {
      if (state.ubicaciones[ap] && state.ubicaciones[ap].uid === uid) apodo = ap;
    });
    // Si no está en ubicaciones, buscar en miembros
    if (apodo === uid && state.miembros && state.miembros[uid] && state.miembros[uid].apodo) {
      apodo = state.miembros[uid].apodo;
    }

    let metros = 0;
    let msParado = 0;
    let msMovido = 0;
    for (let i = 1; i < puntos.length; i++) {
      const d = haversineDistance(puntos[i-1].lat, puntos[i-1].lng, puntos[i].lat, puntos[i].lng);
      metros += d;
      const dt = puntos[i].ts - puntos[i-1].ts;
      // Si entre dos puntos se movió menos de 20 metros, estaba "parado"
      if (d < 20) msParado += dt; else msMovido += dt;
    }

    stats[apodo] = {
      uid: uid,
      km: metros / 1000,
      horaLlegada: puntos[0].ts,
      horaSalida: puntos[puntos.length - 1].ts,
      minutosFiesta: Math.round((puntos[puntos.length - 1].ts - puntos[0].ts) / 60000),
      minutosParado: Math.round(msParado / 60000),
      minutosMovido: Math.round(msMovido / 60000),
      anecdotas: 0,
      toques: 0
    };
  });

  // 2. Contar anécdotas de cada persona en esta noche
  (state.anecdotas || []).forEach(function(a) {
    const autor = a.autor;
    if (autor && stats[autor]) stats[autor].anecdotas++;
  });

  // 3. Contar toques enviados (los tenemos en state._toquesEnviados si los registramos)
  const toquesEnv = state._toquesEnviadosNoche || {};
  Object.keys(toquesEnv).forEach(function(apodo) {
    if (stats[apodo]) stats[apodo].toques = toquesEnv[apodo];
  });

  return stats;
}

// Convierte minutos en texto "Xh Ym"
function minutosATexto(min) {
  if (min == null) return '—';
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
}

// Hora HH:MM de un timestamp
function tsAHora(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function compassDirection(lat1, lng1, lat2, lng2) {
  const dLat = lat2 - lat1;
  const dLng = lng2 - lng1;
  let angle = Math.atan2(dLng, dLat) * 180 / Math.PI;
  if (angle < 0) angle += 360;
  if (angle >= 337.5 || angle < 22.5) return 'N';
  if (angle < 67.5) return 'NE';
  if (angle < 112.5) return 'E';
  if (angle < 157.5) return 'SE';
  if (angle < 202.5) return 'S';
  if (angle < 247.5) return 'SO';
  if (angle < 292.5) return 'O';
  return 'NO';
}

// Calcula bearing exacto (0-360°) desde punto A hacia B
function calculateBearing(lat1, lng1, lat2, lng2) {
  const toRad = function(x) { return x * Math.PI / 180; };
  const toDeg = function(x) { return x * 180 / Math.PI; };
  const dLng = toRad(lng2 - lng1);
  const y = Math.sin(dLng) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
  let bearing = toDeg(Math.atan2(y, x));
  return (bearing + 360) % 360;
}

// Retorna instrucción basado en orientación del móvil vs rumbo al destino
// bearing: rumbo hacia dónde está el amigo (0-360)
// heading: hacia dónde apunta el móvil (0-360)
function getNavigationInstruction(bearing, heading) {
  if (!heading && heading !== 0) return '🧭 Activa brújula del móvil';
  const diff = (bearing - heading + 360) % 360;
  if (diff < 15 || diff > 345) return '⬆️ SIGUE ADELANTE';
  if (diff < 90) return '↗️ GIRA A LA DERECHA';
  if (diff < 180) return '➡️ GIRA MUCHO A LA DERECHA';
  if (diff < 270) return '↙️ GIRA A LA IZQUIERDA';
  return '⬅️ GIRA MUCHO A LA IZQUIERDA';
}

// Registra listener para DeviceOrientation (brújula)
function startDeviceOrientationListener() {
  if (typeof DeviceOrientationEvent === 'undefined') return;
  
  // Pedir permiso en iOS 13+
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(permissionState) {
        if (permissionState === 'granted') {
          window.addEventListener('deviceorientation', handleDeviceOrientation);
        }
      })
      .catch(function() {
        // User denied or error
      });
  } else {
    // Android o navegadores sin requestPermission.
    // 'deviceorientationabsolute' da el norte real; si no, usar el normal.
    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
    } else {
      window.addEventListener('deviceorientation', handleDeviceOrientation);
    }
  }
}

function handleDeviceOrientation(event) {
  // La brújula del móvil. Hay dos formas según el móvil:
  // - iPhone: event.webkitCompassHeading ya da los grados correctos (0 = norte)
  // - Android: event.alpha; SOLO sirve para el norte si event.absolute es true
  let heading;
  if (typeof event.webkitCompassHeading === 'number' && !isNaN(event.webkitCompassHeading)) {
    // iPhone: dato directo y correcto
    heading = event.webkitCompassHeading;
    state.brujulaFiable = true;
  } else if (event.alpha != null) {
    // Android: alpha. Va al revés respecto al norte.
    heading = 360 - event.alpha;
    // Solo es fiable (apunta al norte real) si el evento es "absoluto"
    state.brujulaFiable = (event.absolute === true);
  } else {
    return;
  }
  state.deviceHeading = (heading + 360) % 360;
}

function stopDeviceOrientationListener() {
  window.removeEventListener('deviceorientation', handleDeviceOrientation);
  window.removeEventListener('deviceorientationabsolute', handleDeviceOrientation);
  state.deviceHeading = null;
}

// Limpia las flechas del recorrido estático del mapa
function limpiarFlechasRastro() {
  if (state._rastroArrows && state._rastroArrows.length && state.mapInstance) {
    state._rastroArrows.forEach(function(m) { try { state.mapInstance.removeLayer(m); } catch(e) {} });
  }
  state._rastroArrows = [];
}

// Muestra el recorrido como línea + flechas de dirección (vista estática, sin animación)
function mostrarRecorridoEstatico(apodo) {
  const puntos = state.rastros && state.rastros[apodo];
  if (!puntos || puntos.length < 2 || !state.mapInstance) {
    showToast('No hay recorrido de ' + apodo);
    return;
  }
  detenerReproduccion(true);
  if (state.rastroLayer) {
    try { state.mapInstance.removeLayer(state.rastroLayer); } catch(e) {}
    state.rastroLayer = null;
  }
  limpiarFlechasRastro();

  // Línea del recorrido completo
  const linea = L.polyline(puntos, { color: '#7a5cff', weight: 5, opacity: 0.88 }).addTo(state.mapInstance);
  state.rastroLayer = linea;

  // Punto de inicio (cyan) y fin (rosa)
  try {
    L.circleMarker(puntos[0], { radius: 8, color: '#00f0ff', fillColor: '#00f0ff', fillOpacity: 1, weight: 2 })
      .addTo(state.mapInstance).bindPopup('🟢 Inicio · ' + escapeHtml(apodo));

      .addTo(state.mapInstance).bindPopup('🔴 Fin · ' + escapeHtml(apodo));
  } catch(e) {}

  // Puntito en cada punto GPS registrado (excepto el inicio y el fin, que ya tienen marcador)
  for (var i = 1; i < puntos.length - 1; i++) {
    try {
      var mk = L.circleMarker(puntos[i], {
        radius: 4, color: '#7a5cff', fillColor: '#c8b8ff',
        fillOpacity: 1, weight: 1.5, opacity: 0.9
      }).addTo(state.mapInstance);
      state._rastroArrows.push(mk);
    } catch(e) {}
  }

  state.mapInstance.fitBounds(L.latLngBounds(puntos), { padding: [55, 55], maxZoom: 16 });
  showToast('👣 ' + escapeHtml(apodo) + ' · ' + puntos.length + ' puntos · toca el mapa para quitar');
}

// Dibuja en el mapa el recorrido animado (marcador que camina punto a punto)
function verRecorrido(apodo) {
  iniciarReproduccion(apodo);
}

function iniciarReproduccion(apodo) {
  const puntos = state.rastros && state.rastros[apodo];
  if (!puntos || puntos.length < 2 || !state.mapInstance) {
    showToast('No hay recorrido guardado de ' + apodo);
    return;
  }
  // Limpiar reproducción o rastro anterior
  detenerReproduccion(true);
  limpiarFlechasRastro();
  if (state.rastroLayer) {
    try { state.mapInstance.removeLayer(state.rastroLayer); } catch(e) {}
    state.rastroLayer = null;
  }

  // Línea del rastro: se dibuja ENTERA de golpe para que se vea al instante
  const trailLayer = L.polyline(puntos, {
    color: '#7a5cff', weight: 5, opacity: 0.9
  }).addTo(state.mapInstance);
  // Puntos de inicio y fin bien marcados
  try {
    L.circleMarker(puntos[0], { radius: 7, color: '#00f0ff', fillColor: '#00f0ff', fillOpacity: 1, weight: 2 }).addTo(state.mapInstance).bindPopup('Inicio');
    L.circleMarker(puntos[puntos.length-1], { radius: 7, color: '#ff0080', fillColor: '#ff0080', fillOpacity: 1, weight: 2 }).addTo(state.mapInstance).bindPopup('Fin');
  } catch(e) {}

  // Marcador animado (avatar de la persona)
  const uid = state.ubicaciones[apodo] ? state.ubicaciones[apodo].uid : null;
  const avatarData = uid && state.avatarsMapa ? (state.avatarsMapa[uid] || null) : null;
  const avatarHTML = renderAvatarHTML(avatarData, 34, apodo);
  const mkIcon = L.divIcon({
    className: 'map-marker-custom',
    html: '<div style="position:relative;">'
      + avatarHTML
      + '<div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,0.9);color:#fff;font-family:DM Sans,sans-serif;font-size:9px;padding:2px 6px;border-radius:8px;white-space:nowrap;border:1px solid #7a5cff;">' + escapeHtml(apodo) + '</div>'
      + '</div>',
    iconSize: [34, 34], iconAnchor: [17, 17]
  });
  const markerAnim = L.marker(puntos[0], { icon: mkIcon, zIndexOffset: 9000 }).addTo(state.mapInstance);

  // Encuadrar el recorrido entero
  const bounds = L.latLngBounds(puntos);
  state.mapInstance.fitBounds(bounds, { padding: [60, 60], maxZoom: 16, animate: true });

  state.reproduccion = {
    apodo: apodo, puntos: puntos, idx: 0,
    trailLayer: trailLayer, markerAnim: markerAnim,
    pausado: false, velocidad: 2, timer: null
  };
  // NO llamar a render() aquí: borraría la línea recién dibujada en el mapa
  setTimeout(avanzarReproduccion, 600); // pequeña pausa antes de empezar
}

function avanzarReproduccion() {
  const r = state.reproduccion;
  if (!r || r.pausado) return;
  var velocidades = {1: 450, 2: 130, 3: 35};
  var delay = velocidades[r.velocidad] || 130;

  r.timer = setTimeout(function() {
    if (!state.reproduccion) return;
    r.idx++;
    if (r.idx >= r.puntos.length) {
      finalizarReproduccion();
      return;
    }
    var pt = r.puntos[r.idx];
    r.markerAnim.setLatLng(pt);
    r.trailLayer.addLatLng(pt);
    // Seguir el marcador suavemente
    if (r.idx % 4 === 0) {
      state.mapInstance.panTo(pt, { animate: true, duration: 0.15 });
    }
    // Actualizar barra sin re-render completo
    var pct = Math.round((r.idx / (r.puntos.length - 1)) * 100);
    var fill = document.querySelector('.repro-barra-fill');
    var pctEl = document.querySelector('.repro-pct');
    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
    avanzarReproduccion();
  }, delay);
}

function finalizarReproduccion() {
  var r = state.reproduccion;
  if (!r) return;
  if (r.timer) clearTimeout(r.timer);
  // Dejar el rastro completo visible (NO llamar a render: borraría la línea del mapa)
  state.rastroLayer = r.trailLayer;
  try { state.mapInstance.removeLayer(r.markerAnim); } catch(e) {}
  // Asegurar que la línea entera está dibujada y encuadrada
  try {
    r.trailLayer.setLatLngs(r.puntos);
    state.mapInstance.fitBounds(L.latLngBounds(r.puntos), { padding: [60, 60], maxZoom: 16 });
  } catch(e) {}
  state.reproduccion = null;
  showToast('👣 Recorrido de ' + r.apodo + ' · ' + r.puntos.length + ' puntos. Toca el mapa para quitarlo.');
}

function detenerReproduccion(silencioso) {
  var r = state.reproduccion;
  if (!r) return;
  if (r.timer) clearTimeout(r.timer);
  try { state.mapInstance.removeLayer(r.trailLayer); } catch(e) {}
  try { state.mapInstance.removeLayer(r.markerAnim); } catch(e) {}
  limpiarFlechasRastro();
  state.reproduccion = null;
  if (!silencioso) render();
}

function togglePausaReproduccion() {
  var r = state.reproduccion;
  if (!r) return;
  r.pausado = !r.pausado;
  if (!r.pausado) avanzarReproduccion();
  render();
}

function startNavigating(apodo) {
  // Buscar la ubicación del amigo por apodo; si no, por uid (respaldo)
  var u = state.ubicaciones[apodo];
  if (!u) {
    for (var ap in state.ubicaciones) {
      if (state.ubicaciones[ap] && (state.ubicaciones[ap].uid === apodo)) { u = state.ubicaciones[ap]; apodo = ap; break; }
    }
  }
  if (!u || u.lat == null || u.lng == null) {
    showToast('No tengo la ubicación de ' + apodo + ' todavía');
    return;
  }
  // Si no tengo MI ubicación, la pido pero igualmente arranco la brújula
  if (!state.myLocation && navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(p) {
      state.myLocation = { lat: p.coords.latitude, lng: p.coords.longitude, accuracy: p.coords.accuracy };
      actualizarFlechaFlotante();
    }, function(){}, { enableHighAccuracy: true, timeout: 10000 });
  }

  state.navigatingTo = {
    apodo: apodo,
    lat: u.lat,
    lng: u.lng
  };
  
  state.navChat = [];  // Limpiar chat anterior
  
  // Activar brújula
  startDeviceOrientationListener();
  
  // Suscribirse al chat
  subscribeToNavChat();
  
  // GUÍA FLOTANTE: quedarse en el mapa con la flecha flotando encima (no pantalla aparte)
  state.guiaFlotante = true;
  if (state.view !== 'map') state.view = 'map';
  render();
  
  // Actualizar la flecha cada 500ms (sin redibujar el mapa entero)
  state.navigationInterval = setInterval(function() {
    actualizarFlechaFlotante();
  }, 500);
}

// Enviar un emote. Si paraUid es null, sale sobre MÍ. Si tiene valor, sale sobre esa persona.
function enviarEmote(emoji, paraUid) {
  const sobreUid = paraUid || state.uid;
  if (FIREBASE_CONFIGURED && db && state.grupo) {
    try {
      fbDatabase().ref('grupos/' + state.grupo + '/emotes/' + sobreUid).set({
        emoji: emoji,
        ts: Date.now(),
        apodo: state.apodo || 'Alguien',
        propio: !paraUid
      });
    } catch (e) {}
  }
  // Mostrarlo también en mi pantalla al instante
  state.emotesMapa[sobreUid] = { emoji: emoji, ts: Date.now() };
  if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
  setTimeout(function() {
    if (state.emotesMapa[sobreUid] && Date.now() - state.emotesMapa[sobreUid].ts >= 5900) {
      delete state.emotesMapa[sobreUid];
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    }
  }, 6000);
}

// Escuchar los emotes que mandan los demás
function subscribeToEmotes() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToEmotes, 1000); return; }
  try {
    fbDatabase().ref('grupos/' + state.grupo + '/emotes').on('value', function(snap) {
      const raw = snap.val() || {};
      const now = Date.now();
      Object.keys(raw).forEach(function(uid) {
        const e = raw[uid];
        if (!e || !e.emoji) return;
        if (now - e.ts > 6000) return;
        const yaLoTengo = state.emotesMapa[uid] && state.emotesMapa[uid].ts === e.ts;
        if (!yaLoTengo) {
          state.emotesMapa[uid] = { emoji: e.emoji, ts: e.ts };
          setTimeout(function() {
            if (state.emotesMapa[uid] && state.emotesMapa[uid].ts === e.ts) {
              delete state.emotesMapa[uid];
              if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
            }
          }, 6000);
        }
      });
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    });
  } catch (e) {}
}

function subscribeToFrases() {

      Object.keys(raw).forEach(function(uid) {
        const f = raw[uid];
        if (!f || !f.texto) return;
        if (now - f.ts > 8000) return;
        // Si quien mandó la frase está silenciado, ignorar
        if (estaSilenciado(uid)) return;
        const yaLaTengo = state.frasesMapa[uid] && state.frasesMapa[uid].ts === f.ts;
        if (!yaLaTengo) {
          state.frasesMapa[uid] = { texto: f.texto, ts: f.ts, de: f.de || '' };
          setTimeout(function() {
            if (state.frasesMapa[uid] && state.frasesMapa[uid].ts === f.ts) {
              delete state.frasesMapa[uid];
              if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
            }
          }, 8000);
        }
      });
      if (state.view === 'map' && state.mapInstance) refreshMapMarkers();
    });
  } catch (e) {}
}

function renderFlechaFlotante() {
  if (!state.guiaFlotante || !state.navigatingTo || !state.myLocation) return '';
  const target = state.navigatingTo;
  const dist = haversineDistance(state.myLocation.lat, state.myLocation.lng, target.lat, target.lng);
  const bearing = calculateBearing(state.myLocation.lat, state.myLocation.lng, target.lat, target.lng);
  const cerca = dist < 25;
  const etaTxt = tiempoAndando(dist);  // tiempo estimado a pie

  // ¿Tenemos brújula fiable? Si sí, la flecha apunta hacia la persona de verdad.
  // Si no, apunta al norte geográfico y avisamos (sin engañar).
  const hayBrujula = state.deviceHeading !== null && state.brujulaFiable;
  let rot, avisoBrujula;
  if (hayBrujula) {
    rot = bearing - state.deviceHeading;  // hacia la persona, según hacia dónde miras
    avisoBrujula = '';
  } else {
    rot = bearing;  // norte arriba
    avisoBrujula = '<div class="flecha-flotante-brujula">⬆️ = Norte</div>';
  }
  const distTxt = formatDistance(dist);

  return ''
    + '<div id="flechaFlotante" class="flecha-flotante' + (cerca ? ' cerca' : '') + '">'
    + '  <button class="flecha-flotante-cerrar" data-action="stopNavigating" title="Dejar de guiar">✕</button>'
    + '  <div class="flecha-flotante-nombre">' + escapeHtml(target.apodo) + '</div>'
    + (cerca
        ? '  <div class="flecha-flotante-emoji">🎉</div><div class="flecha-flotante-dist">¡Ya casi!</div>'
        : '  <div class="flecha-flotante-arrow" style="transform: rotate(' + rot + 'deg);">⬆️</div><div class="flecha-flotante-dist">' + distTxt + '</div><div class="flecha-flotante-eta">' + etaTxt + '</div>' + avisoBrujula)
    + '</div>';
}

// Tiempo estimado andando (a ~80 m/min, paso normal)
function tiempoAndando(metros) {
  const min = Math.round(metros / 80);
  if (min < 1) return 'menos de 1 min';
  if (min === 1) return '~1 min andando';
  if (min < 60) return '~' + min + ' min andando';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return '~' + h + 'h ' + m + 'min';
}

// Actualiza solo la flecha (rotación y distancia) sin redibujar el mapa entero
function actualizarFlechaFlotante() {
  if (!state.guiaFlotante || !state.navigatingTo || !state.myLocation) return;
  // Si la persona se movió, actualizar su posición de destino
  const u = state.ubicaciones[state.navigatingTo.apodo];
  if (u && u.lat != null) { state.navigatingTo.lat = u.lat; state.navigatingTo.lng = u.lng; }

  const el = document.getElementById('flechaFlotante');
  if (!el) return;
  const target = state.navigatingTo;
  const dist = haversineDistance(state.myLocation.lat, state.myLocation.lng, target.lat, target.lng);
  const bearing = calculateBearing(state.myLocation.lat, state.myLocation.lng, target.lat, target.lng);
  const hayBrujula = state.deviceHeading !== null && state.brujulaFiable;
  let rot = hayBrujula ? (bearing - state.deviceHeading) : bearing;
  const distTxt = formatDistance(dist);
  const cerca = dist < 25;

  const arrowEl = el.querySelector('.flecha-flotante-arrow');
  const distEl = el.querySelector('.flecha-flotante-dist');
  const etaEl = el.querySelector('.flecha-flotante-eta');
  if (cerca) {
    // Llegó cerca: mostrar fiesta
    if (!el.classList.contains('cerca')) {
      el.classList.add('cerca');
      const main = el.querySelector('.flecha-flotante-arrow');
      if (main) main.outerHTML = '<div class="flecha-flotante-emoji">🎉</div>';
      if (distEl) distEl.textContent = '¡Ya casi!';
      if (etaEl) etaEl.textContent = '';
    }
  } else {
    if (arrowEl) arrowEl.style.transform = 'rotate(' + rot + 'deg)';
    if (distEl) distEl.textContent = distTxt;
    if (etaEl) etaEl.textContent = tiempoAndando(dist);
  }
}

async function cerrarLaNoche() {
  // Solo admin
  if (!state.esAdmin) {
    showToast('Solo el admin puede cerrar la noche');
    return;
  }
  
  // Validar que hay datos (anécdotas de esta noche, chat o puntos)
  const corte = state.ultimoCierreNoche || 0;
  const anecdotasNoche = state.anecdotas.filter(function(a) { return (a.timestamp || 0) > corte; }).length;
  const tieneDatos = anecdotasNoche > 0
    || (state.mapChat && state.mapChat.length > 0)
    || (state.puntosQuedada && state.puntosQuedada.length > 0);

  if (!tieneDatos) {
    showToast('No hay nada de esta noche para guardar todavía');
    return;
  }
  
  // Confirmación doble
  const msgChat = state.mapChat ? state.mapChat.length : 0;
  const msgPuntos = state.puntosQuedada ? state.puntosQuedada.length : 0;
  if (!confirm('🌙 ¿CERRAR LA NOCHE?\n\n' + anecdotasNoche + ' anécdotas · ' + msgChat + ' mensajes · ' + msgPuntos + ' puntos\n\nLa noche pasará a "La Historia" del inicio, para revivirla cuando queráis. El inicio quedará limpio para la próxima fiesta.\n\nLas anécdotas NO se borran.')) {
    return;
  }
  
  if (!confirm('⚠️ CONFIRMACIÓN FINAL: ¿seguro?')) {
    return;
  }
  
  const ahora = Date.now();
  const fecha = new Date(ahora).toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  
  // Construir el archivo de la noche
  const puntoFinal = (state.puntosQuedada && state.puntosQuedada.length > 0) ? state.puntosQuedada[0] : null;
  const noche = {
    fecha: fecha,
    timestamp: ahora,
    chat: (state.mapChat || []).slice(),
    puntos: (state.puntosQuedada || []).slice(),
    puntoEncuentroFinal: puntoFinal,  // el punto de encuentro de esta noche
    ubicaciones: Object.assign({}, state.ubicaciones)
  };
  
  // Guardar PRIMERO en Firebase (no localmente)
  if (FIREBASE_CONFIGURED && db) {
    try {
      showToast('⏳ Guardando noche...');
      
      // Guardar la noche archivada
      const archRef = fbDatabase().ref('grupos/' + state.grupo + '/nochesArchivadas');
      await archRef.push(noche);

      // Marcar el cierre: a partir de ahora, lo anterior es "historia" en el inicio
      try {
        await fbDatabase().ref('grupos/' + state.grupo + '/meta/ultimoCierreNoche').set(ahora);
        state.ultimoCierreNoche = ahora;
      } catch (e) { console.warn('Error guardando cierre:', e); }
      
      // Vaciar chat del mapa, puntos y ubicaciones (operaciones independientes)
      try {
        await fbDatabase().ref('grupos/' + state.grupo + '/mapChat').remove();
      } catch (e) { console.warn('Error borrando mapChat:', e); }
      
      try {
        await fbDatabase().ref('grupos/' + state.grupo + '/puntosQuedada').remove();
      } catch (e) { console.warn('Error borrando puntosQuedada:', e); }
      
      try {
        await fbDatabase().ref('grupos/' + state.grupo + '/ubicaciones').remove();
      } catch (e) { console.warn('Error borrando ubicaciones:', e); }
      
      // SOLO AHORA: vaciar estado local (Firebase está garantizado)
      state.nochesArchivadas.unshift(noche);
      state.mapChat = [];
      state.puntosQuedada = [];
      state.ubicaciones = {};
      
      showToast('🌙 NOCHE GUARDADA · HISTÓRICO ACTUALIZADO');
      render();
    } catch (e) {
      showToast('❌ ERROR AL GUARDAR: ' + e.message);
      console.error('cerrarLaNoche falló:', e);
      // NO limpiar datos locales si falla Firebase
      return;
    }
  } else {
    // Modo demo: sin Firebase, solo guardar local
    state.nochesArchivadas.unshift(noche);
    state.mapChat = [];
    state.puntosQuedada = [];
    state.ubicaciones = {};
    
    showToast('🌙 NOCHE GUARDADA (MODO DEMO)');
    render();
  }
}

function playSOSSound() {
  try {
    // Sonido de alarma fuerte tipo sirena (sube y baja), repetido
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    // Algunos navegadores arrancan el audio "suspendido": reactivarlo
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    state.sosAudioCtx = audioContext;

    function pitido() {
      try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.type = 'square'; // duro, penetrante

        const t0 = audioContext.currentTime;
        // Sirena: sube de 700 a 1400 Hz
        osc.frequency.setValueAtTime(700, t0);
        osc.frequency.linearRampToValueAtTime(1400, t0 + 0.4);
        osc.frequency.linearRampToValueAtTime(700, t0 + 0.8);

        // Volumen al máximo seguro
        gain.gain.setValueAtTime(1.0, t0);
        gain.gain.setValueAtTime(1.0, t0 + 0.7);
        gain.gain.exponentialRampToValueAtTime(0.01, t0 + 0.8);

        osc.start(t0);
        osc.stop(t0 + 0.8);
      } catch (e) {}
    }

    pitido();  // primer pitido ya
    // Repetir cada segundo
    state.sosAudioInterval = setInterval(pitido, 1000);
  } catch (e) {}
}

function stopSOSSound() {
  if (state.sosAudioInterval) {
    clearInterval(state.sosAudioInterval);
    state.sosAudioInterval = null;
  }
  if (state.sosVibrateInterval) {
    clearInterval(state.sosVibrateInterval);
    state.sosVibrateInterval = null;
  }
}

function subscribeToSOS() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.uid || !state.grupo) { setTimeout(subscribeToSOS, 1000); return; }
  try {
    const sosRef = fbDatabase().ref('grupos/' + state.grupo + '/sos');
    sosRef.on('value', function(snap) {
      const raw = snap.val() || {};
      const now = Date.now();
      // La clave de cada SOS es el UID de quien lo lanzó
      let hayAlarmaDeOtro = false;
      let sosDeOtro = null;

      Object.keys(raw).forEach(function(uid) {
        const sos = raw[uid];
        if (!sos) return;
        // Ignorar SOS viejos (más de 5 min)
        if (now - sos.timestamp > 300000) return;
        // MI PROPIO SOS no me suena ni me avisa (uid === mi uid)
        if (uid === state.uid) return;
        // SOS de otra persona, reciente
        hayAlarmaDeOtro = true;
        if (!sosDeOtro) { sosDeOtro = sos; sosDeOtro._uid = uid; }  // guardar el uid de quien pidió
      });

      if (hayAlarmaDeOtro && sosDeOtro) {
        // ¿Ya estaba sonando este mismo SOS? No reabrir todo otra vez
        const yaActivo = state.sosModalActivo && state.sosModalActivo.timestamp === sosDeOtro.timestamp;
        if (!yaActivo) {
          // Aviso en pantalla SIEMPRE (esto no depende del sonido, que a veces el móvil bloquea)
          showToast('🚨 ' + String(sosDeOtro.apodo || 'Alguien').toUpperCase() + ' HA ACTIVADO EL SOS');
          // Sonar + vibrar fuerte (solo aquí, que es SOS de OTRO)
          if (navigator.vibrate) {
            // Vibración fuerte e insistente para quien RECIBE el SOS
            navigator.vibrate([600, 200, 600, 200, 600]);  // primera tanda inmediata
            state.sosVibrateInterval = setInterval(function() {
              navigator.vibrate([600, 200, 600, 200, 600]);
            }, 2000);
          }
          playSOSSound();

          state.sosModalActivo = {
            uid: sosDeOtro._uid,  // uid de quien pidió ayuda (necesario para avisarle que voy)
            apodo: sosDeOtro.apodo,
            lat: sosDeOtro.lat,
            lng: sosDeOtro.lng,
            timestamp: sosDeOtro.timestamp
          };

          // Abrir mapa y guiar hacia la persona con la flecha flotante
          state.view = 'map';
          state.navigatingTo = {
            apodo: '🚨 ' + String(sosDeOtro.apodo || '').toUpperCase() + ' EN EMERGENCIA',
            lat: sosDeOtro.lat,
            lng: sosDeOtro.lng
          };
          state.guiaFlotante = true;
          state.navChat = [];
          subscribeToNavChat();
          startDeviceOrientationListener();
          if (state.navigationInterval) clearInterval(state.navigationInterval);
          state.navigationInterval = setInterval(function() { actualizarFlechaFlotante(); }, 500);
        }
      } else {
        // Ya no hay SOS de otros: parar la alarma si estaba sonando
        if (state.sosModalActivo) {
          stopSOSSound();
          state.sosModalActivo = null;
        }
      }

      render();
    });
  } catch (e) {}
}

async function addPuntoQuedada(nombre, hora, usarGPS) {
  if (!nombre.trim()) return;
  
  let lat = null;
  let lng = null;
  
  if (usarGPS && state.myLocation) {
    // Usar mi ubicación GPS actual
    lat = state.myLocation.lat;
    lng = state.myLocation.lng;
  } else {
    // Buscar la dirección escrita en el mapa (geocoding)
    showToast('🔍 Buscando dirección...');
    try {
      const query = encodeURIComponent(nombre.trim() + ', Canarias, España');
      const resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + query + '&limit=1');
      const data = await resp.json();
      if (data && data.length > 0) {
        lat = parseFloat(data[0].lat);
        lng = parseFloat(data[0].lon);
      }
    } catch (e) {
      // Si falla, usar ubicación actual como respaldo
      if (state.myLocation) {
        lat = state.myLocation.lat;
        lng = state.myLocation.lng;
      }
    }
  }
  
  const pq = {
    nombre: nombre.trim(),
    hora: hora || '',
    tipo: 'custom',
    lat: lat,
    lng: lng,
    createdBy: state.apodo,
    timestamp: Date.now()
  };
  
  state.puntosQuedada.push(pq);
  
  // Guardar en Firebase
  if (FIREBASE_CONFIGURED && db) {
    try {
      const pqRef = fbDatabase().ref('grupos/' + state.grupo + '/puntosQuedada');
      pqRef.set(state.puntosQuedada);
    } catch (e) {}
  }
  
  state.mostrandoPuntoQuedada = false;
  const mapMsg = lat ? ' (en el mapa)' : ' (no se encontró en el mapa)';
  showToast('📍 PUNTO CREADO: ' + nombre + (hora ? ' · ' + hora : '') + mapMsg);
  render();
}

function subscribeToPuntosQuedada() {
  if (!FIREBASE_CONFIGURED) return;
  if (!db || !state.grupo) { setTimeout(subscribeToPuntosQuedada, 1000); return; }
  try {
    const pqRef = fbDatabase().ref('grupos/' + state.grupo + '/puntosQuedada');
    pqRef.on('value', function(snap) {
      const pqs = snap.val();
      if (pqs && Array.isArray(pqs)) {
        state.puntosQuedada = pqs;
        render();
      }
    });
  } catch (e) {}
}

function deletePuntoQuedada(index) {
  state.puntosQuedada.splice(index, 1);
  if (FIREBASE_CONFIGURED && db) {
    try {
      const pqRef = fbDatabase().ref('grupos/' + state.grupo + '/puntosQuedada');
      pqRef.set(state.puntosQuedada);
    } catch (e) {}
  }
  render();
}

function navigateToPuntoQuedada(index) {
  const pq = state.puntosQuedada[index];

// ============ PHOTO COMPRESSION ============

function compressImage(file, maxWidth, quality) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const scale = Math.min(maxWidth / img.width, maxWidth / img.height, 1);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob) {
          if (blob) resolve(blob);
          else reject(new Error('Compresión falló'));
        }, 'image/jpeg', quality);
      };
      img.onerror = function() { reject(new Error('No se pudo cargar la imagen')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('No se pudo leer el archivo')); };
    reader.readAsDataURL(file);
  });
}

function blobToDataURL(blob) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

      function checkPaso2() {
        var ok = nombreInput.value.trim().length >= 2 && apodoInput.value.trim().length >= 2;
        confirmarBtn.disabled = !ok;
        state.tempNombreGrupo   = nombreInput.value;
        state.tempApodoCrear    = apodoInput.value;
        if (nombreRealInput) state.tempNombreRealCrear = nombreRealInput.value;
      }
      nombreInput.addEventListener('input', checkPaso2);

      });
      checkPaso2();
    }
    if (paso2Atras) paso2Atras.addEventListener('click', function() { state.pasoCrear = 1; render(); });

    return;
  }

  // Submodo unirse
  const input = document.getElementById('grupoInput');
  const btn = document.getElementById('enterGrupoBtn');
  var volver = document.getElementById('volverElegirBtn');

  function check() {
    btn.disabled = input.value.trim().length < 3;
    state.tempGrupo = input.value;
  }

  input.addEventListener('input', check);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !btn.disabled) submitGrupo(input.value);
  });
  btn.addEventListener('click', function() { submitGrupo(input.value); });
  if (volver) volver.addEventListener('click', function() {
    state.grupoSelectorMode = 'elegir';
    state.tempGrupo = '';
    render();
  });

  setTimeout(function() { input.focus(); }, 100);
  check();
}

// Generar código aleatorio tipo AFT-7K9
function generarCodigoGrupo() {
  const letras = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const nums = '23456789';
  let codigo = 'AFT-';
  codigo += letras[Math.floor(Math.random() * letras.length)];
  codigo += nums[Math.floor(Math.random() * nums.length)];
  codigo += letras[Math.floor(Math.random() * letras.length)];
  return codigo;
}

// Crear grupo nuevo: ya tenemos apodo, generamos código y entramos como admin
function crearGrupoNuevo(apodoRaw, nombreGrupoRaw) {
  const apodo = (apodoRaw || '').trim().toUpperCase().slice(0, 16);
  if (apodo.length < 2) return;
  state.apodo = apodo;
  try { localStorage.setItem(STORAGE_KEY_APODO, apodo); } catch (e) {}

  // Nombre que el creador le da al grupo (se muestra a todos)
  const nombreGrupo = (nombreGrupoRaw || '').trim().slice(0, 20);
  state.nombreGrupo = nombreGrupo;

  const codigo = generarCodigoGrupo();
  state.grupo = codigo;
  state.tempGrupo = '';
  state.tempApodoCrear = '';
  state.tempNombreGrupo = '';
  state.grupoSelectorMode = 'elegir';
  state.pasoCrear = 1;  // resetear para la próxima vez que se cree un grupo
  state.esCreador = true;
  try { localStorage.setItem(STORAGE_KEY_GRUPO, codigo); } catch (e) {}
  // Guardar en la lista de mis grupos
  guardarGrupoEnLista(codigo, state.tempApodoCrear || state.apodo || '');
  // Guardar el nombre del grupo para mostrarlo
  try { localStorage.setItem('afters_nombregrupo_' + codigo, nombreGrupo); } catch (e) {}

  try {
    const url = new URL(window.location.href);
    url.searchParams.set('g', codigo);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}

  state.authView = 'check';
  render();

  // NOTA: la config NO se escribe aquí para evitar crear el nodo meta
  // antes de tiempo (eso hacía que checkMembershipAndProceed creyera que
  // el grupo ya existía de otra persona y pidiera aprobación al propio creador).
  // La config se guarda dentro de checkMembershipAndProceed al crear meta completo.

  checkMembershipAndProceed();
}

function submitGrupo(raw) {
  const clean = raw.trim().toUpperCase().replace(/[^A-Z0-9-]/g, '').slice(0, 20);
  if (clean.length < 3) return;
  state.grupo = clean;
  state.tempGrupo = '';
  try { localStorage.setItem(STORAGE_KEY_GRUPO, clean); } catch (e) {}

  // Actualizar URL sin recargar
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('g', clean);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}

  // Iniciar flujo de auth/membresía
  state.authView = 'check';
  render();
  checkMembershipAndProceed();
}

function copiarTexto(texto) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).catch(function() { copiarTextoLegacy(texto); });
  } else {
    copiarTextoLegacy(texto);
  }
}

function copiarTextoLegacy(texto) {
  try {
    const ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  } catch (e) {}
}

function cambiarMiApodo() {
  const actual = state.apodo || '';
  const nuevo = prompt('Cambia tu apodo (cómo te ven los demás):', actual);
  if (nuevo === null) return;  // canceló
  const limpio = nuevo.trim().toUpperCase().slice(0, 16);
  if (limpio.length < 2) {
    showToast('El apodo necesita al menos 2 letras');
    return;
  }
  state.apodo = limpio;
  try { localStorage.setItem(STORAGE_KEY_APODO, limpio); } catch (e) {}

  // Actualizar mi apodo en Firebase (en miembros y en mi ubicación si comparto)
  if (FIREBASE_CONFIGURED && db && state.uid) {
    try {
      fbDatabase().ref('grupos/' + state.grupo + '/miembros/' + state.uid + '/apodo').set(limpio);
    } catch (e) {}
    if (state.shareLocationActive && state.myLocation) {
      try { fbSetUbicacion(state.myLocation.lat, state.myLocation.lng, state.shareLocationUntil); } catch (e) {}
    }
  }
  // Actualizar mi punto local
  if (state.ubicaciones[actual]) {
    state.ubicaciones[limpio] = state.ubicaciones[actual];
    delete state.ubicaciones[actual];
  }

  state.view = 'feed';
  showToast('✓ Tu apodo ahora es ' + limpio);
  render();
}

// Salir del grupo actual y volver a la pantalla de elegir/crear grupo
function salirDelGrupo() {
  const ok = confirm(
    '¿Salir del grupo "' + (state.grupo || '') + '"?\n\n' +
    'Volverás a la pantalla de inicio. Podrás volver a entrar con el código del grupo cuando quieras.\n\n' +
    'Tus anécdotas y el grupo NO se borran.'
  );
  if (!ok) return;

  // Dejar de compartir ubicación si estaba activo
  try {
    if (state.shareLocationActive && typeof stopLocationSharing === 'function') {
      stopLocationSharing();
    }
  } catch (e) {}

  // Limpiar el grupo guardado y volver al inicio
  try { localStorage.removeItem(STORAGE_KEY_GRUPO); } catch (e) {}
  state.grupo = null;
  state.estaAprobado = false;
  state.esAdmin = false;
  state.authView = 'check';
  state.view = 'feed';
  state.ubicaciones = {};
  showToast('HAS SALIDO DEL GRUPO');
  render();
}

  if (sosAhora.length === 0) {
    sosHtml = '<div class="feed-empty">No hay alertas SOS activas</div>';

function renderMiembrosModal() {
  const miembrosArr = [];
  Object.keys(state.miembros || {}).forEach(function(uid) {
    const m = state.miembros[uid];
    if (m) miembrosArr.push(Object.assign({ uid: uid }, m));
  });
  // Admin primero, luego por timestamp
  miembrosArr.sort(function(a, b) {
    const aIsAdmin = a.uid === state.uid && state.esAdmin;
    const bIsAdmin = b.uid === state.uid && state.esAdmin;
    if (aIsAdmin && !bIsAdmin) return -1;
    if (!aIsAdmin && bIsAdmin) return 1;
    return (a.timestamp || 0) - (b.timestamp || 0);
  });

  // Identificar admin actual (no necesariamente yo, aunque suele ser)
  // El admin actual lo sabemos por state.esAdmin && state.uid
  // O lo tenemos en meta.admin_uid (pero no lo guardo en state)
  // Voy a confiar en que state.esAdmin indica si es el current user

  let bodyHtml;
  if (miembrosArr.length === 0) {
    bodyHtml = ''
      + '<div class="feed-empty">'
      + '  <div class="feed-empty-eyebrow">SIN MIEMBROS</div>'
      + '</div>';
  } else {
    const meta = state._metaCache || {};
    const coadmins = meta.coadmins || {};
    bodyHtml = miembrosArr.map(function(m) {
      const soyYo = m.uid === state.uid;
      const esPrincipalEste = (meta.admin_uid === m.uid);
      const esCoadminEste = !!coadmins[m.uid];
      const esEncargadoEste = !!(meta.encargados && meta.encargados[m.uid]);

      // Insignia según el rol real
      let adminBadge = '';
      if (esPrincipalEste) adminBadge = '<span class="member-admin-badge">' + ICONS.crown + ' ADMIN</span>';
      else if (esCoadminEste) adminBadge = '<span class="member-admin-badge" style="background:rgba(122,92,255,0.2);color:#a78bff;">🛡️ CO-ADMIN</span>';
      else if (esEncargadoEste) adminBadge = '<span class="member-admin-badge" style="background:rgba(255,210,63,0.15);color:#ffd23f;">⭐ ENCARGADO</span>';

      // Botón transferir: solo el admin principal, a otro que no sea él
      const transferBtn = (state.soyPrincipal && !soyYo)
        ? '<button class="btn-transferir" data-action="transferirAdmin" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">PASAR ADMIN A ÉL</button>'
        : '';

      // Botón co-admin: solo el admin principal, a otro que no sea él ni ya el principal
      let coadminBtn = '';
      if (state.soyPrincipal && !soyYo && !esPrincipalEste) {
        if (esCoadminEste) {
          coadminBtn = '<button class="btn-transferir" style="background:transparent;border:1px solid #7a5cff;color:#a78bff;" data-action="quitarCoadmin" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">Quitar co-admin</button>';
        } else {
          coadminBtn = '<button class="btn-transferir" style="background:#7a5cff;color:#fff;" data-action="hacerCoadmin" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">🛡️ Hacer co-admin</button>';
        }
      }

      // Botón encargado: solo el admin principal, a otro que no sea él, co-admin ni principal
      let encargadoBtn = '';
      if (state.soyPrincipal && !soyYo && !esPrincipalEste && !esCoadminEste) {
        if (esEncargadoEste) {
          encargadoBtn = '<button class="btn-transferir" style="background:transparent;border:1px solid #ffd23f;color:#ffd23f;" data-action="quitarEncargado" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">Quitar encargado</button>';
        } else {
          encargadoBtn = '<button class="btn-transferir" style="background:rgba(255,210,63,0.15);border:1px solid #ffd23f;color:#ffd23f;" data-action="hacerEncargado" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">⭐ Hacer encargado</button>';
        }
      }

      // Botón expulsar: solo el principal, solo si hay reportes contra esa persona
      let expulsarBtn = '';
      if (state.soyPrincipal && !soyYo && !esPrincipalEste) {
        const tieneReportes = Object.values(state.reportesGrupo || {}).some(function(rep) {
          return rep.sobreUid === m.uid;
        });
        if (tieneReportes) {
          const numRep = Object.values(state.reportesGrupo || {}).filter(function(rep){ return rep.sobreUid === m.uid; }).length;
          expulsarBtn = '<button class="btn-transferir" style="background:rgba(255,60,60,0.15);border:1px solid rgba(255,60,60,0.5);color:#ff6b6b;" data-action="expulsarMiembro" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">🚫 Expulsar (' + numRep + ' reporte' + (numRep>1?'s':'') + ')</button>';
        }
      }

      // Botón chat privado
      const chatBtn = !soyYo
        ? '<button class="btn-chat-privado-miembro" data-action="abrirChatPrivado" data-uid="' + m.uid + '" data-apodo="' + escapeHtml(m.apodo || '') + '">🔒 CHAT PRIVADO</button>'
        : '';

      return ''
        + '<div class="miembro-card">'
        + '  <div class="miembro-head">'
        + '    <div class="miembro-apodo">' + escapeHtml(m.apodo || '—') + adminBadge + '</div>'
        + '    ' + (soyYo ? '<span class="miembro-tu">TÚ</span>' : '')
        + '  </div>'
        + (m.nombre ? '  <div class="miembro-nombre">' + escapeHtml(m.nombre) + '</div>' : '')
        +    chatBtn
        +    transferBtn
        +    coadminBtn
        +    encargadoBtn
        +    expulsarBtn
        + '</div>';
    }).join('');
  }

  const aviso = state.esAdmin
    ? ''
      + '<div style="padding:14px; border:1px solid #ff0080; background:rgba(255,0,128,0.08); margin-bottom:18px;">'
      + '  <div class="stats-card-label" style="color:#ff0080;">⚠️ TRANSFERIR ADMIN</div>'
      + '  <div style="font-size:12px; line-height:1.6; color:#b8b8c8; margin-top:8px;">'
      + '    Al transferir, dejarás de ser admin INMEDIATAMENTE. El nuevo admin tendrá control total del grupo (aprobar solicitudes, descargar backup, transferir a otro). Esto es IRREVERSIBLE desde tu lado.'
      + '  </div>'
      + '</div>'
    : '';

  return ''
    + '<div class="modal">'
    + '  <div class="modal-header">'
    + '    <div>'
    + '      <div class="modal-eyebrow">' + Object.keys(state.miembros || {}).length + ' EN TOTAL</div>'
    + '      <div class="modal-title">MIEMBROS</div>'
    + '    </div>'
    + '    <button class="close-btn" data-action="backToPendientes">' + ICONS.close + '</button>'
    + '  </div>'
    + '  <div class="stats-body">'
    +      aviso
    +      bodyHtml
    + '  </div>'
    + '</div>';
}

function renderFeed() {
  const corte = state.ultimoCierreNoche || 0;
  // EN VIVO = lo escrito después del último cierre de noche (la fiesta actual)
  const enVivo = state.anecdotas.filter(function(a) { return (a.timestamp || 0) > corte; });
  // HISTORIA = lo de noches ya cerradas
  const historia = state.anecdotas.filter(function(a) { return (a.timestamp || 0) <= corte; });

  const banner = renderNewsBanner();
  const notifPrompt = renderNotifPrompt();

  // --- Sección EN VIVO (la noche de ahora) ---
  let vivoHtml;
  if (enVivo.length === 0) {
    vivoHtml = ''
      + '  <div class="feed-empty">'
      + '    <div class="feed-empty-eyebrow">LA NOCHE ACABA DE EMPEZAR</div>'
      + '    <div class="feed-empty-text">' + getTipo().vacia + '</div>'
      + '  </div>';
  } else {
    vivoHtml = enVivo.map(function(a) { return renderAnecdota(a, a.id === state.newId); }).join('');
  }

  // --- Sección LA HISTORIA (noches cerradas, por día, desplegable) ---
  let historiaHtml = '';
  if (historia.length > 0) {
    // Agrupar por fecha
    const grupos = {};
    historia.forEach(function(a) {
      const f = a.fecha || getDateLabel(a.timestamp);
      if (!grupos[f]) grupos[f] = [];
      grupos[f].push(a);
    });
    // Ordenar fechas de más reciente a más antigua
    const fechas = Object.keys(grupos).sort(function(a, b) {
      const parse = function(s) { const p = s.split('.'); return new Date(p[2] + '-' + p[1] + '-' + p[0]).getTime(); };
      return parse(b) - parse(a);
    });

    historiaHtml += '<div class="historia-titulo">📖 LA HISTORIA DEL GRUPO</div>';
    historiaHtml += '<div class="historia-ayuda">Toca una noche para revivirla</div>';
    historiaHtml += fechas.map(function(fecha) {
      const lista = grupos[fecha];
      const abierto = (state.diaHistoriaAbierto === fecha);
      let bloque = ''
        + '<div class="historia-dia' + (abierto ? ' abierto' : '') + '">'
        + '  <button class="historia-cabecera" data-action="toggleDiaHistoria" data-fecha="' + escapeHtml(fecha) + '">'
        + '    <span class="historia-fecha">🌙 Noche del ' + escapeHtml(fecha) + '</span>'
        + '    <span class="historia-count">' + lista.length + ' ' + (lista.length === 1 ? 'anécdota' : 'anécdotas') + '</span>'
        + '    <span class="historia-flecha">' + (abierto ? '▲' : '▼') + '</span>'
        + '  </button>';
      if (abierto) {
        bloque += '  <div class="historia-contenido">' + lista.map(function(a) { return renderAnecdota(a, false); }).join('') + '</div>';
      }
      bloque += '</div>';
      return bloque;
    }).join('');
  }

  const footer = ''
    + '<div style="padding: 40px 16px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px;">'
    + '  <div style="font-size: 12px; color: #ccc; margin-bottom: 8px;">© 2026 AFTERS</div>'
    + '  <div style="font-size: 11px; color: #6b6b7a; letter-spacing: 0.1em; margin-bottom: 10px;">Diseñado por <strong>Incuba tu Negocio</strong> · por Jaime M. M.</div>'
    + '  <button data-action="openLegalMenu" style="background:transparent; border:none; color:#6b6b7a; font-family:DM Sans,sans-serif; font-size:11px; text-decoration:underline; cursor:pointer;">Aviso legal · Privacidad · Borrar mi cuenta</button>'
    + '</div>';

  return '<div class="feed">' + banner + notifPrompt + vivoHtml + historiaHtml + footer + '</div>';
}

function getNuevasCount() {
  if (!state.anecdotas || state.anecdotas.length === 0) return 0;
  return state.anecdotas.filter(function(a) {
    return a.timestamp > state.lastSeen;
  }).length;
}

function renderNewsBanner() {
  const nuevas = getNuevasCount();
  if (nuevas === 0) return '';
  const palabra = nuevas === 1 ? 'NUEVA' : 'NUEVAS';
  return ''
    + '<div class="news-banner" data-action="markSeen">'
    + '  <span class="news-banner-count">' + nuevas + '</span>'
    + '  <span>' + palabra + ' · TOCA PARA MARCAR</span>'
    + '</div>';
}

function markAllSeen() {
  const now = Date.now();
  state.lastSeen = now;
  try { localStorage.setItem(STORAGE_KEY_LASTSEEN, String(now)); } catch (e) {}
  render();
}

function renderNotifPrompt() {
  if (!state.estaAprobado) return '';
  if (state.notifDismissed) return '';
  if (!isNotifSupported()) return '';
  const perm = getNotifPermission();
  if (perm !== 'default') return '';
  return ''
    + '<div class="notif-prompt">'
    + '  <div class="notif-prompt-text">🔔 ¿Recibir alerta cuando alguien escriba?</div>'
    + '  <div class="notif-prompt-actions">'
    + '    <button class="notif-btn yes" data-action="enableNotif">ACTIVAR</button>'
    + '    <button class="notif-btn no" data-action="dismissNotif">AHORA NO</button>'
    + '  </div>'
    + '</div>';
}

function dismissNotifPrompt() {
  state.notifDismissed = true;
  try { localStorage.setItem(STORAGE_KEY_NOTIF_DISMISS, '1'); } catch (e) {}
  render();
}

function renderAnecdota(a, esNueva, esCampeona) {
  // Anónimo si es null, undefined, o vacío (evita que salga "undefined")
  const isAnon = !a.autor;
  const autorHtml = isAnon
    ? '<div class="anec-autor-anon">' + ICONS.eyeOff + 'ANÓNIMO</div>'
    : '<div class="anec-autor-name">' + escapeHtml(a.autor) + '</div>';

  const championBadge = esCampeona
    ? '<div class="champion-badge">' + ICONS.crown + 'CAMPEONA</div>'
    : '';

  const classes = 'anecdota'
    + (esNueva ? ' anecdota-new' : '')
    + (esCampeona ? ' anecdota-champion' : '');

  const photoHtml = a.fotoUrl
    ? '<div class="anec-photo"><img src="' + a.fotoUrl + '" alt="Foto" loading="lazy"></div>'
    : '';

  const textHtml = a.texto
    ? '<p class="anec-text">' + escapeHtml(a.texto) + '</p>'
    : '';

  // Ubicación del drop si está disponible
  let locationHtml = '';
  if (a.dropLocation && state.myLocation) {
    const distMetros = haversineDistance(state.myLocation.lat, state.myLocation.lng, a.dropLocation.lat, a.dropLocation.lng);
    if (distMetros < 20) {
      // Está prácticamente donde yo estoy: no tiene sentido poner "N · 0m"
      locationHtml = '<div class="anec-location">📍 Aquí mismo</div>';
    } else {
      const distFormatted = formatDistance(distMetros);
      const dir = compassDirection(state.myLocation.lat, state.myLocation.lng, a.dropLocation.lat, a.dropLocation.lng);
      locationHtml = '<div class="anec-location">📍 A ' + distFormatted + ' (' + dir + ')</div>';
    }
  }
  // Si la anécdota no tiene ubicación, no se muestra nada (antes ponía "TIENE UBICACIÓN" que confunde)

  return ''
    + '<div class="' + classes + '" data-anecdota-id="' + a.id + '">'
    +      championBadge
    + '  <div class="anec-head">'
    +      autorHtml
    + '    <div class="anec-hour">' + formatHour(a.timestamp) + '</div>'
    + '  </div>'
    +      textHtml
    +      photoHtml
    +      locationHtml
    +      renderReacciones(a.id)
    + '</div>';
}

      });

      bodyHtml = ''
        + '<div class="search-results-count">'
        + resultados.length + ' ' + (resultados.length === 1 ? 'RESULTADO' : 'RESULTADOS')
        + '</div>';

      bodyHtml += fechas.map(function(fecha) {
        const items = grupos[fecha].map(function(a) {
          return renderAnecdotaWithHighlight(a, q);
        }).join('');
        return '<div class="search-result-date">' + fecha + '</div>' + items;
      }).join('');
    }
  }

  return ''
    + '<div class="modal">'
    + '  <div class="modal-header">'
    + '    <div>'
    + '      <div class="modal-eyebrow">BUSCAR</div>'
    + '      <div class="modal-title">EN TODOS LOS AFTERS</div>'
    + '    </div>'
    + '    <button class="close-btn" data-action="closeModal">' + ICONS.close + '</button>'
    + '  </div>'
    + '  <div class="search-input-wrap">'
    +      ICONS.search
    + '    <input id="searchInput" class="search-input" type="text" placeholder="Buscar palabra o apodo..." value="' + escapeHtml(state.searchQuery) + '" autocomplete="off">'
    + '  </div>'
    + '  <div class="search-body">' + bodyHtml + '</div>'
    + '</div>';
}

function filterAnecdotas(query) {
  const q = query.toLowerCase();
  return state.anecdotas.filter(function(a) {
    const textoMatch = a.texto && a.texto.toLowerCase().indexOf(q) !== -1;
    const autorMatch = a.autor && a.autor.toLowerCase().indexOf(q) !== -1;
    return textoMatch || autorMatch;
  }).sort(function(a, b) { return b.timestamp - a.timestamp; });
}

function renderAnecdotaWithHighlight(a, query) {
  const isAnon = a.autor === null;
  const autorHtml = isAnon
    ? '<div class="anec-autor-anon">' + ICONS.eyeOff + 'ANÓNIMO</div>'
    : '<div class="anec-autor-name">' + highlightText(a.autor, query) + '</div>';

  return ''
    + '<div class="anecdota" data-anecdota-id="' + a.id + '">'
    + '  <div class="anec-head">'
    +      autorHtml
    + '    <div class="anec-hour">' + formatHour(a.timestamp) + '</div>'
    + '  </div>'
    + '  <p class="anec-text">' + highlightText(a.texto, query) + '</p>'
    +    renderReacciones(a.id)
    + '</div>';
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const q = escapeHtml(query);
  // Buscar el texto ya escapado en el resultado escapado, case-insensitive
  const regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function renderHistoryModal() {
  const today = getDateLabel();
  const pasadas = state.anecdotas.filter(function(a) { return a.fecha !== today; });

  // Agrupar por fecha
  const grupos = {};
  pasadas.forEach(function(a) {
    if (!grupos[a.fecha]) grupos[a.fecha] = [];
    grupos[a.fecha].push(a);
  });

  const fechas = Object.keys(grupos).sort(function(a, b) {
    const parse = function(s) {
      const parts = s.split('.');
      return new Date(parts[2] + '-' + parts[1] + '-' + parts[0]).getTime();
    };
    return parse(b) - parse(a);
  });

  // Toggle: Todas / Solo campeonas
  const toggleHtml = ''
    + '<div class="history-toggle">'
    + '  <button class="toggle-btn' + (!state.showOnlyChampions ? ' active' : '') + '" data-action="toggleChampions" data-val="0">TODAS</button>'
    + '  <button class="toggle-btn' + (state.showOnlyChampions ? ' active' : '') + '" data-action="toggleChampions" data-val="1">HALL OF FAME</button>'
    + '</div>';

  let bodyHtml = '';
  if (fechas.length === 0) {
    bodyHtml = ''
      + '<div class="feed-empty">'
      + '  <div class="feed-empty-eyebrow">SIN HISTÓRICO TODAVÍA</div>'
      + '  <div class="feed-empty-text">VUELVE EN UNA SEMANA</div>'
      + '</div>';
  } else {
    bodyHtml = fechas.map(function(fecha) {
      const campeona = getCampeona(grupos[fecha]);

      let items;
      if (state.showOnlyChampions) {
        // Solo mostrar la campeona si existe
        if (!campeona) return ''; // omitir noches sin campeona
        items = renderAnecdota(campeona, false, true);
      } else {
        // Todas, con la campeona marcada y primero
        const ordered = campeona
          ? [campeona].concat(grupos[fecha].filter(function(a) { return a.id !== campeona.id; }))
          : grupos[fecha];
        items = ordered.map(function(a) {
          return renderAnecdota(a, false, campeona && a.id === campeona.id);
        }).join('');
      }

      return ''
        + '<div class="history-day">'
        + '  <div class="history-date">' + fecha + '</div>'
        + '  <div class="history-count">' + grupos[fecha].length + ' ANÉCDOTAS</div>'
        + '</div>'
        + items;
    }).join('');

    // Si era "solo campeonas" y no había ninguna en ninguna noche
    if (state.showOnlyChampions && !bodyHtml.trim()) {
      bodyHtml = ''
        + '<div class="feed-empty">'
        + '  <div class="feed-empty-eyebrow">AÚN SIN CAMPEONAS</div>'
        + '  <div class="feed-empty-text">NECESITAN REACCIONES</div>'
        + '</div>';
    }
  }

  // Sección de noches archivadas (chats, puntos y ubicaciones guardadas al cerrar la noche)
  let nochesHtml = '';
  if (state.nochesArchivadas && state.nochesArchivadas.length > 0 && !state.showOnlyChampions) {
    nochesHtml = ''
      + '<div class="noches-arch-section">'
      + '  <div class="noches-arch-title">🌙 NOCHES GUARDADAS</div>'
      +    state.nochesArchivadas.map(function(noche, idx) {
        const numMensajes = (noche.chat || []).length;
        const numPuntos = (noche.puntos || []).length;
        return ''
          + '<div class="noche-arch-card" data-action="verNocheArchivada" data-index="' + idx + '">'
          + '  <div class="noche-arch-fecha">' + escapeHtml(noche.fecha) + '</div>'
          + '  <div class="noche-arch-info">💬 ' + numMensajes + ' mensajes · 📍 ' + numPuntos + ' puntos</div>'
          + '</div>';
      }).join('')
      + '</div>';
  }

  return ''
    + '<div class="modal">'
    + '  <div class="modal-header">'
    + '    <div>'
    + '      <div class="modal-eyebrow">AFTERS PASADOS</div>'
    + '      <div class="modal-title">HISTÓRICO</div>'
    + '    </div>'
    + '    <button class="close-btn" data-action="closeModal">' + ICONS.close + '</button>'
    + '  </div>'
    +    toggleHtml

function renderEstadisticasNoche() {
  const stats = calcularEstadisticasNoche();
  const apodos = Object.keys(stats);

  let cuerpo;
  if (apodos.length === 0) {

      cuerpo = '<div class="cp-vacio">Aún no hay suficientes datos.<br>Cuando la gente se mueva, aparecerán los rankings.</div>';

      cuerpo = '<div class="rank-titulo">🏆 RANKINGS DE LA NOCHE</div>';
      cuerpo += '<div class="rank-ayuda">Toca un premio para ver el ranking completo</div>';

          + '<div class="premio-item' + (abierto ? ' abierto' : '') + '">'
          + '  <button class="premio-cabecera" data-action="toggleEstPremio" data-premio="' + p.id + '">'
          + '    <span class="premio-emoji">' + p.emoji + '</span>'

          + '      <div class="premio-titulo">' + p.titulo + '</div>'
          + '      <div class="premio-ganador">' + escapeHtml(p.quien) + '</div>'
          + '    </div>'
          + '    <span class="premio-flecha">' + (abierto ? '▲' : '▼') + '</span>'
          + '  </button>';

        if (abierto) {
          tarjeta += '  <div class="premio-ranking">';
          tarjeta += p.ranking.map(function(r, i) {
            let medalla;
            if (i === 0) medalla = '🥇';
            else if (i === 1) medalla = '🥈';
            else if (i === 2) medalla = '🥉';

// Premios divertidos automáticos según los datos
function calcularPremiosNoche(stats, apodos) {
  const premios = [];
  if (apodos.length === 0) return premios;

  // Cada premio: emoji, título, su clave de orden, cómo se muestra el valor, y mínimo para salir.
  // 'orden' devuelve el número por el que se ordena (de mayor a menor).
  // 'valor' devuelve el texto que se muestra al lado de cada persona en el ranking.
  const defs = [
    { id: 'km',       emoji: '🗺️', titulo: 'El más andarín',        orden: function(s){return s.km;},            valor: function(s){return s.km.toFixed(1) + ' km';},          min: function(s){return s.km > 0.1;} },
    { id: 'parado',   emoji: '🗿', titulo: 'El estatua (más quieto)', orden: function(s){return s.minutosParado;}, valor: function(s){return minutosATexto(s.minutosParado) + ' parado';}, min: function(s){return s.minutosParado > 10;} },
    { id: 'ultimo',   emoji: '🌙', titulo: 'El último en caer',      orden: function(s){return s.horaSalida || 0;}, valor: function(s){return 'hasta las ' + tsAHora(s.horaSalida);}, min: function(s){return !!s.horaSalida;} },
    { id: 'cronista', emoji: '✍️', titulo: 'El cronista',            orden: function(s){return s.anecdotas;},     valor: function(s){return s.anecdotas + ' anécdotas';},        min: function(s){return s.anecdotas > 0;} },
    { id: 'pesado',   emoji: '📢', titulo: 'El pesado (más toques)', orden: function(s){return s.toques;},        valor: function(s){return s.toques + ' toques';},              min: function(s){return s.toques > 0;} }
  ];

  defs.forEach(function(d) {
    // Ordenar a todos por el criterio de este premio (de más a menos)
    const ordenados = apodos.slice().sort(function(a, b) { return d.orden(stats[b]) - d.orden(stats[a]); });
    const ganador = ordenados[0];
    // Solo añadir el premio si el ganador cumple el mínimo (si no, no tiene sentido)
    if (ganador && d.min(stats[ganador])) {
      premios.push({
        id: d.id,
        emoji: d.emoji,
        titulo: d.titulo,
        quien: ganador + ' · ' + d.valor(stats[ganador]),
        // El ranking completo de este premio: lista de {apodo, valor}
        ranking: ordenados.map(function(ap) { return { apodo: ap, valor: d.valor(stats[ap]) }; })
      });
    }
  });

  return premios;
}
