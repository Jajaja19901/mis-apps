<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Laura M. · Logopeda — Enseñar a hablar</title>
<meta name="description" content="App de logopedia infantil para enseñar a hablar: articulación de fonemas (sílabas, palabras y frases), vocabulario por categorías, conciencia fonológica (rimas, sílabas, sonido inicial), comprensión, soplo y praxias. Todo suena en voz alta. Apoyo para la logopeda.">
<meta name="theme-color" content="#2563b8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Logopedia">
<link rel="icon" id="favicon">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="manifest" id="manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#2563b8; --brand-deep:#1c4d92; --brand-soft:#e7f0fb;
  --green:#0f7a52; --green-soft:#e2f3ec;
  --purple:#6a3fb0; --purple-soft:#efe9fa;
  --coral:#d9531f; --coral-soft:#fdece4;
  --bg:#f6f8fc; --surface:#ffffff;
  --ink:#1f2733; --ink-soft:#55617a;
  --line:#e4e9f2;
  --r:18px; --r-lg:26px;
  --sh:0 6px 18px rgba(30,50,90,.08); --sh-lg:0 16px 40px rgba(30,50,90,.16);
  --max:920px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden}
h1,h2,h3{font-family:'Fredoka',system-ui,sans-serif;font-weight:600;line-height:1.1;margin:0 0 .4em}
h1{font-size:clamp(26px,6vw,38px)} h2{font-size:clamp(21px,5vw,28px)} h3{font-size:18px}
p{margin:0 0 1em} a{color:inherit;text-decoration:none}
.wrap{max-width:var(--max);margin:0 auto;padding:0 16px}
.muted{color:var(--ink-soft)} .center{text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;border-radius:999px;padding:14px 22px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;cursor:pointer;transition:transform .14s,box-shadow .14s,background .14s;line-height:1}
.btn:hover{transform:translateY(-2px)} .btn:active{transform:translateY(0)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 8px 18px rgba(37,99,184,.3)} .btn-primary:hover{background:var(--brand-deep)}
.btn-green{background:var(--green);color:#fff} .btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--surface);color:var(--brand);border:2px solid var(--brand)} .btn-ghost:hover{background:var(--brand-soft)}
.btn-sm{padding:9px 16px;font-size:14px} .btn-block{display:flex;width:100%}
.btn:focus-visible,[role=button]:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,button:focus-visible{outline:3px solid #e8a300;outline-offset:2px}
header.top{position:sticky;top:0;z-index:40;background:rgba(246,248,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:8px;height:58px}
.logo{display:flex;align-items:center;gap:9px;font-family:'Fredoka';font-weight:700;font-size:18px;color:var(--ink)}
.logo .mk{width:32px;height:32px;border-radius:9px;overflow:hidden;flex:0 0 auto}
.nav .sp{margin-left:auto}
.nav .icon-btn{background:var(--surface);border:1px solid var(--line);border-radius:999px;width:40px;height:40px;display:grid;place-items:center;font-size:18px;cursor:pointer;color:var(--ink)}
.nav .stars-bar{font-size:14px;padding:6px 12px}
.nav a.panel-link{font-weight:700;font-size:13px;color:var(--ink-soft);padding:8px 8px;border-radius:999px}
.nav a.panel-link:hover{background:var(--brand-soft);color:var(--brand)}
section{padding:22px 0}
.hero{text-align:center;padding:30px 0 8px}
.hero .big-emoji{font-size:58px;margin-bottom:4px} .hero h1 span{color:var(--brand)}
.choices{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:640px){.choices{grid-template-columns:1fr 1fr}}
.choice{border:none;border-radius:var(--r-lg);padding:22px 20px;text-align:left;cursor:pointer;color:#fff;font-family:inherit;display:flex;flex-direction:column;gap:5px;min-height:140px;transition:transform .15s,box-shadow .15s;box-shadow:var(--sh)}
.choice:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.choice .ce{font-size:42px} .choice h2{color:#fff;margin:0;font-size:22px} .choice p{margin:0;opacity:.95;font-weight:600;font-size:14px}
.choice.jugar{background:linear-gradient(135deg,#2563b8,#3f86e0)}
.choice.comunica{background:linear-gradient(135deg,#6a3fb0,#9466d6)}
.choice.valorar{background:linear-gradient(135deg,#0f7a52,#1ba573)}
.choice.cuentos{background:linear-gradient(135deg,#c4632a,#e08a3f)}
.mini-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.mini-link{background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:10px 18px;font-weight:800;color:var(--brand);text-decoration:none}
.mini-link:hover{border-color:var(--brand)}
/* Cuentos */
.scene{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.scene-it{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 4px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:2px;align-items:center;transition:.12s}
.scene-it:hover{border-color:var(--brand);transform:translateY(-2px)} .scene-it .si-e{font-size:38px} .scene-it .si-w{font-size:13px;font-weight:700;color:var(--ink-soft)}
.scene-it.si-pop{transform:scale(1.08);border-color:var(--brand);background:var(--brand-soft)}
.cuento-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:18px;margin:16px 0;text-align:center}
.cuento-txt{font-family:'Fredoka';font-size:20px;line-height:1.5;margin-bottom:12px}
.cuento-txt.reading{color:var(--brand)}
.modelo{text-align:center;margin:8px 0 16px} .modelo-frase{font-family:'Fredoka';font-weight:700;font-size:24px;color:var(--brand);margin:4px 0 8px}
.adulto-card{background:#fff6df;border:1px solid #f0dca0;border-radius:16px;padding:16px} .adulto-card ul{margin:10px 0 0;padding-left:4px;list-style:none} .adulto-card li{margin:8px 0;font-size:16px}
.link-say{background:none;border:none;cursor:pointer;font-size:16px}
/* Familias */
.fam-list{display:grid;gap:12px}
.fam-card{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--sh)}
.fam-card .fc-e{font-size:34px;flex:0 0 auto} .fam-card .fc-b{flex:1;min-width:0} .fam-card b{font-family:'Fredoka';font-size:17px}
/* Micrófono mágico */
.mag-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:20px;text-align:center}
.balloon{font-size:90px;line-height:1;transition:transform .1s ease-out;margin:6px auto}
.row-c{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
/* Fichas de sonidos */
.ficha-row{display:flex;gap:10px;justify-content:center;margin:10px 0}
.ficha-box{width:46px;height:46px;border-radius:12px;border:2px solid var(--brand);background:var(--brand-soft);color:var(--brand);font-size:20px;cursor:pointer}
/* Progreso */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:520px){.stat-cards{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-size:26px;font-weight:800;color:var(--brand)} .sc-l{font-size:13px;color:var(--ink-soft)}
.box-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:18px}
.pr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.pr-l{flex:0 0 40%;font-weight:700;font-size:14px} .pr-v{flex:0 0 auto;font-weight:800;font-size:14px}
.bar{flex:1;height:12px;border-radius:999px;background:var(--line);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:#1ba573} .bar i.low{background:#e0593a} .bar i.mid{background:#e8a300}
@media print{ .top,footer,.btn,.mini-links{display:none!important} .box-card,.stat-card{box-shadow:none} }
/* Espejo (cámara) */
.mirror-ov{position:fixed;inset:0;z-index:300;background:rgba(15,25,40,.78);display:flex;align-items:center;justify-content:center;padding:18px}
.mirror-card{background:#fff;border-radius:20px;padding:14px;max-width:420px;width:100%;text-align:center;box-shadow:var(--sh-lg)}
.mirror-card video{width:100%;border-radius:14px;background:#000;transform:scaleX(-1);max-height:60vh}
/* Construir frases */
.fb-grp{margin:14px 0}
.fb-h{font-family:'Fredoka';font-weight:700;color:var(--brand);margin:0 0 6px;font-size:16px}
.fb-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:520px){.fb-row{grid-template-columns:repeat(6,1fr)}}
.fb-pic{background:var(--surface);border:2px solid var(--line);border-radius:14px;padding:10px 4px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:2px;align-items:center;transition:.12s}
.fb-pic:hover{border-color:var(--brand);transform:translateY(-2px)} .fb-pic .fp-e{font-size:28px} .fb-pic .fp-w{font-size:12px;font-weight:700;color:var(--ink-soft)}
/* Pares mínimos */
.par-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0}
.par-card{flex:1;max-width:170px;background:var(--surface);border:2px solid var(--line);border-radius:18px;padding:16px 8px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:4px;align-items:center;box-shadow:var(--sh);transition:.12s}
.par-card:hover{border-color:var(--brand);transform:translateY(-2px)} .par-card .pc-e{font-size:48px} .par-card .pc-w{font-size:22px;font-weight:700;color:var(--brand)} .par-card .pc-say{font-size:16px}
.par-vs{font-size:24px;flex:0 0 auto}
/* Fotos personalizadas */
.pic-img{width:44px;height:44px;object-fit:cover;border-radius:10px;display:block}
.sp-item .pic-img{width:30px;height:30px}
.cus-list{display:grid;gap:8px}
.cus-it{display:flex;align-items:center;gap:10px;background:#f6f9fe;border:1px solid var(--line);border-radius:12px;padding:8px 10px} .cus-it .cus-w{flex:1;font-weight:700}
.grid{display:grid;gap:14px;grid-template-columns:repeat(2,1fr)}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;font-family:inherit;text-align:center;box-shadow:var(--sh);transition:transform .14s,box-shadow .14s;display:flex;flex-direction:column;gap:6px;align-items:center}
.tile:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.tile .te{font-size:40px} .tile b{font-family:'Fredoka';font-size:16px} .tile small{color:var(--ink-soft);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
.chip{border:2px solid var(--line);background:var(--surface);color:var(--ink);border-radius:14px;min-width:48px;padding:10px 14px;font-family:'Fredoka';font-weight:600;font-size:16px;cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--brand)} .chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.wordcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-lg);max-width:430px;margin:0 auto;padding:24px 20px;text-align:center}
.wordcard .pic{font-size:100px;line-height:1;margin-bottom:4px}
.wordcard .word{font-family:'Fredoka';font-size:36px;font-weight:700;color:var(--brand)}
.wordcard .pos{display:inline-block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--brand);background:var(--brand-soft);padding:3px 10px;border-radius:999px;margin-bottom:6px}
.speak-btn{margin-top:12px;background:#e8a300;color:#3a2b00;border:none;border-radius:999px;padding:15px 24px;font-family:'Fredoka';font-weight:700;font-size:18px;cursor:pointer;display:inline-flex;gap:10px;align-items:center;box-shadow:0 6px 16px rgba(232,163,0,.35)}
.speak-btn:hover{transform:translateY(-2px)}
.row-nav{display:flex;justify-content:space-between;gap:10px;max-width:430px;margin:14px auto 0}
.dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--line)} .dots i.on{background:var(--brand)}
.syl-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:430px;margin:0 auto}
.syl{background:var(--brand-soft);color:var(--brand-deep);border:2px solid #cfe0f5;border-radius:14px;padding:14px 18px;font-family:'Fredoka';font-weight:700;font-size:26px;cursor:pointer}
.syl:hover{background:var(--brand);color:#fff}
.qbox{max-width:480px;margin:0 auto;text-align:center}
.qprompt{font-family:'Fredoka';font-size:24px;font-weight:700;margin:6px 0 10px}
.qpic{font-size:96px;margin:2px 0 12px}
.read-word{font-family:'Fredoka';font-weight:700;font-size:54px;letter-spacing:.06em;color:var(--brand);margin:6px 0}
.shape-target{width:120px;height:120px;margin:4px auto 10px;border:3px dashed #b9cce8;border-radius:16px;padding:10px;background:#fafcff}
.shape-opt{display:inline-block;width:54px;height:54px}
.le-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(min-width:520px){.le-grid{grid-template-columns:repeat(5,1fr)}}
.le-letter{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 4px;cursor:pointer;font-family:'Fredoka';transition:.12s;display:flex;flex-direction:column;gap:2px;align-items:center}
.le-letter:hover{border-color:var(--brand);transform:translateY(-2px)} .le-letter .ll{font-size:32px;font-weight:700;color:var(--brand)} .le-letter .le{font-size:24px} .le-letter .lw{font-size:11px;font-weight:700;color:var(--ink-soft)}
.agenda{display:grid;gap:10px}
.ag-step{display:flex;align-items:center;gap:14px;background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 14px;cursor:pointer;text-align:left;font-family:inherit;transition:.12s}
.ag-step:hover{border-color:var(--purple)} .ag-step.done{background:var(--green-soft);border-color:var(--green)}
.ag-step .ae{font-size:36px;flex:0 0 auto} .ag-step .an{font-family:'Fredoka';font-weight:600;font-size:18px;flex:1}
.ag-step.done .an{text-decoration:line-through;color:var(--ink-soft)} .ag-step .ack{font-size:24px;flex:0 0 auto}
.ag-num{width:30px;height:30px;border-radius:50%;background:var(--purple-soft);color:var(--purple);display:grid;place-items:center;font-family:'Fredoka';font-weight:700;flex:0 0 auto}
.traza-wrap{max-width:480px;margin:8px auto 0;background:#fafcff;border:2px solid var(--line);border-radius:18px;padding:8px;box-shadow:var(--sh)}
#traza{width:100%;height:auto;display:block;border-radius:12px;touch-action:none;cursor:crosshair;background:#fff}
.opts{display:grid;gap:12px}
.optbtn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:16px;font-family:'Fredoka';font-size:22px;cursor:pointer;transition:.14s}
.optbtn:hover{border-color:var(--brand)} .optbtn.good{background:var(--green-soft);border-color:var(--green);color:var(--green)} .optbtn.bad{background:var(--coral-soft);border-color:var(--coral);color:var(--coral)}
.opt-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.opt-img{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:14px 4px;cursor:pointer;transition:.14s;font-family:'Fredoka'}
.opt-img:hover{border-color:var(--brand)} .opt-img .oe{font-size:46px;display:block} .opt-img .ow{font-size:13px;font-weight:700;color:var(--ink-soft)}
.opt-img.good{background:var(--green-soft);border-color:var(--green)} .opt-img.bad{background:var(--coral-soft);border-color:var(--coral)}
.feedback{font-family:'Fredoka';font-size:24px;font-weight:700;margin:12px 0;min-height:30px}
.feedback.ok{color:var(--green)} .feedback.no{color:var(--coral)}
.stars-bar{display:inline-flex;gap:6px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:800;color:#8a6500;box-shadow:var(--sh)}
.strip{background:var(--surface);border:2px solid var(--purple);border-radius:18px;padding:12px;box-shadow:var(--sh);margin-bottom:14px;position:sticky;top:64px;z-index:20}
.strip-row{display:flex;align-items:center;gap:8px}
.strip-items{flex:1;display:flex;gap:8px;overflow-x:auto;min-height:64px;padding:2px}
.strip-items .ph{color:var(--ink-soft);font-weight:700;align-self:center}
.sp-item{flex:0 0 auto;background:var(--purple-soft);border:1px solid #d8caf0;border-radius:12px;padding:6px 8px;text-align:center;min-width:62px}
.sp-item .e{font-size:30px;line-height:1} .sp-item .w{font-size:12px;font-weight:700;color:var(--purple)}
.strip-ctrl{display:flex;gap:6px}
.strip-ctrl button{border:none;border-radius:12px;width:46px;height:46px;font-size:20px;cursor:pointer}
.strip-ctrl .say{background:var(--purple);color:#fff} .strip-ctrl .back{background:#eee} .strip-ctrl .clear{background:var(--coral-soft);color:var(--coral)}
.pic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:520px){.pic-grid{grid-template-columns:repeat(4,1fr)}}
.pic-btn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 6px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:2px;align-items:center;transition:.12s}
.pic-btn:hover{border-color:var(--purple);transform:translateY(-2px)} .pic-btn .pe{font-size:40px} .pic-btn .pw{font-size:14px;font-weight:600;color:var(--ink)}
.emo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.emo-grid{grid-template-columns:repeat(4,1fr)}}
.emo-btn{background:var(--surface);border:2px solid var(--line);border-radius:18px;padding:16px 8px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:4px;align-items:center;transition:.12s}
.emo-btn:hover{border-color:var(--purple);transform:translateY(-2px)} .emo-btn.sel{border-color:var(--purple);background:var(--purple-soft)}
.emo-btn .ef{font-size:50px} .emo-btn .en{font-weight:700}
.emo-out{font-family:'Fredoka';font-size:24px;text-align:center;margin:14px 0;min-height:30px;color:var(--purple);font-weight:700}
.exlist{display:grid;gap:12px}
.excard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;gap:14px;align-items:center;box-shadow:var(--sh)}
.excard .ee{font-size:38px;flex:0 0 auto} .excard .ex-body{flex:1;min-width:0} .excard b{font-family:'Fredoka';font-size:17px}
.blow{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7,transparent),var(--coral);flex:0 0 auto}
.blow.animate{animation:blow 2.6s ease-in-out infinite}
@keyframes blow{0%,100%{transform:scale(.85)}50%{transform:scale(1.15)}}
.box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:22px;max-width:640px;margin:0 auto}
.age-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
.age-btn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:18px;font-family:'Fredoka';font-size:18px;cursor:pointer;transition:.14s}
.age-btn:hover{border-color:var(--brand);transform:translateY(-2px)}
.item{padding:14px 0;border-bottom:1px solid var(--line)} .item .q{font-weight:700;margin-bottom:8px}
.item .area-tag{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--brand);background:var(--brand-soft);padding:2px 8px;border-radius:999px;margin-bottom:6px}
.scale{display:flex;gap:8px}
.scale button{flex:1;border:2px solid var(--line);background:var(--surface);border-radius:12px;padding:10px;font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:14px}
.scale button[aria-pressed="true"][data-v="2"]{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.scale button[aria-pressed="true"][data-v="1"]{background:#fff6df;border-color:#e8a300;color:#8a6500}

function viewMagico(){

  <div class="mag-box">

    <div id="magStatus" class="muted" style="min-height:24px;margin-top:6px">Pulsa «Activar» y sopla al micrófono.</div>
    <div class="row-c"><button class="btn btn-primary" data-action="mic-on">🎙️ Activar y soplar</button><button class="btn btn-ghost" data-action="mic-off">⏹️ Parar</button></div>
  </div>
  <div class="mag-box" style="margin-top:14px">
    <b>🔴 Grábate y escúchate</b>

    <div class="row-c"><button class="btn btn-primary" data-action="rec-start" id="recStart">🔴 Grabar</button><button class="btn btn-ghost" data-action="rec-stop" id="recStop" disabled>⏹️ Parar</button><button class="btn btn-ghost" data-action="rec-play" id="recPlay" disabled>▶️ Escuchar</button></div>
    <div id="recStatus" class="muted" style="min-height:22px;margin-top:8px"></div>
  </div></section>`);

function stopMic(){ try{ if(MIC_RAF)cancelAnimationFrame(MIC_RAF); }catch(e){} MIC_RAF=null; try{ if(MIC_REC&&MIC_REC.state==='recording')MIC_REC.stop(); }catch(e){} try{ if(MIC_STREAM)MIC_STREAM.getTracks().forEach(t=>t.stop()); }catch(e){} MIC_STREAM=null; try{ if(MIC_CTX)MIC_CTX.close(); }catch(e){} MIC_CTX=null; }
function startBalloon(){
  const st=document.getElementById('magStatus');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ if(st)st.textContent='Este dispositivo no permite el micrófono. Prueba en Chrome o en el móvil.'; return; }
  if(st)st.textContent='Pidiendo permiso…';
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    MIC_STREAM=stream; const Ctx=window.AudioContext||window.webkitAudioContext; MIC_CTX=new Ctx();
    const src=MIC_CTX.createMediaStreamSource(stream); const an=MIC_CTX.createAnalyser(); an.fftSize=1024; src.connect(an); const buf=new Uint8Array(an.fftSize);
    if(st)st.textContent='¡Sopla fuerte para inflar el globo! 🎈';
    function loop(){ an.getByteTimeDomainData(buf); let sum=0; for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum+=v*v; } const rms=Math.sqrt(sum/buf.length); const lvl=Math.min(1,rms*3.2);
      BALLOON=Math.max(BALLOON*0.94, lvl); const b=document.getElementById('balloon'); if(!b){ stopMic(); return; }
      const sc=0.4+BALLOON*1.4; b.style.transform='scale('+sc.toFixed(2)+')';
      if(sc>1.6){ b.textContent='🎉'; if(st)st.textContent='¡Globo lleno! ¡Bien soplado! ⭐'; addStar(1); BALLOON=0; setTimeout(()=>{const b2=document.getElementById('balloon'); if(b2){b2.textContent='🎈';}},700); }
      MIC_RAF=requestAnimationFrame(loop); }
    loop();
  }).catch(function(){ const s2=document.getElementById('magStatus'); if(s2)s2.textContent='No se pudo usar el micrófono (permiso denegado). El resto funciona igual.'; });
}
function recStart(){
  const st=document.getElementById('recStatus');
  if(!navigator.mediaDevices||!window.MediaRecorder){ if(st)st.textContent='Este dispositivo no permite grabar. Prueba en Chrome o en el móvil.'; return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    MIC_STREAM=stream; MIC_CHUNKS=[]; try{ MIC_REC=new MediaRecorder(stream); }catch(e){ if(st)st.textContent='No se pudo grabar aquí.'; return; }
    MIC_REC.ondataavailable=e=>{ if(e.data&&e.data.size)MIC_CHUNKS.push(e.data); };
    MIC_REC.onstop=function(){ try{ if(MIC_URL)URL.revokeObjectURL(MIC_URL); MIC_URL=URL.createObjectURL(new Blob(MIC_CHUNKS)); }catch(e){} const ps=document.getElementById('recPlay'); if(ps)ps.disabled=false; const s2=document.getElementById('recStatus'); if(s2)s2.textContent='¡Grabado! Pulsa ▶️ para escucharte.'; if(MIC_STREAM)MIC_STREAM.getTracks().forEach(t=>t.stop()); };
    MIC_REC.start(); const a=document.getElementById('recStart'),b=document.getElementById('recStop'); if(a)a.disabled=true; if(b)b.disabled=false; if(st)st.textContent='🔴 Grabando… di una palabra.';
  }).catch(function(){ if(st)st.textContent='No se pudo usar el micrófono (permiso denegado).'; });
}
function recStop(){ try{ if(MIC_REC&&MIC_REC.state==='recording')MIC_REC.stop(); }catch(e){} const a=document.getElementById('recStart'),b=document.getElementById('recStop'); if(a)a.disabled=false; if(b)b.disabled=true; }
function recPlay(){ if(!MIC_URL){ return; } try{ const au=new Audio(MIC_URL); au.play(); }catch(e){} }
/* ===== Espejo (cámara frontal para verse la boca) ===== */
function openMirror(){ if(document.getElementById('mirrorOv'))return; if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ toast('Este dispositivo no tiene cámara'); return; } const ov=document.createElement('div'); ov.id='mirrorOv'; ov.className='mirror-ov'; ov.innerHTML='<div class="mirror-card"><video id="mirrorVid" autoplay playsinline muted></video><p class="muted" style="margin:8px 0 0">Mírate la boca mientras lo dices 🪞</p><button class="btn btn-ghost btn-sm" data-action="mirror-off" style="margin-top:8px">Cerrar espejo</button></div>'; document.body.appendChild(ov); navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(function(s){ CAM_STREAM=s; const v=document.getElementById('mirrorVid'); if(v){ v.srcObject=s; } else { s.getTracks().forEach(t=>t.stop()); } }).catch(function(){ toast('No se pudo abrir la cámara (permiso denegado)'); closeMirror(); }); }
function closeMirror(){ try{ if(CAM_STREAM)CAM_STREAM.getTracks().forEach(t=>t.stop()); }catch(e){} CAM_STREAM=null; const ov=document.getElementById('mirrorOv'); if(ov)ov.remove(); }

function progCSV(){ const p=loadProg(); let csv='Actividad,Aciertos,Intentos,Porcentaje\n'; Object.keys(p.mods).forEach(k=>{const m=p.mods[k];csv+=`"${(MOD_LABEL[k]||k)}",${m.c},${m.t},${m.t?Math.round(m.c*100/m.t):0}%\n`;}); csv+=`\nEstrellas,${stars()}\nRacha (días),${p.streak||0}\n`; return csv; }
function downloadProg(){ try{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+progCSV()],{type:'text/csv'})); a.download='progreso-nino.csv'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ toast('No se pudo exportar'); } }

/* ===== Sistema de QUIZ genérico ===== */
function genVocab(catId){ const cat=catById(catId); const opts=shuffle(cat.items).slice(0,3); const correct=rand(opts); return {title:"¿Qué es?",prompt:{kind:'image',value:correct.e},options:shuffle(opts).map(o=>({kind:'text',label:o.w,correct:o.w===correct.w}))}; }
function genRima(){ const r=rand(RIMAS); const dist=shuffle(ALLITEMS.filter(x=>x.w!==r.w&&x.w!==r.rima.w)).slice(0,2); const opts=shuffle([{w:r.rima.w,e:r.rima.e,correct:true},...dist.map(d=>({w:d.w,e:d.e,correct:false}))]); return {title:"Rimas",prompt:{kind:'text',value:'¿Qué rima con '+r.w+'? '+r.e},options:opts.map(o=>({kind:'image',label:o.w,emoji:o.e,correct:!!o.correct}))}; }
function genSilabas(){ const it=rand(SILABAS_WORDS); const nums=[1,2,3,4]; return {title:"¿Cuántas palmadas?",prompt:{kind:'say',value:it.w,emoji:it.e,text:it.w},options:nums.map(n=>({kind:'text',label:String(n),correct:n===it.n}))}; }
function genInicial(){ const correct=rand(INICIAL_POOL); const dist=shuffle(INICIAL_POOL.filter(x=>x.i!==correct.i)).slice(0,2); const opts=shuffle([{...correct,correct:true},...dist.map(d=>({...d,correct:false}))]); return {title:"Sonido inicial",prompt:{kind:'text',value:'¿Cuál empieza por «'+correct.i.toUpperCase()+'»?'},options:opts.map(o=>({kind:'image',label:o.w,emoji:o.e,correct:!!o.correct}))}; }
function genOpuesto(){ const o=rand(OPUESTOS); const dist=shuffle(OPUESTOS.filter(x=>x.b!==o.b)).slice(0,2).map(x=>x.b); const opts=shuffle([{label:o.b,correct:true},...dist.map(d=>({label:d,correct:false}))]); return {title:"Lo contrario",prompt:{kind:'text',value:'Lo contrario de '+o.a+' '+o.ea},options:opts.map(x=>({kind:'text',label:x.label,correct:x.correct}))}; }
function genIntruso(){ const cat=rand(VOCAB_CATS); const otros=VOCAB_CATS.filter(c=>c.id!==cat.id); const intruso=rand(rand(otros).items); const items=shuffle(cat.items).slice(0,3); const opts=shuffle([...items.map(i=>({...i,correct:false})),{...intruso,correct:true}]); return {title:"El intruso",prompt:{kind:'text',value:'¿Cuál NO es de '+cat.label.toLowerCase()+'?'},options:opts.map(o=>({kind:'image',label:o.w,emoji:o.e,correct:!!o.correct}))}; }
function genDiscrim(){ const pair=rand(PARES); const said=rand(pair); return {title:"¿Cuál he dicho?",hideLabels:true,prompt:{kind:'say',value:said.w,text:'Escucha y señala'},options:shuffle(pair).map(o=>({kind:'image',label:o.w,emoji:o.e,correct:o.w===said.w}))}; }
function genLeer(){ const correct=rand(LEEPALABRAS); const dist=shuffle(LEEPALABRAS.filter(x=>x.w!==correct.w)).slice(0,2); const opts=shuffle([{...correct,correct:true},...dist.map(d=>({...d,correct:false}))]); return {title:"Lee y elige",hideLabels:true,prompt:{kind:'read',value:correct.w},options:opts.map(o=>({kind:'image',label:o.w,emoji:o.e,correct:!!o.correct}))}; }
function genForma(){ const correct=rand(SHAPES); const dist=shuffle(SHAPES.filter(x=>x.id!==correct.id)).slice(0,2); const opts=shuffle([{...correct,correct:true},...dist.map(d=>({...d,correct:false}))]); return {title:"Encaja la forma",prompt:{kind:'shape',value:correct.id,text:'Pon la pieza igual aquí'},options:opts.map(o=>({kind:'shape',label:o.n,shapeId:o.id,correct:!!o.correct}))}; }
function genFichas(){ const it=rand(FICHAS_WORDS); const n=it.son.length; const optsN=shuffle([n,n+1,Math.max(2,n-1)].filter((v,i,a)=>a.indexOf(v)===i)).slice(0,3); if(optsN.indexOf(n)<0)optsN[0]=n; return {title:"¿Cuántos sonidos?",prompt:{kind:'fichas',w:it.w,e:it.e,son:it.son},options:shuffle(optsN).map(x=>({kind:'text',label:String(x),correct:x===n}))}; }
function genOrden(){ const correct=rand(ORDEN_POOL); const dist=shuffle(ORDEN_POOL.filter(o=>o.w!==correct.w)).slice(0,2); const opts=shuffle([{...correct,correct:true},...dist.map(d=>({...d,correct:false}))]); return {title:"Escucha y toca",hideLabels:true,prompt:{kind:'say',value:'Toca el '+correct.w,text:'Escucha y toca…'},options:opts.map(o=>({kind:'image',label:o.w,emoji:o.e,correct:!!o.correct}))}; }
const QUIZGENS = { vocab:genVocab, rima:genRima, silabas:genSilabas, inicial:genInicial, discrim:genDiscrim, fichas:genFichas, orden:genOrden, leer:genLeer, forma:genForma, opuesto:genOpuesto, intruso:genIntruso };
function quiz(key,arg){ const k=key+'|'+(arg||''); if(!QZ||QZKEY!==k){ QZ=QUIZGENS[key](arg); QZKEY=k; } return QZ; }
function renderQuiz(backHref,backTxt,q){
  let promptHTML='';
  if(q.prompt.kind==='image') promptHTML=`<div class="qpic" aria-hidden="true">${esc(q.prompt.value)}</div>`;
  else if(q.prompt.kind==='say') promptHTML=`<div class="qprompt">${esc(q.prompt.text||'')} ${q.prompt.emoji?'<span aria-hidden="true">'+esc(q.prompt.emoji)+'</span>':''}</div><button class="speak-btn" id="speakBtn" data-action="say" data-w="${esc(q.prompt.value)}">🔊 Escuchar</button>`;

function viewValorar(){
  if(!ASSESSMENT){ return page(`<section>${back('#/','Inicio')}<div class="box"><h2>Valoración del lenguaje</h2><p class="muted">Marca lo que el niño/a hace. Resumen orientativo por áreas. <b>No es un diagnóstico.</b></p><div class="field"><label for="childName">Nombre (opcional)</label><input id="childName" placeholder="Ej: Martín" autocomplete="off"></div><h3 style="margin-top:10px">¿Qué edad tiene?</h3><div class="age-grid">${Object.keys(ASSESS).map(a=>`<button class="age-btn" data-action="age" data-a="${esc(a)}">${esc(a)}</button>`).join('')}</div></div></section>`); }
  const items=ASSESS[ASSESSMENT.edad];
  return page(`<section><button class="btn btn-ghost btn-sm" data-action="valorar-restart">← Cambiar edad</button><div class="box"><h2>${esc(ASSESSMENT.edad)} ${ASSESSMENT.nombre?'· '+esc(ASSESSMENT.nombre):''}</h2><p class="muted">Marca: <b>Sí</b>, <b>A veces</b> o <b>No</b>.</p>${items.map((it,i)=>`<div class="item"><span class="area-tag">${esc(it.area)}</span><div class="q">${esc(it.q)}</div><div class="scale" role="group" aria-label="${esc(it.q)}"><button data-action="mark" data-i="${i}" data-v="2" aria-pressed="${ASSESSMENT.marks[i]===2}">Sí</button><button data-action="mark" data-i="${i}" data-v="1" aria-pressed="${ASSESSMENT.marks[i]===1}">A veces</button><button data-action="mark" data-i="${i}" data-v="0" aria-pressed="${ASSESSMENT.marks[i]===0}">No</button></div></div>`).join('')}<button class="btn btn-green btn-block" data-action="result" style="margin-top:16px">Ver resultado</button></div></section>`);
}
function computeResult(){ const items=ASSESS[ASSESSMENT.edad],areas={},flags=[]; items.forEach((it,i)=>{ const v=(ASSESSMENT.marks[i]!=null)?ASSESSMENT.marks[i]:1; if(!areas[it.area])areas[it.area]={sum:0,max:0}; areas[it.area].sum+=v; areas[it.area].max+=2; if(ASSESSMENT.marks[i]===0)flags.push(it.q); }); return {areas,flags}; }
function viewResultado(){ const {areas,flags}=computeResult(); const pct=a=>Math.round((areas[a].sum/areas[a].max)*100); const cls=p=>p<50?'low':(p<80?'mid':''); const rec=flags.length>=2;
  return page(`<section><a class="btn btn-ghost btn-sm" href="#/valorar">← Volver</a><div class="box"><div class="center"><div style="font-size:48px">📋</div><h2>Resultado orientativo</h2><p class="muted">${esc(ASSESSMENT.nombre||'Peque')} · ${esc(ASSESSMENT.edad)}</p></div><h3>Por áreas</h3>${Object.keys(areas).map(a=>{const p=pct(a);return `<div class="result-area"><span><b>${esc(a)}</b></span><span class="bar"><i class="${cls(p)}" style="width:${p}%"></i></span><span style="font-weight:800;min-width:42px;text-align:right">${p}%</span></div>`;}).join('')}${flags.length?`<h3 style="margin-top:16px">A reforzar</h3><ul class="flag-list">${flags.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:`<p style="margin-top:16px;color:var(--green);font-weight:700">👏 Sin dificultades claras.</p>`}<div class="disclaimer">⚠️ Orientación, no diagnóstico. ${rec?'Conviene una valoración con la logopeda.':'Ante dudas, consulta con la logopeda.'}</div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" data-action="save-report">💾 Guardar</button><button class="btn btn-green" data-action="share-report">WhatsApp</button><button class="btn btn-ghost" data-action="valorar-restart">Nueva</button></div></div></section>`); }
function reportText(){ const {areas,flags}=computeResult(); const l=['Valoración orientativa del lenguaje',(ASSESSMENT.nombre||'Peque')+' · '+ASSESSMENT.edad,'']; Object.keys(areas).forEach(a=>l.push('- '+a+': '+Math.round((areas[a].sum/areas[a].max)*100)+'%')); if(flags.length){ l.push('','A reforzar:'); flags.forEach(f=>l.push('· '+f)); } l.push('','(Orientativo, no es un diagnóstico)'); return l.join('\n'); }
function saveReport(){ const {areas,flags}=computeResult(); const rep={id:uid(),fecha:new Date().toISOString(),nombre:ASSESSMENT.nombre||'',edad:ASSESSMENT.edad,areas:Object.fromEntries(Object.keys(areas).map(a=>[a,Math.round((areas[a].sum/areas[a].max)*100)])),flags}; const all=DB.get(K.reports,[]); all.unshift(rep); DB.set(K.reports,all); toast('Guardada en el panel ✓'); }

  return page(`<section><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px"><h2 style="margin:0">Panel de la logopeda</h2><button class="btn btn-ghost btn-sm" style="margin-left:auto" data-action="logout">Salir</button></div>${custom}${body}</section>`);
}
function viewAviso(){ const wa=CONFIG.WHATSAPP.replace(/\D/g,''); return page(`<section>${back('#/','Inicio')}<div class="box" style="max-width:680px;text-align:left"><h2>Contacto y aviso</h2><p><b>${esc(CONFIG.APP_NAME)}</b><br>${esc(CONFIG.CITY)}<br>📞 WhatsApp: <a href="https://wa.me/${wa}" target="_blank" rel="noopener noreferrer" style="color:var(--brand);font-weight:700">${esc(CONFIG.WHATSAPP.replace(/^34/,'+34 '))}</a>${CONFIG.EMAIL?`<br>✉️ <a href="mailto:${esc(CONFIG.EMAIL)}" style="color:var(--brand);font-weight:700">${esc(CONFIG.EMAIL)}</a>`:''}</p><hr style="border:none;border-top:1px solid var(--line);margin:14px 0"><p><b>Herramienta de apoyo.</b> Ayuda a practicar el habla, el lenguaje y la lectoescritura y ofrece una valoración <b>orientativa</b>. No es un diagnóstico ni sustituye a la sesión con la logopeda.</p><p><b>Datos.</b> Todo se guarda solo en este dispositivo (localStorage); no se envía a ningún servidor.</p><p><b>Voz.</b> La pronunciación la genera el navegador; la calidad depende del dispositivo.</p><div class="center" style="margin-top:14px"><a class="btn btn-green" href="https://wa.me/${wa}" target="_blank" rel="noopener noreferrer">Escribir por WhatsApp</a> <a class="btn btn-ghost" href="#/">Volver</a></div></div></section>`); }

/* ===== Router ===== */
function parse(){ return location.hash.replace(/^#\/?/,'').split('/'); }
function render(){
  stopMic(); closeMirror(); try{ if(SR)SR.abort(); }catch(e){}
  const p=parse(), a=p[0], b=p[1], c=p[2];
  let html;
  if(a===''||a==null) html=viewHome();
  else if(a==='aprender'){
    if(b==='articulacion') html=viewArticulacion(c);
    else if(b==='vocabulario') html=viewVocabulario(c);
    else if(b==='fonologica') html=viewFonologica(c);
    else if(b==='lectoescritura') html=viewLecto(c);
    else if(b==='cuentos') html=viewCuentos(c);
    else if(b==='comprension') html=viewComprension(c);
    else if(b==='soplo') html=viewSoplo();
    else html=viewAprender();
  }
  else if(a==='caa'){ if(b==='comunicador') html=viewComunicador(); else if(b==='emociones') html=viewEmociones(); else if(b==='agenda') html=viewAgenda(); else html=viewCAA(); }
  else if(a==='paresmin') html=viewParesMin();
  else if(a==='magico') html=viewMagico();
  else if(a==='familias') html=viewFamilias();
  else if(a==='progreso') html=viewProgreso();
  else if(a==='valorar') html=viewValorar();
  else if(a==='resultado') html=ASSESSMENT?viewResultado():viewValorar();
  else if(a==='panel') html=viewPanel();
  else if(a==='aviso') html=viewAviso();
  else html=viewHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  if(location.hash.indexOf('lectoescritura/trazar')>=0) initTraza(LE_TRAZ);
}
function initTraza(letter){
  const cv=document.getElementById('traza'); if(!cv) return; const ctx=cv.getContext('2d');
  function drawGuide(){ ctx.clearRect(0,0,cv.width,cv.height); ctx.save(); ctx.font="700 280px 'Fredoka',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#e7eef9'; ctx.fillText(letter,cv.width/2,cv.height/2+14); ctx.restore(); ctx.lineWidth=18; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#2563b8'; }
  drawGuide(); cv._clear=drawGuide; let drawing=false;
  function pos(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)}; }
  cv.addEventListener('pointerdown',e=>{ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1); ctx.stroke(); try{cv.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  cv.addEventListener('pointermove',e=>{ if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
  cv.addEventListener('pointerup',()=>{ drawing=false; }); cv.addEventListener('pointercancel',()=>{ drawing=false; });
}

/* ===== Eventos ===== */
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const act=el.dataset.action;
  switch(act){
    case 'go': location.hash=el.dataset.h; break;
    case 'install': installApp(); break;
    case 'calm': toggleCalm(); break;
    case 'say': speak(el.dataset.w); break;
    case 'art-next': if(ART){ const ph=PHONEMES.find(p=>p.id===ART.phon); ART.idx=(ART.idx+1)%ph.palabras.length; render(); } break;
    case 'art-prev': if(ART){ const ph=PHONEMES.find(p=>p.id===ART.phon); ART.idx=(ART.idx-1+ph.palabras.length)%ph.palabras.length; render(); } break;
    case 'art-star': addStar(1); recordResult('articulacion',true); toast('¡Muy bien! ⭐'); render(); break;
    case 'mirror-on': openMirror(); break;
    case 'mirror-off': closeMirror(); break;
    case 'frase-add': FRASE_BUILD.push({w:el.dataset.w,e:el.dataset.e}); speak(el.dataset.w); render(); break;
    case 'frase-del': FRASE_BUILD.pop(); render(); break;
    case 'frase-clear': FRASE_BUILD=[]; render(); break;
    case 'frase-read': if(FRASE_BUILD.length>=2){ speak(FRASE_BUILD.map(p=>p.w).join(' ')); addStar(1); recordResult('frases',true); toast('¡Buena frase! ⭐'); } else if(FRASE_BUILD.length){ speak(FRASE_BUILD.map(p=>p.w).join(' ')); } break;
    case 'answer':{ const ok=el.dataset.correct==='1'; const fb=document.getElementById('fb');
      recordResult((QZKEY||'').split('|')[0], ok);
      document.querySelectorAll('[data-action="answer"]').forEach(o=>o.disabled=true); el.classList.add(ok?'good':'bad');
      if(ok){ addStar(1); if(fb){fb.textContent='¡Muy bien! ⭐'; fb.className='feedback ok';} speak('¡Muy bien!'); }
      else { if(fb){fb.textContent='Casi… inténtalo otra vez'; fb.className='feedback no';} document.querySelectorAll('[data-correct="1"]').forEach(o=>o.classList.add('good')); }
      setTimeout(()=>{ QZ=null; render(); }, ok?1100:1600); break; }
    case 'scene-item': speak(el.dataset.w); el.classList.add('si-pop'); setTimeout(()=>el.classList.remove&&el.classList.remove('si-pop'),350); break;
    case 'cuento-read': speak(el.dataset.w); addStar(1); recordResult('cuento',true); { const t=document.getElementById('cuentoTxt'); if(t)t.classList.add('reading'); } toast('¡Bien leído! ⭐'); break;
    case 'mic-on': startBalloon(); break;
    case 'mic-off': stopMic(); { const s=document.getElementById('magStatus'); if(s)s.textContent='Parado.'; const b=document.getElementById('balloon'); if(b)b.style.transform='scale(.4)'; } break;
    case 'rec-start': recStart(); break;
    case 'rec-stop': recStop(); break;
    case 'rec-play': recPlay(); break;
    case 'print-report': window.print(); break;
    case 'export-prog': downloadProg(); break;
    case 'reset-prog': if(el.dataset.armed==='1'){ DB.set(K.prog,{mods:{},days:{},streak:0,lastDay:''}); render(); toast('Progreso borrado'); } else { el.dataset.armed='1'; el.textContent='⚠️ Pulsa otra vez'; setTimeout(()=>{ if(el){el.dataset.armed='0';el.textContent='Borrar';} },3000); } break;
    case 'caa-cat': CAA_CAT=el.dataset.c; render(); break;
    case 'caa-add': CAA_PHRASE.push({w:el.dataset.w,e:el.dataset.e,img:el.dataset.img||''}); speak(el.dataset.w); render(); break;
    case 'listen': listen(el.dataset.w,'srStatus'); break;
    case 'par-grp': PARI={grp:el.dataset.c,idx:0}; render(); break;
    case 'par-prev': { const g=PARES_PROD.find(x=>x.id===PARI.grp)||PARES_PROD[0]; PARI.idx=(PARI.idx-1+g.pares.length)%g.pares.length; render(); break; }
    case 'par-next': { const g=PARES_PROD.find(x=>x.id===PARI.grp)||PARES_PROD[0]; PARI.idx=(PARI.idx+1)%g.pares.length; render(); break; }
    case 'par-star': addStar(1); recordResult('paresmin',true); toast('¡Muy bien! ⭐'); render(); break;
    case 'cus-add': { const w=(document.getElementById('cusW')||{}).value||''; const f=document.getElementById('cusImg'); if(!w.trim()){ toast('Escribe una palabra'); break; } const file=f&&f.files&&f.files[0]; const done=img=>{ const c=loadCustom(); c.items.push({w:w.trim(),img:img||'',e:'🖼️'}); saveCustom(c); render(); toast('Añadido a «Mis cosas»'); }; if(file) readImageResized(file,done); else done(''); break; }
    case 'cus-del': { const c=loadCustom(); c.items.splice(+el.dataset.i,1); saveCustom(c); render(); break; }
    case 'caa-del': CAA_PHRASE.pop(); render(); break;
    case 'caa-clear': CAA_PHRASE=[]; render(); break;
    case 'caa-say': if(CAA_PHRASE.length) speak(CAA_PHRASE.map(p=>p.w).join(' ')); break;
    case 'emo': EMO=el.dataset.w; speak('Me siento '+el.dataset.w); render(); break;
    case 'le-cons': LE_CONS=el.dataset.c; render(); break;
    case 'le-traz': LE_TRAZ=el.dataset.c; speak(el.dataset.c.toLowerCase()); render(); break;
    case 'traza-clear': { const cv=document.getElementById('traza'); if(cv&&cv._clear)cv._clear(); break; }
    case 'agenda': { const i=+el.dataset.i; AGENDA_DONE[i]=!AGENDA_DONE[i]; if(AGENDA_DONE[i])speak(el.dataset.w); render(); break; }
    case 'agenda-reset': AGENDA_DONE={}; render(); break;
    case 'age': ASSESSMENT={edad:el.dataset.a,nombre:(document.getElementById('childName')||{}).value||'',marks:{}}; render(); break;
    case 'mark': if(ASSESSMENT){ ASSESSMENT.marks[+el.dataset.i]=+el.dataset.v; el.parentElement.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false')); el.setAttribute('aria-pressed','true'); } break;
    case 'result': location.hash='#/resultado'; break;
    case 'valorar-restart': ASSESSMENT=null; if(location.hash==='#/valorar'){ render(); } else { location.hash='#/valorar'; } break;
    case 'save-report': saveReport(); break;
    case 'share-report': window.open('https://wa.me/'+CONFIG.WHATSAPP.replace(/\D/g,'')+'?text='+encodeURIComponent(reportText()),'_blank','noopener'); break;
    case 'logout': DB.set(K.admin,false); toast('Sesión cerrada'); location.hash='#/'; break;
    case 'del-report': if(confirm('¿Borrar esta valoración?')){ DB.set(K.reports,DB.get(K.reports,[]).filter(r=>r.id!==el.dataset.id)); render(); } break;
    case 'export': exportCSV(); break;
  }
});
document.addEventListener('submit',function(e){ if(e.target.id==='gateForm'){ e.preventDefault(); const v=document.getElementById('gatePass').value; if(v===CONFIG.ADMIN_PASSWORD){ DB.set(K.admin,true); render(); toast('¡Hola! 👋'); } else { toast('Contraseña incorrecta'); } } });
window.addEventListener('hashchange',render);
function exportCSV(){ const reps=DB.get(K.reports,[]); const rows=[['Fecha','Nombre','Edad','Áreas','A reforzar']]; reps.forEach(r=>rows.push([new Date(r.fecha).toLocaleString('es-ES'),r.nombre||'',r.edad,Object.entries(r.areas).map(([a,p])=>a+' '+p+'%').join(' | '),(r.flags||[]).join(' | ')])); const csv=rows.map(row=>row.map(c=>{ c=String(c); if(/^[=+\-@]/.test(c))c="'"+c; return '"'+c.replace(/"/g,'""')+'"'; }).join(',')).join('\n'); try{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'})); a.download='valoraciones.csv'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ toast('No se pudo exportar'); } }

if(calmOn()) document.body.classList.add('calm');
setupPWA();
render();
</script>
