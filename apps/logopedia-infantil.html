<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Logopedia Infantil · Hablar, comunicar y valorar</title>
<meta name="description" content="App de logopedia infantil: juegos de habla y lenguaje que hablan en voz alta, comunicador de pictogramas (CAA) para autismo, emociones, agenda visual, modo calma y valoración orientativa por edades. Herramienta de apoyo para la logopeda.">
<meta name="theme-color" content="#2563b8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" id="favicon">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="manifest" id="manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#2563b8; --brand-deep:#1c4d92; --brand-soft:#e7f0fb;
  --green:#0f7a52; --green-soft:#e2f3ec;
  --purple:#6a3fb0; --purple-soft:#efe9fa;
  --coral:#d9531f; --coral-soft:#fdece4;
  --gold:#8a6500;
  --bg:#f6f8fc; --surface:#ffffff;
  --ink:#1f2733; --ink-soft:#55617a; --ink-mut:#55617a;
  --line:#e4e9f2;
  --r:18px; --r-lg:26px;
  --sh:0 6px 18px rgba(30,50,90,.08); --sh-lg:0 16px 40px rgba(30,50,90,.16);
  --max:920px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.5;overflow-x:hidden}
h1,h2,h3{font-family:'Fredoka',system-ui,sans-serif;font-weight:600;line-height:1.1;margin:0 0 .4em}
h1{font-size:clamp(26px,6vw,38px)} h2{font-size:clamp(21px,5vw,28px)} h3{font-size:18px}
p{margin:0 0 1em}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--max);margin:0 auto;padding:0 16px}
.muted{color:var(--ink-soft)}
.center{text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;border-radius:999px;padding:14px 22px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;cursor:pointer;transition:transform .14s,box-shadow .14s,background .14s;line-height:1}
.btn:hover{transform:translateY(-2px)} .btn:active{transform:translateY(0)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 8px 18px rgba(37,99,184,.3)}
.btn-primary:hover{background:var(--brand-deep)}
.btn-green{background:var(--green);color:#fff} .btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--surface);color:var(--brand);border:2px solid var(--brand)}
.btn-ghost:hover{background:var(--brand-soft)}
.btn-sm{padding:9px 16px;font-size:14px} .btn-block{display:flex;width:100%}
.btn:focus-visible,[role=button]:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,button:focus-visible{outline:3px solid #e8a300;outline-offset:2px}

header.top{position:sticky;top:0;z-index:40;background:rgba(246,248,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:8px;height:58px}
.logo{display:flex;align-items:center;gap:9px;font-family:'Fredoka';font-weight:700;font-size:18px;color:var(--ink)}
.logo .mk{width:32px;height:32px;border-radius:9px;overflow:hidden;flex:0 0 auto}
.nav .sp{margin-left:auto}
.nav .icon-btn{background:var(--surface);border:1px solid var(--line);border-radius:999px;width:40px;height:40px;display:grid;place-items:center;font-size:18px;cursor:pointer;color:var(--ink)}
.nav .stars-bar{font-size:14px;padding:6px 12px}
.nav a.panel-link{font-weight:700;font-size:13px;color:var(--ink-soft);padding:8px 8px;border-radius:999px}
.nav a.panel-link:hover{background:var(--brand-soft);color:var(--brand)}

section{padding:22px 0}
.hero{text-align:center;padding:30px 0 8px}
.hero .big-emoji{font-size:58px;margin-bottom:4px}
.hero h1 span{color:var(--brand)}

.choices{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:640px){.choices{grid-template-columns:1fr 1fr 1fr}}
.choice{border:none;border-radius:var(--r-lg);padding:22px 20px;text-align:left;cursor:pointer;color:#fff;font-family:inherit;display:flex;flex-direction:column;gap:5px;min-height:140px;transition:transform .15s,box-shadow .15s;box-shadow:var(--sh)}
.choice:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.choice .ce{font-size:42px} .choice h2{color:#fff;margin:0;font-size:22px} .choice p{margin:0;opacity:.95;font-weight:600;font-size:14px}
.choice.jugar{background:linear-gradient(135deg,#2563b8,#3f86e0)}
.choice.comunica{background:linear-gradient(135deg,#6a3fb0,#9466d6)}
.choice.valorar{background:linear-gradient(135deg,#0f7a52,#1ba573)}

.grid{display:grid;gap:14px;grid-template-columns:repeat(2,1fr)}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;font-family:inherit;text-align:center;box-shadow:var(--sh);transition:transform .14s,box-shadow .14s;display:flex;flex-direction:column;gap:6px;align-items:center}
.tile:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.tile .te{font-size:40px} .tile b{font-family:'Fredoka';font-size:16px} .tile small{color:var(--ink-soft);font-weight:600}

.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
.chip{border:2px solid var(--line);background:var(--surface);color:var(--ink);border-radius:14px;min-width:54px;padding:11px 14px;font-family:'Fredoka';font-weight:600;font-size:17px;cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--brand)} .chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}

.wordcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-lg);max-width:420px;margin:0 auto;padding:26px 20px;text-align:center}
.wordcard .pic{font-size:110px;line-height:1;margin-bottom:6px}
.wordcard .word{font-family:'Fredoka';font-size:38px;font-weight:700;color:var(--brand)}
.speak-btn{margin-top:12px;background:#e8a300;color:#3a2b00;border:none;border-radius:999px;padding:15px 24px;font-family:'Fredoka';font-weight:700;font-size:18px;cursor:pointer;display:inline-flex;gap:10px;align-items:center;box-shadow:0 6px 16px rgba(232,163,0,.35)}
.speak-btn:hover{transform:translateY(-2px)}
.row-nav{display:flex;justify-content:space-between;gap:10px;max-width:420px;margin:14px auto 0}
.dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--line)} .dots i.on{background:var(--brand)}

.qbox{max-width:460px;margin:0 auto;text-align:center}
.qpic{font-size:100px;margin:4px 0 14px}
.opts{display:grid;gap:12px}
.optbtn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:16px;font-family:'Fredoka';font-size:22px;cursor:pointer;transition:.14s}
.optbtn:hover{border-color:var(--brand)} .optbtn.good{background:var(--green-soft);border-color:var(--green);color:var(--green)} .optbtn.bad{background:var(--coral-soft);border-color:var(--coral);color:var(--coral)}
.opt-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.opt-img{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:14px 6px;font-size:44px;cursor:pointer;transition:.14s}
.opt-img:hover{border-color:var(--brand)} .opt-img.good{background:var(--green-soft);border-color:var(--green)} .opt-img.bad{background:var(--coral-soft);border-color:var(--coral)}
.feedback{font-family:'Fredoka';font-size:24px;font-weight:700;margin:12px 0;min-height:30px}
.feedback.ok{color:var(--green)} .feedback.no{color:var(--coral)}
.stars-bar{display:inline-flex;gap:6px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:800;color:#8a6500;box-shadow:var(--sh)}

/* ===== CAA / Comunicador ===== */
.strip{background:var(--surface);border:2px solid var(--purple);border-radius:18px;padding:12px;box-shadow:var(--sh);margin-bottom:14px;position:sticky;top:64px;z-index:20}
.strip-row{display:flex;align-items:center;gap:8px}
.strip-items{flex:1;display:flex;gap:8px;overflow-x:auto;min-height:64px;padding:2px}
.strip-items .ph{color:var(--ink-soft);font-weight:700;align-self:center}
.sp-item{flex:0 0 auto;background:var(--purple-soft);border:1px solid #d8caf0;border-radius:12px;padding:6px 8px;text-align:center;min-width:62px}
.sp-item .e{font-size:30px;line-height:1} .sp-item .w{font-size:12px;font-weight:700;color:var(--purple)}
.strip-ctrl{display:flex;gap:6px}
.strip-ctrl button{border:none;border-radius:12px;width:46px;height:46px;font-size:20px;cursor:pointer}
.strip-ctrl .say{background:var(--purple);color:#fff} .strip-ctrl .back{background:#eee} .strip-ctrl .clear{background:var(--coral-soft);color:var(--coral)}
.pic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:520px){.pic-grid{grid-template-columns:repeat(4,1fr)}}
.pic-btn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 6px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:2px;align-items:center;transition:.12s}
.pic-btn:hover{border-color:var(--purple);transform:translateY(-2px)}
.pic-btn .pe{font-size:40px} .pic-btn .pw{font-size:14px;font-weight:600;color:var(--ink)}
.emo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.emo-grid{grid-template-columns:repeat(4,1fr)}}
.emo-btn{background:var(--surface);border:2px solid var(--line);border-radius:18px;padding:16px 8px;cursor:pointer;font-family:'Fredoka';display:flex;flex-direction:column;gap:4px;align-items:center;transition:.12s}
.emo-btn:hover{border-color:var(--purple);transform:translateY(-2px)} .emo-btn.sel{border-color:var(--purple);background:var(--purple-soft)}
.emo-btn .ef{font-size:50px} .emo-btn .en{font-weight:700}
.emo-out{font-family:'Fredoka';font-size:24px;text-align:center;margin:14px 0;min-height:30px;color:var(--purple);font-weight:700}
.step{display:flex;align-items:center;gap:14px;background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.12s}
.step:hover{border-color:var(--purple)} .step.done{background:var(--green-soft);border-color:var(--green)}
.step .se{font-size:38px;flex:0 0 auto} .step .st{flex:1;font-weight:700;font-family:'Fredoka';font-size:17px}
.step .schk{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
.step.done .schk{background:var(--green);border-color:var(--green);color:#fff}

.exlist{display:grid;gap:12px}
.excard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;gap:14px;align-items:center;box-shadow:var(--sh)}
.excard .ee{font-size:38px;flex:0 0 auto} .excard .ex-body{flex:1;min-width:0} .excard b{font-family:'Fredoka';font-size:17px}
.blow{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7,transparent),var(--coral);flex:0 0 auto}
.blow.animate{animation:blow 2.6s ease-in-out infinite}
@keyframes blow{0%,100%{transform:scale(.85)}50%{transform:scale(1.15)}}

.box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:22px;max-width:640px;margin:0 auto}
.age-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
.age-btn{background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:18px;font-family:'Fredoka';font-size:18px;cursor:pointer;transition:.14s}
.age-btn:hover{border-color:var(--brand);transform:translateY(-2px)}
.item{padding:14px 0;border-bottom:1px solid var(--line)}
.item .q{font-weight:700;margin-bottom:8px} .item .area-tag{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--brand);background:var(--brand-soft);padding:2px 8px;border-radius:999px;margin-bottom:6px}
.scale{display:flex;gap:8px} .scale.two button{flex:1}
.scale button{flex:1;border:2px solid var(--line);background:var(--surface);border-radius:12px;padding:10px;font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:14px}
.scale button[aria-pressed="true"][data-v="2"]{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.scale button[aria-pressed="true"][data-v="1"]{background:#fff6df;border-color:#e8a300;color:#8a6500}
.scale button[aria-pressed="true"][data-v="0"]{background:var(--coral-soft);border-color:var(--coral);color:var(--coral)}
.result-area{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:10px}
.bar{flex:1;height:10px;border-radius:999px;background:var(--line);overflow:hidden;max-width:180px}
.bar i{display:block;height:100%;border-radius:999px;background:var(--green)} .bar i.low{background:var(--coral)} .bar i.mid{background:#e8a300}
.flag-list li{margin-bottom:6px}
.disclaimer{background:var(--coral-soft);border:1px solid #f3c9b6;color:#8a3a13;border-radius:14px;padding:12px 14px;font-size:13.5px;font-weight:700;margin:14px 0}
.field{margin-bottom:14px;text-align:left} .field label{display:block;font-weight:700;margin-bottom:6px;font-size:14px}
.field input,.field select{width:100%;padding:12px 14px;border:2px solid var(--line);border-radius:12px;font-family:inherit;font-size:16px;background:var(--surface);color:var(--ink)}
.report-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.report-card .rc-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}

footer{background:var(--ink);color:#d7deea;padding:28px 0 22px;margin-top:26px;text-align:center}
footer .fl{display:inline-block;margin:0 8px;color:#bcc8db;font-size:14px;background:none;border:none;cursor:pointer;font-family:inherit}
footer .credit{border-top:1px solid rgba(255,255,255,.12);margin-top:16px;padding-top:14px;font-size:12.5px;color:#aab6cc}

#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(160%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:700;z-index:200;transition:transform .3s;box-shadow:var(--sh-lg);max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

/* ===== Modo calma (sensorial) ===== */
body.calm{font-size:18px}
body.calm *{animation:none!important;transition:none!important}
body.calm .blow{display:none}
body.calm .choice,body.calm .tile,body.calm .pic-btn,body.calm .emo-btn{box-shadow:none}
body.calm header.top{background:#eef2f8}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="app" role="main"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script type="application/json" id="acceptance-tests">

<script>
"use strict";
const CONFIG = {
  APP_NAME: "Logopedia Infantil",
  ADMIN_PASSWORD: "logo1234",
  WHATSAPP: "34600000000",
  STUDIO_BRAND: "Incuba tu Negocio",
  STUDIO_AUTHOR: "Jaime M. M.",
  STUDIO_URL: ""
};
const DB = {
  get(k,fb){ try{ const v=localStorage.getItem(k); return v==null?fb:JSON.parse(v); }catch(e){ return fb; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ toast("No se pudo guardar"); return false; } }
};
const K = { stars:"lg_stars", reports:"lg_reports", admin:"lg_admin", vocab:"lg_vocab", calm:"lg_calm" };

function speak(text){
  try{
    if(!('speechSynthesis' in window)){ toast('Tu dispositivo no puede leer en voz alta'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text)); u.lang='es-ES'; u.rate=.85; u.pitch=1.1;
    const vs=window.speechSynthesis.getVoices().filter(v=>/es/i.test(v.lang)); if(vs[0])u.voice=vs[0];
    window.speechSynthesis.speak(u);
  }catch(e){}
}
try{ if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>{}; }catch(e){}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }
function stars(){ return DB.get(K.stars,0); } function addStar(n){ DB.set(K.stars, stars()+(n||1)); }
function pick(arr,n){ const a=[...arr],out=[]; while(out.length<n&&a.length){ out.push(a.splice(Math.floor(Math.random()*a.length),1)[0]); } return out; }

/* ===== Contenido habla/lenguaje ===== */
const PHONEMES = [
  {id:"p", label:"P", words:[{w:"pato",e:"🦆"},{w:"pan",e:"🍞"},{w:"pelota",e:"⚽"},{w:"pera",e:"🍐"}]},
  {id:"m", label:"M", words:[{w:"mano",e:"✋"},{w:"mono",e:"🐵"},{w:"manzana",e:"🍎"},{w:"mariposa",e:"🦋"}]},
  {id:"l", label:"L", words:[{w:"luna",e:"🌙"},{w:"lobo",e:"🐺"},{w:"limón",e:"🍋"},{w:"león",e:"🦁"}]},
  {id:"s", label:"S", words:[{w:"sol",e:"☀️"},{w:"oso",e:"🐻"},{w:"casa",e:"🏠"},{w:"sopa",e:"🍲"}]},
  {id:"r", label:"R (fuerte)", words:[{w:"ratón",e:"🐭"},{w:"rosa",e:"🌹"},{w:"perro",e:"🐕"},{w:"guitarra",e:"🎸"}]},
  {id:"r2", label:"R (suave)", words:[{w:"cara",e:"😊"},{w:"pera",e:"🍐"},{w:"toro",e:"🐂"},{w:"loro",e:"🦜"}]},
  {id:"k", label:"C/K", words:[{w:"casa",e:"🏠"},{w:"coco",e:"🥥"},{w:"cama",e:"🛏️"},{w:"copa",e:"🥤"}]},
  {id:"t", label:"T", words:[{w:"taza",e:"☕"},{w:"tomate",e:"🍅"},{w:"tren",e:"🚂"},{w:"tortuga",e:"🐢"}]},
  {id:"f", label:"F", words:[{w:"foca",e:"🦭"},{w:"foto",e:"📷"},{w:"sofá",e:"🛋️"},{w:"flor",e:"🌸"}]},
  {id:"ch", label:"CH", words:[{w:"coche",e:"🚗"},{w:"chocolate",e:"🍫"},{w:"chupete",e:"🍼"},{w:"ducha",e:"🚿"}]}

      <div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
        <p class="muted" style="margin:0 0 8px">¿Buscas señales de autismo?</p>
        <a class="btn btn-purple btn-sm" href="#/tea">🧩 Señales de alerta (TEA)</a>
      </div>
    </div></section>`);
  }
  const items=ASSESS[ASSESSMENT.edad];
  return page(`<section><button class="btn btn-ghost btn-sm" data-action="valorar-restart">← Cambiar edad</button>
    <div class="box">
      <h2>${esc(ASSESSMENT.edad)} ${ASSESSMENT.nombre?'· '+esc(ASSESSMENT.nombre):''}</h2>
      <p class="muted">Marca: <b>Sí</b>, <b>A veces</b> o <b>No</b> todavía.</p>
      ${items.map((it,i)=>`<div class="item"><span class="area-tag">${esc(it.area)}</span><div class="q">${esc(it.q)}</div>
        <div class="scale" role="group" aria-label="${esc(it.q)}">
          <button data-action="mark" data-i="${i}" data-v="2" aria-pressed="${ASSESSMENT.marks[i]===2}">Sí</button>
          <button data-action="mark" data-i="${i}" data-v="1" aria-pressed="${ASSESSMENT.marks[i]===1}">A veces</button>
          <button data-action="mark" data-i="${i}" data-v="0" aria-pressed="${ASSESSMENT.marks[i]===0}">No</button>
        </div></div>`).join('')}
      <button class="btn btn-green btn-block" data-action="result" style="margin-top:16px">Ver resultado</button>
    </div></section>`);
}
function computeResult(){ const items=ASSESS[ASSESSMENT.edad]; const areas={},flags=[];
  items.forEach((it,i)=>{ const v=(ASSESSMENT.marks[i]!=null)?ASSESSMENT.marks[i]:1; if(!areas[it.area])areas[it.area]={sum:0,max:0}; areas[it.area].sum+=v; areas[it.area].max+=2; if(ASSESSMENT.marks[i]===0)flags.push(it.q); }); return {areas,flags}; }
function viewResultado(){
  const {areas,flags}=computeResult(); const pct=a=>Math.round((areas[a].sum/areas[a].max)*100); const cls=p=>p<50?'low':(p<80?'mid':''); const recomienda=flags.length>=2;
  return page(`<section><a class="btn btn-ghost btn-sm" href="#/valorar">← Volver</a><div class="box">
    <div class="center"><div style="font-size:48px">📋</div><h2>Resultado orientativo</h2><p class="muted">${esc(ASSESSMENT.nombre||'Peque')} · ${esc(ASSESSMENT.edad)}</p></div>
    <h3>Por áreas</h3>
    ${Object.keys(areas).map(a=>{const p=pct(a);return `<div class="result-area"><span><b>${esc(a)}</b></span><span class="bar"><i class="${cls(p)}" style="width:${p}%"></i></span><span style="font-weight:800;min-width:42px;text-align:right">${p}%</span></div>`;}).join('')}
    ${flags.length?`<h3 style="margin-top:16px">A reforzar</h3><ul class="flag-list">${flags.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:`<p style="margin-top:16px;color:var(--green);font-weight:700">👏 No se marcaron dificultades claras.</p>`}
    <div class="disclaimer">⚠️ Orientación, no diagnóstico. ${recomienda?'Por lo marcado, <b>conviene una valoración con la logopeda</b>.':'Ante dudas, consulta con la logopeda.'}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" data-action="save-report">💾 Guardar</button><button class="btn btn-green" data-action="share-report">WhatsApp</button><button class="btn btn-ghost" data-action="valorar-restart">Nueva</button></div>
  </div></section>`);
}
function reportText(){ const {areas,flags}=computeResult(); const l=[`Valoración orientativa del lenguaje`,`${ASSESSMENT.nombre||'Peque'} · ${ASSESSMENT.edad}`,'']; Object.keys(areas).forEach(a=>l.push(`- ${a}: ${Math.round((areas[a].sum/areas[a].max)*100)}%`)); if(flags.length){ l.push('','A reforzar:'); flags.forEach(f=>l.push('· '+f)); } l.push('','(Orientativo, no es un diagnóstico)'); return l.join('\n'); }
function saveReport(){ const {areas,flags}=computeResult(); const rep={id:uid(),tipo:'lenguaje',fecha:new Date().toISOString(),nombre:ASSESSMENT.nombre||'',edad:ASSESSMENT.edad,areas:Object.fromEntries(Object.keys(areas).map(a=>[a,Math.round((areas[a].sum/areas[a].max)*100)])),flags}; const all=DB.get(K.reports,[]); all.unshift(rep); DB.set(K.reports,all); toast('Guardada en el panel ✓'); }

/* ===== Señales TEA (orientativo) ===== */
function viewTEA(){
  if(!TEA) TEA={marks:{},nombre:''};
  return page(`<section>${back('#/valorar','Valoración')}<div class="box">
    <h2>🧩 Señales de alerta (TEA)</h2>
    <p class="muted">Orientativo, para niños de ~1,5 a 3 años. Marca <b>Sí</b> si lo hace habitualmente o <b>No</b> si no. <b>No es un diagnóstico</b> ni el test M-CHAT oficial.</p>
    <div class="field"><label for="teaName">Nombre (opcional)</label><input id="teaName" placeholder="Ej: Lucía" value="${esc(TEA.nombre)}"></div>
    ${TEA_FLAGS.map((q,i)=>`<div class="item"><div class="q">${esc(q)}</div>
      <div class="scale two" role="group" aria-label="${esc(q)}">
        <button data-action="tmark" data-i="${i}" data-v="2" aria-pressed="${TEA.marks[i]===2}">Sí</button>
        <button data-action="tmark" data-i="${i}" data-v="0" aria-pressed="${TEA.marks[i]===0}">No</button>
      </div></div>`).join('')}
    <button class="btn btn-purple btn-block" data-action="tea-result" style="margin-top:16px">Ver resultado</button>
  </div></section>`);
}
function viewTEAResult(){
  const noCount=TEA_FLAGS.reduce((n,_,i)=>n+(TEA.marks[i]===0?1:0),0);
  const flags=TEA_FLAGS.filter((_,i)=>TEA.marks[i]===0);
  const nivel = noCount>=4?'alto':(noCount>=2?'medio':'bajo');
  const txt = nivel==='alto'?'Se marcan varias señales: <b>se recomienda una valoración especializada</b> (logopeda + pediatra/neuropediatra).':(nivel==='medio'?'Algunas señales presentes: <b>conviene comentarlo con la logopeda</b> y observar.':'Pocas o ninguna señal marcada.');
  return page(`<section><a class="btn btn-ghost btn-sm" href="#/tea">← Volver</a><div class="box">
    <div class="center"><div style="font-size:48px">🧩</div><h2>Resultado orientativo</h2><p class="muted">${esc(TEA.nombre||'Peque')} · señales marcadas: ${noCount}/${TEA_FLAGS.length}</p></div>
    ${flags.length?`<h3>Señales marcadas (No)</h3><ul class="flag-list">${flags.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:`<p style="color:var(--green);font-weight:700">No se marcaron señales.</p>`}
    <div class="disclaimer">⚠️ Esto es <b>orientativo</b>, NO un diagnóstico ni el M-CHAT oficial. El autismo lo diagnostica un equipo especializado. ${txt}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" data-action="save-tea">💾 Guardar</button><button class="btn btn-ghost" data-action="go" data-h="#/tea">Repetir</button></div>
  </div></section>`);
}
function saveTEA(){ const flags=TEA_FLAGS.filter((_,i)=>TEA.marks[i]===0); const rep={id:uid(),tipo:'tea',fecha:new Date().toISOString(),nombre:TEA.nombre||'',edad:'TEA (cribado)',areas:{'Señales':TEA_FLAGS.length-flags.length+'/'+TEA_FLAGS.length},flags}; const all=DB.get(K.reports,[]); all.unshift(rep); DB.set(K.reports,all); toast('Guardada en el panel ✓'); }

/* ===== Panel ===== */
function isAdmin(){ return DB.get(K.admin,false)===true; }
function viewPanel(sub){
  if(!isAdmin()){
    return page(`<section><div class="box" style="max-width:420px">
      <div class="center" style="font-size:46px">🔒</div><h2 class="center">Panel de la logopeda</h2>
      <p class="muted center">Valoraciones guardadas y ajustes.</p>
      <form id="gateForm"><div class="field"><label for="gatePass">Contraseña</label><input id="gatePass" type="password" autocomplete="current-password"></div><button class="btn btn-primary btn-block" type="submit">Entrar</button></form>
      <p class="muted center" style="font-size:12px;margin-top:10px">Demo: ${esc(CONFIG.ADMIN_PASSWORD)}</p>
    </div></section>`);
  }
  sub=sub||'informes';
  const tab=(id,l)=>`<button class="chip ${sub===id?'active':''}" data-action="ptab" data-t="${id}" style="font-size:14px;min-width:auto;padding:9px 14px">${l}</button>`;
  return page(`<section>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px"><h2 style="margin:0">Panel de la logopeda</h2><button class="btn btn-ghost btn-sm" style="margin-left:auto" data-action="logout">Salir</button></div>
    <div class="chips" style="justify-content:flex-start">${tab('informes','📋 Valoraciones')}${tab('vocab','🖼️ Vocabulario')}</div>
    ${sub==='vocab'?panelVocab():panelInformes()}
  </section>`);
}
function panelInformes(){
  const reps=DB.get(K.reports,[]);
  if(!reps.length) return `<div class="box"><div class="center muted" style="padding:20px"><div style="font-size:44px">📭</div><p>Aún no hay valoraciones guardadas.</p><a class="btn btn-primary" href="#/valorar">Hacer una valoración</a></div></div>`;
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-ghost btn-sm" data-action="export">⬇️ Exportar CSV</button></div>
  ${reps.map(r=>`<div class="report-card"><div class="rc-top"><b>${esc(r.nombre||'Peque')} · ${esc(r.edad)}</b><span class="muted" style="font-size:12px">${new Date(r.fecha).toLocaleDateString('es-ES')}</span></div>
    <div style="margin:8px 0;display:flex;gap:8px;flex-wrap:wrap">${Object.entries(r.areas).map(([a,p])=>`<span class="stars-bar" style="color:var(--ink-soft);font-size:12px;padding:4px 10px">${esc(a)}: ${esc(p)}${typeof p==='number'?'%':''}</span>`).join('')}</div>
    ${r.flags&&r.flags.length?`<div class="muted" style="font-size:13px"><b>A reforzar:</b> ${esc(r.flags.join(' · '))}</div>`:''}
    <div style="margin-top:8px"><button class="btn btn-ghost btn-sm" data-action="del-report" data-id="${esc(r.id)}">🗑️ Borrar</button></div>
  </div>`).join('')}`;
}
function panelVocab(){
  const v=vocab();
  return `<div class="box"><h3>Tus palabras (${v.length})</h3>
    <p class="muted" style="font-size:13px">Se usan en los juegos de vocabulario y escucha.</p>
    <form id="vocabForm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin:10px 0">
      <div class="field" style="flex:1;min-width:120px;margin:0"><label for="vw">Palabra</label><input id="vw" placeholder="tambor"></div>
      <div class="field" style="width:90px;margin:0"><label for="ve">Emoji</label><input id="ve" placeholder="🥁" maxlength="4"></div>
      <button class="btn btn-primary btn-sm" type="submit">Añadir</button></form>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${v.map((it,i)=>`<span class="stars-bar" style="color:var(--ink);font-size:15px;gap:8px">${esc(it.e)} ${esc(it.w)} <button data-action="vdel" data-i="${i}" aria-label="Quitar ${esc(it.w)}" style="border:none;background:none;cursor:pointer;color:var(--coral);font-weight:800">×</button></span>`).join('')}</div>
    ${DB.get(K.vocab,null)?`<button class="btn btn-ghost btn-sm" data-action="vreset" style="margin-top:12px">Palabras por defecto</button>`:''}
  </div>`;
}
function viewAviso(){
  return page(`<section>${back('#/','Inicio')}<div class="box" style="max-width:680px;text-align:left">
    <h2>Aviso y privacidad</h2>
    <p><b>Herramienta de apoyo.</b> Ayuda a practicar y comunicar, y ofrece valoraciones <b>orientativas</b>. No es un diagnóstico ni sustituye a una logopeda colegiada. El autismo lo diagnostica un equipo especializado.</p>
    <p><b>Datos.</b> Todo se guarda solo en este dispositivo (localStorage); no se envía a ningún servidor. Las valoraciones pueden contener datos de un menor: guárdalas con cuidado.</p>
    <p><b>Voz.</b> La pronunciación la genera el navegador; la calidad depende del dispositivo.</p>
    <div class="center" style="margin-top:14px"><a class="btn btn-ghost" href="#/">Volver</a></div>
  </div></section>`);
}

/* ===== Router ===== */
function parse(){ return location.hash.replace(/^#\/?/,'').split('/'); }
function render(){
  const parts=parse(); const a=parts[0], b=parts[1];
  let html;
  if(a===''||a==null) html=viewHome();
  else if(a==='jugar'){
    if(b==='sonidos') html=viewSonidos(parts[2]);
    else if(b==='vocabulario') html=viewVocab('name');
    else if(b==='escucha') html=viewVocab('listen');
    else if(b==='soplo') html=viewSoplo();
    else html=viewJugar();
  }
  else if(a==='caa'){
    if(b==='comunicador') html=viewComunicador();
    else if(b==='emociones') html=viewEmociones();
    else if(b==='agenda') html=viewAgenda(parts[2]);
    else html=viewCAA();
  }
  else if(a==='valorar') html=viewValorar();
  else if(a==='resultado') html=ASSESSMENT?viewResultado():viewValorar();
  else if(a==='tea') html=viewTEA();
  else if(a==='tea-result') html=TEA?viewTEAResult():viewTEA();
  else if(a==='panel') html=viewPanel(b);
  else if(a==='aviso') html=viewAviso();
  else html=viewHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
}

/* ===== Eventos ===== */
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const act=el.dataset.action;
  switch(act){
    case 'go': location.hash=el.dataset.h; break;
    case 'install': installApp(); break;
    case 'calm': toggleCalm(); break;
    case 'say': speak(el.dataset.w); break;
    case 'word-next': if(GAME){ const ph=PHONEMES.find(p=>p.id===GAME.phon); GAME.idx=(GAME.idx+1)%ph.words.length; render(); } break;
    case 'word-prev': if(GAME){ const ph=PHONEMES.find(p=>p.id===GAME.phon); GAME.idx=(GAME.idx-1+ph.words.length)%ph.words.length; render(); } break;
    case 'word-star': addStar(1); toast('¡Muy bien! ⭐'); render(); break;
    case 'answer':{ const ok=el.dataset.correct==='1'; const fb=document.getElementById('fb');
      document.querySelectorAll('[data-action="answer"]').forEach(o=>o.disabled=true); el.classList.add(ok?'good':'bad');
      if(ok){ addStar(1); if(fb){fb.textContent='¡Muy bien! ⭐'; fb.className='feedback ok';} speak('¡Muy bien!'); }
      else { if(fb){fb.textContent='Casi… prueba otra vez'; fb.className='feedback no';} document.querySelectorAll('[data-correct="1"]').forEach(o=>o.classList.add('good')); }
      setTimeout(()=>{ VOCABQ=null; render(); }, ok?1100:1600); break; }
    /* CAA */
    case 'caa-cat': CAA_CAT=el.dataset.c; render(); break;
    case 'caa-add': CAA_PHRASE.push({w:el.dataset.w,e:el.dataset.e}); speak(el.dataset.w); render(); break;
    case 'caa-del': CAA_PHRASE.pop(); render(); break;
    case 'caa-clear': CAA_PHRASE=[]; render(); break;
    case 'caa-say': if(CAA_PHRASE.length) speak(CAA_PHRASE.map(p=>p.w).join(' ')); break;
    case 'emo': EMO=el.dataset.w; speak('Me siento '+el.dataset.w); render(); break;
    case 'step': if(RUT){ const i=el.dataset.i; RUT.done[i]=!RUT.done[i]; if(RUT.done[i])speak(el.dataset.t); render(); } break;
    case 'agenda-reset': if(RUT){ RUT.done={}; render(); } break;
    /* Valoración */
    case 'age': ASSESSMENT={edad:el.dataset.a,nombre:(document.getElementById('childName')||{}).value||'',marks:{}}; render(); break;
    case 'mark': if(ASSESSMENT){ ASSESSMENT.marks[+el.dataset.i]=+el.dataset.v; el.parentElement.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false')); el.setAttribute('aria-pressed','true'); } break;
    case 'result': location.hash='#/resultado'; break;
    case 'valorar-restart': ASSESSMENT=null; if(location.hash==='#/valorar'){ render(); } else { location.hash='#/valorar'; } break;
    case 'save-report': saveReport(); break;
    case 'share-report': window.open('https://wa.me/'+CONFIG.WHATSAPP.replace(/\D/g,'')+'?text='+encodeURIComponent(reportText()),'_blank','noopener'); break;
    /* TEA */
    case 'tmark': if(TEA){ TEA.nombre=(document.getElementById('teaName')||{}).value||TEA.nombre; TEA.marks[+el.dataset.i]=+el.dataset.v; el.parentElement.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false')); el.setAttribute('aria-pressed','true'); } break;
    case 'tea-result': if(TEA){ TEA.nombre=(document.getElementById('teaName')||{}).value||TEA.nombre; } location.hash='#/tea-result'; break;
    case 'save-tea': saveTEA(); break;
    /* Panel */
    case 'ptab': location.hash='#/panel/'+el.dataset.t; break;
    case 'logout': DB.set(K.admin,false); toast('Sesión cerrada'); location.hash='#/'; break;
    case 'del-report': if(confirm('¿Borrar esta valoración?')){ DB.set(K.reports,DB.get(K.reports,[]).filter(r=>r.id!==el.dataset.id)); render(); } break;
    case 'export': exportCSV(); break;
    case 'vdel':{ const v=vocab().slice(); v.splice(+el.dataset.i,1); DB.set(K.vocab,v); render(); break; }
    case 'vreset': if(confirm('¿Volver a las palabras por defecto?')){ DB.set(K.vocab,null); render(); } break;
  }
});
document.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ const el=e.target.closest('.step[role=button]'); if(el){ e.preventDefault(); el.click(); } } });
document.addEventListener('submit',function(e){
  if(e.target.id==='gateForm'){ e.preventDefault(); const v=document.getElementById('gatePass').value; if(v===CONFIG.ADMIN_PASSWORD){ DB.set(K.admin,true); render(); toast('¡Hola! 👋'); } else { toast('Contraseña incorrecta'); } }
  else if(e.target.id==='vocabForm'){ e.preventDefault(); const w=document.getElementById('vw').value.trim(), em=document.getElementById('ve').value.trim()||'🟦'; if(!w){ toast('Escribe una palabra'); return; } const v=vocab().slice(); v.push({w,e:em}); DB.set(K.vocab,v); render(); toast('Añadida ✓'); }
});
window.addEventListener('hashchange',render);
function exportCSV(){ const reps=DB.get(K.reports,[]); const rows=[['Fecha','Nombre','Tipo','Edad','Resumen','A reforzar']];
  reps.forEach(r=>rows.push([new Date(r.fecha).toLocaleString('es-ES'),r.nombre||'',r.tipo||'',r.edad,Object.entries(r.areas).map(([a,p])=>a+' '+p+(typeof p==='number'?'%':'')).join(' | '),(r.flags||[]).join(' | ')]));
  const csv=rows.map(row=>row.map(c=>{ c=String(c); if(/^[=+\-@]/.test(c))c="'"+c; return '"'+c.replace(/"/g,'""')+'"'; }).join(',')).join('\n');
  try{ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'})); a.download='valoraciones.csv'; a.click(); URL.revokeObjectURL(a.href); }catch(e){ toast('No se pudo exportar'); }
}

/* ===== INIT ===== */
if(calmOn()) document.body.classList.add('calm');
setupPWA();
render();
</script>
</body>
</html>
