<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Tasca · Pide desde tu mesa (QR)</title>
<meta name="description" content="La Tasca: escanea el QR de tu mesa y pide tú mismo desde el móvil, sin esperar al camarero. Tu comanda llega directa a la barra.">
<meta name="theme-color" content="#22252b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="La Tasca">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="icon" id="favicon">
<link rel="manifest" id="manifest">
<style>
:root{
  --ink:#1c1e22; --text:#26282d; --muted:#5d626d; --muted-2:#878d99;
  --bg:#f4f3f0; --paper:#fbfaf7; --surface:#ffffff; --soft:#eceae5;
  --line:#e6e3dc; --line-2:#d8d4ca;
  --brand:#e0871a; --brand-d:#b96a08; --char:#23262c; --gold:#e0871a; --green:#3f9d52;
  --radius:16px; --radius-lg:22px;
  --sh-sm:0 2px 10px rgba(20,20,20,.06); --sh:0 14px 36px rgba(20,20,20,.13); --sh-lg:0 26px 64px rgba(10,10,10,.24);
  --maxw:1100px; --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
h1,h2,h3{margin:0;letter-spacing:-.02em;line-height:1.12;font-weight:800}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px}
.muted{color:var(--muted)}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}
.hide{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:0;border-radius:13px;padding:13px 22px;font-weight:800;font-size:15px;transition:.16s var(--ease);white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-primary{background:linear-gradient(180deg,#ed9426,#c2700a);color:#fff;box-shadow:0 9px 20px rgba(194,112,10,.34)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-dark{background:var(--char);color:#fff}.btn-dark:hover{transform:translateY(-2px)}
.btn-ghost{background:#fff;color:var(--brand-d);border:1.5px solid var(--line-2)}.btn-ghost:hover{border-color:var(--brand)}
.btn-block{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}
header.top{position:sticky;top:0;z-index:40;background:rgba(251,250,247,.92);backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:14px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;font-size:20px;color:var(--char)}
.brand .logo{width:40px;height:40px;flex:0 0 auto}
.brand .tag{display:block;font-size:9.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:-2px}
.nav-sp{margin-left:auto}
.mesa-pill{display:inline-flex;align-items:center;gap:7px;background:var(--char);color:#fff;border-radius:999px;padding:8px 14px;font-weight:800;font-size:13.5px}
.mesa-pill a{color:#f0b870;font-weight:700;font-size:12px}
.icon-btn{position:relative;width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line-2);background:#fff;display:inline-grid;place-items:center;color:var(--brand-d)}
.icon-btn svg{width:21px;height:21px}
.cart-badge{position:absolute;top:-7px;right:-7px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--brand);color:#fff;font-size:11.5px;font-weight:800;display:grid;place-items:center}
#installBtn{display:none}
.hero{position:relative;overflow:hidden;color:#f1ede6;background:radial-gradient(640px 420px at 80% -10%,rgba(224,135,26,.42),transparent 60%),linear-gradient(160deg,#23262c,#15171b)}
.hero .wrap{padding:48px 18px 44px;position:relative;z-index:2;text-align:center}
.hero .qr{width:120px;height:120px;margin:0 auto 18px;border-radius:22px;background:#fff;display:grid;place-items:center;box-shadow:var(--sh-lg)}
.hero .qr svg{width:90px;height:90px}
.hero h1{font-size:clamp(28px,5.4vw,44px);color:#fff;font-weight:900;max-width:16ch;margin:0 auto}
.hero h1 span{color:var(--gold)}
.hero p.lead{font-size:17px;color:#c9c3b8;max-width:440px;margin:14px auto 22px}
.mesa-box{background:rgba(255,255,255,.97);color:var(--text);border-radius:20px;padding:20px;max-width:380px;margin:0 auto;box-shadow:var(--sh-lg)}
.mesa-box h3{font-size:16px;margin-bottom:12px}
.mesa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.mesa-grid button{border:1.5px solid var(--line-2);background:#fff;border-radius:12px;padding:12px 0;font-weight:800;font-size:16px;color:var(--char)}
.mesa-grid button[aria-pressed="true"]{background:var(--char);border-color:var(--char);color:#fff}
section{padding:34px 0}
.sec-head{max-width:620px;margin:0 0 18px}
.sec-head h2{font-size:clamp(22px,4vw,32px);margin:.3em 0 .2em}
.sec-head p{color:var(--muted);font-size:15.5px;margin:0}
.mbanner{background:var(--soft);border:1px dashed var(--line-2);border-radius:14px;padding:11px 14px;margin-bottom:16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.mbanner a{color:var(--brand-d);font-weight:800;font-size:13px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1.5px solid var(--line-2);background:#fff;border-radius:999px;padding:9px 16px;font-weight:700;font-size:14px;color:var(--brand-d)}
.chip[aria-pressed="true"]{background:var(--char);border-color:var(--char);color:#fff}
.menu-list{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dish{display:flex;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:var(--sh-sm)}
.dish .ph{width:66px;height:66px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;font-size:34px;background:var(--soft);overflow:hidden}
.dish .ph img{width:100%;height:100%;object-fit:cover}
.dish .info{flex:1;min-width:0}.dish .info h3{font-size:16px}
.dish .info .d{font-size:12.5px;color:var(--muted);margin:3px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dish .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dish .price{font-weight:900;color:var(--brand-d);font-size:16px}
.add{width:38px;height:38px;border-radius:11px;border:0;background:linear-gradient(180deg,#ed9426,#c2700a);color:#fff;display:grid;place-items:center}.add svg{width:19px;height:19px}
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.feat .f{background:#fff;border:1px solid var(--line);border-radius:15px;padding:16px;box-shadow:var(--sh-sm)}
.feat .f .ic{font-size:24px}.feat .f b{display:block;margin:7px 0 2px;font-size:15px}.feat .f span{font-size:13px;color:var(--muted)}
.page{padding:22px 0 110px;min-height:60vh}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--brand-d);font-weight:800;font-size:14.5px;margin-bottom:14px}.back svg{width:18px;height:18px}
.ptitle{font-size:clamp(23px,4vw,32px);margin-bottom:6px}
.citem{display:flex;gap:13px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px;margin-bottom:11px}
.citem .cph{width:58px;height:58px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;background:var(--soft);font-size:28px;overflow:hidden}.citem .cph img{width:100%;height:100%;object-fit:cover}
.citem .ci{flex:1;min-width:0}.citem .ci b{font-size:15px}.citem .ci .p{color:var(--brand-d);font-weight:800;font-size:13.5px}
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--line-2);border-radius:11px;overflow:hidden;background:#fff}
.qty button{width:34px;height:34px;border:0;background:#fff;font-size:18px;font-weight:800;color:var(--brand-d)}.qty span{min-width:30px;text-align:center;font-weight:800}
.ci-rm{border:0;background:none;color:var(--brand-d);font-weight:800;font-size:13px}
.empty{text-align:center;padding:56px 20px;color:var(--muted)}.empty .big{font-size:46px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:800;color:var(--brand-d)}
.field input,.field textarea,.field select{border:1.5px solid var(--line-2);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);width:100%}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px #f6e6cf}
.form-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px}
.note{font-size:12.5px;color:var(--muted);margin-top:8px}
.alert{background:#fdecea;color:#a3271b;border:1px solid #f3c6c0;border-radius:12px;padding:11px 14px;font-weight:700;font-size:14px;margin-bottom:14px}
.barfix{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(0,0,0,.08);padding:12px 16px}
.barfix .in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.barfix b{font-size:17px;color:var(--char)}
.admin-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.admin-tabs button{border:1.5px solid var(--line-2);background:#fff;border-radius:11px;padding:10px 15px;font-weight:800;color:var(--brand-d)}
.admin-tabs button[aria-pressed="true"]{background:var(--char);border-color:var(--char);color:#fff}
.adm-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.adm-stat{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--sh-sm)}
.adm-stat b{display:block;font-size:22px;font-weight:900;color:var(--brand-d)}.adm-stat span{font-size:12.5px;color:var(--muted);font-weight:700}
.adm-row{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:10px}
.adm-row .aph{width:52px;height:52px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;background:var(--soft);font-size:25px;overflow:hidden}.adm-row .aph img{width:100%;height:100%;object-fit:cover}
.adm-row .ainfo{flex:1;min-width:0}.adm-row .ainfo b{font-size:15px}.adm-row .ainfo span{font-size:13px;color:var(--muted)}
.adm-act{display:flex;gap:6px;flex-wrap:wrap}
.mini{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line-2);background:#fff;display:grid;place-items:center;color:var(--brand-d)}.mini.del{color:var(--brand)}.mini svg{width:17px;height:17px}
.com{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.com .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.com .mz{background:var(--char);color:#fff;border-radius:8px;padding:4px 10px;font-weight:800;font-size:13px}
.st{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:999px}
.st.pend{background:#f6e6cf;color:#8a5a08}.st.ok{background:#e2efd6;color:#3f5e22}
.algs{display:flex;gap:4px;flex-wrap:wrap;margin:2px 0 6px}
.alg{font-size:12px;background:var(--soft);border:1px solid var(--line-2);border-radius:6px;padding:1px 5px}
.alg-ley{font-size:11.5px;color:var(--muted-2);margin-top:14px}
.reco{margin:2px 0 16px}
.reco h3{font-size:15px;color:var(--brand-d);margin:0 0 10px}
.reco-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.reco-strip::-webkit-scrollbar{display:none}
.reco-card{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;background:#fff;border:1.5px solid var(--line-2);border-radius:14px;padding:10px 14px;min-width:96px;cursor:pointer}
.reco-card .re{font-size:28px}
.reco-card b{font-size:12px;max-width:110px;text-align:center;line-height:1.15}
.reco-card .rp{font-size:12.5px;font-weight:800;color:var(--brand-d)}
.sug{margin-left:10px;border:1.5px dashed var(--line-2);background:var(--soft);border-radius:999px;padding:6px 11px;font-weight:700;font-size:12.5px;color:var(--brand-d);cursor:pointer}
.rate .star{font-size:34px;background:none;border:none;color:#d8d4ca;cursor:pointer;padding:2px 4px}
.rate .star:hover{color:var(--gold)}
.barra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ztag{font-size:11px;margin-left:5px;opacity:.8}
.bcard{background:#fff;border:2px solid var(--line-2);border-radius:16px;padding:16px;box-shadow:var(--sh-sm)}
.bcard .bmesa{font-size:22px;font-weight:900;color:var(--char)}
.bcard .bhora{font-size:12.5px;color:var(--muted);margin-bottom:8px}
.bcard ul{list-style:none;margin:0 0 10px;padding:0;font-size:15px}
.bcard li{padding:3px 0;border-bottom:1px dashed var(--line)}
.bcard .btot{font-weight:900;color:var(--brand-d);margin-bottom:10px}
.mesas-board{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 16px}
.mchip{font-size:12.5px;font-weight:800;border-radius:999px;padding:7px 12px;background:#fff;border:1.5px solid var(--line-2);color:var(--muted)}
button.mchip.ocupada{background:var(--brand);border-color:var(--brand);color:#fff;cursor:pointer}
.ov{position:fixed;inset:0;z-index:90;background:rgba(20,18,15,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
@media(min-width:560px){.ov{align-items:center;padding:18px}}
.ovsheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:92vh;overflow:auto;box-shadow:var(--sh-lg)}
@media(min-width:560px){.ovsheet{border-radius:22px}}
.ovh{padding:18px 18px 0;display:flex;gap:12px;align-items:flex-start}
.ovh .e{font-size:40px;flex:0 0 auto}
.ovh h3{font-size:20px;margin:0}.ovh .d{font-size:13px;color:var(--muted);margin-top:2px}
.ovx{margin-left:auto;width:38px;height:38px;border-radius:11px;border:1.5px solid var(--line-2);background:#fff;font-size:17px;flex:0 0 auto;cursor:pointer}
.ovb{padding:14px 18px 18px}
.modg{margin-bottom:15px}
.modg .mt{font-size:12.5px;font-weight:800;color:var(--brand-d);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.modopt{display:flex;align-items:center;gap:9px;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:11px;margin-bottom:7px;font-size:14.5px;cursor:pointer;background:#fff;width:100%;text-align:left}
.modopt[aria-pressed="true"]{border-color:var(--brand);background:var(--soft);color:var(--brand-d);font-weight:700}
.modopt .ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line-2);display:grid;place-items:center;flex:0 0 auto;font-size:13px}
.modopt[aria-pressed="true"] .ck{background:var(--brand);border-color:var(--brand);color:#fff}
.modopt.rad .ck{border-radius:50%}
.modopt .pr{margin-left:auto;font-weight:800;color:var(--brand-d);font-size:13px}
.ovnota input{width:100%;border:1.5px solid var(--line-2);border-radius:11px;padding:11px;font-size:14px;font-family:inherit}
.ovfoot{display:flex;gap:12px;align-items:center;margin-top:8px;position:sticky;bottom:0;background:#fff;padding-top:8px}
.ovfoot .qty{flex:0 0 auto}
.ci .mods{font-size:12.5px;color:var(--brand-d);margin-top:2px;line-height:1.3}
.bm{color:var(--brand-d);font-weight:700;font-size:12.5px}
.est-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;background:var(--soft);color:var(--text)}
.est-badge.pendiente{background:#f6e6cf;color:#7d5207}.est-badge.cocina{background:#ffe0b0;color:#8a4700}.est-badge.listo{background:#cdeccf;color:#1d6f2b}
.bcard.est-cocina{border-color:#f0a942}.bcard.est-listo{border-color:#56b65f}
.agot{font-size:12px;font-weight:800;color:var(--brand);background:#fdecea;border:1px solid #f3c6c0;border-radius:8px;padding:5px 10px}
.agot-card{opacity:.62}
.track{display:flex;align-items:center;margin-top:6px}
.tstep{display:flex;flex-direction:column;align-items:center;gap:4px;flex:0 0 auto;color:var(--muted-2);font-size:11.5px;font-weight:700;text-align:center;width:74px}
.tstep .tdot{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:18px;background:var(--soft);border:2px solid var(--line-2)}
.tstep.on{color:var(--brand-d)}.tstep.on .tdot{background:var(--soft);border-color:var(--brand);color:var(--brand-d)}
.tstep.now .tdot{background:var(--brand);border-color:var(--brand);color:#fff;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.tline{flex:1;height:3px;background:var(--line-2);border-radius:2px;margin-top:-18px}
.caja-kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.caja-kpi{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--sh-sm)}
.caja-kpi b{display:block;font-size:20px;color:var(--text)}.caja-kpi span{font-size:12px;color:var(--muted)}
.caja-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--sh-sm)}
.caja-card h3{margin:0 0 10px;font-size:15px}
.caja-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.caja-row:last-child{border-bottom:0}
.caja-row .cn{flex:1;font-weight:600;font-size:14px}.caja-row .cq{color:var(--muted);font-size:13px}.caja-row .cv{font-weight:800;color:var(--brand-d);min-width:62px;text-align:right}
.bars{display:flex;align-items:flex-end;gap:6px;height:120px}
.bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bars .bcol{flex:1;width:100%;display:flex;align-items:flex-end}
.bars .bfill{width:100%;min-height:3px;background:linear-gradient(180deg,var(--brand),var(--brand-d));border-radius:6px 6px 0 0;transition:height .3s}
.bars .blbl{font-size:11px;color:var(--muted)}.bars .blbl.hoy{color:var(--brand-d);font-weight:800}
.cuenta-line{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:15px}
.cuenta-line.tot{border-top:2px solid var(--line-2);margin-top:4px;padding-top:10px;font-size:18px}
.cuenta-line.tot b{color:var(--brand-d)}
.tipchips,.tipchip{display:inline-block}.tipchips{display:flex;gap:8px;flex-wrap:wrap}
.tipchip{border:1.5px solid var(--line-2);background:#fff;border-radius:999px;padding:8px 14px;font-weight:700;font-size:14px;cursor:pointer;color:var(--text)}
.tipchip.on{background:var(--char);border-color:var(--char);color:#fff}
.splitrow{display:flex;align-items:center;gap:10px}
.rbtn{width:42px;height:42px;border-radius:12px;border:1.5px solid var(--line-2);background:#fff;font-size:22px;font-weight:800;cursor:pointer;color:var(--text)}
.cuenta-pp{margin-top:14px;text-align:center;font-size:30px;font-weight:900;color:var(--brand-d)}
.cuenta-pp span{display:block;font-size:13px;font-weight:600;color:var(--muted)}
.lang-btn{font-size:12px;font-weight:900;letter-spacing:.05em;width:auto;padding:0 10px}
.sellos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;justify-items:center;margin:6px 0 4px}
.sello{width:58px;height:58px;border-radius:50%;border:2px dashed var(--line-2);display:grid;place-items:center;font-size:15px;font-weight:800;color:var(--muted-2);background:var(--soft)}
.sello.on{border:2px solid var(--brand);background:#fff;font-size:24px;box-shadow:var(--sh-sm)}
.premio{text-align:center;margin-top:14px;padding:14px;border-radius:14px;background:var(--soft);border:1.5px solid var(--brand)}

.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}

function saneaPlatos(arr){ if(!Array.isArray(arr)) return null;
  const out=arr.slice(0,200).map(p=>{ try{ const m=p&&p.mods&&typeof p.mods==="object"?p.mods:{}; return { id:String((p&&p.id)||uid()).slice(0,24), nombre:String((p&&p.nombre)||"").slice(0,80), desc:String((p&&p.desc)||"").slice(0,200), precio:Math.max(0,Math.min(9999,Number(p&&p.precio)||0)), emoji:String((p&&p.emoji)||"🍽️").slice(0,4), cat:String((p&&p.cat)||CATS[0]).slice(0,40), zona:(p&&p.zona==="barra")?"barra":(p&&p.zona==="cocina")?"cocina":undefined, dest:!!(p&&p.dest), activo:(p&&p.activo)!==false, agotado:!!(p&&p.agotado), al:Array.isArray(p&&p.al)?p.al.filter(k=>ALG[k]).slice(0,8):[], img:(typeof (p&&p.img)==="string"&&/^data:image\/(png|jpe?g|webp|gif|svg\+xml);/.test(p.img)&&p.img.length<400000)?p.img:null, mods:{ quitar:Array.isArray(m.quitar)?m.quitar.slice(0,12).map(x=>String(x).slice(0,40)):[], elige:Array.isArray(m.elige)?m.elige.slice(0,6).map(g=>({t:String((g&&g.t)||"").slice(0,40),o:Array.isArray(g&&g.o)?g.o.slice(0,8).map(o=>String(o).slice(0,40)):[]})):[], extras:Array.isArray(m.extras)?m.extras.slice(0,8).map(e=>({n:String((e&&e.n)||"").slice(0,40),p:Math.max(0,Math.min(999,Number(e&&e.p)||0))})):[] } }; }catch(e){ return null; } }).filter(p=>p&&p.nombre);
  return out.length?out:null; }

  api("cartas?bar_id=eq."+encodeURIComponent(CONFIG.BAR_ID)+"&select=platos").then(rows=>{ const limpia=rows&&rows[0]?saneaPlatos(rows[0].platos):null; if(limpia) save("lt_platos",limpia); if(then)then(); }).catch(()=>{ if(then)then(); }); }

/* comanda en curso (lo que el cliente va pidiendo en su mesa) */
function getCart(){ const c=load("lt_cart",[]); return Array.isArray(c)?c:[]; }
function setCart(a){ save("lt_cart",Array.isArray(a)?a:[]); refreshCart(); }
function hasMods(p){ const m=p&&p.mods; return !!(m&&((m.quitar&&m.quitar.length)||(m.elige&&m.elige.length)||(m.extras&&m.extras.length))); }
function lineUnit(p,l){ return (Number(p.precio)||0)+((l.extras||[]).reduce((a,e)=>a+(Number(e.p)||0),0)); }
function cartCount(){ return getCart().reduce((a,l)=>a+(l.qty||0),0); }
function cartItems(){ const P=getPlatos(); return getCart().map(l=>{ const p=P.find(x=>x.id===l.pid); return p?{...p, lid:l.lid, qty:l.qty, quitar:l.quitar||[], elige:l.elige||{}, extras:l.extras||[], nota:String(l.nota||"").slice(0,120), unit:lineUnit(p,l)}:null; }).filter(Boolean); }
function cartTotal(){ return cartItems().reduce((a,i)=>a+i.unit*i.qty,0); }
function modsText(i){ const a=[]; (i.quitar||[]).forEach(x=>a.push("sin "+x)); const el=i.elige||{}; Object.keys(el).forEach(k=>a.push(el[k])); (i.extras||[]).forEach(e=>a.push("+"+e.n)); if(i.nota)a.push("✎ "+i.nota); return a.join(", "); }
function defaultElige(p){ const o={}; ((p.mods&&p.mods.elige)||[]).forEach(g=>{ o[g.t]=(g.o&&g.o[0])||""; }); return o; }
function addQuick(pid){ const p=getPlatos().find(x=>x.id===pid); if(!p) return; if(p.agotado){ toast("Ese plato está agotado 😕"); return; } const a=getCart(); a.push({lid:uid(),pid:pid,qty:1,quitar:[],elige:defaultElige(p),extras:[],nota:""}); setCart(a); }
function addLine(line){ const a=getCart(); a.push(line); setCart(a); }
function incLine(lid,d){ const a=getCart(); const l=a.find(x=>x.lid===lid); if(!l) return; l.qty+=d; if(l.qty<1){ setCart(a.filter(x=>x.lid!==lid)); } else setCart(a); }
function rmLine(lid){ setCart(getCart().filter(x=>x.lid!==lid)); }
function refreshCart(){ const n=cartCount(),b=$("#cartCount"); if(b){ b.textContent=n; b.classList.toggle("hide",n===0); } updateMesaPill(); }
function updateMesaPill(){ const el=$("#mesaPill"); if(!el) return; const m=getMesa(); if(m){ el.style.display="inline-flex"; el.innerHTML=(esLlevar(m)?'🥡 '+esc(T("Para llevar")):'🍽️ '+esc(T("Mesa"))+' '+esc(m))+(getSettings().qrEstricto&&!esLlevar(m)?'':' <a href="#/" data-action="cambiarMesa">cambiar</a>'); } else el.style.display="none"; }
function phHTML(p){ return p.img?`<img src="${esc(p.img)}" alt="${esc(p.nombre)}">`:`<span>${esc(p.emoji||"🍽️")}</span>`; }

/* ── Horario de cocina: vacío = siempre abierta. Formato "13:00-16:00, 20:00-23:30" ── */
function cocinaInfo(){
  const h=(getSettings().horario||"").trim(); if(!h) return {open:true};
  const now=new Date(); const cur=now.getHours()*60+now.getMinutes();
  const fmt=mn=>String(Math.floor(mn/60)).padStart(2,"0")+":"+String(mn%60).padStart(2,"0");
  const ranges=h.split(",").map(s=>s.trim()).filter(Boolean).map(r=>{ const m=r.match(/^(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})$/); return m?[(+m[1])*60+(+m[2]),(+m[3])*60+(+m[4])]:null; }).filter(Boolean);
  if(!ranges.length) return {open:true};
  for(const r of ranges){ if(cur>=r[0]&&cur<r[1]) return {open:true}; }
  const nexts=ranges.map(r=>r[0]).filter(a=>a>cur).sort((a,b)=>a-b);
  return {open:false, next: nexts.length?fmt(nexts[0]):(fmt(Math.min(...ranges.map(r=>r[0])))+" ("+T("mañana")+")")};
}

function admCaja(){
  const C=comandasAll().filter(c=>c.estado!=="cancelada");
  const hoy=new Date().toISOString().slice(0,10);
  const d=new Date(); d.setDate(d.getDate()-6); const semIni=d.toISOString().slice(0,10);
  const ch=C.filter(c=>c.dia===hoy);
  const cs=C.filter(c=>c.dia>=semIni);
  const vHoy=ch.reduce((a,c)=>a+(c.total||0),0);
  const vSem=cs.reduce((a,c)=>a+(c.total||0),0);
  const ticket=ch.length?vHoy/ch.length:0;
  // top platos (hoy)
  const cnt={};
  ch.forEach(c=>(c.items||[]).forEach(i=>{ if(!cnt[i.nombre])cnt[i.nombre]={q:0,v:0}; cnt[i.nombre].q+=i.qty; cnt[i.nombre].v+=(i.precio||0)*i.qty; }));
  const top=Object.entries(cnt).sort((a,b)=>b[1].q-a[1].q).slice(0,6);
  // por camarero (hoy)
  const cam={}; ch.forEach(c=>{ const k=c.camarero||"📱 Clientes"; if(!cam[k])cam[k]={n:0,v:0}; cam[k].n++; cam[k].v+=(c.total||0); });
  const cams=Object.entries(cam).sort((a,b)=>b[1].v-a[1].v);
  // por hora (hoy)
  const hr={}; ch.forEach(c=>{ const h=(c.hora||"").slice(0,2); if(h)hr[h]=(hr[h]||0)+(c.total||0); });
  const horas=Object.keys(hr).sort();
  const maxH=Math.max(1,...Object.values(hr));
  // ventas por día (semana)
  const dias=[]; for(let i=6;i>=0;i--){ const dd=new Date(); dd.setDate(dd.getDate()-i); const k=dd.toISOString().slice(0,10); dias.push({k,lbl:["D","L","M","X","J","V","S"][dd.getDay()],v:C.filter(c=>c.dia===k).reduce((a,c)=>a+(c.total||0),0)}); }
  const maxD=Math.max(1,...dias.map(x=>x.v));
  return `<div class="caja-kpis">
    <div class="caja-kpi"><b>${money(vHoy)}</b><span>ventas de hoy</span></div>
    <div class="caja-kpi"><b>${ch.length}</b><span>comandas hoy</span></div>
    <div class="caja-kpi"><b>${money(ticket)}</b><span>ticket medio</span></div>
    <div class="caja-kpi"><b>${money(vSem)}</b><span>últimos 7 días</span></div>
  </div>
  <div class="caja-card"><h3>Ventas de la semana</h3>
    <div class="bars">${dias.map(x=>`<div class="bar"><div class="bcol"><div class="bfill" style="height:${Math.round(x.v/maxD*100)}%" title="${money(x.v)}"></div></div><span class="blbl${x.k===hoy?" hoy":""}">${x.lbl}</span></div>`).join("")}</div>
  </div>
  <div class="caja-card"><h3>Platos más vendidos (hoy)</h3>
    ${top.length?top.map(([n,o])=>`<div class="caja-row"><span class="cn">${esc(n)}</span><span class="cq">×${o.q}</span><span class="cv">${money(o.v)}</span></div>`).join(""):'<p class="muted" style="margin:6px 0">Aún no hay ventas hoy.</p>'}
  </div>
  <div class="caja-card"><h3>Ventas por camarero (hoy)</h3>
    ${cams.length?cams.map(([n,o])=>`<div class="caja-row"><span class="cn">${esc(n)}</span><span class="cq">${o.n} com.</span><span class="cv">${money(o.v)}</span></div>`).join(""):'<p class="muted" style="margin:6px 0">Sin datos hoy.</p>'}
  </div>
  <div class="caja-card"><h3>Ventas por hora (hoy)</h3>
    ${horas.length?`<div class="bars">${horas.map(h=>`<div class="bar"><div class="bcol"><div class="bfill" style="height:${Math.round(hr[h]/maxH*100)}%" title="${money(hr[h])}"></div></div><span class="blbl">${esc(h)}h</span></div>`).join("")}</div>`:'<p class="muted" style="margin:6px 0">Sin datos hoy.</p>'}
  </div>
  <div style="margin-top:14px"><button class="btn btn-dark" data-action="exportCaja" type="button">⬇️ Exportar ventas (CSV)</button><p class="note">Descarga todas las comandas para tu gestoría o Excel.</p></div>`;
}

}

let ACTX=null;
function actx(){ try{ if(!ACTX) ACTX=new (window.AudioContext||window.webkitAudioContext)(); if(ACTX.state==="suspended") ACTX.resume(); return ACTX; }catch(e){ return null; } }
function beep(){ try{ const ctx=actx(); if(!ctx) return; const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=.15; o.start(); o.stop(ctx.currentTime+.25); }catch(e){} }
function vibrar(p){ try{ if(navigator.vibrate) navigator.vibrate(p||[180,90,180]); }catch(e){} }
/* Aviso fuerte multi-dispositivo: pitido triple + vibración + parpadeo + notificación del sistema */
function beepFuerte(){ try{ const ctx=actx(); if(!ctx) return; const g=ctx.createGain(); g.connect(ctx.destination); g.gain.value=.28; [0,.35,.7].forEach((t,i)=>{ const o=ctx.createOscillator(); o.connect(g); o.frequency.value=i===1?660:880; o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.28); }); }catch(e){} }
function flash(){ try{ const d=document.createElement("div"); d.className="flashav"; document.body.appendChild(d); setTimeout(()=>{ try{d.remove();}catch(e){} },1400); }catch(e){} }
function notiSistema(tit,txt){ try{ if(!("Notification" in window)||Notification.permission!=="granted"||!document.hidden) return; const n=new Notification(tit,{body:txt,icon:(typeof logoURI==="function"?logoURI():undefined),tag:"lt-aviso"}); setTimeout(()=>{ try{n.close();}catch(e){} },8000); }catch(e){} }
function avisoFuerte(tit,txt){ beepFuerte(); vibrar([220,100,220,100,220]); flash(); notiSistema(tit,txt); }
/* Push: avisos con el móvil bloqueado (necesita servidor + sw.js subido junto a la app, ver guía) */
function pushOn(){ return cloudOn()&&!!CONFIG.PUSH_KEY&&("serviceWorker" in navigator)&&("PushManager" in window)&&location.protocol==="https:"; }
function b64aU8(b){ const p="=".repeat((4-b.length%4)%4); const s=(b+p).replace(/-/g,"+").replace(/_/g,"/"); const r=atob(s); const a=new Uint8Array(r.length); for(let i=0;i<r.length;i++)a[i]=r.charCodeAt(i); return a; }
function suscribirPush(rol){ try{ if(!pushOn()||Notification.permission!=="granted") return;
  navigator.serviceWorker.register("sw.js").then(reg=>reg.pushManager.getSubscription().then(s=>s||reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64aU8(CONFIG.PUSH_KEY)}))).then(sub=>api("push_subs?on_conflict=endpoint",{method:"POST",headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},body:JSON.stringify({bar_id:CONFIG.BAR_ID,endpoint:sub.endpoint,sub:sub,rol:rol||"staff"})})).then(()=>toast("Avisos con el móvil bloqueado activados 🔔📲")).catch(()=>{});
}catch(e){} }
/* Mantener encendida la pantalla de barra (tablet del local) */

document.addEventListener("visibilitychange",()=>{ try{ if(document.visibilityState==="visible"&&(location.hash||"").indexOf("barra")!==-1&&(ADMIN_OK||BARRA_OK)) mantenerPantalla(); }catch(e){} });
let LASTP=-1, LASTSIG=null, MIPED_EST={};

function barraCheck(){ try{ const h=location.hash||""; if(h.indexOf("personal")!==-1){ if(cloudOn()) refreshMsgs(paintChat); return; } if(h.indexOf("mipedido")!==-1){ if(cloudOn()) refreshComandas(()=>{ if(notifyMiPedido()) render(); }); return; }
  const esBarra=h.indexOf("barra")!==-1&&(ADMIN_OK||BARRA_OK); const esCam=h.indexOf("camarero")!==-1&&!!getCam();
  if(!esBarra&&!esCam) return;

  if(cloudOn()) refreshComandas(fin); else fin();

/* ====== Router ====== */
const GATE_RUTA={ camarero:2, mipedido:2, cuenta:2, sellos:3, personal:3 };
function render(){
  let r=(location.hash||"#/").replace(/^#\//,"").split("/")[0];
  if(GATE_RUTA[r]&&!f(GATE_RUTA[r])) r="";
  let html;
  if(r==="carta") html=viewCarta();
  else if(r==="barra") html=viewBarra();
  else if(r==="camarero") html=viewCamarero();
  else if(r==="personal") html=viewPersonal();
  else if(r==="mipedido") html=viewMiPedido();
  else if(r==="cuenta") html=viewCuenta();
  else if(r==="sellos") html=viewSellos();
  else if(r==="comanda") html=viewComanda();
  else if(r==="gracias") html=viewGracias();
  else if(r==="legal") html=viewLegal();
  else if(r==="admin") html=viewAdmin();
  else html=viewHome();
  $("#app").innerHTML=html; window.scrollTo(0,0); refreshCart();

/* ====== Comanda → barra (WhatsApp) ====== */
function telWa(t){ let d=String(t||"").replace(/[^0-9]/g,""); if(d.indexOf("00")===0)d=d.slice(2); if(d.length===9)d="34"+d; return d; }
function waOpen(msg){ const num=B().whatsapp; if(num){ try{ window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg),"_blank","noopener"); }catch(e){} return true; } return false; }
function enviarComanda(){
  if(!puedePedir()) return;
  const items=cartItems(); if(!items.length) return; let m=getMesa()||"-";
  if(esLlevar(m)){ const nom=($("#llNom")?$("#llNom").value.trim():""), hr=($("#llHora")?$("#llHora").value.trim():""); if(!nom||!hr){ toast(T("Pon tu nombre y la hora de recogida 🥡")); return; } save("lt_llevar",{nombre:nom,hora:hr}); m="LLEVAR|"+nom.replace(/\|/g," ").slice(0,40)+"|"+hr.slice(0,5); }
  const cam=getCam(); const camN=cam?cam.nombre:"";
  const dest=cam?"#/camarero":"#/gracias";
  const c={ id:uid(), mesa:m, camarero:camN, dia:new Date().toISOString().slice(0,10), hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}), items:items.map(i=>({nombre:i.nombre,qty:i.qty,precio:i.unit,mods:modsText(i),zona:zonaPlato(i)})), total:cartTotal(), estado:"pendiente" };
  const finLocal=()=>{ const C=load("lt_comandas",[]); C.push(c); save("lt_comandas",C.slice(-300));
    let msg="*Comanda · "+mesaTxt(m)+"*"+(camN?(" · "+camN):"")+"\n\n"; c.items.forEach(i=>{ msg+="• "+i.nombre+" ×"+i.qty+(i.mods?(" ("+i.mods+")"):"")+"\n"; }); msg+="\nTotal: "+money(c.total);
    if(!waOpen(msg)) toast(cam?"Comanda enviada 🔔":T("Comanda guardada solo en este aparato (sin conexión con la barra)."));
    if(!cam){ pushMis(c,c.id); addSello(); } RATED=false; setCart([]); location.hash=dest; if(cam)render(); };
  if(cloudOn()){ api("comandas",{method:"POST",body:JSON.stringify({bar_id:CONFIG.BAR_ID,mesa:String(c.mesa),camarero:camN,dia:c.dia,hora:c.hora,items:c.items,total:c.total,estado:"pendiente"})}).then(rows=>{ if(!cam){ pushMis(c,(rows&&rows[0]&&rows[0].id)); addSello(); } RATED=false; setCart([]); location.hash=dest; if(cam)render(); toast("Comanda enviada a la barra 🔔"); }).catch(finLocal); return; }
  finLocal();
}

  const base={ nombre:$("#pNom").value.trim(), cat:$("#pCat").value, zona:($("#pZona")?$("#pZona").value:"cocina"), emoji:$("#pEmoji").value.trim()||"🍽️", desc:$("#pDesc").value.trim(), precio:parseFloat($("#pPrecio").value)||0, al:Object.keys(ALG).filter(k=>{const el=document.querySelector('[name="alg_'+k+'"]'); return el&&el.checked;}), mods:{quitar:quitar,elige:elige,extras:extras} };
  if(!base.nombre||!base.precio){ toast("Pon nombre y precio"); return; }
  const finish=img=>{ const P=getPlatos(); if(idv){ const p=P.find(x=>x.id===idv); if(p){ Object.assign(p,base); if(img!==undefined)p.img=img; } } else { P.unshift({id:uid(),activo:true,img:img||null,...base}); } setPlatos(P); EDIT_ID=null; render(); toast("Plato guardado ✅"); window.scrollTo(0,0); };
  if(file){ compressImage(file,900,0.8).then(d=>finish(d||undefined)); } else finish(undefined);
}
function compressImage(file,maxDim,q){ return new Promise(res=>{ if(!file||!/^image\//.test(file.type||"")){ res(null); return; } const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height,m=maxDim||700; if(w>m||h>m){ if(w>=h){ h=Math.round(h*m/w); w=m; } else { w=Math.round(w*m/h); h=m; } } try{ const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h); res(cv.toDataURL("image/jpeg",q||0.8)); }catch(e){ res(r.result); } }; img.onerror=()=>res(r.result); img.src=r.result; }; r.onerror=()=>res(null); r.readAsDataURL(file); }); }

/* ====== PWA ====== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; const b=$("#installBtn"); if(b)b.style.display="inline-grid"; });
function installApp(){ if(deferredPrompt){ deferredPrompt.prompt(); try{deferredPrompt.userChoice.finally(()=>deferredPrompt=null);}catch(e){deferredPrompt=null;} return; } const ios=/iphone|ipad|ipod/i.test(navigator.userAgent); toast(ios?"Pulsa Compartir → Añadir a inicio":"Menú del navegador → Instalar app"); }
function setupPWA(){ const ic=logoURI(); const f=$("#favicon"),ap=$("#appleIcon"); if(f)f.href=ic; if(ap)ap.href=ic; const m=$("#manifest"); if(m){ const man={name:B().nombre+" · Pide desde tu mesa",short_name:B().nombre,description:"Pide desde tu mesa por QR.",theme_color:"#22252b",background_color:"#f4f3f0",display:"standalone",start_url:".",scope:".",icons:[{src:ic,sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]}; try{ if(m._u)URL.revokeObjectURL(m._u); const u=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"})); m.href=u; m._u=u; }catch(e){} } }

/* ====== Init ====== */
try{ const q=new URLSearchParams(location.search); const mz=q.get("mesa"); if(mz&&/^\d+$/.test(mz)) setMesa(+mz); if(q.has("llevar")) setMesa("LLEVAR"); }catch(e){}
$("#year").textContent=new Date().getFullYear();
$("#footCity").textContent=B().city;
getPlatos(); try{ if(getCats().indexOf(FILTER)<0) FILTER=getCats()[0]||FILTER; }catch(e){} applyLogo(); applyName(); setupPWA(); syncLangBtn(); render(); pullCarta(()=>render());
</script>
