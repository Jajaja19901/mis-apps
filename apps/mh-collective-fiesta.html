<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MH Collective</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MH Collective">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0a0a0f;--surface:#1a1a23;--border:#333340;--text:#ffffff;--text-dim:#a0a0b0;--neon-verde:#00d48a;--vip-morado:#b026ff;--ambar:#ffb600;--rojo:#ff3333;--radius-card:8px;--radius-pill:20px;--radius-btn:6px}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html,body{max-width:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
canvas{max-width:100%}
img,svg{max-width:100%;display:block}
button,input,select,textarea{font-family:inherit;font-size:1rem;color:inherit}
/* Todos los campos legibles en tema oscuro (evita texto blanco sobre blanco) */
input:not([type=checkbox]):not([type=radio]),select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-btn);padding:10px 12px;max-width:100%}
input:not([type=checkbox]):not([type=radio]):focus,select:focus,textarea:focus{border-color:var(--neon-verde)}
select option{background:var(--surface);color:var(--text)}
a{color:var(--neon-verde)}
:focus-visible{outline:3px solid var(--neon-verde);outline-offset:2px}
h1,h2,h3{margin:0 0 .5rem;font-weight:600}
h1{font-size:clamp(1.5rem,5vw,2rem)}
p{margin:0 0 .75rem;color:var(--text-dim)}
/* Topbar: UNA sola línea compacta; los perfiles se deslizan de lado (no apilan) */
#topbar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;flex-wrap:nowrap;min-height:52px}
#logoBox{flex-shrink:0;display:flex}
#logoBox svg,#logoBox img{width:36px;height:36px}
#rolChips{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
#rolChips::-webkit-scrollbar{display:none}
#rolChips .chip{flex:0 0 auto}
.chip-rol{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-pill);padding:6px 12px;font-size:.8125rem;cursor:pointer;min-height:36px}
.chip-rol.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
#topbar [data-testid="sync-estado"]{font-size:.75rem;color:var(--text-dim);flex-shrink:0;white-space:nowrap}
#topbar [data-testid="sync-estado"].sync-ok{color:var(--neon-verde)}
#topbar [data-testid="sync-estado"].sync-mal{color:#ff5c6c}
#btnInstalar{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:var(--radius-btn);padding:6px 10px;cursor:pointer;font-size:.75rem;flex-shrink:0;white-space:nowrap;min-height:40px}
/* En pantallas estrechas el estado se muestra con un punto de color + su palabra (verde=conectado,
   rojo=sin conexión), para que se vea a simple vista si los móviles están hablando. */
@media (max-width:560px){
  #topbar [data-testid="sync-estado"]{font-size:.7rem;padding-left:15px;position:relative}
  #topbar [data-testid="sync-estado"]::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--text-dim)}
  #topbar [data-testid="sync-estado"].sync-ok::before{background:var(--neon-verde)}
  #topbar [data-testid="sync-estado"].sync-mal::before{background:#ff5c6c}
  #btnInstalar{font-size:.7rem;padding:5px 8px}
}
/* Aviso grande de conexión en el panel del Dueño */
.con-card{display:block}
.con-card .con-row{display:flex;gap:12px;align-items:flex-start}
.con-card .con-ico{font-size:1.6rem;line-height:1;flex:0 0 auto}
.con-card.con-ok{border-color:var(--neon-verde)}
.con-card.con-ok b{color:var(--neon-verde)}
.con-card.con-mal{border-color:#ff5c6c}
.con-card.con-mal b{color:#ff5c6c}
.con-card.con-espera{opacity:.85}
/* Panel de equipo conectado */
.equipo-lista{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
.eq-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg)}
.eq-item.eq-on{border-color:var(--neon-verde)}
.eq-item.eq-off{border-color:#ff5c6c}
.eq-estado{font-size:.85rem;color:var(--text-dim)}
.eq-item.eq-off .eq-estado{color:#ff5c6c}
.eq-bat{font-weight:700;white-space:nowrap;flex-shrink:0}
.ent-contacto{font-size:.8rem;opacity:.85}
.ent-contacto.ent-sincontacto{color:var(--text-dim);opacity:.6}
/* Buscador y filtros */
#buscador{width:100%;padding:12px 14px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;margin-bottom:12px}
.tabs-filtro{display:flex;gap:8px;border-bottom:2px solid var(--border);overflow-x:auto;margin-bottom:12px}
.tab-filtro{background:none;border:none;color:var(--text-dim);padding:10px 6px;font-size:.9375rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab-filtro.activo{color:var(--text);border-bottom-color:var(--neon-verde)}
/* Tarjetas persona */
.tarjeta-persona{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.tarjeta-persona .fila{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
/* Badges de estado */
.badge{display:inline-block;border-radius:var(--radius-pill);padding:8px 14px;font-size:.8125rem;font-weight:600}
.badge-dentro{background:var(--neon-verde);color:var(--bg)}
.badge-fuera{background:var(--border);color:var(--text)}
.badge-pagado{background:var(--neon-verde);color:var(--bg)}
.badge-pendiente{background:var(--ambar);color:var(--bg)}
.badge-vip{background:var(--vip-morado);color:#ffffff;box-shadow:0 0 16px rgba(176,38,255,.15)}
/* Botones */
.btn{min-height:56px;font-size:1.125rem;padding:.75rem 1.5rem;border-radius:var(--radius-btn);border:none;cursor:pointer;font-weight:600}
.btn-primario{background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.15)}
.btn-secundario{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-peligro{background:var(--rojo);color:#ffffff}
.btn-pendiente{background:var(--ambar);color:var(--bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* KPIs */
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;text-align:center}
.kpi .valor{font-size:clamp(2rem,8vw,5rem);font-weight:700;line-height:1}
.kpi .label{font-size:.8125rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em}
/* Aforo */
.barra-aforo{width:100%;height:14px;border-radius:var(--radius-pill);background:var(--border);overflow:hidden;margin:8px 0}
.barra-aforo>span{display:block;height:100%;background:var(--neon-verde)}
.barra-aforo.alerta>span{background:var(--rojo);animation:parpadeo 1s infinite}
@keyframes parpadeo{0%,100%{opacity:1}50%{opacity:.3}}
/* TPV */
.grid-productos{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.btn-producto{min-height:80px;border-radius:var(--radius-card);border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;padding:10px;text-align:center}
.btn-producto.poco-stock{border-color:var(--ambar);color:var(--ambar)}
.btn-producto.agotado{opacity:.4;cursor:not-allowed}
/* Carrito */
.carrito{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:16px}
.carrito-linea{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
/* Tablas */
table{width:100%;border-collapse:collapse;margin-bottom:16px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.9375rem}
th{color:var(--text-dim);font-weight:600;font-size:.8125rem;text-transform:uppercase}
/* Modal/overlay */
#modalRoot:empty{display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;max-width:480px;width:100%;max-height:90vh;overflow:auto}
/* Toasts */
#toastRoot{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--neon-verde);color:var(--text);padding:10px 18px;border-radius:var(--radius-pill);font-size:.9375rem}
/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--neon-verde);color:var(--bg);font-size:2rem;line-height:1;border:none;cursor:pointer;box-shadow:0 0 16px rgba(0,212,138,.3);z-index:30}
/* Layout */
main#vista{max-width:960px;margin:0 auto;padding:16px}
/* Footer */
footer{padding:20px 16px;text-align:center;font-size:.8125rem;color:var(--text-dim);border-top:1px solid var(--border)}
footer a{color:var(--text-dim);text-decoration:underline}
/* Cupo acompañante + consumiciones (mejoras) */
.btn-acomp{min-height:44px;padding:.5rem 1rem;border-radius:6px;border:1px solid var(--vip-morado);background:transparent;color:var(--vip-morado);font-weight:600;cursor:pointer;margin-top:6px}
.btn-acomp:hover{background:rgba(176,38,255,.12)}
.consumiciones-panel{margin-top:20px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-card);background:var(--surface)}
.consumiciones-panel h3{margin:0 0 10px;font-size:1rem;color:var(--vip-morado)}
#consForm{display:flex;gap:8px;margin-bottom:10px}
#cons-codigo{flex:1;min-height:44px;padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
#consForm button{min-height:44px;padding:.5rem 1rem;border-radius:6px;border:none;background:var(--vip-morado);color:#fff;font-weight:600;cursor:pointer}
.cons-hint{color:var(--text-dim);font-size:.875rem;margin:0}
.cons-no{color:var(--ambar);margin:0}
.cons-ficha{color:var(--text);line-height:1.6}
.cons-cero{color:var(--text-dim)}
.btn-canjear{margin-top:8px;min-height:48px;padding:.6rem 1.2rem;border-radius:6px;border:none;background:var(--neon-verde);color:var(--bg);font-weight:700;cursor:pointer}
/* ===== Reconciliación de estilos (clases reales que generan las piezas) ===== */
/* Red de seguridad: cualquier botón sin clase propia se ve en tema oscuro, no gris */
button{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-btn);padding:10px 14px;cursor:pointer;min-height:44px;font-weight:600}
button:hover{border-color:var(--text-dim)}
button:disabled{opacity:.5;cursor:not-allowed}
/* Chips de rol */
.chip{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-pill);padding:8px 16px;font-size:.875rem;min-height:40px}
.chip.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
/* Buscador + escanear (puerta) */
.puerta-buscador-row{display:flex;gap:8px;align-items:stretch;margin-bottom:12px;flex-wrap:wrap}
.puerta-buscador-row #buscador{flex:1;min-width:180px}
.puerta-buscador-row #buscador{margin-bottom:0}
.btn-escanear{border:1px solid var(--vip-morado);background:transparent;color:var(--vip-morado);border-radius:var(--radius-btn);white-space:nowrap}
.btn-add-persona{border:none;background:var(--neon-verde);color:var(--bg);font-weight:700;border-radius:var(--radius-btn);white-space:nowrap;padding:0 14px;min-height:44px}
.card-dentro{opacity:.55}
.btn-salida{min-height:44px;padding:0 14px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:var(--radius-btn);font-size:.9rem}
/* Pestañas de filtro */
.puerta-filtros{display:flex;gap:6px;flex-wrap:wrap;border-bottom:2px solid var(--border);margin-bottom:14px;padding-bottom:2px}
.filtro-tab{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:var(--radius-pill);padding:8px 14px;font-size:.875rem;min-height:40px}
.filtro-tab.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
/* Tarjetas de persona */
.persona-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:10px}
.persona-info{margin-bottom:10px}
.persona-nombre{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.persona-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.persona-codigo{color:var(--text-dim);font-size:.9375rem;letter-spacing:.03em}
.persona-cupo{margin-top:6px;color:var(--vip-morado);font-size:.875rem;font-weight:600}
.badge-tipo{background:var(--border);color:var(--text)}
.badge-serie{background:transparent;border:1px solid var(--vip-morado);color:var(--vip-morado);font-size:.75rem}
.lista-entradas{list-style:none;padding:0;margin:0;max-height:420px;overflow:auto}
.lista-entradas li{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.lista-entradas .ent-info{font-size:.9rem;line-height:1.7}
.lista-entradas .btn-qr{min-height:44px;flex-shrink:0}
/* Pestañas del panel del dueño (para que sea sencillo) */
.dueno-tabs{display:flex;gap:6px;overflow-x:auto;position:sticky;top:0;background:var(--bg);padding:10px 0;margin-bottom:12px;z-index:10;-webkit-overflow-scrolling:touch}
.dueno-tab{flex:0 0 auto;min-height:48px;padding:.5rem 1rem;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-weight:600;white-space:nowrap}
.dueno-tab.activa{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
.tab-intro{background:var(--surface);border-left:3px solid var(--neon-verde);border-radius:6px;padding:10px 12px;margin:0 0 14px;color:var(--text-dim);font-size:.9rem}
.persona-acciones{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
/* Botón de acción gigante + QR de la tarjeta */
.btn-accion-persona{flex:1;min-width:180px;min-height:56px;font-size:1.0625rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.18)}
.btn-qr{min-height:56px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-btn);padding:0 16px}
/* Alias de botón primario (inglés/español) */
.btn-primary,.btn-primario{background:var(--neon-verde);color:var(--bg);border:none;box-shadow:0 0 16px rgba(0,212,138,.15)}
/* KPIs del dueño */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;text-align:center;overflow:hidden}
.kpi-aforo{grid-column:1/-1}
.kpi-big{font-size:clamp(1.75rem,6vw,3rem);font-weight:700;line-height:1.05;display:block;overflow-wrap:break-word;word-break:break-word}
.desglose{font-size:.8125rem;color:var(--text-dim);margin-top:6px}
/* Paneles y controles del dueño */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;margin-bottom:16px}
.panel form label{display:block;margin-bottom:10px;color:var(--text-dim);font-size:.9375rem}
.panel form input,.panel form select{display:block;width:100%;margin-top:4px;padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text)}
.panel textarea{padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit}
/* Acordeón del panel del dueño: cada bloque se abre/cierra solo, sin recargar nada */
.acc{border:1px solid var(--border);border-radius:var(--radius-card);margin-bottom:10px;background:var(--surface);overflow:hidden}
.acc-sum{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;min-height:56px;-webkit-tap-highlight-color:transparent}
.acc-sum::-webkit-details-marker{display:none}
.acc-ttl{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.acc-t{font-weight:700;font-size:1rem;color:var(--text)}
.acc-sub{font-weight:400;font-size:.8rem;color:var(--text-dim);line-height:1.3}
.acc-sum::after{content:'▾';color:var(--text-dim);transition:transform .2s;font-size:1.1rem;padding-left:12px}
.acc[open]>.acc-sum::after{transform:rotate(180deg)}
.acc[open]>.acc-sum{border-bottom:1px solid var(--border);background:var(--bg)}
.acc-body{padding:14px 16px 6px}
.cobros-sep{border:0;border-top:1px solid var(--border);margin:14px 0}
/* Preparar la fiesta (checklist) */
.prep-card{border:1px solid var(--neon-verde)!important;box-shadow:0 0 24px rgba(0,212,138,.12)}
.prep-list{list-style:none;margin:6px 0 0;padding:0}
.prep-list li{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border)}
.prep-list li span{flex:1;font-size:.98rem}
.prep-btn{flex:0 0 auto;min-height:44px;padding:0 18px;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg)}
.acc-body .panel{border:none;padding:0;margin:0;background:transparent}
.acc-body .panel>h2{display:none}
/* Resumen de bonos vendidos (panel del dueño) */
.bono-resumen{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.bono-resumen>div{flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-btn);padding:10px;text-align:center}
.bono-resumen .br-num{display:block;font-size:1.35rem;font-weight:800;color:var(--neon-verde)}
.bono-resumen .br-lbl{display:block;font-size:.72rem;color:var(--text-dim);margin-top:2px}
/* Precio a cobrar en el modal de venta de bono */
.bono-cobrar{text-align:center;font-size:1.15rem;margin:4px 0 10px}
.bono-cobrar b{color:var(--neon-verde);font-size:1.3rem}
/* El código del bono, protagonista: grande y fácil de dictar */
.bono-codigo-big{text-align:center;font-family:ui-monospace,monospace;font-weight:800;font-size:2rem;letter-spacing:2px;color:var(--text);background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-btn);padding:12px 8px;margin:6px 0}
.badge-rrpp{background:rgba(176,38,255,.18);color:#c98bff;border:1px solid rgba(176,38,255,.4)}
.contador{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.contador button{min-width:44px}
.switch{display:flex;align-items:center;gap:10px;margin-bottom:8px;color:var(--text)}
.switch input{width:auto}
.tabla-rrpp input{width:80px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
.log-lista{list-style:none;padding:0;margin:0;max-height:320px;overflow:auto}
.log-lista li{padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem;color:var(--text-dim)}
.nota{font-size:.8125rem;color:var(--text-dim);font-style:italic}
.lista-gastos{list-style:none;padding:0;margin:0 0 10px}
.lista-gastos li{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.9375rem}
.historico-item{border:1px solid var(--border);border-radius:var(--radius-card);padding:12px;margin-bottom:8px}
.confirmar{background:rgba(255,51,51,.1);border:1px solid var(--rojo);border-radius:var(--radius-card);padding:12px;margin-top:10px}
.lista-vacia{color:var(--text-dim);text-align:center;padding:24px}
.fila-stock{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
/* PIN */
.panel-pin{max-width:320px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;text-align:center}
.panel-pin input{width:100%;margin:12px 0;padding:12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text);text-align:center;font-size:1.5rem;letter-spacing:.3em}
.error{color:var(--rojo);font-weight:600}
/* Modales (nombres reales) */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:22px;max-width:460px;width:100%;max-height:90vh;overflow:auto}
.modal-content input,.modal-content select{width:100%;margin:6px 0 12px;padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text)}
.modal-content canvas{margin:12px auto;display:block;background:#fff;border-radius:8px;padding:8px}
.modal-botones{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.modal-botones button{flex:1;min-width:110px}
.escaner-no-encontrado{color:var(--ambar);font-weight:600}
.qr-pagada{color:var(--neon-verde);font-weight:700}
.qr-pendiente{color:var(--ambar);font-weight:700}
/* Veredicto del escaneo */
.scan-res{border-radius:var(--radius-card);padding:16px;margin:12px 0;display:flex;flex-direction:column;gap:6px;text-align:center}
.scan-res b{font-size:1.5rem}
.scan-res span{font-size:1rem;color:var(--text)}
.scan-ok{background:rgba(0,212,138,.12);border:1px solid var(--neon-verde)}
.scan-rojo{background:rgba(255,51,51,.14);border:2px solid var(--rojo);animation:parpadeo 1s infinite}
.scan-verde{color:var(--neon-verde)}
.scan-ambar{color:var(--ambar)}
/* TPV (alias de rejilla + carrito) */
.productos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.prod-nombre{font-weight:600}.prod-precio{color:var(--neon-verde);font-weight:700}.prod-stock{font-size:.75rem;color:var(--text-dim)}
.prod-incluye{font-size:.72rem;color:var(--vip-morado)}
.prod-edit{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;padding:10px 0;border-bottom:1px solid var(--border)}
.prod-edit input[type=text]{flex:1;min-width:140px}
.prod-edit .mini{font-size:.75rem;color:var(--text-dim)}
.prod-edit .mini input{width:90px}
.btn-mini-borrar{min-height:40px;background:transparent;border:1px solid var(--rojo);color:var(--rojo)}
.fase-row{border:1px solid var(--border);border-radius:var(--radius-card);padding:12px;margin-bottom:10px;overflow:hidden}
.fase-cab{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fase-cab input{flex:1;min-width:0;font-weight:700}
/* Filas con campos numéricos: que quepan SIEMPRE en el ancho del móvil */
.contador{flex-wrap:wrap}
.contador label{display:flex;flex-direction:column;gap:2px;font-size:.75rem;color:var(--text-dim)}
.contador input[type=number]{width:92px;max-width:100%}
.contador select{max-width:100%}
.mini input{width:92px;max-width:100%}
/* Tabla RRPP: se desliza DENTRO de su caja, no mueve la página */
.tabla-rrpp{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
/* Barra de pestañas pegada bajo la cabecera compacta */
.dueno-tabs{top:52px}
.carrito-vacio-msg{color:var(--text-dim);text-align:center;padding:12px}
.carrito-linea{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cart-menos{min-height:36px;min-width:36px;padding:0 10px}
.carrito-vaciar{min-height:40px}
.btn-cobrar{width:100%;min-height:60px;font-size:1.25rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.2)}
.btn-vender-bono{width:100%;min-height:52px;margin-top:10px;font-size:1.0625rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--vip-morado);color:#fff;box-shadow:0 0 16px rgba(176,38,255,.2)}
.btn-camara{width:100%;min-height:56px;margin-bottom:10px;font-size:1.0625rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.2)}
.vista-barra h2{margin-bottom:12px}
/* Monedero prepago (cashless) */
.btn-monedero{border:1px solid var(--ambar);background:transparent;color:var(--ambar);font-weight:700;border-radius:var(--radius-btn);white-space:nowrap;padding:0 12px;min-height:44px}
/* Portada de entrada (contraseña + logo) */
#accesoGate{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1100px 760px at 50% -12%, rgba(0,212,138,.16), transparent 60%),
             radial-gradient(900px 700px at 50% 118%, rgba(176,38,255,.16), transparent 60%), #06060b}
#accesoGate.on{display:flex}
.gate-card{width:100%;max-width:380px;text-align:center;animation:gateIn .5s ease}
@keyframes gateIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
/* Entrada pública (invitado abre su enlace) */
.ticket-pub{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.ticket-card{width:100%;max-width:400px;text-align:center;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:26px 22px;box-shadow:0 0 60px rgba(0,212,138,.15)}
.ticket-card.ticket-usado{opacity:.92}
.ticket-ev{font-weight:800;font-size:1.15rem;letter-spacing:.5px;color:var(--neon-verde)}
.ticket-sub{color:var(--text-dim);font-size:.85rem;margin-top:2px}
.ticket-nombre{font-size:1.35rem;font-weight:800;margin:10px 0 4px}
.ticket-secreto{margin:10px 0;color:var(--ambar);font-size:.85rem}
.ticket-codigo{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:1.7rem;font-weight:800;letter-spacing:2px;margin:12px 0;word-break:break-all}
.ticket-card canvas{width:240px;max-width:80%;height:auto;background:#fff;border-radius:12px;padding:8px;margin:6px auto}
.ticket-copas{margin-top:8px;color:var(--neon-verde);font-weight:700}
.ticket-meta{margin-top:6px;color:var(--text-dim)}
.ticket-nota{margin-top:14px;color:var(--text-dim);font-size:.85rem}
.ticket-foot{margin-top:18px;color:var(--text-dim);font-size:.7rem;opacity:.7}
.ticket-secreto #ticketCuenta,.ticket-secreto b{font-variant-numeric:tabular-nums;color:#ff5c6c;font-weight:800}
.ticket-copiar{margin:4px auto 8px;display:block;min-height:44px;padding:.5rem 1.1rem;border:1px solid var(--neon-verde);background:transparent;color:var(--neon-verde);border-radius:10px;font-weight:700;cursor:pointer}
.ticket-video{width:100%;max-width:420px;aspect-ratio:16/9;border:0;border-radius:12px;margin:12px auto;display:block;background:#000}
.ticket-video-ig{width:100%;max-width:420px;height:min(70vh,620px);border:0;border-radius:12px;margin:12px auto;display:block;background:#000}
.ticket-video-mp4{width:100%;max-width:460px;height:min(80vh,860px);border:0;border-radius:12px;margin:10px auto;display:block;background:#000;object-fit:cover}
.ticket-anim{margin:18px 0;padding:22px 10px;border-radius:14px;background:radial-gradient(circle at 50% 30%,rgba(176,38,255,.35),rgba(0,212,138,.12),transparent);overflow:hidden}
.ta-conf{font-size:1.5rem;letter-spacing:6px;animation:taScroll 1.2s linear infinite}
.ta-tit{font-size:1.6rem;font-weight:900;margin-top:10px;color:#fff;text-shadow:0 0 18px rgba(176,38,255,.9)}
.ta-sub{margin-top:6px;color:var(--neon-verde);font-weight:700}
@keyframes taScroll{from{transform:translateX(-8px)}to{transform:translateX(8px)}}
.ticket-boom{margin-top:14px;font-size:1.2rem;font-weight:800;color:#ff5c6c}
.ticket-card.ticket-destruido{animation:boomIn .5s ease}
@keyframes boomIn{0%{transform:scale(1.06);opacity:.2}100%{transform:none;opacity:1}}
/* Recibimiento espectacular al copiar el código */
.recib-ov{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(5,5,12,.92);opacity:0;transition:opacity .35s ease}
.recib-ov.on{opacity:1}
/* Vídeo propio a PANTALLA COMPLETA (como Instagram real): cubre todo el móvil. */
.recib-full{padding:0;background:#000}
.recib-full-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.recib-x{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:3;width:40px;height:40px;border-radius:50%;border:0;background:rgba(0,0,0,.5);color:#fff;font-size:1.05rem;line-height:1;cursor:pointer}
.recib-full-bar{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:22px 18px calc(22px + env(safe-area-inset-bottom));text-align:center;background:linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.4),transparent)}
.recib-full-tit{font-weight:900;font-size:1.3rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.recib-full-sub{margin:4px 0 12px;color:#f0f0f0;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.recib-card{position:relative;width:100%;max-width:420px;max-height:calc(100vh - 40px);overflow-y:auto;text-align:center;background:var(--panel);border:1px solid var(--neon-verde);
  border-radius:20px;padding:24px 20px;box-shadow:0 0 80px rgba(176,38,255,.4);animation:boomIn .5s ease}
.recib-tit{font-size:1.8rem;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(176,38,255,.9)}
.recib-ev{margin-top:4px;font-weight:800;color:var(--neon-verde);letter-spacing:.5px}
.recib-emojis{font-size:2.4rem;letter-spacing:8px;margin:18px 0;animation:taScroll 1.1s linear infinite}
.recib-msg{margin-top:14px;color:var(--text);font-weight:700}
.recib-cerrar{margin-top:16px;min-height:46px;padding:.6rem 1.6rem;border:none;border-radius:12px;background:var(--neon-verde);color:var(--bg);font-weight:800;cursor:pointer}
.recib-conf{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.recib-conf .conf{position:absolute;top:-8%;font-size:1.5rem;animation:confFall 2.6s linear infinite}
@keyframes confFall{0%{transform:translateY(-10vh) rotate(0)}100%{transform:translateY(110vh) rotate(360deg)}}
.gate-logo{width:132px;height:132px;margin:0 auto 20px;border-radius:30px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#0d0d15;box-shadow:0 0 0 1px var(--border),0 0 70px rgba(0,212,138,.4)}
.gate-logo img,.gate-logo svg{width:100%;height:100%;object-fit:cover}
.gate-title{font-size:1.8rem;font-weight:800;letter-spacing:.4px;margin:0 0 4px}
.gate-sub{color:var(--text-dim);font-size:.95rem;margin-bottom:24px}
#accesoGate form{display:flex;flex-direction:column;gap:12px}
#accesoGate input{min-height:56px;text-align:center;font-size:1.1rem;border-radius:14px;border:1px solid var(--border);background:#0d0d15;color:#fff}
#accesoGate input:focus{outline:none;border-color:var(--neon-verde);box-shadow:0 0 0 3px rgba(0,212,138,.2)}
.gate-btn{min-height:56px;font-size:1.1rem;font-weight:800;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--neon-verde),#00b39f);color:#04140e;box-shadow:0 0 34px rgba(0,212,138,.4)}
.gate-err{color:var(--rojo);font-size:.9rem;min-height:18px;margin:0}
.gate-foot{margin-top:24px;color:var(--text-dim);font-size:.78rem;opacity:.85}
.gate-shake{animation:gateShake .4s}
@keyframes gateShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
/* Gráficas del panel (barra de aforo + consumo por producto) */
.barra{width:100%;height:12px;border-radius:var(--radius-pill);background:var(--border);overflow:hidden;margin-top:6px}
.barra-fill{display:block;height:100%;background:var(--neon-verde);border-radius:var(--radius-pill);transition:width .3s}
.consumo-item{margin-bottom:12px}
.consumo-cab{display:flex;justify-content:space-between;gap:8px;font-size:.95rem}
.consumo-cab b{font-weight:700}
.consumo-item:first-of-type .barra-fill{background:var(--ambar)}
/* Tipos de producto (Ron cola, Vodka limón…) */
.btn-variante{display:block;width:100%;min-height:56px;margin:8px 0;font-size:1.125rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg)}
.prod-tipos{display:block;margin-top:6px;font-size:.85rem;color:var(--text-dim)}
.prod-tipos input{width:100%}
/* NFC: pulseras/tarjetas del monedero */
.btn-nfc{width:100%;min-height:52px;margin-bottom:10px;font-size:1.0625rem;font-weight:700;border:1px dashed var(--text-dim);border-radius:var(--radius-btn);background:transparent;color:var(--text)}
/* Cobro por Bizum (directo a la cuenta del dueño) */
.btn-cobrar-bizum{width:100%;min-height:52px;margin-top:10px;font-size:1.0625rem;font-weight:700;border:1px solid var(--ambar);border-radius:var(--radius-btn);background:transparent;color:var(--ambar)}
.btn-cobrar-bizum:disabled{opacity:.4}
.btn-bizum-persona{min-height:56px;padding:0 14px;font-size:1rem;font-weight:700;border:1px solid var(--ambar);border-radius:var(--radius-btn);background:transparent;color:var(--ambar)}
.modal-tarjeta .bizum-tel{font-size:1.25rem;margin:6px 0}
/* Cobro con tarjeta (Tap to Pay) */
.btn-cobrar-tarjeta{width:100%;min-height:52px;margin-top:10px;font-size:1.0625rem;font-weight:700;border:1px solid var(--neon-azul,#00d4ff);border-radius:var(--radius-btn);background:transparent;color:var(--neon-azul,#00d4ff)}
.btn-cobrar-tarjeta:disabled{opacity:.4}
.btn-tarjeta-persona{min-height:56px;padding:0 14px;font-size:1rem;font-weight:700;border:1px solid var(--neon-azul,#00d4ff);border-radius:var(--radius-btn);background:transparent;color:var(--neon-azul,#00d4ff)}
.modal-tarjeta{text-align:center}
.modal-tarjeta .tarjeta-importe{font-size:2.5rem;font-weight:800;margin:10px 0;color:var(--neon-verde)}
.modal-tarjeta .tarjeta-pasos{text-align:left;margin:12px auto;max-width:320px;padding-left:22px;color:var(--text-dim);font-size:.95rem}
.modal-tarjeta .tarjeta-pasos li{margin-bottom:6px}
.modal-tarjeta .btn-abrir-app{display:block;width:100%;min-height:52px;line-height:52px;margin:10px 0;text-decoration:none;border-radius:var(--radius-btn)}
</style>
</head>

[

        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;

      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;

      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {

              bytes.push(b & 0xff);

          }

  var datos = {
    c: p.codigoReserva, n: (String(p.nombre || '') + ' ' + String(p.apellido || '')).trim(),
    ev: (state.config && state.config.eventName) || 'MH Collective',
    f: (state.config && state.config.fecha) || '', l: (state.config && state.config.lugar) || '',
    cp: (typeof consIncluidas === 'function' ? consIncluidas(p) : 0),
    vid: String((state.config && state.config.videoFiesta) || '').trim(),
    ig: String((state.config && state.config.instagramFiesta) || '').trim(), visto: false, ts: Date.now()
  };
  return _initTicketFirebase().then(function (db) {
    return db.collection('tickets').doc(token).set(datos).then(function () { return baseUrlApp() + '#/s/' + token; });
  });
}
// El invitado abre #/s/<token>: lee el ticket, lo muestra UNA vez y lo marca visto en la nube.
var _blindadoEnCurso = {};
function abrirTicketBlindado(token) {
  // Guard: una sola transacción por token y carga de página (si renderApp se repitiera,
  // no se marca 'visto' dos veces ni se pisa la entrada ya mostrada).
  if (_blindadoEnCurso[token]) return;
  _blindadoEnCurso[token] = true;
  var vistaT = document.getElementById('vista');
  var topbar = document.getElementById('topbar');
  if (topbar) topbar.style.display = 'none';
  if (typeof ocultarGate === 'function') ocultarGate();
  if (vistaT) vistaT.innerHTML = '<div class="ticket-pub"><div class="ticket-card"><div class="ticket-ev">Tu entrada</div><h2>Abriendo…</h2><p class="nota">Un momento.</p></div></div>';
  _initTicketFirebase().then(function (db) {
    var ref = db.collection('tickets').doc(token);
    return db.runTransaction(function (t) {
      return t.get(ref).then(function (snap) {
        if (!snap.exists) return { estado: 'noexiste' };
        var d = snap.data() || {};
        if (d.visto) return { estado: 'visto', datos: d };
        t.update(ref, { visto: true, vistoTs: Date.now() });
        return { estado: 'ok', datos: d };
      });
    });
  }).then(function (res) {
    if (!vistaT) return;
    if (res.estado === 'noexiste') { vistaT.innerHTML = htmlTicketPublico(null, true, false); return; }
    if (res.estado === 'visto') { vistaT.innerHTML = htmlTicketPublico(res.datos, true, true); return; }
    _ticketDatos = res.datos;
    _ticketToken = 's-' + token;
    vistaT.innerHTML = htmlTicketPublico(res.datos, true, false);
    var cvs = document.getElementById('ticketQR');
    if (cvs) { try { drawQR(cvs, res.datos.c, 240); } catch (e) {} }
    try { iniciarAutodestruccion('s-' + token, res.datos); } catch (e) {}
  }).catch(function () {
    if (vistaT) vistaT.innerHTML = '<div class="ticket-pub"><div class="ticket-card"><div class="ticket-ev">Tu entrada</div><h2>No se pudo abrir</h2><p class="nota">Comprueba la conexión y vuelve a abrir el enlace. Si sigue, pide al organizador que te la reenvíe.</p></div></div>';
  });
}

/* ---------- Migración suave (v1/v2 -> forma actual) ---------- */

function productosDesdePrecios(precios) {
  var stockDefaults = { copa: 100, cerveza: 200, refresco: 150, chupito: 100 };
  var nombres = { copa: "Copa/Combinado", cerveza: "Cerveza", refresco: "Refresco/Agua", chupito: "Chupito" };
  var out = [];
  for (var key in precios) {
    if (!Object.prototype.hasOwnProperty.call(precios, key)) continue;
    var stock = Object.prototype.hasOwnProperty.call(stockDefaults, key) ? stockDefaults[key] : 100;
    out.push({ id: key, nombre: nombres[key] || key, precio: precios[key], stock: stock, stockInicial: stock });
  }
  return out.length ? out : seedProductos();
}

function ensureClavesPerfil(mapa, prefijo, cantidad, defecto) {
  for (var i = 1; i <= cantidad; i++) {
    var key = prefijo + "-" + i;
    if (!Object.prototype.hasOwnProperty.call(mapa, key)) {
      mapa[key] = (typeof defecto === "function") ? defecto() : defecto;
    }
  }
  return mapa;
}

function migrar(s) {
  if (!s || typeof s !== "object") return seedState();

  if (!s.config || typeof s.config !== "object") s.config = {};
  if (s.config.eventName === undefined) s.config.eventName = CONFIG.EVENT_NAME;
  if (s.config.maxAforo === undefined) s.config.maxAforo = CONFIG.MAX_AFORO;
  if (s.config.precioEntrada === undefined) s.config.precioEntrada = CONFIG.PRECIO_ENTRADA;
  if (s.config.precioMesaVip === undefined) s.config.precioMesaVip = CONFIG.PRECIO_MESA_VIP;
  if (s.config.nVigilantes === undefined) s.config.nVigilantes = 2;
  if (s.config.nCamareros === undefined) s.config.nCamareros = 2;
  if (!s.config.claves || typeof s.config.claves !== "object") s.config.claves = {};
  if (typeof s.config.accesoClave !== "string") s.config.accesoClave = CONFIG.ACCESO_PASSWORD;
  if (typeof s.config.adminClave !== "string") s.config.adminClave = CONFIG.ADMIN_PASSWORD;
  if (!Array.isArray(s.config.adminsExtra)) s.config.adminsExtra = [];
  if (typeof s.config.preparada !== "boolean") s.config.preparada = false;
  if (!s.config.modulos) {
    s.config.modulos = { qr: true, cierre: true, gastos: true, stock: true };
  }
  if (!s.config.productos) {
    s.config.productos = s.config.precios ? productosDesdePrecios(s.config.precios) : seedProductos();
  }
  s.config.productos.forEach(function (pr) {
    if (typeof pr.refrescosIncluidos !== 'number') pr.refrescosIncluidos = 0;
    // Tipos del producto (Ron cola, Vodka limón…): datos antiguos no los traen.
    if (!Array.isArray(pr.variantes)) pr.variantes = (pr.id === 'copa') ? ['Ron cola', 'Vodka limón', 'Ginebra cola'] : [];
  });
  if (!s.config.productos.some(function (pr) { return pr.id === 'botella'; })) {
    s.config.productos.push({ id: 'botella', nombre: 'Botella (a elegir)', precio: 60, stock: 40, stockInicial: 40, refrescosIncluidos: 4 });
  }
  if (!s.config.bonoCfg) s.config.bonoCfg = { ventaCamareros: false, copas: 5, precio: 20 };
  // Datos viejos podían no traer precio/copas numéricos → la venta no sumaba a caja. Se normaliza.
  if (typeof s.config.bonoCfg.precio !== 'number' || isNaN(s.config.bonoCfg.precio)) s.config.bonoCfg.precio = 20;
  if (typeof s.config.bonoCfg.copas !== 'number' || s.config.bonoCfg.copas < 1) s.config.bonoCfg.copas = 5;
  if (!s.config.tarjetaCfg || typeof s.config.tarjetaCfg !== 'object') s.config.tarjetaCfg = { activa: false, app: 'sumup' };
  if (typeof s.config.tarjetaCfg.activa !== 'boolean') s.config.tarjetaCfg.activa = false;
  if (typeof s.config.tarjetaCfg.app !== 'string') s.config.tarjetaCfg.app = 'sumup';
  if (!s.config.monederoCfg || typeof s.config.monederoCfg !== 'object') s.config.monederoCfg = { activo: false };
  if (typeof s.config.monederoCfg.activo !== 'boolean') s.config.monederoCfg.activo = false;
  if (!s.config.bizumCfg || typeof s.config.bizumCfg !== 'object') s.config.bizumCfg = { activo: false, telefono: '' };
  if (typeof s.config.bizumCfg.activo !== 'boolean') s.config.bizumCfg.activo = false;
  if (typeof s.config.bizumCfg.telefono !== 'string') s.config.bizumCfg.telefono = '';
  if (!s.config.nfcCfg || typeof s.config.nfcCfg !== 'object') s.config.nfcCfg = { activo: false };
  if (typeof s.config.nfcCfg.activo !== 'boolean') s.config.nfcCfg.activo = false;
  if (typeof s.config.preguntarTipo !== 'boolean') s.config.preguntarTipo = false;
  if (typeof s.config.puertaVentaRRPP !== 'boolean') s.config.puertaVentaRRPP = true;
  if (typeof s.config.entregaUnaVez !== 'boolean') s.config.entregaUnaVez = false;
  if (typeof s.config.videoFiesta !== 'string') s.config.videoFiesta = '';
  if (typeof s.config.instagramFiesta !== 'string') s.config.instagramFiesta = '';
  if (!s.config.emailjsCfg || typeof s.config.emailjsCfg !== 'object') s.config.emailjsCfg = { publicKey: '', serviceId: '', templateId: '' };
  ['publicKey', 'serviceId', 'templateId'].forEach(function (k) { if (typeof s.config.emailjsCfg[k] !== 'string') s.config.emailjsCfg[k] = ''; });
  if (!s.presencia || typeof s.presencia !== 'object') s.presencia = {};
  if (!s.ventasPorProducto || typeof s.ventasPorProducto !== 'object') s.ventasPorProducto = {};
  if (!Array.isArray(s.monederos)) s.monederos = [];
  if (typeof s.ingresosMonederos !== 'number') s.ingresosMonederos = 0;
  if (typeof s.config.accesoAuto !== 'boolean') s.config.accesoAuto = false;
  ['fecha', 'hora', 'lugar', 'lema'].forEach(function (k) { if (typeof s.config[k] !== 'string') s.config[k] = ''; });
  if (s.config.logo === undefined) s.config.logo = null;
  if (typeof s.config.colorTema !== 'string') s.config.colorTema = '#00d4ff';
  if (!s.config.vipPack) s.config.vipPack = { botellas: 1, refrescos: 4 };
  if (!Array.isArray(s.config.fases)) s.config.fases = [
    { id: "f1", nombre: "Fase 1", precio: 20, cantidad: 300 },
    { id: "f2", nombre: "Fase 2", precio: 25, cantidad: 300 },
    { id: "f3", nombre: "Fase 3", precio: 30, cantidad: 400 }
  ];
  if (s.config.umbralStock === undefined) s.config.umbralStock = 10;

  if (!s.perfilActivo) s.perfilActivo = "vig-1";
  if (!Array.isArray(s.personas)) s.personas = [];
  if (!Array.isArray(s.rrpp)) s.rrpp = seedRrpp();
  // Limpieza de los 10 RRPP de ejemplo antiguos: solo si el dueño no metió ninguno suyo
  // (si todos son de la demo original, se vacían; si añadió alguno propio, se respetan todos).
  var DEMO_RRPP = ["dani", "laura", "carlos", "marta", "alex", "nuria", "sergio", "paula", "ivan", "cris"];
  if (s.rrpp.length >= 5 && s.rrpp.every(function (r) { return DEMO_RRPP.indexOf(r.slug) >= 0; })) {
    s.rrpp = [];
  }

  if (!s.carritos || typeof s.carritos !== "object") s.carritos = {};
  ensureClavesPerfil(s.carritos, "cam", s.config.nCamareros, function () { return []; });

  if (!s.recaudacionPorPerfil || typeof s.recaudacionPorPerfil !== "object") s.recaudacionPorPerfil = {};
  ensureClavesPerfil(s.recaudacionPorPerfil, "vig", s.config.nVigilantes, 0);
  ensureClavesPerfil(s.recaudacionPorPerfil, "cam", s.config.nCamareros, 0);

  if (s.ingresosBarra === undefined) s.ingresosBarra = 0;
  if (!Array.isArray(s.gastos)) s.gastos = [];
  if (!Array.isArray(s.historico)) s.historico = [];
  if (!Array.isArray(s.bonos)) s.bonos = [];
  if (s.version === undefined) s.version = 1;
  if (!Array.isArray(s.log)) {
    s.log = [{ hora: "22:00", actor: "Sistema", texto: "Evento iniciado", tipo: "config" }];
  }

  return s;
}

/* ---------- Carga / persistencia local ---------- */

function load() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      state = migrar(parsed);
    } else {
      state = seedState();
    }
  } catch (e) {
    state = seedState();
  }
}

function persistLocal() {
  // Blindado: si la memoria del navegador se llena (p.ej. imágenes enormes),
  // avisa en pantalla en vez de fallar en silencio y dejar de guardar.
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch (e) {
    try {
      if (typeof toast === 'function') toast('⚠️ Memoria llena: NO se guardó. Quita el cartel/logo o descarga una copia.');
    } catch (e2) {}
  }
}

/* ---------- Helpers básicos ---------- */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function money(n) { return Math.round(n || 0) + ' €'; }
function nowHM() {
  var d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function toast(msg) {
  var root = document.getElementById('toastRoot');
  if (!root) return;
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1500);
}
function showModal(html) {
  var root = document.getElementById('modalRoot');
  if (!root) return;
  root.innerHTML = '<div class="modal-overlay" data-testid="modal-overlay"><div class="modal-content">' + html + '</div></div>';
  root.classList.add('visible');
  var overlay = root.querySelector('.modal-overlay');
  if (overlay) overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
}
function closeModal() {
  var root = document.getElementById('modalRoot');
  if (!root) return;
  if (typeof cerrarCamara === 'function') cerrarCamara(); // apaga la cámara si estaba en vivo
  root.innerHTML = '';
  root.classList.remove('visible');
}

/* ---------- Perfiles / roles ---------- */
function etiquetaPerfil(id) {
  if (id === 'dueno') return 'Dueño';
  var mv = /^vig-(\d+)$/.exec(id);
  if (mv) return 'Vigilante ' + mv[1];
  var mc = /^cam-(\d+)$/.exec(id);
  if (mc) return 'Camarero ' + mc[1];
  return id;
}
function perfilesLista() {
  var lista = [{ id: 'dueno', label: 'Dueño' }];
  var nv = (state.config && state.config.nVigilantes) || 2;
  var nc = (state.config && state.config.nCamareros) || 2;
  for (var i = 1; i <= nv; i++) lista.push({ id: 'vig-' + i, label: 'Vigilante ' + i });
  for (var j = 1; j <= nc; j++) lista.push({ id: 'cam-' + j, label: 'Camarero ' + j });
  return lista;
}
/* Quién está actuando AHORA: si estás dentro del panel del dueño (autenticado),
   el autor es el Dueño aunque el perfil de trabajo del móvil siga siendo Vigilante/
   Camarero. Así el registro no apunta las acciones del administrador como si las
   hubiera hecho un trabajador. */
function actorActual() {
  return (location.hash === '#/dueno' && duenoAutenticado) ? 'dueno' : state.perfilActivo;
}
function addLog(texto, tipo) {
  state.log.unshift({ hora: nowHM(), actor: etiquetaPerfil(actorActual()), texto: texto, tipo: tipo || '' });
}

/* ---------- Caja / búsquedas ---------- */
function cajaDesglose() {
  var taquilla = 0, vip = 0;
  (state.personas || []).forEach(function (p) {
    if (p.tipo === 'taquilla') taquilla += p.importePagado || 0;
    else if (p.tipo === 'vip') vip += p.importePagado || 0;
  });
  var barra = state.ingresosBarra || 0;
  // Cargas de monederos: dinero que YA entró en caja (el gasto posterior del saldo
  // NO se suma en barra, se contaría dos veces).
  var monederos = state.ingresosMonederos || 0;
  // El dinero de las entradas de RRPP YA está contado en Taquilla (cada entrada de
  // promotor se cobra como taquilla). Por eso NO se vuelve a sumar aquí: si no, se
  // contaría dos veces. Lo que el dueño DEBE a los promotores es su comisión, y eso
  // se muestra aparte con rrppComisionTotal(). Se mantiene el campo netoRRPP en 0
  // por compatibilidad con el CSV (línea "RRPP (pendiente de entrega)").
  var netoRRPP = 0;
  return { taquilla: taquilla, vip: vip, barra: barra, monederos: monederos, netoRRPP: netoRRPP, total: taquilla + vip + barra + monederos };
}
function productoPorId(id) {
  var lista = (state.config && state.config.productos) || [];
  for (var i = 0; i < lista.length; i++) if (lista[i].id === id) return lista[i];
  return null;
}
function personaPorId(id) {
  var lista = state.personas || [];
  for (var i = 0; i < lista.length; i++) if (lista[i].id === id) return lista[i];
  return null;
}
function _normalizaCod(s) {
  // Ignora mayúsculas/minúsculas, acentos, guiones y espacios: así "MH-204-KJ",
  // "mh204kj" y "MH 204 kj" son el MISMO código. Solo cuenta letras y números juntos.
  return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
}
/* 2 letras al azar al final del código: hacen imposible adivinar el siguiente
   (anti-listillos). Sin I ni O para no confundirlas con 1 y 0 al dictarlas. */
function _dosLetras() {
  var L = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  return L.charAt(Math.floor(Math.random() * L.length)) + L.charAt(Math.floor(Math.random() * L.length));
}
function codigoUsado(s, cod) {
  var n = _normalizaCod(cod);
  return (s.personas || []).some(function (p) { return _normalizaCod(p.codigoReserva) === n; }) ||
         (s.bonos || []).some(function (b) { return _normalizaCod(b.codigo) === n; }) ||
         (s.monederos || []).some(function (m) { return _normalizaCod(m.codigo) === n; });
}
/* Código de bono: MH-B<copas>-<nº de serie>-<2 letras>. Ej: bono de 5 copas, el
   número 47 → "MH-B5-047-KJ". Tres cosas dentro:
   - <copas>: cuántas copas lleva (se ve de un vistazo),
   - <nº serie>: un número que sube con cada bono → aunque crees MIL bonos iguales,
     cada uno tiene SU número, así que hay mil códigos distintos garantizados,
   - <2 letras> al azar: para que nadie adivine el siguiente (anti-listillos).
   Se comprueba además que no exista ya. */
function nuevoCodigoBono(s, copas) {
  var c = (typeof copas === 'number' && copas > 0) ? copas : 5;
  var seq = (s.bonos || []).length + 1;
  var base = 'MH-B' + c + '-' + String(seq).padStart(3, '0');
  var cod, intentos = 0;
  do { cod = base + '-' + _dosLetras(); intentos++; } while (codigoUsado(s, cod) && intentos < 300);
  return cod;
}
function personaPorCodigo(cod) {
  var buscado = _normalizaCod(cod);
  var lista = state.personas || [];
  for (var i = 0; i < lista.length; i++) if (_normalizaCod(lista[i].codigoReserva) === buscado) return lista[i];
  return null;
}

/* ===== MONEDERO MH (cashless en euros, SIN intermediarios) =====
   El QR del cliente NO lleva dinero: es solo su código (MH-M-<serie>-<2 letras>).
   El saldo vive aquí, en la contabilidad compartida: cada carga y cada gasto queda
   como movimiento (quién, qué, cuándo) y el saldo es la consecuencia. Sin bancos. */
function monederoActivo() { return !!(state.config && state.config.monederoCfg && state.config.monederoCfg.activo); }
/* Se reconocen códigos de monedero si la función está activa O si YA hay monederos
   cargados (así, si el dueño la apaga a media fiesta, nadie se queda con saldo atrapado). */
function monederoUsable() { return monederoActivo() || ((state.monederos || []).length > 0); }
function nfcActivo() { return !!(state.config && state.config.nfcCfg && state.config.nfcCfg.activo); }
/* Analítica de consumo: apunta unidades e importe por producto (para la gráfica del dueño). */
function registrarVenta(s, prodId, nombre, uds, imp) {
  if (!s.ventasPorProducto) s.ventasPorProducto = {};
  var v = s.ventasPorProducto[prodId] || (s.ventasPorProducto[prodId] = { nombre: nombre, uds: 0, imp: 0 });
  v.nombre = nombre || v.nombre;
  v.uds += uds;
  v.imp += imp;
}
function nuevoCodigoMonedero(s) {
  var seq = (s.monederos || []).length + 1;
  var base = 'MH-M-' + String(seq).padStart(3, '0');
  var cod, intentos = 0;
  do { cod = base + '-' + _dosLetras(); intentos++; } while (codigoUsado(s, cod) && intentos < 300);
  return cod;
}
function monederoPorCodigo(cod) {
  var buscado = _normalizaCod(cod);
  var lista = state.monederos || [];
  for (var i = 0; i < lista.length; i++) if (_normalizaCod(lista[i].codigo) === buscado) return lista[i];
  return null;
}
function monederoPorId(id) {
  var lista = state.monederos || [];
  for (var i = 0; i < lista.length; i++) if (lista[i].id === id) return lista[i];
  return null;
}
/* Totales para el cuadre del dueño: cargado (entró en caja), gastado (bebido) y vivo (pendiente). */
function monederoTotales() {
  var cargado = 0, gastado = 0, vivo = 0;
  (state.monederos || []).forEach(function (m) {
    (m.movs || []).forEach(function (v) {
      if (v.t === 'gasto') gastado += v.imp; else cargado += v.imp;
    });
    vivo += m.saldo || 0;
  });
  return { cargado: cargado, gastado: gastado, vivo: vivo };
}

/* ---------- Persistencia / mutación ---------- */
function save() {
  persistLocal();
  if (window.__mhSync && typeof window.__mhSync.push === 'function') window.__mhSync.push();
}

/* IDEMPOTENCIA de acciones (clave para que NADA se duplique al sincronizar).
   Cada acción (cobro, venta, acceso…) lleva un opId único. Al aplicarla, deja su
   huella en el estado (state._ops). Si por una caída de red se pierde el "OK" del
   servidor y luego llega un 409, adoptamos el estado remoto: si YA trae ese opId,
   la acción no se vuelve a aplicar (si no, se cobraría/vendería dos veces). */
var _opSeq = 0;
var _opDev = 'd' + Math.random().toString(36).slice(2, 8);
function nextOpId() { return _opDev + '-' + (++_opSeq) + '-' + Date.now().toString(36); }
function registrarOp(st, opId) {
  if (!st._ops) st._ops = [];
  if (st._ops.indexOf(opId) === -1) {
    st._ops.push(opId);
    // Ventana acotada: basta con recordar las últimas; el reintento ocurre en segundos.
    if (st._ops.length > 400) st._ops.splice(0, st._ops.length - 400);
  }
}
function opAplicada(st, opId) { return !!(opId && st && st._ops && st._ops.indexOf(opId) !== -1); }
/* Envuelve la acción para que, al aplicarse (aquí o al re-aplicarse tras un 409),
   deje su opId en el estado. Así el resto de móviles y este mismo saben que ya está. */
function _accionConHuella(fn, opId) {
  return function (st) { fn(st); registrarOp(st, opId); };
}

function mutate(fn) {
  var opId = nextOpId();
  var accion = _accionConHuella(fn, opId);
  accion(state);
  state.version = (state.version || 0) + 1;
  // En modo servidor, guarda la acción (con su opId) para poder RE-APLICARLA si otro móvil escribió antes (409).
  if (window.__mhSync && window.__mhSync.pendientes) window.__mhSync.pendientes.push({ fn: accion, opId: opId });
  save();
  renderApp();
}
/* Igual que mutate pero SIN repintar: para editar un campo de texto/número sin que
   se rebobine el panel y se cierre el teclado del móvil. El valor ya está en pantalla. */
function mutateSilent(fn) {
  var opId = nextOpId();
  var accion = _accionConHuella(fn, opId);
  accion(state);
  state.version = (state.version || 0) + 1;
  if (window.__mhSync && window.__mhSync.pendientes) window.__mhSync.pendientes.push({ fn: accion, opId: opId });
  save();
}

/* Adopta un estado que llega de la nube/servidor y RE-APLICA encima solo las acciones
   locales que ese estado remoto aún no tenga (por opId). Común a los dos modos de sync
   (servidor Node y Firebase). Conserva el perfil de ESTE móvil (rol) y repinta.
   Devuelve cuántas acciones quedaron pendientes tras adoptar. */
function adoptarRemoto(remoto) {
  if (!remoto) return -1;
  var perfilLocal = state ? state.perfilActivo : null;
  // migrar() rellena los valores por defecto NUEVOS que el estado de la nube (guardado por
  // una versión anterior) no traiga. Sin esto, un ajuste nuevo (p.ej. "venta por RRPP")
  // se quedaba apagado al sincronizar desde datos viejos.
  state = migrar(remoto);
  if (perfilLocal) state.perfilActivo = perfilLocal;
  var pend = (window.__mhSync && window.__mhSync.pendientes) || [];
  var quedan = [];
  for (var i = 0; i < pend.length; i++) {
    var p = pend[i];
    // Si el estado remoto YA trae esta acción (su opId), no se re-aplica (no se duplica)
    // y se saca de pendientes (ya está confirmada). Si no, se re-aplica y sigue pendiente.
    if (opAplicada(state, p.opId)) continue;
    try { p.fn(state); state.version = (state.version || 0) + 1; quedan.push(p); }
    catch (e) { /* acción no re-aplicable, se descarta */ }
  }
  if (window.__mhSync) window.__mhSync.pendientes = quedan;
  persistLocal();
  renderApp();
  return quedan.length;
}

/* Calcula (SIN tocar el estado global de forma permanente) el estado = remoto + mis
   acciones pendientes que aún no estén en él. Clave: apunta `state` a la copia mientras
   re-aplica, para que los helpers globales (personaPorId, s.perfilActivo, addLog…) operen
   sobre esa copia y no sobre el estado viejo. Se usa para construir lo que se SUBE en modo
   Firebase (la transacción), sin perder acciones ni marcarlas como aplicadas en falso. */
function fusionarPendientesSobre(remotoObj) {
  var copia;
  try { copia = JSON.parse(JSON.stringify(remotoObj)); } catch (e) { return remotoObj; }
  copia = migrar(copia); // rellena defaults nuevos también en lo que se sube a la nube (sana el doc)
  var prev = state;
  var perfilLocal = prev ? prev.perfilActivo : null;
  state = copia;
  if (perfilLocal) state.perfilActivo = perfilLocal; // re-aplicar MIS acciones con MI rol/carrito
  try {
    var pend = (window.__mhSync && window.__mhSync.pendientes) || [];
    for (var i = 0; i < pend.length; i++) {
      var p = pend[i];
      if (opAplicada(state, p.opId)) continue;
      try { p.fn(state); state.version = (state.version || 0) + 1; } catch (e) { /* no re-aplicable */ }
    }
  } finally {
    state = prev; // restaura SIEMPRE el estado global de este móvil
  }
  return copia;
}

/* ---------- Personal dinámico (llamar envuelto en mutate) ---------- */
function setVigilantes(n) {
  n = Math.max(1, Math.min(9, Math.round(n) || 1));
  state.config.nVigilantes = n;
  state.recaudacionPorPerfil = state.recaudacionPorPerfil || {};
  for (var i = 1; i <= n; i++) {
    var id = 'vig-' + i;
    if (!(id in state.recaudacionPorPerfil)) state.recaudacionPorPerfil[id] = 0;
  }
  if (!perfilesLista().some(function (p) { return p.id === state.perfilActivo; })) state.perfilActivo = 'vig-1';
  addLog('ajustó nº de vigilantes a ' + n, 'personal');
}
function setCamareros(n) {
  n = Math.max(1, Math.min(9, Math.round(n) || 1));
  state.config.nCamareros = n;
  state.recaudacionPorPerfil = state.recaudacionPorPerfil || {};
  state.carritos = state.carritos || {};
  for (var i = 1; i <= n; i++) {
    var id = 'cam-' + i;
    if (!(id in state.recaudacionPorPerfil)) state.recaudacionPorPerfil[id] = 0;
    if (!state.carritos[id]) state.carritos[id] = [];
  }
  if (!perfilesLista().some(function (p) { return p.id === state.perfilActivo; })) state.perfilActivo = 'vig-1';
  addLog('ajustó nº de camareros a ' + n, 'personal');
}

/* ---------- Router / render dispatcher ---------- */
function renderApp() {
  // Recuerda scroll y campo enfocado para que un repintado no rebobine la página
  // ni cierre el teclado (sobre todo en el panel del dueño, que es largo).
  var _scrollY = window.scrollY || window.pageYOffset || 0;
  var _foco = document.activeElement;
  var _focoId = _foco && _foco.id ? _foco.id : null;
  var _selIni = null, _selFin = null;
  try { if (_focoId && _foco.selectionStart != null) { _selIni = _foco.selectionStart; _selFin = _foco.selectionEnd; } } catch (e) {}

  renderAppInterno();

  if (_focoId) {
    var reobj = document.getElementById(_focoId);
    if (reobj) {
      try { reobj.focus({ preventScroll: true }); } catch (e) { try { reobj.focus(); } catch (e2) {} }
      try { if (_selIni != null && reobj.setSelectionRange) reobj.setSelectionRange(_selIni, _selFin); } catch (e) {}
    }
  }
  try { window.scrollTo(0, _scrollY); } catch (e) {}
}

function renderAppInterno() {
  // Entrada BLINDADA (#/s/<token>): se lee de la nube (cajón 'tickets'), no de la fiesta.
  var mS = (location.hash || '').match(/^#\/s\/(.+)$/);
  if (mS) { try { abrirTicketBlindado(mS[1]); } catch (e) {} return; }
  // Entrada pública (invitado abre su enlace): pantalla completa, sin barra de admin ni portada.
  var rt = rutaTicket();
  var topbar = document.getElementById('topbar');
  if (rt) {
    if (typeof ocultarGate === 'function') ocultarGate();
    if (topbar) topbar.style.display = 'none';
    var vistaT = document.getElementById('vista');
    _ticketDatos = rt.datos || null;
    _ticketToken = rt.token || null;
    if (vistaT) {
      vistaT.innerHTML = htmlTicketPublico(rt.datos, rt.unaVez, rt.yaVisto);
      if (rt.datos && rt.datos.c && !(rt.unaVez && rt.yaVisto)) {
        var cvs = document.getElementById('ticketQR');
        if (cvs) { try { drawQR(cvs, rt.datos.c, 240); } catch (e) {} }
        // De un solo uso: arranca la cuenta atrás (al llegar a 0 → vídeo/animación y se bloquea).
        if (rt.unaVez) { try { iniciarAutodestruccion(rt.token, rt.datos); } catch (e) { try { localStorage.setItem('mh_ticket_visto_' + rt.token, '1'); } catch (e2) {} } }
      }
    }
    return;
  }
  if (topbar) topbar.style.display = '';
  var rolChips = document.getElementById('rolChips');
  if (rolChips) {
    var activo = actorActual();
    rolChips.innerHTML = perfilesLista().map(function (p) {
      return '<button type="button" data-testid="rol-' + esc(p.id) + '" class="chip' +
        (p.id === activo ? ' activo' : '') + '">' + esc(p.label) + '</button>';
    }).join('');
    Array.prototype.forEach.call(rolChips.querySelectorAll('button[data-testid^="rol-"]'), function (btn) {
      var id = btn.getAttribute('data-testid').slice(4);
      btn.onclick = function () { cambiarPerfil(id); };
    });
  }

  var syncEl = document.querySelector('[data-testid="sync-estado"]');
  if (syncEl) {
    syncEl.textContent = syncEstado();
    syncEl.classList.toggle('sync-ok', syncEstado() === 'Sincronizado');
    syncEl.title = syncEstado();
  }

  var vista = document.getElementById('vista');
  var hash = location.hash || '#/puerta';

  // SEGURIDAD (1): fuera del panel del dueño, la sesión de admin SIEMPRE cae.
  // Así, si se sale del panel (botón Atrás, chip de rol, enlace) no se puede
  // reabrir #/dueno sin volver a meter el PIN.
  if (hash !== '#/dueno') duenoAutenticado = false;

  if (hash === '#/dueno') {
    if (!duenoAutenticado) {
      if (vista) {
        vista.innerHTML =
          '<form id="pinForm" class="panel-pin"><label for="pin-dueno">PIN del dueño</label>' +
          '<input id="pin-dueno" type="password" autocomplete="off">' +
          '<button type="submit">Entrar</button><p id="pin-error" class="error" hidden></p></form>';
        document.getElementById('pinForm').addEventListener('submit', function (e) {
          e.preventDefault();
          var val = document.getElementById('pin-dueno').value;
          if (esPinAdmin(val)) {
            duenoAutenticado = true;
            renderApp();
          } else {
            var err = document.getElementById('pin-error');
            if (err) { err.textContent = 'PIN incorrecto'; err.hidden = false; }
          }
        });
      }
    } else if (typeof renderDueno === 'function') {
      renderDueno();
    }
  } else {
    // SEGURIDAD (2): la vista de trabajador la manda SIEMPRE el perfil activo,
    // no el hash suelto. Si un camarero cambia el hash a #/puerta (botón Atrás),
    // se le devuelve a su barra: no puede ver la lista del vigilante sin su
    // contraseña, ni al revés.
    var quiere = (state.perfilActivo && state.perfilActivo.indexOf('cam') === 0) ? '#/barra' : '#/puerta';
    if (hash !== quiere) { location.hash = quiere; return; }
    if (quiere === '#/barra') {
      if (typeof renderBarra === 'function') renderBarra();
    } else {
      if (typeof renderPuerta === 'function') renderPuerta();
    }
  }
}

/* ---------- Cambio de perfil con contraseña propia por trabajador ---------- */
/* _perfilOK: perfiles ya desbloqueados EN ESTE MÓVIL/SESIÓN (no se sincroniza). */
var _perfilOK = {};
function claveDe(id) { return (state.config && state.config.claves && state.config.claves[id]) || ''; }
function entrarPerfil(id) {
  // Salir del panel del dueño al pasar a un trabajador (misma regla de aislamiento).
  duenoAutenticado = false;
  state.perfilActivo = id;
  location.hash = id.startsWith('cam') ? '#/barra' : '#/puerta';
  renderApp();
}
function cambiarPerfil(id) {
  if (id === 'dueno') { location.hash = '#/dueno'; renderApp(); return; }
  var clave = claveDe(id);
  if (clave && !_perfilOK[id]) { pedirClavePerfil(id); return; }
  entrarPerfil(id);
}
function pedirClavePerfil(id) {
  var label = etiquetaPerfil(id);
  var html = '<div class="modal-pin" data-testid="pin-perfil">' +
    '<h2>Código de ' + esc(label) + '</h2>' +
    '<p class="nota">Es el mismo con el que ' + esc(label) + ' entra directo desde la portada. Lo pone el administrador en Ajustes → Personal.</p>' +
    '<form id="perfilPinForm"><input id="perfil-clave" type="password" inputmode="numeric" autocomplete="off" placeholder="Código">' +
    '<p id="perfil-pin-error" class="error" hidden>Contraseña incorrecta</p>' +
    '<div class="modal-botones"><button type="submit" class="btn-primary" data-testid="perfil-entrar">Entrar</button>' +
    '<button type="button" onclick="closeModal()">Cancelar</button></div></form></div>';
  showModal(html);
  var form = document.getElementById('perfilPinForm');
  if (form) form.addEventListener('submit', function (e) {
    e.preventDefault();
    var val = (document.getElementById('perfil-clave') || {}).value || '';
    if (val === claveDe(id)) { _perfilOK[id] = true; closeModal(); entrarPerfil(id); }
    else { var er = document.getElementById('perfil-pin-error'); if (er) er.hidden = false; }
  });
  var inp = document.getElementById('perfil-clave'); if (inp) try { inp.focus(); } catch (e) {}
}

/* ---------- Sync (local file:// vs servidor http) ---------- */
/* ¿La clave introducida es de ALGÚN administrador (el principal o uno extra)? Todos
   los administradores tienen los MISMOS poderes. La clave vacía nunca vale. */
function adminClavePrincipal() {
  var c = (state.config && typeof state.config.adminClave === 'string' && state.config.adminClave) ? state.config.adminClave : CONFIG.ADMIN_PASSWORD;
  return String(c || '');
}
function esPinAdmin(val) {
  val = String(val == null ? '' : val);
  if (val === '') return false;
  if (val === adminClavePrincipal()) return true;
  return (state.config && state.config.adminsExtra || []).some(function (a) { return a && a.clave && String(a.clave) === val; });
}

/* ¿Está configurado Firebase de verdad (no los "PEGA_..." de ejemplo)? */
function firebaseConfigurado() {
  var f = CONFIG.FIREBASE;
  return !!(f && f.apiKey && f.projectId &&
    String(f.apiKey).indexOf('PEGA') !== 0 && String(f.projectId).indexOf('PEGA') !== 0);
}
function syncEstado() {
  // Con Firebase la sincronización va por la nube (da igual file:// o http): el estado lo
  // marca __mhSync como en el modo servidor.
  if (!firebaseConfigurado() && location.protocol === 'file:') return 'Solo este móvil';
  var s = window.__mhSync;

var _bateriaNivel = null, _bateriaCargando = null;
