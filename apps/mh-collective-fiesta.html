function initSync() {
  // MODO NUBE (Firebase): si está configurado, manda sobre todo lo demás.
  if (firebaseConfigurado()) { initFirebaseSync(); return; }
  if (location.protocol === 'file:') {
    window.addEventListener('storage', function (e) {
      if (e.key === LS_KEY) { load(); renderApp(); }
    });
    return;
  }
  /* MODO SERVIDOR. Claves del diseño:
     - `srvVersion` es la versión del ALMACÉN del servidor (independiente de state.version, que
       es un contador local de mutaciones). El POST siempre usa srvVersion como baseVersion.
     - `pendientes` guarda las funciones-acción locales aún no confirmadas por el servidor: si
       otro móvil escribió antes (409), se adopta su estado y se RE-APLICAN las acciones encima
       (no se pierde la venta, no se machaca lo del otro).
     - `perfilActivo` es DE ESTE MÓVIL: al adoptar estado remoto se conserva el local (que el
       vigilante no le cambie el rol al camarero). */
  try {
    var srvVersion = 0;
    var pushing = false;

    function adoptar(remoto) { adoptarRemoto(remoto); } // lógica común (idempotente por opId)

    function pushLoop(intentos) {
      if (pushing) return;
      if (!window.__mhSync.pendientes.length && intentos) { refrescarSync(); return; }
      pushing = true;
      var enviadas = window.__mhSync.pendientes.length; // las acciones que incluye ESTE envío
      fetch('/api/state', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ baseVersion: srvVersion, state: state }),
      }).then(function (res) {
        if (res.status === 409) {
          return res.json().then(function (d) {
            srvVersion = d.version;
            adoptar(d.state); // conserva perfil local y re-aplica las pendientes que el servidor aún no tiene
            pushing = false; window.__mhSync.error = false; refrescarSync();
            if ((intentos || 0) < 8 && window.__mhSync.pendientes.length) pushLoop((intentos || 0) + 1);
          });
        }
        if (!res.ok) {
          // 401 (sin token válido), 500, etc.: el servidor RECHAZÓ. NO se confirma nada (los cambios
          // siguen en pendientes, no se pierden) y se marca error para que reintente y avise.
          pushing = false; window.__mhSync.error = true; refrescarSync();
          if (window.__mhSync.pendientes.length) setTimeout(function () { pushLoop(0); }, 3000);
          return;
        }
        return res.json().then(function (d) {
          if (d && typeof d.version === 'number') srvVersion = d.version;
          // Solo se confirman las que viajaron; las llegadas en vuelo siguen pendientes.
          window.__mhSync.pendientes.splice(0, enviadas);
          pushing = false; window.__mhSync.error = false; refrescarSync();
          if (window.__mhSync.pendientes.length) pushLoop(0);
        });
      }).catch(function () {
        // API/red caída: NO se pierde nada (sigue en pendientes). Reintenta solo en 3 s.
        pushing = false; window.__mhSync.error = true; refrescarSync();
        if (window.__mhSync.pendientes.length) setTimeout(function () { pushLoop(0); }, 3000);
      });
    }

    window.__mhSync = { pendientes: [], error: false, push: function () { pushLoop(0); } };

    // Latido: cada 8 s, si quedan cambios sin subir, los empuja (por si un envío quedó a medias
    // o el servidor estuvo caído). Así "todo lo que se sube acaba en el servidor", sí o sí.
    setInterval(function () {
      if (!pushing && window.__mhSync.pendientes.length) pushLoop(0);
      refrescarSync();
    }, 8000);

    // Carga inicial: si el servidor ya tiene estado, se adopta; si está vacío, subimos el nuestro.
    fetch('/api/state').then(function (res) {
      // 401 = enlace sin token válido: se avisa (no queda "Sincronizado" en falso) y se sigue local.
      if (res.status === 401) { window.__mhSync.error = true; refrescarSync(); return null; }
      return res.ok ? res.json() : null;
    })
      .then(function (data) {
        if (!data) return;
        srvVersion = data.version || 0;
        if (data.state) adoptar(data.state);
        else pushLoop(0);
      })
      .catch(function () { /* degrada a local */ });

    var es = new EventSource('/api/events');
    es.onmessage = function (ev) {
      try {
        var data = JSON.parse(ev.data);
        if (data && typeof data.version === 'number' && data.version !== srvVersion) {
          fetch('/api/state').then(function (res) { return res.json(); })
            .then(function (d) {
              if (!d) return;
              srvVersion = d.version || srvVersion;
              if (d.state) adoptar(d.state);
            })
            .catch(function () {});
        }
      } catch (err) { /* evento malformado, ignorar */ }
    };
    es.onerror = function () { /* silencioso: sigue en local */ };
  } catch (err) { /* cualquier fallo de red: seguir solo con localStorage */ }
}

/* ============================================================================
   MODO NUBE con FIREBASE (Firestore + login anónimo).
   - No hay servidor que montar: la app habla directa con tu Firebase.
   - Todo el estado vive en un único documento (colección "mh_collective",
     doc = la "sala"). Se guarda como texto JSON para no chocar con los límites
     de Firestore (1 documento = campos anidados).
   - Concurrencia: cada subida es una TRANSACCIÓN de Firestore (lee lo remoto,
     re-aplica encima solo tus acciones nuevas por opId —idempotente— y escribe).
     Firestore reintenta la transacción solo si hay choque → nadie pierde nada.
   - Tiempo real: onSnapshot reparte cada cambio a todos al instante.
   - Auto-reconexión: al volver a la app o recuperar internet se re-sincroniza,
     y con la caché offline no se cuelga aunque el wifi vaya mal.
   ============================================================================ */
var FB_VER = '10.12.5';
function _cargarScript(src) {
  return new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = src; s.async = false;
    s.onload = resolve;
    s.onerror = function () { reject(new Error('No se pudo cargar ' + src)); };
    document.head.appendChild(s);
  });
}
/* Carga el SDK de Firebase (compat) desde su CDN, solo cuando hace falta. Si ya hay
   un objeto firebase (SDK real o inyectado en pruebas), no vuelve a cargar nada. */
function cargarFirebaseSDK() {
  if (window.firebase && window.firebase.firestore) return Promise.resolve();
  var base = 'https://www.gstatic.com/firebasejs/' + FB_VER + '/';
  return _cargarScript(base + 'firebase-app-compat.js')
    .then(function () { return _cargarScript(base + 'firebase-auth-compat.js'); })
    .then(function () { return _cargarScript(base + 'firebase-firestore-compat.js'); });
}

function initFirebaseSync() {
  // __mhSync se prepara YA (síncrono) para que las acciones hechas mientras carga el SDK
  // se encolen en pendientes y se suban en cuanto haya conexión (no se pierde ninguna).
  window.__mhSync = { pendientes: (window.__mhSync && window.__mhSync.pendientes) || [], error: false, push: function () { pushFirebase(0); } };

  var sala = String((CONFIG.FIREBASE && CONFIG.FIREBASE.sala) || 'principal');
  var db = null, docRef = null, srvVersion = -1, pushing = false, listo = false;

  // Prepara el texto a guardar. Blindaje de tamaño: Firestore limita el documento a ~1 MB;
  // si el estado pesa demasiado (fotos grandes en logo/cartel), se sube TODO menos esas
  // imágenes (se quedan en cada móvil) para que la sincronización nunca falle.
  function serializarEstado(M) {
    var json;
    try { json = JSON.stringify(M); } catch (e) { json = '{}'; }
    if (json.length > 900000) {
      try {
        var copia = JSON.parse(json);
        if (copia.config) { copia.config.logo = null; copia.config.cartel = null; }
        json = JSON.stringify(copia);
        if (typeof toast === 'function') toast('⚠️ Imagen muy grande: se sincroniza todo menos el logo/cartel.');
      } catch (e2) {}
    }
    return json;
  }

  function reSync() {
    // Al volver a primer plano o recuperar internet: si hay cambios sin subir, empújalos ya.
    if (listo && !pushing && window.__mhSync.pendientes.length) pushFirebase(0);
    refrescarSync();
  }

  function pushFirebase(intentos) {
    if (!listo || pushing) return;
    if (!window.__mhSync.pendientes.length) { window.__mhSync.error = false; refrescarSync(); return; }
    pushing = true;
    db.runTransaction(function (t) {
      return t.get(docRef).then(function (snap) {
        var remoto = (snap && snap.exists) ? (snap.data() || {}) : {};
        var base;
        if (remoto.data) {
          // Hay estado remoto: fusiono MIS pendientes encima (con state apuntando a la copia,
          // así los helpers globales operan bien y nada se marca aplicado en falso).
          try { base = fusionarPendientesSobre(JSON.parse(remoto.data)); }
          catch (e) { base = JSON.parse(JSON.stringify(state)); }
        } else {
          // Remoto vacío (primer móvil): siembro con mi estado local completo (ya tiene todo).
          base = JSON.parse(JSON.stringify(state));
        }
        t.set(docRef, { data: serializarEstado(base), version: (remoto.version || 0) + 1, ts: Date.now() });
      });
    }).then(function () {
      pushing = false; window.__mhSync.error = false; refrescarSync();
      // No vaciamos pendientes aquí: el onSnapshot con el estado nuevo las limpiará al adoptar
      // (idempotente). Por si el snapshot tardara, reintenta si aún quedaran.
      if (window.__mhSync.pendientes.length) setTimeout(function () { if (!pushing) pushFirebase(0); }, 1500);
    }).catch(function (e) {
      pushing = false; window.__mhSync.error = true; refrescarSync();
      if (window.__mhSync.pendientes.length) setTimeout(function () { pushFirebase((intentos || 0) + 1); }, 3000);
    });
  }

  cargarFirebaseSDK().then(function () {
    if (!window.firebase.apps || !window.firebase.apps.length) window.firebase.initializeApp(CONFIG.FIREBASE);
    db = window.firebase.firestore();
    // Caché offline: la app sigue funcionando sin datos y reenvía al reconectar.
    try { db.enablePersistence && db.enablePersistence({ synchronizeTabs: true }).catch(function () {}); } catch (e) {}
    docRef = db.collection('mh_collective').doc(sala);
    return window.firebase.auth().signInAnonymously();
  }).then(function () {
    listo = true;
    // Escuchador en tiempo real: cada cambio (propio o de otro móvil) llega aquí.
    docRef.onSnapshot(function (snap) {
      try {
        if (!snap || !snap.exists) { if (listo && !pushing) pushFirebase(0); return; } // doc vacío: sembramos
        var d = snap.data() || {};
        if (typeof d.version === 'number') srvVersion = d.version;
        if (d.data) adoptarRemoto(JSON.parse(d.data));
      } catch (e) { /* snapshot raro: ignorar */ }
    }, function () { window.__mhSync.error = true; refrescarSync(); });

    // Auto-reconexión: volver a la app / recuperar señal → re-sincroniza al momento.
    window.addEventListener('online', reSync);
    window.addEventListener('focus', reSync);
    document.addEventListener('visibilitychange', function () { if (!document.hidden) reSync(); });
    // Latido: cada 6 s reintenta lo que quede sin subir y refresca el indicador.
    setInterval(function () { if (!pushing && window.__mhSync.pendientes.length) pushFirebase(0); refrescarSync(); }, 6000);

    if (window.__mhSync.pendientes.length) pushFirebase(0);
    refrescarSync();
  }).catch(function (e) {
    window.__mhSync.error = true;
    try { if (typeof toast === 'function') toast('⚠️ No se pudo conectar con Firebase. Revisa la config o tu internet.'); } catch (e2) {}
    refrescarSync();
  });
}

/* El token del servidor viaja en el FRAGMENTO del enlace (…/#t=TOKEN). El navegador NO lo manda
   al servidor (no queda en logs ni Referer). Aquí se lee, se guarda como cookie para que fetch y
   SSE se autentiquen, y se BORRA del hash para que no quede en el historial ni en capturas. */
function capturarTokenDeEnlace() {
  try {
    var h = location.hash || '';
    var m = /(?:^#|[#&])t=([^&]+)/.exec(h);
    if (!m) return;
    var tok = decodeURIComponent(m[1]);
    if (tok) document.cookie = 'mh_token=' + encodeURIComponent(tok) + '; Path=/; SameSite=Strict; Max-Age=86400';
    var limpio = h.replace(/(^#|[#&])t=[^&]*/, '$1').replace(/^#&/, '#').replace(/[#&]$/, '');
    history.replaceState(null, '', location.pathname + location.search + (limpio && limpio !== '#' ? limpio : ''));
  } catch (e) { /* si algo falla, seguimos sin token (modo local) */ }
}

function entrarAcceso(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var val = String((document.getElementById('gate-pass') || {}).value || '').trim();
  // 1) ¿Es el código de un trabajador? -> entra DIRECTO a su puesto (portero→puerta, camarero→barra).
  var destino = perfilPorCodigo(val);
  if (destino) {
    _recordarAcceso();
    _perfilOK[destino] = true;   // acaba de meter su código: no se lo volvemos a pedir
    ocultarGate();
    entrarPerfil(destino);        // fija su rol y navega a #/barra o #/puerta
    return false;
  }
  // 2) ¿Es el PIN del administrador? -> directo al panel del dueño.
  if (typeof esPinAdmin === 'function' && esPinAdmin(val)) {
    _recordarAcceso();
    duenoAutenticado = true;
    ocultarGate();
    location.hash = '#/dueno';
    renderApp();
    return false;
  }
  // 3) ¿Es la contraseña general de entrada? -> desbloquea y muestra el selector de rol.
  if (accesoClave() && val === accesoClave()) {
    _recordarAcceso();
    ocultarGate();
    return false;
  }
  // 4) Nada coincide -> error y temblor.
  var err = document.getElementById('gate-err'); if (err) err.textContent = 'Código o contraseña incorrectos';
  var card = document.querySelector('.gate-card');
  if (card) { card.classList.remove('gate-shake'); void card.offsetWidth; card.classList.add('gate-shake'); }
  var inp = document.getElementById('gate-pass'); if (inp) { inp.value = ''; try { inp.focus(); } catch (e) {} }
  return false;
}
/* Puerta: si hay protección (contraseña general o códigos) y este móvil no la ha pasado, muestra la portada. */
function chequearAcceso() {
  // Las entradas públicas (#/e/ y #/t/) NO piden la contraseña de la fiesta: el invitado
  // solo ve su entrada, nada más.
  if (/^#\/(e|t|s)\//.test(location.hash || '')) { ocultarGate(); return; }
  if (accesoProtegido() && !accesoDesbloqueado()) mostrarGate();
  else ocultarGate();
}

function bootApp() {
  // Enlace de ENTRADA de un invitado (#/e/ o #/t/): NO se conecta a la nube ni carga la fiesta.
  // Solo pinta su entrada (los datos van en el propio enlace). Así el invitado no descarga
  // NADA del resto (ni la lista, ni la caja, ni las contraseñas).
  var esTicket = /^#\/(e|t|s)\//.test(location.hash || '');
  capturarTokenDeEnlace();
  load();
  chequearAcceso();
  precargarCartel();
  aplicarLogo();
  window.addEventListener('hashchange', renderApp);
  if (!esTicket) initSync();
  // Service worker: solo cuando se sirve por http(s) desde el servidor (en file:// no aplica).
  // Hace la app instalable en Android y que funcione sin datos (offline).
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
    try { navigator.serviceWorker.register('sw.js').catch(function () {}); } catch (e) {}
  }
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    window.__deferredPrompt = e;
  });
  var btnInstalar = document.getElementById('btnInstalar');
  if (btnInstalar) {
    btnInstalar.onclick = function () {
      if (window.__deferredPrompt) window.__deferredPrompt.prompt();
      else toast('Para instalar: menú del navegador → Añadir a pantalla de inicio');
    };
  }
  // Presencia del equipo: batería + latido cada 30 s (y al volver a la app). El Dueño lo ve en Resumen.
  // No aplica en los enlaces de entrada de invitados (no forman parte del equipo).
  if (!esTicket) {
    _initBateria();
    latidoPresencia();
    setInterval(latidoPresencia, 30000);
    setInterval(refrescarEquipo, 15000);
    window.addEventListener('focus', latidoPresencia);
    document.addEventListener('visibilitychange', function () { if (!document.hidden) latidoPresencia(); });
  }
  renderApp();
}
window.addEventListener('DOMContentLoaded', bootApp);

/* ===== VISTA PUERTA (#/puerta) — MH Collective ===== */
var _busq = "";
var _filtro = "fuera"; // por defecto el vigilante ve solo "Por entrar" (la lista se acorta al entrar la gente)

function normTxt(s) {
  return String(s || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
}
function escJs(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function personasFiltradas() {
  var list = state.personas.slice();
  if (_filtro === "invitados") list = list.filter(function (p) { return p.tipo === "invitado"; });
  else if (_filtro === "taquilla") list = list.filter(function (p) { return p.tipo === "taquilla"; });
  else if (_filtro === "vip") list = list.filter(function (p) { return p.tipo === "vip"; });
  else if (_filtro === "dentro") list = list.filter(function (p) { return p.dentro === true; });
  else if (_filtro === "fuera") list = list.filter(function (p) { return p.dentro === false; });
  var q = normTxt(_busq).trim();
  if (q) {
    list = list.filter(function (p) {
      var hay = normTxt((p.nombre || "") + " " + (p.apellido || "") + " " + (p.codigoReserva || ""));
      return hay.indexOf(q) !== -1;
    });
  }
  return list;
}

function filtroTab(key, label) {
  var activo = _filtro === key ? " activo" : "";
  return '<button type="button" class="filtro-tab' + activo + '" data-testid="filtro-' + key +
    '" onclick="setFiltro(\'' + key + '\')">' + esc(label) + "</button>";
}

function renderPuerta() {
  var vista = document.getElementById("vista");
  if (!vista) return;
  var qrOn = !!(state.config && state.config.modulos && state.config.modulos.qr);
  var html = "";
  html += '<div class="puerta">';
  html += '<div class="puerta-buscador-row">';
  html += '<input id="buscador" type="text" placeholder="Nombre, apellido o código (MH-101…)" value="' +
    esc(_busq) + '" oninput="onBuscadorInput(this.value)">';
  if (qrOn) {
    html += '<button type="button" class="btn-escanear" data-testid="btn-escanear" onclick="abreEscaner()">Escanear QR</button>';
  }
  html += '<button type="button" class="btn-add-persona" data-testid="fab-express" onclick="abreExpress()">+ Añadir</button>';
  if (monederoActivo()) {
    html += '<button type="button" class="btn-monedero" data-testid="btn-monedero-puerta" onclick="abreMonederoPuerta()">💰 Monedero</button>';
  }
  html += "</div>";
  html += '<div class="puerta-filtros">';
  html += filtroTab("fuera", "Por entrar");
  html += filtroTab("dentro", "Ya dentro");
  html += filtroTab("todos", "Todos");
  html += filtroTab("invitados", "Invitados");
  html += filtroTab("taquilla", "Taquilla");
  html += filtroTab("vip", "Mesas VIP");
  html += "</div>";
  html += '<div id="listaPersonas">' + renderListaPersonasHTML() + "</div>";
  html += "</div>";
  vista.innerHTML = html;
}

function renderListaPersonasHTML() {
  var list = personasFiltradas();
  if (list.length === 0) {
    return '<p class="lista-vacia">Sin resultados en este filtro</p>';
  }
  var html = "";
  for (var i = 0; i < list.length; i++) html += renderPersonaCard(list[i]);
  return html;
}

/* Una entrada de taquilla está LIQUIDADA (no hay que cobrarle) si está marcada
   pagada O ya abonó algo. Usar el flag `pagado` es clave para las invitaciones
   "ya pagadas" a 0 € (importePagado 0 pero pagado true): si no, la puerta las
   cobraría otra vez a tarifa general. */
function taquillaLiquidada(p) { return !!(p && (p.pagado || (p.importePagado || 0) > 0)); }
function labelAccion(p) {
  // Con tarjeta/Bizum activos, el botón grande deja claro que cobra EN EFECTIVO
  // (los otros métodos tienen su propio botón al lado).
  var efvo = (tarjetaActiva() || bizumActivo()) ? "💵 " : "";
  if (p.dentro) return "Marcar salida";
  if (p.tipo === "invitado") return "Dar acceso";
  if (p.tipo === "taquilla") {
    if (!taquillaLiquidada(p)) {
      if (puertaVentaRRPP()) return "Dar acceso"; // la vende el RRPP: solo se da acceso
      return efvo + "Cobrar " + precioEntradaDe(p) + " € y entrar" + (efvo ? " (efectivo)" : "");
    }
    return "Dar acceso";
  }
  if (p.tipo === "vip") {
    var mesa = p.mesa || {};
    var pend = (mesa.total || 0) - (p.importePagado || 0);
    if (pend > 0) return efvo + "Cobrar pendiente (" + pend + " €) y entrar" + (efvo ? " (efectivo)" : "");
    return "Dar acceso";
  }
  return "Dar acceso";
}

function renderPersonaCard(p) {
  var tipoLabel = p.tipo === "invitado" ? "Invitado" : (p.tipo === "taquilla" ? "Taquilla" : "VIP");
  var estadoBadge = p.dentro
    ? '<span class="badge badge-dentro">Dentro</span>'
    : '<span class="badge badge-fuera">Fuera</span>';
  var cupoHtml = "";
  if (p.tipo === "vip" && p.mesa) {
    var dentroCount = (p.mesa.acompanantesDentro || 0) + (p.dentro ? 1 : 0);
    var cupoTotal = (p.mesa.acompanantesPermitidos || 0) + 1;
    cupoHtml = '<div class="persona-cupo">Cupo ' + dentroCount + "/" + cupoTotal + "</div>";
  }
  var qrOn = !!(state.config && state.config.modulos && state.config.modulos.qr);
  var qrBtn = qrOn
    ? '<button type="button" class="btn-qr" data-testid="qr-' + esc(p.id) + "\" onclick=\"abreQR('" +
      escJs(p.id) + "')\">QR</button>"
    : "";
  // Dentro: sin botón grande (para no confundir con "dar acceso"); solo salida discreta.
  var accionBtn = p.dentro
    ? '<button type="button" class="btn-salida" onclick="marcarSalida(\'' + escJs(p.id) + "')\">Marcar salida</button>"
    : '<button type="button" class="btn-accion-persona" onclick="accionPrincipal(\'' +
      escJs(p.id) + "')\">" + esc(labelAccion(p)) + "</button>";
  // Cobros sin efectivo (si el dueño los activó y hay algo que cobrar): 💳 y/o 📲 al lado.
  if (!p.dentro && (tarjetaActiva() || bizumActivo())) {
    var pendTarj = p.tipo === 'taquilla' ? ((!taquillaLiquidada(p) && !puertaVentaRRPP()) ? precioEntradaDe(p) : 0)
      : (p.tipo === 'vip' ? Math.max(0, ((p.mesa || {}).total || 0) - (p.importePagado || 0)) : 0);
    if (pendTarj > 0) {
      if (tarjetaActiva()) {
        accionBtn += '<button type="button" class="btn-tarjeta-persona" data-testid="tarjeta-' + esc(p.id) +
          '" onclick="accionPrincipalTarjeta(\'' + escJs(p.id) + '\')">💳 Tarjeta</button>';
      }
      if (bizumActivo()) {
        accionBtn += '<button type="button" class="btn-bizum-persona" data-testid="bizum-' + esc(p.id) +
          '" onclick="accionPrincipalBizum(\'' + escJs(p.id) + '\')">📲 Bizum</button>';
      }
    }
  }
  var acompBtn = "";
  if (p.tipo === "vip" && p.mesa && p.dentro &&
      (p.mesa.acompanantesDentro || 0) < (p.mesa.acompanantesPermitidos || 0)) {
    acompBtn = '<button type="button" class="btn-acomp" onclick="admitirAcompanante(\'' +
      escJs(p.id) + "')\">+ Acompañante</button>";
  }
  var html = "";
  html += '<div class="persona-card' + (p.dentro ? ' card-dentro' : '') + '" data-testid="persona-' + esc(p.id) + '">';
  html += '<div class="persona-info">';
  html += '<div class="persona-nombre">' + esc(p.nombre + " " + p.apellido) + "</div>";
  var origenBadge = p.remesa
    ? ' <span class="badge badge-serie">Preventa · ' + esc(p.remesa) + '</span>'
    : (p.horaEntrada && p.tipo !== 'invitado' && !p.remesa ? '' : '');
  html += '<div class="persona-meta"><span class="badge badge-tipo">' + esc(tipoLabel) +
    '</span>' + origenBadge + ' <span class="persona-codigo">' + esc(p.codigoReserva) + "</span> " + estadoBadge + "</div>";
  html += cupoHtml;
  html += "</div>";
  html += '<div class="persona-acciones">' + accionBtn + acompBtn + qrBtn + "</div>";
  html += "</div>";
  return html;
}

function onBuscadorInput(value) {
  _busq = value;
  var cont = document.getElementById("listaPersonas");
  if (cont) cont.innerHTML = renderListaPersonasHTML();
}

function setFiltro(key) {
  _filtro = key;
  renderPuerta();
}

function accionPrincipal(id) {
  var p = personaPorId(id);
  if (!p) return;
  if (p.dentro) { marcarSalida(id); return; }
  if (p.tipo === "invitado") { darAccesoSimple(id, "Invitado"); return; }
  if (p.tipo === "taquilla") {
    if (!taquillaLiquidada(p)) {
      if (puertaVentaRRPP()) darAccesoVendida(id); // la vendió el RRPP: acceso + contar vendida
      else cobrarYEntrar(id, precioEntradaDe(p));
    }
    else darAccesoSimple(id, "Taquilla");
    return;
  }
  if (p.tipo === "vip") {
    var mesa = p.mesa || {};
    var pend = (mesa.total || 0) - (p.importePagado || 0);
    if (pend > 0) cobrarYEntrar(id, pend);
    else darAccesoSimple(id, "VIP");
    return;
  }
}

function darAccesoSimple(id, tipoLabel) {
  mutate(function () {
    var p = personaPorId(id);
    if (!p || p.dentro) return;
    p.dentro = true;
    p.horaEntrada = nowHM();
    addLog("registró entrada de " + p.nombre + " " + p.apellido + " (" + tipoLabel + ")", "entrada");
  });
  toast("Acceso dado");
}

/* Modo "las entradas las venden los RRPP": ON = en la puerta NO se cobra. El portero solo
   da acceso, y la entrada queda CONTADA como vendida (suma a caja y al recuento de su RRPP).
   El dinero NO se atribuye al portero: no lo cobró él, lo cobró el RRPP fuera y lo liquida
   el día de la fiesta. Así se "cierra el círculo" con un solo toque. */
function puertaVentaRRPP() { return !!(state.config && state.config.puertaVentaRRPP); }
function darAccesoVendida(id) {
  mutate(function (s) {
    var p = personaPorId(id);
    if (!p || p.dentro) return;
    if (!taquillaLiquidada(p)) { p.importePagado = (p.importePagado || 0) + precioEntradaDe(p); }
    p.pagado = true;
    p.dentro = true;
    p.horaEntrada = nowHM();
    var rr = p.rrppSlug ? (s.rrpp || []).find(function (x) { return x.slug === p.rrppSlug; }) : null;
    addLog('dio acceso a ' + p.nombre + ' ' + p.apellido + ' (entrada ya vendida' + (rr ? ' · RRPP ' + rr.nombre : '') + ')', 'entrada');
  });
  toast('Acceso dado · contada como vendida');
}

function cobrarYEntrar(id, importe, metodo) {
  mutate(function (s) {
    var p = personaPorId(id);
    if (!p || p.dentro) return;
    var monto = importe;
    p.importePagado = (p.importePagado || 0) + monto;
    p.pagado = true;
    p.dentro = true;
    p.horaEntrada = nowHM();
    s.recaudacionPorPerfil[s.perfilActivo] = (s.recaudacionPorPerfil[s.perfilActivo] || 0) + monto;
    addLog("cobró " + monto + " € a " + p.nombre + " " + p.apellido +
      (metodo === 'tarjeta' ? ' (con tarjeta)' : (metodo === 'bizum' ? ' (por Bizum)' : '')), "cobro");
  });
  toast(metodo === 'tarjeta' ? "Cobro con tarjeta registrado" : (metodo === 'bizum' ? "Cobro por Bizum registrado" : "Cobro registrado"));
}

/* ===== COBRO CON TARJETA (Tap to Pay: el móvil del trabajador hace de datáfono) =====
   El cobro NFC real lo hace la app certificada del proveedor (SumUp, etc.): esta app
   manda el importe, el trabajador cobra allí acercando la tarjeta del cliente, vuelve
   y confirma. Solo entonces se apunta en la caja. Lo activa el DUEÑO en Ajustes y
   entonces aparece el botón 💳 al camarero (barra) y al vigilante (puerta). */
function tarjetaActiva() { return !!(state.config && state.config.tarjetaCfg && state.config.tarjetaCfg.activa); }
function tarjetaAppNombre() {
  var app = (state.config.tarjetaCfg && state.config.tarjetaCfg.app) || 'sumup';
  if (app === 'datafono') return 'el datáfono';
  return app === 'sumup' ? 'SumUp' : 'tu app de cobro';
}
/* Enlace que abre la app de cobro con el importe puesto (si el proveedor lo permite). */
function tarjetaDeepLink(importe) {
  var app = (state.config.tarjetaCfg && state.config.tarjetaCfg.app) || 'sumup';
  var cant = (Math.round(importe * 100) / 100).toFixed(2);
  if (app === 'sumup') {
    return 'sumupmerchant://pay/1.0?amount=' + cant + '&currency=EUR&title=' +
      encodeURIComponent((state.config.eventName || 'Fiesta'));
  }
  return null; // datáfono físico u "otra app": el modal enseña el importe bien grande
}
var _tarjetaPend = null; // qué registrar cuando el trabajador confirme "ya está cobrado"
function abrirCobroTarjeta(importe, concepto, onOk) {
  _tarjetaPend = onOk;
  var link = tarjetaDeepLink(importe);
  var nombreApp = tarjetaAppNombre();
  var esDatafono = ((state.config.tarjetaCfg && state.config.tarjetaCfg.app) || 'sumup') === 'datafono';
  var html = '<div class="modal-tarjeta" data-testid="modal-tarjeta">' +
    '<h2>💳 Cobro con tarjeta</h2>' +
    '<p class="tarjeta-importe" data-testid="tarjeta-importe">' + esc(money(importe)) + '</p>' +
    '<p class="nota">' + esc(concepto) + '</p>' +
    '<ol class="tarjeta-pasos">' +
    (esDatafono
      ? '<li>Teclea <b>' + esc(money(importe)) + '</b> en el <b>datáfono</b>.</li>' +
        '<li>El cliente paga con su tarjeta o móvil en el datáfono.</li>' +
        '<li>Cuando el datáfono diga pagado, confirma aquí.</li>'
      : '<li>Abre <b>' + esc(nombreApp) + '</b> y pon ese importe si no sale solo.</li>' +
        '<li>El cliente <b>acerca su tarjeta o móvil</b> al teléfono.</li>' +
        '<li>Cuando la app diga pagado, vuelve aquí y confirma.</li>') +
    '</ol>' +
    (link ? '<a class="btn-primary btn-abrir-app" data-testid="tarjeta-abrir" href="' + esc(link) + '">Abrir ' + esc(nombreApp) + '</a>' : '') +
    '<div class="modal-botones">' +
    '<button type="button" class="btn-primary" data-testid="tarjeta-cobrado" onclick="tarjetaConfirmar()">✅ Ya está cobrado</button>' +
    '<button type="button" data-testid="tarjeta-cancelar" onclick="_tarjetaPend=null;closeModal()">Cancelar</button>' +
    '</div>' +
    '<p class="nota">Si el cobro falla en ' + esc(nombreApp) + ', pulsa Cancelar: aquí no se apunta nada hasta que confirmes.</p>' +
    '</div>';
  showModal(html);
}
function tarjetaConfirmar() {
  var fn = _tarjetaPend;
  _tarjetaPend = null;
  closeModal();
  if (typeof fn === 'function') fn();
}
/* Botón 💳 de la ficha de persona en puerta (solo si hay algo que cobrar). */
function accionPrincipalTarjeta(id) {
  var p = personaPorId(id);
  if (!p || p.dentro) return;
  var importe = 0;
  if (p.tipo === 'taquilla' && !taquillaLiquidada(p)) importe = precioEntradaDe(p);
  else if (p.tipo === 'vip') importe = Math.max(0, ((p.mesa || {}).total || 0) - (p.importePagado || 0));
  if (importe <= 0) { accionPrincipal(id); return; }
  abrirCobroTarjeta(importe, 'Entrada de ' + p.nombre + ' ' + p.apellido, function () {
    cobrarYEntrar(id, importe, 'tarjeta');
  });
}
/* Botón 💳 de la barra: cobra el carrito entero con tarjeta. */
function barraCobrarTarjeta() {
  var carrito = state.carritos[state.perfilActivo] || [];
  if (!carrito.length) return;
  var total = 0;
  for (var i = 0; i < carrito.length; i++) total += carrito[i].precio * carrito[i].qty;
  abrirCobroTarjeta(total, 'Barra · ' + carrito.length + ' producto(s)', function () {
    barraCobrar('tarjeta');
  });
}

/* ===== COBRO POR BIZUM (directo a la cuenta del dueño, SIN intermediarios) =====
   El cliente envía un Bizum al número del dueño desde su propio banco: el dinero
   cae directo en la cuenta vinculada a ese número, sin comisiones ni terceros.
   El trabajador confirma cuando el dueño/el móvil avisa de que llegó. */
function bizumActivo() {
  var b = state.config && state.config.bizumCfg;
  return !!(b && b.activo && String(b.telefono || '').trim());
}
function abrirCobroBizum(importe, concepto, onOk) {
  _tarjetaPend = onOk; // mismo mecanismo de confirmación que la tarjeta (hasta confirmar, nada se apunta)
  var tel = String((state.config.bizumCfg || {}).telefono || '').trim();
  var html = '<div class="modal-tarjeta" data-testid="modal-bizum">' +
    '<h2>📲 Cobro por Bizum</h2>' +
    '<p class="tarjeta-importe" data-testid="bizum-importe">' + esc(money(importe)) + '</p>' +
    '<p class="nota">' + esc(concepto) + '</p>' +
    '<p class="bizum-tel">Bizum al <b data-testid="bizum-telefono">' + esc(tel) + '</b></p>' +
    '<ol class="tarjeta-pasos">' +
    '<li>El cliente abre <b>su app del banco</b> → Bizum.</li>' +
    '<li>Envía <b>' + esc(money(importe)) + '</b> a ese número.</li>' +
    '<li>Cuando veas el "enviado" en su pantalla (o llegue el aviso), confirma aquí.</li>' +
    '</ol>' +
    '<div class="modal-botones">' +
    '<button type="button" class="btn-primary" data-testid="bizum-cobrado" onclick="tarjetaConfirmar()">✅ Bizum recibido</button>' +
    '<button type="button" data-testid="bizum-cancelar" onclick="_tarjetaPend=null;closeModal()">Cancelar</button>' +
    '</div>' +
    '<p class="nota">Hasta que no confirmes, aquí no se apunta nada.</p>' +
    '</div>';
  showModal(html);
}
/* Botón 📲 de la ficha de puerta (entrada sin pagar o resto de mesa VIP). */
function accionPrincipalBizum(id) {
  var p = personaPorId(id);
  if (!p || p.dentro) return;
  var importe = 0;
  if (p.tipo === 'taquilla' && !taquillaLiquidada(p)) importe = precioEntradaDe(p);
  else if (p.tipo === 'vip') importe = Math.max(0, ((p.mesa || {}).total || 0) - (p.importePagado || 0));
  if (importe <= 0) { accionPrincipal(id); return; }
  abrirCobroBizum(importe, 'Entrada de ' + p.nombre + ' ' + p.apellido, function () {
    cobrarYEntrar(id, importe, 'bizum');
  });
}
/* Botón 📲 de la barra: cobra el carrito entero por Bizum. */

}

/* ===== CARTEL DE LA FIESTA (lo sube el dueño; se usa de fondo en invitaciones/PDF) ===== */
var _cartelImg = null;
function precargarCartel() {
  if (state && state.config && state.config.cartel) {
    var img = new Image();
    img.onload = function () { _cartelImg = img; };
    img.src = state.config.cartel;
  } else { _cartelImg = null; }
}
/* Comprime la imagen subida para que quepa en la memoria del navegador (~5MB en total):
   la reduce a un tamaño máximo y la exporta ligera. PNG conserva transparencia (logos). */
function comprimirImagen(file, maxLado, preferPng, cb) {
  var r = new FileReader();
  r.onload = function () {
    var img = new Image();
    img.onload = function () {
      try {
        var f = Math.min(1, maxLado / Math.max(img.width, img.height));
        var w = Math.max(1, Math.round(img.width * f));
        var h = Math.max(1, Math.round(img.height * f));
        var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        var out = preferPng ? cv.toDataURL('image/png') : cv.toDataURL('image/jpeg', 0.85);
        // Si aun así queda enorme (PNG fotográfico), reintenta como JPEG
        if (out.length > 900 * 1024) out = cv.toDataURL('image/jpeg', 0.8);
        cb(out);
      } catch (e) { cb(null); }
    };
    img.onerror = function () { cb(null); };
    img.src = String(r.result);
  };
  r.onerror = function () { cb(null); };
  r.readAsDataURL(file);
}

function cargarCartelArchivo(input) {
  var f = input.files && input.files[0];
  if (!f) return;
  toast('Preparando el cartel…');
  comprimirImagen(f, 1000, false, function (dataUrl) {
    if (!dataUrl) { toast('No se pudo leer la imagen'); return; }
    mutate(function (s) { s.config.cartel = dataUrl; });
    precargarCartel();
    toast('Cartel guardado');
  });
  input.value = '';
}
function quitarCartel() {
  mutate(function (s) { s.config.cartel = null; });
  _cartelImg = null;
  toast('Cartel quitado');
}
function cartelListo() {
  return new Promise(function (resolve) {
    if (!state.config.cartel) { resolve(null); return; }
    if (_cartelImg && _cartelImg.complete) { resolve(_cartelImg); return; }
    var img = new Image();
    img.onload = function () { _cartelImg = img; resolve(img); };
    img.onerror = function () { resolve(null); };
    img.src = state.config.cartel;
  });
}
var _logoImg = null;
function logoListo() {
  return new Promise(function (resolve) {
    if (!state.config.logo) { resolve(null); return; }
    if (_logoImg && _logoImg.complete && _logoImg.src === state.config.logo) { resolve(_logoImg); return; }
    var img = new Image();
    img.onload = function () { _logoImg = img; resolve(img); };
    img.onerror = function () { resolve(null); };
    img.src = state.config.logo;
  });
}

/* Construye la INVITACIÓN como ENTRADA DE FESTIVAL (async: espera al cartel si lo hay).
   Cabecera (cartel o emblema) + datos del evento + tipo/nombre/mesa/precio + talón
   perforado con el QR grande. */
function hexToRgb(hex) {
  var h = String(hex || '').replace('#', '');
  if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
  var n = parseInt(h, 16);
  if (isNaN(n)) return { r: 0, g: 212, b: 255 };
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function canvasInvitacion(p) {
  return Promise.all([cartelListo(), logoListo()]).then(function (imgs) {
    var cartel = imgs[0], logo = imgs[1];
    var c = state.config;
    var W = 800, cx = W / 2;
    var tema = c.colorTema || '#00d4ff';
    var rgb = hexToRgb(tema);
    var rgba = function (a) { return 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + a + ')'; };
    var acento = tema; // el color del evento manda; el tipo se distingue por el texto
    var headerH = cartel ? Math.round(W * (cartel.height / cartel.width)) : 300;
    var copas = consIncluidas(p);
    var esVip = p.tipo === 'vip' && p.mesa;
    // Altura dinámica según líneas
    var lineas = 0; // bloque de detalles
    lineas += 1;                    // tipo
    lineas += 1;                    // nombre
    if (c.fecha || c.hora) lineas += 1;
    if (c.lugar) lineas += 1;
    if (esVip) lineas += 2;         // mesa + acompañantes, y línea de botella/refrescos
    lineas += 1;                    // precio
    if (copas > 0) lineas += 1;     // copas (no-VIP)
    var detalleH = 40 + lineas * 46 + 24;
    var stubH = 620;                // perforado + QR + código + pie
    var H = headerH + 30 + (c.lema ? 44 : 0) + 70 + detalleH + stubH;
    var cvv = document.createElement('canvas'); cvv.width = W; cvv.height = H;
    var ctx = cvv.getContext('2d');
    // ---- Fondo con vida: degradado + resplandores del color del evento ----
    var bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#0a0a12'); bg.addColorStop(0.5, '#0d0d18'); bg.addColorStop(1, '#0a0a12');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    var glowTop = ctx.createRadialGradient(cx, headerH + 40, 30, cx, headerH + 40, W * 0.95);
    glowTop.addColorStop(0, rgba(0.30)); glowTop.addColorStop(1, rgba(0));
    ctx.fillStyle = glowTop; ctx.fillRect(0, 0, W, H);
    var glowBot = ctx.createRadialGradient(cx, H * 0.82, 40, cx, H * 0.82, W * 0.9);
    glowBot.addColorStop(0, rgba(0.22)); glowBot.addColorStop(1, rgba(0));
    ctx.fillStyle = glowBot; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    // barra de acento superior
    ctx.fillStyle = tema; ctx.fillRect(0, 0, W, 12);
    // ---- Cabecera ----
    if (cartel) {
      ctx.drawImage(cartel, 0, 0, W, headerH);
    } else if (logo) {
      // TU logo, tal cual, centrado (sin recortar: encaja en un cuadro)
      var lado = 200;
      var esc2 = Math.min(lado / logo.width, lado / logo.height);
      var lw = logo.width * esc2, lh = logo.height * esc2;
      ctx.drawImage(logo, cx - lw / 2, 40, lw, lh);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 40px -apple-system, sans-serif'; ctx.fillText(c.eventName, cx, headerH - 20);
    } else {
      var cyc = 140, rr = 100;
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cyc, rr, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a0f'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke();
      ctx.translate(cx, cyc); ctx.rotate(Math.PI / 4); ctx.strokeRect(-44, -44, 88, 88);
      ctx.restore();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 46px -apple-system, sans-serif'; ctx.fillText('MH', cx, cyc + 2);
      ctx.fillStyle = '#fff'; ctx.fillRect(cx - 70, cyc + 34, 140, 34);
      ctx.fillStyle = '#0a0a0f'; ctx.font = '600 18px -apple-system, sans-serif'; ctx.fillText('Collective', cx, cyc + 57);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 40px -apple-system, sans-serif'; ctx.fillText(c.eventName, cx, headerH - 20);
    }
    var y = headerH + 44;
    // barra de acento con nombre del evento (si hay cartel, refuerza)
    if (cartel) { ctx.fillStyle = '#fff'; ctx.font = 'bold 34px -apple-system, sans-serif'; ctx.fillText(c.eventName, cx, y); y += 40; }
    if (c.lema) { ctx.fillStyle = acento; ctx.font = '700 24px -apple-system, sans-serif'; ctx.fillText(c.lema.toUpperCase(), cx, y); y += 40; }
    // línea separadora
    ctx.strokeStyle = '#333340'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(W - 50, y); ctx.stroke(); y += 46;
    // ---- Detalles tipo ficha ----
    ctx.fillStyle = acento; ctx.font = 'bold 30px -apple-system, sans-serif';
    var titulo = p.tipo === 'vip' ? 'MESA VIP' : (p.tipo === 'invitado' ? 'INVITACIÓN' : 'ENTRADA GENERAL');
    ctx.fillText(titulo, cx, y); y += 46;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 30px -apple-system, sans-serif';
    var titular = (p.nombre + ' ' + p.apellido).trim();
    ctx.fillText(titular || 'Entrada al portador', cx, y); y += 46;
    ctx.font = '400 25px -apple-system, sans-serif'; ctx.fillStyle = '#c8c8d4';
    if (c.fecha || c.hora) { ctx.fillText([c.fecha, c.hora].filter(Boolean).join('  ·  '), cx, y); y += 46; }
    if (c.lugar) { ctx.fillText('📍 ' + c.lugar, cx, y); y += 46; }
    if (esVip) { ctx.fillStyle = '#fff'; ctx.fillText('Mesa Nº ' + p.mesa.numero + '  ·  ' + p.mesa.acompanantesPermitidos + ' acompañantes', cx, y); y += 46; ctx.fillStyle = '#c8c8d4'; }
    // precio
    var precioTxt;
    if (p.tipo === 'invitado') precioTxt = 'INVITACIÓN · GRATIS';
    else if (esVip) precioTxt = 'Mesa: ' + (p.mesa.total || 0) + ' €';
    else precioTxt = 'Precio: ' + precioEntradaDe(p) + ' €';
    ctx.fillStyle = '#fff'; ctx.font = '600 26px -apple-system, sans-serif'; ctx.fillText(precioTxt, cx, y); y += 46;
    if (esVip) {
      var vp2 = vipPack();
      ctx.fillStyle = '#b026ff'; ctx.font = '600 24px -apple-system, sans-serif';
      var partes = [];
      if (vp2.botellas > 0) partes.push('🍾 ' + vp2.botellas + ' Botella' + (vp2.botellas === 1 ? '' : 's') + ' a elegir');
      if (vp2.refrescos > 0) partes.push('🥤 ' + vp2.refrescos + ' Refrescos');
      if (partes.length) { ctx.fillText(partes.join('  ·  '), cx, y); y += 46; }
    } else if (copas > 0) {
      ctx.fillStyle = '#b026ff'; ctx.font = '600 24px -apple-system, sans-serif';
      ctx.fillText('🍹 Incluye ' + copas + ' consumici' + (copas === 1 ? 'ón' : 'ones'), cx, y); y += 46;
    }
    y += 6;
    // ---- Perforado (talón) ----
    ctx.fillStyle = '#0a0a0f';
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.setLineDash([12, 10]);
    ctx.beginPath(); ctx.moveTo(46, y); ctx.lineTo(W - 46, y); ctx.stroke(); ctx.setLineDash([]);
    // muescas laterales
    ctx.fillStyle = '#0a0a0f';
    [0, W].forEach(function (xx) { ctx.beginPath(); ctx.arc(xx, y, 22, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#333340'; ctx.lineWidth = 2; ctx.stroke(); });
    y += 44;
    // ---- QR en caja blanca ----
    var qBox = 430;
    var qcv = document.createElement('canvas');
    try { drawQR(qcv, p.codigoReserva, 400); } catch (e) { qcv = null; }
    ctx.fillStyle = '#fff'; ctx.fillRect(cx - qBox / 2, y, qBox, qBox);
    if (qcv) ctx.drawImage(qcv, cx - 200, y + 15, 400, 400);
    y += qBox + 46;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 42px monospace'; ctx.fillText(p.codigoReserva, cx, y); y += 40;
    ctx.fillStyle = '#a0a0b0'; ctx.font = '400 22px -apple-system, sans-serif';
    ctx.fillText('Presenta este código en la puerta · MH Collective', cx, y);
    // marco de acento alrededor de toda la entrada
    ctx.strokeStyle = rgba(0.55); ctx.lineWidth = 6; ctx.strokeRect(9, 9, W - 18, H - 18);
    ctx.strokeStyle = rgba(0.18); ctx.lineWidth = 2; ctx.strokeRect(20, 20, W - 40, H - 40);
    return cvv;
  });
}

/* Comparte la invitación por WhatsApp (imagen). */
function compartirInvitacion(p) {
  canvasInvitacion(p).then(function (cv) {
    if (!cv) { toast('No se pudo generar la invitación'); return; }
    if (navigator.share && cv.toBlob) {
      cv.toBlob(function (blob) {
        if (!blob) { descargarCanvas(cv, p); return; }
        try {
          var file = new File([blob], 'invitacion-' + p.codigoReserva + '.png', { type: 'image/png' });
          if (navigator.canShare && !navigator.canShare({ files: [file] })) { descargarCanvas(cv, p); return; }
          navigator.share({ files: [file], title: state.config.eventName, text: p.codigoReserva + ' · ' + state.config.eventName }).catch(function () {});
        } catch (e) { descargarCanvas(cv, p); }
      });
    } else {
      descargarCanvas(cv, p);
      toast('Invitación descargada: mándala por WhatsApp');
    }
  });
}

/* ===== PDF sin librerías: cada invitación (imagen JPEG) es una página ===== */
function _u8(str) { var a = new Uint8Array(str.length); for (var i = 0; i < str.length; i++) a[i] = str.charCodeAt(i) & 0xff; return a; }

function construirPdf(paginas) {

  offsets[1] = offset; push(_u8('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n'));
  offsets[2] = offset; push(_u8('2 0 obj\n<< /Type /Pages /Kids [' + kids.join(' ') + '] /Count ' + N + ' >>\nendobj\n'));
  for (i = 0; i < N; i++) {
    var pg = paginas[i], base = 3 + i * 3, pageN = base, imgN = base + 1, contN = base + 2;
    var content = 'q ' + pg.w + ' 0 0 ' + pg.h + ' 0 0 cm /Im0 Do Q';

    offsets[imgN] = offset; push(_u8(imgN + ' 0 obj\n<< /Type /XObject /Subtype /Image /Width ' + pg.w + ' /Height ' + pg.h + ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + pg.jpeg.length + ' >>\nstream\n'));

    offsets[contN] = offset; push(_u8(contN + ' 0 obj\n<< /Length ' + content.length + ' >>\nstream\n' + content + '\nendstream\nendobj\n'));
  }
  var xrefOffset = offset, totalObjs = 2 + N * 3;
  var xref = 'xref\n0 ' + (totalObjs + 1) + '\n0000000000 65535 f \n';
  for (var n = 1; n <= totalObjs; n++) { xref += ('0000000000' + (offsets[n] || 0)).slice(-10) + ' 00000 n \n'; }
  push(_u8(xref));
  push(_u8('trailer\n<< /Size ' + (totalObjs + 1) + ' /Root 1 0 R >>\nstartxref\n' + xrefOffset + '\n%%EOF'));

}

/* ZIP sin librerías (método "store", con CRC32) para bajar un PDF por entrada. */

    chunks.push(lh, data);

      _u32(crc), _u32(data.length), _u32(data.length), _u16(nameB.length), _u16(0), _u16(0),

/* Un PDF por entrada, todos en un ZIP (para grupos: 5 amigos = 5 PDFs sueltos). */

/* ===== NFC (pulseras/tarjetas del monedero, estilo festival) =====
   El código del monedero (o de una entrada) se GRABA en una pulsera/tarjeta NFC
   barata. El trabajador pulsa "Leer NFC", el cliente acerca la pulsera al móvil
   y el código entra solo: un segundo por cobro, sin teclear ni enfocar QR.
   Requisitos reales (Web NFC): móvil Android con Chrome y la web abierta por
   https. El iPhone NO puede leer NFC desde la web (los móviles del personal
   conviene que sean Android; el cliente no necesita nada, la pulsera es pasiva). */
function nfcSoportado() {
  return (typeof window !== 'undefined') && ('NDEFReader' in window) && (window.isSecureContext === true);
}
function _nfcAvisoNoSoportado() {
  toast(window.isSecureContext !== true && ('NDEFReader' in window)
    ? 'El NFC solo funciona con la web abierta por https (no en archivo local).'
    : 'Este móvil/navegador no lee NFC desde la web: hace falta Android con Chrome.');
}
/* Lee UNA etiqueta NFC y entrega su texto (el código). */
function nfcLeer(onCodigo) {
  if (!nfcSoportado()) { _nfcAvisoNoSoportado(); return; }
  try {
    var lector = new NDEFReader();
    var ctrl = new AbortController();
    lector.scan({ signal: ctrl.signal }).then(function () {
      toast('📡 Acerca la pulsera/tarjeta al móvil…');
    }).catch(function () { toast('No se pudo activar el NFC (¿está encendido en el móvil?)'); });
    lector.onreading = function (ev) {
      try {
        var texto = null;
        var recs = (ev.message && ev.message.records) || [];
        for (var i = 0; i < recs.length; i++) {
          if (recs[i].recordType === 'text') {
            texto = new TextDecoder(recs[i].encoding || 'utf-8').decode(recs[i].data);
            break;
          }
        }
        if (texto) { ctrl.abort(); onCodigo(String(texto).trim()); }
        else toast('La pulsera está vacía: grábala primero desde el monedero.');
      } catch (e) { toast('No se pudo leer la pulsera, prueba otra vez'); }
    };
    lector.onreadingerror = function () { toast('Lectura fallida: acércala de nuevo'); };
  } catch (e) { _nfcAvisoNoSoportado(); }
}
/* Graba un código en una pulsera/tarjeta NFC (se hace una vez por pulsera). */
function nfcGrabarCodigo(codigo) {
  if (!nfcSoportado()) { _nfcAvisoNoSoportado(); return; }
  try {
    var lector = new NDEFReader();
    toast('📡 Acerca la pulsera VACÍA al móvil para grabarla…');
    lector.write({ records: [{ recordType: 'text', data: String(codigo) }] })
      .then(function () { toast('✅ Pulsera grabada con ' + codigo); })
      .catch(function () { toast('No se pudo grabar: acércala de nuevo y no la muevas'); });
  } catch (e) { _nfcAvisoNoSoportado(); }
}
/* Botón NFC del escáner de PUERTA: entra como si lo hubiera leído la cámara. */
function nfcLeerEscaner() {
  nfcLeer(function (c) {
    var i = document.getElementById('qr-codigo'); if (i) i.value = c;
    resolverEscaneo(c, true);

}

/* CÁMARA UNIVERSAL: abre la cámara del móvil, haces una foto al QR y la app lo lee.
   Funciona desde file://, http y https, en Android y iPhone (usa el selector de
   archivos con cámara, no getUserMedia, que exigiría https). */
function escanearConCamara(onCodigo) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.setAttribute('capture', 'environment');
  input.style.display = 'none';
  input.onchange = function () {
    var f = input.files && input.files[0];
    if (!f) { if (input.parentNode) input.parentNode.removeChild(input); return; }
    toast('Leyendo el código…');
    var img = new Image();
    img.onload = function () {
      try {
        var max = 1000;
        var factor = Math.min(1, max / Math.max(img.width, img.height));
        var w = Math.max(1, Math.round(img.width * factor)), h = Math.max(1, Math.round(img.height * factor));
        var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        var ctx = cv.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
        var data = ctx.getImageData(0, 0, w, h);
        var codigo = null;
        if (typeof window.jsQR === 'function') {
          var res = window.jsQR(data.data, w, h);
          if (res && res.data) codigo = String(res.data).trim();
        }
        if (codigo) onCodigo(codigo);
        else toast('No se pudo leer el QR. Repite la foto o teclea el código.');
      } catch (e) { toast('No se pudo leer la imagen. Teclea el código.'); }
      finally { try { URL.revokeObjectURL(img.src); } catch (e) {} if (input.parentNode) input.parentNode.removeChild(input); }
    };
    img.onerror = function () { toast('No se pudo abrir la foto.'); if (input.parentNode) input.parentNode.removeChild(input); };
    img.src = URL.createObjectURL(f);
  };
  document.body.appendChild(input);
  input.click();
}

function onEscanerSubmit(ev) {

  var input = document.getElementById("qr-codigo");
  var valor = input ? input.value.trim() : "";
  if (!valor) return;

}

/* Veredicto del escaneo: cierra el círculo. Dice al instante si el código es
   válido, si está pagado y —clave anti-fraude— si YA ENTRÓ (código repetido).
   Si el acceso automático está ON y viene de la cámara, para las entradas válidas
   YA PAGADAS o de invitado entra sola; el resto (cobrar, ya-usada, no válida) cae
   siempre al veredicto manual con botón. */
function resolverEscaneo(valor, deCamara) {
  var out = document.getElementById("escanerResultado");
  var p = personaPorCodigo(valor);
  if (!p) {
    // ¿Es un monedero? En puerta se enseña el saldo y se puede RECARGAR aquí mismo.
    var mon = monederoUsable() ? monederoPorCodigo(valor) : null;
    if (mon) {
      if (out) out.innerHTML = '<div class="scan-res scan-ok"><b class="scan-verde">💰 MONEDERO</b>' +
        '<span>' + esc(mon.codigo) + ' · Saldo: <b data-testid="scan-mon-saldo">' + esc(money(mon.saldo)) + '</b></span></div>' +
        '<div class="contador"><input type="number" id="recarga-importe" min="1" placeholder="€ a recargar" inputmode="numeric" style="flex:1">' +
        '<button type="button" data-testid="btn-recargar" onclick="recargarDesdeEscaner(\'' + escJs(mon.id) + '\')">Recargar</button></div>' +
        '<p class="nota">Cobra ese dinero al cliente (efectivo/Bizum) y pulsa Recargar: el saldo sube al momento en todos los móviles.</p>';
      return;
    }
    if (out) out.innerHTML = '<div class="scan-res scan-rojo"><b>❌ Código no válido</b>' +
      '<span>' + esc(valor) + ' no existe en la lista.</span></div>' +
      '<button type="button" onclick="closeModal();abreExpress();">Dar de alta express</button>';
    return;
  }
  var nombre = esc(p.nombre + " " + p.apellido);
  // ACCESO AUTOMÁTICO: solo cámara + config ON + válida + fuera + sin nada que cobrar.
  var pend = p.tipo === "vip" ? ((p.mesa.total || 0) - (p.importePagado || 0)) : 0;
  var sinDeuda = p.tipo === "invitado" || (p.importePagado || 0) > 0 && pend <= 0;
  if (deCamara && state.config.accesoAuto && !p.dentro && sinDeuda) {
    darAccesoSimple(p.id, p.tipo === "invitado" ? "Invitado" : (p.tipo === "vip" ? "VIP" : "Taquilla"));
    if (out) out.innerHTML = '<div class="scan-res scan-ok"><b class="scan-verde">✔ DENTRO</b>' +
      '<span>' + nombre + ' · ' + esc(p.codigoReserva) + '</span></div>' +
      '<button type="button" onclick="closeModal()">Siguiente</button>';
    return;
  }
  if (p.dentro) {
    // YA USADO: alarma clara. No deja pasar de nuevo con el mismo código.
    addLog("intento de reentrada con código ya usado: " + p.nombre + " " + p.apellido + " (" + p.codigoReserva + ")", "salida");
    if (out) out.innerHTML = '<div class="scan-res scan-rojo"><b>⚠️ YA ENTRÓ</b>' +
      '<span>' + nombre + ' entró a las ' + esc(p.horaEntrada || "?") + '. Código repetido.</span></div>' +
      '<button type="button" onclick="verFicha(\'' + escJs(valor) + '\')">Ver su ficha</button>';
    save(); // deja constancia del intento en el log
    return;
  }
  // VÁLIDO y aún fuera: estado de pago + acción directa.
  var pagada = p.tipo === "invitado" || (p.tipo === "taquilla" ? taquillaLiquidada(p) : (p.importePagado || 0) > 0);
  var linea = p.tipo === "invitado"
    ? '<b class="scan-verde">✔ INVITADO (gratis)</b>'
    : (pagada ? '<b class="scan-verde">✔ PAGADA</b>'
      : (puertaVentaRRPP() && p.tipo === "taquilla" ? '<b class="scan-verde">✔ ENTRADA VÁLIDA</b>'
        : '<b class="scan-ambar">€ SIN PAGAR · cobra ' + esc(p.tipo === "vip" ? ((p.mesa.total || 0) - (p.importePagado || 0)) : precioEntradaDe(p)) + ' €</b>'));
  var copas = consIncluidas(p);
  if (out) out.innerHTML = '<div class="scan-res scan-ok">' + linea +
    '<span>' + nombre + ' · ' + esc(p.codigoReserva) +
    (copas > 0 ? ' · ' + copas + ' copa' + (copas === 1 ? '' : 's') : '') + '</span></div>' +
    '<button type="button" class="btn-primary" onclick="verFicha(\'' + escJs(valor) + '\')">' +
    esc(labelAccion(p)) + '</button>';
}

/* CÁMARA EN VIVO: apunta y el QR salta solo, sin hacer foto. Requiere https
   (Netlify lo da). Decodifica con BarcodeDetector si existe (Android) o con jsQR
   (universal, incluye iPhone). En file://, http o sin permiso, no molesta: queda
   el botón de foto y el teclado. onCodigo recibe el código leído. */
var _camActiva = false;
function cerrarCamara() {
  _camActiva = false;
  if (window._camStream) { try { window._camStream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {} window._camStream = null; }
}
function intentarCamaraQR(onCodigo) {
  try {
    var seguro = (window.isSecureContext === true) || location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (!seguro) return;                       // sin https el navegador bloquea la cámara en vivo
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    var wrap = document.getElementById("escanerVideoWrap");
    if (!wrap) return;
    var aviso = document.getElementById('escanerAviso');
    var video = document.createElement("video");
    video.setAttribute("playsinline", "true");
    video.muted = true; video.autoplay = true;
    video.style.width = "100%"; video.style.borderRadius = "8px";
    wrap.appendChild(video);
    var cb = onCodigo || function (v) { var i = document.getElementById('qr-codigo'); if (i) i.value = v; resolverEscaneo(v, true); };
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function (stream) {
      window._camStream = stream; _camActiva = true;
      video.srcObject = stream; video.play && video.play().catch(function () {});
      if (aviso) aviso.textContent = 'Apunta al QR: se lee solo.';
      var detector = null;
      try { if (typeof BarcodeDetector !== 'undefined') detector = new BarcodeDetector({ formats: ["qr_code"] }); } catch (e) {}
      var lienzo = document.createElement('canvas');
      function encontrado(valor) {
        cerrarCamara();
        if (video.parentNode) video.parentNode.removeChild(video);
        cb(String(valor).trim());
      }
      function tick() {
        if (!_camActiva) return;
        if (!document.body.contains(video)) { cerrarCamara(); return; }
        if (!video.videoWidth) { requestAnimationFrame(tick); return; }
        if (detector) {
          detector.detect(video).then(function (codes) {
            if (codes && codes.length) { encontrado(codes[0].rawValue); return; }
            if (_camActiva) requestAnimationFrame(tick);
          }).catch(function () { if (_camActiva) requestAnimationFrame(tick); });
        } else if (typeof window.jsQR === 'function') {
          var w = video.videoWidth, h = video.videoHeight;
          var f = Math.min(1, 640 / Math.max(w, h));
          lienzo.width = Math.round(w * f); lienzo.height = Math.round(h * f);
          var ctx = lienzo.getContext('2d');
          ctx.drawImage(video, 0, 0, lienzo.width, lienzo.height);
          var d = ctx.getImageData(0, 0, lienzo.width, lienzo.height);
          var res = window.jsQR(d.data, lienzo.width, lienzo.height);
          if (res && res.data) { encontrado(res.data); return; }
          if (_camActiva) requestAnimationFrame(tick);
        }
      }
      requestAnimationFrame(tick);
    }).catch(function () { if (video.parentNode) video.parentNode.removeChild(video); });
  } catch (e) {}
}

/* frag-barra.js — TPV de Barra (#/barra), camareros + dueño.
   Global vanilla JS. Usa: state, mutate, esc, money, addLog, toast, renderApp, productoPorId. */

function renderBarra() {
  var vista = document.getElementById('vista');
  if (!vista) return;

  var perfil = state.perfilActivo;
  var carrito = state.carritos[perfil] || (state.carritos[perfil] = []);
  var modulos = state.config.modulos || {};
  var productos = state.config.productos || [];
  var umbral = state.config.umbralStock || 10;

  var botonesHtml = productos.map(function (p) {
    var cls = 'btn-producto';
    var extra = '';
    var agotado = false;

    if (modulos.stock) {
      if (p.stock === 0) {
        agotado = true;
        extra = ' · Agotado';
      } else {
        extra = ' · ' + p.stock + ' uds';
        if (p.stock <= umbral) {
          cls += ' poco-stock';
          extra += ' ¡Quedan ' + p.stock + '!';
        }
      }

    var incl = (p.refrescosIncluidos || 0) > 0 ? '<span class="prod-incluye">🥤 incluye ' + p.refrescosIncluidos + ' refrescos</span>' : '';
    return '<button type="button" class="' + cls + '" data-testid="prod-' + esc(p.id) + '"' +

  var hayOtrosPagos = tarjetaActiva() || bizumActivo();

    '<section class="vista-barra">' +

      '<div class="carrito" data-testid="carrito">' +
        lineasHtml +
        '<div class="carrito-footer">' +

          'onclick="barraVaciar()">Vaciar carrito</button>' +
          '<span class="carrito-total" data-testid="carrito-total">' + money(total) + '</span>' +
        '</div>' +

        (cobrarDisabled ? ' disabled' : ' onclick="barraCobrar()"') + '>' +

      (tarjetaActiva()
        ? '<button type="button" class="btn-cobrar-tarjeta" data-testid="btn-cobrar-tarjeta"' +
          (cobrarDisabled ? ' disabled' : ' onclick="barraCobrarTarjeta()"') + '>💳 Cobrar con tarjeta</button>'
        : '') +
      (bizumActivo()
        ? '<button type="button" class="btn-cobrar-bizum" data-testid="btn-cobrar-bizum"' +
          (cobrarDisabled ? ' disabled' : ' onclick="barraCobrarBizum()"') + '>📲 Cobrar por Bizum</button>'
        : '') +

        ? '<button type="button" class="btn-vender-bono" data-testid="btn-vender-bono" onclick="venderBonoBarra()">' +
          'Vender bono: ' + esc(state.config.bonoCfg.copas) + ' copas · ' + esc(money(state.config.bonoCfg.precio)) + '</button>'
        : '') +

        '<form id="consForm" onsubmit="return consBuscar()">' +

var _consMsg = '<p class="cons-hint">Teclea el código de la entrada para ver sus copas incluidas.</p>';

function consConfig() {
  return (state.config && state.config.consumiciones) || { invitado: 0, taquilla: 1, vip: 2 };

function consIncluidas(p) {
  // Las entradas de remesa (u otras personalizadas) pueden traer SUS copas fijadas por el dueño.
  if (typeof p.consumicionesIncluidas === 'number') return p.consumicionesIncluidas;
  if (p.tipo === 'vip') return 0; // las VIP NO van con copas sueltas: van con botella + refrescos

function canjearBonoCopa(id) {

function canjearConsumicion(id) {

/* Slug de un tipo ("Vodka limón" → "vodka-limon") para claves y testids. */
function _slugVariante(v) {
  return String(v).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}
/* Si el producto tiene TIPOS (Ron cola, Vodka limón…), pregunta cuál con botones
   grandes. Mismo precio y mismo stock; solo cambia el nombre que se apunta. */
function barraElegirVariante(prodId) {
  var prod = productoPorId(prodId);
  if (!prod) return;
  var html = '<div class="modal-qr" data-testid="modal-variantes"><h2>' + esc(prod.nombre) + ' · ¿cuál?</h2>';
  (prod.variantes || []).forEach(function (v) {
    html += '<button type="button" class="btn-primary btn-variante" data-testid="var-' + esc(_slugVariante(v)) +
      '" onclick="closeModal();barraAgregar(\'' + esc(escJs(prodId)) + '\',\'' + esc(escJs(v)) + '\')">' + esc(v) + '</button>';
  });
  html += '<div class="modal-botones"><button type="button" onclick="closeModal()">Cancelar</button></div></div>';
  showModal(html);
}
function barraAgregar(prodId, variante) {
  var prodV = productoPorId(prodId);
  // Pregunta el tipo SOLO si el dueño activó esa opción (de normal, marca directo:
  // menos ajetreo para el camarero). El precio es el mismo para todos los tipos.
  if (state.config.preguntarTipo && prodV && (prodV.variantes || []).length && variante === undefined) { barraElegirVariante(prodId); return; }
  // Tope de stock: no dejar meter en el carrito más unidades de las que quedan (avisa en vez de callar).
  if (state.config.modulos && state.config.modulos.stock && prodV) {
    var carritoActual = state.carritos[state.perfilActivo] || [];
    var yaEnCarrito = 0;
    for (var c = 0; c < carritoActual.length; c++) if (carritoActual[c].prodId === prodId) yaEnCarrito += carritoActual[c].qty;
    if (yaEnCarrito + 1 > (prodV.stock || 0)) {
      toast((prodV.stock || 0) <= 0 ? (prodV.nombre + ': agotado') : ('Solo quedan ' + prodV.stock + ' de ' + prodV.nombre));
      return;
    }
  }
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    var prod = productoPorId(prodId);
    if (!prod) return;
    if (s.config.modulos && s.config.modulos.stock && prod.stock <= 0) return;

    var linea = null;
    for (var i = 0; i < carrito.length; i++) {
      if (carrito[i].prodId === prodId && (carrito[i].variante || '') === (variante || '')) { linea = carrito[i]; break; }
    }
    if (linea) {
      linea.qty++;
    } else {
      carrito.push({ prodId: prod.id, nombre: variante ? String(variante) : prod.nombre,
        precio: prod.precio, qty: 1, variante: variante || null });
    }
  });
}

function barraQuitar(prodId, variante) {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    for (var i = 0; i < carrito.length; i++) {
      if (carrito[i].prodId === prodId && (carrito[i].variante || '') === (variante || '')) {
        carrito[i].qty--;
        if (carrito[i].qty <= 0) carrito.splice(i, 1);
        break;
      }
    }
  });
}

function barraVaciar() {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    carrito.length = 0;
  });
}

function barraCobrar(metodo) {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    if (!carrito.length) return;

    var total = 0;
    var partes = [];
    var refrescosServir = 0;
    for (var i = 0; i < carrito.length; i++) {
      var l = carrito[i];
      total += l.precio * l.qty;
      var pr = productoPorId(l.prodId);
      var ri = pr ? (pr.refrescosIncluidos || 0) : 0;
      partes.push(l.qty + '× ' + l.nombre + (ri > 0 ? ' (incluye ' + (ri * l.qty) + ' refrescos)' : ''));
      refrescosServir += ri * l.qty;
      // Analítica: cada TIPO (Ron cola, Vodka limón…) cuenta por separado en la gráfica.
      registrarVenta(s, l.prodId + (l.variante ? ':' + _slugVariante(l.variante) : ''), l.nombre, l.qty, l.precio * l.qty);
    }
    // Los refrescos que van DENTRO de una botella también son consumo (a 0 €: ya van en su precio).
    if (refrescosServir > 0) registrarVenta(s, '_refresco_incl', 'Refresco incluido (botella/VIP)', refrescosServir, 0);

    if (s.config.modulos && s.config.modulos.stock) {
      for (var j = 0; j < carrito.length; j++) {
        var prod = productoPorId(carrito[j].prodId);
        if (prod) prod.stock = Math.max(0, prod.stock - carrito[j].qty);
      }
    }

    s.ingresosBarra = (s.ingresosBarra || 0) + total;
    s.recaudacionPorPerfil[perfil] = (s.recaudacionPorPerfil[perfil] || 0) + total;
    addLog('vendió ' + partes.join(', ') + ' (' + total + ' €' +
      (metodo === 'tarjeta' ? ', con tarjeta' : (metodo === 'bizum' ? ', por Bizum' : '')) + ')', 'cobro');

    carrito.length = 0;
    toast(refrescosServir > 0 ? 'Cobrado · sirve ' + refrescosServir + ' refrescos'
      : (metodo === 'tarjeta' ? 'Cobro con tarjeta registrado' : (metodo === 'bizum' ? 'Cobro por Bizum registrado' : 'Cobro registrado')));
  });
}

/* ---------- 0. Preparar la fiesta (checklist rápido + empezar limpio) ---------- */
/* Salta a una pestaña del panel y, si hace falta, abre su acordeón. */
function irAjuste(tab, accId) {
  _duenoTab = tab || 'ajustes';
  if (accId) _acc[accId] = true;
  renderDueno();
  try { window.scrollTo(0, 0); } catch (e) {}
}
/* Borra los datos de ejemplo/pruebas y deja la app limpia para la fiesta real,
   conservando configuración, productos, personal y contraseñas. */
function duenoVaciarDemo() {
  if (typeof confirm === 'function' && !confirm('¿Empezar limpio para la fiesta?\n\nSe BORRAN: lista de gente, cobros, caja, monederos, bonos, gastos y registro.\nSe CONSERVAN: tu configuración, productos, personal y contraseñas.\n\nEsto no se puede deshacer.')) return;
  mutate(function (s) {
    s.personas = [];
    Object.keys(s.carritos || {}).forEach(function (k) { s.carritos[k] = []; });
    Object.keys(s.recaudacionPorPerfil || {}).forEach(function (k) { s.recaudacionPorPerfil[k] = 0; });
    s.ingresosBarra = 0; s.ingresosMonederos = 0;
    s.monederos = []; s.bonos = []; s.gastos = [];
    s.ventasPorProducto = {};
    (s.rrpp || []).forEach(function (r) { r.vendidas = 0; });
    if (s.config.productos) s.config.productos.forEach(function (p) { p.stock = p.stockInicial; });
    s.log = [{ hora: nowHM(), actor: 'Sistema', texto: 'empezó limpio (datos de ejemplo borrados)', tipo: 'config' }];
    s.config.preparada = true;
  });
  toast('¡Listo! Empiezas limpio para tu fiesta');
}
function seccionPreparar() {
  var s = state, pend = [];
  if (accesoClave() === 'mhcollective' || adminClavePrincipal() === '1234') {

/* ---------- 1. KPIs ---------- */

function seccionKpis() {
  var s = state;
  var caja = cajaDesglose();
  var dentro = s.personas.filter(function (p) { return p.dentro; }).length;
  var totalPersonas = s.personas.length || 1;
  var pct = Math.round((dentro / totalPersonas) * 100);
  var pctAforo = s.config.maxAforo ? Math.min(100, Math.round((dentro / s.config.maxAforo) * 100)) : 0;
  var alerta = s.config.maxAforo && dentro >= 0.9 * s.config.maxAforo ? " alerta" : "";
  var html = '<section class="panel kpis">';
  html += '<div class="kpi kpi-aforo' + alerta + '" data-testid="kpi-aforo"><h3>Aforo</h3>';
  html += '<p class="kpi-big">' + esc(dentro) + ' / ' + esc(s.config.maxAforo) + ' dentro</p>';
  html += '<div class="barra"><div class="barra-fill" style="width:' + pctAforo + '%"></div></div></div>';
  html += '<div class="kpi" data-testid="kpi-caja"><h3>Caja total</h3><p class="kpi-big">' + esc(money(caja.total)) + '</p>';
  html += '<ul class="desglose">';
  html += '<li data-testid="caja-taquilla">Taquilla: ' + esc(money(caja.taquilla)) + '</li>';
  html += '<li data-testid="caja-vip">Mesas VIP: ' + esc(money(caja.vip)) + '</li>';
  html += '<li data-testid="caja-barra">Barra: ' + esc(money(caja.barra)) + '</li>';
  if (monederoActivo() || (caja.monederos || 0) > 0) {
    html += '<li data-testid="caja-monederos">Monederos (cargas): ' + esc(money(caja.monederos || 0)) + '</li>';
  }
  html += '<li data-testid="caja-rrpp">Comisiones RRPP: ' + esc(money(rrppComisionTotal())) + ' (a pagar a promotores)</li>';
  html += '</ul></div>';
  html += '<div class="kpi" data-testid="kpi-asistencia"><h3>Asistencia</h3><p class="kpi-big">' +
    esc(dentro) + ' registrados (' + esc(pct) + '%)</p></div>';
  if (s.config.modulos.gastos) {
    var gastosTotal = s.gastos.reduce(function (a, g) { return a + g.importe; }, 0);
    var beneficioNeto = caja.total - gastosTotal;
    var beneficioCaja = caja.taquilla + caja.vip + caja.barra + (caja.monederos || 0) - gastosTotal;
    html += '<div class="kpi" data-testid="kpi-beneficio"><h3>Beneficio neto</h3><p class="kpi-big">' + esc(money(beneficioNeto)) + '</p></div>';
    html += '<div class="kpi" data-testid="kpi-beneficio-caja"><h3>Beneficio en caja</h3><p class="kpi-big">' + esc(money(beneficioCaja)) + '</p></div>';
  }
  html += '</section>';
  return html;
}

function duenoProductoCampo(id, campo, valor) {
  mutateSilent(function (s) {
    var pr = (s.config.productos || []).find(function (x) { return x.id === id; });
    if (!pr) return;
    if (campo === 'nombre') pr.nombre = String(valor).trim() || pr.nombre;
    else if (campo === 'variantes') {
      pr.variantes = String(valor || '').split(',').map(function (v) { return v.trim(); }).filter(Boolean);
    }
    else pr[campo] = Math.max(0, Number(valor) || 0); // nunca negativo (precio/refrescos)
  });
}
function duenoBorrarProducto(id) {
  mutate(function (s) {
    var i = (s.config.productos || []).findIndex(function (x) { return x.id === id; });
    if (i >= 0) { addLog('quitó el producto ' + s.config.productos[i].nombre, 'config'); s.config.productos.splice(i, 1); }
  });
  toast('Producto quitado');
}
function duenoTogglePreguntarTipo() {
  mutate(function (s) {
    s.config.preguntarTipo = !s.config.preguntarTipo;
    addLog((s.config.preguntarTipo ? 'activó' : 'desactivó') + ' la pregunta del tipo de combinado en barra', 'config');
  });
  toast(state.config.preguntarTipo
    ? 'Activado: al marcar un producto con tipos, el camarero elegirá cuál'
    : 'Desactivado: el camarero marca directo, sin preguntas');
}
function duenoAnadirProducto() {
  mutate(function (s) {
    var nid = 'prod' + (s.config.productos.length + 1) + '_' + (s.config.productos.length);
    s.config.productos.push({ id: nid, nombre: 'Nuevo producto', precio: 5, stock: 100, stockInicial: 100, refrescosIncluidos: 0 });
    addLog('añadió un producto de barra', 'config');
  });
  toast('Producto añadido: ponle nombre y precio');
}

/* ===== LOGO DEL EVENTO (lo sube el dueño; se usa TAL CUAL en toda la app) ===== */
function cargarLogoArchivo(input) {
  var f = input.files && input.files[0];
  if (!f) return;
  toast('Preparando el logo…');
  comprimirImagen(f, 512, true, function (dataUrl) { // PNG: conserva la transparencia del logo
    if (!dataUrl) { toast('No se pudo leer la imagen'); return; }
    mutate(function (s) { s.config.logo = dataUrl; });
    aplicarLogo();
    toast('Logo guardado y aplicado');
  });
  input.value = '';
}
function quitarLogo() {
  mutate(function (s) { s.config.logo = null; });
  aplicarLogo();
  toast('Logo quitado');
}
/* Aplica el logo del dueño en cabecera, favicon (pestaña) e icono de instalación.
   Si no hay logo, restaura el emblema/favicon por defecto (guardados al arrancar). */
var _logoDefaults = null;
function aplicarLogo() {
  var box = document.getElementById('logoBox');
  var ic = document.querySelector('link[rel="icon"]');
  var ap = document.querySelector('link[rel="apple-touch-icon"]');
  if (_logoDefaults === null) {
    _logoDefaults = { box: box ? box.innerHTML : '', icon: ic ? ic.href : '', apple: ap ? ap.href : '' };
  }
  var logo = state.config && state.config.logo;
  if (box) box.innerHTML = logo
    ? '<img src="' + esc(logo) + '" alt="' + esc(state.config.eventName) + '" style="width:40px;height:40px;object-fit:contain;border-radius:8px">'
    : _logoDefaults.box;
  if (ic) ic.href = logo || _logoDefaults.icon;
  if (ap) ap.href = logo || _logoDefaults.apple;
  if (logo) {
    try {
      // El logo que sube el dueño (PNG hasta 512px) pasa a ser el icono de instalación,
      // declarado en 192 y 512 para que instale bien en cualquier móvil.
      var man = { name: state.config.eventName || 'MH Collective', short_name: 'MH', display: 'standalone',
        start_url: '.', scope: '.', orientation: 'portrait',
        background_color: '#000000', theme_color: '#0a0a0f',
        icons: [
          { src: logo, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: logo, sizes: '512x512', type: 'image/png', purpose: 'any' }
        ] };
      var blob = new Blob([JSON.stringify(man)], { type: 'application/json' });
      var ml = document.querySelector('link[rel="manifest"]'); if (ml) ml.href = URL.createObjectURL(blob);
    } catch (e) {}
  }
}

/* ===== FASES DE VENTA (como las fiestas grandes: Fase 1/2/3 con su precio y cupo) ===== */
function fasesLista() { return (state.config && state.config.fases) || []; }
function creadasFase(id) { return (state.personas || []).filter(function (p) { return p.faseId === id; }).length; }
function faseActiva() {
  // primera fase que aún no está llena
  var fs = fasesLista();
  for (var i = 0; i < fs.length; i++) { if (creadasFase(fs[i].id) < (fs[i].cantidad || 0)) return fs[i]; }
  return fs.length ? fs[fs.length - 1] : null;
}
function seccionFases() {
  var fs = fasesLista();
  var activa = faseActiva();
  var html = '<section class="panel" data-testid="seccion-fases"><h2>Fases de venta</h2>';
  html += '<p class="nota">Vende por fases como las fiestas grandes: cada fase su precio y cuántas entradas. Al crear una remesa eliges la fase y coge su precio solo. La fase activa es la primera que no esté llena.</p>';
  fs.forEach(function (f) {
    var hechas = creadasFase(f.id);
    var cant = f.cantidad || 0;
    var pct = cant ? Math.min(100, Math.round(hechas / cant * 100)) : 0;
    var llena = hechas >= cant && cant > 0;
    var esActiva = activa && activa.id === f.id && !llena;
    html += '<div class="fase-row" data-testid="fase-' + esc(f.id) + '">';
    html += '<div class="fase-cab"><input type="text" value="' + esc(f.nombre) + '" onchange="duenoFaseCampo(\'' + escJs(f.id) + '\',\'nombre\',this.value)">' +
      (esActiva ? '<span class="badge badge-dentro">ACTIVA</span>' : (llena ? '<span class="badge badge-pendiente">Agotada</span>' : '')) + '</div>';
    html += '<div class="contador"><label class="mini">Precio €<input type="number" min="0" value="' + esc(f.precio) + '" onchange="duenoFaseCampo(\'' + escJs(f.id) + '\',\'precio\',this.value)"></label>';
    html += '<label class="mini">Cantidad<input type="number" min="0" value="' + esc(f.cantidad) + '" onchange="duenoFaseCampo(\'' + escJs(f.id) + '\',\'cantidad\',this.value)"></label>';
    html += '<button type="button" class="btn-mini-borrar" onclick="duenoBorrarFase(\'' + escJs(f.id) + '\')">Borrar</button></div>';

function _igUrl(ig) {

function cargarEmailJS() {
  if (window.emailjs && window.emailjs.send) return Promise.resolve();
  return new Promise(function (res, rej) {
    var sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    sc.onload = res; sc.onerror = rej;
    document.head.appendChild(sc);
  });
}
var _enviandoEmails = false;
function enviarTodosEmail() {
  if (_enviandoEmails) return;
  if (!emailjsConfigurado()) { toast('Pega primero los 3 códigos del email'); return; }
  var c = state.config.emailjsCfg;
  var dest = (state.personas || []).filter(function (p) { return String(p.email || '').trim(); });
  if (!dest.length) { toast('Ninguna entrada tiene email. Ponlos con el ✏️.'); return; }
  // Límite opcional: enviar solo a los primeros N (para probar o no pasarse del cupo).
  var _lim = 0;
  try { var _le = document.getElementById('ej-limite'); _lim = _le ? parseInt(_le.value, 10) : 0; } catch (e) {}
  if (_lim && _lim > 0 && _lim < dest.length) dest = dest.slice(0, _lim);
  if (typeof confirm === 'function' && !confirm('¿Enviar su entrada por email a ' + dest.length + ' persona(s)?\nNo cierres la app hasta que acabe.')) return;
  _enviandoEmails = true;
  toast('Enviando a ' + dest.length + '… no cierres la app');
  cargarEmailJS().then(function () {
    try { window.emailjs.init({ publicKey: String(c.publicKey).trim() }); } catch (e) { try { window.emailjs.init(String(c.publicKey).trim()); } catch (e2) {} }
    var i = 0, okN = 0, errN = 0;
    function siguiente() {
      if (i >= dest.length) {
        _enviandoEmails = false;
        toast('📧 Enviados: ' + okN + (errN ? (' · fallaron ' + errN) : ''));
        return;
      }
      var p = dest[i++];
      var params = {
        to_email: String(p.email).trim(),
        to_name: (String(p.nombre || '') + ' ' + String(p.apellido || '')).trim(),
        evento: (state.config && state.config.eventName) || 'la fiesta',
        codigo: p.codigoReserva,
        link: enlaceEntrada(p, _entregaUnaVez())
      };
      window.emailjs.send(String(c.serviceId).trim(), String(c.templateId).trim(), params)
        .then(function () { okN++; }, function () { errN++; })
        .then(function () { setTimeout(siguiente, 700); }); // ritmo suave para no saturar
    }
    siguiente();
  }).catch(function () { _enviandoEmails = false; toast('No se pudo cargar el email (revisa la conexión)'); });
}

    else { // mesa VIP anticipada
