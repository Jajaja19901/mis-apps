/* De una línea pegada saca nombre, email y teléfono. Admite separadores coma/;/tab
   (y si no hay, espacios). Detecta el email por el @ y el teléfono por ser dígitos;
   lo que sobra es el nombre. Email y teléfono son opcionales. */
function _parseContacto(linea) {
  var campos = /[;,\t]/.test(linea) ? linea.split(/[;,\t]/) : linea.split(/\s+/);
  campos = campos.map(function (c) { return c.trim(); }).filter(Boolean);
  var email = '', tel = '', nombreToks = [];
  campos.forEach(function (c) {
    if (!email && c.indexOf('@') !== -1 && /^\S+@\S+\.\S+$/.test(c)) { email = c; return; }
    var soloTel = c.replace(/[\s()+.-]/g, '');
    if (!tel && /^\d{7,}$/.test(soloTel)) { tel = c; return; }
    nombreToks.push(c);
  });
  var partes = nombreToks.join(' ').trim().split(/\s+/).filter(Boolean);
  return { nombre: partes[0] || 'Invitado', apellido: partes.slice(1).join(' '), email: email, telefono: tel };
}

function duenoAnadirBulk() {
  var txt = (document.getElementById('lista-bulk').value || '').trim();

  var lineas = txt.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
  var n = 0, conEmail = 0;
  mutate(function (s) {
    lineas.forEach(function (linea, i) {
      var c = _parseContacto(linea);
      var p = { id: 'p' + Date.now() + '_' + i, nombre: c.nombre, apellido: c.apellido,
        email: c.email, telefono: c.telefono,
        codigoReserva: nuevoCodigoLista(s), mesa: null, pagado: false, importePagado: 0,
        dentro: false, horaEntrada: null, tipo: tipo === 'invitado' ? 'invitado' : 'taquilla' };
      if (tipo === 'taquilla-pagada') { p.pagado = true; p.importePagado = s.config.precioEntrada; }
      s.personas.push(p); n++; if (c.email) conEmail++;
    });
    addLog('añadió ' + n + ' personas a la lista (' + tipo + ')', 'alta');
  });
  toast(n + ' entradas creadas' + (conEmail ? ' · ' + conEmail + ' con email' : ''));
}

function crearRemesa() {
  var cantidad = parseInt(document.getElementById('remesa-cantidad').value, 10) || 5;
  var estado = document.getElementById('remesa-estado').value;
  var precio = Number(document.getElementById('remesa-precio').value) || 0;
  var copas = parseInt(document.getElementById('remesa-copas').value || '0', 10) || 0;
  var faseId = document.getElementById('remesa-fase') ? document.getElementById('remesa-fase').value : '';
  var fase = fasesLista().find(function (x) { return x.id === faseId; });
  var etiqueta = (document.getElementById('remesa-etiqueta').value || '').trim() || (fase ? fase.nombre : 'Entrada');
  // Cada remesa es SU PROPIA serie: si el nombre ya existe, se numera (evita que
  // dos remesas se mezclen y el PDF de una arrastre las entradas de la otra).
  var existentes = {};
  state.personas.forEach(function (x) { if (x.remesa) existentes[x.remesa] = true; });
  if (existentes[etiqueta]) {
    var n = 2;
    while (existentes[etiqueta + ' (' + n + ')']) n++;
    etiqueta = etiqueta + ' (' + n + ')';
  }
  var pagadas = estado === 'pagadas';
  // Limpia el formulario ANTES de mutate(): mutate() re-renderiza, y así el
  // re-render ya pinta el formulario vacío (si no, se quedaban precio/copas en
  // pantalla y se corría el riesgo de crear la remesa dos veces sin querer).
  // Los valores ya están leídos en variables locales arriba, así no se pierden.
  _remForm = { cantidad: null, estado: null, precio: null, copas: null, etiqueta: null, faseId: null };
  mutate(function (s) {
    var yaEnRemesas = s.personas.filter(function (x) { return x.remesa; }).length;
    for (var i = 0; i < cantidad; i++) {
      s.personas.push({
        id: 'p' + Date.now() + '_r' + i,
        nombre: etiqueta,
        apellido: '#' + String(yaEnRemesas + i + 1).padStart(3, '0'),
        tipo: 'taquilla',
        codigoReserva: nuevoCodigoLista(s),
        mesa: null,
        pagado: pagadas,
        importePagado: pagadas ? precio : 0,
        dentro: false, horaEntrada: null,
        precioVenta: precio,
        consumicionesIncluidas: copas,
        remesa: etiqueta,
        faseId: fase ? fase.id : null
      });
    }
    addLog('creó remesa "' + etiqueta + '"' + (fase ? ' (' + fase.nombre + ')' : '') + ': ' + cantidad + ' entradas ' +
      (pagadas ? 'ya pagadas' : 'para vender') + ' a ' + precio + ' € con ' + copas + ' copa(s)', 'alta');
  });
  toast(cantidad + ' entradas creadas' + (fase ? ' · ' + fase.nombre : ''));
}

/* ===== COPIA DE SEGURIDAD (archivo JSON con TODO el estado) ===== */
function exportarDatos() {
  try {
    var blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mh-collective-datos.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Datos guardados en archivo');
  } catch (e) { toast('No se pudo exportar'); }
}

function importarDatosTexto(txt) {
  var datos;
  try { datos = JSON.parse(txt); } catch (e) { toast('Archivo no válido'); return false; }
  if (!datos || !Array.isArray(datos.personas)) { toast('Archivo no válido'); return false; }
  state = datos;
  if (typeof migrar === 'function') migrar(state);
  state.version = (state.version || 0) + 1;
  addLog('cargó una copia de datos (' + state.personas.length + ' personas)', 'config');
  save();
  renderApp();
  toast('Datos cargados: ' + state.personas.length + ' personas');
  return true;
}

function importarArchivo(input) {
  var f = input.files && input.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function () { importarDatosTexto(String(r.result)); };
  r.readAsText(f);
  input.value = '';
}

      addLog("cambió Aforo: " + c.maxAforo + " → " + aforo, "config");

    }
    if (precioEntrada !== c.precioEntrada) {
      addLog("cambió Precio entrada: " + c.precioEntrada + " → " + precioEntrada, "config");
      c.precioEntrada = precioEntrada;
    }
    if (precioVip !== c.precioMesaVip) {
      addLog("cambió Precio mesa VIP: " + c.precioMesaVip + " → " + precioVip, "config");
      c.precioMesaVip = precioVip;
    }
    var ci = Number(document.getElementById("cfg-cons-invitado").value) || 0;
    var ct = Number(document.getElementById("cfg-cons-taquilla").value) || 0;
    if (!c.consumiciones) c.consumiciones = { invitado: 0, taquilla: 1, vip: 2 };
    if (ci !== c.consumiciones.invitado || ct !== c.consumiciones.taquilla) {
      addLog("cambió Consumiciones incluidas (inv/taq): " +
        c.consumiciones.invitado + "/" + c.consumiciones.taquilla + " → " + ci + "/" + ct, "config");
      c.consumiciones.invitado = ci; c.consumiciones.taquilla = ct;
    }
    var vb = Number(document.getElementById("cfg-vip-botellas").value) || 0;
    var vr = Number(document.getElementById("cfg-vip-refrescos").value) || 0;
    if (!c.vipPack) c.vipPack = { botellas: 1, refrescos: 4 };
    if (vb !== c.vipPack.botellas || vr !== c.vipPack.refrescos) {
      addLog("cambió Pack VIP: " + c.vipPack.botellas + " botella(s) + " + c.vipPack.refrescos +
        " refrescos → " + vb + " + " + vr, "config");
      c.vipPack = { botellas: vb, refrescos: vr };
    }
  });
  toast("Configuración guardada");
  return false;
}

function duenoAnadirAdmin(ev) {

  mutate(function (s) {

function duenoBorrarAdmin(id) {

  mutate(function (s) {
    var i = (s.config.adminsExtra || []).findIndex(function (x) { return x.id === id; });
    if (i >= 0) { addLog('quitó al administrador ' + s.config.adminsExtra[i].nombre, 'config'); s.config.adminsExtra.splice(i, 1); }
  });

}

/* ---------- 5. RRPP ---------- */

/* Entradas que el dueño ha repartido a un RRPP (por su slug). */
function rrppEntradasDe(slug) { return (state.personas || []).filter(function (p) { return p.rrppSlug === slug; }); }
/* "Vendidas" = de las repartidas, las que ya están pagadas (el cliente pagó). */
function rrppVendidasDe(slug) { return rrppEntradasDe(slug).filter(function (p) { return (p.importePagado || 0) > 0 || p.pagado; }).length; }
function rrppComisionTotal() {
  return (state.rrpp || []).reduce(function (a, r) { return a + rrppVendidasDe(r.slug) * (r.comision || 0); }, 0);
}
/* Rango de números de las entradas de remesa creadas (para repartir "de la X a la Y"). */
function rangoEntradasRemesa() {
  var nums = (state.personas || []).filter(function (p) { return p.remesa; }).map(function (p) {
    var n = parseInt(String(p.apellido || '').replace(/\D/g, ''), 10); return isNaN(n) ? null : n;
  }).filter(function (n) { return n != null; });
  if (!nums.length) return null;
  return { min: Math.min.apply(null, nums), max: Math.max.apply(null, nums) };
}

function seccionRrpp() {
  var rrpp = state.rrpp || [];
  var html = '<section class="panel" data-testid="rrpp"><h2>RRPP / Promotores</h2>';
  html += '<p class="nota">Añade a tus promotores y repárteles las entradas que les das a vender. Cada uno ve cuántas lleva y cuántas ha vendido (ya pagadas). Empiezas sin ninguno: mete solo los tuyos.</p>';
  // Alta de promotor
  html += '<form data-testid="rrpp-form" onsubmit="return duenoAnadirRrpp(event)"><div class="contador">';
  html += '<input type="text" id="rrpp-nuevo" placeholder="Nombre del promotor" style="flex:1" required>';
  html += '<button type="submit" class="btn-primary" data-testid="btn-add-rrpp" style="flex:0 0 auto">➕ Añadir</button></div></form>';
  if (!rrpp.length) {
    html += '<p class="lista-vacia">Aún no has añadido promotores. Escribe un nombre arriba y pulsa "Añadir".</p></section>';
    return html;
  }
  // Repartir entradas por rango (de la X a la Y)
  var rango = rangoEntradasRemesa();
  html += '<h3>Repartir entradas</h3>';
  if (rango) {
    html += '<p class="nota">Tienes entradas de remesa numeradas del <b>#' + rango.min + '</b> al <b>#' + rango.max + '</b>. Elige el promotor y de qué número a qué número le das.</p>';
    html += '<div class="contador"><label>Promotor <select id="rrpp-asig-slug">';
    rrpp.forEach(function (r) { html += '<option value="' + esc(r.slug) + '">' + esc(r.nombre) + '</option>'; });
    html += '</select></label></div>';
    html += '<div class="contador"><label>Desde nº <input type="number" id="rrpp-asig-desde" min="' + rango.min + '" max="' + rango.max + '" value="' + rango.min + '" style="width:90px"></label>';
    html += '<label>Hasta nº <input type="number" id="rrpp-asig-hasta" min="' + rango.min + '" max="' + rango.max + '" value="' + rango.max + '" style="width:90px"></label>';
    html += '<button type="button" class="btn-primary" data-testid="btn-asignar-rrpp" onclick="duenoAsignarRrpp()">Repartir</button></div>';
  } else {
    html += '<p class="nota">Aún no hay entradas de remesa. Crea una en <b>Entradas → Entradas generales (sin nombre)</b> y luego vuelve aquí a repartirlas.</p>';
  }
  // Tabla de promotores (asignadas/vendidas/quedan derivadas de las entradas reales)
  html += '<h3>Tus promotores</h3>';
  html += '<div style="overflow-x:auto"><table class="tabla-rrpp"><thead><tr><th>RRPP</th><th>Repartidas</th><th>Vendidas</th><th>Quedan</th><th>Precio</th><th>Comisión</th><th>A pagar</th><th></th></tr></thead><tbody>';
  var totAsig = 0, totVend = 0, totPagar = 0;
  rrpp.forEach(function (r) {
    var asignadas = rrppEntradasDe(r.slug).length;
    var vendidas = rrppVendidasDe(r.slug);
    var pagar = vendidas * (r.comision || 0);
    totAsig += asignadas; totVend += vendidas; totPagar += pagar;
    html += '<tr data-testid="rrpp-' + esc(r.slug) + '">';
    html += '<td>RRPP ' + esc(r.nombre) + '</td>';
    html += '<td>' + asignadas + (asignadas ? ' <button type="button" data-testid="rrpp-ver-' + esc(r.slug) + '" onclick="rrppVerEntradas(\'' + escJs(r.slug) + '\')">ver</button>' : '') + '</td>';
    html += '<td data-testid="rrpp-vendidas-' + esc(r.slug) + '">' + vendidas + '</td>';
    html += '<td>' + (asignadas - vendidas) + '</td>';
    html += '<td><input type="number" id="rrpp-precio-' + esc(r.slug) + '" value="' + esc(r.precio) +
      '" min="0" onchange="duenoRrppCampo(\'' + r.slug + '\',\'precio\',this.value)"></td>';
    html += '<td><input type="number" id="rrpp-comision-' + esc(r.slug) + '" value="' + esc(r.comision) +
      '" min="0" onchange="duenoRrppCampo(\'' + r.slug + '\',\'comision\',this.value)"></td>';
    html += '<td>' + esc(money(pagar)) + '</td>';
    html += '<td><button type="button" class="btn-mini-borrar" data-testid="rrpp-borrar-' + esc(r.slug) + '" onclick="duenoBorrarRrpp(\'' + escJs(r.slug) + '\')">✕</button></td>';
    html += '</tr>';
  });
  html += '</tbody><tfoot><tr data-testid="rrpp-totales"><td>Total</td><td>' + totAsig + '</td><td>' + totVend + '</td><td>' + (totAsig - totVend) + '</td><td></td><td></td><td>' + esc(money(totPagar)) + '</td><td></td></tr></tfoot>';
  html += '</table></div>';
  html += '<p class="nota">"Vendidas" = repartidas que ya están pagadas. "A pagar" = comisión que le debes a cada promotor. El dinero de esas entradas ya está contado en Taquilla.</p>';
  html += '</section>';
  return html;
}
/* Reparte a un RRPP las entradas de remesa cuyo número esté entre desde y hasta. */
function duenoAsignarRrpp() {
  var selSlug = document.getElementById('rrpp-asig-slug');
  var slug = selSlug ? selSlug.value : '';
  var desde = parseInt((document.getElementById('rrpp-asig-desde') || {}).value, 10);
  var hasta = parseInt((document.getElementById('rrpp-asig-hasta') || {}).value, 10);
  if (!slug || isNaN(desde) || isNaN(hasta)) { toast('Revisa el promotor y los números'); return; }
  if (desde > hasta) { var t = desde; desde = hasta; hasta = t; }
  var r0 = (state.rrpp || []).find(function (x) { return x.slug === slug; });
  var n = 0;
  mutate(function (s) {
    (s.personas || []).forEach(function (p) {
      if (!p.remesa) return;
      var num = parseInt(String(p.apellido || '').replace(/\D/g, ''), 10);
      if (!isNaN(num) && num >= desde && num <= hasta) { p.rrppSlug = slug; n++; }
    });
    addLog('repartió entradas #' + desde + '–#' + hasta + ' a RRPP ' + (r0 ? r0.nombre : slug) + ' (' + n + ')', 'rrpp');
  });
  toast(n ? (n + ' entradas repartidas a ' + (r0 ? r0.nombre : slug)) : 'No había entradas en ese rango');
}
/* Salta a la lista de entradas filtrada por ese RRPP. */
function rrppVerEntradas(slug) {
  _entFiltro = 'rrpp:' + slug;
  _entBusca = '';
  _duenoTab = 'entradas';
  _acc.creadas = true;

}

/* Slug único a partir del nombre (para los data-testid y para localizar al promotor). */
function rrppSlug(nombre) {
  var base = String(nombre).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'rrpp';
  var slug = base, n = 2, usados = {};
  (state.rrpp || []).forEach(function (r) { usados[r.slug] = true; });
  while (usados[slug]) { slug = base + '-' + n; n++; }
  return slug;
}
function duenoAnadirRrpp(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var inp = document.getElementById('rrpp-nuevo');
  var nombre = (inp && inp.value || '').trim();
  if (!nombre) { toast('Escribe un nombre'); return false; }
  var slug = rrppSlug(nombre);
  mutate(function (s) {
    if (!Array.isArray(s.rrpp)) s.rrpp = [];
    s.rrpp.push({ id: 'rrpp-' + slug, slug: slug, nombre: nombre, vendidas: 0, precio: s.config.precioEntrada || 0, comision: 0 });
    addLog('añadió al RRPP ' + nombre, 'rrpp');
  });
  toast('Promotor añadido');
  return false;
}
function duenoBorrarRrpp(slug) {
  mutate(function (s) {
    var i = (s.rrpp || []).findIndex(function (x) { return x.slug === slug; });
    if (i >= 0) { addLog('quitó al RRPP ' + s.rrpp[i].nombre, 'rrpp'); s.rrpp.splice(i, 1); }
  });
  toast('Promotor quitado');
}

function duenoRrppCampo(slug, campo, valor) {
  var num = Math.max(0, Number(valor) || 0); // precio/comisión nunca negativos
  mutateSilent(function (s) {
    var r = s.rrpp.find(function (x) { return x.slug === slug; });
    if (!r || num === r[campo]) return;
    var etiqueta = campo === "precio" ? "Precio" : "Comisión";
    addLog("cambió " + etiqueta + " RRPP " + r.nombre + ": " + r[campo] + " → " + num, "rrpp");
    r[campo] = num;
  });
}

function duenoBonoCfg() {
  var on = !!document.getElementById('bono-venta-camareros').checked;
  var copas = parseInt(document.getElementById('bono-cfg-copas').value || '5', 10) || 5;
  var precio = Number(document.getElementById('bono-cfg-precio').value) || 0;
  mutateSilent(function (s) {
    var bc = s.config.bonoCfg || {};
    if (bc.ventaCamareros !== on) {
      addLog((on ? 'activó' : 'desactivó') + ' la venta de bonos por camareros', 'config');
    }
    if (bc.copas !== copas || bc.precio !== precio) {
      addLog('fijó el bono de barra en ' + copas + ' copas por ' + precio + ' €', 'config');
    }
    s.config.bonoCfg = { ventaCamareros: on, copas: copas, precio: precio };
  });
}

/* Venta en barra: crea el bono con las condiciones FIJADAS POR EL DUEÑO y cobra su precio. */
function venderBonoBarra() {
  var actor = state.perfilActivo;
  // 1) ¿Hay vales que preparó el dueño (con precio, sin vender, sin anular y con copas)? Vende el primero.
  var disponibles = (state.bonos || []).filter(function (b) {
    return !b.vendido && !b.anulado && (Number(b.precio) || 0) > 0 && ((b.copas || 0) - (b.usadas || 0)) > 0;
  });
  if (disponibles.length) {
    var elegido = disponibles[0];
    mutate(function (s) {
      var q = null;
      for (var i = 0; i < (s.bonos || []).length; i++) if (s.bonos[i].id === elegido.id) q = s.bonos[i];
      if (!q || q.vendido) return;
      q.vendido = true;
      var p = Number(q.precio) || 0;
      s.ingresosBarra = (s.ingresosBarra || 0) + p;
      s.recaudacionPorPerfil[actor] = (s.recaudacionPorPerfil[actor] || 0) + p;
      registrarVenta(s, '_bono', 'Bono de ' + q.copas + ' copas', 1, p);
      addLog('vendió bono ' + q.codigo + ' de ' + q.copas + ' copas (' + p + ' €)', 'cobro');
    });
    toast('Bono vendido · cobra ' + money(elegido.precio));
    abreQRBono(elegido.id, true); // modal de VENTA: precio + código + QR para el cliente
    return;
  }
  // 2) No queda ninguno del lote → crea uno al vuelo con la config (para no bloquear al camarero).
  var bc = state.config.bonoCfg || {};
  var copas = bc.copas || 5;
  var precio = Number(bc.precio) || 0;
  var nuevoId = 'b' + Date.now();
  var codigo = nuevoCodigoBono(state, copas); // fijo fuera del mutate (no se regenera al sincronizar)
  mutate(function (s) {
    if (!s.bonos) s.bonos = [];
    s.bonos.push({ id: nuevoId, codigo: codigo, copas: copas, usadas: 0,
      etiqueta: 'Vendido en barra', hora: nowHM(), anulado: false, precio: precio, vendido: true });
    s.ingresosBarra = (s.ingresosBarra || 0) + precio;
    s.recaudacionPorPerfil[actor] = (s.recaudacionPorPerfil[actor] || 0) + precio;
    registrarVenta(s, '_bono', 'Bono de ' + copas + ' copas', 1, precio);
    addLog('vendió bono ' + codigo + ' de ' + copas + ' copas (' + precio + ' €)', 'cobro');
  });
  toast(precio > 0 ? ('Bono vendido · cobra ' + money(precio)) : 'Bono vendido');
  abreQRBono(nuevoId, true);
}

function crearBono(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var cantidad = parseInt((document.getElementById('bono-cantidad') || {}).value || '1', 10) || 1;
  cantidad = Math.max(1, Math.min(200, cantidad));
  var copas = parseInt(document.getElementById('bono-copas').value || '0', 10);
  var precio = Number((document.getElementById('bono-precio') || {}).value) || 0;
  if (precio < 0) precio = 0;
  var etiqueta = (document.getElementById('bono-etiqueta').value || '').trim();
  if (!copas || copas < 1) { toast('Pon las copas por bono'); return false; }
  var regalo = precio === 0;
  // Genero los códigos FUERA del mutate (así no se regeneran al sincronizar), contando los
  // del propio lote para que no se repitan entre sí.
  var nuevos = [];
  for (var i = 0; i < cantidad; i++) {
    var fake = Object.assign({}, state, { bonos: (state.bonos || []).concat(nuevos) });
    nuevos.push({ id: 'b' + Date.now() + '_' + i, codigo: nuevoCodigoBono(fake, copas), copas: copas,
      usadas: 0, etiqueta: etiqueta, hora: nowHM(), anulado: false, precio: precio,
      vendido: false, regalo: regalo });
  }
  mutate(function (s) {
    if (!s.bonos) s.bonos = [];
    nuevos.forEach(function (b) { s.bonos.push(b); });
    addLog('creó ' + cantidad + ' bono' + (cantidad === 1 ? '' : 's') + ' de ' + copas + ' copas' +
      (regalo ? ' (regalo)' : ' a ' + precio + ' €') + (etiqueta ? ' · ' + etiqueta : ''), 'config');
  });
  toast(cantidad === 1 ? (regalo ? 'Bono de regalo creado' : 'Bono creado') : (cantidad + (regalo ? ' bonos de regalo creados' : ' bonos creados')));
  return false;
}

function anularBono(id) {
  mutate(function (s) {
    var b = null;
    for (var i = 0; i < (s.bonos || []).length; i++) if (s.bonos[i].id === id) b = s.bonos[i];
    if (!b || b.anulado) return;
    b.anulado = true;
    b.usadas = b.copas; // sin copas restantes
    addLog('anuló el bono ' + b.codigo, 'config');
  });
  toast('Bono anulado');
}

function bonoPorCodigo(cod) {
  var buscado = _normalizaCod(cod);
  var lista = state.bonos || [];
  for (var i = 0; i < lista.length; i++) {
    if (_normalizaCod(lista[i].codigo) === buscado) return lista[i];
  }
  return null;
}

function abreQRBono(id, venta) {
  var b = null;
  for (var i = 0; i < (state.bonos || []).length; i++) if (state.bonos[i].id === id) b = state.bonos[i];

      ' · <b>' + esc(b.copas) + '</b> copas</p>';
  } else {
    html += '<h2>Bono de copas</h2>';

      ' · <b>' + esc(b.copas) + '</b> copas' + (precio > 0 ? ' · ' + esc(money(precio)) : '') + ' · quedan ' + rest + '</p>';
  }
  // EL CÓDIGO es lo importante: grande y claro para dictarlo o que le hagan una foto.
  html += '<p class="bono-codigo-big" data-testid="bono-codigo">' + esc(b.codigo) + '</p>';
  html += '<canvas id="qrCanvasBono" width="200" height="200"></canvas>';
  html += '<p class="nota" style="text-align:center">' + (venta
    ? 'Dile este código al cliente (o que le haga una foto). El código ya lleva las <b>' + esc(b.copas) + ' copas</b>: cuando pida una copa, dice el código y el camarero lo mete en la barra.'
    : 'El cliente pide su copa diciendo este código; el camarero lo escribe en la barra.') + '</p>';
  html += '<div class="modal-botones"><button type="button" onclick="closeModal()">Cerrar</button></div></div>';
  showModal(html);
  var canvas = document.getElementById('qrCanvasBono');
  if (canvas && typeof drawQR === 'function') {
    try { drawQR(canvas, b.codigo, 200); } catch (e) { /* el código en texto sigue visible */ }
  }
}

/* ===== MONEDERO MH: acciones y pantallas ===== */

/* Carga un monedero NUEVO. El dinero entra en caja AHORA (efectivo/Bizum en mano):
   cuenta en ingresosMonederos y en la recaudación de quien cobra. */
function crearMonedero() {
  var inp = document.getElementById('monedero-importe');
  var importe = Math.round(Number(inp && inp.value) || 0);
  if (importe <= 0) { toast('Pon el importe que te ha dado el cliente'); return; }
  var nuevoId = 'm' + Date.now();
  // El código y el actor se fijan AQUÍ (fuera del mutate): si la acción se re-aplica
  // al sincronizar, usa el MISMO código que ya fotografió el cliente (no se regenera).
  var codigo = nuevoCodigoMonedero(state);
  var actor = actorActual();
  mutate(function (s) {
    if (!s.monederos) s.monederos = [];
    s.monederos.push({ id: nuevoId, codigo: codigo, saldo: importe, hora: nowHM(),
      movs: [{ h: nowHM(), t: 'carga', imp: importe, por: etiquetaPerfil(actor) }] });
    s.ingresosMonederos = (s.ingresosMonederos || 0) + importe;
    s.recaudacionPorPerfil[actor] = (s.recaudacionPorPerfil[actor] || 0) + importe;
    addLog('cargó monedero ' + codigo + ' con ' + importe + ' €', 'cobro');
  });
  toast('Monedero cargado con ' + money(importe));
  abreQRMonedero(nuevoId, true);
}

/* Recarga un monedero existente (mismo tratamiento de caja que la carga). */
function recargarMonedero(id, importe) {
  importe = Math.round(Number(importe) || 0);
  var m0 = monederoPorId(id);
  if (!m0 || importe <= 0) { toast('Pon el importe a recargar'); return false; }
  mutate(function (s) {
    var m = null;
    for (var i = 0; i < (s.monederos || []).length; i++) if (s.monederos[i].id === id) m = s.monederos[i];
    if (!m) return;
    m.saldo = (m.saldo || 0) + importe;
    m.movs.push({ h: nowHM(), t: 'recarga', imp: importe, por: etiquetaPerfil(actorActual()) });
    s.ingresosMonederos = (s.ingresosMonederos || 0) + importe;
    s.recaudacionPorPerfil[actorActual()] = (s.recaudacionPorPerfil[actorActual()] || 0) + importe;
    addLog('recargó ' + importe + ' € en el monedero ' + m.codigo + ' (saldo ' + m.saldo + ' €)', 'cobro');
  });
  toast('Recargado · saldo ' + money((monederoPorId(id) || {}).saldo || 0));
  return true;
}

/* Cobra el CARRITO de la barra del saldo del monedero. OJO contabilidad: ese dinero
   ya entró en caja al cargar el monedero → aquí NO se suma a ingresos de barra ni a
   recaudación (se contaría dos veces). Sí baja stock y sí queda todo en el registro. */
function monederoCobrarCarrito(id) {
  var m = monederoPorId(id);
  if (!m) return;
  var carrito = state.carritos[state.perfilActivo] || [];
  if (!carrito.length) { toast('El carrito está vacío'); return; }
  var total = 0;
  for (var i = 0; i < carrito.length; i++) total += carrito[i].precio * carrito[i].qty;
  if ((m.saldo || 0) < total) { toast('Saldo insuficiente: tiene ' + money(m.saldo) + ' y son ' + money(total)); return; }
  mutate(function (s) {
    var q = null;
    for (var j = 0; j < (s.monederos || []).length; j++) if (s.monederos[j].id === id) q = s.monederos[j];
    var cart = s.carritos[s.perfilActivo] || [];
    if (!q || !cart.length) return;
    var tot = 0, partes = [], refrescosServir = 0;
    for (var k = 0; k < cart.length; k++) {
      var l = cart[k];
      tot += l.precio * l.qty;
      var pr = productoPorId(l.prodId);
      var ri = pr ? (pr.refrescosIncluidos || 0) : 0;
      partes.push(l.qty + '× ' + l.nombre);
      refrescosServir += ri * l.qty;
    }
    if ((q.saldo || 0) < tot) return; // re-comprobación dentro de la mutación (por si llegó otro gasto)
    // El cobro va a ocurrir seguro: AHORA sí se apunta el consumo (nunca antes de la comprobación).
    for (var k2 = 0; k2 < cart.length; k2++) {
      var lv = cart[k2];
      registrarVenta(s, lv.prodId + (lv.variante ? ':' + _slugVariante(lv.variante) : ''), lv.nombre, lv.qty, lv.precio * lv.qty);
    }
    if (refrescosServir > 0) registrarVenta(s, '_refresco_incl', 'Refresco incluido (botella/VIP)', refrescosServir, 0);
    if (s.config.modulos && s.config.modulos.stock) {
      for (var x = 0; x < cart.length; x++) {
        var prod = productoPorId(cart[x].prodId);
        if (prod) prod.stock = Math.max(0, prod.stock - cart[x].qty);
      }
    }
    q.saldo -= tot;
    q.movs.push({ h: nowHM(), t: 'gasto', imp: tot, det: partes.join(', '), por: etiquetaPerfil(actorActual()) });
    addLog('cobró del monedero ' + q.codigo + ': ' + partes.join(', ') + ' (' + tot + ' €, saldo ' + q.saldo + ' €)', 'cobro');
    cart.length = 0;
  });
  toast('Cobrado del monedero · saldo ' + money((monederoPorId(id) || {}).saldo || 0));
  consBuscar(); // refresca la ficha con el saldo nuevo
}

/* ---------- Analítica: qué consume la gente (gráfica de barras, sin librerías) ---------- */
function seccionConsumo() {
  var vp = state.ventasPorProducto || {};
  var items = Object.keys(vp).map(function (k) {
    var v = vp[k] || {};
    return { id: k, nombre: v.nombre || k, uds: v.uds || 0, imp: v.imp || 0 };
  }).filter(function (i) { return i.uds > 0; })
    .sort(function (a, b) { return b.imp - a.imp || b.uds - a.uds; });
  var html = '<section class="panel" data-testid="seccion-consumo"><h2>📊 Qué se consume</h2>';
  if (!items.length) {
    html += '<p class="lista-vacia">Aún no hay ventas de barra. En cuanto se venda algo verás aquí qué se pide más y qué menos.</p></section>';
    return html;
  }
  var maxImp = items[0].imp || 1;
  var totUds = 0, totImp = 0;
  items.forEach(function (i) { totUds += i.uds; totImp += i.imp; });
  items.forEach(function (i) {
    var pct = Math.max(4, Math.round((i.imp / maxImp) * 100));
    html += '<div class="consumo-item" data-testid="consumo-' + esc(i.id) + '">' +
      '<div class="consumo-cab"><span>' + esc(i.nombre) + '</span><b>' + (i.uds === 1 ? '1 ud' : i.uds + ' uds') + ' · ' + esc(money(i.imp)) + '</b></div>' +
      '<div class="barra"><div class="barra-fill" style="width:' + pct + '%"></div></div></div>';
  });
  html += '<p class="nota">Ordenado por dinero que mueve (la barra dorada es lo que más). Total: <b>' + totUds + ' uds · ' +
    esc(money(totImp)) + '</b>. Cuenta todo: efectivo, tarjeta, Bizum y monedero.</p>';
  html += '</section>';
  return html;
}

  var categoria = document.getElementById("gasto-categoria").value;
  if (!concepto || importe <= 0) { toast("Falta concepto o importe"); return false; }
  mutate(function (s) {
    s.gastos.push({ id: "g" + Date.now(), concepto: concepto, importe: importe, categoria: categoria, hora: nowHM() });
    addLog("registró gasto " + concepto + " (" + importe + " €)", "gasto");

function duenoBorrarGasto(id) {

    s.gastos.splice(idx, 1);

function csvEscape(v) {
  var s = String(v === null || v === undefined ? "" : v);
  // Anti "fórmula CSV": si empieza por = + - @ (o tab/CR), Excel/LibreOffice lo
  // ejecutarían como fórmula. Se antepone un apóstrofo para que sea texto plano.
  if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  if (/[",\n;]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function construirCsv(d) {
  var L = [];
  L.push("Informe: " + d.nombre, "Fecha;" + d.fecha, "");
  L.push("RESUMEN FINANCIERO");
  L.push("Taquilla;" + d.totales.taquilla, "Mesas VIP;" + d.totales.vip, "Barra;" + d.totales.barra,
    "Monederos (cargas);" + (d.totales.monederos || 0),
    "RRPP (pendiente de entrega);" + d.totales.netoRRPP, "Total;" + d.totales.total,
    "Gastos;" + d.gastosTotal, "Beneficio neto;" + d.beneficioNeto, "");
  if (d.monederos) {
    L.push("MONEDEROS (CASHLESS)");
    L.push("Cargado;" + d.monederos.cargado, "Gastado en barra;" + d.monederos.gastado,
      "Saldo vivo (sin gastar);" + d.monederos.vivo, "");
  }
  if (d.ventasPorProducto && Object.keys(d.ventasPorProducto).length) {
    L.push("CONSUMO POR PRODUCTO", "Producto;Unidades;Importe");
    Object.keys(d.ventasPorProducto).map(function (k) { return d.ventasPorProducto[k]; })
      .sort(function (a, b) { return (b.imp || 0) - (a.imp || 0); })
      .forEach(function (v) { L.push(csvEscape(v.nombre) + ";" + (v.uds || 0) + ";" + (v.imp || 0)); });
    L.push("");
  }
  L.push("RECAUDACIÓN POR TERMINAL");
  Object.keys(d.recaudacionPorPerfil).forEach(function (id) {
    L.push(csvEscape(etiquetaPerfil(id)) + ";" + d.recaudacionPorPerfil[id]);
  });
  L.push("", "LIQUIDACIÓN RRPP", "Nombre;Vendidas;Precio;Comisión;Total;Neto");
  d.rrpp.forEach(function (r) {
    L.push(csvEscape(r.nombre) + ";" + r.vendidas + ";" + r.precio + ";" + r.comision + ";" +
      (r.vendidas * r.precio) + ";" + (r.vendidas * r.precio - r.vendidas * r.comision));
  });
  L.push("", "GASTOS", "Concepto;Importe;Categoría;Hora");
  d.gastos.forEach(function (g) { L.push(csvEscape(g.concepto) + ";" + g.importe + ";" + csvEscape(g.categoria) + ";" + g.hora); });
  L.push("", "ASISTENTES");
  if (d.personas) {
    L.push("Nombre;Apellido;Tipo;Dentro;Hora entrada");
    d.personas.forEach(function (p) {
      L.push(csvEscape(p.nombre) + ";" + csvEscape(p.apellido) + ";" + csvEscape(p.tipo) + ";" +
        (p.dentro ? "Sí" : "No") + ";" + csvEscape(p.horaEntrada || ""));
    });
  } else {
    L.push("Asistentes registrados;" + d.asistentes);
  }
  L.push("", "LOG");
  d.log.forEach(function (e) { L.push(csvEscape(e.hora) + ";" + csvEscape(e.actor) + ";" + csvEscape(e.texto)); });
  return L.join("\n");
}

function descargarCsv(nombreArchivo, contenido) {
  var blob = new Blob([contenido], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = nombreArchivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function duenoDescargarCsv() {
  var s = state;
  var caja = cajaDesglose();
  var gastosTotal = s.gastos.reduce(function (a, g) { return a + g.importe; }, 0);
  var datos = {
    nombre: s.config.eventName, fecha: nowHM(), totales: caja, gastosTotal: gastosTotal,
    beneficioNeto: caja.total - gastosTotal, recaudacionPorPerfil: s.recaudacionPorPerfil,
    // Cada RRPP con sus "vendidas" reales (calculadas de las personas), no el campo muerto r.vendidas.
    rrpp: (s.rrpp || []).map(function (r) { return Object.assign({}, r, { vendidas: rrppVendidasDe(r.slug) }); }),
    monederos: monederoTotales(),
    ventasPorProducto: s.ventasPorProducto || {},
    gastos: s.gastos, personas: s.personas, log: s.log
  };
  descargarCsv("informe-" + s.config.eventName.replace(/\s+/g, "_") + ".csv", construirCsv(datos));
}

function duenoDescargarCsvHistorico(id) {
  var h = state.historico.find(function (x) { return x.id === id; });
  if (!h) return;
  var datos = {
    nombre: h.nombre, fecha: h.fecha, totales: h.totales,
    gastosTotal: h.gastos.reduce(function (a, g) { return a + g.importe; }, 0),
    beneficioNeto: h.beneficioNeto, recaudacionPorPerfil: h.recaudacionPorPerfil,
    rrpp: h.rrpp, monederos: h.monederos, ventasPorProducto: h.ventasPorProducto,
    gastos: h.gastos, asistentes: h.asistentes, log: h.log
  };
  descargarCsv("informe-" + h.nombre.replace(/\s+/g, "_") + "-" + h.id + ".csv", construirCsv(datos));
}

/* ---------- 10. Log ---------- */

function seccionLog() {
  var html = '<section class="panel" data-testid="log"><h2>Registro de actividad</h2><p class="nota">Registro inmutable</p><ul class="log-lista">';
  state.log.forEach(function (e) {
    html += '<li>' + esc(e.hora) + ' · ' + esc(e.actor) + ' ' + esc(e.texto) + '</li>';
  });
  html += '</ul></section>';
  return html;
}
