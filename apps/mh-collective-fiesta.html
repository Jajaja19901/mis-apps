<style>
:root{--bg:#0a0a0f;--surface:#1a1a23;--border:#333340;--text:#ffffff;--text-dim:#a0a0b0;--neon-verde:#00d48a;--vip-morado:#b026ff;--ambar:#ffb600;--rojo:#ff3333;--radius-card:8px;--radius-pill:20px;--radius-btn:6px}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
img,svg{max-width:100%;display:block}
button,input,select,textarea{font-family:inherit;font-size:1rem;color:inherit}
a{color:var(--neon-verde)}
:focus-visible{outline:3px solid var(--neon-verde);outline-offset:2px}
h1,h2,h3{margin:0 0 .5rem;font-weight:600}
h1{font-size:clamp(1.5rem,5vw,2rem)}
p{margin:0 0 .75rem;color:var(--text-dim)}
/* Topbar */
#topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;flex-wrap:wrap}
#topbar>svg{width:40px;height:40px;flex-shrink:0}
#rolChips{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.chip-rol{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-pill);padding:6px 12px;font-size:.8125rem;cursor:pointer;min-height:36px}
.chip-rol.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
#topbar [data-testid="sync-estado"]{font-size:.8125rem;color:var(--text-dim)}
#btnInstalar{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:var(--radius-btn);padding:8px 12px;cursor:pointer;font-size:.8125rem}
/* Buscador y filtros */
#buscador{width:100%;padding:12px 14px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;margin-bottom:12px}
.tabs-filtro{display:flex;gap:8px;border-bottom:2px solid var(--border);overflow-x:auto;margin-bottom:12px}
.tab-filtro{background:none;border:none;color:var(--text-dim);padding:10px 6px;font-size:.9375rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab-filtro.activo{color:var(--text);border-bottom-color:var(--neon-verde)}
/* Tarjetas persona */
.tarjeta-persona{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.tarjeta-persona .fila{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
/* Badges de estado */
.badge{display:inline-block;border-radius:var(--radius-pill);padding:8px 14px;font-size:.8125rem;font-weight:600}
.badge-dentro{background:var(--neon-verde);color:var(--bg)}
.badge-fuera{background:var(--border);color:var(--text)}
.badge-pagado{background:var(--neon-verde);color:var(--bg)}
.badge-pendiente{background:var(--ambar);color:var(--bg)}
.badge-vip{background:var(--vip-morado);color:#ffffff;box-shadow:0 0 16px rgba(176,38,255,.15)}
/* Botones */
.btn{min-height:56px;font-size:1.125rem;padding:.75rem 1.5rem;border-radius:var(--radius-btn);border:none;cursor:pointer;font-weight:600}
.btn-primario{background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.15)}
.btn-secundario{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-peligro{background:var(--rojo);color:#ffffff}
.btn-pendiente{background:var(--ambar);color:var(--bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* KPIs */
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;text-align:center}
.kpi .valor{font-size:clamp(2rem,8vw,5rem);font-weight:700;line-height:1}
.kpi .label{font-size:.8125rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em}
/* Aforo */
.barra-aforo{width:100%;height:14px;border-radius:var(--radius-pill);background:var(--border);overflow:hidden;margin:8px 0}
.barra-aforo>span{display:block;height:100%;background:var(--neon-verde)}
.barra-aforo.alerta>span{background:var(--rojo);animation:parpadeo 1s infinite}
@keyframes parpadeo{0%,100%{opacity:1}50%{opacity:.3}}
/* TPV */
.grid-productos{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.btn-producto{min-height:80px;border-radius:var(--radius-card);border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;padding:10px;text-align:center}
.btn-producto.poco-stock{border-color:var(--ambar);color:var(--ambar)}
.btn-producto.agotado{opacity:.4;cursor:not-allowed}
/* Carrito */
.carrito{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:16px}
.carrito-linea{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
/* Tablas */
table{width:100%;border-collapse:collapse;margin-bottom:16px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.9375rem}
th{color:var(--text-dim);font-weight:600;font-size:.8125rem;text-transform:uppercase}
/* Modal/overlay */
#modalRoot:empty{display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;max-width:480px;width:100%;max-height:90vh;overflow:auto}
/* Toasts */
#toastRoot{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--neon-verde);color:var(--text);padding:10px 18px;border-radius:var(--radius-pill);font-size:.9375rem}
/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--neon-verde);color:var(--bg);font-size:2rem;line-height:1;border:none;cursor:pointer;box-shadow:0 0 16px rgba(0,212,138,.3);z-index:30}
/* Layout */
main#vista{max-width:960px;margin:0 auto;padding:16px}
/* Footer */
footer{padding:20px 16px;text-align:center;font-size:.8125rem;color:var(--text-dim);border-top:1px solid var(--border)}
footer a{color:var(--text-dim);text-decoration:underline}
/* Cupo acompañante + consumiciones (mejoras) */
.btn-acomp{min-height:44px;padding:.5rem 1rem;border-radius:6px;border:1px solid var(--vip-morado);background:transparent;color:var(--vip-morado);font-weight:600;cursor:pointer;margin-top:6px}
.btn-acomp:hover{background:rgba(176,38,255,.12)}
.consumiciones-panel{margin-top:20px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-card);background:var(--surface)}
.consumiciones-panel h3{margin:0 0 10px;font-size:1rem;color:var(--vip-morado)}
#consForm{display:flex;gap:8px;margin-bottom:10px}
#cons-codigo{flex:1;min-height:44px;padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
#consForm button{min-height:44px;padding:.5rem 1rem;border-radius:6px;border:none;background:var(--vip-morado);color:#fff;font-weight:600;cursor:pointer}
.cons-hint{color:var(--text-dim);font-size:.875rem;margin:0}
.cons-no{color:var(--ambar);margin:0}
.cons-ficha{color:var(--text);line-height:1.6}
.cons-cero{color:var(--text-dim)}
.btn-canjear{margin-top:8px;min-height:48px;padding:.6rem 1.2rem;border-radius:6px;border:none;background:var(--neon-verde);color:var(--bg);font-weight:700;cursor:pointer}
/* ===== Reconciliación de estilos (clases reales que generan las piezas) ===== */
/* Red de seguridad: cualquier botón sin clase propia se ve en tema oscuro, no gris */
button{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-btn);padding:10px 14px;cursor:pointer;min-height:44px;font-weight:600}
button:hover{border-color:var(--text-dim)}
button:disabled{opacity:.5;cursor:not-allowed}
/* Chips de rol */
.chip{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-pill);padding:8px 16px;font-size:.875rem;min-height:40px}
.chip.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
/* Buscador + escanear (puerta) */
.puerta-buscador-row{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
.puerta-buscador-row #buscador{margin-bottom:0}
.btn-escanear{border:1px solid var(--vip-morado);background:transparent;color:var(--vip-morado);border-radius:var(--radius-btn);white-space:nowrap}
/* Pestañas de filtro */
.puerta-filtros{display:flex;gap:6px;flex-wrap:wrap;border-bottom:2px solid var(--border);margin-bottom:14px;padding-bottom:2px}
.filtro-tab{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:var(--radius-pill);padding:8px 14px;font-size:.875rem;min-height:40px}
.filtro-tab.activo{background:var(--neon-verde);color:var(--bg);border-color:var(--neon-verde)}
/* Tarjetas de persona */
.persona-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;margin-bottom:10px}
.persona-info{margin-bottom:10px}
.persona-nombre{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.persona-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.persona-codigo{color:var(--text-dim);font-size:.9375rem;letter-spacing:.03em}
.persona-cupo{margin-top:6px;color:var(--vip-morado);font-size:.875rem;font-weight:600}
.badge-tipo{background:var(--border);color:var(--text)}
.persona-acciones{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
/* Botón de acción gigante + QR de la tarjeta */
.btn-accion-persona{flex:1;min-width:180px;min-height:56px;font-size:1.0625rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.18)}
.btn-qr{min-height:56px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:var(--radius-btn);padding:0 16px}
/* Alias de botón primario (inglés/español) */
.btn-primary,.btn-primario{background:var(--neon-verde);color:var(--bg);border:none;box-shadow:0 0 16px rgba(0,212,138,.15)}
/* KPIs del dueño */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;text-align:center;overflow:hidden}
.kpi-aforo{grid-column:1/-1}
.kpi-big{font-size:clamp(1.75rem,6vw,3rem);font-weight:700;line-height:1.05;display:block;overflow-wrap:break-word;word-break:break-word}
.desglose{font-size:.8125rem;color:var(--text-dim);margin-top:6px}
/* Paneles y controles del dueño */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;margin-bottom:16px}
.panel form label{display:block;margin-bottom:10px;color:var(--text-dim);font-size:.9375rem}
.panel form input,.panel form select{display:block;width:100%;margin-top:4px;padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text)}
.panel textarea{padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit}
.contador{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.contador button{min-width:44px}
.switch{display:flex;align-items:center;gap:10px;margin-bottom:8px;color:var(--text)}
.switch input{width:auto}
.tabla-rrpp input{width:80px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
.log-lista{list-style:none;padding:0;margin:0;max-height:320px;overflow:auto}
.log-lista li{padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem;color:var(--text-dim)}
.nota{font-size:.8125rem;color:var(--text-dim);font-style:italic}
.lista-gastos{list-style:none;padding:0;margin:0 0 10px}
.lista-gastos li{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.9375rem}
.historico-item{border:1px solid var(--border);border-radius:var(--radius-card);padding:12px;margin-bottom:8px}
.confirmar{background:rgba(255,51,51,.1);border:1px solid var(--rojo);border-radius:var(--radius-card);padding:12px;margin-top:10px}
.lista-vacia{color:var(--text-dim);text-align:center;padding:24px}
.fila-stock{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
/* PIN */
.panel-pin{max-width:320px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;text-align:center}
.panel-pin input{width:100%;margin:12px 0;padding:12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text);text-align:center;font-size:1.5rem;letter-spacing:.3em}
.error{color:var(--rojo);font-weight:600}
/* Modales (nombres reales) */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:22px;max-width:460px;width:100%;max-height:90vh;overflow:auto}
.modal-content input,.modal-content select{width:100%;margin:6px 0 12px;padding:10px 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--bg);color:var(--text)}
.modal-content canvas{margin:12px auto;display:block;background:#fff;border-radius:8px;padding:8px}
.modal-botones{display:flex;gap:10px;margin-top:12px}
.escaner-no-encontrado{color:var(--ambar);font-weight:600}
/* TPV (alias de rejilla + carrito) */
.productos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.prod-nombre{font-weight:600}.prod-precio{color:var(--neon-verde);font-weight:700}.prod-stock{font-size:.75rem;color:var(--text-dim)}
.carrito-vacio-msg{color:var(--text-dim);text-align:center;padding:12px}
.carrito-linea{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cart-menos{min-height:36px;min-width:36px;padding:0 10px}
.carrito-vaciar{min-height:40px}
.btn-cobrar{width:100%;min-height:60px;font-size:1.25rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--neon-verde);color:var(--bg);box-shadow:0 0 16px rgba(0,212,138,.2)}
.btn-vender-bono{width:100%;min-height:52px;margin-top:10px;font-size:1.0625rem;font-weight:700;border:none;border-radius:var(--radius-btn);background:var(--vip-morado);color:#fff;box-shadow:0 0 16px rgba(176,38,255,.2)}
.vista-barra h2{margin-bottom:12px}
</style>
</head>

  { "name": "Alta express entra directa", "steps": [

    s.config.productos = s.config.precios ? productosDesdePrecios(s.config.precios) : seedProductos();
  }
  if (!s.config.bonoCfg) s.config.bonoCfg = { ventaCamareros: false, copas: 5, precio: 20 };
  if (s.config.umbralStock === undefined) s.config.umbralStock = 10;

  if (!s.perfilActivo) s.perfilActivo = "vig-1";
  if (!Array.isArray(s.personas)) s.personas = [];
  if (!Array.isArray(s.rrpp)) s.rrpp = seedRrpp();

  if (!s.carritos || typeof s.carritos !== "object") s.carritos = {};
  ensureClavesPerfil(s.carritos, "cam", s.config.nCamareros, function () { return []; });

  if (!s.recaudacionPorPerfil || typeof s.recaudacionPorPerfil !== "object") s.recaudacionPorPerfil = {};
  ensureClavesPerfil(s.recaudacionPorPerfil, "vig", s.config.nVigilantes, 0);
  ensureClavesPerfil(s.recaudacionPorPerfil, "cam", s.config.nCamareros, 0);

  if (s.ingresosBarra === undefined) s.ingresosBarra = 0;
  if (!Array.isArray(s.gastos)) s.gastos = [];
  if (!Array.isArray(s.historico)) s.historico = [];
  if (!Array.isArray(s.bonos)) s.bonos = [];
  if (s.version === undefined) s.version = 1;
  if (!Array.isArray(s.log)) {
    s.log = [{ hora: "22:00", actor: "Sistema", texto: "Evento iniciado", tipo: "config" }];
  }

  return s;
}

/* ---------- Carga / persistencia local ---------- */

function load() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      state = migrar(parsed);
    } else {
      state = seedState();
    }
  } catch (e) {
    state = seedState();
  }
}

function persistLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

/* frag-core-b.js — MH Collective: helpers globales + router + sync + boot.
   Depende de globales de frag-core-a.js: state, CONFIG, load, persistLocal,
   LS_KEY, duenoAutenticado. Las vistas (renderPuerta/renderDueno/renderBarra)
   viven en otros fragmentos: aquí solo se LLAMAN. */

/* ---------- Helpers básicos ---------- */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function money(n) { return Math.round(n || 0) + ' €'; }
function nowHM() {
  var d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function toast(msg) {
  var root = document.getElementById('toastRoot');
  if (!root) return;
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1500);
}
function showModal(html) {
  var root = document.getElementById('modalRoot');
  if (!root) return;
  root.innerHTML = '<div class="modal-overlay" data-testid="modal-overlay"><div class="modal-content">' + html + '</div></div>';
  root.classList.add('visible');
  var overlay = root.querySelector('.modal-overlay');
  if (overlay) overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
}
function closeModal() {
  var root = document.getElementById('modalRoot');
  if (!root) return;
  root.innerHTML = '';
  root.classList.remove('visible');
}

/* ---------- Perfiles / roles ---------- */
function etiquetaPerfil(id) {
  if (id === 'dueno') return 'Dueño';
  var mv = /^vig-(\d+)$/.exec(id);
  if (mv) return 'Vigilante ' + mv[1];
  var mc = /^cam-(\d+)$/.exec(id);
  if (mc) return 'Camarero ' + mc[1];
  return id;
}
function perfilesLista() {
  var lista = [{ id: 'dueno', label: 'Dueño' }];
  var nv = (state.config && state.config.nVigilantes) || 2;
  var nc = (state.config && state.config.nCamareros) || 2;
  for (var i = 1; i <= nv; i++) lista.push({ id: 'vig-' + i, label: 'Vigilante ' + i });
  for (var j = 1; j <= nc; j++) lista.push({ id: 'cam-' + j, label: 'Camarero ' + j });
  return lista;
}
function addLog(texto, tipo) {
  state.log.unshift({ hora: nowHM(), actor: etiquetaPerfil(state.perfilActivo), texto: texto, tipo: tipo || '' });
}

/* ---------- Caja / búsquedas ---------- */
function cajaDesglose() {
  var taquilla = 0, vip = 0;
  (state.personas || []).forEach(function (p) {
    if (p.tipo === 'taquilla') taquilla += p.importePagado || 0;
    else if (p.tipo === 'vip') vip += p.importePagado || 0;
  });
  var barra = state.ingresosBarra || 0;
  var netoRRPP = 0;
  (state.rrpp || []).forEach(function (r) { netoRRPP += (r.vendidas || 0) * ((r.precio || 0) - (r.comision || 0)); });
  return { taquilla: taquilla, vip: vip, barra: barra, netoRRPP: netoRRPP, total: taquilla + vip + barra + netoRRPP };
}
function productoPorId(id) {
  var lista = (state.config && state.config.productos) || [];
  for (var i = 0; i < lista.length; i++) if (lista[i].id === id) return lista[i];
  return null;
}
function personaPorId(id) {
  var lista = state.personas || [];
  for (var i = 0; i < lista.length; i++) if (lista[i].id === id) return lista[i];
  return null;
}
function _normalizaCod(s) {
  return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
}
function personaPorCodigo(cod) {
  var buscado = _normalizaCod(cod);
  var lista = state.personas || [];
  for (var i = 0; i < lista.length; i++) if (_normalizaCod(lista[i].codigoReserva) === buscado) return lista[i];
  return null;
}

/* ---------- Persistencia / mutación ---------- */
function save() {
  persistLocal();
  if (window.__mhSync && typeof window.__mhSync.push === 'function') window.__mhSync.push();
}
function mutate(fn) {
  fn(state);
  state.version = (state.version || 0) + 1;
  // En modo servidor, guarda la acción para poder RE-APLICARLA si otro móvil escribió antes (409).
  if (window.__mhSync && window.__mhSync.pendientes) window.__mhSync.pendientes.push(fn);
  save();
  renderApp();
}

/* ---------- Personal dinámico (llamar envuelto en mutate) ---------- */
function setVigilantes(n) {
  n = Math.max(1, Math.min(9, Math.round(n) || 1));
  state.config.nVigilantes = n;
  state.recaudacionPorPerfil = state.recaudacionPorPerfil || {};
  for (var i = 1; i <= n; i++) {
    var id = 'vig-' + i;
    if (!(id in state.recaudacionPorPerfil)) state.recaudacionPorPerfil[id] = 0;
  }
  if (!perfilesLista().some(function (p) { return p.id === state.perfilActivo; })) state.perfilActivo = 'vig-1';
  addLog('[Dueño] ajustó nº de vigilantes a ' + n, 'personal');
}
function setCamareros(n) {
  n = Math.max(1, Math.min(9, Math.round(n) || 1));
  state.config.nCamareros = n;
  state.recaudacionPorPerfil = state.recaudacionPorPerfil || {};
  state.carritos = state.carritos || {};
  for (var i = 1; i <= n; i++) {
    var id = 'cam-' + i;
    if (!(id in state.recaudacionPorPerfil)) state.recaudacionPorPerfil[id] = 0;
    if (!state.carritos[id]) state.carritos[id] = [];
  }
  if (!perfilesLista().some(function (p) { return p.id === state.perfilActivo; })) state.perfilActivo = 'vig-1';
  addLog('[Dueño] ajustó nº de camareros a ' + n, 'personal');
}

/* ---------- Router / render dispatcher ---------- */
function renderApp() {
  var rolChips = document.getElementById('rolChips');
  if (rolChips) {
    var activo = (location.hash === '#/dueno' && duenoAutenticado) ? 'dueno' : state.perfilActivo;
    rolChips.innerHTML = perfilesLista().map(function (p) {
      return '<button type="button" data-testid="rol-' + esc(p.id) + '" class="chip' +
        (p.id === activo ? ' activo' : '') + '">' + esc(p.label) + '</button>';
    }).join('');
    Array.prototype.forEach.call(rolChips.querySelectorAll('button[data-testid^="rol-"]'), function (btn) {
      var id = btn.getAttribute('data-testid').slice(4);
      btn.onclick = function () {
        if (id === 'dueno') {
          location.hash = '#/dueno';
        } else {
          state.perfilActivo = id;
          location.hash = id.startsWith('cam') ? '#/barra' : '#/puerta';
        }
        renderApp();
      };
    });
  }

  var syncEl = document.querySelector('[data-testid="sync-estado"]');
  if (syncEl) syncEl.textContent = syncEstado();

  var vista = document.getElementById('vista');
  var hash = location.hash || '#/puerta';

  if (hash === '#/dueno') {
    if (!duenoAutenticado) {
      if (vista) {
        vista.innerHTML =
          '<form id="pinForm" class="panel-pin"><label for="pin-dueno">PIN del dueño</label>' +
          '<input id="pin-dueno" type="password" autocomplete="off">' +
          '<button type="submit">Entrar</button><p id="pin-error" class="error" hidden></p></form>';
        document.getElementById('pinForm').addEventListener('submit', function (e) {
          e.preventDefault();
          var val = document.getElementById('pin-dueno').value;
          if (val === CONFIG.ADMIN_PASSWORD) {
            duenoAutenticado = true;
            renderApp();
          } else {
            var err = document.getElementById('pin-error');
            if (err) { err.textContent = 'PIN incorrecto'; err.hidden = false; }
          }
        });
      }
    } else if (typeof renderDueno === 'function') {
      renderDueno();
    }
  } else if (hash === '#/barra') {
    if (typeof renderBarra === 'function') renderBarra();
  } else {
    if (typeof renderPuerta === 'function') renderPuerta();
  }
}

/* ---------- Sync (local file:// vs servidor http) ---------- */
function syncEstado() {
  return location.protocol === 'file:' ? 'Solo este dispositivo' : 'Sincronizado';
}
function initSync() {
  if (location.protocol === 'file:') {
    window.addEventListener('storage', function (e) {
      if (e.key === LS_KEY) { load(); renderApp(); }
    });
    return;
  }
  /* MODO SERVIDOR. Claves del diseño:
     - `srvVersion` es la versión del ALMACÉN del servidor (independiente de state.version, que
       es un contador local de mutaciones). El POST siempre usa srvVersion como baseVersion.
     - `pendientes` guarda las funciones-acción locales aún no confirmadas por el servidor: si
       otro móvil escribió antes (409), se adopta su estado y se RE-APLICAN las acciones encima
       (no se pierde la venta, no se machaca lo del otro).
     - `perfilActivo` es DE ESTE MÓVIL: al adoptar estado remoto se conserva el local (que el
       vigilante no le cambie el rol al camarero). */
  try {
    var srvVersion = 0;
    var pushing = false;

    function adoptar(remoto) {
      if (!remoto) return;
      var perfilLocal = state ? state.perfilActivo : null;
      state = remoto;
      if (perfilLocal) state.perfilActivo = perfilLocal;
      var pend = window.__mhSync.pendientes;
      for (var i = 0; i < pend.length; i++) {
        try { pend[i](state); state.version = (state.version || 0) + 1; } catch (e) { /* acción no re-aplicable */ }
      }
      persistLocal();
      renderApp();
    }

    function pushLoop(intentos) {
      if (pushing) return;
      pushing = true;
      var enviadas = window.__mhSync.pendientes.length; // las acciones que incluye ESTE envío
      fetch('/api/state', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ baseVersion: srvVersion, state: state }),
      }).then(function (res) {
        if (res.status === 409) {
          return res.json().then(function (d) {
            srvVersion = d.version;
            adoptar(d.state); // conserva perfil local y re-aplica TODAS las pendientes
            pushing = false;
            if ((intentos || 0) < 5 && window.__mhSync.pendientes.length) pushLoop((intentos || 0) + 1);
          });
        }
        return res.json().then(function (d) {
          if (d && typeof d.version === 'number') srvVersion = d.version;
          // Solo se confirman las que viajaron; las llegadas en vuelo siguen pendientes.
          window.__mhSync.pendientes.splice(0, enviadas);
          pushing = false;
          if (window.__mhSync.pendientes.length) pushLoop(0);
        });
      }).catch(function () { pushing = false; /* API caída: se queda en local y reintenta al próximo cambio */ });
    }

    window.__mhSync = { pendientes: [], push: function () { pushLoop(0); } };

    // Carga inicial: si el servidor ya tiene estado, se adopta; si está vacío, subimos el nuestro.
    fetch('/api/state').then(function (res) { return res.ok ? res.json() : null; })
      .then(function (data) {
        if (!data) return;
        srvVersion = data.version || 0;
        if (data.state) adoptar(data.state);
        else pushLoop(0);
      })
      .catch(function () { /* degrada a local */ });

    var es = new EventSource('/api/events');
    es.onmessage = function (ev) {
      try {
        var data = JSON.parse(ev.data);
        if (data && typeof data.version === 'number' && data.version !== srvVersion) {
          fetch('/api/state').then(function (res) { return res.json(); })
            .then(function (d) {
              if (!d) return;
              srvVersion = d.version || srvVersion;
              if (d.state) adoptar(d.state);
            })
            .catch(function () {});
        }
      } catch (err) { /* evento malformado, ignorar */ }
    };
    es.onerror = function () { /* silencioso: sigue en local */ };
  } catch (err) { /* cualquier fallo de red: seguir solo con localStorage */ }
}

/* ---------- Arranque ---------- */
function bootApp() {
  load();
  window.addEventListener('hashchange', renderApp);
  initSync();
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    window.__deferredPrompt = e;
  });
  var btnInstalar = document.getElementById('btnInstalar');
  if (btnInstalar) {
    btnInstalar.onclick = function () {
      if (window.__deferredPrompt) window.__deferredPrompt.prompt();
      else toast('Para instalar: menú del navegador → Añadir a pantalla de inicio');
    };
  }
  renderApp();
}
window.addEventListener('DOMContentLoaded', bootApp);

/* ===== VISTA PUERTA (#/puerta) — MH Collective ===== */
var _busq = "";
var _filtro = "todos";

function normTxt(s) {
  return String(s || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
}
function escJs(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function personasFiltradas() {
  var list = state.personas.slice();
  if (_filtro === "invitados") list = list.filter(function (p) { return p.tipo === "invitado"; });
  else if (_filtro === "taquilla") list = list.filter(function (p) { return p.tipo === "taquilla"; });
  else if (_filtro === "vip") list = list.filter(function (p) { return p.tipo === "vip"; });
  else if (_filtro === "dentro") list = list.filter(function (p) { return p.dentro === true; });
  else if (_filtro === "fuera") list = list.filter(function (p) { return p.dentro === false; });
  var q = normTxt(_busq).trim();
  if (q) {
    list = list.filter(function (p) {
      var hay = normTxt((p.nombre || "") + " " + (p.apellido || "") + " " + (p.codigoReserva || ""));
      return hay.indexOf(q) !== -1;
    });
  }
  return list;
}

function filtroTab(key, label) {
  var activo = _filtro === key ? " activo" : "";
  return '<button type="button" class="filtro-tab' + activo + '" data-testid="filtro-' + key +
    '" onclick="setFiltro(\'' + key + '\')">' + esc(label) + "</button>";
}

function renderPuerta() {
  var vista = document.getElementById("vista");
  if (!vista) return;
  var qrOn = !!(state.config && state.config.modulos && state.config.modulos.qr);
  var html = "";
  html += '<div class="puerta">';
  html += '<div class="puerta-buscador-row">';
  html += '<input id="buscador" type="text" placeholder="Nombre, apellido o código (MH-101…)" value="' +
    esc(_busq) + '" oninput="onBuscadorInput(this.value)">';
  if (qrOn) {
    html += '<button type="button" class="btn-escanear" data-testid="btn-escanear" onclick="abreEscaner()">Escanear QR</button>';
  }
  html += "</div>";
  html += '<div class="puerta-filtros">';
  html += filtroTab("todos", "Todos");
  html += filtroTab("invitados", "Invitados");
  html += filtroTab("taquilla", "Taquilla");
  html += filtroTab("vip", "Mesas VIP");
  html += filtroTab("dentro", "Ya Dentro");
  html += filtroTab("fuera", "Fuera");
  html += "</div>";
  html += '<div id="listaPersonas">' + renderListaPersonasHTML() + "</div>";
  html += "</div>";
  html += '<button type="button" class="fab-express" data-testid="fab-express" onclick="abreExpress()" aria-label="Alta rápida">+</button>';
  vista.innerHTML = html;
}

function renderListaPersonasHTML() {
  var list = personasFiltradas();
  if (list.length === 0) {
    return '<p class="lista-vacia">Sin resultados en este filtro</p>';
  }
  var html = "";
  for (var i = 0; i < list.length; i++) html += renderPersonaCard(list[i]);
  return html;
}

function labelAccion(p) {
  if (p.dentro) return "Marcar salida";
  if (p.tipo === "invitado") return "Dar acceso";
  if (p.tipo === "taquilla") {
    if ((p.importePagado || 0) === 0) return "Cobrar " + state.config.precioEntrada + " € y entrar";
    return "Dar acceso";
  }
  if (p.tipo === "vip") {
    var mesa = p.mesa || {};
    var pend = (mesa.total || 0) - (p.importePagado || 0);
    if (pend > 0) return "Cobrar pendiente (" + pend + " €) y entrar";
    return "Dar acceso";
  }
  return "Dar acceso";
}

function renderPersonaCard(p) {
  var tipoLabel = p.tipo === "invitado" ? "Invitado" : (p.tipo === "taquilla" ? "Taquilla" : "VIP");
  var estadoBadge = p.dentro
    ? '<span class="badge badge-dentro">Dentro</span>'
    : '<span class="badge badge-fuera">Fuera</span>';
  var cupoHtml = "";
  if (p.tipo === "vip" && p.mesa) {
    var dentroCount = (p.mesa.acompanantesDentro || 0) + (p.dentro ? 1 : 0);
    var cupoTotal = (p.mesa.acompanantesPermitidos || 0) + 1;
    cupoHtml = '<div class="persona-cupo">Cupo ' + dentroCount + "/" + cupoTotal + "</div>";
  }
  var qrOn = !!(state.config && state.config.modulos && state.config.modulos.qr);
  var qrBtn = qrOn
    ? '<button type="button" class="btn-qr" data-testid="qr-' + esc(p.id) + "\" onclick=\"abreQR('" +
      escJs(p.id) + "')\">QR</button>"
    : "";
  var accionBtn = '<button type="button" class="btn-accion-persona" onclick="accionPrincipal(\'' +
    escJs(p.id) + "')\">" + esc(labelAccion(p)) + "</button>";
  var acompBtn = "";
  if (p.tipo === "vip" && p.mesa && p.dentro &&
      (p.mesa.acompanantesDentro || 0) < (p.mesa.acompanantesPermitidos || 0)) {
    acompBtn = '<button type="button" class="btn-acomp" onclick="admitirAcompanante(\'' +
      escJs(p.id) + "')\">+ Acompañante</button>";
  }
  var html = "";
  html += '<div class="persona-card" data-testid="persona-' + esc(p.id) + '">';
  html += '<div class="persona-info">';
  html += '<div class="persona-nombre">' + esc(p.nombre + " " + p.apellido) + "</div>";
  html += '<div class="persona-meta"><span class="badge badge-tipo">' + esc(tipoLabel) +
    '</span> <span class="persona-codigo">' + esc(p.codigoReserva) + "</span> " + estadoBadge + "</div>";
  html += cupoHtml;
  html += "</div>";
  html += '<div class="persona-acciones">' + accionBtn + acompBtn + qrBtn + "</div>";
  html += "</div>";
  return html;
}

function onBuscadorInput(value) {
  _busq = value;
  var cont = document.getElementById("listaPersonas");
  if (cont) cont.innerHTML = renderListaPersonasHTML();
}

function setFiltro(key) {
  _filtro = key;
  renderPuerta();
}

function accionPrincipal(id) {
  var p = personaPorId(id);
  if (!p) return;
  if (p.dentro) { marcarSalida(id); return; }
  if (p.tipo === "invitado") { darAccesoSimple(id, "Invitado"); return; }
  if (p.tipo === "taquilla") {
    if ((p.importePagado || 0) === 0) cobrarYEntrar(id, state.config.precioEntrada);
    else darAccesoSimple(id, "Taquilla");
    return;
  }
  if (p.tipo === "vip") {
    var mesa = p.mesa || {};
    var pend = (mesa.total || 0) - (p.importePagado || 0);
    if (pend > 0) cobrarYEntrar(id, pend);
    else darAccesoSimple(id, "VIP");
    return;
  }
}

function darAccesoSimple(id, tipoLabel) {
  mutate(function () {
    var p = personaPorId(id);
    if (!p || p.dentro) return;
    p.dentro = true;
    p.horaEntrada = nowHM();
    addLog("registró entrada de " + p.nombre + " " + p.apellido + " (" + tipoLabel + ")", "entrada");
  });
  toast("Acceso dado");
}

function cobrarYEntrar(id, importe) {
  mutate(function (s) {
    var p = personaPorId(id);
    if (!p || p.dentro) return;
    var monto = importe;
    p.importePagado = (p.importePagado || 0) + monto;
    p.pagado = true;
    p.dentro = true;
    p.horaEntrada = nowHM();
    s.recaudacionPorPerfil[s.perfilActivo] = (s.recaudacionPorPerfil[s.perfilActivo] || 0) + monto;
    addLog("cobró " + monto + " € a " + p.nombre + " " + p.apellido, "cobro");
  });
  toast("Cobro registrado");
}

function marcarSalida(id) {
  mutate(function () {
    var p = personaPorId(id);
    if (!p || !p.dentro) return;
    p.dentro = false;
    addLog("registró salida de " + p.nombre + " " + p.apellido, "salida");
  });
  toast("Salida marcada");
}

/* Cupo de mesa: admite acompañantes de una reserva VIP uno a uno hasta el tope. */
function admitirAcompanante(id) {
  var p = personaPorId(id);
  if (!p || p.tipo !== "vip" || !p.mesa || !p.dentro) return;
  var permit = p.mesa.acompanantesPermitidos || 0;
  if ((p.mesa.acompanantesDentro || 0) >= permit) {
    toast("Cupo completo (" + (permit + 1) + "/" + (permit + 1) + ")");
    return;
  }
  mutate(function () {
    var q = personaPorId(id);

/* ===== QR POR PERSONA ===== */
function abreQR(id) {
  var p = personaPorId(id);
  if (!p) return;
  var tipoLabel = p.tipo === "invitado" ? "Invitado" : (p.tipo === "taquilla" ? "Taquilla" : "VIP");
  var html = "";
  html += '<div class="modal-qr" data-testid="qr-modal">';
  html += "<h2>" + esc(p.nombre + " " + p.apellido) + "</h2>";
  html += '<p class="qr-tipo">' + esc(tipoLabel) + "</p>";
  html += '<canvas id="qrCanvas" width="220" height="220"></canvas>';
  html += '<p class="qr-codigo">' + esc(p.codigoReserva) + "</p>";
  html += '<div class="modal-botones">';
  html += '<button type="button" id="btnCompartirQR">Compartir</button>';
  html += '<button type="button" onclick="closeModal()">Cerrar</button>';
  html += "</div></div>";
  showModal(html);
  var canvas = document.getElementById("qrCanvas");
  if (canvas) { try { drawQR(canvas, p.codigoReserva, 220); } catch (e) {} }
  var btnShare = document.getElementById("btnCompartirQR");
  if (btnShare) btnShare.addEventListener("click", function () { compartirQR(canvas, p); });
}

function compartirQR(canvas, p) {
  if (!canvas) return;
  try {
    if (navigator.share && canvas.toBlob) {
      canvas.toBlob(function (blob) {
        if (!blob) return;
        try {
          var file = new File([blob], "qr-" + p.codigoReserva + ".png", { type: "image/png" });
          if (navigator.canShare && !navigator.canShare({ files: [file] })) { descargarCanvas(canvas, p); return; }
          navigator.share({ files: [file], title: p.nombre + " " + p.apellido, text: p.codigoReserva }).catch(function () {});
        } catch (e) { descargarCanvas(canvas, p); }
      });
    } else {
      descargarCanvas(canvas, p);
    }
  } catch (e) { descargarCanvas(canvas, p); }
}

function descargarCanvas(canvas, p) {
  try {
    var a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "qr-" + p.codigoReserva + ".png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {}
}

  } else {

    if (resultado) {
      resultado.innerHTML = '<p class="escaner-no-encontrado">Código no encontrado</p>' +
        '<button type="button" onclick="closeModal();abreExpress();">Dar de alta express</button>';
    }
  }

function intentarCamaraQR() {
  try {
    if (location.protocol === "file:") return;
    if (typeof BarcodeDetector === "undefined") return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    var wrap = document.getElementById("escanerVideoWrap");
    if (!wrap) return;
    var video = document.createElement("video");
    video.setAttribute("playsinline", "true");
    video.autoplay = true;
    video.style.width = "100%";
    wrap.appendChild(video);
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function (stream) {
      video.srcObject = stream;
      var detector = new BarcodeDetector({ formats: ["qr_code"] });
      var activo = true;
      function detener() { activo = false; try { stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {} }
      function tick() {
        if (!activo) return;
        if (!document.body.contains(video)) { detener(); return; }
        detector.detect(video).then(function (codes) {
          if (codes && codes.length) {
            var valor = codes[0].rawValue;
            var input = document.getElementById("qr-codigo");
            if (input) input.value = valor;
            detener();
            var p = personaPorCodigo(valor);
            if (p) { closeModal(); _busq = valor; _filtro = "todos"; renderApp(); }
            return;
          }
          if (activo) requestAnimationFrame(tick);
        }).catch(function () { if (activo) requestAnimationFrame(tick); });
      }
      requestAnimationFrame(tick);
    }).catch(function () {});
  } catch (e) {}
}

/* frag-barra.js — TPV de Barra (#/barra), camareros + dueño.
   Global vanilla JS. Usa: state, mutate, esc, money, addLog, toast, renderApp, productoPorId. */

function renderBarra() {
  var vista = document.getElementById('vista');
  if (!vista) return;

  var perfil = state.perfilActivo;
  var carrito = state.carritos[perfil] || (state.carritos[perfil] = []);
  var modulos = state.config.modulos || {};
  var productos = state.config.productos || [];
  var umbral = state.config.umbralStock || 10;

  var botonesHtml = productos.map(function (p) {
    var cls = 'btn-producto';
    var extra = '';
    var agotado = false;

    if (modulos.stock) {
      if (p.stock === 0) {
        agotado = true;
        extra = ' · Agotado';
      } else {
        extra = ' · ' + p.stock + ' uds';
        if (p.stock <= umbral) {
          cls += ' poco-stock';
          extra += ' ¡Quedan ' + p.stock + '!';
        }
      }
    }

    return '<button type="button" class="' + cls + '" data-testid="prod-' + esc(p.id) + '"' +
      (agotado ? ' disabled' : ' onclick="barraAgregar(\'' + esc(p.id) + '\')"') + '>' +
      '<span class="prod-nombre">' + esc(p.nombre) + '</span> ' +
      '<span class="prod-precio">' + money(p.precio) + '</span>' +
      (extra ? '<span class="prod-stock">' + esc(extra) + '</span>' : '') +
      '</button>';
  }).join('');

  var lineasHtml = carrito.map(function (l) {
    return '<div class="carrito-linea">' +
      '<span class="cl-nombre">' + esc(l.nombre) + '</span>' +
      '<span class="cl-qty">x' + l.qty + '</span>' +
      '<span class="cl-importe">' + money(l.precio * l.qty) + '</span>' +
      '<button type="button" class="cart-menos" data-testid="cart-menos-' + esc(l.prodId) + '" ' +
      'onclick="barraQuitar(\'' + esc(l.prodId) + '\')">−</button>' +
      '</div>';
  }).join('');

  if (!lineasHtml) {
    lineasHtml = '<p class="carrito-vacio-msg">Carrito vacío</p>';
  }

  var total = 0;
  for (var i = 0; i < carrito.length; i++) {
    total += carrito[i].precio * carrito[i].qty;
  }

  var cobrarDisabled = carrito.length === 0;
  var cobrarTexto = cobrarDisabled ? 'Carrito vacío' : 'Cobrar ' + money(total);

  vista.innerHTML =
    '<section class="vista-barra">' +
      '<h2>Barra</h2>' +
      '<div class="productos-grid">' + botonesHtml + '</div>' +
      '<div class="carrito" data-testid="carrito">' +
        lineasHtml +
        '<div class="carrito-footer">' +
          '<button type="button" class="carrito-vaciar" data-testid="carrito-vaciar" ' +
          'onclick="barraVaciar()">Vaciar carrito</button>' +
          '<span class="carrito-total" data-testid="carrito-total">' + money(total) + '</span>' +
        '</div>' +
      '</div>' +
      '<button type="button" class="btn-cobrar" data-testid="btn-cobrar"' +
        (cobrarDisabled ? ' disabled' : ' onclick="barraCobrar()"') + '>' +
        esc(cobrarTexto) +
      '</button>' +
      ((state.config.bonoCfg && state.config.bonoCfg.ventaCamareros)
        ? '<button type="button" class="btn-vender-bono" data-testid="btn-vender-bono" onclick="venderBonoBarra()">' +
          'Vender bono: ' + esc(state.config.bonoCfg.copas) + ' copas · ' + esc(money(state.config.bonoCfg.precio)) + '</button>'
        : '') +
      '<div class="consumiciones-panel" data-testid="consumiciones">' +
        '<h3>Consumiciones incluidas</h3>' +
        '<form id="consForm" onsubmit="return consBuscar()">' +
          '<input id="cons-codigo" type="text" placeholder="Código (MH-301…)" autocomplete="off" value="' + esc(_consCod) + '">' +
          '<button type="submit">Ver</button>' +
        '</form>' +
        '<div id="cons-resultado">' + _consMsg + '</div>' +
      '</div>' +
    '</section>';
}

/* ===== CONSUMICIONES: mismo código, el camarero canjea copas gratis ===== */
var _consMsg = '<p class="cons-hint">Teclea el código de la entrada para ver sus copas incluidas.</p>';
var _consCod = ''; // último código consultado: sobrevive a los re-render (el canje repinta la vista)

function consConfig() {
  return (state.config && state.config.consumiciones) || { invitado: 0, taquilla: 1, vip: 2 };
}
function consIncluidas(p) {
  var c = consConfig();
  if (p.tipo === 'vip' && p.mesa) return (c.vip || 0) * ((p.mesa.acompanantesPermitidos || 0) + 1);
  if (p.tipo === 'taquilla') return c.taquilla || 0;
  return c.invitado || 0;
}
function consDisponibles(p) {
  return Math.max(0, consIncluidas(p) - (p.consumicionesUsadas || 0));
}
function consBuscar() {
  var inp = document.getElementById('cons-codigo');
  var cod = inp && inp.value.trim() ? inp.value.trim() : _consCod;
  _consCod = cod;
  var p = cod ? personaPorCodigo(cod) : null;
  var b = (!p && cod && typeof bonoPorCodigo === 'function') ? bonoPorCodigo(cod) : null;
  if (b) {
    var rest = Math.max(0, (b.copas || 0) - (b.usadas || 0));
    _consMsg = '<div class="cons-ficha"><strong>Bono ' + esc(b.codigo) + '</strong>' +
      (b.etiqueta ? ' · ' + esc(b.etiqueta) : '') +
      '<br>Copas: <b>' + rest + '</b> disponibles' +
      (rest > 0
        ? '<br><button type="button" class="btn-canjear" onclick="canjearBonoCopa(\'' + escJs(b.id) + '\')">Canjear 1 copa del bono</button>'
        : '<br><span class="cons-cero">Bono agotado — cobrar normal</span>') +
      '</div>';
    var out0 = document.getElementById('cons-resultado');
    if (out0) out0.innerHTML = _consMsg;
    return false;
  }
  if (!p) {
    _consMsg = '<p class="cons-no">Código no encontrado.</p>';
  } else {
    var disp = consDisponibles(p);
    _consMsg = '<div class="cons-ficha"><strong>' + esc(p.nombre + ' ' + p.apellido) + '</strong>' +
      ' · ' + esc(p.codigoReserva) + '<br>Consumiciones: <b>' + disp + '</b> disponibles' +
      (disp > 0
        ? '<br><button type="button" class="btn-canjear" onclick="canjearConsumicion(\'' + escJs(p.id) + '\')">Canjear 1 copa gratis</button>'
        : '<br><span class="cons-cero">Sin consumiciones — cobrar normal</span>') +
      '</div>';
  }
  var out = document.getElementById('cons-resultado');
  if (out) out.innerHTML = _consMsg;
  return false;
}
function canjearBonoCopa(id) {
  var b = null;
  for (var i = 0; i < (state.bonos || []).length; i++) if (state.bonos[i].id === id) b = state.bonos[i];
  if (!b || (b.copas - b.usadas) <= 0) { toast('Bono agotado'); return; }
  mutate(function (s) {
    var q = null;
    for (var j = 0; j < (s.bonos || []).length; j++) if (s.bonos[j].id === id) q = s.bonos[j];
    if (!q) return;
    q.usadas = (q.usadas || 0) + 1;
    addLog('canjeó 1 copa del bono ' + q.codigo + ' (quedan ' + Math.max(0, q.copas - q.usadas) + ')', 'cobro');
  });
  toast('Copa del bono canjeada');
  consBuscar();
}

function canjearConsumicion(id) {
  var p = personaPorId(id);
  if (!p || consDisponibles(p) <= 0) { toast('Sin consumiciones'); return; }
  mutate(function () {
    var q = personaPorId(id);
    q.consumicionesUsadas = (q.consumicionesUsadas || 0) + 1;
    addLog('canjeó 1 consumición de ' + q.nombre + ' ' + q.apellido +
      ' (quedan ' + consDisponibles(q) + ')', 'cobro');
  });
  toast('Consumición canjeada');
  consBuscar();
}

function barraAgregar(prodId) {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    var prod = productoPorId(prodId);
    if (!prod) return;
    if (s.config.modulos && s.config.modulos.stock && prod.stock <= 0) return;

    var linea = null;
    for (var i = 0; i < carrito.length; i++) {
      if (carrito[i].prodId === prodId) { linea = carrito[i]; break; }
    }
    if (linea) {
      linea.qty++;
    } else {
      carrito.push({ prodId: prod.id, nombre: prod.nombre, precio: prod.precio, qty: 1 });
    }
  });
}

function barraQuitar(prodId) {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    for (var i = 0; i < carrito.length; i++) {
      if (carrito[i].prodId === prodId) {
        carrito[i].qty--;
        if (carrito[i].qty <= 0) carrito.splice(i, 1);
        break;
      }
    }
  });
}

function barraVaciar() {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    carrito.length = 0;
  });
}

function barraCobrar() {
  mutate(function (s) {
    var perfil = s.perfilActivo;
    var carrito = s.carritos[perfil] || (s.carritos[perfil] = []);
    if (!carrito.length) return;

    var total = 0;
    var partes = [];
    for (var i = 0; i < carrito.length; i++) {
      var l = carrito[i];
      total += l.precio * l.qty;
      partes.push(l.qty + '× ' + l.nombre);
    }

    if (s.config.modulos && s.config.modulos.stock) {
      for (var j = 0; j < carrito.length; j++) {
        var prod = productoPorId(carrito[j].prodId);
        if (prod) prod.stock = Math.max(0, prod.stock - carrito[j].qty);
      }
    }

    s.ingresosBarra = (s.ingresosBarra || 0) + total;
    s.recaudacionPorPerfil[perfil] = (s.recaudacionPorPerfil[perfil] || 0) + total;
    addLog('vendió ' + partes.join(', ') + ' (' + total + ' €)', 'cobro');

    carrito.length = 0;
    toast('Cobro registrado');
  });
}

/* ---------- 1. KPIs ---------- */

function seccionKpis() {
  var s = state;
  var caja = cajaDesglose();
  var dentro = s.personas.filter(function (p) { return p.dentro; }).length;
  var totalPersonas = s.personas.length || 1;
  var pct = Math.round((dentro / totalPersonas) * 100);
  var pctAforo = s.config.maxAforo ? Math.min(100, Math.round((dentro / s.config.maxAforo) * 100)) : 0;
  var alerta = s.config.maxAforo && dentro >= 0.9 * s.config.maxAforo ? " alerta" : "";
  var html = '<section class="panel kpis">';
  html += '<div class="kpi kpi-aforo' + alerta + '" data-testid="kpi-aforo"><h3>Aforo</h3>';
  html += '<p class="kpi-big">' + esc(dentro) + ' / ' + esc(s.config.maxAforo) + ' dentro</p>';
  html += '<div class="barra"><div class="barra-fill" style="width:' + pctAforo + '%"></div></div></div>';
  html += '<div class="kpi" data-testid="kpi-caja"><h3>Caja total</h3><p class="kpi-big">' + esc(money(caja.total)) + '</p>';
  html += '<ul class="desglose">';
  html += '<li data-testid="caja-taquilla">Taquilla: ' + esc(money(caja.taquilla)) + '</li>';
  html += '<li data-testid="caja-vip">Mesas VIP: ' + esc(money(caja.vip)) + '</li>';
  html += '<li data-testid="caja-barra">Barra: ' + esc(money(caja.barra)) + '</li>';
  html += '<li data-testid="caja-rrpp">RRPP: ' + esc(money(caja.netoRRPP)) + ' (pendiente de entrega)</li>';
  html += '</ul></div>';
  html += '<div class="kpi" data-testid="kpi-asistencia"><h3>Asistencia</h3><p class="kpi-big">' +
    esc(dentro) + ' registrados (' + esc(pct) + '%)</p></div>';
  if (s.config.modulos.gastos) {
    var gastosTotal = s.gastos.reduce(function (a, g) { return a + g.importe; }, 0);

    var beneficioCaja = caja.taquilla + caja.vip + caja.barra - gastosTotal;
    html += '<div class="kpi" data-testid="kpi-beneficio"><h3>Beneficio neto</h3><p class="kpi-big">' + esc(money(beneficioNeto)) + '</p></div>';
    html += '<div class="kpi" data-testid="kpi-beneficio-caja"><h3>Beneficio en caja</h3><p class="kpi-big">' + esc(money(beneficioCaja)) + '</p></div>';
  }
  html += '</section>';
  return html;
}

function onListaTipoChange(v) {
  var el = document.getElementById('lista-vip-campos');
  if (el) el.style.display = v === 'vip' ? '' : 'none';
}

function duenoAnadirLista(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var nombre = (document.getElementById('lista-nombre').value || '').trim();
  var apellido = (document.getElementById('lista-apellido').value || '').trim();
  var tipo = document.getElementById('lista-tipo').value;
  var acomp = parseInt(document.getElementById('lista-acomp').value || '0', 10) || 0;
  var senal = Number(document.getElementById('lista-senal').value) || 0;
  if (!nombre) { toast('Falta el nombre'); return false; }
  var nuevoId = 'p' + Date.now();
  mutate(function (s) {
    var p = { id: nuevoId, nombre: nombre, apellido: apellido, codigoReserva: nuevoCodigoLista(s),
      mesa: null, pagado: false, importePagado: 0, dentro: false, horaEntrada: null };
    if (tipo === 'invitado') { p.tipo = 'invitado'; }
    else if (tipo === 'taquilla-pagada') { p.tipo = 'taquilla'; p.pagado = true; p.importePagado = s.config.precioEntrada; }
    else if (tipo === 'taquilla-puerta') { p.tipo = 'taquilla'; }
    else { // mesa VIP anticipada
      p.tipo = 'vip';
      var numeros = s.personas.filter(function (x) { return x.mesa; }).map(function (x) { return x.mesa.numero; });
      var sig = numeros.length ? Math.max.apply(null, numeros) + 1 : 1;
      p.mesa = { numero: sig, acompanantesPermitidos: acomp, acompanantesDentro: 0,
        total: s.config.precioMesaVip, adelantado: senal };
      p.importePagado = senal;
      p.pagado = senal >= s.config.precioMesaVip;
    }
    s.personas.push(p);
    addLog('añadió a la lista a ' + nombre + ' ' + apellido + ' (' + tipo + ')', 'alta');
  });
  toast('En la lista');
  if (state.config.modulos && state.config.modulos.qr) abreQR(nuevoId);
  return false;
}

function duenoAnadirBulk() {
  var txt = (document.getElementById('lista-bulk').value || '').trim();
  var tipo = document.getElementById('lista-bulk-tipo').value;
  if (!txt) { toast('Pega los nombres, uno por línea'); return; }
  var lineas = txt.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
  mutate(function (s) {
    lineas.forEach(function (linea, i) {
      var partes = linea.split(/\s+/);
      var p = { id: 'p' + Date.now() + '_' + i, nombre: partes[0], apellido: partes.slice(1).join(' '),
        codigoReserva: nuevoCodigoLista(s), mesa: null, pagado: false, importePagado: 0,
        dentro: false, horaEntrada: null, tipo: tipo === 'invitado' ? 'invitado' : 'taquilla' };
      if (tipo === 'taquilla-pagada') { p.pagado = true; p.importePagado = s.config.precioEntrada; }
      s.personas.push(p);
    });
    addLog('añadió ' + lineas.length + ' personas a la lista (' + tipo + ')', 'alta');
  });
  toast(lineas.length + ' personas añadidas');
}

/* ===== COPIA DE SEGURIDAD (archivo JSON con TODO el estado) ===== */
function exportarDatos() {
  try {
    var blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mh-collective-datos.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Datos guardados en archivo');
  } catch (e) { toast('No se pudo exportar'); }
}

function importarDatosTexto(txt) {
  var datos;
  try { datos = JSON.parse(txt); } catch (e) { toast('Archivo no válido'); return false; }
  if (!datos || !Array.isArray(datos.personas)) { toast('Archivo no válido'); return false; }
  state = datos;
  if (typeof migrar === 'function') migrar(state);
  state.version = (state.version || 0) + 1;
  addLog('cargó una copia de datos (' + state.personas.length + ' personas)', 'config');
  save();
  renderApp();
  toast('Datos cargados: ' + state.personas.length + ' personas');
  return true;
}

function importarArchivo(input) {
  var f = input.files && input.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function () { importarDatosTexto(String(r.result)); };
  r.readAsText(f);
  input.value = '';
}

function duenoGuardarConfig(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var evento = document.getElementById("cfg-evento").value.trim();
  var aforo = Number(document.getElementById("cfg-aforo").value) || 0;
  var precioEntrada = Number(document.getElementById("cfg-precio-entrada").value) || 0;
  var precioVip = Number(document.getElementById("cfg-precio-vip").value) || 0;
  mutate(function (s) {
    var c = s.config;
    if (evento && evento !== c.eventName) {
      addLog("cambió Nombre evento: " + c.eventName + " → " + evento, "config");
      c.eventName = evento;
    }
    if (aforo && aforo !== c.maxAforo) {
      addLog("cambió Aforo: " + c.maxAforo + " → " + aforo, "config");
      c.maxAforo = aforo;
    }
    if (precioEntrada !== c.precioEntrada) {
      addLog("cambió Precio entrada: " + c.precioEntrada + " → " + precioEntrada, "config");
      c.precioEntrada = precioEntrada;
    }
    if (precioVip !== c.precioMesaVip) {
      addLog("cambió Precio mesa VIP: " + c.precioMesaVip + " → " + precioVip, "config");
      c.precioMesaVip = precioVip;
    }
    var ci = Number(document.getElementById("cfg-cons-invitado").value) || 0;
    var ct = Number(document.getElementById("cfg-cons-taquilla").value) || 0;
    var cv = Number(document.getElementById("cfg-cons-vip").value) || 0;
    if (!c.consumiciones) c.consumiciones = { invitado: 0, taquilla: 1, vip: 2 };
    if (ci !== c.consumiciones.invitado || ct !== c.consumiciones.taquilla || cv !== c.consumiciones.vip) {
      addLog("cambió Consumiciones incluidas (inv/taq/vip): " +
        c.consumiciones.invitado + "/" + c.consumiciones.taquilla + "/" + c.consumiciones.vip +
        " → " + ci + "/" + ct + "/" + cv, "config");
      c.consumiciones = { invitado: ci, taquilla: ct, vip: cv };
    }
  });
  toast("Configuración guardada");
  return false;
}

function seccionRrpp() {
  var rrpp = state.rrpp;
  var html = '<section class="panel" data-testid="rrpp"><h2>Gestión de RRPP / Promotores</h2>';
  html += '<table class="tabla-rrpp"><thead><tr><th>RRPP</th><th>Vendidas</th><th>Precio</th><th>Comisión</th>' +
    '<th>Total</th><th>Comisión €</th><th>Neto</th></tr></thead><tbody>';
  var totVend = 0, totTotal = 0, totCom = 0, totNeto = 0;
  rrpp.forEach(function (r) {
    var total = r.vendidas * r.precio;
    var com = r.vendidas * r.comision;
    var neto = total - com;
    totVend += r.vendidas; totTotal += total; totCom += com; totNeto += neto;
    html += '<tr data-testid="rrpp-' + esc(r.slug) + '">';
    html += '<td>RRPP ' + esc(r.nombre) + '</td>';
    html += '<td>' + esc(r.vendidas) +
      ' <button type="button" data-testid="rrpp-menos-' + esc(r.slug) + '" onclick="duenoRrppVendidas(\'' + r.slug + '\',-1)">−</button>' +
      ' <button type="button" data-testid="rrpp-mas-' + esc(r.slug) + '" onclick="duenoRrppVendidas(\'' + r.slug + '\',1)">+</button></td>';
    html += '<td><input type="number" id="rrpp-precio-' + esc(r.slug) + '" value="' + esc(r.precio) +
      '" min="0" onchange="duenoRrppCampo(\'' + r.slug + '\',\'precio\',this.value)"></td>';
    html += '<td><input type="number" id="rrpp-comision-' + esc(r.slug) + '" value="' + esc(r.comision) +
      '" min="0" onchange="duenoRrppCampo(\'' + r.slug + '\',\'comision\',this.value)"></td>';
    html += '<td>' + esc(money(total)) + '</td><td>' + esc(money(com)) + '</td><td>' + esc(money(neto)) + '</td>';
    html += '</tr>';
  });
  html += '</tbody><tfoot><tr data-testid="rrpp-totales"><td>Total</td><td>' + esc(totVend) + '</td><td></td><td></td>' +
    '<td>' + esc(money(totTotal)) + '</td><td>' + esc(money(totCom)) + '</td><td>' + esc(money(totNeto)) + '</td></tr></tfoot>';
  html += '</table></section>';
  return html;
}

function duenoRrppVendidas(slug, delta) {
  mutate(function (s) {
    var r = s.rrpp.find(function (x) { return x.slug === slug; });
    if (!r) return;
    r.vendidas = Math.max(0, r.vendidas + delta);
    addLog("asignó " + (delta > 0 ? "+1" : "-1") + " entrada vendida a RRPP " + r.nombre, "rrpp");
  });
}

function duenoRrppCampo(slug, campo, valor) {
  var num = Number(valor) || 0;
  mutate(function (s) {
    var r = s.rrpp.find(function (x) { return x.slug === slug; });
    if (!r || num === r[campo]) return;
    var etiqueta = campo === "precio" ? "Precio" : "Comisión";
    addLog("cambió " + etiqueta + " RRPP " + r.nombre + ": " + r[campo] + " → " + num, "rrpp");
    r[campo] = num;
  });
}

  var bonos = state.bonos || [];
  var html = '<section class="panel" data-testid="seccion-bonos"><h2>Bonos de copa</h2>';

      var rest = Math.max(0, (b.copas || 0) - (b.usadas || 0));

function duenoBonoCfg() {
  var on = !!document.getElementById('bono-venta-camareros').checked;
  var copas = parseInt(document.getElementById('bono-cfg-copas').value || '5', 10) || 5;
  var precio = Number(document.getElementById('bono-cfg-precio').value) || 0;
  mutate(function (s) {
    var bc = s.config.bonoCfg || {};
    if (bc.ventaCamareros !== on) {
      addLog((on ? 'activó' : 'desactivó') + ' la venta de bonos por camareros', 'config');
    }
    if (bc.copas !== copas || bc.precio !== precio) {
      addLog('fijó el bono de barra en ' + copas + ' copas por ' + precio + ' €', 'config');
    }
    s.config.bonoCfg = { ventaCamareros: on, copas: copas, precio: precio };
  });
}

/* Venta en barra: crea el bono con las condiciones FIJADAS POR EL DUEÑO y cobra su precio. */
function venderBonoBarra() {
  var bc = state.config.bonoCfg || {};
  var copas = bc.copas || 5;
  var precio = bc.precio || 0;
  var nuevoId = 'b' + Date.now();
  mutate(function (s) {
    if (!s.bonos) s.bonos = [];
    var codigo = 'MH-B' + String(s.bonos.length + 1).padStart(2, '0');
    s.bonos.push({ id: nuevoId, codigo: codigo, copas: copas, usadas: 0,
      etiqueta: 'Vendido en barra', hora: nowHM(), anulado: false, precio: precio });
    if (precio > 0) {
      s.ingresosBarra = (s.ingresosBarra || 0) + precio;
      s.recaudacionPorPerfil[s.perfilActivo] = (s.recaudacionPorPerfil[s.perfilActivo] || 0) + precio;
    }
    addLog('vendió bono ' + codigo + ' de ' + copas + ' copas (' + precio + ' €)', 'cobro');
  });
  toast('Bono vendido');
  abreQRBono(nuevoId); // se lo enseña/manda al cliente al momento
}

function crearBono(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var copas = parseInt(document.getElementById('bono-copas').value || '0', 10);
  var etiqueta = (document.getElementById('bono-etiqueta').value || '').trim();
  if (!copas || copas < 1) { toast('Pon el nº de copas'); return false; }
  mutate(function (s) {
    if (!s.bonos) s.bonos = [];
    var num = s.bonos.length + 1;
    var codigo = 'MH-B' + String(num).padStart(2, '0');
    s.bonos.push({ id: 'b' + Date.now(), codigo: codigo, copas: copas, usadas: 0,
      etiqueta: etiqueta, hora: nowHM(), anulado: false });
    addLog('creó bono de ' + copas + ' copas (' + codigo + (etiqueta ? ' · ' + etiqueta : '') + ')', 'config');
  });
  toast('Bono creado');
  return false;
}

function anularBono(id) {
  mutate(function (s) {
    var b = null;
    for (var i = 0; i < (s.bonos || []).length; i++) if (s.bonos[i].id === id) b = s.bonos[i];
    if (!b || b.anulado) return;
    b.anulado = true;
    b.usadas = b.copas; // sin copas restantes
    addLog('anuló el bono ' + b.codigo, 'config');
  });
  toast('Bono anulado');
}

function bonoPorCodigo(cod) {
  var buscado = _normalizaCod(cod);
  var lista = state.bonos || [];
  for (var i = 0; i < lista.length; i++) {
    if (_normalizaCod(lista[i].codigo) === buscado) return lista[i];
  }
  return null;
}

function abreQRBono(id) {
  var b = null;
  for (var i = 0; i < (state.bonos || []).length; i++) if (state.bonos[i].id === id) b = state.bonos[i];
  if (!b) return;
  var rest = Math.max(0, (b.copas || 0) - (b.usadas || 0));
  var html = '<div class="modal-qr" data-testid="qr-modal">';
  html += '<h2>Bono de copas</h2>';
  html += '<p class="qr-tipo">' + esc(b.etiqueta || 'Vale de ' + b.copas + ' copas') + ' · quedan ' + rest + '</p>';
  html += '<canvas id="qrCanvasBono" width="220" height="220"></canvas>';
  html += '<p class="qr-codigo">' + esc(b.codigo) + '</p>';
  html += '<div class="modal-botones"><button type="button" onclick="closeModal()">Cerrar</button></div></div>';
  showModal(html);
  var canvas = document.getElementById('qrCanvasBono');
  if (canvas && typeof drawQR === 'function') {
    try { drawQR(canvas, b.codigo, 220); } catch (e) { /* el código en texto sigue visible */ }
  }
}

function seccionRecaudacion() {
  var mapa = state.recaudacionPorPerfil;
  var html = '<section class="panel" data-testid="recaudacion-terminal"><h2>Recaudación por terminal</h2><table><tbody>';
  Object.keys(mapa).sort().forEach(function (id) {
    html += '<tr data-testid="terminal-' + esc(id) + '"><td>' + esc(etiquetaPerfil(id)) + '</td><td>' + esc(money(mapa[id])) + '</td></tr>';
  });
  html += '</tbody></table></section>';
  return html;
}

/* ---------- 7. Gastos ---------- */

function seccionGastos() {
  var gastos = state.gastos;
  var total = gastos.reduce(function (a, g) { return a + g.importe; }, 0);
  var html = '<section class="panel" data-testid="seccion-gastos"><h2>Gastos</h2>';
  html += '<form id="gastoForm" onsubmit="return duenoAltaGasto(event)">';
  html += '<input type="text" id="gasto-concepto" placeholder="Concepto" required>';
  html += '<input type="number" id="gasto-importe" placeholder="Importe" min="0" required>';
  html += '<select id="gasto-categoria">';
  CATEGORIAS_GASTO.forEach(function (cat) { html += '<option value="' + esc(cat) + '">' + esc(cat) + '</option>'; });
  html += '</select>';
  html += '<button type="submit" class="btn btn-primary">Añadir gasto</button></form>';
  html += '<ul class="lista-gastos">';
  gastos.forEach(function (g) {
    html += '<li>' + esc(g.hora) + ' · ' + esc(g.concepto) + ' (' + esc(g.categoria) + ') ' + esc(money(g.importe)) +
      ' <button type="button" data-testid="gasto-borrar-' + esc(g.id) + '" onclick="duenoBorrarGasto(\'' + g.id + '\')">Borrar</button></li>';
  });
  html += '</ul>';
  html += '<p data-testid="gastos-total">Total gastos: ' + esc(money(total)) + '</p>';
  html += '</section>';
  return html;
}

function duenoAltaGasto(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  var concepto = document.getElementById("gasto-concepto").value.trim();
  var importe = Number(document.getElementById("gasto-importe").value) || 0;
  var categoria = document.getElementById("gasto-categoria").value;
  if (!concepto || importe <= 0) { toast("Falta concepto o importe"); return false; }
  mutate(function (s) {
    s.gastos.push({ id: "g" + Date.now(), concepto: concepto, importe: importe, categoria: categoria, hora: nowHM() });
    addLog("registró gasto " + concepto + " (" + importe + " €)", "gasto");
  });
  return false;
}

function duenoBorrarGasto(id) {
  mutate(function (s) {
    var idx = s.gastos.findIndex(function (g) { return g.id === id; });
    if (idx === -1) return;
    var g = s.gastos[idx];
    s.gastos.splice(idx, 1);
    addLog("eliminó gasto " + g.concepto + " (" + g.importe + " €)", "gasto");
  });
}

/* ---------- 8. Stock ---------- */

function seccionStock() {
  var html = '<section class="panel" data-testid="seccion-stock"><h2>Stock de barra</h2>';
  state.config.productos.forEach(function (p) {
    html += '<div class="fila-stock" data-testid="stock-' + esc(p.id) + '">' + esc(p.nombre) + ': ' + esc(p.stock) + ' uds' +
      ' <button type="button" data-testid="stock-mas-' + esc(p.id) + '" onclick="duenoReponerStock(\'' + p.id + '\')">+10</button></div>';
  });
  html += '</section>';
  return html;
}

function duenoReponerStock(id) {
  mutate(function () {
    var p = productoPorId(id);
    if (!p) return;
    p.stock += 10;
    addLog("repuso 10 unidades de stock de " + p.nombre, "stock");
  });
}

/* ---------- 9. Cierre + histórico + CSV ---------- */

function seccionCierre() {
  var html = '<section class="panel" data-testid="seccion-cierre"><h2>Cierre e informes</h2>';
  html += '<button type="button" class="btn" data-testid="btn-informe-csv" onclick="duenoDescargarCsv()">Descargar informe (CSV)</button> ';
  html += '<button type="button" class="btn btn-peligro" data-testid="btn-cerrar" onclick="duenoMostrarConfirmarCierre()">Cerrar evento</button>';
  if (duenoMostrandoConfirmarCierre) {
    html += '<div data-testid="confirmar-cierre" class="confirmar">' +
      '<p>Esto archiva la fiesta en el histórico y resetea aforo, caja, RRPP, stock y gastos. ' +
      'La configuración, el personal y los precios se conservan.</p>' +
      '<button type="button" data-testid="btn-confirmar-cierre" onclick="duenoConfirmarCierre()">Sí, cerrar y archivar</button> ' +
      '<button type="button" onclick="duenoCancelarCierre()">Cancelar</button></div>';
  }
  html += seccionHistorico();
  html += '</section>';
  return html;
}

function duenoMostrarConfirmarCierre() { duenoMostrandoConfirmarCierre = true; renderDueno(); }
function duenoCancelarCierre() { duenoMostrandoConfirmarCierre = false; renderDueno(); }

function duenoConfirmarCierre() {
  duenoMostrandoConfirmarCierre = false;
  mutate(function (s) {
    var caja = cajaDesglose();
    var gastosTotal = s.gastos.reduce(function (a, g) { return a + g.importe; }, 0);
    var dentroCount = s.personas.filter(function (p) { return p.dentro; }).length;
    s.historico.push({
      id: "h" + Date.now(),
      nombre: s.config.eventName,
      fecha: nowHM(),
      totales: caja,
      recaudacionPorPerfil: JSON.parse(JSON.stringify(s.recaudacionPorPerfil)),
      rrpp: JSON.parse(JSON.stringify(s.rrpp)),
      gastos: JSON.parse(JSON.stringify(s.gastos)),
      beneficioNeto: caja.total - gastosTotal,
      asistentes: dentroCount,
      log: JSON.parse(JSON.stringify(s.log))
    });
    s.personas = [];
    Object.keys(s.carritos).forEach(function (k) { s.carritos[k] = []; });
    Object.keys(s.recaudacionPorPerfil).forEach(function (k) { s.recaudacionPorPerfil[k] = 0; });
    s.ingresosBarra = 0;
    s.gastos = [];
    s.bonos = [];
    s.rrpp.forEach(function (r) { r.vendidas = 0; });
    s.config.productos.forEach(function (p) { p.stock = p.stockInicial; });
    s.log = [];
    addLog("cerró el evento y abrió uno nuevo", "cierre");
  });
  toast("Evento cerrado y archivado");
}

function seccionHistorico() {
  var lista = state.historico;
  var html = '<div data-testid="historico"><h3>Histórico de fiestas</h3>';
  if (!lista.length) {
    html += '<p>Sin fiestas archivadas todavía.</p>';
  } else {
    lista.slice().reverse().forEach(function (h) {
      html += '<div class="historico-item" data-testid="historico-item"><p><b>' + esc(h.nombre) + '</b> · ' +
        esc(h.fecha) + ' · Asistentes: ' + esc(h.asistentes) + ' · Beneficio neto: ' + esc(money(h.beneficioNeto)) + '</p>';
      html += '<button type="button" data-testid="historico-csv-' + esc(h.id) + '" onclick="duenoDescargarCsvHistorico(\'' + h.id + '\')">Descargar CSV</button></div>';
    });
  }
  html += '</div>';
  return html;
}

function csvEscape(v) {
  var s = String(v === null || v === undefined ? "" : v);
  if (/[",\n;]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function construirCsv(d) {
  var L = [];
  L.push("Informe: " + d.nombre, "Fecha;" + d.fecha, "");
  L.push("RESUMEN FINANCIERO");
  L.push("Taquilla;" + d.totales.taquilla, "Mesas VIP;" + d.totales.vip, "Barra;" + d.totales.barra,
    "RRPP (pendiente de entrega);" + d.totales.netoRRPP, "Total;" + d.totales.total,
    "Gastos;" + d.gastosTotal, "Beneficio neto;" + d.beneficioNeto, "");
  L.push("RECAUDACIÓN POR TERMINAL");
  Object.keys(d.recaudacionPorPerfil).forEach(function (id) {
    L.push(csvEscape(etiquetaPerfil(id)) + ";" + d.recaudacionPorPerfil[id]);
  });
  L.push("", "LIQUIDACIÓN RRPP", "Nombre;Vendidas;Precio;Comisión;Total;Neto");
  d.rrpp.forEach(function (r) {
    L.push(csvEscape(r.nombre) + ";" + r.vendidas + ";" + r.precio + ";" + r.comision + ";" +
      (r.vendidas * r.precio) + ";" + (r.vendidas * r.precio - r.vendidas * r.comision));
  });
  L.push("", "GASTOS", "Concepto;Importe;Categoría;Hora");
  d.gastos.forEach(function (g) { L.push(csvEscape(g.concepto) + ";" + g.importe + ";" + csvEscape(g.categoria) + ";" + g.hora); });
  L.push("", "ASISTENTES");
  if (d.personas) {
    L.push("Nombre;Apellido;Tipo;Dentro;Hora entrada");
    d.personas.forEach(function (p) {
      L.push(csvEscape(p.nombre) + ";" + csvEscape(p.apellido) + ";" + csvEscape(p.tipo) + ";" +
        (p.dentro ? "Sí" : "No") + ";" + csvEscape(p.horaEntrada || ""));
    });
  } else {
    L.push("Asistentes registrados;" + d.asistentes);
  }
  L.push("", "LOG");
  d.log.forEach(function (e) { L.push(csvEscape(e.hora) + ";" + csvEscape(e.actor) + ";" + csvEscape(e.texto)); });
  return L.join("\n");
}

function descargarCsv(nombreArchivo, contenido) {
  var blob = new Blob([contenido], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = nombreArchivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function duenoDescargarCsv() {
  var s = state;
  var caja = cajaDesglose();
  var gastosTotal = s.gastos.reduce(function (a, g) { return a + g.importe; }, 0);
  var datos = {
    nombre: s.config.eventName, fecha: nowHM(), totales: caja, gastosTotal: gastosTotal,
    beneficioNeto: caja.total - gastosTotal, recaudacionPorPerfil: s.recaudacionPorPerfil,
    rrpp: s.rrpp, gastos: s.gastos, personas: s.personas, log: s.log
  };
  descargarCsv("informe-" + s.config.eventName.replace(/\s+/g, "_") + ".csv", construirCsv(datos));
}

function duenoDescargarCsvHistorico(id) {
  var h = state.historico.find(function (x) { return x.id === id; });
  if (!h) return;
  var datos = {
    nombre: h.nombre, fecha: h.fecha, totales: h.totales,
    gastosTotal: h.gastos.reduce(function (a, g) { return a + g.importe; }, 0),
    beneficioNeto: h.beneficioNeto, recaudacionPorPerfil: h.recaudacionPorPerfil,
    rrpp: h.rrpp, gastos: h.gastos, asistentes: h.asistentes, log: h.log
  };
  descargarCsv("informe-" + h.nombre.replace(/\s+/g, "_") + "-" + h.id + ".csv", construirCsv(datos));
}

/* ---------- 10. Log ---------- */

  var html = '<section class="panel" data-testid="log"><h2>Registro de actividad</h2><p class="nota">Registro inmutable</p><ul class="log-lista">';
  state.log.forEach(function (e) {
    html += '<li>' + esc(e.hora) + ' · ' + esc(e.actor) + ' ' + esc(e.texto) + '</li>';

  return html;
}
