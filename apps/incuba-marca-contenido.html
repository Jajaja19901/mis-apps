<style>
  :root{
    --bg:#0b1020; --bg2:#0e1530; --surface:#131b35; --surface2:#1a2342;
    --line:#26315a; --text:#eaf0ff; --muted:#9aa6c8; --muted2:#717ea8;
    --brand:#22c55e; --brand-d:#16a34a; --lime:#a3e635; --accent:#38bdf8;
    --warn:#fbbf24; --danger:#fb7185;
    --r:16px; --r-sm:11px; --maxw:780px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    font-synthesis-weight:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #16224a 0%, var(--bg) 55%) fixed, var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding-bottom:84px;
  }
  a{color:var(--accent)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
  header.top{
    position:sticky;top:0;z-index:30;backdrop-filter:saturate(140%) blur(10px);
    background:linear-gradient(180deg, rgba(11,16,32,.92), rgba(11,16,32,.72));
    border-bottom:1px solid var(--line);
  }
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;max-width:var(--maxw);margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px;color:var(--text);text-decoration:none}
  .logo .mark{width:30px;height:30px;flex:0 0 auto;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--lime));display:grid;place-items:center;box-shadow:0 4px 14px rgba(34,197,94,.4)}
  .logo .mark svg{width:20px;height:20px;display:block}
  .logo small{display:block;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.3px;margin-top:-2px}
  .btn-install{margin-left:auto;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}

  /* hero */
  .hero{padding:26px 0 6px}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--lime);background:rgba(163,230,53,.08);border:1px solid rgba(163,230,53,.25);padding:5px 11px;border-radius:999px}
  h1{font-size:clamp(25px,7vw,40px);line-height:1.08;margin:14px 0 8px;letter-spacing:-.5px}
  h1 .g{background:linear-gradient(90deg,var(--brand),var(--lime));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--muted);font-size:16px;max-width:60ch}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .pill{font-size:12.5px;font-weight:700;color:var(--text);background:var(--surface);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
  .pill b{color:var(--brand)}

  /* cards & sections */
  section{padding:18px 0}
  h2{font-size:20px;margin:6px 0 4px;letter-spacing:-.3px}
  h2 .num{color:var(--brand);font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin:0 0 14px}
  .grid{display:grid;gap:12px}
  @media(min-width:620px){.grid.two{grid-template-columns:1fr 1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .card h3{margin:2px 0 6px;font-size:16.5px;letter-spacing:-.2px}
  .card p{margin:6px 0;color:var(--muted);font-size:14px}
  .card .lbl{font-weight:800;color:var(--text)}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .badge{font-size:11px;font-weight:800;letter-spacing:.3px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--bg2);text-transform:uppercase}
  .badge.p1{color:#7dd3fc;border-color:rgba(125,211,252,.35)}
  .badge.p2{color:var(--lime);border-color:rgba(163,230,53,.35)}
  .badge.p3{color:#c4b5fd;border-color:rgba(196,181,253,.35)}
  .badge.p4{color:#fda4af;border-color:rgba(253,164,175,.35)}
  .badge.plat{color:var(--muted);text-transform:none}

  .btnrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  button{font-family:inherit}
  .btn{cursor:pointer;border-radius:11px;padding:9px 14px;font-size:13.5px;font-weight:800;border:1px solid transparent;transition:transform .06s ease, background .15s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#05230f;border-color:var(--brand-d)}
  .btn.ghost{background:var(--surface2);color:var(--text);border-color:var(--line)}
  .btn.ghost.ok{background:rgba(34,197,94,.16);border-color:var(--brand);color:var(--brand)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
  .btn.block{display:block;width:100%;text-align:center}

  .detail{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
  .detail[hidden]{display:none}
  .scene{display:grid;grid-template-columns:46px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid rgba(38,49,90,.5)}
  .scene:last-child{border-bottom:0}
  .scene .t{font-weight:800;color:var(--brand);font-size:12.5px;padding-top:2px}
  .scene .v{font-size:13.5px}
  .scene .v em{color:var(--muted);font-style:normal;display:block;margin-top:3px;font-size:12.5px}
  .ot{color:var(--text);font-weight:700}
  .promptbox{background:#0a0f22;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;font-size:12.8px;color:#cdd7f5;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .kv{font-size:13px;color:var(--muted);margin:8px 0 0}
  .kv b{color:var(--text)}
  .hashtags{color:var(--accent);font-size:12.5px;margin-top:8px;word-spacing:2px}

  .filters{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 14px}
  .chip{cursor:pointer;font-size:12.5px;font-weight:800;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
  .chip.active{background:linear-gradient(135deg,var(--brand),var(--lime));color:#05230f;border-color:transparent}

  .ref{display:flex;gap:12px;align-items:flex-start}
  .ref .av{width:42px;height:42px;flex:0 0 auto;border-radius:12px;background:var(--surface2);display:grid;place-items:center;font-weight:900;color:var(--lime);font-size:17px;border:1px solid var(--line)}
  .anat{counter-reset:step}
  .anat .step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(38,49,90,.5)}
  .anat .step:last-child{border-bottom:0}
  .anat .step .n{width:30px;height:30px;flex:0 0 auto;border-radius:9px;background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;font-weight:900;color:var(--brand)}
  .note{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.25);border-radius:12px;padding:12px 14px;color:#cfe6ff;font-size:13.5px;margin-top:12px}
  .note.warn{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3);color:#ffe9bd}

  /* calendar */
  .day{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:stretch}
  .day .d{background:var(--surface2);border:1px solid var(--line);border-radius:12px;display:grid;place-items:center;text-align:center;font-weight:900;color:var(--lime);line-height:1.05;font-size:12px;padding:8px 4px}
  .day .d span{display:block;font-size:20px;color:var(--text)}
  .slot{font-size:13.5px;margin:3px 0;padding-left:14px;position:relative}
  .slot:before{content:"";position:absolute;left:0;top:8px;width:7px;height:7px;border-radius:50%;background:var(--brand)}
  .slot .meta{color:var(--muted2);font-size:12px}

  /* admin */
  .field{margin:10px 0}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:5px}
  input[type=text],input[type=password],input[type=date],textarea,select{
    width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:11px 13px;font-size:15px;font-family:inherit}
  textarea{min-height:66px;resize:vertical}
  .adminrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(38,49,90,.6)}
  .adminrow:last-child{border-bottom:0}
  .adminrow .t{flex:1;min-width:0}
  .adminrow .t b{font-size:14px}
  .adminrow .t small{display:block;color:var(--muted2);font-size:12px}
  .status{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .status.on{color:var(--brand);border-color:var(--brand);background:rgba(34,197,94,.12)}
  .err{color:var(--danger);font-size:13px;margin-top:8px;font-weight:700}
  .ok-msg{color:var(--brand);font-size:13px;margin-top:8px;font-weight:700}

  /* bottom nav */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:linear-gradient(180deg, rgba(11,16,32,.6), rgba(11,16,32,.96));backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .tabs-inner{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr)}
  .tabs a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 11px;color:var(--muted2);text-decoration:none;font-size:10px;font-weight:700}
  .tabs a svg{width:21px;height:21px}
  .tabs a.active{color:var(--brand)}
  .tabs a.active svg{filter:drop-shadow(0 0 6px rgba(34,197,94,.5))}

  footer{border-top:1px solid var(--line);margin-top:18px;padding:20px 0 8px;color:var(--muted2);font-size:12.5px;text-align:center}
  footer .studio{color:var(--muted);font-weight:700}
  footer .studio b{color:var(--lime)}
  .hr{height:1px;background:var(--line);border:0;margin:18px 0}
  .small{font-size:12px;color:var(--muted2)}
</style>
</head>

/* ============================================================
   COPIAR AL PORTAPAPELES (con feedback y sin errores)
   ============================================================ */
function flash(btn, txt){
  if(!btn) return;
  const o = btn.getAttribute("data-label") || btn.textContent;
  btn.setAttribute("data-label", o);
  btn.textContent = txt; btn.classList.add("ok");
  setTimeout(()=>{ btn.textContent = o; btn.classList.remove("ok"); }, 1600);
}
function fallbackCopy(t){
  try{
    const ta=document.createElement("textarea"); ta.value=t;
    ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); ta.remove();
  }catch(e){}
}
function copyText(t, btn){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(()=>flash(btn,"¡Copiado! ✓")).catch(()=>{ fallbackCopy(t); flash(btn,"¡Copiado! ✓"); });
    }else{ fallbackCopy(t); flash(btn,"¡Copiado! ✓"); }
  }catch(e){ fallbackCopy(t); flash(btn,"¡Copiado! ✓"); }
}
function guionById(id){ return GUIONES.find(g=>g.id===id); }
function guionToText(g){
  const lines=[];
  lines.push("🎬 "+g.titulo+"  ["+PILAR[g.pilar].n+" · "+g.formato+" · "+g.dur+"]");

  lines.push("");
  lines.push("GUION:");
  g.escenas.forEach(s=>lines.push("  ["+s.t+"] "+s.ot+"  —  ("+s.v+")"));
  lines.push("");
  lines.push("CTA: "+g.cta);
  lines.push("Hashtags: "+g.hashtags.join(" "));
  lines.push("");
  lines.push("HERRAMIENTA: "+g.herramienta);
  lines.push("PROMPT IA: "+g.prompt);
  return lines.join("\n");
}

/* ============================================================
   ROUTER
   ============================================================ */
const ROUTES = {
  "/":viewHome, "/guiones":viewGuiones, "/formulas":viewFormulas,
  "/referentes":viewReferentes, "/herramientas":viewHerramientas,
  "/calendario":viewCalendario, "/admin":viewAdmin
};
function currentRoute(){
  let h = location.hash.replace(/^#/,"");
  if(!h || h==="/") return "/";
  return h;
}
function render(){
  const r = currentRoute();
  const view = ROUTES[r] || viewHome;
  $("#app").innerHTML = view();
  // marca pestaña activa
  document.querySelectorAll("nav.tabs a").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("data-tab")===("/"+r.replace(/^\//,"")) || (r==="/"&&a.getAttribute("data-tab")==="/"));
  });
  window.scrollTo(0,0);
}

/* ============================================================
   EVENTOS (delegación)
   ============================================================ */
function adminMsg(txt){
  const m=$("#admin-msg"); if(!m) return;
  m.textContent=txt; m.hidden=false; setTimeout(()=>{ if(m) m.hidden=true; },2200);
}
document.addEventListener("click",(e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const a = el.getAttribute("data-action");

  if(a==="toggle"){
    const d = $("#d-"+el.getAttribute("data-id"));
    if(d){ const open=!d.hidden; d.hidden=open; el.textContent = open ? "Ver guion completo ▾" : "Ocultar guion ▴"; }
  }
  else if(a==="copy"){
    const g = guionById(el.getAttribute("data-id")); if(!g) return;
    const kind = el.getAttribute("data-kind");
    copyText(kind==="full"?guionToText(g):g.prompt, el);
  }
  else if(a==="filter"){
    filtro = el.getAttribute("data-f"); render();
  }
  else if(a==="togglepub"){
    const id=el.getAttribute("data-id");
    STATE.pub[id] = !STATE.pub[id];
    if(!STATE.pub[id]) delete STATE.pub[id];
    saveState(STATE); render();
  }
  else if(a==="delidea"){
    STATE.ideas.splice(+el.getAttribute("data-i"),1); saveState(STATE); render();
  }
  else if(a==="logout"){ isAdmin=false; render(); }
  else if(a==="export"){
    try{
      const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const link=document.createElement("a"); link.href=url; link.download="incuba-contenido.json";
      document.body.appendChild(link); link.click(); link.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(err){}
    adminMsg("Copia de seguridad descargada ✓");
  }
});
document.addEventListener("submit",(e)=>{
  if(e.target.id==="form-login"){
    e.preventDefault();
    const pass = $("#admin-pass") ? $("#admin-pass").value : "";
    if(pass===CONFIG.ADMIN_PASSWORD){ isAdmin=true; render(); }
    else{ const er=$("#login-err"); if(er) er.hidden=false; }
  }
  else if(e.target.id==="form-idea"){
    e.preventDefault();
    const t = $("#idea-titulo") ? $("#idea-titulo").value.trim() : "";
    const p = $("#idea-pilar") ? $("#idea-pilar").value : "valor";
    if(t){ STATE.ideas.unshift({titulo:t,pilar:p}); saveState(STATE); render(); adminMsg("Idea guardada ✓"); }
  }
});

/* ============================================================
   PWA: manifest embebido + favicon (generados en runtime)
   ============================================================ */
(function pwa(){
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0b1020"/><g><path d="M32 54V28" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/><path d="M32 34c-4-9-12-11-19-10C13 33 21 39 32 39Z" fill="#22c55e"/><path d="M32 30c3-8 10-10 16-9C47 28 41 33 32 33Z" fill="#a3e635"/></g></svg>';
  const dataSvg = "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
  const fav=document.createElement("link"); fav.rel="icon"; fav.type="image/svg+xml"; fav.href=dataSvg; document.head.appendChild(fav);
  const apple=document.createElement("link"); apple.rel="apple-touch-icon"; apple.href=dataSvg; document.head.appendChild(apple);
  try{
    const manifest={ name:"Incuba tu Negocio · Contenido", short_name:"Incuba", start_url:".",
      display:"standalone", background_color:"#0b1020", theme_color:"#0b1020",
      icons:[{src:dataSvg,sizes:"any",type:"image/svg+xml"}] };
    const burl=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));
    const m=document.createElement("link"); m.rel="manifest"; m.href=burl; document.head.appendChild(m);
  }catch(e){}
  let deferred=null;
  window.addEventListener("beforeinstallprompt",(ev)=>{ ev.preventDefault(); deferred=ev; const b=$("#btn-install"); if(b) b.hidden=false; });
  const ib=$("#btn-install");
  if(ib) ib.addEventListener("click",async()=>{ if(deferred){ deferred.prompt(); try{await deferred.userChoice;}catch(e){} deferred=null; ib.hidden=true; } });
})();

/* footer dinámico */
(function footer(){
  const f=document.createElement("footer"); f.className="wrap";
  const studio = CONFIG.STUDIO_URL
    ? `Diseñado por <a href="${esc(CONFIG.STUDIO_URL)}" target="_blank" rel="noopener"><b>Incuba tu Negocio</b></a> · por ${esc(CONFIG.STUDIO_AUTHOR)}`
    : `Diseñado por <b>Incuba tu Negocio</b> · por ${esc(CONFIG.STUDIO_AUTHOR)}`;
  f.innerHTML = `<hr class="hr"><p class="studio">${studio}</p><p class="small">Centro de contenido interno · ${esc(CONFIG.HANDLE)}</p>`;
  document.body.appendChild(f);
})();

/* arranque */
window.addEventListener("hashchange", render);
render();
