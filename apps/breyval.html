<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breyval · Webs y apps profesionales para tu negocio, desde 250€</title>
<meta name="description" content="Breyval crea tu web o app profesional, lista en días y por una fracción de lo que cobra un programador. Sin registros, sin RGPD. Pide tu demo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#1b2430; --ink-soft:#566372; --ink-mut:#5e6e80;
    --brand:#e07a36; --brand-deep:#a84e18; --brand-soft:#fdeee2;
    --slate:#1f3349; --slate-2:#27384d; --slate-soft:#eef1f5; --line:#e3e8ee; --ok:#2f8a52;
    --sora:'Sora',sans-serif; --sans:'Inter',-apple-system,sans-serif;
    --shadow:0 1px 2px rgba(20,30,45,.05),0 10px 30px rgba(20,30,45,.07);
    --shadow-lg:0 30px 60px rgba(20,30,45,.12);
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--sora);font-weight:700;letter-spacing:-.02em;line-height:1.15}
  .wrap{max-width:1060px;margin:0 auto;padding:0 20px}
  a{color:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:15px;border:none;border-radius:999px;padding:15px 28px;cursor:pointer;transition:transform .15s,background .2s,box-shadow .2s;text-decoration:none;line-height:1}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--brand-deep);color:#fff;box-shadow:0 8px 22px rgba(197,97,31,.28)}
  .btn-primary:hover{background:#a8500f}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-light{background:#fff;color:var(--slate)}
  .btn-lg{padding:18px 34px;font-size:16px}
  .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--brand-deep);font-weight:700}
  :focus-visible{outline:3px solid var(--brand-deep);outline-offset:2px;border-radius:6px}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip{position:absolute;left:12px;top:-60px;z-index:200;background:var(--slate);color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;transition:top .15s}
  .skip:focus{top:12px}

  header.site{position:sticky;top:0;z-index:50;background:rgba(246,247,249,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-family:var(--sora);font-weight:800;font-size:20px;display:flex;align-items:center;gap:9px;color:var(--slate);text-decoration:none}
  .logo span{line-height:1}
  header .nav-cta{font-size:14px;padding:11px 20px}

  /* HERO */
  .hero{background:linear-gradient(160deg,var(--slate) 0%,var(--slate-2) 100%);color:#fff;padding:70px 0 80px;position:relative;overflow:hidden}
  .hero .wrap{position:relative;z-index:2;text-align:center}
  .hero .eyebrow{color:#ffb47a}
  .hero h1{font-size:clamp(34px,7vw,58px);font-weight:800;margin:16px auto 18px;max-width:820px}
  .hero h1 em{font-style:normal;color:var(--brand)}
  .hero p.sub{font-size:clamp(17px,2.4vw,20px);color:#cfdae6;max-width:600px;margin:0 auto 30px}
  .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .hero-meta{display:flex;gap:14px 26px;justify-content:center;flex-wrap:wrap;margin-top:34px;color:#aebccd;font-size:14px}
  .hero-meta span{display:inline-flex;align-items:center;gap:7px}
  .hero-meta svg{width:17px;height:17px;color:var(--brand)}
  .hero::after{content:"";position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(224,122,54,.22),transparent 70%);z-index:1}

  section{padding:64px 0}
  .sec-head{text-align:center;max-width:620px;margin:0 auto 40px}
  .sec-head h2{font-size:clamp(26px,5vw,40px);margin:10px 0}
  .sec-head p{color:var(--ink-soft);font-size:17px}
  .grid{display:grid;gap:18px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}

  /* TRUST BAR */
  .trustbar{background:var(--slate-soft);padding:22px 0}
  .trustbar .wrap{display:flex;justify-content:space-around;flex-wrap:wrap;gap:16px;text-align:center}
  .trustbar .ti b{font-family:var(--sora);display:block;font-size:18px;color:var(--slate)}
  .trustbar .ti small{color:var(--ink-mut)}

  /* PARA QUIEN */
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:760px;margin:0 auto}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-weight:500;font-size:15px;box-shadow:var(--shadow)}

  /* PROBLEMA / SOLUCION */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch}
  .panel{border-radius:var(--radius);padding:28px}
  .panel.bad{background:#fdf0ed;border:1px solid #f3d3cb}
  .panel.good{background:#eafaf0;border:1px solid #c9ecd6}
  .panel h3{font-size:20px;margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .panel ul{list-style:none;display:flex;flex-direction:column;gap:11px}
  .panel li{display:flex;gap:10px;align-items:flex-start;font-size:15px;color:var(--ink-soft)}
  .panel li .m{flex-shrink:0;font-size:17px}

  /* PASOS */
  .step-ic{width:46px;height:46px;border-radius:12px;background:var(--brand-soft);color:var(--brand-deep);display:flex;align-items:center;justify-content:center;font-family:var(--sora);font-weight:700;font-size:20px;margin-bottom:14px}
  .card h3{font-size:19px;margin-bottom:7px}
  .card p{color:var(--ink-soft);font-size:15px}

  /* DEMOS */
  .demo-card{display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;transition:transform .18s,box-shadow .18s}
  .demo-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .demo-ic{font-size:34px;margin-bottom:8px}
  .demo-card .play{margin-top:12px;color:var(--brand-deep);font-weight:600;font-size:14px}

  /* ANCLAJE */
  .anchor-box{background:var(--slate);color:#fff;border-radius:24px;padding:40px 28px;text-align:center;max-width:760px;margin:0 auto}
  .anchor-row{display:flex;justify-content:center;align-items:stretch;gap:14px;flex-wrap:wrap;margin:22px 0 10px}
  .anchor-col{flex:1;min-width:170px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px}
  .anchor-col.win{background:var(--brand-deep);border-color:var(--brand-deep)}
  .anchor-col small{display:block;color:#cfdae6;font-size:13px;text-transform:uppercase;letter-spacing:.08em}
  .anchor-col.win small{color:#fff}
  .anchor-col b{font-family:var(--sora);font-size:clamp(22px,5vw,30px);display:block;margin-top:6px}
  .anchor-box .disc{color:#9fb0c2;font-size:12px;margin-top:14px}

  /* NIVELES */
  .planes{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
  .plan{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:22px 18px;display:flex;flex-direction:column;box-shadow:var(--shadow);position:relative}
  .plan.top{border-color:var(--brand);box-shadow:var(--shadow-lg)}
  .plan .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
  .plan h3{font-size:19px}
  .plan .price{font-family:var(--sora);font-weight:800;font-size:26px;color:var(--slate);margin:8px 0 2px}
  .plan .para{font-size:13px;color:var(--ink-mut);min-height:34px}
  .plan ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin:14px 0 18px;flex:1}
  .plan li{font-size:13.5px;color:var(--ink-soft);display:flex;gap:8px;align-items:flex-start}
  .plan li svg{width:15px;height:15px;color:var(--ok);flex-shrink:0;margin-top:3px}
  .plan .btn{width:100%}
  .pay-note{text-align:center;color:var(--ink-soft);max-width:640px;margin:24px auto 0;font-size:15px;background:var(--slate-soft);border-radius:14px;padding:16px 20px}
  .extras{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .extra{background:var(--card);border:1px dashed var(--brand);border-radius:14px;padding:14px 20px;font-size:14px}
  .extra b{color:var(--brand-deep)}

  /* SOCIO */
  .socio{background:linear-gradient(160deg,var(--brand) 0%,var(--brand-deep) 100%);color:#fff;border-radius:24px;padding:44px 30px;text-align:center;max-width:820px;margin:0 auto}
  .socio h2{color:#fff;font-size:clamp(24px,5vw,34px)}
  .socio p{color:#ffe7d6;max-width:560px;margin:12px auto 0;font-size:17px}

  /* FAQ */
  .faq{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
  details{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0;box-shadow:var(--shadow);overflow:hidden}
  summary{padding:18px 20px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:12px}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"+";font-size:22px;color:var(--brand-deep);transition:transform .2s}
  details[open] summary::after{transform:rotate(45deg)}
  details .a{padding:0 20px 18px;color:var(--ink-soft);font-size:15px}

  /* FORM */
  .form-wrap{background:var(--slate);color:#fff;border-radius:24px;padding:42px 28px;max-width:660px;margin:0 auto}
  .form-wrap h2{color:#fff;text-align:center;font-size:clamp(26px,5vw,36px)}
  .form-wrap p.s{color:#cfdae6;text-align:center;margin:8px auto 26px;max-width:440px}
  .ff{margin-bottom:14px}
  .ff label{display:block;font-size:13px;color:#cfdae6;margin-bottom:6px}
  .ff input,.ff select,.ff textarea{width:100%;background:#2e4257;border:1px solid #3c5571;color:#fff;border-radius:12px;padding:14px 15px;font-family:var(--sans);font-size:16px}
  .ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--brand)}
  .ff input:focus-visible,.ff select:focus-visible,.ff textarea:focus-visible{outline:2px solid #ffb47a;outline-offset:1px}
  .ff textarea{min-height:90px;resize:vertical}
  .ff.bad input,.ff.bad select{border-color:#ff8a6e}
  .ff .err{color:#ffc2b3;font-size:13px;margin-top:5px;display:none}
  .ff.bad .err{display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-wrap .btn-primary{width:100%;margin-top:6px;background:var(--brand-deep)}
  .form-wrap .btn-primary:hover{background:#fff;color:var(--brand-deep)}
  .priv{text-align:center;color:#9fb0c2;font-size:12px;margin-top:14px}

  footer.site{background:var(--slate);color:#aebccd;padding:42px 0 30px;font-size:15px}
  footer .cols{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:24px}
  footer h4{font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#fff;margin-bottom:12px}
  footer a{display:block;margin-bottom:8px;text-decoration:none;color:#aebccd}
  footer a:hover{color:#fff}
  footer .logo{color:#fff}
  .copyr{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.12);font-size:13px;color:#7f93a8;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .copyr a{color:#7f93a8;display:inline}

  .fab{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(37,211,102,.45);z-index:60;text-decoration:none;will-change:transform}
  .fab:focus-visible{outline:3px solid #fff;outline-offset:3px}
  .fab svg{width:30px;height:30px;fill:#fff}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.3s;z-index:100;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* GRACIAS */
  .gracias{text-align:center;max-width:540px;margin:0 auto;padding:50px 0}
  .gracias .ok{width:74px;height:74px;border-radius:50%;background:var(--ok);margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
  .gracias .ok svg{width:36px;height:36px;color:#fff}
  .gracias h1{font-size:32px;margin-bottom:10px}
  .gracias p{color:var(--ink-soft);margin-bottom:22px}

  /* ADMIN */
  .admin{min-height:100vh;padding:24px 0;background:var(--bg)}
  .gate{max-width:380px;margin:8vh auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
  .gate h2{font-size:23px;margin-bottom:6px}
  .gate p{color:var(--ink-soft);font-size:14px;margin-bottom:18px}
  .gate input{width:100%;border:1px solid var(--line);border-radius:11px;padding:14px;font-size:16px;font-family:var(--sans);margin-bottom:12px}
  .gate input:focus{border-color:var(--brand)}
  .gate .btn-primary{width:100%}
  .gate .err{color:#c43d2a;font-size:13px;margin-top:10px;display:none}
  .gate.bad .err{display:block}
  .admin-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .admin-bar h2{font-size:24px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 18px;min-width:110px}
  .stat .big{font-family:var(--sora);font-size:24px;color:var(--brand-deep);font-weight:700}
  .stat small{color:var(--ink-mut);font-size:12px;text-transform:uppercase}
  .lead{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .lead-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .lead b.nm{font-size:16px}
  .lead .meta{color:var(--ink-mut);font-size:13px;margin:2px 0}
  .lead .msg{background:var(--bg);border-radius:10px;padding:9px 12px;margin:8px 0;font-size:14px;color:var(--ink-soft)}
  .lead .r2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .lead select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:13px;background:var(--card)}
  .tag{font-size:12px;padding:3px 10px;border-radius:999px;font-weight:600}
  .tag.nuevo{background:#e6f0ff;color:#2b5bb5}.tag.contactado{background:#fff2d9;color:#7e5700}.tag.cerrado{background:#e3f3e8;color:#1e6b38}
  .lead a.wa{color:var(--ok);font-weight:600;font-size:13px;text-decoration:none}
  .lead button.del{background:none;border:none;color:var(--ink-mut);cursor:pointer;font-size:13px}
  .lead button.del:hover{color:#c43d2a}
  .empty{text-align:center;color:var(--ink-mut);padding:46px 20px}.empty .ic{font-size:40px;margin-bottom:10px}

  @media(max-width:900px){.planes{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:1fr 1fr}}
  @media(max-width:760px){.g3{grid-template-columns:1fr}.split{grid-template-columns:1fr}footer .cols{grid-template-columns:1fr;gap:18px}.row2{grid-template-columns:1fr}header .nav-cta{padding:9px 14px;font-size:13px}}
  @media(max-width:520px){.planes{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
/* ==================================================================
   ⚙️  CONFIGURA BREYVAL AQUÍ
   ================================================================== */
const CONFIG = {
  BUSINESS_NAME : "Breyval",
  WHATSAPP      : "34694252706",
  EMAIL         : "Breyval.soluciones.solares@gmail.com",
  ADMIN_PASSWORD: "breyval-2026",     // ⚠️ CÁMBIALA. Cerrojo básico, visible en el código.
  BRIEFING_URL  : "../briefing.html",
  MERCADO_MIN   : 2000,
  MERCADO_MAX   : 4000,
  DEMOS: [
    { icon:"🏗️", name:"Presupuestador de reformas", desc:"Calcula presupuestos al instante y capta clientes. Reformas y energía solar.", url:"./reformas-presupuestador.html" },
    { icon:"💇", name:"Peluquería · embudo de citas", desc:"Web de reservas con panel del dueño y export de clientes.", url:"./peluqueria-aurora.html" },
  ],
  NIVELES: [
    { id:"Básica",       precio:"desde 250€", para:"Para tener presencia profesional ya.",
      incluye:["Web de 1 página, mobile-first","Botón de WhatsApp y contacto","Tu panel para ver solicitudes","Lista en pocos días"] },
    { id:"Mediana",      precio:"desde 450€", para:"Para empezar a captar clientes.",
      incluye:["Todo lo de Básica","Galería, testimonios y FAQ","Formulario de captación","Panel con estados y export CSV"] },
    { id:"Grande",       precio:"desde 650€", para:"Para negocios con servicios o catálogo.", destacado:true,
      incluye:["Todo lo de Mediana","Una función fuerte: reservas, presupuestador o catálogo","Panel de gestión completo"] },
    { id:"Premium",      precio:"desde 850€", para:"Para una app que de verdad 'hace cosas'.",
      incluye:["Todo lo de Grande","Varias funciones combinadas","Multi-idioma / blog","Diseño más cuidado"] },
    { id:"Premium Plus", precio:"Premium + bot", para:"Para automatizar la atención al cliente.",
      incluye:["Todo lo de Premium","Bot integrado de atención","Lo más completo"] },
  ],
};

const LEADS_KEY="breyval_leads_v1", ADMIN_KEY="breyval_admin_ok", GATE_KEY="breyval_gate";
let preNivel=""; // nivel preseleccionado al pulsar una tarjeta

/* almacenamiento */
function loadLeads(){ try{ const r=localStorage.getItem(LEADS_KEY); return r?JSON.parse(r):[]; }catch(e){ return []; } }
function saveLeads(l){ try{ localStorage.setItem(LEADS_KEY, JSON.stringify(l)); }catch(e){ showToast("No se pudo guardar"); } }
function esc(s){ if(s==null) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

/* ROUTER: #/admin y #/gracias son vistas; el resto = landing (con anclas) */
let view="";
function route(){
  const h=location.hash;
  if(h==="#/admin"){ view="admin"; renderAdmin(); window.scrollTo(0,0); return; }
  if(h==="#/gracias"){ view="gracias"; renderGracias(); window.scrollTo(0,0); return; }
  if(view!=="landing"){ view="landing"; renderLanding(); }
  // desplazar a la sección ancla si aplica (#form, #demos, #niveles...)
  if(h && h.length>1 && h[1]!=="/"){
    const el=document.getElementById(h.slice(1));
    const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(el) setTimeout(()=>el.scrollIntoView({behavior:reduce?"auto":"smooth",block:"start"}),30);
  } else { window.scrollTo(0,0); }
}
window.addEventListener("hashchange",route);

/* ==================================================================
   LANDING
   ================================================================== */
function renderLanding(){
  const C=CONFIG;
  document.getElementById("app").innerHTML = `
  <a href="#main-content" class="skip">Saltar al contenido</a>
  ${header()}
  <main id="main-content">
    <section class="hero"><div class="wrap">
      <div style="display:flex;justify-content:center;margin-bottom:14px">${logoMark(72)}</div>
      <div class="eyebrow">Webs y apps para negocios</div>
      <h1>Tu negocio merece una web profesional. <em>Sin pagar 3.000€.</em></h1>
      <p class="sub">En Breyval te creamos tu web o app a medida, lista en días y por una fracción de lo que cobra un programador. Pensada para una cosa: que vendas más.</p>
      <div class="hero-cta">
        <a href="#form" class="btn btn-primary btn-lg">Pide tu app · desde 250€</a>
        <a href="#demos" class="btn btn-light btn-lg">Ver demos reales</a>
      </div>
      <div class="hero-meta">

function onLead(e){
  e.preventDefault();
  const g=id=>document.getElementById(id);
  const nombre=g("i-nombre").value.trim(), negocio=g("i-negocio").value.trim(), tel=g("i-tel").value.trim(), email=g("i-email").value.trim();
  let ok=true;
  const set=(f,bad)=>{ g(f).classList.toggle("bad",bad); const inp=g("i"+f.slice(1)); if(inp) inp.setAttribute("aria-invalid",bad?"true":"false"); if(bad) ok=false; };
  set("f-nombre", nombre.length<2);
  set("f-negocio", negocio.length<2);
  set("f-tel", !/^[0-9 +().-]{7,20}$/.test(tel));
  set("f-email", email!=="" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
  if(!ok) return;
  const nivel=g("i-nivel").value, bot=g("i-bot").value, msg=g("i-msg").value.trim();
  const lead={ id:"lead_"+Date.now()+"_"+Math.random().toString(36).slice(2,6), fecha:new Date().toISOString(),
    nombre, negocio, telefono:tel, email, nivel, bot, mensaje:msg, estado:"nuevo" };
  const list=loadLeads(); list.unshift(lead); saveLeads(list);
  window._lastLead=lead;
  const txt=encodeURIComponent(`Hola ${CONFIG.BUSINESS_NAME}, soy ${nombre} de ${negocio}. Me interesa una web/app nivel ${nivel}${bot!=="No"?" con "+bot:""}. ${msg}`);
  if(CONFIG.WHATSAPP && CONFIG.WHATSAPP!=="PEGA_AQUI_TU_NUMERO") window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${txt}`,"_blank","noopener");
  location.hash="#/gracias";
}

function isAdmin(){ try{ return sessionStorage.getItem(ADMIN_KEY)==="1"; }catch(e){ return false; } }
function renderAdmin(){
  if(!isAdmin()){ renderGate(); return; }
  const leads=loadLeads(); const cnt=k=>leads.filter(l=>l.estado===k).length;

    <div id="list">${leads.length? leads.map(renderLead).join("") : `<div class="empty"><div class="ic">📭</div><b>Aún no hay leads</b><p>Cuando alguien pida su app, aparecerá aquí.</p></div>`}</div>
  </div></div>`;
  document.getElementById("logout").addEventListener("click",()=>{ try{sessionStorage.removeItem(ADMIN_KEY);}catch(e){} renderGate(); });
  document.getElementById("csv").addEventListener("click",exportCSV);
  document.querySelectorAll("[data-st]").forEach(s=>s.addEventListener("change",e=>{ updateLead(e.target.dataset.id,{estado:e.target.value}); renderAdmin(); }));
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",e=>{ if(confirm("¿Borrar este lead?")){ saveLeads(loadLeads().filter(l=>l.id!==e.target.dataset.id)); renderAdmin(); } }));
}
function renderLead(l){
  const d=new Date(l.fecha), when=d.toLocaleDateString("es-ES",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  const tel=(l.telefono||"").replace(/[^0-9]/g,""); const st=["nuevo","contactado","cerrado"].includes(l.estado)?l.estado:"nuevo";
  return `<div class="lead"><div class="lead-top"><div>
    <b class="nm">${esc(l.nombre)}</b> <span class="tag ${st}">${esc(st)}</span>
    <div class="meta">${esc(when)} · ${esc(l.negocio)}</div>
    <div class="meta">📞 ${esc(l.telefono)}${l.email?" · ✉️ "+esc(l.email):""}</div>
    <div class="meta">Nivel: ${esc(l.nivel)} · Bot: ${esc(l.bot)}</div>
  </div><a class="wa" href="https://wa.me/${esc(tel)}" target="_blank" rel="noopener noreferrer">WhatsApp →</a></div>
  ${l.mensaje?`<div class="msg">${esc(l.mensaje)}</div>`:""}
  <div class="r2">
    <select data-st data-id="${esc(l.id)}" aria-label="Estado del lead de ${esc(l.nombre)}">
      <option value="nuevo" ${st==="nuevo"?"selected":""}>Nuevo</option><option value="contactado" ${st==="contactado"?"selected":""}>Contactado</option><option value="cerrado" ${st==="cerrado"?"selected":""}>Cerrado</option>
    </select>
    <button class="del" data-del data-id="${esc(l.id)}" aria-label="Borrar lead de ${esc(l.nombre)}">Borrar</button>
  </div></div>`;
}
function updateLead(id,patch){ saveLeads(loadLeads().map(l=>l.id===id?{...l,...patch}:l)); }
function exportCSV(){
  const leads=loadLeads(); if(!leads.length){ showToast("No hay datos"); return; }
  const head=["Fecha","Nombre","Negocio","Telefono","Email","Nivel","Bot","Estado","Mensaje"];
  const cell=v=>{ let s=String(v==null?"":v); if(/^[=+\-@]/.test(s)) s="'"+s; return '"'+s.replace(/"/g,'""')+'"'; };
  const rows=leads.map(l=>[l.fecha,l.nombre,l.negocio,l.telefono,l.email,l.nivel,l.bot,l.estado,l.mensaje].map(cell).join(";"));
  const blob=new Blob(["﻿"+[head.join(";"),...rows].join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="breyval-leads-"+new Date().toISOString().slice(0,10)+".csv"; a.click(); URL.revokeObjectURL(a.href);
}
function renderGate(bad){
  document.getElementById("app").innerHTML=`
  <div class="admin"><div class="gate ${bad?"bad":""}">
    <h1 class="sr-only">Acceso al panel de Breyval</h1>
    <h2>Panel de Breyval</h2><p>Zona privada. Introduce tu contraseña.</p>
    <form id="gf"><label for="gp" class="sr-only">Contraseña</label><input id="gp" type="password" placeholder="Contraseña" autocomplete="current-password"><button class="btn btn-primary" type="submit">Entrar</button><div class="err">Contraseña incorrecta.</div></form>
    <p style="margin-top:14px;font-size:12px"><a href="#/" style="color:var(--ink-mut)">← Volver a la web</a></p>
  </div></div>`;
  document.getElementById("gf").addEventListener("submit",e=>{
    e.preventDefault(); const now=Date.now(); let g={n:0,until:0};
    try{ g=JSON.parse(sessionStorage.getItem(GATE_KEY)||"{}"); }catch(err){}
    if(g.until&&now<g.until){ showToast(`Demasiados intentos. Espera ${Math.ceil((g.until-now)/1000)}s.`); return; }
    if(document.getElementById("gp").value===CONFIG.ADMIN_PASSWORD){ try{ sessionStorage.setItem(ADMIN_KEY,"1"); sessionStorage.removeItem(GATE_KEY); }catch(err){} renderAdmin(); }
    else { g.n=(g.n||0)+1; if(g.n>=5){ g.until=now+60000; g.n=0; showToast("Demasiados intentos. Espera 60 segundos."); } try{ sessionStorage.setItem(GATE_KEY,JSON.stringify(g)); }catch(err){} renderGate(true); }
  });
}
