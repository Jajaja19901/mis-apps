<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peluquería Aurora · Tu mejor versión en Madrid</title>
<meta name="description" content="Peluquería Aurora en Madrid. Cortes, color y tratamientos con cita previa. Reserva en 1 minuto sin registrarte.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============ CONFIG VISUAL ============ */
  :root{
    --bg:#faf7f4; --card:#ffffff; --ink:#221c1a; --ink-soft:#5a514c; --ink-mut:#9b908a;
    --brand:#b9755a; --brand-deep:#9c5c44; --brand-soft:#f3e6df; --line:#ece2da;
    --ok:#3f7d52; --err:#c0492f;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,sans-serif;
    --shadow:0 1px 2px rgba(40,25,15,.05),0 8px 30px rgba(40,25,15,.06);
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  img{max-width:100%;display:block}
  a{color:inherit}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:15px;border:none;border-radius:999px;padding:14px 24px;cursor:pointer;transition:transform .15s,background .2s,box-shadow .2s;text-decoration:none;line-height:1}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand-deep)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-lg{padding:17px 30px;font-size:16px}
  .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--brand-deep);font-weight:600}
  h1,h2,h3{font-family:var(--serif);font-weight:500;letter-spacing:-.02em;line-height:1.1}

  /* ============ HEADER ============ */
  header.site{position:sticky;top:0;z-index:50;background:rgba(250,247,244,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-family:var(--serif);font-weight:600;font-size:20px;display:flex;align-items:center;gap:9px}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--brand)}
  header .nav-cta{font-size:14px;padding:11px 18px}

  /* ============ HERO ============ */
  .hero{padding:64px 0 48px;text-align:center}
  .hero h1{font-size:clamp(34px,8vw,60px);margin:18px 0 16px}
  .hero h1 em{font-style:italic;color:var(--brand)}
  .hero p{font-size:18px;color:var(--ink-soft);max-width:560px;margin:0 auto 28px}
  .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .hero-meta{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:30px;color:var(--ink-mut);font-size:14px}
  .hero-meta span{display:inline-flex;align-items:center;gap:7px}
  .hero-meta svg{width:16px;height:16px;color:var(--brand)}

  /* ============ SECTIONS ============ */
  section{padding:54px 0}
  .sec-head{text-align:center;max-width:560px;margin:0 auto 34px}
  .sec-head h2{font-size:clamp(26px,5vw,38px);margin:10px 0}
  .sec-head p{color:var(--ink-soft)}
  .grid{display:grid;gap:18px}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
  .svc-ic{width:46px;height:46px;border-radius:12px;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
  .card h3{font-size:20px;margin-bottom:7px}
  .card .price{color:var(--brand-deep);font-weight:600;margin-top:10px;font-size:15px}
  .card p{color:var(--ink-soft);font-size:15px}

  .why{background:var(--brand-soft)}
  .why .grid-3{gap:26px}
  .why .item{text-align:center}
  .why .item .n{font-family:var(--serif);font-size:30px;color:var(--brand);margin-bottom:6px}

  .quotes .grid-3 .card p.q{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink);margin-bottom:14px}
  .quotes .who{display:flex;align-items:center;gap:11px}
  .quotes .av{width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600}
  .quotes .who b{font-size:14px}
  .quotes .who small{color:var(--ink-mut)}
  .stars{color:#d9a441;letter-spacing:2px;font-size:14px;margin-bottom:8px}

  /* ============ FORM ============ */
  .book{background:var(--ink);color:#fff;border-radius:24px;padding:40px 28px;max-width:620px;margin:0 auto}
  .book h2{color:#fff;font-size:clamp(26px,5vw,34px);text-align:center}
  .book p.sub{color:#cfc3bc;text-align:center;margin:8px auto 26px;max-width:420px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:#cfc3bc;margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:#2e2724;border:1px solid #43393400;border:1px solid #463b36;color:#fff;border-radius:12px;padding:14px 15px;font-family:var(--sans);font-size:16px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brand)}
  .field textarea{min-height:90px;resize:vertical}
  .field .err{color:#ffb3a3;font-size:13px;margin-top:5px;display:none}
  .field.invalid .err{display:block}
  .field.invalid input,.field.invalid textarea{border-color:var(--err)}
  .book .btn-primary{width:100%;justify-content:center;margin-top:8px}
  .book .privacy{text-align:center;color:#9b908a;font-size:12px;margin-top:14px}
  .form-ok{text-align:center;padding:20px 0}
  .form-ok .check{width:64px;height:64px;border-radius:50%;background:var(--ok);margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
  .form-ok .check svg{width:32px;height:32px;color:#fff}

  /* ============ FOOTER ============ */
  footer.site{border-top:1px solid var(--line);padding:40px 0;color:var(--ink-soft);font-size:15px}
  footer .cols{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:24px}
  footer h4{font-family:var(--sans);font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-mut);margin-bottom:12px}
  footer a{display:block;margin-bottom:7px;text-decoration:none;color:var(--ink-soft)}
  footer a:hover{color:var(--brand-deep)}
  .copyr{margin-top:28px;padding-top:18px;border-top:1px solid var(--line);font-size:13px;color:var(--ink-mut);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .copyr a{color:var(--ink-mut)}

  /* ============ FLOATING WHATSAPP ============ */
  .fab{position:fixed;right:18px;bottom:18px;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(37,211,102,.45);z-index:60;text-decoration:none}
  .fab svg{width:30px;height:30px;fill:#fff}

  /* ============ TOAST ============ */
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.3s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ============ ADMIN ============ */
  .admin{min-height:100vh;background:var(--bg);padding:24px 0}
  .admin-gate{max-width:380px;margin:8vh auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
  .admin-gate h2{font-size:24px;margin-bottom:6px}
  .admin-gate p{color:var(--ink-soft);font-size:14px;margin-bottom:18px}
  .admin-gate input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:16px;font-family:var(--sans);margin-bottom:12px}
  .admin-gate input:focus{outline:none;border-color:var(--brand)}
  .admin-gate .btn-primary{width:100%;justify-content:center}
  .admin-gate .err{color:var(--err);font-size:13px;margin-top:10px;display:none}
  .admin-gate.bad .err{display:block}
  .admin-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .admin-bar h2{font-size:26px}
  .admin-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;min-width:110px}
  .stat .big{font-family:var(--serif);font-size:26px;color:var(--brand)}
  .stat small{color:var(--ink-mut);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
  .lead{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .lead-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .lead b{font-size:16px}
  .lead .meta{color:var(--ink-mut);font-size:13px;margin:2px 0 8px}
  .lead .msg{color:var(--ink-soft);font-size:14px;background:var(--bg);border-radius:10px;padding:10px 12px;margin:8px 0}
  .lead .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .lead select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:13px;background:var(--card)}
  .lead .tag{font-size:12px;padding:4px 10px;border-radius:999px;font-weight:600}
  .tag.nuevo{background:#e6f0ff;color:#2b5bb5}
  .tag.contactado{background:#fff2d9;color:#9a6b00}
  .tag.cerrado{background:#e3f3e8;color:var(--ok)}
  .lead a.wa{color:var(--ok);font-size:13px;font-weight:600;text-decoration:none}
  .lead button.del{background:none;border:none;color:var(--ink-mut);cursor:pointer;font-size:13px}
  .lead button.del:hover{color:var(--err)}
  .empty{text-align:center;color:var(--ink-mut);padding:50px 20px}
  .empty .ic{font-size:40px;margin-bottom:10px}

  /* ============ RESPONSIVE ============ */
  @media(max-width:820px){.grid-3{grid-template-columns:1fr 1fr}footer .cols{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.grid-3{grid-template-columns:1fr}footer .cols{grid-template-columns:1fr;gap:18px}.hero{padding:46px 0 36px}header .nav-cta{display:none}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ==================================================================
   ⚙️  CONFIGURA TU NEGOCIO AQUÍ  (cambia estos valores y listo)
   ================================================================== */
const CONFIG = {
  BUSINESS_NAME : "Peluquería Aurora",
  TAGLINE       : "Tu mejor versión, en el corazón de Madrid",
  CITY          : "Madrid · Barrio de Chamberí",
  ADDRESS       : "Calle de Ejemplo 12, 28010 Madrid",
  WHATSAPP      : "34600000000",          // tu WhatsApp con prefijo, sin + ni espacios
  EMAIL         : "hola@peluqueriaaurora.es",
  HOURS         : "L-V 10:00–20:00 · Sáb 10:00–14:00 · Dom cerrado",
  INSTAGRAM     : "https://instagram.com/",
  // ⚠️⚠️ IMPORTANTE SOBRE LA CONTRASEÑA ⚠️⚠️
  // Esta contraseña vive en el código y CUALQUIERA que mire el fuente de la página puede verla.
  // Sirve como cerrojo básico para que un visitante normal no entre al panel, pero NO es
  // seguridad real. Los datos de los clientes (nombre + teléfono) se guardan solo en ESTE
  // dispositivo (localStorage). Si necesitas proteger esos datos de verdad, hace falta un
  // servidor/backend con login real. Aun así, CÁMBIALA por algo solo tuyo:
  ADMIN_PASSWORD: "aurora-2024",
  CTA           : "Reservar cita",
};

const SERVICES = [
  { ic:"✂️", name:"Corte & peinado", desc:"Asesoramiento de imagen, corte a medida y peinado final.", price:"desde 22€" },
  { ic:"🎨", name:"Color & mechas", desc:"Coloración, balayage y mechas con productos sin amoníaco.", price:"desde 45€" },
  { ic:"💆", name:"Tratamientos", desc:"Hidratación profunda, keratina y cuidado del cuero cabelludo.", price:"desde 30€" },
  { ic:"💍", name:"Recogidos & eventos", desc:"Peinados para bodas y eventos, con prueba previa incluida.", price:"desde 40€" },
  { ic:"🧔", name:"Barbería", desc:"Arreglo de barba y corte masculino con toalla caliente.", price:"desde 18€" },
  { ic:"🌸", name:"Novias a domicilio", desc:"Vamos a tu casa el gran día para que no te muevas de allí.", price:"a consultar" },
];

const WHY = [
  { n:"1", t:"Te escuchamos", d:"Antes de tocar tijeras entendemos qué quieres y qué te favorece de verdad." },
  { n:"2", t:"Sin esperas", d:"Trabajamos solo con cita previa para que entres y salgas a tu hora." },
  { n:"3", t:"Productos premium", d:"Marcas profesionales y opciones veganas que cuidan tu pelo a largo plazo." },
];

const QUOTES = [
  { q:"Salí encantada. Es la primera vez que un color me dura bonito tantas semanas.", who:"María L.", sub:"Cliente desde 2022", st:5 },
  { q:"Reservé por el móvil en un minuto y me atendieron puntuales. Un lujo.", who:"Carlos R.", sub:"Corte y barba", st:5 },
  { q:"Me peinaron para mi boda en casa. Llené de tranquilidad un día de nervios.", who:"Lucía F.", sub:"Recogido de novia", st:5 },
];

const SERVICE_OPTIONS = SERVICES.map(s=>s.name).concat(["Otro / no estoy seguro"]);

/* ==================================================================
   ESTADO Y ALMACENAMIENTO  (todo en el navegador, sin servidores)
   ================================================================== */
const LEADS_KEY = "aurora_leads_v1";
const ADMIN_KEY = "aurora_admin_session";

function loadLeads(){
  try{ const r=localStorage.getItem(LEADS_KEY); return r?JSON.parse(r):[]; }
  catch(e){ console.warn(e); return []; }
}
function saveLeads(list){
  try{ localStorage.setItem(LEADS_KEY, JSON.stringify(list)); }
  catch(e){ console.warn("No se pudo guardar:",e); showToast("No se pudo guardar en este dispositivo"); }
}
function addLead(lead){ const l=loadLeads(); l.unshift(lead); saveLeads(l); }

/* ==================================================================
   SEGURIDAD: escapar todo lo que escriba el usuario
   ================================================================== */
function esc(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                  .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

/* ==================================================================
   ROUTER simple por hash:  #/admin = panel del dueño ; resto = web
   ================================================================== */
function route(){
  const h = location.hash.replace(/^#\/?/,"");
  if(h==="admin") renderAdmin();
  else renderSite();
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

/* ==================================================================
   WEB PÚBLICA (el embudo)
   ================================================================== */
function renderSite(){
  const C=CONFIG;
  document.getElementById("app").innerHTML = `
  <header class="site"><div class="wrap">
    <div class="logo"><span class="dot"></span>${esc(C.BUSINESS_NAME)}</div>
    <a href="#reservar" class="btn btn-primary nav-cta">${esc(C.CTA)}</a>
  </div></header>

  <main>
    <section class="hero"><div class="wrap">
      <div class="eyebrow">Peluquería · ${esc(C.CITY)}</div>
      <h1>${esc(C.TAGLINE.split(",")[0])},<br><em>${esc((C.TAGLINE.split(",")[1]||"te esperamos").trim())}</em></h1>
      <p>Cortes, color y tratamientos personalizados con cita previa. Reserva en un minuto, sin registrarte ni dar más datos de la cuenta.</p>
      <div class="hero-cta">
        <a href="#reservar" class="btn btn-primary btn-lg">${esc(C.CTA)}</a>
        <a href="https://wa.me/${esc(C.WHATSAPP)}" class="btn btn-ghost btn-lg" target="_blank" rel="noopener noreferrer">Escríbenos por WhatsApp</a>
      </div>
      <div class="hero-meta">
        <span>${star()} +200 reseñas de 5★</span>
        <span>${iconClock()} Sin esperas, solo con cita</span>
        <span>${iconPin()} ${esc(C.CITY)}</span>
      </div>
    </div></section>

    <section><div class="wrap">
      <div class="sec-head"><div class="eyebrow">Lo que hacemos</div><h2>Servicios pensados para ti</h2><p>Cada servicio empieza con una pequeña consulta para acertar contigo a la primera.</p></div>
      <div class="grid grid-3">
        ${SERVICES.map(s=>`<div class="card"><div class="svc-ic" aria-hidden="true">${s.ic}</div><h3>${esc(s.name)}</h3><p>${esc(s.desc)}</p><div class="price">${esc(s.price)}</div></div>`).join("")}
      </div>
    </div></section>

    <section class="why"><div class="wrap">
      <div class="sec-head"><div class="eyebrow">Por qué Aurora</div><h2>Lo que nos hace diferentes</h2></div>
      <div class="grid grid-3">
        ${WHY.map(w=>`<div class="item"><div class="n">${esc(w.n)}</div><h3>${esc(w.t)}</h3><p>${esc(w.d)}</p></div>`).join("")}
      </div>
    </div></section>

    <section class="quotes"><div class="wrap">
      <div class="sec-head"><div class="eyebrow">Clientes contentos</div><h2>Lo que dicen de nosotras</h2></div>
      <div class="grid grid-3">
        ${QUOTES.map(q=>`<div class="card"><div class="stars" aria-label="5 de 5 estrellas">★★★★★</div><p class="q">"${esc(q.q)}"</p><div class="who"><div class="av" aria-hidden="true">${esc(q.who[0])}</div><div><b>${esc(q.who)}</b><br><small>${esc(q.sub)}</small></div></div></div>`).join("")}
      </div>
    </div></section>

    <section id="reservar"><div class="wrap">
      <form class="book" id="bookForm" novalidate>
        <div class="eyebrow" style="text-align:center;color:var(--brand)">Reserva</div>
        <h2>Pide tu cita</h2>
        <p class="sub">Déjanos tus datos y te confirmamos por WhatsApp o teléfono. No creamos ninguna cuenta.</p>
        <div class="field" id="f-name"><label for="i-name">Tu nombre *</label><input id="i-name" name="name" autocomplete="name" maxlength="60"><div class="err">Dinos cómo te llamas.</div></div>
        <div class="field" id="f-phone"><label for="i-phone">Teléfono *</label><input id="i-phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" maxlength="20"><div class="err">Necesitamos un teléfono válido para confirmarte.</div></div>
        <div class="field" id="f-svc"><label for="i-svc">¿Qué servicio quieres?</label><select id="i-svc" name="service">${SERVICE_OPTIONS.map(o=>`<option>${esc(o)}</option>`).join("")}</select></div>
        <div class="field" id="f-msg"><label for="i-msg">¿Algo que debamos saber? (opcional)</label><textarea id="i-msg" name="message" maxlength="500" placeholder="Ej: prefiero por las tardes, vengo con mi hija..."></textarea></div>
        <button type="submit" class="btn btn-primary btn-lg">Enviar y pedir cita</button>
        <div class="privacy">🔒 Tus datos solo se usan para gestionar tu cita. No los compartimos con nadie.</div>
      </form>
    </div></section>
  </main>

  <footer class="site"><div class="wrap">
    <div class="cols">
      <div>
        <div class="logo" style="margin-bottom:10px"><span class="dot"></span>${esc(C.BUSINESS_NAME)}</div>
        <p style="font-size:14px;max-width:280px">${esc(C.TAGLINE)}.</p>
      </div>
      <div>
        <h4>Contacto</h4>
        <a href="https://wa.me/${esc(C.WHATSAPP)}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a href="mailto:${esc(C.EMAIL)}">${esc(C.EMAIL)}</a>
        <a href="https://maps.google.com/?q=${encodeURIComponent(C.ADDRESS)}" target="_blank" rel="noopener noreferrer">${esc(C.ADDRESS)}</a>
      </div>
      <div>
        <h4>Horario</h4>
        <p style="font-size:14px">${esc(C.HOURS)}</p>
        <a href="${esc(C.INSTAGRAM)}" target="_blank" rel="noopener noreferrer" style="margin-top:8px">Instagram</a>
      </div>
    </div>
    <div class="copyr"><span>© ${new Date().getFullYear()} ${esc(C.BUSINESS_NAME)}</span><a href="#/admin">Acceso del equipo</a></div>
  </div></footer>

  <a class="fab" href="https://wa.me/${esc(C.WHATSAPP)}" target="_blank" rel="noopener noreferrer" aria-label="Escríbenos por WhatsApp">${iconWA()}</a>
  `;

  document.getElementById("bookForm").addEventListener("submit", onBook);
}

function onBook(e){
  e.preventDefault();
  const name=document.getElementById("i-name");
  const phone=document.getElementById("i-phone");
  const svc=document.getElementById("i-svc");
  const msg=document.getElementById("i-msg");

  let ok=true;
  const nameVal=name.value.trim();
  const phoneVal=phone.value.trim();
  toggleInvalid("f-name", nameVal.length>=2); if(nameVal.length<2) ok=false;
  const phoneOk=/^[0-9 +().-]{7,20}$/.test(phoneVal);
  toggleInvalid("f-phone", phoneOk); if(!phoneOk) ok=false;
  if(!ok) return;

  addLead({
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name: nameVal, phone: phoneVal,
    service: svc.value, message: msg.value.trim(),
    status: "nuevo", note: "",
    date: new Date().toISOString(),
  });

  // Pantalla de éxito + opción de rematar por WhatsApp
  const waText=encodeURIComponent(`Hola ${CONFIG.BUSINESS_NAME}, soy ${nameVal}. Quiero pedir cita para "${svc.value}".`);
  document.getElementById("bookForm").innerHTML=`
    <div class="form-ok">
      <div class="check">${iconCheck()}</div>
      <h2>¡Gracias, ${esc(nameVal)}!</h2>
      <p class="sub" style="margin-top:10px">Hemos recibido tu solicitud. Te confirmamos enseguida. Si quieres, acelera escribiéndonos directamente:</p>
      <a href="https://wa.me/${esc(CONFIG.WHATSAPP)}?text=${waText}" class="btn btn-primary btn-lg" target="_blank" rel="noopener noreferrer" style="margin-top:6px">Confirmar por WhatsApp</a>
    </div>`;
  showToast("✓ Solicitud enviada");
}

function toggleInvalid(id, valid){
  document.getElementById(id).classList.toggle("invalid", !valid);
}

/* ==================================================================
   PANEL DE ADMINISTRACIÓN (solo el dueño, ruta #/admin)
   ================================================================== */
function isAdmin(){ try{ return sessionStorage.getItem(ADMIN_KEY)==="1"; }catch(e){ return false; } }

function renderAdmin(){
  if(!isAdmin()){ renderAdminGate(); return; }
  const leads=loadLeads();
  const count=k=>leads.filter(l=>l.status===k).length;

  document.getElementById("app").innerHTML=`
  <div class="admin"><div class="wrap">
    <div class="admin-bar">
      <h2>Panel · ${esc(CONFIG.BUSINESS_NAME)}</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" id="exportBtn">Exportar CSV</button>
        <a class="btn btn-ghost" href="#">Ver web</a>
        <button class="btn btn-ghost" id="logoutBtn">Salir</button>
      </div>
    </div>
    <div class="admin-stats">
      <div class="stat"><div class="big">${leads.length}</div><small>Total</small></div>
      <div class="stat"><div class="big">${count("nuevo")}</div><small>Nuevos</small></div>
      <div class="stat"><div class="big">${count("contactado")}</div><small>Contactados</small></div>
      <div class="stat"><div class="big">${count("cerrado")}</div><small>Cerrados</small></div>
    </div>
    <div id="leadList">
      ${leads.length? leads.map(renderLead).join("") :
        `<div class="empty"><div class="ic">📭</div><b>Aún no hay solicitudes</b><p>Cuando alguien pida cita en la web, aparecerá aquí al instante.</p></div>`}
    </div>
  </div></div>`;

  document.getElementById("logoutBtn").addEventListener("click",()=>{ try{sessionStorage.removeItem(ADMIN_KEY);}catch(e){} location.hash="#/admin"; });
  document.getElementById("exportBtn").addEventListener("click",exportCSV);
  document.querySelectorAll("[data-status]").forEach(sel=>sel.addEventListener("change",onStatusChange));
  document.querySelectorAll("[data-note]").forEach(t=>t.addEventListener("change",onNoteChange));
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",onDelete));
}

const STATUSES = ["nuevo","contactado","cerrado"];
function safeStatus(s){ return STATUSES.includes(s) ? s : "nuevo"; }

function renderLead(l){
  const d=new Date(l.date);
  const when=d.toLocaleDateString("es-ES",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  const wa=`https://wa.me/${(l.phone||"").replace(/[^0-9]/g,"")}`;
  const st=safeStatus(l.status);
  return `
  <div class="lead">
    <div class="lead-top">
      <div>
        <b>${esc(l.name)}</b> <span class="tag ${st}">${esc(st)}</span>
        <div class="meta">${esc(when)} · ${esc(l.service)}</div>
        <div class="meta">📞 ${esc(l.phone)}</div>
      </div>
      <a class="wa" href="${wa}" target="_blank" rel="noopener noreferrer">WhatsApp →</a>
    </div>
    ${l.message? `<div class="msg">${esc(l.message)}</div>`:""}
    <div class="row">
      <select data-status data-id="${esc(l.id)}" aria-label="Estado">
        <option value="nuevo" ${l.status==="nuevo"?"selected":""}>Nuevo</option>
        <option value="contactado" ${l.status==="contactado"?"selected":""}>Contactado</option>
        <option value="cerrado" ${l.status==="cerrado"?"selected":""}>Cerrado</option>
      </select>
      <input data-note data-id="${esc(l.id)}" value="${esc(l.note)}" placeholder="Nota privada..." style="flex:1;min-width:140px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-family:var(--sans);font-size:13px">
      <button class="del" data-del data-id="${esc(l.id)}">Borrar</button>
    </div>
  </div>`;
}

function onStatusChange(e){ updateLead(e.target.dataset.id,{status:e.target.value}); renderAdmin(); }
function onNoteChange(e){ updateLead(e.target.dataset.id,{note:e.target.value.slice(0,300)}); showToast("Nota guardada"); }
function onDelete(e){
  if(!confirm("¿Borrar esta solicitud? No se puede deshacer.")) return;
  saveLeads(loadLeads().filter(l=>l.id!==e.target.dataset.id)); renderAdmin();
}
function updateLead(id,patch){ saveLeads(loadLeads().map(l=>l.id===id?{...l,...patch}:l)); }

function exportCSV(){
  const leads=loadLeads();
  if(!leads.length){ showToast("No hay datos que exportar"); return; }
  const head=["Fecha","Nombre","Telefono","Servicio","Mensaje","Estado","Nota"];
  const rows=leads.map(l=>[l.date,l.name,l.phone,l.service,l.message,l.status,l.note]
    .map(v=>{ const s=String(v||""); const safe=/^[=+\-@]/.test(s)?"'"+s:s; return `"${safe.replace(/"/g,'""')}"`; }).join(","));
  const csv=[head.join(","),...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`solicitudes-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

function renderAdminGate(bad){
  document.getElementById("app").innerHTML=`
  <div class="admin"><div class="admin-gate ${bad?"bad":""}">
    <h2>Acceso del dueño</h2>
    <p>Zona privada de ${esc(CONFIG.BUSINESS_NAME)}. Introduce tu contraseña para ver las solicitudes.</p>
    <form id="gateForm">
      <input id="gatePass" type="password" placeholder="Contraseña" autocomplete="current-password" aria-label="Contraseña">
      <button class="btn btn-primary" type="submit">Entrar</button>
      <div class="err">Contraseña incorrecta.</div>
    </form>
    <p style="margin-top:16px;font-size:12px"><a href="#" style="color:var(--ink-mut)">← Volver a la web</a></p>
  </div></div>`;
  document.getElementById("gateForm").addEventListener("submit",e=>{
    e.preventDefault();
    // Bloqueo anti-fuerza-bruta: tras 5 fallos, 60s de espera
    const now=Date.now();
    let g={n:0,until:0};
    try{ g=JSON.parse(sessionStorage.getItem("aurora_gate")||"{}"); }catch(err){}
    if(g.until && now<g.until){
      showToast(`Demasiados intentos. Espera ${Math.ceil((g.until-now)/1000)}s.`);
      return;
    }
    if(document.getElementById("gatePass").value===CONFIG.ADMIN_PASSWORD){
      try{ sessionStorage.setItem(ADMIN_KEY,"1"); sessionStorage.removeItem("aurora_gate"); }catch(err){}
      renderAdmin();
    } else {
      g.n=(g.n||0)+1;
      if(g.n>=5){ g.until=now+60000; g.n=0; showToast("Demasiados intentos. Espera 60 segundos."); }
      try{ sessionStorage.setItem("aurora_gate",JSON.stringify(g)); }catch(err){}
      renderAdminGate(true);
    }
  });
}

route();
</script>
