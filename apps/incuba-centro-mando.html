<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>Incuba tu Negocio · Centro de Mando</title>
<meta name="description" content="Centro de mando del estudio: clientes (CRM), mensajes listos, propuestas al instante y ajustes. Todo en un sitio.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Incuba · Mando">
<style>
  :root{
    --bg:#0b1020;--bg2:#0e1530;--surface:#131b35;--surface2:#1a2342;--line:#26315a;
    --text:#eaf0ff;--muted:#9aa6c8;--muted2:#717ea8;--brand:#22c55e;--brand-d:#16a34a;--lime:#a3e635;
    --accent:#38bdf8;--warn:#fbbf24;--danger:#fb7185;--r:16px;--maxw:780px;--shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#16224a,var(--bg) 55%) fixed,var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,Arial,sans-serif;line-height:1.5;padding-bottom:86px}
  a{color:var(--accent)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
  header.top{position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);background:linear-gradient(180deg,rgba(11,16,32,.92),rgba(11,16,32,.7));border-bottom:1px solid var(--line)}
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;max-width:var(--maxw);margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--text);text-decoration:none}
  .logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--lime));display:grid;place-items:center}
  .logo .mark svg{width:20px;height:20px}
  .logo small{display:block;font-weight:600;color:var(--muted);font-size:11px;margin-top:-2px}
  .btn-out{margin-left:auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}

  h1{font-size:clamp(22px,6vw,30px);margin:18px 0 4px;letter-spacing:-.4px}
  h2{font-size:19px;margin:18px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 14px}
  section{padding:14px 0}
  .grid{display:grid;gap:12px}
  .grid.two{grid-template-columns:1fr 1fr}
  .grid.three{grid-template-columns:repeat(3,1fr)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 6px;font-size:15.5px}
  .card p{margin:5px 0;color:var(--muted);font-size:13.5px}
  .stat{text-align:center;padding:14px 8px}
  .stat .n{font-size:26px;font-weight:900;color:var(--brand);line-height:1}
  .stat .l{font-size:11.5px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}

  button{font-family:inherit}
  .btn{cursor:pointer;border-radius:11px;padding:10px 14px;font-size:13.5px;font-weight:800;border:1px solid transparent;transition:transform .06s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#05230f}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
  .btn.ok{background:rgba(34,197,94,.16);border-color:var(--brand);color:var(--brand)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
  .btn.block{display:block;width:100%;text-align:center}
  .btn.danger{background:rgba(251,113,133,.12);border-color:var(--danger);color:var(--danger)}
  .btnrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}

  .field{margin:10px 0}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:5px}
  input,textarea,select{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:11px 13px;font-size:15px;font-family:inherit}
  textarea{min-height:64px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .lead{display:flex;gap:10px;align-items:flex-start;padding:13px 0;border-bottom:1px solid rgba(38,49,90,.6)}
  .lead:last-child{border-bottom:0}
  .lead .info{flex:1;min-width:0}
  .lead .info b{font-size:14.5px}
  .lead .info small{display:block;color:var(--muted2);font-size:12.5px}
  .fase{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
  .fase.f0{color:var(--muted)} .fase.f1{color:var(--accent);border-color:rgba(56,189,248,.4)}
  .fase.f2{color:var(--warn);border-color:rgba(251,191,36,.4)} .fase.f3{color:var(--brand);border-color:var(--brand)}
  .fase.f4{color:var(--lime);border-color:rgba(163,230,53,.4)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .chip{cursor:pointer;font-size:12.5px;font-weight:800;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
  .chip.active{background:linear-gradient(135deg,var(--brand),var(--lime));color:#05230f;border-color:transparent}

  .tpl{background:#0a0f22;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13.5px;color:#cdd7f5;white-space:pre-wrap;margin:8px 0}
  .out{background:#0a0f22;border:1px solid var(--line);border-radius:12px;padding:13px;font-size:13.5px;color:#dfe7ff;white-space:pre-wrap;margin-top:10px;min-height:30px}
  .svcrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(38,49,90,.5)}
  .svcrow:last-child{border-bottom:0}
  .svcrow label{flex:1;font-size:14px;display:flex;align-items:center;gap:9px;cursor:pointer}
  .svcrow input[type=checkbox]{width:20px;height:20px}
  .svcrow .price{width:108px}
  .msg{color:var(--brand);font-weight:700;font-size:13px;min-height:18px;margin-top:8px}

  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:linear-gradient(180deg,rgba(11,16,32,.6),rgba(11,16,32,.96));backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .tabs-inner{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
  .tabs a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 11px;color:var(--muted2);text-decoration:none;font-size:10px;font-weight:700}
  .tabs a svg{width:21px;height:21px}
  .tabs a.active{color:var(--brand)}
  footer{border-top:1px solid var(--line);margin-top:18px;padding:18px 0 8px;color:var(--muted2);font-size:12.5px;text-align:center}
  footer b{color:var(--lime)}
  .login-wrap{min-height:62vh;display:grid;place-items:center}
  .login{width:100%;max-width:360px;text-align:center}
  .login .mark{width:64px;height:64px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--lime));display:grid;place-items:center}
  .login .mark svg{width:40px;height:40px}
  .err{color:var(--danger);font-size:13px;margin-top:8px;font-weight:700;min-height:16px}
  .empty{text-align:center;color:var(--muted2);padding:24px 10px;font-size:14px}
</style>
</head>

    <a class="logo" href="#/"><span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21V11" stroke="#05230f" stroke-width="2.2" stroke-linecap="round"/><path d="M12 12c-1.2-3.4-4-4.4-6.5-4.2C5.2 11 7.6 13 12 13Z" fill="#05230f"/><path d="M12 10c1-2.8 3.4-3.7 5.6-3.5C17.4 9.2 15.4 11 12 11Z" fill="#05230f"/></svg></span><span>Centro de Mando<small>Incuba tu Negocio</small></span></a>

<script>
"use strict";
/* ====== CONFIG (cambia en 1 minuto) ====== */
const CONFIG = {
  BUSINESS_NAME:"Incuba tu Negocio",
  STUDIO_AUTHOR:"Jaime M. M.",
  ADMIN_PASSWORD:"incuba2026"      // <- cámbiala
};
const FASES = ["Nuevo","Hablando","Propuesta","Cliente","Entregado"];

/* ====== utilidades ====== */
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const digits = s => String(s||"").replace(/[^\d]/g,"");
const uid = ()=> "l"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ====== estado ====== */
const LS="itn_mando_v1";
function load(){ try{return JSON.parse(localStorage.getItem(LS))||{};}catch(e){return {};} }
function save(){ try{localStorage.setItem(LS,JSON.stringify(STORE));}catch(e){} }
let STORE = load();
STORE.leads = STORE.leads||[];
STORE.ajustes = STORE.ajustes||{whatsapp:"",email:"",web:""};
STORE.auth = STORE.auth||false;
let filtroFase = "Todos";

/* ====== feedback / copiar ====== */
function flash(btn,txt){ if(!btn)return; const o=btn.getAttribute("data-label")||btn.textContent; btn.setAttribute("data-label",o); btn.textContent=txt; btn.classList.add("ok"); setTimeout(()=>{btn.textContent=o;btn.classList.remove("ok");},1600); }
function note(t){ const m=$("#msg"); if(m){ m.textContent=t; setTimeout(()=>{ if(m.textContent===t) m.textContent=""; },2600);} }
function fallbackCopy(t){ try{const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.top="-1000px";document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();}catch(e){} }
function copyText(t,btn){ try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>flash(btn,"Copiado ✓")).catch(()=>{fallbackCopy(t);flash(btn,"Copiado ✓");}); } else { fallbackCopy(t); flash(btn,"Copiado ✓"); } }catch(e){ fallbackCopy(t); flash(btn,"Copiado ✓"); } }

/* ====== plantillas de mensaje ====== */
const PLANTILLAS = [
  {t:"Primer contacto", txt:"¡Hola {nombre}! 🙌 Gracias por escribir.\nCuéntame: ¿qué negocio tienes y qué te gustaría conseguir (más reservas, enseñar tus productos, que te escriban…)? Con eso te preparo una demo gratis 🌱"},
  {t:"Explicar qué hago", txt:"Te lo resumo: te monto tu web / catálogo / landing a medida, lista para enseñar tu negocio y recibir clientes por WhatsApp. Sin cuotas raras y rápido.\n¿Te paso una propuesta para tu caso, {nombre}?"},
  {t:"Enviar demo", txt:"Mira {nombre}, te he preparado una demo de cómo quedaría 👇\nDime qué te parece y lo ajustamos a tu gusto. La idea es que te traiga clientes desde el primer día."},
  {t:"Seguimiento (no responde)", txt:"¡Hola {nombre}! ¿Pudiste verlo? 😊\nSi te encaja, esta misma semana te dejo la versión lista. ¿Seguimos?"},
  {t:"Cerrar / arrancar", txt:"¡Genial {nombre}! 🙌 Para empezar solo necesito:\n• Nombre del negocio\n• Logo (si tienes)\n• 3-4 fotos\n¿Me los pasas y arrancamos?"},
  {t:"Pedir reseña", txt:"¡Me alegro un montón de que te guste, {nombre}! 🙏\n¿Te importaría dejarme una reseña o un testimonio corto? Me ayuda muchísimo a seguir creciendo."}
];

/* ====== servicios para la propuesta ====== */
const SERVICIOS = [
  {n:"Página web profesional"},
  {n:"Catálogo de productos"},
  {n:"Landing page / embudo"},
  {n:"App instalable (móvil)"},
  {n:"Sistema de reservas / citas"},
  {n:"Mantenimiento y cambios"}
];

/* ============================================================
   VISTAS
   ============================================================ */
function viewLogin(){
  return `<div class="login-wrap"><div class="login">
    <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21V11" stroke="#05230f" stroke-width="2.2" stroke-linecap="round"/><path d="M12 12c-1.2-3.4-4-4.4-6.5-4.2C5.2 11 7.6 13 12 13Z" fill="#05230f"/><path d="M12 10c1-2.8 3.4-3.7 5.6-3.5C17.4 9.2 15.4 11 12 11Z" fill="#05230f"/></svg></div>
    <h1 style="margin:0 0 4px">Centro de Mando</h1>
    <p class="sub">${esc(CONFIG.BUSINESS_NAME)} · acceso privado</p>
    <form id="form-login" autocomplete="off">
      <div class="field"><input type="password" id="pass" placeholder="Contraseña" aria-label="Contraseña"></div>
      <button class="btn primary block" type="submit">Entrar</button>
      <div class="err" id="login-err"></div>
    </form>
  </div></div>`;
}

function viewInicio(){
  const c = {}; FASES.forEach(f=>c[f]=0);
  STORE.leads.forEach(l=>{ if(c[l.fase]!=null) c[l.fase]++; });
  const activos = STORE.leads.filter(l=>l.fase!=="Entregado").length;
  const recientes = STORE.leads.slice(0,4);
  return `<section>
    <h1>Hola 👋</h1>
    <p class="sub">Resumen de tu negocio. Todo a un toque.</p>
    <div class="grid three">
      <div class="card stat"><div class="n">${STORE.leads.length}</div><div class="l">Clientes</div></div>
      <div class="card stat"><div class="n">${activos}</div><div class="l">Activos</div></div>
      <div class="card stat"><div class="n">${c["Cliente"]+c["Entregado"]}</div><div class="l">Cerrados</div></div>
    </div>
    <h2>Embudo</h2>
    <div class="card">
      ${FASES.map((f,i)=>`<div class="svcrow"><label><span class="fase f${i}">${esc(f)}</span></label><b>${c[f]}</b></div>`).join("")}
    </div>
    <h2>Atajos</h2>
    <div class="grid two">
      <a class="btn primary block" href="#/clientes">+ Añadir cliente</a>
      <a class="btn ghost block" href="#/mensajes">Mensajes listos</a>
      <a class="btn ghost block" href="#/propuesta">Crear propuesta</a>
      <a class="btn ghost block" href="incuba-marca-contenido.html">Plan de contenido</a>
    </div>
    ${recientes.length?`<h2>Últimos clientes</h2><div class="card">${recientes.map(leadRow).join("")}</div>`:`<div class="empty" style="margin-top:16px">Aún no tienes clientes. Pulsa “Añadir cliente” para empezar 🌱</div>`}
  </section>`;
}

function leadRow(l){
  const i = Math.max(0,FASES.indexOf(l.fase));
  const wa = digits(l.contacto);
  return `<div class="lead">
    <div class="info">
      <b>${esc(l.nombre)}</b>
      <small>${esc(l.negocio||"—")}${l.contacto?" · "+esc(l.contacto):""}${l.fuente?" · "+esc(l.fuente):""}</small>
      ${l.nota?`<small>📝 ${esc(l.nota)}</small>`:""}
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;align-items:flex-end">
      <span class="fase f${i}">${esc(l.fase)}</span>
      <div style="display:flex;gap:6px">
        ${i<FASES.length-1?`<button class="btn ghost sm" data-action="avanzar" data-id="${l.id}">Avanzar →</button>`:""}
        ${wa?`<button class="btn ghost sm" data-action="wa" data-id="${l.id}">WhatsApp</button>`:""}
        <button class="btn danger sm" data-action="delLead" data-id="${l.id}">✕</button>
      </div>
    </div>
  </div>`;
}

function viewClientes(){
  const fil = filtroFase==="Todos"?STORE.leads:STORE.leads.filter(l=>l.fase===filtroFase);
  return `<section>
    <h1>Clientes</h1>
    <p class="sub">Tu embudo de ventas. Mueve cada uno por sus fases.</p>
    <form id="form-lead" class="card" autocomplete="off">
      <h3>+ Nuevo cliente / lead</h3>
      <div class="row2">
        <div class="field"><label for="l-nombre">Nombre</label><input type="text" id="l-nombre" placeholder="Ej.: María"></div>
        <div class="field"><label for="l-negocio">Negocio</label><input type="text" id="l-negocio" placeholder="Ej.: Peluquería"></div>
      </div>
      <div class="row2">
        <div class="field"><label for="l-contacto">WhatsApp / contacto</label><input type="text" id="l-contacto" placeholder="34600..."></div>
        <div class="field"><label for="l-fuente">¿De dónde viene?</label>
          <select id="l-fuente"><option>Instagram</option><option>TikTok</option><option>Recomendado</option><option>WhatsApp</option><option>Otro</option></select></div>
      </div>
      <div class="field"><label for="l-nota">Nota</label><input type="text" id="l-nota" placeholder="Lo que necesita, presupuesto…"></div>
      <button class="btn primary block" type="submit">Guardar cliente</button>
    </form>
    <div class="chips" style="margin-top:14px">
      ${["Todos",...FASES].map(f=>`<button class="chip ${filtroFase===f?"active":""}" data-action="filtro" data-f="${esc(f)}">${esc(f)}</button>`).join("")}
    </div>
    ${fil.length?`<div class="card">${fil.map(leadRow).join("")}</div>`:`<div class="empty">No hay clientes en “${esc(filtroFase)}”.</div>`}
  </section>`;
}

function viewMensajes(){
  return `<section>
    <h1>Mensajes listos</h1>
    <p class="sub">Copia, pega en WhatsApp o DM, y cambia <b style="color:var(--text)">{nombre}</b> por el del cliente.</p>
    ${PLANTILLAS.map((p,idx)=>`<div class="card">
      <h3>${esc(p.t)}</h3>
      <div class="tpl" id="tpl-${idx}">${esc(p.txt)}</div>
      <div class="btnrow"><button class="btn primary sm" data-action="copyTpl" data-i="${idx}">Copiar</button></div>
    </div>`).join("")}
    <div class="msg" id="msg"></div>
  </section>`;
}

function viewPropuesta(){
  return `<section>
    <h1>Propuesta al instante</h1>
    <p class="sub">Marca los servicios, pon precio y genera un texto listo para enviar.</p>
    <form id="form-prop" class="card" autocomplete="off">
      <div class="field"><label for="p-cliente">Para (cliente / negocio)</label><input type="text" id="p-cliente" placeholder="Ej.: Cafetería Luna"></div>
      <div style="margin:6px 0 4px">
        ${SERVICIOS.map((s,i)=>`<div class="svcrow">
          <label><input type="checkbox" class="svc" data-i="${i}"> ${esc(s.n)}</label>
          <input type="text" class="price" data-i="${i}" placeholder="€" inputmode="numeric">
        </div>`).join("")}
      </div>
      <button class="btn primary block" type="submit">Generar propuesta</button>
    </form>
    <div class="out" id="p-out">Tu propuesta aparecerá aquí…</div>
    <div class="btnrow"><button class="btn ghost" data-action="copyProp">Copiar propuesta</button></div>
    <div class="msg" id="msg"></div>
  </section>`;
}

function viewAjustes(){
  const a = STORE.ajustes;
  return `<section>
    <h1>Ajustes</h1>
    <p class="sub">Tus datos. Se usan en propuestas y enlaces de WhatsApp.</p>
    <form id="form-ajustes" class="card" autocomplete="off">
      <div class="field"><label for="a-whatsapp">Tu WhatsApp (con prefijo, sin +)</label><input type="text" id="a-whatsapp" value="${esc(a.whatsapp)}" placeholder="34600111222"></div>
      <div class="field"><label for="a-email">Email de contacto</label><input type="text" id="a-email" value="${esc(a.email)}" placeholder="hola@incubatunegocio.es"></div>
      <div class="field"><label for="a-web">Tu web (cuando la tengas)</label><input type="text" id="a-web" value="${esc(a.web)}" placeholder="https://..."></div>
      <button class="btn primary block" type="submit">Guardar ajustes</button>
    </form>
    <h2>Tus datos / copia de seguridad</h2>
    <div class="card">
      <p>Exporta tus clientes a Excel/CSV o guarda una copia de todo.</p>
      <div class="btnrow">
        <button class="btn ghost" data-action="exportCsv">Exportar clientes (CSV)</button>
        <button class="btn ghost" data-action="exportJson">Copia de seguridad (JSON)</button>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <p>Borrar todos los datos de este dispositivo (no se puede deshacer).</p>
      <div class="btnrow"><button class="btn danger" data-action="wipe">Borrar todo</button></div>
    </div>
    <div class="msg" id="msg"></div>
  </section>`;
}

/* ====== router ====== */
const ROUTES={"/":viewInicio,"/clientes":viewClientes,"/mensajes":viewMensajes,"/propuesta":viewPropuesta,"/ajustes":viewAjustes};
function route(){ let h=location.hash.replace(/^#/,""); return (!h||h==="/")?"/":h; }
function render(){
  const authed = !!STORE.auth;
  $("#topbar").hidden = !authed; $("#nav").hidden = !authed;
  if(!authed){ $("#app").innerHTML = viewLogin(); return; }
  const v = ROUTES[route()]||viewInicio;
  $("#app").innerHTML = v();
  document.querySelectorAll("nav.tabs a").forEach(a=>a.classList.toggle("active",a.getAttribute("data-tab")===route()));
  window.scrollTo(0,0);
}

/* ====== acciones (delegación) ====== */
function leadById(id){ return STORE.leads.find(l=>l.id===id); }
document.addEventListener("click",(e)=>{
  const el=e.target.closest("[data-action]"); if(!el) return;
  const a=el.getAttribute("data-action");
  if(a==="logout"){ STORE.auth=false; save(); location.hash="#/"; render(); }
  else if(a==="filtro"){ filtroFase=el.getAttribute("data-f"); render(); }
  else if(a==="avanzar"){ const l=leadById(el.getAttribute("data-id")); if(l){ const i=FASES.indexOf(l.fase); if(i<FASES.length-1){ l.fase=FASES[i+1]; save(); render(); } } }
  else if(a==="delLead"){ STORE.leads=STORE.leads.filter(x=>x.id!==el.getAttribute("data-id")); save(); render(); }
  else if(a==="wa"){ const l=leadById(el.getAttribute("data-id")); if(l){ const n=digits(l.contacto); const txt=PLANTILLAS[0].txt.replace(/\{nombre\}/g,l.nombre||""); try{ window.open("https://wa.me/"+n+"?text="+encodeURIComponent(txt),"_blank"); }catch(err){} flash(el,"Abriendo…"); } }
  else if(a==="copyTpl"){ copyText(PLANTILLAS[+el.getAttribute("data-i")].txt, el); }
  else if(a==="copyProp"){ const o=$("#p-out"); copyText(o?o.textContent:"", el); }
  else if(a==="exportCsv"){ exportCsv(); }
  else if(a==="exportJson"){ exportJson(); }
  else if(a==="wipe"){ STORE.leads=[]; STORE.ajustes={whatsapp:"",email:"",web:""}; save(); note("Datos borrados ✓"); render(); }
});
document.addEventListener("submit",(e)=>{
  const id=e.target.id;
  if(id==="form-login"){ e.preventDefault(); const p=$("#pass")?$("#pass").value:""; if(p===CONFIG.ADMIN_PASSWORD){ STORE.auth=true; save(); render(); } else { const er=$("#login-err"); if(er) er.textContent="Contraseña incorrecta."; } }
  else if(id==="form-lead"){ e.preventDefault();
    const nombre=($("#l-nombre")||{}).value, negocio=($("#l-negocio")||{}).value, contacto=($("#l-contacto")||{}).value, fuente=($("#l-fuente")||{}).value, nota=($("#l-nota")||{}).value;
    if(nombre && nombre.trim()){ STORE.leads.unshift({id:uid(),nombre:nombre.trim(),negocio:(negocio||"").trim(),contacto:(contacto||"").trim(),fuente:fuente||"",nota:(nota||"").trim(),fase:"Nuevo",fecha:new Date().toISOString().slice(0,10)}); save(); render(); } }
  else if(id==="form-prop"){ e.preventDefault(); generarPropuesta(); }
  else if(id==="form-ajustes"){ e.preventDefault();
    STORE.ajustes={whatsapp:digits(($("#a-whatsapp")||{}).value),email:(($("#a-email")||{}).value||"").trim(),web:(($("#a-web")||{}).value||"").trim()}; save(); note("Guardado ✓"); }
});

/* ====== propuesta ====== */
function generarPropuesta(){
  const cliente=(($("#p-cliente")||{}).value||"tu negocio").trim();
  const checks=[...document.querySelectorAll(".svc")];
  const lineas=[]; let total=0;
  checks.forEach(ch=>{ if(ch.checked){ const i=+ch.getAttribute("data-i"); const price=digits((document.querySelector('.price[data-i="'+i+'"]')||{}).value); const p=price?(parseInt(price,10)):0; total+=p; lineas.push("• "+SERVICIOS[i].n+(p?(" — "+p+"€"):" — a consultar")); } });
  const wa=STORE.ajustes.whatsapp;
  let out;
  if(!lineas.length){ out="Marca al menos un servicio para generar la propuesta."; }
  else{
    out="Propuesta para "+cliente+" 🌱\n\nLo que incluiría:\n"+lineas.join("\n")+
        (total?("\n\nTotal: "+total+"€ (pago único, sin cuotas raras)"):"")+
        "\n\nIncluye: diseño a medida, versión móvil, listo para recibir clientes por WhatsApp y tu panel para gestionarlo."+
        "\n\n¿Arrancamos? "+(wa?("Escríbeme: https://wa.me/"+wa):"");
  }
  const el=$("#p-out"); if(el) el.textContent=out;
}

/* ====== export ====== */
function descargar(nombre, contenido, tipo){
  try{ const blob=new Blob([contenido],{type:tipo}); const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download=nombre; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }catch(e){}
}
function exportCsv(){
  const head=["Nombre","Negocio","Contacto","Fuente","Fase","Nota","Fecha"];
  const rows=STORE.leads.map(l=>[l.nombre,l.negocio,l.contacto,l.fuente,l.fase,l.nota,l.fecha].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(","));
  descargar("clientes-incuba.csv",[head.join(","),...rows].join("\n"),"text/csv");
  note("CSV descargado ✓");
}
function exportJson(){ descargar("incuba-mando-backup.json",JSON.stringify(STORE,null,2),"application/json"); note("Copia descargada ✓"); }

/* ====== PWA: favicon + manifest ====== */
(function pwa(){
  const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0b1020"/><path d="M32 54V28" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/><path d="M32 34c-4-9-12-11-19-10C13 33 21 39 32 39Z" fill="#22c55e"/><path d="M32 30c3-8 10-10 16-9C47 28 41 33 32 33Z" fill="#a3e635"/></svg>';
  const d="data:image/svg+xml;utf8,"+encodeURIComponent(svg);
  const f=document.createElement("link"); f.rel="icon"; f.type="image/svg+xml"; f.href=d; document.head.appendChild(f);
  try{ const m={name:"Incuba · Centro de Mando",short_name:"Mando",start_url:".",display:"standalone",background_color:"#0b1020",theme_color:"#0b1020",icons:[{src:d,sizes:"any",type:"image/svg+xml"}]};
    const b=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/manifest+json"})); const l=document.createElement("link"); l.rel="manifest"; l.href=b; document.head.appendChild(l); }catch(e){}
})();
/* footer */
(function(){ const f=document.createElement("footer"); f.className="wrap"; f.innerHTML='Diseñado por <b>Incuba tu Negocio</b> · por '+esc(CONFIG.STUDIO_AUTHOR); document.body.appendChild(f); })();

window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
