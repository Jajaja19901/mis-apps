  <div class="note warn">Conectar requiere tu cuenta de <b>Empresa</b> en Instagram y hacerlo una vez. La publicación de Reels a veces pide una confirmación final en el móvil (límite de la plataforma).</div>
</section>`;}

function logoSvg(){return `<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lgM" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#15803d"/><stop offset="55%" stop-color="#22c55e"/><stop offset="100%" stop-color="#a3e635"/></linearGradient></defs><rect width="240" height="240" fill="url(#lgM)"/><g fill="none" stroke="#fff" stroke-width="9" stroke-linejoin="round"><rect x="52" y="98" width="136" height="92" rx="15"/><path d="M52 124 H188"/></g><g fill="#fff"><circle cx="70" cy="111" r="4.6"/><circle cx="86" cy="111" r="4.6"/><circle cx="102" cy="111" r="4.6"/></g><g transform="translate(120,152) scale(0.6) translate(-120,-128)"><g fill="#fff"><path d="M120 152 C151 154 167 133 161 104 C134 110 122 129 120 152 Z"/><path d="M120 152 C89 154 73 133 79 104 C106 110 118 129 120 152 Z"/></g><g fill="none" stroke="#fff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"><path d="M120 184 V74"/><path d="M101 96 L120 72 L139 96"/></g></g></svg>`;}
function viewMarca(){const cols=["#22c55e","#a3e635","#15803d","#0b1020","#f4f7f2"];return `<section>
  <h1>Kit de marca</h1><p class="sub">Tu logo y tus textos de perfil, siempre a mano.</p>
  <div class="grid two"><div class="card"><div class="logo-box">${logoSvg()}</div></div>
  <div class="card"><h3>Paleta</h3>${cols.map(c=>`<span class="sw" style="background:${c}"></span>`).join("")}<p class="kv">Verde #22c55e · Lima #a3e635 · Oscuro #0b1020</p></div></div>
  <div class="card" style="margin-top:12px"><h3>Bio</h3><div class="tpl" id="bio-txt">Incuba tu Negocio 🌱
Webs, catálogos y landing pages para tu negocio.
Enseña tus productos, llena tu agenda y recibe pedidos por WhatsApp.
👇 Escríbenos y te hacemos una demo gratis</div><div class="btnrow"><button class="btn primary sm" data-action="copyBio">Copiar bio</button></div></div>
  <div class="note">El logo en alta resolución y en 3 colores lo tienes en <b>incuba-logo.html</b>.</div><div class="msg" id="msg"></div></section>`;}

function viewAjustes(){const a=STORE.ajustes;return `<section>
  <h1>Ajustes</h1><p class="sub">Tus datos. Se usan en propuestas y enlaces.</p>
  <form id="form-ajustes" class="card" autocomplete="off">
    <div class="field"><label for="a-whatsapp">Tu WhatsApp (con prefijo, sin +)</label><input type="text" id="a-whatsapp" value="${esc(a.whatsapp)}" placeholder="34600111222"></div>
    <div class="field"><label for="a-email">Email</label><input type="text" id="a-email" value="${esc(a.email)}" placeholder="hola@incubatunegocio.es"></div>
    <div class="field"><label for="a-web">Tu web (cuando la tengas)</label><input type="text" id="a-web" value="${esc(a.web)}" placeholder="https://..."></div>
    <button class="btn primary block" type="submit">Guardar ajustes</button></form>
  <div class="btnrow" style="margin-top:12px"><a class="btn ghost sm" href="#/marca">🎨 Kit de marca</a><button class="btn ghost sm" data-action="exportCsv">Exportar clientes CSV</button><button class="btn ghost sm" data-action="exportJson">Copia de seguridad</button></div>
  <div class="card" style="margin-top:12px"><p>Borrar todos los datos de este dispositivo (no se puede deshacer).</p><div class="btnrow"><button class="btn danger" data-action="wipe">Borrar todo</button></div></div>
  <div class="msg" id="msg"></div></section>`;}

/* ===== router ===== */
const ROUTES={"/":viewInicio,"/contenido":viewContenido,"/estudio":viewEstudio,"/clientes":viewClientes,"/mensajes":viewMensajes,"/propuesta":viewPropuesta,"/automatizacion":viewAutomatizacion,"/marca":viewMarca,"/ajustes":viewAjustes};
function route(){let h=location.hash.replace(/^#/,"");return (!h||h==="/")?"/":h;}
function render(){
  const authed=!!STORE.auth;$("#topbar").hidden=!authed;$("#nav").hidden=!authed;
  if(!authed){$("#app").innerHTML=viewLogin();return;}
  const v=ROUTES[route()]||viewInicio;$("#app").innerHTML=v();
  document.querySelectorAll("nav.tabs a").forEach(a=>a.classList.toggle("active",a.getAttribute("data-tab")===route()));
  window.scrollTo(0,0);
}

/* ===== generador de prompts ===== */
function genPrompts(){
  const idea=(($("#g-idea")||{}).value||"").trim()||"tu negocio";
  const est=($("#g-estilo")||{}).value||"Cinemático";const e=ESTILOS[est]||ESTILOS["Cinemático"];
  const img="Vertical 9:16. "+idea+". "+e[0]+" Alta calidad, muy detallado, sin texto superpuesto.";
  const vid="Anima esta imagen (imagen→vídeo): "+e[1]+". Movimiento fluido y natural, 4-5 segundos, formato 9:16.";
  if($("#g-out-img"))$("#g-out-img").textContent=img;
  if($("#g-out-vid"))$("#g-out-vid").textContent=vid;
}

/* ===== propuesta ===== */
function generarPropuesta(){
  const cliente=(($("#p-cliente")||{}).value||"tu negocio").trim();
  const lineas=[];let total=0;
  document.querySelectorAll(".svc").forEach(ch=>{if(ch.checked){const i=+ch.getAttribute("data-i");const pr=digits((document.querySelector('.price[data-i="'+i+'"]')||{}).value);const p=pr?parseInt(pr,10):0;total+=p;lineas.push("• "+SERVICIOS[i]+(p?(" — "+p+"€"):" — a consultar"));}});
  const wa=STORE.ajustes.whatsapp;let out;
  if(!lineas.length)out="Marca al menos un servicio para generar la propuesta.";
  else out="Propuesta para "+cliente+" 🌱\n\nLo que incluiría:\n"+lineas.join("\n")+(total?("\n\nTotal: "+total+"€ (pago único, sin cuotas raras)"):"")+"\n\nIncluye: diseño a medida, versión móvil, listo para recibir clientes por WhatsApp y tu panel para gestionarlo.\n\n¿Arrancamos? "+(wa?("Escríbeme: https://wa.me/"+wa):"");
  if($("#p-out"))$("#p-out").textContent=out;
}

/* ===== export ===== */
function descargar(n,c,t){try{const b=new Blob([c],{type:t});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}catch(e){}}
function exportCsv(){const head=["Nombre","Negocio","Contacto","Fuente","Fase","Nota","Fecha"];const rows=STORE.leads.map(l=>[l.nombre,l.negocio,l.contacto,l.fuente,l.fase,l.nota,l.fecha].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(","));descargar("clientes-incuba.csv",[head.join(","),...rows].join("\n"),"text/csv");note("CSV descargado ✓");}

/* ===== acciones ===== */
function leadById(id){return STORE.leads.find(l=>l.id===id);}
function guionById(id){return GUIONES.find(g=>g.id===id);}
function guionToText(g){return "🎬 "+g.titulo+"\nGancho: "+g.hook+"\n"+g.escenas.map(s=>"["+s.t+"] "+s.ot).join("\n")+"\nCTA: "+g.cta+"\n"+g.hashtags.join(" ")+"\nPROMPT VÍDEO: "+g.prompt;}
document.addEventListener("click",(e)=>{
  const el=e.target.closest("[data-action]");if(!el)return;const a=el.getAttribute("data-action");
  if(a==="logout"){STORE.auth=false;save();location.hash="#/";render();}
  else if(a==="toggle"){const d=$("#d-"+el.getAttribute("data-id"));if(d){const o=!d.hidden;d.hidden=o;el.textContent=o?"Ver guion ▾":"Ocultar ▴";}}
  else if(a==="copyGuion"){const g=guionById(el.getAttribute("data-id"));if(g)copyText(guionToText(g),el);}
  else if(a==="producir"){const g=guionById(el.getAttribute("data-id"));ideaProd=g?(g.hook):"";location.hash="#/estudio";render();}
  else if(a==="fpilar"){filtroPilar=el.getAttribute("data-f");render();}
  else if(a==="ffase"){filtroFase=el.getAttribute("data-f");render();}
  else if(a==="genPrompt"){genPrompts();}
  else if(a==="copyImg"){const o=$("#g-out-img");copyText(o?o.textContent:"",el);}
  else if(a==="copyVid"){const o=$("#g-out-vid");copyText(o?o.textContent:"",el);}
  else if(a==="paso"){const i=+el.getAttribute("data-i");STORE.pasos[i]=!STORE.pasos[i];if(!STORE.pasos[i])delete STORE.pasos[i];save();render();}
  else if(a==="avanzar"){const l=leadById(el.getAttribute("data-id"));if(l){const i=FASES.indexOf(l.fase);if(i<FASES.length-1){l.fase=FASES[i+1];save();render();}}}
  else if(a==="delLead"){STORE.leads=STORE.leads.filter(x=>x.id!==el.getAttribute("data-id"));save();render();}
  else if(a==="wa"){const l=leadById(el.getAttribute("data-id"));if(l){const n=digits(l.contacto);const txt=PLANTILLAS[0][1].replace(/\{nombre\}/g,l.nombre||"");try{window.open("https://wa.me/"+n+"?text="+encodeURIComponent(txt),"_blank");}catch(err){}flash(el,"Abriendo…");}}
  else if(a==="copyTpl"){copyText(PLANTILLAS[+el.getAttribute("data-i")][1],el);}
  else if(a==="copyProp"){const o=$("#p-out");copyText(o?o.textContent:"",el);}
  else if(a==="copyBio"){const o=$("#bio-txt");copyText(o?o.innerText:"",el);}
  else if(a==="exportCsv"){exportCsv();}
  else if(a==="exportJson"){descargar("incuba-sistema-backup.json",JSON.stringify(STORE,null,2),"application/json");note("Copia descargada ✓");}
  else if(a==="wipe"){STORE.leads=[];STORE.ajustes={whatsapp:"",email:"",web:""};STORE.pub={};STORE.pasos={};save();note("Datos borrados ✓");render();}
});
document.addEventListener("submit",(e)=>{
  const id=e.target.id;
  if(id==="form-login"){e.preventDefault();const p=$("#pass")?$("#pass").value:"";if(p===CONFIG.ADMIN_PASSWORD){STORE.auth=true;save();render();}else{const er=$("#login-err");if(er)er.textContent="Contraseña incorrecta.";}}
  else if(id==="form-lead"){e.preventDefault();const n=($("#l-nombre")||{}).value;if(n&&n.trim()){STORE.leads.unshift({id:uid(),nombre:n.trim(),negocio:(($("#l-negocio")||{}).value||"").trim(),contacto:(($("#l-contacto")||{}).value||"").trim(),fuente:($("#l-fuente")||{}).value||"",nota:(($("#l-nota")||{}).value||"").trim(),fase:"Nuevo",fecha:new Date().toISOString().slice(0,10)});save();render();}}
  else if(id==="form-prop"){e.preventDefault();generarPropuesta();}
  else if(id==="form-ajustes"){e.preventDefault();STORE.ajustes={whatsapp:digits(($("#a-whatsapp")||{}).value),email:(($("#a-email")||{}).value||"").trim(),web:(($("#a-web")||{}).value||"").trim()};save();note("Guardado ✓");}
});

(function(){const f=document.createElement("footer");f.className="wrap";f.innerHTML='Diseñado por <b>Incuba tu Negocio</b> · por '+esc(CONFIG.STUDIO_AUTHOR)+' · '+esc(CONFIG.HANDLE);document.body.appendChild(f);})();
window.addEventListener("hashchange",render);
render();
</script>
