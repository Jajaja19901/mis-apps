  const ic=iconURI(); const fav=document.getElementById('favicon'), ap=document.getElementById('appleIcon'); if(fav)fav.href=ic; if(ap)ap.href=ic;
  const man={name:CONFIG.APP_NAME,short_name:'Logopedia',start_url:'.',display:'standalone',background_color:'#f3f7f8',theme_color:'#0e7c86',icons:[{src:ic,sizes:'any',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(man)],{type:'application/manifest+json'}); const l=document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(blob); document.head.appendChild(l);
}

/* ============ Layout ============ */
function header(){ return `<header class="top"><div class="wrap nav"><a class="logo" href="#/"><span class="mk">${LOGO_SVG}</span>${esc(CONFIG.APP_NAME)}</a><span class="sp"></span><a class="panel-link" href="#/panel" aria-label="Panel del profesional" title="Panel">🔒</a></div></header>`; }
function footer(){ const credit=`Aplicación creada por <b>${esc(CONFIG.STUDIO_AUTHOR)}</b> · ${esc(CONFIG.STUDIO_BRAND)}`; return `<footer><div class="wrap"><button class="fl" data-action="install" id="installBtn" style="display:none">📲 Instalar app</button><a class="fl" href="#/">Inicio</a><a class="fl" href="#/aviso">Contacto y aviso</a><div class="credit">${CONFIG.STUDIO_URL?`<a href="${esc(CONFIG.STUDIO_URL)}" target="_blank" rel="noopener noreferrer" style="color:#90a2aa">${credit}</a>`:credit}</div></div></footer>`; }
function page(inner){ return header()+'<main id="main" class="wrap">'+inner+'</main>'+footer(); }
function back(href,txt){ return `<a class="btn btn-ghost btn-sm" href="${href}">← ${esc(txt||'Volver')}</a>`; }
function tiles(list){ return `<div class="grid">${list.map(t=>`<button class="tile" data-action="go" data-h="${t.h}"><span class="te" aria-hidden="true">${t.e}</span><b>${esc(t.b)}</b><small>${esc(t.s)}</small></button>`).join('')}</div>`; }

/* ============ Home ============ */
function viewHome(){
  return page(`<section class="hero"><div class="big-emoji" aria-hidden="true">🗣️</div><h1>Logopedia para adultos</h1><p class="muted">Apoyo para personas con afasia, ELA o deterioro cognitivo. Para practicar en casa entre sesiones. Todo se lee en voz alta.</p></section>
  <section>${tiles([
    {h:'#/comunicar',e:'🗨️',b:'Comunicar',s:'Tablero para expresar necesidades sin hablar'},
    {h:'#/lenguaje',e:'🧠',b:'Lenguaje',s:'Afasia: nombrar, frases y categorías'},
    {h:'#/memoria',e:'📅',b:'Memoria y orientación',s:'Saber qué día es y ejercitar la memoria'},
    {h:'#/praxias',e:'👄',b:'Praxias y voz',s:'Ejercicios de boca, lengua y respiración'}
  ])}</section>
  <section><div class="disclaimer">Esta aplicación es un <b>apoyo</b> para practicar; no es un tratamiento ni un diagnóstico y no sustituye las sesiones con la logopeda. Úsela acompañado de un familiar o cuidador si es necesario.</div></section>`);
}

/* ============ Comunicador ============ */
function viewComunicar(){
  const cat=COMM.find(c=>c.id===COMM_CAT)||COMM[0];
  return page(`<section>${back('#/','Inicio')}<div class="center" style="margin:8px 0 10px"><h2>Comunicar</h2><p class="muted">Toque los cuadros para formar un mensaje. Pulse 🔊 para que la app lo diga.</p></div>
    <div class="strip"><div class="strip-row"><div class="strip-items" id="stripItems">${PHRASE.length?PHRASE.map(p=>`<span class="sp-item"><span class="e" aria-hidden="true">${esc(p.e)}</span><span class="w">${esc(p.w)}</span></span>`).join(''):'<span class="ph">Toque abajo para formar el mensaje…</span>'}</div><div class="strip-ctrl"><button class="say" data-action="say-phrase" aria-label="Leer el mensaje en voz alta">🔊</button><button data-action="del" aria-label="Borrar lo último">⌫</button><button data-action="clear" aria-label="Vaciar el mensaje">🗑️</button></div></div></div>
    <div class="chips">${COMM.map(c=>`<button class="chip ${c.id===COMM_CAT?'active':''}" data-action="cat" data-c="${c.id}" aria-pressed="${c.id===COMM_CAT}">${esc(c.label)}</button>`).join('')}</div>
    <div class="pic-grid">${cat.items.map(it=>`<button class="pic-btn" data-action="add" data-w="${esc(it.w)}" data-e="${esc(it.e)}"><span class="pe" aria-hidden="true">${esc(it.e)}</span><span class="pw">${esc(it.w)}</span></button>`).join('')}</div></section>`);
}

/* ============ Quiz genérico ============ */
function genDenom(){ const correct=rand(OBJETOS); const dist=shuffle(OBJETOS.filter(o=>o.w!==correct.w)).slice(0,2); const opts=shuffle([{...correct,c:true},...dist.map(d=>({...d,c:false}))]); return {title:'¿Qué es esto?',prompt:{kind:'image',value:correct.e},say:'¿Qué es esto?',options:opts.map(o=>({kind:'text',label:o.w,correct:o.c}))}; }
function genFrase(){ const r=rand(REFRANES); const opts=shuffle([{label:r.b,correct:true},...r.dist.map(d=>({label:d,correct:false}))]); return {title:'Complete el dicho',prompt:{kind:'text',value:'«'+r.a+' …»'},say:r.a,options:opts.map(o=>({kind:'text',label:o.label,correct:o.correct}))}; }
function genCateg(){ const cat=rand(CATEGS); const correct=rand(cat.items); const dist=shuffle(cat.dist).slice(0,2); const opts=shuffle([{...correct,c:true},...dist.map(d=>({...d,c:false}))]); return {title:'Categorías',prompt:{kind:'text',value:'¿Cuál es '+cat.label+'?'},say:'¿Cuál es '+cat.label.replace(/[A-Z]/g,m=>m.toLowerCase())+'?',options:opts.map(o=>({kind:'image',emoji:o.e,label:o.w,correct:o.c}))}; }
const GENS={denom:genDenom,frase:genFrase,categ:genCateg};
function quiz(key){ if(!QZ||QZKEY!==key){ QZ=GENS[key](); QZKEY=key; } return QZ; }
function renderQuiz(backHref,backTxt,q){
  let promptHTML='';
  if(q.prompt.kind==='image') promptHTML=`<div class="qpic" aria-hidden="true">${esc(q.prompt.value)}</div>`;
  else promptHTML=`<div class="qprompt">${esc(q.prompt.value)}</div>`;
  const sayBtn=q.say?`<button class="speak-btn" data-action="say" data-w="${esc(q.say)}">🔊 Escuchar</button>`:'';
  const img=q.options[0]&&q.options[0].kind==='image';
  const opts=img
    ? `<div class="opt-imgs">${q.options.map(o=>`<button class="opt-img" data-action="answer" data-correct="${o.correct?1:0}" aria-label="${esc(o.label)}"><span class="oe" aria-hidden="true">${esc(o.emoji)}</span><span class="ow">${esc(o.label)}</span></button>`).join('')}</div>`
    : `<div class="opts">${q.options.map(o=>`<button class="optbtn" data-action="answer" data-correct="${o.correct?1:0}">${esc(o.label)}</button>`).join('')}</div>`;
  return page(`<section>${back(backHref,backTxt)}<div class="qbox"><h2>${esc(q.title)}</h2>${promptHTML}${sayBtn}<div class="feedback" id="fb" aria-live="polite"></div>${opts}</div></section>`);
}
function viewLenguaje(sub){
  if(!sub) return page(`<section>${back('#/','Inicio')}<div class="center" style="margin:8px 0 14px"><h2>Lenguaje</h2><p class="muted">Ejercicios para recuperar y mantener las palabras (afasia).</p></div>${tiles([
    {h:'#/lenguaje/denominacion',e:'🖼️',b:'Nombrar objetos',s:'¿Qué es esto?'},
    {h:'#/lenguaje/frases',e:'💬',b:'Frases hechas',s:'Complete el dicho'},
    {h:'#/lenguaje/categorias',e:'🗂️',b:'Categorías',s:'¿Cuál pertenece a…?'}
  ])}</section>`);
  if(sub==='denominacion') return renderQuiz('#/lenguaje','Lenguaje',quiz('denom'));
  if(sub==='frases') return renderQuiz('#/lenguaje','Lenguaje',quiz('frase'));
  if(sub==='categorias') return renderQuiz('#/lenguaje','Lenguaje',quiz('categ'));
  return viewLenguaje();
}

/* ============ Memoria y orientación ============ */
function viewMemoria(sub){
  if(!sub) return page(`<section>${back('#/','Inicio')}<div class="center" style="margin:8px 0 14px"><h2>Memoria y orientación</h2></div>${tiles([
    {h:'#/memoria/orientacion',e:'📅',b:'¿Qué día es hoy?',s:'Orientación en el tiempo'},
    {h:'#/memoria/pares',e:'🃏',b:'Juego de parejas',s:'Encontrar las cartas iguales'}
  ])}</section>`);
  if(sub==='orientacion') return viewOrientacion();
  if(sub==='pares') return viewPares();
  return viewMemoria();
}
function viewOrientacion(){
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const d=new Date(); const h=d.getHours();
  const momento = h<6?'la madrugada':h<12?'la mañana':h<14?'el mediodía':h<20?'la tarde':'la noche';
  const m=d.getMonth(); const estacion = (m===11||m<2)?'invierno':(m<5)?'primavera':(m<8)?'verano':'otoño';
  const frase=`Hoy es ${dias[d.getDay()]}, ${d.getDate()} de ${meses[m]} de ${d.getFullYear()}. Estamos en ${momento} y en ${estacion}.`;
  const cards=[
    {e:'📆',l:'Día',v:dias[d.getDay()]},
    {e:'🔢',l:'Fecha',v:d.getDate()+' de '+meses[m]},
    {e:'🗓️',l:'Año',v:String(d.getFullYear())},
    {e:'🕐',l:'Momento del día',v:momento.replace(/^(el |la )/,'')},
    {e:'🍂',l:'Estación',v:estacion}
  ];
  return page(`<section>${back('#/memoria','Memoria')}<div class="center" style="margin:8px 0 14px"><h2>¿Qué día es hoy?</h2><p class="muted">Lea en voz alta con la persona. Pulse para escucharlo.</p></div>
  <div class="orient" id="orientHoy">${cards.map(c=>`<div class="or-card"><span class="oe" aria-hidden="true">${c.e}</span><div><div class="ol">${esc(c.l)}</div><div class="ov">${esc(c.v)}</div></div></div>`).join('')}</div>
  <div class="center" style="margin-top:16px"><button class="btn btn-primary" data-action="say" data-w="${esc(frase)}">🔊 Escuchar el día de hoy</button></div></section>`);
}
function newMem(){ const cards=shuffle(MEM_SET.concat(MEM_SET)).map(e=>({e,up:false,done:false})); MEM={cards,first:-1,lock:false,moves:0}; }
function viewPares(){
  if(!MEM) newMem();
  const done=MEM.cards.every(c=>c.done);
  return page(`<section>${back('#/memoria','Memoria')}<div class="center" style="margin:8px 0 10px"><h2>Juego de parejas</h2><p class="muted">Encuentre las dos cartas iguales.</p></div>
  <div class="mem-stat">Movimientos: ${MEM.moves}${done?' · ¡Completado! 🎉':''}</div>
  <div class="mem-grid">${MEM.cards.map((c,i)=>`<button class="mem-card ${c.done?'done':(c.up?'up':'')}" data-action="flip" data-i="${i}" ${c.done||c.up?'aria-label="'+esc(c.e)+'"':'aria-label="carta tapada"'}>${(c.up||c.done)?esc(c.e):''}</button>`).join('')}</div>
  <div class="center" style="margin-top:16px"><button class="btn btn-ghost btn-sm" data-action="mem-reset">↺ Empezar de nuevo</button></div></section>`);
}

/* ============ Praxias ============ */
function viewPraxias(){
  return page(`<section>${back('#/','Inicio')}<div class="center" style="margin:8px 0 14px"><h2>Praxias y voz</h2><p class="muted">Ejercicios de boca, lengua, respiración y voz. Pulse 🔊 para oír la instrucción. Hágalos despacio y sin forzar.</p></div>
  <div class="exlist">${PRAXIAS.map(x=>`<div class="excard"><span class="ee" aria-hidden="true">${x.e}</span><div class="ex-body"><b>${esc(x.n)}</b><p class="muted" style="margin:.2em 0 0;font-size:16px">${esc(x.t)}</p></div><button class="btn btn-primary btn-sm" data-action="say" data-w="${esc(x.n+'. '+x.t)}" aria-label="Escuchar ${esc(x.n)}">🔊</button></div>`).join('')}</div></section>`);
}

/* ============ Aviso / contacto ============ */
function viewAviso(){
  const wa=CONFIG.WHATSAPP.replace(/\D/g,'');
  return page(`<section>${back('#/','Inicio')}<div class="box" style="text-align:left"><h2>Contacto y aviso</h2>
  <p><b>${esc(CONFIG.APP_NAME)}</b><br>${esc(CONFIG.CITY)}<br>📞 WhatsApp: <a href="https://wa.me/${wa}" target="_blank" rel="noopener noreferrer" style="font-weight:700">${esc(CONFIG.WHATSAPP.replace(/^34/,'+34 '))}</a>${CONFIG.EMAIL?`<br>✉️ <a href="mailto:${esc(CONFIG.EMAIL)}" style="font-weight:700">${esc(CONFIG.EMAIL)}</a>`:''}</p>
  <hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
  <p><b>Apoyo, no tratamiento.</b> Esta herramienta ayuda a practicar la comunicación, el lenguaje y la memoria. No es un diagnóstico ni sustituye las sesiones con la logopeda colegiada.</p>
  <p><b>Privacidad.</b> No se piden datos personales. Las notas del panel se guardan solo en este dispositivo (localStorage) y no se envían a ningún servidor; por eso no se aplican cookies de seguimiento.</p>
  <div class="center" style="margin-top:16px"><a class="btn btn-green" href="https://wa.me/${wa}" target="_blank" rel="noopener noreferrer">Escribir por WhatsApp</a> <a class="btn btn-ghost" href="#/">Volver</a></div></div></section>`);
}

/* ============ Panel del profesional ============ */
let PANEL_OK=false;
function viewPanel(){
  if(!PANEL_OK) return page(`<section>${back('#/','Inicio')}<div class="box" style="max-width:420px"><h2>Panel</h2><p class="muted">Acceso solo para la logopeda.</p><label for="pw">Contraseña</label><input id="pw" type="password" autocomplete="off" placeholder="••••••"><div style="margin-top:14px"><button class="btn btn-primary btn-block" data-action="login">Entrar</button></div></div></section>`);
  const notes=DB.get(K.notes,'');
  return page(`<section>${back('#/','Inicio')}<div class="box" style="text-align:left"><h2>Panel de la logopeda</h2>
  <p class="muted">Notas rápidas de sesión. Se guardan <b>solo en este dispositivo</b>.</p>
  <label for="notes">Notas</label><textarea id="notes" placeholder="Objetivos, ejercicios recomendados, observaciones…">${esc(notes)}</textarea>
  <div class="row" style="margin-top:12px"><button class="btn btn-primary" data-action="save-notes">💾 Guardar notas</button><button class="btn btn-ghost" data-action="clear-notes">Borrar notas</button><button class="btn btn-ghost" data-action="logout">Salir</button></div>
  <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
  <p class="muted" style="font-size:15px">Para personalizar el nombre, el WhatsApp o la contraseña, edite la caja <code>CONFIG</code> al principio del archivo HTML.</p></div></section>`);
}

/* ============ Router ============ */
function parse(){ return location.hash.replace(/^#\/?/,'').split('/'); }
function render(){
  const p=parse(), a=p[0], b=p[1]; let html;
  if(a===''||a==null) html=viewHome();
  else if(a==='comunicar') html=viewComunicar();
  else if(a==='lenguaje') html=viewLenguaje(b);
  else if(a==='memoria') html=viewMemoria(b);
  else if(a==='praxias') html=viewPraxias();
  else if(a==='aviso') html=viewAviso();
  else if(a==='panel') html=viewPanel();
  else html=viewHome();
  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
}

/* ============ Eventos ============ */
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const act=el.dataset.action;
  switch(act){
    case 'go': location.hash=el.dataset.h; break;
    case 'install': installApp(); break;
    case 'say': speak(el.dataset.w); break;
    case 'cat': COMM_CAT=el.dataset.c; render(); break;
    case 'add': PHRASE.push({w:el.dataset.w,e:el.dataset.e}); speak(el.dataset.w); render(); break;
    case 'del': PHRASE.pop(); render(); break;
    case 'clear': PHRASE=[]; render(); break;
    case 'say-phrase': if(PHRASE.length) speak(PHRASE.map(p=>p.w).join(' ')); break;
    case 'answer':{ const ok=el.dataset.correct==='1'; const fb=document.getElementById('fb');
      document.querySelectorAll('[data-action="answer"]').forEach(o=>o.disabled=true); el.classList.add(ok?'good':'bad');
      if(ok){ if(fb){fb.textContent='¡Correcto! 👏'; fb.className='feedback ok';} speak('Correcto'); }
      else { if(fb){fb.textContent='No es esa. Inténtelo otra vez.'; fb.className='feedback no';} document.querySelectorAll('[data-correct="1"]').forEach(o=>o.classList.add('good')); }
      setTimeout(()=>{ QZ=null; render(); }, ok?1200:1700); break; }
    case 'flip':{ if(!MEM||MEM.lock) break; const i=+el.dataset.i; const c=MEM.cards[i]; if(c.up||c.done) break;
      c.up=true; speak('');
      if(MEM.first===-1){ MEM.first=i; render(); }
      else { MEM.moves++; const f=MEM.cards[MEM.first];
        if(f.e===c.e){ f.done=c.done=true; MEM.first=-1; render(); }
        else { MEM.lock=true; render(); setTimeout(()=>{ f.up=c.up=false; MEM.first=-1; MEM.lock=false; render(); },900); } }
      break; }
    case 'mem-reset': newMem(); render(); break;
    case 'login':{ const v=(document.getElementById('pw')||{}).value||''; if(v===CONFIG.ADMIN_PASSWORD){ PANEL_OK=true; render(); } else { toast('Contraseña incorrecta'); } break; }
    case 'logout': PANEL_OK=false; location.hash='#/'; break;
    case 'save-notes':{ const t=(document.getElementById('notes')||{}).value||''; DB.set(K.notes,t); toast('Notas guardadas'); break; }
    case 'clear-notes': DB.set(K.notes,''); render(); toast('Notas borradas'); break;
  }
});

/* ============ Init ============ */
window.addEventListener('hashchange',render);
setupPWA();
render();
</script>
