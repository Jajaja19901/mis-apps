<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Laura M M · Logopedia de adultos</title>
<meta name="description" content="Apoyo de logopedia para adultos: comunicación, lenguaje (afasia), memoria y orientación, y praxias. Para personas con ELA, afasia o deterioro cognitivo.">
<meta name="theme-color" content="#0e7c86">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" id="favicon">
<style>
:root{
  --brand:#0e7c86; --brand-soft:#dcf0f1; --brand-dk:#0a5b63;
  --ink:#15242b; --ink-soft:#566873; --line:#d8e3e6; --surface:#ffffff; --bg:#f3f7f8;
  --warm:#b4530a; --warm-soft:#fbe7d6; --green:#1f7a44; --green-soft:#dcf0e2; --red:#b32626; --red-soft:#f7dada;
  --r:16px; --r-lg:22px; --sh:0 2px 12px rgba(10,60,66,.07); --sh-lg:0 8px 30px rgba(10,60,66,.12);
}
*{box-sizing:border-box} html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:18px;line-height:1.5}
h1,h2,h3{font-weight:800;line-height:1.18;margin:0 0 .35em} h1{font-size:30px} h2{font-size:24px}
p{margin:0 0 .8em} a{color:var(--brand)} .muted{color:var(--ink-soft)}
.wrap{max-width:780px;margin:0 auto;padding:0 16px}
.center{text-align:center}
.top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:8px;padding:12px 16px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--ink);text-decoration:none;font-size:19px;min-width:0;flex:1 1 auto}
.logo .mk{width:36px;height:36px;flex:0 0 auto}
.logo .lname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.sp{display:none}
.icon-btn{border:1px solid var(--line);background:var(--surface);border-radius:12px;width:42px;height:42px;font-size:20px;cursor:pointer}
.panel-link{width:42px;height:42px;flex:0 0 auto;display:grid;place-items:center;border:1px solid var(--line);border-radius:12px;background:var(--surface);text-decoration:none;font-size:18px;color:var(--ink)}
section{padding:18px 0}
.btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:14px;padding:14px 20px;font-size:18px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:.12s}
.btn-primary{background:var(--brand);color:#fff} .btn-primary:hover{background:var(--brand-dk)}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)} .btn-ghost:hover{border-color:var(--brand)}
.btn-sm{padding:10px 14px;font-size:16px}
.btn-block{width:100%;justify-content:center}
.hero{text-align:center;padding:26px 0 8px}
.big-emoji{font-size:64px}
.grid{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
.tile{display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:20px;cursor:pointer;font-family:inherit;box-shadow:var(--sh);transition:.14s}
.tile:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.tile .te{font-size:42px} .tile b{font-size:20px} .tile small{color:var(--ink-soft);font-size:15px}
.box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:24px;max-width:680px;margin:0 auto}
/* Comunicador */
.strip{position:sticky;top:66px;z-index:20;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px}
.strip-row{display:flex;align-items:center;gap:8px;padding:10px}
.strip-items{flex:1;display:flex;gap:8px;flex-wrap:wrap;min-height:56px;align-items:center}
.strip-items .ph{color:var(--ink-soft);font-size:16px}
.sp-item{display:flex;flex-direction:column;align-items:center;background:var(--brand-soft);border-radius:10px;padding:6px 8px;min-width:56px}
.sp-item .e{font-size:26px} .sp-item .w{font-size:13px;font-weight:700}
.strip-ctrl{display:flex;gap:6px}
.strip-ctrl button{border:none;border-radius:10px;width:46px;height:46px;font-size:20px;cursor:pointer;background:var(--bg)}
.strip-ctrl .say{background:var(--brand);color:#fff}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{border:1.5px solid var(--line);background:var(--surface);border-radius:999px;padding:10px 16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.pic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.pic-grid{grid-template-columns:repeat(3,1fr)}}
.pic-btn{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:16px 8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;gap:6px;align-items:center;transition:.12s;min-height:104px;justify-content:center}
.pic-btn:hover{border-color:var(--brand);transform:translateY(-2px)} .pic-btn .pe{font-size:42px} .pic-btn .pw{font-size:17px;font-weight:700}
/* Quiz */
.qbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:24px 20px;max-width:620px;margin:0 auto;text-align:center}
.qpic{font-size:104px;margin:4px 0 14px}
.qprompt{font-size:22px;font-weight:700;margin:6px 0 14px}
.speak-btn{border:1.5px solid var(--brand);background:var(--brand-soft);color:var(--brand-dk);border-radius:12px;padding:10px 16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
.feedback{min-height:30px;font-weight:800;font-size:19px;margin:6px 0} .feedback.ok{color:var(--green)} .feedback.no{color:var(--warm)}
.opts{display:grid;gap:12px;max-width:460px;margin:0 auto}
.optbtn{border:1.5px solid var(--line);background:var(--surface);border-radius:14px;padding:16px;font-size:19px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);transition:.12s}
.optbtn:hover{border-color:var(--brand)} .optbtn.good{background:var(--green-soft);border-color:var(--green);color:var(--green)} .optbtn.bad{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.opt-img{border:1.5px solid var(--line);background:var(--surface);border-radius:16px;padding:16px 6px;cursor:pointer;font-family:inherit;transition:.12s;display:flex;flex-direction:column;gap:4px;align-items:center}
.opt-img:hover{border-color:var(--brand)} .opt-img .oe{font-size:44px} .opt-img .ow{font-size:15px;font-weight:700}
.opt-img.good{background:var(--green-soft);border-color:var(--green)} .opt-img.bad{background:var(--red-soft);border-color:var(--red)}
/* Encontrar la palabra (SFA) */
.sfa-word{font-size:30px;font-weight:800;color:var(--brand-dk);margin:0 0 14px;min-height:36px}
.ficha{text-align:left;background:#f6fafb;border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;margin:6px 0 14px}
.ficha-h{font-weight:800;font-size:15px;color:var(--brand-dk);margin-bottom:8px;text-transform:uppercase;letter-spacing:.02em}
.ficha-grid{display:grid;gap:8px}
@media(min-width:520px){.ficha-grid{grid-template-columns:1fr 1fr}}
.feat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.feat .fl2{display:block;font-size:13px;font-weight:800;color:var(--soft)} .feat .fv{font-size:16px}
.cues{text-align:left;display:grid;gap:8px;margin:0 0 14px}
.cue{background:var(--warm-soft);border:1px solid #f0cda9;border-radius:12px;padding:10px 14px;font-size:17px;font-weight:600;color:#7a3c08}
.sfa-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
/* Fluencia */
.flu-cat{font-size:18px;margin-bottom:10px} .flu-cat b{color:var(--brand-dk)}
.flu-big{font-size:64px;font-weight:800;color:var(--brand);line-height:1.1}
.flu-time{font-size:22px;font-weight:800;color:var(--warm);margin-bottom:4px}
/* Header racha */
.streak{flex:0 0 auto;display:inline-flex;align-items:center;height:42px;padding:0 12px;border:1px solid var(--line);border-radius:12px;background:#fff7ec;color:#9a5a00;font-weight:800;text-decoration:none;font-size:15px}
/* Biofeedback voz */
.meter{position:relative;width:90px;height:200px;margin:6px auto 4px;border:2px solid var(--line);border-radius:14px;background:#f6fafb;overflow:hidden}
.meter-fill{position:absolute;bottom:0;left:0;right:0;background:var(--teal);transition:height .08s linear}
.meter-target{position:absolute;left:0;right:0;bottom:60%;border-top:3px dashed #e8a300;z-index:2}
.meter-val{font-weight:800;font-size:18px;margin:2px 0}
.mpt{margin-top:8px;font-size:16px} .mpt b{color:var(--brand-dk)}
.pic-img{width:46px;height:46px;object-fit:cover;border-radius:8px;display:block}
.sp-item .pic-img{width:30px;height:30px}
.scan-select{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:40;border:none;background:var(--brand);color:#fff;font-weight:800;font-size:20px;padding:16px 26px;border-radius:16px;cursor:pointer;font-family:inherit;box-shadow:var(--sh-lg)}
.pic-btn.scanon{outline:5px solid var(--warm);outline-offset:2px;background:var(--warm-soft);transform:scale(1.03)}
/* Progreso */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:520px){.stat-cards{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--sh)}
.sc-n{font-size:30px;font-weight:800;color:var(--brand)} .sc-l{font-size:14px;color:var(--soft)}
.pr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.pr-l{flex:0 0 38%;font-weight:700;font-size:15px} .pr-v{flex:0 0 auto;font-weight:800;font-size:15px}
.bar{flex:1;height:12px;border-radius:999px;background:var(--line);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:var(--green)} .bar i.low{background:var(--red)} .bar i.mid{background:#e8a300}
.plan-card{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#0e7c86,#0a5b63);color:#fff;border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh)}
.plan-card .plan-l{flex:1;min-width:0} .plan-card .plan-h{font-weight:800;font-size:20px} .plan-card .plan-s{font-size:14px;opacity:.95}
.plan-card .btn{flex:0 0 auto;background:#fff;color:#0a5b63}
.ses-banner{background:var(--brand-soft);border:1.5px solid #bfe3e6;border-radius:14px;padding:10px 14px;margin:0 0 14px}
.ses-top{display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:800;color:var(--brand-dk);font-size:15px}
.ses-exit{border:none;background:#fff;border-radius:8px;width:30px;height:30px;cursor:pointer;font-weight:800;color:var(--soft)}
.ses-bar{height:10px;background:#fff;border-radius:999px;overflow:hidden;margin:8px 0 4px} .ses-bar i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .3s}
.ses-step{font-size:13px;color:var(--soft);font-weight:700}
.evo{display:flex;align-items:flex-end;gap:5px;height:120px}
.evo-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.evo-bar{flex:1;width:100%;display:flex;align-items:flex-end;background:#eef3f4;border-radius:6px;overflow:hidden}
.evo-bar i{width:100%;border-radius:6px 6px 0 0;background:var(--green)} .evo-bar i.low{background:var(--red)} .evo-bar i.mid{background:#e8a300} .evo-bar i.empty{background:#dde6e8}
.evo-d{font-size:11px;color:var(--soft);font-weight:700}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plan-pick{border:1.5px solid var(--line);background:var(--surface);border-radius:12px;padding:10px;font-family:inherit;font-weight:700;cursor:pointer;text-align:left;color:var(--ink);font-size:14px}
.plan-pick.on{background:var(--green-soft);border-color:var(--green);color:#0a5b63}
.box-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:18px}
.prof-chip{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:10px 14px;text-decoration:none;color:var(--ink);box-shadow:var(--sh)}
.prof-chip:hover{border-color:var(--brand)}
.prof-av{width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;flex:0 0 auto}
.prof-t{flex:1;min-width:0;line-height:1.2} .prof-t b{font-size:16px} .prof-t small{display:block;color:var(--soft);font-size:12.5px}
.prof-ar{font-size:18px;color:var(--soft)}
.prof-mini{display:inline-block;margin-top:4px;color:var(--brand-dk);font-weight:700;text-decoration:none;font-size:14px;background:var(--brand-soft);padding:5px 12px;border-radius:999px}
.perf-list{display:grid;gap:10px}
.perf-row{display:flex;align-items:center;gap:8px}
.perf-pick{flex:1;display:flex;align-items:center;gap:12px;background:var(--surface);border:2px solid var(--line);border-radius:16px;padding:12px 14px;cursor:pointer;font-family:inherit;text-align:left;color:var(--ink)}
.perf-row.on .perf-pick{border-color:var(--green);background:var(--green-soft)}
.perf-av{width:42px;height:42px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px;flex:0 0 auto}
.perf-b{flex:1;min-width:0} .perf-b b{font-size:17px} .perf-b small{display:block;color:var(--soft);font-size:13px}
.perf-ck{color:var(--green);font-weight:800;font-size:20px}
.perf-del{border:1.5px solid var(--line);background:#fff;border-radius:12px;width:46px;height:46px;font-size:18px;cursor:pointer;flex:0 0 auto}
.ficha-add{display:flex;gap:8px;margin-bottom:10px} .ficha-add input{flex:1;min-width:0;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:14px;background:var(--surface);color:var(--ink)}
.chk-list{display:grid;gap:6px}
.chk,.pago{display:flex;align-items:center;gap:8px;background:#f6fafb;border:1px solid var(--line);border-radius:12px;padding:4px 6px 4px 10px}
.chk-b{flex:1;min-width:0;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;text-align:left;color:var(--ink);padding:7px 0}
.chk.done .chk-b span,.pago.ok .chk-b span{text-decoration:line-through;color:var(--soft)}
.chk-x{border:none;background:none;cursor:pointer;font-size:16px;padding:6px;flex:0 0 auto;opacity:.6}
.pago-i{flex:0 0 auto;font-size:14px}
.pago-tot{display:flex;gap:14px;justify-content:flex-end;margin:0 0 8px;font-weight:800;font-size:13.5px}
.pt-ok{color:var(--green)} .pt-pend{color:#a8521f}
.row-c{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.mis-card{background:var(--surface);border:2px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:22px;text-align:center;max-width:480px;margin:0 auto}
.mis-e{font-size:56px} .mis-t{font-size:20px;font-weight:800;margin:6px 0 12px;line-height:1.35}
.mis-log{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--line)}
.cm-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 0 12px}
.cm-v{background:var(--surface);border:2px solid var(--line);border-radius:14px;padding:10px 4px;text-align:center;position:relative}
.cm-n{position:absolute;top:4px;left:6px;font-size:11px;font-weight:800;color:var(--brand)} .cm-e{font-size:32px;display:block} .cm-t{font-size:11.5px;font-weight:700;color:var(--soft)}
.cm-prompt{background:var(--brand-soft);border-radius:12px;padding:10px 12px;font-size:14px;text-align:center;margin-bottom:12px}
.cm-keys{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.cm-key{background:#eef3f4;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700} .cm-key.ok{background:var(--green-soft);border-color:var(--green);color:#0a5b63}
/* Ajustes */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);width:100%;text-align:left}
button.as-btn{background:none;border:none;font:inherit;color:inherit;cursor:pointer}
.set-row:last-child{border-bottom:none}
.sw{width:52px;height:30px;border-radius:999px;background:var(--line);position:relative;flex:0 0 auto;transition:.15s} .sw.on{background:var(--green)}
.sw .kn{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.15s} .sw.on .kn{left:25px}
.seg{display:flex;gap:6px;flex:0 0 auto} .seg-b{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink)} .seg-b.on{background:var(--brand);color:#fff;border-color:var(--brand)}
/* Personalización */
.cus-list{display:grid;gap:8px;margin-top:10px}
.cus-it{display:flex;align-items:center;gap:10px;background:#f6fafb;border:1px solid var(--line);border-radius:12px;padding:8px 10px} .cus-it .cus-w{flex:1;font-weight:700}
/* Escala de texto y alto contraste */
body.scale-grande{font-size:21px} body.scale-enorme{font-size:24px}
body.contrast{--ink:#000;--soft:#33414a;--line:#9bb0b6;--bg:#ffffff}
body.contrast .tile,body.contrast .box,body.contrast .qbox,body.contrast .pic-btn,body.contrast .optbtn,body.contrast .opt-img{border-color:#3a4c54}
body.contrast .muted{color:#33414a}
/* Impresión del informe */
@media print{ .top,footer,.sfa-actions,.streak{display:none!important} .box,.stat-card{box-shadow:none;border-color:#999} body{background:#fff} }
/* Orientación */
.orient{display:grid;gap:12px;max-width:520px;margin:0 auto}
.or-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.or-card .oe{font-size:38px} .or-card .ol{font-size:15px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.03em} .or-card .ov{font-size:24px;font-weight:800}
/* Memoria */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:460px;margin:0 auto}
.mem-card{aspect-ratio:1;border:none;border-radius:14px;background:var(--brand);cursor:pointer;font-size:34px;display:grid;place-items:center;transition:.15s;color:transparent;font-family:inherit}
.mem-card.up{background:var(--surface);border:1.5px solid var(--line);color:var(--ink)}
.mem-card.done{background:var(--green-soft);border:1.5px solid var(--green);color:var(--ink);cursor:default}
.mem-stat{text-align:center;font-weight:700;margin:10px 0}
/* Praxias */
.exlist{display:grid;gap:12px}
.excard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;gap:14px;align-items:center;box-shadow:var(--sh)}
.excard .ee{font-size:38px;flex:0 0 auto} .excard .ex-body{flex:1;min-width:0} .excard b{font-size:18px}
/* Panel / forms */
label{display:block;font-weight:700;margin:12px 0 5px}
input,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:17px;font-family:inherit;background:var(--surface);color:var(--ink)}
textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:10px;flex-wrap:wrap}
footer{margin-top:30px;border-top:1px solid var(--line);background:var(--surface)}
footer .wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:18px 16px}

function listenCapture(cb,statusId){ const st=statusId&&document.getElementById(statusId); const SRC=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SRC){ if(st)st.textContent='Este navegador no escucha la voz (pruebe en Chrome/Android). Puede leerlo en alto.'; return false; } try{ if(SR)SR.abort(); }catch(e){} SR=new SRC(); SR.lang='es-ES'; SR.interimResults=false; SR.maxAlternatives=1; if(st)st.textContent='🎤 Escuchando…'; SR.onresult=function(ev){ let said=''; for(let i=0;i<ev.results.length;i++)said+=' '+ev.results[i][0].transcript; cb(said.trim()); }; SR.onerror=function(){ if(st)st.textContent='No se oyó bien. Inténtelo otra vez.'; }; try{ SR.start(); return true; }catch(e){ return false; } }

function recordResult(mod,ok){ const s=loadStats(); const m=s.mods[mod]||(s.mods[mod]={c:0,t:0}); m.t++; if(ok)m.c++; const t=todayKey(); s.hist=s.hist||{}; const hd=s.hist[t]||(s.hist[t]={t:0,c:0}); hd.t++; if(ok)hd.c++; touchDay(s); }

/* ============ Quiz genérico ============ */
function genDenom(){ const correct=rand(OBJETOS); const dist=shuffle(OBJETOS.filter(o=>o.w!==correct.w)).slice(0,2); const opts=shuffle([{...correct,c:true},...dist.map(d=>({...d,c:false}))]); return {title:'¿Qué es esto?',prompt:{kind:'image',value:correct.e},say:'¿Qué es esto?',options:opts.map(o=>({kind:'text',label:o.w,correct:o.c}))}; }

function genCateg(){ const cat=rand(CATEGS); const correct=rand(cat.items); const dist=shuffle(cat.dist).slice(0,2); const opts=shuffle([{...correct,c:true},...dist.map(d=>({...d,c:false}))]); return {title:'Categorías',prompt:{kind:'text',value:'¿Cuál es '+cat.label+'?'},say:'¿Cuál es '+cat.label.replace(/[A-Z]/g,m=>m.toLowerCase())+'?',options:opts.map(o=>({kind:'image',emoji:o.e,label:o.w,correct:o.c}))}; }
function genCalc(){ const it=rand(CALC); const opts=shuffle([{label:it.a,correct:true},...it.d.map(d=>({label:d,correct:false}))]); return {title:'Cálculo y dinero',prompt:{kind:'text',value:it.q},say:it.q,options:opts.map(o=>({kind:'text',label:o.label,correct:o.correct}))}; }
function genAtencion(){ const same=rand(ATEN); const diff=rand(ATEN.filter(x=>x!==same)); const opts=shuffle([{emoji:same,correct:false},{emoji:same,correct:false},{emoji:same,correct:false},{emoji:diff,correct:true}]); return {title:'Atención',hideLabels:true,prompt:{kind:'text',value:'Señale el dibujo DIFERENTE'},say:'Señale el dibujo diferente',options:opts.map(o=>({kind:'image',emoji:o.emoji,label:o.correct?'el diferente':'igual',correct:o.correct}))}; }
function genComprension(){ const correct=rand(OBJETOS); const dist=shuffle(OBJETOS.filter(o=>o.w!==correct.w)).slice(0,2); const opts=shuffle([{...correct,c:true},...dist.map(d=>({...d,c:false}))]); return {title:'Comprensión',hideLabels:true,prompt:{kind:'text',value:'Señale: '+correct.w.toUpperCase()},say:'Señale '+correct.w,options:opts.map(o=>({kind:'image',emoji:o.e,label:o.w,correct:o.c}))}; }

function stopVoz(){ try{ if(VOZ_RAF)cancelAnimationFrame(VOZ_RAF); }catch(e){} VOZ_RAF=null; try{ if(VOZ_STREAM)VOZ_STREAM.getTracks().forEach(t=>t.stop()); }catch(e){} VOZ_STREAM=null; try{ if(VOZ_CTX)VOZ_CTX.close(); }catch(e){} VOZ_CTX=null; VOZ_MPT.timing=false; }
function startVoz(){
  const status=document.getElementById('vozStatus');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ if(status)status.textContent='Este navegador no permite usar el micrófono. Pruebe en Chrome o en el móvil.'; return; }
  if(status)status.textContent='Pidiendo permiso del micrófono…';
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    VOZ_STREAM=stream;
    const Ctx=window.AudioContext||window.webkitAudioContext; VOZ_CTX=new Ctx();
    const src=VOZ_CTX.createMediaStreamSource(stream); const an=VOZ_CTX.createAnalyser(); an.fftSize=1024; src.connect(an);
    const buf=new Uint8Array(an.fftSize);
    if(status)status.textContent='¡Hable! Intente llegar a la línea.';
    function loop(){
      an.getByteTimeDomainData(buf); let sum=0; for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum+=v*v; }
      const rms=Math.sqrt(sum/buf.length); const level=Math.min(100,Math.round(rms*240));
      const fill=document.getElementById('vozFill'), val=document.getElementById('vozVal'), msg=document.getElementById('vozMsg'), best=document.getElementById('vozBest');
      if(!fill){ stopVoz(); return; }
      fill.style.height=level+'%'; fill.style.background=level>=60?'var(--green)':level>=30?'#e8a300':'var(--teal)';
      if(val)val.textContent=level+' / 100';
      if(msg)msg.textContent=level>=60?'¡Muy bien, voz fuerte! 💪':level>=30?'Un poco más alto…':'';
      const now=Date.now()/1000;
      if(level>=30){ if(!VOZ_MPT.timing){ VOZ_MPT.timing=true; VOZ_MPT.start=now; } const dur=now-VOZ_MPT.start; if(dur>VOZ_MPT.best){ VOZ_MPT.best=Math.round(dur*10)/10; if(best)best.textContent=VOZ_MPT.best+' s'; } }
      else { VOZ_MPT.timing=false; }
      VOZ_RAF=requestAnimationFrame(loop);
    }
    loop();
  }).catch(function(){ const st=document.getElementById('vozStatus'); if(st)st.textContent='No se pudo usar el micrófono (permiso denegado o no disponible). El resto de ejercicios funciona igual.'; });
}

function parse(){ return location.hash.replace(/^#\/?/,'').split('/'); }
function stopFluTimer(){ if(FLU_TIMER){ clearInterval(FLU_TIMER); FLU_TIMER=null; } }
function startFluTimer(){ stopFluTimer(); FLU_TIMER=setInterval(function(){ const t=document.getElementById('fluTime'); if(!t){ stopFluTimer(); return; } FLU.secs--; t.textContent=FLU.secs+' s'; if(FLU.secs<=0){ stopFluTimer(); FLU.running=false; FLU.done=true; render(); } },1000); }
function render(){
  stopFluTimer(); stopVoz(); scanStop(); try{ if(SR)SR.abort(); }catch(e){}
  const p=parse(), a=p[0], b=p[1]; let html;
  if(a===''||a==null) html=viewHome();

/* ============ Eventos ============ */
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const act=el.dataset.action;
  switch(act){
    case 'go': location.hash=el.dataset.h; break;
    case 'install': installApp(); break;
    case 'say': speak(el.dataset.w); break;
    case 'cat': COMM_CAT=el.dataset.c; render(); break;
    case 'add': PHRASE.push({w:el.dataset.w,e:el.dataset.e,img:el.dataset.img||''}); speak(el.dataset.w); touchDay(); render(); break;
    case 'del': PHRASE.pop(); render(); break;
    case 'clear': PHRASE=[]; render(); break;
    case 'say-phrase': if(PHRASE.length) speak(PHRASE.map(p=>p.w).join(' ')); break;
    case 'sfa-cue':{ const o=SFA[SFA_I%SFA.length]; const cues=sfaCues(o); if(SFA_N<cues.length){ SFA_N++; speak(cues[SFA_N-1].t); render(); } break; }
    case 'sfa-word':{ SFA_SHOW=true; speak(SFA[SFA_I%SFA.length].w); render(); break; }
    case 'sfa-next':{ SFA_I++; SFA_N=0; SFA_SHOW=false; render(); break; }
    case 'flu-start':{ FLU.running=true; FLU.done=false; FLU.secs=60; FLU.count=0; touchDay(); render(); startFluTimer(); break; }
    case 'flu-plus':{ if(FLU.running){ FLU.count++; const c=document.getElementById('fluCount'); if(c)c.textContent=FLU.count; } break; }
    case 'flu-reset':{ stopFluTimer(); FLU.running=false; FLU.done=false; render(); break; }
    case 'flu-cat':{ stopFluTimer(); FLU.cat=rand(FLU_CATS.filter(c=>c!==FLU.cat)); FLU.running=false; FLU.done=false; render(); break; }
    case 'answer':{ const ok=el.dataset.correct==='1'; const fb=document.getElementById('fb');
      if(GENS[QZKEY]) recordResult(QZKEY,ok);
      document.querySelectorAll('[data-action="answer"]').forEach(o=>o.disabled=true); el.classList.add(ok?'good':'bad');
      if(ok){ if(fb){fb.textContent='¡Correcto! 👏'; fb.className='feedback ok';} speak('Correcto'); }
      else { if(fb){fb.textContent='No es esa. Inténtelo otra vez.'; fb.className='feedback no';} document.querySelectorAll('[data-correct="1"]').forEach(o=>o.classList.add('good')); }
      setTimeout(()=>{ if(SES){ sesAdvance(ok); } else { QZ=null; render(); } }, ok?1200:1700); break; }
    case 'start-session': startSession(); break;
    case 'end-session': SES=null; toast('Plan pausado'); location.hash='#/'; break;
    case 'plan-toggle': { const pl=loadPlan(); const id=el.dataset.id; const i=pl.ids.indexOf(id); if(i>=0){ if(pl.ids.length>1)pl.ids.splice(i,1); } else { pl.ids.push(id); } savePlan(pl); render(); break; }
    case 'plan-goal': { const pl=loadPlan(); pl.goal=Math.max(2,Math.min(8,+el.dataset.v||4)); savePlan(pl); render(); break; }
    case 'flip':{ if(!MEM||MEM.lock) break; const i=+el.dataset.i; const c=MEM.cards[i]; if(c.up||c.done) break;
      c.up=true; speak('');
      if(MEM.first===-1){ MEM.first=i; render(); }
      else { MEM.moves++; const f=MEM.cards[MEM.first];
        if(f.e===c.e){ f.done=c.done=true; MEM.first=-1; render(); }
        else { MEM.lock=true; render(); setTimeout(()=>{ f.up=c.up=false; MEM.first=-1; MEM.lock=false; render(); },900); } }
      break; }
    case 'mem-reset': newMem(); render(); break;
    case 'mis-next': MIS_I=(MIS_I+1)%MISIONES.length; render(); break;
    case 'mis-done': { const m=MISIONES[MIS_I%MISIONES.length]; const log=misLog(); log.unshift({t:m.t,e:m.e,dia:todayKey(),fecha:new Date().toISOString()}); misSave(log); recordResult('mision',true); toast('¡Misión cumplida! ✓'); render(); break; }
    case 'mis-rec': { const st=document.getElementById('misStatus'); if(!navigator.mediaDevices||!window.MediaRecorder){ if(st)st.textContent='Aquí no se puede grabar; marque «Hecho».'; break; } if(MIC_REC&&MIC_REC.state==='recording'){ try{MIC_REC.stop();}catch(e){} break; } navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ MIC_STREAM=s; MIC_CHUNKS=[]; try{MIC_REC=new MediaRecorder(s);}catch(e){ if(st)st.textContent='No se pudo grabar.'; return; } MIC_REC.ondataavailable=e=>{ if(e.data&&e.data.size)MIC_CHUNKS.push(e.data); }; MIC_REC.onstop=function(){ const r=new FileReader(); r.onload=function(){ const m=MISIONES[MIS_I%MISIONES.length]; const log=misLog(); log.unshift({t:m.t,e:m.e,dia:todayKey(),fecha:new Date().toISOString(),audio:r.result}); misSave(log); recordResult('mision',true); render(); toast('¡Prueba grabada! ✓'); }; r.readAsDataURL(new Blob(MIC_CHUNKS)); if(MIC_STREAM)MIC_STREAM.getTracks().forEach(t=>t.stop()); }; MIC_REC.start(); if(st)st.textContent='🔴 Grabando… diga su frase y pulse otra vez para parar.'; const bb=document.getElementById('misRec'); if(bb)bb.textContent='⏹️ Parar y guardar'; }).catch(function(){ if(st)st.textContent='No se pudo usar el micrófono.'; }); break; }
    case 'mis-play': { const log=misLog(); const it=log[+el.dataset.i]; if(it&&it.audio){ try{ new Audio(it.audio).play(); }catch(e){} } break; }
    case 'cue-listen': listenCapture(function(txt){ CUE.heard=txt; render(); },'cueStatus'); break;
    case 'cue-next': CUE={i:(CUE.i+1)%CUENTAME.length,heard:''}; recordResult('narrar',true); render(); break;
    case 'perf-set': setActive(el.dataset.id); SES=null; toast('Paciente: '+(activeProfile().name||'')); location.hash='#/'; break;
    case 'perf-add': { const n=(document.getElementById('pfName')||{}).value||''; const ed=(document.getElementById('pfAge')||{}).value||''; if(!n.trim()){ toast('Escriba un nombre'); break; } addProfile(n.trim(),ed.trim()); SES=null; location.hash='#/'; toast('Paciente añadido'); break; }
    case 'perf-del': { if(el.dataset.armed==='1'){ delProfile(el.dataset.id); SES=null; render(); toast('Paciente borrado'); } else { el.dataset.armed='1'; el.textContent='⚠️'; setTimeout(()=>{ if(el){el.dataset.armed='0';el.textContent='🗑️';} },3000); } break; }
    case 'ficha-datos': { const f=fichaLoad(); f.tel=(document.getElementById('fTel')||{}).value||''; f.dx=(document.getElementById('fDx')||{}).value||''; fichaSave(f); toast('Datos guardados ✓'); break; }
    case 'ficha-notas': { const f=fichaLoad(); f.notas=(document.getElementById('fNotas')||{}).value||''; fichaSave(f); toast('Notas guardadas ✓'); break; }
    case 'pauta-add': { const v=(document.getElementById('fPauta')||{}).value||''; if(!v.trim())break; const f=fichaLoad(); f.pautas.push({t:v.trim(),done:false}); fichaSave(f); render(); break; }
    case 'pauta-toggle': { const f=fichaLoad(); if(f.pautas[+el.dataset.i])f.pautas[+el.dataset.i].done=!f.pautas[+el.dataset.i].done; fichaSave(f); render(); break; }
    case 'pauta-del': { const f=fichaLoad(); f.pautas.splice(+el.dataset.i,1); fichaSave(f); render(); break; }
    case 'pago-add': { const c=(document.getElementById('fPagoC')||{}).value||''; const im=(document.getElementById('fPagoI')||{}).value||''; if(!c.trim())break; const f=fichaLoad(); f.pagos.push({concepto:c.trim(),importe:parseFloat(im)||0,pagado:false,fecha:new Date().toISOString()}); fichaSave(f); render(); break; }
    case 'pago-toggle': { const f=fichaLoad(); if(f.pagos[+el.dataset.i])f.pagos[+el.dataset.i].pagado=!f.pagos[+el.dataset.i].pagado; fichaSave(f); render(); break; }
    case 'pago-del': { const f=fichaLoad(); f.pagos.splice(+el.dataset.i,1); fichaSave(f); render(); break; }
    case 'mat-add': { const v=(document.getElementById('fMat')||{}).value||''; if(!v.trim())break; const f=fichaLoad(); f.materiales.push({t:v.trim(),done:false}); fichaSave(f); render(); break; }
    case 'mat-toggle': { const f=fichaLoad(); if(f.materiales[+el.dataset.i])f.materiales[+el.dataset.i].done=!f.materiales[+el.dataset.i].done; fichaSave(f); render(); break; }
    case 'mat-del': { const f=fichaLoad(); f.materiales.splice(+el.dataset.i,1); fichaSave(f); render(); break; }
    case 'ficha-print': window.print(); break;
    case 'ficha-wa': window.open('https://wa.me/?text='+encodeURIComponent(fichaText()),'_blank','noopener'); break;
    case 'login':{ const v=(document.getElementById('pw')||{}).value||''; if(v===CONFIG.ADMIN_PASSWORD){ PANEL_OK=true; render(); } else { toast('Contraseña incorrecta'); } break; }
    case 'logout': PANEL_OK=false; location.hash='#/'; break;
    case 'save-notes':{ const t=(document.getElementById('notes')||{}).value||''; DB.set(pk(K.notes),t); toast('Notas guardadas'); break; }
    case 'clear-notes': DB.set(pk(K.notes),''); render(); toast('Notas borradas'); break;
    /* Biofeedback de voz */
    case 'voz-on': startVoz(); break;
    case 'voz-off': stopVoz(); { const st=document.getElementById('vozStatus'); if(st)st.textContent='Micrófono parado.'; const f=document.getElementById('vozFill'); if(f)f.style.height='0%'; } break;
    /* Ajustes / accesibilidad */
    case 'set-scale':{ const s=loadSet(); s.scale=el.dataset.v; saveSet(s); applySettings(); render(); break; }
    case 'toggle-set':{ const s=loadSet(); const k=el.dataset.k; s[k]=!s[k]; saveSet(s); applySettings(); render(); break; }
    case 'scan-select':{ const el2=document.querySelector('#picGrid .pic-btn.scanon')||document.querySelector('#picGrid .pic-btn'); if(el2){ PHRASE.push({w:el2.dataset.w,e:el2.dataset.e,img:el2.dataset.img||''}); speak(el2.dataset.w); touchDay(); render(); } break; }
    /* Progreso */
    case 'print-report': window.print(); break;
    case 'export-csv': downloadCSV(); break;
    case 'reset-stats': if(el.dataset.armed==='1'){ DB.set(pk(K.stats),{mods:{},days:{},streak:0,lastDay:''}); render(); toast('Progreso borrado'); } else { el.dataset.armed='1'; el.textContent='⚠️ Pulse otra vez para borrar'; setTimeout(()=>{ if(el){el.dataset.armed='0';el.textContent='Borrar progreso';} },3000); } break;
    /* Personalización */
    case 'cus-add-item':{ const w=(document.getElementById('cusW')||{}).value||''; const f=document.getElementById('cusImg'); if(!w.trim()){ toast('Escriba una palabra'); break; } const file=f&&f.files&&f.files[0]; const done=img=>{ const c=loadCustom(); c.items.push({w:w.trim(),img:img||'',e:'🖼️'}); saveCustom(c); render(); toast('Añadido a «Mis cosas»'); }; if(file) readImageResized(file,done); else done(''); break; }
    case 'cus-del-item':{ const c=loadCustom(); c.items.splice(+el.dataset.i,1); saveCustom(c); render(); break; }
    case 'cus-add-phrase':{ const p=(document.getElementById('cusP')||{}).value||''; if(!p.trim()){ toast('Escriba una frase'); break; } const c=loadCustom(); c.phrases.push({w:p.trim()}); saveCustom(c); render(); toast('Frase añadida'); break; }
    case 'cus-del-phrase':{ const c=loadCustom(); c.phrases.splice(+el.dataset.i,1); saveCustom(c); render(); break; }
  }
});

/* ============ Init ============ */
window.addEventListener('hashchange',render);
/* Enlaces internos (#/...): navegar por JS para que funcionen también dentro de un iframe (app combinada) */
document.addEventListener('click',function(e){ const a=e.target.closest&&e.target.closest('a[href^="#"]'); if(!a) return; const h=a.getAttribute('href'); e.preventDefault(); if(location.hash===h){ try{render();}catch(_){ } } else { location.hash=h; } });
try{ MIS_I=Math.floor(Math.random()*MISIONES.length); }catch(e){}
setupPWA();
render();
</script>
