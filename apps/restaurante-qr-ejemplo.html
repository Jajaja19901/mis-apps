<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Tasca · Pide desde tu mesa (QR)</title>
<meta name="description" content="La Tasca: escanea el QR de tu mesa y pide tú mismo desde el móvil, sin esperar al camarero. Tu comanda llega directa a la barra.">
<meta name="theme-color" content="#22252b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="La Tasca">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="icon" id="favicon">
<link rel="manifest" id="manifest">
<style>
:root{
  --ink:#1c1e22; --text:#26282d; --muted:#6f7480; --muted-2:#9aa0ac;
  --bg:#f4f3f0; --paper:#fbfaf7; --surface:#ffffff; --soft:#eceae5;
  --line:#e6e3dc; --line-2:#d8d4ca;
  --brand:#e0871a; --brand-d:#b96a08; --char:#23262c; --gold:#e0871a; --green:#3f9d52;
  --radius:16px; --radius-lg:22px;
  --sh-sm:0 2px 10px rgba(20,20,20,.06); --sh:0 14px 36px rgba(20,20,20,.13); --sh-lg:0 26px 64px rgba(10,10,10,.24);
  --maxw:1100px; --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
h1,h2,h3{margin:0;letter-spacing:-.02em;line-height:1.12;font-weight:800}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px}
.muted{color:var(--muted)}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}
.hide{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:0;border-radius:13px;padding:13px 22px;font-weight:800;font-size:15px;transition:.16s var(--ease);white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-primary{background:linear-gradient(180deg,#ed9426,#c2700a);color:#fff;box-shadow:0 9px 20px rgba(194,112,10,.34)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-dark{background:var(--char);color:#fff}.btn-dark:hover{transform:translateY(-2px)}
.btn-ghost{background:#fff;color:var(--brand-d);border:1.5px solid var(--line-2)}.btn-ghost:hover{border-color:var(--brand)}
.btn-block{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}
header.top{position:sticky;top:0;z-index:40;background:rgba(251,250,247,.92);backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:14px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;font-size:20px;color:var(--char)}
.brand .logo{width:40px;height:40px;flex:0 0 auto}
.brand .tag{display:block;font-size:9.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin-top:-2px}
.nav-sp{margin-left:auto}
.mesa-pill{display:inline-flex;align-items:center;gap:7px;background:var(--char);color:#fff;border-radius:999px;padding:8px 14px;font-weight:800;font-size:13.5px}
.mesa-pill a{color:#f0b870;font-weight:700;font-size:12px}
.icon-btn{position:relative;width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line-2);background:#fff;display:inline-grid;place-items:center;color:var(--brand-d)}
.icon-btn svg{width:21px;height:21px}
.cart-badge{position:absolute;top:-7px;right:-7px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--brand);color:#fff;font-size:11.5px;font-weight:800;display:grid;place-items:center}
#installBtn{display:none}
.hero{position:relative;overflow:hidden;color:#f1ede6;background:radial-gradient(640px 420px at 80% -10%,rgba(224,135,26,.42),transparent 60%),linear-gradient(160deg,#23262c,#15171b)}
.hero .wrap{padding:48px 18px 44px;position:relative;z-index:2;text-align:center}
.hero .qr{width:120px;height:120px;margin:0 auto 18px;border-radius:22px;background:#fff;display:grid;place-items:center;box-shadow:var(--sh-lg)}
.hero .qr svg{width:90px;height:90px}
.hero h1{font-size:clamp(28px,5.4vw,44px);color:#fff;font-weight:900;max-width:16ch;margin:0 auto}
.hero h1 span{color:var(--gold)}
.hero p.lead{font-size:17px;color:#c9c3b8;max-width:440px;margin:14px auto 22px}
.mesa-box{background:rgba(255,255,255,.97);color:var(--text);border-radius:20px;padding:20px;max-width:380px;margin:0 auto;box-shadow:var(--sh-lg)}
.mesa-box h3{font-size:16px;margin-bottom:12px}
.mesa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.mesa-grid button{border:1.5px solid var(--line-2);background:#fff;border-radius:12px;padding:12px 0;font-weight:800;font-size:16px;color:var(--char)}
.mesa-grid button[aria-pressed="true"]{background:var(--brand);border-color:var(--brand);color:#fff}
section{padding:34px 0}
.sec-head{max-width:620px;margin:0 0 18px}
.sec-head h2{font-size:clamp(22px,4vw,32px);margin:.3em 0 .2em}
.sec-head p{color:var(--muted);font-size:15.5px;margin:0}
.mbanner{background:var(--soft);border:1px dashed var(--line-2);border-radius:14px;padding:11px 14px;margin-bottom:16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.mbanner a{color:var(--brand-d);font-weight:800;font-size:13px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1.5px solid var(--line-2);background:#fff;border-radius:999px;padding:9px 16px;font-weight:700;font-size:14px;color:var(--brand-d)}
.chip[aria-pressed="true"]{background:var(--brand);border-color:var(--brand);color:#fff}
.menu-list{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dish{display:flex;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:var(--sh-sm)}
.dish .ph{width:66px;height:66px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;font-size:34px;background:var(--soft);overflow:hidden}
.dish .ph img{width:100%;height:100%;object-fit:cover}
.dish .info{flex:1;min-width:0}.dish .info h3{font-size:16px}
.dish .info .d{font-size:12.5px;color:var(--muted);margin:3px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dish .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dish .price{font-weight:900;color:var(--brand-d);font-size:16px}
.add{width:38px;height:38px;border-radius:11px;border:0;background:linear-gradient(180deg,#ed9426,#c2700a);color:#fff;display:grid;place-items:center}.add svg{width:19px;height:19px}
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.feat .f{background:#fff;border:1px solid var(--line);border-radius:15px;padding:16px;box-shadow:var(--sh-sm)}
.feat .f .ic{font-size:24px}.feat .f b{display:block;margin:7px 0 2px;font-size:15px}.feat .f span{font-size:13px;color:var(--muted)}
.page{padding:22px 0 110px;min-height:60vh}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--brand-d);font-weight:800;font-size:14.5px;margin-bottom:14px}.back svg{width:18px;height:18px}
.ptitle{font-size:clamp(23px,4vw,32px);margin-bottom:6px}
.citem{display:flex;gap:13px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px;margin-bottom:11px}
.citem .cph{width:58px;height:58px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;background:var(--soft);font-size:28px;overflow:hidden}.citem .cph img{width:100%;height:100%;object-fit:cover}
.citem .ci{flex:1;min-width:0}.citem .ci b{font-size:15px}.citem .ci .p{color:var(--brand-d);font-weight:800;font-size:13.5px}
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--line-2);border-radius:11px;overflow:hidden;background:#fff}
.qty button{width:34px;height:34px;border:0;background:#fff;font-size:18px;font-weight:800;color:var(--brand-d)}.qty span{min-width:30px;text-align:center;font-weight:800}
.ci-rm{border:0;background:none;color:var(--brand);font-weight:700;font-size:13px}
.empty{text-align:center;padding:56px 20px;color:var(--muted)}.empty .big{font-size:46px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:800;color:var(--brand-d)}
.field input,.field textarea,.field select{border:1.5px solid var(--line-2);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);width:100%}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px #f6e6cf}
.form-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px}
.note{font-size:12.5px;color:var(--muted-2);margin-top:8px}
.alert{background:#fdecea;color:#a3271b;border:1px solid #f3c6c0;border-radius:12px;padding:11px 14px;font-weight:700;font-size:14px;margin-bottom:14px}
.barfix{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(0,0,0,.08);padding:12px 16px}
.barfix .in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.barfix b{font-size:17px;color:var(--char)}
.admin-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.admin-tabs button{border:1.5px solid var(--line-2);background:#fff;border-radius:11px;padding:10px 15px;font-weight:800;color:var(--brand-d)}
.admin-tabs button[aria-pressed="true"]{background:var(--brand);border-color:var(--brand);color:#fff}
.adm-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.adm-stat{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--sh-sm)}
.adm-stat b{display:block;font-size:22px;font-weight:900;color:var(--brand-d)}.adm-stat span{font-size:12.5px;color:var(--muted);font-weight:700}
.adm-row{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:10px}
.adm-row .aph{width:52px;height:52px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;background:var(--soft);font-size:25px;overflow:hidden}.adm-row .aph img{width:100%;height:100%;object-fit:cover}
.adm-row .ainfo{flex:1;min-width:0}.adm-row .ainfo b{font-size:15px}.adm-row .ainfo span{font-size:13px;color:var(--muted)}
.adm-act{display:flex;gap:6px;flex-wrap:wrap}
.mini{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line-2);background:#fff;display:grid;place-items:center;color:var(--brand-d)}.mini.del{color:var(--brand)}.mini svg{width:17px;height:17px}
.com{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.com .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.com .mz{background:var(--char);color:#fff;border-radius:8px;padding:4px 10px;font-weight:800;font-size:13px}
.st{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:999px}
.st.pend{background:#f6e6cf;color:#8a5a08}.st.ok{background:#e2efd6;color:#3f5e22}
.mesalink{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;font-size:13.5px}
.mesalink code{background:var(--soft);padding:3px 7px;border-radius:6px;font-size:12px;color:var(--char);word-break:break-all}
footer{background:var(--char);color:#b3b0a8;padding:38px 0 22px}
footer .brand{color:#fff}.footwrap{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
footer p.desc{font-size:14px;max-width:320px;margin:12px 0 0;color:#928f87}
footer a:hover{color:#fff}
.fbottom{border-top:1px solid rgba(255,255,255,.1);margin-top:26px;padding-top:16px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:12.5px;color:#857f74}
.fbottom .studio a{color:#d7c6ab;font-weight:700}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(18px);background:var(--char);color:#fff;padding:13px 19px;border-radius:13px;font-weight:700;z-index:100;box-shadow:var(--sh-lg);opacity:0;pointer-events:none;transition:.26s var(--ease);max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
:focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:6px}
@media(max-width:760px){.menu-list,.feat{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="top"><div class="wrap nav">
  <a class="brand" href="#/" aria-label="La Tasca, inicio"><span class="logo" id="brandLogo"></span><span>La Tasca<span class="tag">Pide desde tu mesa</span></span></a>
  <div class="nav-sp"></div>
  <span class="mesa-pill" id="mesaPill" style="display:none"></span>
  <button class="icon-btn" id="installBtn" data-action="install" aria-label="Instalar" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></button>
</div></header>

<main id="app" role="main"></main>

<footer><div class="wrap"><div class="footwrap">
  <div><span class="brand" style="display:inline-flex;align-items:center;gap:10px;font-weight:900;font-size:19px"><span class="logo" id="footLogo" style="width:36px;height:36px"></span> La Tasca</span><p class="desc">Escanea, pide y disfruta. Tu comanda llega directa a la barra, sin esperar al camarero.</p></div>
  <div style="font-size:14px"><a href="#/legal">Privacidad y aviso legal</a><br><a href="#/admin" style="color:#857f74">Acceso del dueño</a></div>
</div>
<div class="fbottom"><span>© <span id="year"></span> La Tasca · <span id="footCity">[Tu ciudad]</span></span><span class="studio">Diseñado por <a href="#/" data-action="studio">Incuba tu Negocio</a> · por Jaime M. M.</span></div>
</div></footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";
const CONFIG={ BUSINESS_NAME:"La Tasca", CITY:"[Tu ciudad]", WHATSAPP:"", EMAIL:"hola@latasca.example", ADMIN_PASSWORD:"tasca2024" };
const $=s=>document.querySelector(s);
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function money(n){ return (Number(n)||0).toFixed(2).replace(".",",")+" €"; }
function load(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
let toastT=null; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),3000); }

const LOGO=`<svg viewBox="0 0 48 48" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La Tasca"><rect width="48" height="48" rx="12" fill="#23262c"/><rect x="13" y="13" width="9" height="9" rx="2" fill="#e0871a"/><rect x="26" y="13" width="9" height="9" rx="2" fill="#fff"/><rect x="13" y="26" width="9" height="9" rx="2" fill="#fff"/><rect x="26" y="26" width="4" height="4" fill="#e0871a"/><rect x="31" y="31" width="4" height="4" fill="#e0871a"/></svg>`;
function qrArt(){ return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="26" height="26" rx="4" stroke="#23262c" stroke-width="6"/><rect x="68" y="6" width="26" height="26" rx="4" stroke="#23262c" stroke-width="6"/><rect x="6" y="68" width="26" height="26" rx="4" stroke="#23262c" stroke-width="6"/><rect x="15" y="15" width="8" height="8" fill="#e0871a"/><rect x="77" y="15" width="8" height="8" fill="#e0871a"/><rect x="15" y="77" width="8" height="8" fill="#e0871a"/><g fill="#23262c"><rect x="44" y="8" width="7" height="7"/><rect x="56" y="8" width="7" height="7"/><rect x="44" y="20" width="7" height="7"/><rect x="68" y="44" width="7" height="7"/><rect x="80" y="44" width="7" height="7"/><rect x="56" y="56" width="7" height="7"/><rect x="44" y="68" width="7" height="7"/><rect x="68" y="68" width="7" height="7"/><rect x="80" y="80" width="7" height="7"/><rect x="56" y="80" width="7" height="7"/></g></svg>`; }
function logoURI(){ const c=(load("lt_settings",{})||{}).logo; if(c) return c; const s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect width="48" height="48" rx="11" fill="#23262c"/><rect x="13" y="13" width="9" height="9" rx="2" fill="#e0871a"/><rect x="26" y="13" width="9" height="9" rx="2" fill="#fff"/><rect x="13" y="26" width="9" height="9" rx="2" fill="#fff"/></svg>'; return "data:image/svg+xml,"+encodeURIComponent(s); }
function logoMarkup(){ const c=(load("lt_settings",{})||{}).logo; if(c) return '<img src="'+esc(c)+'" alt="La Tasca" style="width:100%;height:100%;object-fit:cover;border-radius:10px">'; return LOGO; }
function applyLogo(){ ["brandLogo","footLogo"].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=logoMarkup(); }); }

function B(){ const s=load("lt_settings",{})||{}; return { nombre:s.bizNombre||CONFIG.BUSINESS_NAME, city:s.bizCity||CONFIG.CITY, whatsapp:(s.bizWhatsapp!=null?s.bizWhatsapp:CONFIG.WHATSAPP), email:s.bizEmail||CONFIG.EMAIL, pass:s.bizPass||CONFIG.ADMIN_PASSWORD, mesas:Number(s.mesas)||12 }; }
function getSettings(){ return Object.assign({bizNombre:CONFIG.BUSINESS_NAME,bizCity:CONFIG.CITY,bizWhatsapp:CONFIG.WHATSAPP,bizEmail:CONFIG.EMAIL,bizPass:CONFIG.ADMIN_PASSWORD,mesas:12,logo:null}, load("lt_settings",{})); }
function setSettings(o){ save("lt_settings",Object.assign(getSettings(),o)); }

/* mesa actual */
function getMesa(){ return load("lt_mesa",null); }
function setMesa(n){ save("lt_mesa",n); }

const CATS=["Para picar","Raciones","Bebidas","Postres"];
const SEED=[
  {cat:"Para picar",nombre:"Patatas bravas",desc:"Con salsa brava de la casa y alioli.",precio:5.50,emoji:"🥔",dest:true},
  {cat:"Para picar",nombre:"Croquetas (6 uds)",desc:"De jamón, cremosas.",precio:7.00,emoji:"🥟"},
  {cat:"Para picar",nombre:"Nachos con guacamole",desc:"Con pico de gallo y queso fundido.",precio:6.50,emoji:"🌮"},
  {cat:"Para picar",nombre:"Aceitunas y altramuces",desc:"Para abrir boca.",precio:3.00,emoji:"🫒"},
  {cat:"Raciones",nombre:"Pulpo a la brasa",desc:"Con cachelos y pimentón.",precio:15.00,emoji:"🐙",dest:true},
  {cat:"Raciones",nombre:"Tortilla de patata",desc:"Jugosa, con o sin cebolla.",precio:8.00,emoji:"🍳"},
  {cat:"Raciones",nombre:"Tabla de quesos",desc:"Selección con membrillo y picos.",precio:12.00,emoji:"🧀"},
  {cat:"Raciones",nombre:"Pincho moruno",desc:"Brocheta de cerdo adobado con pan.",precio:6.50,emoji:"🍢"},
  {cat:"Bebidas",nombre:"Caña",desc:"Bien fría.",precio:1.80,emoji:"🍺",dest:true},
  {cat:"Bebidas",nombre:"Copa de vino",desc:"Tinto, blanco o rosado.",precio:2.80,emoji:"🍷"},
  {cat:"Bebidas",nombre:"Vermut de grifo",desc:"Con su naranja y aceituna.",precio:3.20,emoji:"🍹"},
  {cat:"Bebidas",nombre:"Refresco / Agua",desc:"Cola, naranja, limón, agua.",precio:2.20,emoji:"🥤"},
  {cat:"Postres",nombre:"Tarta de queso",desc:"Cremosa, con frutos rojos.",precio:5.00,emoji:"🍰"},
  {cat:"Postres",nombre:"Torrija caramelizada",desc:"Con helado de vainilla.",precio:5.00,emoji:"🍮"}
];
function getPlatos(){ let p=load("lt_platos",null); if(!p){ p=SEED.map(x=>({id:uid(),activo:true,img:null,...x})); save("lt_platos",p); } return p; }
function setPlatos(p){ save("lt_platos",p); }

/* comanda en curso (lo que el cliente va pidiendo en su mesa) */
function getCart(){ return load("lt_cart",{}); }
function setCart(c){ save("lt_cart",c); refreshCart(); }
function cartCount(){ return Object.values(getCart()).reduce((a,b)=>a+b,0); }
function cartItems(){ const c=getCart(),P=getPlatos(); return Object.keys(c).map(id=>{ const p=P.find(x=>x.id===id); return p?{...p,qty:c[id]}:null; }).filter(Boolean); }
function cartTotal(){ return cartItems().reduce((a,i)=>a+i.precio*i.qty,0); }
function addToCart(id,q){ const c=getCart(); c[id]=(c[id]||0)+(q||1); if(c[id]<1)delete c[id]; setCart(c); }
function setQty(id,q){ const c=getCart(); if(q<1)delete c[id]; else c[id]=q; setCart(c); }
function refreshCart(){ const n=cartCount(),b=$("#cartCount"); if(b){ b.textContent=n; b.classList.toggle("hide",n===0); } updateMesaPill(); }
function updateMesaPill(){ const el=$("#mesaPill"); if(!el) return; const m=getMesa(); if(m){ el.style.display="inline-flex"; el.innerHTML='🍽️ Mesa '+esc(m)+' <a href="#/" data-action="cambiarMesa">cambiar</a>'; } else el.style.display="none"; }
function phHTML(p){ return p.img?`<img src="${esc(p.img)}" alt="${esc(p.nombre)}">`:`<span>${esc(p.emoji||"🍽️")}</span>`; }

let FILTER="Para picar";

/* ====== Router ====== */
function render(){
  const r=(location.hash||"#/").replace(/^#\//,"").split("/")[0];
  let html;
  if(r==="carta") html=viewCarta();
  else if(r==="comanda") html=viewComanda();
  else if(r==="gracias") html=viewGracias();
  else if(r==="legal") html=viewLegal();
  else if(r==="admin") html=viewAdmin();
  else html=viewHome();
  $("#app").innerHTML=html; window.scrollTo(0,0); refreshCart();
}
window.addEventListener("hashchange",render);

/* ====== Comanda → barra (WhatsApp) ====== */
function telWa(t){ let d=String(t||"").replace(/[^0-9]/g,""); if(d.indexOf("00")===0)d=d.slice(2); if(d.length===9)d="34"+d; return d; }
function waOpen(msg){ const num=B().whatsapp; if(num){ try{ window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg),"_blank","noopener"); }catch(e){} return true; } return false; }
function enviarComanda(){
  const items=cartItems(); if(!items.length) return; const m=getMesa()||"-";
  const c={ id:uid(), mesa:m, hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}), items:items.map(i=>({nombre:i.nombre,qty:i.qty,precio:i.precio})), total:cartTotal(), estado:"pendiente" };
  const C=load("lt_comandas",[]); C.push(c); save("lt_comandas",C);
  let msg="*Comanda · Mesa "+m+"*\n\n"; c.items.forEach(i=>{ msg+="• "+i.nombre+" ×"+i.qty+"\n"; }); msg+="\nTotal: "+money(c.total);
  if(!waOpen(msg)) toast("Comanda guardada. Configura tu WhatsApp en Ajustes.");
  setCart({}); location.hash="#/gracias";
}

/* ====== Eventos ====== */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action]"); if(!t) return; const a=t.dataset.action, id=t.dataset.id;
  switch(a){
    case "pickMesa": { setMesa(+t.dataset.n); document.querySelectorAll("#mesaGrid button").forEach(b=>b.setAttribute("aria-pressed",b===t?"true":"false")); const cta=document.querySelector('[data-action="empezar"]'); if(cta)cta.textContent="Pedir en la mesa "+t.dataset.n; updateMesaPill(); break; }
    case "empezar": if(!getMesa()){ e.preventDefault(); toast("Elige primero tu mesa 🍽️"); } break;
    case "cambiarMesa": e.preventDefault(); setMesa(null); location.hash="#/"; render(); break;
    case "add": e.preventDefault(); if(!getMesa()){ toast("Elige tu mesa primero"); location.hash="#/"; break; } addToCart(id,1); toast("Añadido a la comanda"); { const bf=document.querySelector('.barfix'); if(!bf && location.hash.includes('carta')) render(); else { const b=document.querySelector('.barfix .in b'); if(b)render(); } } break;
    case "inc": addToCart(id,1); render(); break;
    case "dec": addToCart(id,-1); render(); break;
    case "rm": setQty(id,0); render(); break;
    case "enviarComanda": enviarComanda(); break;
    case "camarero": { const m=getMesa()||"-"; if(!waOpen("🙋 La Mesa "+m+" llama al camarero.")) toast("Avisando al camarero (demo). Configura WhatsApp en Ajustes."); else toast("Camarero avisado 🙋"); break; }
    case "cuenta": { const m=getMesa()||"-"; if(!waOpen("🧾 La Mesa "+m+" pide la cuenta.")) toast("Pidiendo la cuenta (demo). Configura WhatsApp en Ajustes."); else toast("Cuenta pedida 🧾"); break; }
    case "studio": e.preventDefault(); toast("Diseñado por Incuba tu Negocio · Jaime M. M."); break;
    case "install": installApp(); break;
    case "logout": ADMIN_OK=false; render(); break;
    case "tab": ADMIN_TAB=t.dataset.tab; EDIT_ID=null; render(); break;
    case "editP": EDIT_ID=id; ADMIN_TAB="carta"; render(); window.scrollTo(0,0); break;
    case "cancelEdit": EDIT_ID=null; render(); break;
    case "delP": if(confirm("¿Borrar este plato?")){ setPlatos(getPlatos().filter(p=>p.id!==id)); if(EDIT_ID===id)EDIT_ID=null; render(); } break;
    case "toggleP": { const P=getPlatos(); const p=P.find(x=>x.id===id); if(p)p.activo=p.activo===false; setPlatos(P); render(); } break;
    case "toggleCom": { const C=load("lt_comandas",[]); const c=C.find(x=>x.id===id); if(c)c.estado=c.estado==="servido"?"pendiente":"servido"; save("lt_comandas",C); render(); } break;
    case "delCom": if(confirm("¿Borrar esta comanda?")){ save("lt_comandas",load("lt_comandas",[]).filter(x=>x.id!==id)); render(); } break;
    case "copyMesa": { const link=t.dataset.link; try{ navigator.clipboard.writeText(link); toast("Enlace copiado 📋"); }catch(e){ toast(link); } break; }
  }
});
document.addEventListener("click",e=>{ const c=e.target.closest(".chip"); if(c&&c.dataset.cat){ FILTER=c.dataset.cat; document.querySelectorAll("#chips .chip").forEach(x=>x.setAttribute("aria-pressed",x===c?"true":"false")); rerenderGrid(); } });
document.addEventListener("submit",e=>{
  if(e.target.id==="adminLogin"){ e.preventDefault(); if($("#apass").value===B().pass){ ADMIN_OK=true; render(); } else $("#loginErr").innerHTML='<div class="alert">Contraseña incorrecta.</div>'; }
  else if(e.target.id==="platoForm"){ e.preventDefault(); savePlato(); }
  else if(e.target.id==="mesasForm"){ e.preventDefault(); setSettings({mesas:Math.max(1,parseInt($("#mNum").value,10)||12)}); render(); toast("Mesas guardadas ✅"); }
  else if(e.target.id==="datosForm"){ e.preventDefault(); setSettings({ bizNombre:$("#dNom").value.trim(), bizWhatsapp:$("#dWa").value.replace(/[^0-9]/g,""), bizCity:$("#dCity").value.trim(), bizEmail:$("#dMail").value.trim(), bizPass:$("#dPass").value.trim() }); const fc=$("#footCity"); if(fc)fc.textContent=B().city; render(); toast("Datos guardados ✅"); }
});
function savePlato(){
  const idv=$("#pId").value, file=$("#pImg").files&&$("#pImg").files[0];
  const base={ nombre:$("#pNom").value.trim(), cat:$("#pCat").value, emoji:$("#pEmoji").value.trim()||"🍽️", desc:$("#pDesc").value.trim(), precio:parseFloat($("#pPrecio").value)||0 };
  if(!base.nombre||!base.precio){ toast("Pon nombre y precio"); return; }
  const finish=img=>{ const P=getPlatos(); if(idv){ const p=P.find(x=>x.id===idv); if(p){ Object.assign(p,base); if(img!==undefined)p.img=img; } } else { P.unshift({id:uid(),activo:true,img:img||null,...base}); } setPlatos(P); EDIT_ID=null; render(); toast("Plato guardado ✅"); window.scrollTo(0,0); };
  if(file){ compressImage(file,900,0.8).then(d=>finish(d||undefined)); } else finish(undefined);
}
function compressImage(file,maxDim,q){ return new Promise(res=>{ if(!file||!/^image\//.test(file.type||"")){ res(null); return; } const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height,m=maxDim||900; if(w>m||h>m){ if(w>=h){ h=Math.round(h*m/w); w=m; } else { w=Math.round(w*m/h); h=m; } } try{ const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h); res(cv.toDataURL("image/jpeg",q||0.8)); }catch(e){ res(r.result); } }; img.onerror=()=>res(r.result); img.src=r.result; }; r.onerror=()=>res(null); r.readAsDataURL(file); }); }

/* ====== PWA ====== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; const b=$("#installBtn"); if(b)b.style.display="inline-grid"; });
function installApp(){ if(deferredPrompt){ deferredPrompt.prompt(); try{deferredPrompt.userChoice.finally(()=>deferredPrompt=null);}catch(e){deferredPrompt=null;} return; } const ios=/iphone|ipad|ipod/i.test(navigator.userAgent); toast(ios?"Pulsa Compartir → Añadir a inicio":"Menú del navegador → Instalar app"); }
function setupPWA(){ const ic=logoURI(); const f=$("#favicon"),ap=$("#appleIcon"); if(f)f.href=ic; if(ap)ap.href=ic; const m=$("#manifest"); if(m){ const man={name:B().nombre+" · Pide desde tu mesa",short_name:B().nombre,description:"Pide desde tu mesa por QR.",theme_color:"#22252b",background_color:"#f4f3f0",display:"standalone",start_url:".",scope:".",icons:[{src:ic,sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]}; try{ if(m._u)URL.revokeObjectURL(m._u); const u=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"})); m.href=u; m._u=u; }catch(e){} } }

/* ====== Init ====== */
try{ const q=new URLSearchParams(location.search); const mz=q.get("mesa"); if(mz&&/^\d+$/.test(mz)) setMesa(+mz); }catch(e){}
$("#year").textContent=new Date().getFullYear();
$("#footCity").textContent=B().city;
getPlatos(); applyLogo(); setupPWA(); render();
</script>
