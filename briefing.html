<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Incuba tu Negocio · Cuéntanos tu proyecto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

  :root {
    --bg: #070b12;
    --bg-deep: #0b1220;
    --ink: #eaf1fb;
    --ink-soft: #aebaccf2;
    --ink-muted: #7f8da3;
    --accent: #27e6a6;
    --accent-deep: #5bffce;
    --accent-soft: rgba(39,230,166,.10);
    --line: #1d2a40;
    --card: #0e1726;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3), 0 2px 10px rgba(0,0,0,.25);
    --shadow-lg: 0 24px 60px rgba(0,0,0,.45), 0 4px 16px rgba(0,0,0,.3);
    --serif: 'Space Grotesk', sans-serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 44px 44px;
    -webkit-mask-image: radial-gradient(circle at 50% 0%, #000, transparent 80%);
    mask-image: radial-gradient(circle at 50% 0%, #000, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    background: rgba(7, 11, 18, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 19px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .progress-wrap {
    flex: 1;
    max-width: 200px;
    margin: 0 16px;
    display: none;
  }
  .progress-wrap.visible { display: block; }

  .progress-track {
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
  }

  .progress-label {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 6px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .stage {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 22px 140px;
    width: 100%;
  }

  .screen {
    width: 100%;
    max-width: 580px;
    animation: enter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes enter {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding-top: 24px;
  }

  .welcome-eyebrow {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 24px;
    opacity: 0;
    animation: enter 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .welcome h1 {
    font-family: var(--serif);
    font-size: clamp(38px, 9vw, 58px);
    line-height: 1.02;
    letter-spacing: -0.035em;
    font-weight: 400;
    margin-bottom: 24px;
    opacity: 0;
    animation: enter 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 300;
  }

  .welcome p {
    font-size: 17px;
    color: var(--ink-soft);
    line-height: 1.55;
    max-width: 460px;
    margin: 0 auto 36px;
    opacity: 0;
    animation: enter 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .welcome-meta {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 40px;
    opacity: 0;
    animation: enter 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-muted);
  }

  .meta-item svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .start-btn {
    opacity: 0;
    animation: enter 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* QUESTION */
  .question-screen { padding-top: 8px; }

  .q-section {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 18px;
  }

  .q-title {
    font-family: var(--serif);
    font-size: clamp(28px, 6.5vw, 38px);
    line-height: 1.1;
    letter-spacing: -0.025em;
    font-weight: 400;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .q-help {
    font-size: 15px;
    color: var(--ink-muted);
    line-height: 1.55;
    margin-bottom: 24px;
  }

  /* EJEMPLO INSPIRADOR */
  .q-example {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 14px 16px;
    margin-bottom: 28px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    animation: enter 0.5s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .q-example-label {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    color: var(--accent-deep);
    font-size: 13px;
    margin-bottom: 4px;
    display: block;
  }

  .q-example-text {
    font-style: italic;
    color: var(--ink-soft);
  }

  /* INPUTS */
  .q-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    font-family: var(--sans);
    font-size: 17px;
    color: var(--ink);
    transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: var(--shadow-sm);
  }

  .q-input:focus {
    outline: none;
    border-color: var(--ink);
    outline: 2px solid var(--accent); outline-offset: 2px; box-shadow: 0 0 0 4px rgba(39,230,166,.18), var(--shadow-sm);
  }

  textarea.q-input {
    min-height: 140px;
    resize: vertical;
    line-height: 1.55;
    font-family: var(--sans);
  }

  .q-input::placeholder {
    color: var(--ink-muted);
    opacity: 0.7;
  }

  /* Contador de caracteres */
  .char-meter {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-muted);
  }

  .char-meter .hint {
    flex: 1;
  }

  .char-meter .count {
    font-variant-numeric: tabular-nums;
    color: var(--ink-muted);
  }

  .char-meter.good .count {
    color: #27e6a6;
  }

  /* OPTIONS */
  .q-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.65, 0, 0.35, 1);
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    user-select: none;
  }

  .opt:hover, .opt:active {
    border-color: var(--ink);
    transform: translateY(-1px);
  }

  .opt.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: #04221a;
  }

  .opt-radio {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-muted);
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }

  .opt.selected .opt-radio {
    border-color: var(--bg);
  }

  .opt.selected .opt-radio::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--bg);
    border-radius: 50%;
  }

  .opt-icon {
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }

  .opt-label {
    font-size: 16px;
    font-weight: 400;
    flex: 1;
  }

  .opt.multi .opt-radio { border-radius: 5px; }
  .opt.multi.selected .opt-radio::after { border-radius: 2px; }

  /* OPTIONS CARD (tarjeta grande con icono + descripción) */
  .opt-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 22px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.65, 0, 0.35, 1);
    box-shadow: var(--shadow-sm);
    user-select: none;
    position: relative;
    display: grid;
    grid-template-columns: 44px 1fr 20px;
    gap: 16px;
    align-items: start;
  }

  .opt-card:hover, .opt-card:active {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .opt-card.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .opt-card-icon {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .opt-card-body {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .opt-card-label {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
  }

  .opt-card-desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .opt-card-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-muted);
    flex-shrink: 0;
    margin-top: 4px;
    position: relative;
    transition: all 0.25s;
  }

  .opt-card.selected .opt-card-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .opt-card.selected .opt-card-check::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 11px;
    border: solid var(--bg);
    border-width: 0 2px 2px 0;
    transform: translate(-50%, -65%) rotate(45deg);
  }

  /* UPLOAD */
  .upload-zone {
    background: var(--card);
    border: 2px dashed var(--line);
    border-radius: 14px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-zone:hover, .upload-zone:active {
    border-color: var(--ink);
    background: var(--bg-deep);
  }

  .upload-zone svg {
    width: 28px;
    height: 28px;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }

  .upload-zone-text {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .upload-zone-hint {
    font-size: 13px;
    color: var(--ink-muted);
  }

  .upload-zone input { display: none; }

  .file-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-chip {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    animation: enter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .file-chip-thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: var(--bg-deep);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .file-chip-thumb svg {
    width: 22px;
    height: 22px;
    color: var(--ink-muted);
  }

  .file-chip-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .file-chip-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink);
    font-weight: 500;
    font-size: 14px;
  }

  .file-chip-meta {
    font-size: 11px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .file-chip-saved {
    color: #27e6a6;
    font-weight: 500;
  }

  .file-chip-remove {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 22px;
    padding: 4px 8px;
    line-height: 1;
    flex-shrink: 0;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .file-chip-remove:hover {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* Loader cuando comprime */
  .file-chip-loading {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--ink-muted);
    animation: enter 0.4s ease-out;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* COLOR */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .color-swatch {
    aspect-ratio: 1;
    border-radius: 12px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.2s;
  }

  .color-swatch.selected {
    border-color: var(--ink);
    transform: scale(0.9);
  }

  /* NAVBAR */
  .navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(7, 11, 18, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    padding: 16px 22px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  .btn {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    padding: 14px 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.65, 0, 0.35, 1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #04221a;
    box-shadow: 0 0 0 1px rgba(39,230,166,.4), 0 10px 30px rgba(39,230,166,.25);
  }

  .btn-primary:hover { background: #5bffce; }

  .btn-primary:disabled {
    background: var(--line);
    color: var(--ink-muted);
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
  }

  .btn-ghost:hover { color: var(--ink); }

  .btn-lg {
    padding: 18px 32px;
    font-size: 16px;
  }

  .btn svg { width: 16px; height: 16px; }

  /* REVIEW */
  .review-screen { padding-top: 8px; }

  .review-title {
    font-family: var(--serif);
    font-size: clamp(32px, 7vw, 42px);
    line-height: 1.05;
    letter-spacing: -0.03em;
    font-weight: 400;
    margin-bottom: 14px;
  }

  .review-title em {
    font-style: italic;
    color: var(--accent);
  }

  .review-sub {
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 32px;
  }

  .review-section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }

  .review-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .review-section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    font-weight: 600;
  }

  .review-edit {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 500;
    padding: 4px 8px;
  }

  .review-edit:hover {
    text-decoration: underline;
  }

  .review-item {
    margin-bottom: 10px;
  }

  .review-item:last-child { margin-bottom: 0; }

  .review-item-label {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 3px;
  }

  .review-item-value {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.5;
    word-wrap: break-word;
  }

  .review-item-value.empty {
    color: var(--ink-muted);
    font-style: italic;
  }

  /* FINAL */
  .final {
    text-align: center;
    padding-top: 20px;
  }

  .final-check {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  .final-check svg {
    width: 36px;
    height: 36px;
    color: var(--bg);
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: draw 0.5s 0.6s ease-out forwards;
  }

  @keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  @keyframes draw { to { stroke-dashoffset: 0; } }

  .final h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 8vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.03em;
    font-weight: 400;
    margin-bottom: 18px;
  }

  .final h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .final p {
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.55;
    max-width: 460px;
    margin: 0 auto 32px;
  }

  .send-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .send-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    width: 100%;
    text-align: left;
    box-shadow: var(--shadow-sm);
  }

  .send-btn:hover, .send-btn:active {
    border-color: var(--ink);
    transform: translateY(-1px);
  }

  .send-btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-btn-icon svg { width: 20px; height: 20px; }

  .send-btn-text { flex: 1; }

  .send-btn-title {
    font-weight: 500;
    margin-bottom: 2px;
  }

/* ========================================
   ESTADO Y PERSISTENCIA
   ======================================== */
const STORAGE_KEY = "briefing_data_v3";
let state = {
  step: -1,
  answers: {},
  files: [],
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && typeof saved === 'object') state = { ...state, ...saved };
    }
  } catch (e) { console.warn(e); }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // localStorage lleno o no disponible — intentar guardar sin las imágenes
    console.warn('Storage error, guardando sin imágenes:', e);
    try {
      const lightState = {
        ...state,
        files: state.files.map(f => ({
          name: f.name,
          type: f.type,
          size: f.size,
          originalSize: f.originalSize,
          dataUrl: null, // sin dataUrl para no ocupar espacio
        })),
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lightState));
      showToast('Demasiadas imágenes guardadas, las miniaturas no se conservarán al recargar');
    } catch (e2) {
      console.warn('Fallo total al guardar:', e2);
    }
  }
}

function resetState() {
  state = { step: -1, answers: {}, files: [] };
  try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
}

const toast = document.getElementById('toast');

function showToast(msg, duration = 2200) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

function getExample(exampleKey) {
  const tipo = state.answers.tipo_negocio || 'otro';
  const examples = EJEMPLOS[exampleKey];
  if (!examples) return null;
  return examples[tipo] || examples.otro;
}

function render() {
  stage.innerHTML = '';
  const total = QUESTIONS.length;
  const REVIEW_STEP = total; // paso de revisión justo después de la última pregunta
  const FINAL_STEP = total + 1; // pantalla final de envío

  if (state.step === -1) {
    renderWelcome();
    navbar.style.display = 'none';
    progressWrap.classList.remove('visible');
  } else if (state.step >= 0 && state.step < total) {
    renderQuestion(QUESTIONS[state.step]);
    navbar.style.display = 'flex';
    progressWrap.classList.add('visible');
    const totalVis = totalVisible();
    const currentVis = visibleIndex(state.step);
    const progress = ((currentVis - 1) / totalVis) * 100;
    progressFill.style.width = progress + '%';
    progressLabel.textContent = `${currentVis} / ${totalVis}`;
    updateNavButtons();
  } else if (state.step === REVIEW_STEP) {
    renderReview();
    navbar.style.display = 'none';
    progressWrap.classList.add('visible');
    progressFill.style.width = '95%';
    progressLabel.textContent = `Revisión`;
  } else {
    renderFinal();
    navbar.style.display = 'none';
    progressWrap.classList.add('visible');
    progressFill.style.width = '100%';
    progressLabel.textContent = `Completado`;
  }

  saveState();
}

function renderQuestion(q) {
  const div = document.createElement('div');
  div.className = 'screen question-screen';

  let inputHTML = '';
  const value = state.answers[q.key] !== undefined ? state.answers[q.key] : '';

  // EJEMPLO INSPIRADOR (si aplica)
  let exampleHTML = '';
  if (q.example) {
    const ex = getExample(q.exampleKey);
    if (ex) {
      exampleHTML = `
        <div class="q-example">
          <span class="q-example-label">💡 Ejemplo para ti</span>
          <div class="q-example-text">"${escapeHtml(ex)}"</div>
        </div>
      `;
    }
  }

  // INPUTS
  if (q.type === 'text' || q.type === 'email') {
    const inputType = q.type === 'email' ? 'email' : 'text';
    inputHTML = `<input type="${inputType}" class="q-input" id="qInput" placeholder="${escapeHtml(q.placeholder || '')}" value="${escapeHtml(value)}" autocomplete="off">`;
  } else if (q.type === 'textarea') {
    inputHTML = `<textarea class="q-input" id="qInput" placeholder="${escapeHtml(q.placeholder || '')}">${escapeHtml(value)}</textarea>`;
    if (q.minChars) {
      inputHTML += `<div class="char-meter" id="charMeter">
        <span class="hint">Recomendado: al menos ${q.minChars} caracteres</span>
        <span class="count" id="charCount">0</span>
      </div>`;
    }
  } else if (q.type === 'options') {
    inputHTML = `<div class="q-options" id="qOptions">
      ${q.options.map(opt => `
        <div class="opt ${value === opt ? 'selected' : ''}" data-value="${escapeHtml(opt)}">
          <div class="opt-radio"></div>
          <div class="opt-label">${escapeHtml(opt)}</div>
        </div>
      `).join('')}
    </div>`;
  } else if (q.type === 'options-icon') {
    inputHTML = `<div class="q-options" id="qOptions">
      ${q.options.map(opt => `
        <div class="opt ${value === opt.id ? 'selected' : ''}" data-value="${escapeHtml(opt.id)}">
          <div class="opt-radio"></div>
          <span class="opt-icon">${opt.icon}</span>
          <div class="opt-label">${escapeHtml(opt.label)}</div>
        </div>
      `).join('')}
    </div>`;
  } else if (q.type === 'options-card') {
    inputHTML = `<div class="q-options" id="qOptions">
      ${q.options.map(opt => `
        <div class="opt-card ${value === opt.id ? 'selected' : ''}" data-value="${escapeHtml(opt.id)}">
          <div class="opt-card-icon">${opt.icon}</div>
          <div class="opt-card-body">
            <div class="opt-card-label">${escapeHtml(opt.label)}</div>
            <div class="opt-card-desc">${escapeHtml(opt.desc)}</div>
          </div>
          <div class="opt-card-check"></div>
        </div>
      `).join('')}
    </div>`;
  } else if (q.type === 'multi') {
    const selected = Array.isArray(value) ? value : [];
    inputHTML = `<div class="q-options" id="qOptions">
      ${q.options.map(opt => `
        <div class="opt multi ${selected.includes(opt) ? 'selected' : ''}" data-value="${escapeHtml(opt)}">
          <div class="opt-radio"></div>
          <div class="opt-label">${escapeHtml(opt)}</div>
        </div>
      `).join('')}
    </div>`;
  } else if (q.type === 'color') {
    inputHTML = `<div class="color-grid" id="qColors">
      ${COLORS.map(c => `
        <div class="color-swatch ${value === c ? 'selected' : ''}" data-value="${c}" style="background:${c}"></div>
      `).join('')}
    </div>
    <input type="text" class="q-input" id="qInput" placeholder="O escribe el código hex (#1a1a1a) o describe el color" value="${escapeHtml(typeof value === 'string' && !COLORS.includes(value) ? value : '')}">`;
  } else if (q.type === 'upload') {
    inputHTML = `
      <label class="upload-zone" for="qFile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="upload-zone-text">Toca para subir archivos</div>
        <div class="upload-zone-hint">Fotos, PDFs o documentos · Las fotos se comprimen automáticamente</div>
        <input type="file" id="qFile" multiple accept="image/*,.pdf,.doc,.docx">
      </label>
      <div class="file-list" id="fileList">
        ${state.files.map((f, i) => renderFileChip(f, i)).join('')}
      </div>
      <div id="fileLoading"></div>
    `;
  }

  div.innerHTML = `
    <div class="q-section">${escapeHtml(q.section)}</div>
    <h2 class="q-title">${escapeHtml(q.title)}</h2>
    <p class="q-help">${escapeHtml(q.help || '')}</p>
    ${exampleHTML}
    ${inputHTML}
  `;
  stage.appendChild(div);

  attachQuestionHandlers(q);
  updateCharCount(q);
  enableKeyboardOptions();

  setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 50);
}

// Hace que las tarjetas de opción (divs) sean usables por teclado (Tab + Enter/Espacio)
function enableKeyboardOptions() {
  document.querySelectorAll('#qOptions .opt, #qOptions .opt-card, #qColors .color-swatch').forEach(el => {
    el.tabIndex = 0;
    el.setAttribute('role', el.classList.contains('multi') ? 'checkbox' : 'button');
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });
}

function updateCharCount(q) {
  if (q.type === 'textarea' && q.minChars) {
    const input = document.getElementById('qInput');
    const meter = document.getElementById('charMeter');
    const count = document.getElementById('charCount');
    if (!input || !meter || !count) return;
    const update = () => {
      const len = input.value.length;
      count.textContent = len;
      if (len >= q.minChars) {
        meter.classList.add('good');
      } else {
        meter.classList.remove('good');
      }
    };
    update();
    input.addEventListener('input', update);
  }
}

function attachQuestionHandlers(q) {
  if (q.type === 'text' || q.type === 'email' || q.type === 'textarea') {
    const input = document.getElementById('qInput');
    input.addEventListener('input', (e) => {
      state.answers[q.key] = e.target.value;
      updateNavButtons();
      saveState();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && q.type !== 'textarea') {
        e.preventDefault();
        if (canProceed()) goNext();
      }
    });
  } else if (q.type === 'options' || q.type === 'options-icon') {
    document.querySelectorAll('#qOptions .opt').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#qOptions .opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        state.answers[q.key] = el.dataset.value;
        updateNavButtons();
        saveState();
      });
    });
  } else if (q.type === 'options-card') {
    document.querySelectorAll('#qOptions .opt-card').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#qOptions .opt-card').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        state.answers[q.key] = el.dataset.value;
        updateNavButtons();
        saveState();
      });
    });
  } else if (q.type === 'multi') {
    document.querySelectorAll('#qOptions .opt').forEach(el => {
      el.addEventListener('click', () => {
        const current = Array.isArray(state.answers[q.key]) ? state.answers[q.key] : [];
        const val = el.dataset.value;
        let next;
        if (current.includes(val)) {
          next = current.filter(v => v !== val);
        } else {
          if (q.max && current.length >= q.max) {
            showToast(`Máximo ${q.max} opciones`);
            return;
          }
          next = [...current, val];
        }
        state.answers[q.key] = next;
        el.classList.toggle('selected');
        updateNavButtons();
        saveState();
      });
    });
  } else if (q.type === 'color') {
    document.querySelectorAll('#qColors .color-swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#qColors .color-swatch').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        state.answers[q.key] = el.dataset.value;
        document.getElementById('qInput').value = '';
        updateNavButtons();
        saveState();
      });
    });
    document.getElementById('qInput').addEventListener('input', (e) => {
      document.querySelectorAll('#qColors .color-swatch').forEach(s => s.classList.remove('selected'));
      state.answers[q.key] = e.target.value;
      updateNavButtons();
      saveState();
    });
  } else if (q.type === 'upload') {
    const fileInput = document.getElementById('qFile');
    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      // Resetear el input para poder volver a subir el mismo archivo si hace falta
      e.target.value = '';

      for (const file of files) {
        // Mostrar loader mientras procesamos
        const loadingId = 'load-' + Date.now() + Math.random().toString(36).slice(2, 6);
        const loadEl = document.getElementById('fileLoading');
        if (loadEl) {
          loadEl.insertAdjacentHTML('beforeend', `
            <div class="file-chip-loading" id="${loadingId}">
              <div class="spinner"></div>
              <span>Procesando "${escapeHtml(file.name)}"...</span>
            </div>
          `);
        }

        try {
          const processed = await processFile(file);
          if (processed) {
            state.files.push(processed);
            saveState();
          }
        } catch (err) {
          console.warn('Error procesando archivo:', err);
          showToast(`No se pudo procesar "${file.name}"`);
        }

        // Quitar el loader
        const elToRemove = document.getElementById(loadingId);
        if (elToRemove) elToRemove.remove();
      }
      render();
    });

    document.querySelectorAll('.file-chip-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.index);
        state.files.splice(i, 1);
        saveState();
        render();
      });
    });
  }
}

// Render visual de cada archivo subido (con preview de imagen si es foto)
function renderFileChip(f, i) {
  const isImage = f.type && f.type.startsWith('image/');
  const sizeKB = Math.round(f.size / 1024);
  const sizeStr = sizeKB >= 1024 ? `${(sizeKB/1024).toFixed(1)} MB` : `${sizeKB} KB`;

  // Si se comprimió, mostrar ahorro
  let savedHTML = '';
  if (f.originalSize && f.originalSize > f.size) {
    const origKB = Math.round(f.originalSize / 1024);
    const origStr = origKB >= 1024 ? `${(origKB/1024).toFixed(1)} MB` : `${origKB} KB`;
    const pct = Math.round((1 - f.size / f.originalSize) * 100);
    savedHTML = ` · <span class="file-chip-saved">↓ ${pct}% (de ${origStr})</span>`;
  }

  const thumb = isImage && f.dataUrl
    ? `<div class="file-chip-thumb" style="background-image:url('${f.dataUrl}')"></div>`
    : `<div class="file-chip-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`;

  return `
    <div class="file-chip">
      ${thumb}
      <div class="file-chip-info">
        <div class="file-chip-name">${escapeHtml(f.name)}</div>
        <div class="file-chip-meta">${sizeStr}${savedHTML}</div>
      </div>
      <button class="file-chip-remove" data-index="${i}" aria-label="Quitar">×</button>
    </div>
  `;
}

// Procesar un archivo: si es imagen, comprimir. Si no, dejar tal cual.
async function processFile(file) {
  const isImage = file.type && file.type.startsWith('image/');
  const originalSize = file.size;
  const MAX_SIZE = 25 * 1024 * 1024; // 25MB hard limit

  if (file.size > MAX_SIZE) {
    showToast(`"${file.name}" es demasiado grande (máx 25MB)`);
    return null;
  }

  // Si NO es imagen, guardar tal cual
  if (!isImage) {
    // Para no-imágenes solo guardamos metadata (no las metemos en localStorage como base64 grande)
    return {
      name: file.name,
      type: file.type,
      size: file.size,
      originalSize: originalSize,
      dataUrl: null,
    };
  }

  // Si es imagen, comprimir
  try {
    const compressed = await compressImage(file);
    return {
      name: file.name,
      type: 'image/jpeg',
      size: compressed.size,
      originalSize: originalSize,
      dataUrl: compressed.dataUrl,
    };
  } catch (err) {
    console.warn('Fallo al comprimir, guardando original:', err);
    // Fallback: si la compresión falla, intentar guardar original SOLO si es pequeña
    if (originalSize > 2 * 1024 * 1024) {
      showToast(`No se pudo comprimir "${file.name}" y es muy grande`);
      return null;
    }
    const dataUrl = await fileToDataUrl(file);
    return {
      name: file.name,
      type: file.type,
      size: file.size,
      originalSize: originalSize,
      dataUrl: dataUrl,
    };
  }
}

// Comprimir imagen usando canvas: max 1600px ancho, calidad 0.82 JPEG
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('No es una imagen válida'));
      img.onload = () => {
        try {
          const MAX_W = 1600;
          const MAX_H = 1600;
          let { width, height } = img;

          // Redimensionar si excede
          if (width > MAX_W || height > MAX_H) {
            const ratio = Math.min(MAX_W / width, MAX_H / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          // Fondo blanco para que JPEG no muestre transparencias raras
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);

          // Calidad 0.82 da buena relación tamaño/calidad
          const dataUrl = canvas.toDataURL('image/jpeg', 0.82);

          // Calcular tamaño aproximado del dataUrl (base64 = ~33% más grande que binario)
          // Ej: si dataUrl tiene 100 chars, los datos binarios son ~75 bytes
          const base64Length = dataUrl.length - dataUrl.indexOf(',') - 1;
          const size = Math.round(base64Length * 0.75);

          resolve({ dataUrl, size, width, height });
        } catch (err) {
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function canProceed() {
  if (state.step < 0 || state.step >= QUESTIONS.length) return true;
  const q = QUESTIONS[state.step];
  if (!q.required) return true;
  const val = state.answers[q.key];
  if (q.type === 'multi') return Array.isArray(val) && val.length > 0;
  if (q.type === 'email') return val && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  return val && val.toString().trim().length > 0;
}

// ¿Debe mostrarse esta pregunta según las respuestas actuales?
function shouldShowQuestion(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return true;
  const q = QUESTIONS[idx];
  // Filtro por nivel: si la pregunta exige un nivel mayor del elegido, no se muestra
  if (q.minNivel) {
    const cur = NIVEL_RANK[state.answers.nivel] || 0;
    if (cur < NIVEL_RANK[q.minNivel]) return false;
  }
  if (!q.showIf) return true;
  try { return !!q.showIf(state.answers); }
  catch (e) { return true; }
}

// Limpiar respuestas de preguntas que ya no aplican (si cambió condición)
function purgeHiddenAnswers() {
  QUESTIONS.forEach(q => {
    if (q.showIf && !q.showIf(state.answers)) {
      delete state.answers[q.key];
    }
  });
}

// Calcular cuántas preguntas son visibles en total (para el progreso)
function totalVisible() {
  return QUESTIONS.filter((q, i) => shouldShowQuestion(i)).length;
}

// Calcular qué número de pregunta visible es esta
function visibleIndex(idx) {
  let count = 0;
  for (let i = 0; i <= idx; i++) {
    if (shouldShowQuestion(i)) count++;
  }
  return count;
}

function updateNavButtons() {
  backBtn.style.visibility = state.step > 0 ? 'visible' : 'hidden';
  nextBtn.disabled = !canProceed();
  // ¿Hay alguna pregunta visible después de la actual?
  let hasNext = false;
  for (let i = state.step + 1; i < QUESTIONS.length; i++) {
    if (shouldShowQuestion(i)) { hasNext = true; break; }
  }
  const isLast = !hasNext;
  nextBtn.innerHTML = isLast
    ? 'Revisar todo <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
    : 'Continuar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
}

function goNext() {
  if (!canProceed()) return;
  // Limpiar respuestas que ya no apliquen (por cambios en condiciones)
  purgeHiddenAnswers();
  // Avanzar al siguiente paso visible
  let next = state.step + 1;
  while (next < QUESTIONS.length && !shouldShowQuestion(next)) {
    next++;
  }
  // Si ya pasamos todas las preguntas, ir a revisión
  if (next >= QUESTIONS.length) next = QUESTIONS.length;
  state.step = next;
  render();
}

function goBack() {
  if (state.step > 0) {
    // Retroceder al anterior paso visible
    let prev = state.step - 1;
    while (prev >= 0 && !shouldShowQuestion(prev)) {
      prev--;
    }
    if (prev < 0) {
      state.step = -1;
    } else {
      state.step = prev;
    }
    render();
  } else if (state.step === 0) {
    state.step = -1;
    render();
  }
}

backBtn.addEventListener('click', goBack);
nextBtn.addEventListener('click', goNext);

/* ========================================
   PANTALLA DE REVISIÓN
   ======================================== */
function renderReview() {
  const div = document.createElement('div');
  div.className = 'screen review-screen';

  // Agrupar por sección (solo preguntas visibles)
  const sections = {};
  QUESTIONS.forEach((q, idx) => {
    if (!shouldShowQuestion(idx)) return;
    if (!sections[q.section]) sections[q.section] = [];
    sections[q.section].push({ q, idx });
  });

  let sectionsHTML = '';
  Object.entries(sections).forEach(([sectionName, items]) => {
    let itemsHTML = '';
    items.forEach(({ q, idx }) => {
      const val = state.answers[q.key];
      let display = '';
      let isEmpty = false;

      if (q.type === 'options-icon') {
        const opt = TIPOS_NEGOCIO.find(o => o.id === val);
        display = opt ? `${opt.icon} ${opt.label}` : '';
        isEmpty = !val;
      } else if (q.type === 'options-card') {
        const opt = (q.options || []).find(o => o.id === val);
        display = opt ? `${opt.icon} ${opt.label}` : '';
        isEmpty = !val;
      } else if (q.type === 'multi') {
        display = Array.isArray(val) && val.length ? val.join(', ') : '';
        isEmpty = !Array.isArray(val) || val.length === 0;
      } else if (q.type === 'upload') {
        display = state.files.length ? `${state.files.length} archivo(s) subido(s)` : '';
        isEmpty = state.files.length === 0;
      } else {
        display = val ? val.toString() : '';
        isEmpty = !val || val.toString().trim() === '';
      }

      itemsHTML += `
        <div class="review-item">
          <div class="review-item-label">${escapeHtml(q.title)}</div>
          <div class="review-item-value ${isEmpty ? 'empty' : ''}">${isEmpty ? 'Sin completar' : escapeHtml(display)}</div>
        </div>
      `;
    });

    sectionsHTML += `
      <div class="review-section">
        <div class="review-section-header">
          <div class="review-section-title">${escapeHtml(sectionName)}</div>
          <button class="review-edit" data-step="${items[0].idx}">Editar</button>
        </div>
        ${itemsHTML}
      </div>
    `;
  });

  div.innerHTML = `
    <div class="q-section">Casi listo</div>
    <h2 class="review-title">Revisa <em>tu briefing</em></h2>
    <p class="review-sub">Echa un vistazo a tus respuestas. Si quieres cambiar algo, pulsa "Editar" en cada sección. Cuando esté todo bien, sigue al envío.</p>
    ${sectionsHTML}
    <div style="display:flex; gap:10px; margin-top:24px;">
      <button class="btn btn-ghost" id="reviewBack">← Atrás</button>
      <button class="btn btn-primary" id="reviewNext" style="flex:1;">Todo correcto, enviar →</button>
    </div>
  `;
  stage.appendChild(div);

  document.querySelectorAll('.review-edit').forEach(btn => {
    btn.addEventListener('click', () => {
      state.step = parseInt(btn.dataset.step);
      render();
    });
  });

  document.getElementById('reviewBack').addEventListener('click', () => {
    // Buscar la última pregunta visible
    let last = QUESTIONS.length - 1;
    while (last >= 0 && !shouldShowQuestion(last)) last--;
    state.step = last >= 0 ? last : 0;
    render();
  });

  document.getElementById('reviewNext').addEventListener('click', () => {
    state.step = QUESTIONS.length + 1;
    render();
  });
}

    if (!ok) document.getElementById('previewBox').classList.add('show');
  });

  document.getElementById('previewToggle').addEventListener('click', () => {
    document.getElementById('previewBox').classList.toggle('show');
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    if (confirm('¿Seguro que quieres empezar un briefing nuevo? Se borrará el actual.')) {
      resetState();
      state.step = -1;
      render();
    }
  });

  // Si hay fotos sin subir y la nube está configurada, súbelas y vuelve a pintar (para meter los enlaces en el prompt)
  const C = CONFIG.CLOUDINARY;
  if (C && C.cloudName && C.uploadPreset &&
      state.files.some(f => f.type && f.type.startsWith('image/') && f.dataUrl && !f.url)) {
    uploadImagesToCloud().then(done => { if (done) render(); });
  }
}

// Sube a Cloudinary (cuenta gratis) las imágenes que aún no tengan enlace. Devuelve true si subió algo.
async function uploadImagesToCloud() {
  const C = CONFIG.CLOUDINARY;
  if (!C || !C.cloudName || !C.uploadPreset) return false;
  const pendientes = state.files.filter(f => f.type && f.type.startsWith('image/') && f.dataUrl && !f.url);
  if (!pendientes.length) return false;
  showToast('Subiendo tus fotos a la nube…', 6000);
  let alguna = false;
  for (const f of pendientes) {
    try {
      const fd = new FormData();
      fd.append('file', f.dataUrl);
      fd.append('upload_preset', C.uploadPreset);
      const r = await fetch(`https://api.cloudinary.com/v1_1/${C.cloudName}/image/upload`, { method: 'POST', body: fd });
      const j = await r.json();
      if (j && j.secure_url) { f.url = j.secure_url; alguna = true; }
    } catch (e) { console.warn('No se pudo subir una imagen:', e); }
  }
  saveState();
  if (alguna) showToast('✓ Fotos subidas');
  return alguna;
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}

  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

  lines.push(`**Cliente que rellena:** ${a.nombre_cliente || '—'} (${a.email_cliente || 'sin email'})`);
  lines.push(`**Fecha:** ${new Date().toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' })}`);

  const tipoObj = TIPOS_NEGOCIO.find(t => t.id === a.tipo_negocio);
  lines.push(`**Sector:** ${tipoObj ? tipoObj.label : '—'}`);

  const NIVEL_LABEL = { basica:'Básica', mediana:'Mediana', grande:'Grande', premium:'Premium', premiumplus:'Premium Plus' };
  if (a.nivel) lines.push(`**Nivel contratado:** ${NIVEL_LABEL[a.nivel] || a.nivel} (ajusta el alcance de la web/app a este nivel)`);

  const tipoProyObj = TIPOS_PROYECTO.find(t => t.id === a.tipo_proyecto);
  lines.push(`**Tipo de proyecto:** ${tipoProyObj ? `${tipoProyObj.icon} ${tipoProyObj.label}` : '—'}`);

  if (hasApp) {
    const plantObj = PLANTILLAS_APP.find(p => p.id === a.plantilla_app);
    lines.push(`**Tipo de app:** ${plantObj ? `${plantObj.icon} ${plantObj.label}` : '—'}`);
  }

  lines.push('');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('');

  // BLOQUE APP (si aplica) — al principio para que sea lo primero que leas
  if (hasApp) {
    lines.push('## 🔧 ESPECIFICACIONES DE LA WEB APP');
    lines.push('');
    if (a.app_descripcion_libre) {
      lines.push(`**Descripción libre del cliente:**`);
      lines.push(a.app_descripcion_libre);
      lines.push('');
    }
    lines.push(`**Acciones principales que harán los usuarios:**`);
    lines.push(a.app_acciones || '—');
    lines.push('');
    lines.push(`**¿Necesita cuentas?:** ${a.app_cuentas || '—'}`);
    lines.push('');
    lines.push(`**Pantalla principal al entrar (lo más importante):**`);
    lines.push(a.app_pantalla_principal || '—');
    lines.push('');
    if (a.nivel === 'premiumplus' && a.app_bot) {
      lines.push(`**Bot de atención (Premium Plus) — dudas que debe resolver:**`);
      lines.push(a.app_bot);
      lines.push('');
    }
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('');
  }

  lines.push('## 1. EL NEGOCIO');
  lines.push('');
  lines.push(`**A qué se dedica:**`);
  lines.push(a.descripcion_negocio || '—');
  lines.push('');
  lines.push(`**Qué lo hace diferente:**`);
  lines.push(a.diferencial || '—');
  lines.push('');
  lines.push(`**Productos/servicios concretos que vende:**`);
  lines.push(a.productos_servicios || '—');
  lines.push('');

  lines.push('## 2. EL CLIENTE OBJETIVO');
  lines.push('');
  lines.push(`**Quién es:**`);
  lines.push(a.cliente_ideal || '—');
  lines.push('');
  lines.push(`**Problema que se le resuelve:**`);
  lines.push(a.problema || '—');
  lines.push('');

  lines.push('## 3. OBJETIVO DE LA WEB');
  lines.push('');
  lines.push(`**Acción principal que debe conseguir:** ${a.objetivo_web || '—'}`);
  lines.push(`**Texto del botón principal (CTA):** "${a.cta_principal || '—'}"`);
  if (a.exito_cliente) {
    lines.push(`**Definición de éxito del cliente (criterio nº1):** ${a.exito_cliente}`);
  }
  lines.push('');

  lines.push('## 4. ESTILO Y TONO');
  lines.push('');
  lines.push(`**Tono de voz:** ${a.tono_voz || '—'}`);
  if (Array.isArray(a.vibras) && a.vibras.length) {
    lines.push(`**Vibras visuales:** ${a.vibras.join(', ')}`);
  } else {
    lines.push(`**Vibras visuales:** —`);
  }
  lines.push(`**Color principal:** ${a.color_principal || 'a definir según vibra'}`);
  lines.push('');
  lines.push(`**Webs que inspiran al cliente:**`);
  lines.push(a.inspiraciones || '—');
  lines.push('');
  if (a.no_quiero) {
    lines.push(`**⛔ LO QUE EL CLIENTE NO QUIERE (respétalo SÍ o SÍ):**`);
    lines.push(a.no_quiero);
    lines.push('');
  }

  lines.push('## 5. CONTEXTO LOCAL');
  lines.push('');
  lines.push(`**Ubicación / zona:** ${a.ubicacion || '—'}`);
  lines.push(`**Horarios:** ${a.horarios || 'no aplica'}`);
  lines.push('');
  if (a.competencia) {
    lines.push(`**Competencia directa (referencia, NO copiar):**`);
    lines.push(a.competencia);
    lines.push('');
  }

  lines.push('## 6. FUNCIONALIDADES PEDIDAS');
  lines.push('');
  if (Array.isArray(a.funciones) && a.funciones.length) {
    a.funciones.forEach(f => lines.push(`- ${f}`));
  } else {
    lines.push('- (ninguna explícita — usar las estándar)');
  }
  lines.push('');

  lines.push('## 7. TEXTOS Y MATERIALES');
  lines.push('');
  lines.push(`**Textos aportados:**`);
  lines.push(a.textos || '—');
  lines.push('');
  if (state.files.length) {
    lines.push(`**Archivos adjuntos:**`);
    state.files.forEach(f => {
      const kb = Math.round(f.size / 1024);
      const sizeStr = kb >= 1024 ? `${(kb/1024).toFixed(1)} MB` : `${kb} KB`;
      let extra = '';
      if (f.originalSize && f.originalSize > f.size) {
        const origKB = Math.round(f.originalSize / 1024);
        const origStr = origKB >= 1024 ? `${(origKB/1024).toFixed(1)} MB` : `${origKB} KB`;
        extra = ` — comprimida desde ${origStr}`;
      }
      const link = f.url ? ` → ${f.url}` : '';
      lines.push(`- ${f.name} (${f.type || 'archivo'}, ${sizeStr}${extra})${link}`);
    });
    lines.push('');
    const algunaSubida = state.files.some(f => f.url);
    if (algunaSubida) {
      lines.push('  ✅ Las imágenes con enlace (→) están subidas a la nube: ábrelas para descargarlas y úsalas en la web.');
    } else {
      lines.push('  ⚠️ IMPORTANTE: las imágenes se quedaron en el dispositivo del cliente. NO viajan en este mensaje. Pídelas al cliente por separado (WhatsApp, email) antes de construir la web.');
    }
    lines.push('');
  } else {
    lines.push(`**Archivos:** ninguno. Usa placeholders coherentes con el negocio.`);
    lines.push('');
  }

  lines.push('## 8. CONTACTO PÚBLICO');
  lines.push('');
  lines.push(a.contacto_publico || '—');
  lines.push('');
  if (a.redes) {
    lines.push(`**Redes sociales:**`);
    lines.push(a.redes);
    lines.push('');
  }

  if (a.extra) {
    lines.push('## 9. NOTAS EXTRA');
    lines.push('');
    lines.push(a.extra);
    lines.push('');
  }

  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('');
  lines.push('## ✅ AHORA EMPIEZA — RECORRE LOS 10 AGENTES:');
  lines.push('');
  lines.push('1. **Agente 1 (Arquitecto):** relee el briefing y escribe la checklist de criterios de aceptación + el mapa de pantallas y datos.');
  lines.push('2. **Agentes 2-4 (Marca, UX, Copy):** define sistema visual, navegación y todos los textos reales.');
  if (hasApp) {
    lines.push('3. **Agentes 5-6 (Frontend, Datos):** construye el HTML completo con la capa de datos en localStorage y todos los flujos.');
  } else {
    lines.push('3. **Agente 5 (Frontend):** construye el HTML completo, responsive y con todas las secciones.');
  }
  lines.push('4. **Agentes 7-9 (Seguridad, Rendimiento, Accesibilidad):** repasa y corrige el código contra las tres checklists.');
  lines.push('5. **Agente 10 (QA):** verifica UNO A UNO los criterios de aceptación. Marca ✅/❌, corrige los ❌ y vuelve a pasar.');
  lines.push(`6. Entrega el archivo en outputs como \`${isApp ? 'app' : (isAmbos ? 'web-app' : 'web')}-{nombre-negocio}.html\`.`);
  lines.push('7. Cierra con: (a) la checklist de aceptación marcada, (b) decisiones clave que tomaste, (c) qué supuestos rellenaste por ti mismo, y (d) qué pulir en una 2ª iteración.');
  lines.push('');
  lines.push(`Briefing recogido vía la herramienta de ${CONFIG.BRAND_NAME}.`);

  return lines.join('\n');
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ARRANQUE */
loadState();
if (state.step > QUESTIONS.length + 1) state.step = QUESTIONS.length + 1;
render();
</script>
</body>
</html>
